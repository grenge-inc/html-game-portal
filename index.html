<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Game Portal — Grenge Prototypes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}

/* ── 全体 ── */
body{
  font-family:'Helvetica Neue',system-ui,sans-serif;
  background:#07070f;
  color:#e0e8ff;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── ヘッダー ── */
header{
  padding:20px 20px 14px;
  border-bottom:1px solid #1a1a30;
  display:flex;
  align-items:center;
  gap:14px;
  background:rgba(7,7,15,0.95);
  position:sticky;
  top:0;
  z-index:50;
  backdrop-filter:blur(12px);
}
.logo{
  font-size:20px;
  font-weight:800;
  background:linear-gradient(135deg,#a0c8ff,#80ffcc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:-.01em;
}
.header-right{display:flex;align-items:center;gap:10px;margin-left:auto;}
.count-badge{
  font-size:11px;
  color:#6080a0;
  background:#0e1020;
  border:1px solid #1e2840;
  border-radius:20px;
  padding:3px 10px;
  font-weight:600;
}

/* ── 検索 ── */
.search-wrap{
  padding:16px 20px 0;
}
.search-input{
  width:100%;
  max-width:480px;
  display:block;
  padding:10px 16px;
  font-size:14px;
  background:#0e1020;
  border:1px solid #1e2840;
  border-radius:10px;
  color:#c0d0f0;
  outline:none;
  transition:border-color .2s;
}
.search-input:focus{border-color:#4060a0;}
.search-input::placeholder{color:#3a4060;}

/* ── グリッド ── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(164px,1fr));
  gap:14px;
  padding:16px 20px 40px;
}

/* ── カード ── */
.card{
  background:#0c0c1a;
  border:1px solid #191930;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:transform .15s,border-color .2s,box-shadow .2s;
  position:relative;
}
.card:hover{
  transform:translateY(-3px);
  border-color:var(--accent);
  box-shadow:0 8px 24px rgba(0,0,0,.5),0 0 0 1px var(--accent-a20);
}
.card:active{transform:translateY(-1px);}

/* サムネイル */
.thumb{
  width:100%;
  aspect-ratio:3/2;
  display:block;
  object-fit:cover;
  border-bottom:1px solid #191930;
}

/* カード下部 */
.card-body{
  padding:9px 10px 10px;
}
.card-name{
  font-size:11.5px;
  font-weight:600;
  color:#c8d8f8;
  line-height:1.35;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.card-size{
  font-size:10px;
  color:#3a4a6a;
  margin-top:4px;
  font-variant-numeric:tabular-nums;
}

/* ── モーダル ── */
.modal-bg{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.88);
  z-index:100;
  align-items:center;
  justify-content:center;
  padding:12px;
}
.modal-bg.open{display:flex;}
.modal{
  background:#0c0c1a;
  border:1px solid #202040;
  border-radius:16px;
  width:min(96vw,480px);
  height:min(92vh,900px);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,.8);
}
.modal-head{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  border-bottom:1px solid #191930;
  flex-shrink:0;
  background:#0a0a18;
}
.modal-title{
  flex:1;
  font-size:13px;
  font-weight:600;
  color:#c8d8f8;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.btn-small{
  background:none;
  border:1px solid #202040;
  border-radius:8px;
  padding:5px 11px;
  font-size:12px;
  cursor:pointer;
  color:#7090b0;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  gap:3px;
  transition:background .15s,color .15s;
  white-space:nowrap;
}
.btn-small:hover{background:#161630;color:#a0c0e0;}
iframe{flex:1;border:none;width:100%;background:#000;}

/* ── 空状態 ── */
.empty{
  text-align:center;
  padding:60px 20px;
  color:#3a4a6a;
  font-size:14px;
}

/* ── アニメーション ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.card{animation:fadeIn .25s ease both;}
</style>
</head>
<body>

<header>
  <div class="logo">🎮 Game Portal</div>
  <div class="header-right">

<div class="search-wrap">

<div class="grid" id="grid"></div>

<div class="modal-bg" id="mb" onclick="closeBG(event)">

      <button class="btn-small" onclick="closeModal()">✕</button>
    </div>
    <iframe id="gf" src="" allow="autoplay"></iframe>
  </div>
</div>

function closeModal() {
  document.getElementById('mb').classList.remove('open');
  document.getElementById('gf').src = '';
}
function closeBG(e) { if (e.target === document.getElementById('mb')) closeModal(); }

function filter() {
  const q = document.getElementById('q').value.toLowerCase();
  shown = q ? GAMES.filter(g => g.name.toLowerCase().includes(q)) : [...GAMES];
  render();
}

function render() {
  document.getElementById('cnt').textContent = shown.length + ' games';
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  shown.forEach((g, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.setProperty('--accent', g.accent || '#6ff');
    card.style.setProperty('--accent-a20', (g.accent||'#6ff').replace('#','rgba(') + ',0.2)');
    card.style.animationDelay = (i * 0.018) + 's';
    card.innerHTML = `
      <img class="thumb" src="${g.thumb}" alt="${g.name}" loading="lazy">
      <div class="card-body">
        <div class="card-name">${g.name}</div>
      </div>`;
    card.onclick = () => openGame(g);
    grid.appendChild(card);
  });
}

// キーボード: Esc でモーダル閉じる
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

render();
</script>
</body>
</html>
