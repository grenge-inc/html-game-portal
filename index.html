<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI伝説</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',system-ui,sans-serif;background:#f0f2ff;color:#1a1a2e;min-height:100vh;}
header{padding:14px 20px;border-bottom:2px solid #dde2ff;display:flex;align-items:center;gap:12px;background:#fff;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(80,80,200,0.08);}
.header-icon{width:44px;height:44px;border-radius:12px;object-fit:cover;flex-shrink:0;box-shadow:0 2px 8px rgba(80,80,200,0.2);}
.logo{font-size:22px;font-weight:900;background:linear-gradient(135deg,#5b6ef5,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.01em;}
.count-badge{font-size:12px;color:#7080c0;background:#f0f0ff;border:1px solid #dde0ff;border-radius:20px;padding:3px 12px;font-weight:600;margin-left:auto;}
.search-wrap{padding:18px 20px 0;}
.search-input{width:100%;max-width:520px;display:block;padding:11px 18px;font-size:15px;background:#fff;border:2px solid #dde0ff;border-radius:12px;color:#1a1a2e;outline:none;transition:border-color .2s,box-shadow .2s;}
.search-input:focus{border-color:#5b6ef5;box-shadow:0 0 0 3px rgba(91,110,245,0.12);}
.search-input::placeholder{color:#aab0d0;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;padding:18px 20px 48px;}
.card{background:#fff;border:2px solid #e4e8ff;border-radius:14px;padding:20px 14px 18px;cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s;display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px;min-height:100px;animation:fadeIn .2s ease both;}
.card:hover{transform:translateY(-3px);border-color:#5b6ef5;box-shadow:0 8px 24px rgba(91,110,245,0.18);}
.card:active{transform:translateY(-1px);}
.card-icon{font-size:34px;line-height:1;}
.card-name{font-size:13.5px;font-weight:700;color:#1a1a2e;line-height:1.4;letter-spacing:-.01em;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(10,10,30,.75);z-index:100;align-items:center;justify-content:center;padding:12px;backdrop-filter:blur(4px);}
.modal-bg.open{display:flex;}
.modal{background:#fff;border:2px solid #dde0ff;border-radius:18px;width:min(96vw,480px);height:min(92vh,900px);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.35);}
.modal-head{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:2px solid #f0f0ff;flex-shrink:0;background:#fafbff;}
.modal-title{flex:1;font-size:14px;font-weight:700;color:#1a1a2e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.btn-small{background:none;border:1.5px solid #dde0ff;border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;color:#5b6ef5;text-decoration:none;display:inline-flex;align-items:center;gap:3px;font-weight:600;transition:background .15s;white-space:nowrap;}
.btn-small:hover{background:#f0f0ff;}
iframe{flex:1;border:none;width:100%;background:#000;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>
<header>
  <img class="header-icon" src="icon_ai_legend.png" alt="AI伝説">
  <div class="logo">AI伝説</div>
  <span class="count-badge" id="cnt">44 games</span>
</header>
<div class="search-wrap">
  <input class="search-input" id="q" type="text" placeholder="ゲームを検索…" oninput="filter()" autocomplete="off">
</div>
<div class="grid" id="grid"></div>
<div class="modal-bg" id="mb" onclick="closeBG(event)">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="mt"></span>
      <a class="btn-small" id="ml" href="#" target="_blank">↗ 別タブ</a>
      <button class="btn-small" onclick="closeModal()">✕ 閉じる</button>
    </div>
    <iframe id="gf" src="" allow="autoplay"></iframe>
  </div>
</div>
<script>
const BASE='games/';
const GAMES=[{"name": "Arrow Sort Frozen Chain", "file": "Arrow Sort Frozen Chain.html"}, {"name": "Arrow Sort Mirror Path", "file": "Arrow Sort Mirror Path.html"}, {"name": "Drop 2048（ぽとぽと合体）", "file": "Drop 2048（ぽとぽと合体）.html"}, {"name": "★バースト連鎖リバーシ", "file": "★バースト連鎖リバーシ.html"}, {"name": "おとマシン", "file": "おとマシン.html"}, {"name": "カタカナしりとりソリティア", "file": "カタカナしりとりソリティア.html"}, {"name": "カラーホールドトラップ", "file": "カラーホールドトラップ.html"}, {"name": "カーサバイバー", "file": "カーサバイバー（Car Survivor）.html"}, {"name": "クリスタルソーター", "file": "クリスタルソーター.html"}, {"name": "クリスタルレゾナンス", "file": "クリスタルレゾナンス（Crystal Resonance）.html"}, {"name": "グラビティスマッシュ", "file": "グラビティスマッシュ (GravitySmash).html"}, {"name": "グラビティ・テンウェル", "file": "グラビティ・テンウェル.html"}, {"name": "コンボシュート", "file": "コンボシュート.html"}, {"name": "ダイスチャージ・ダンジョン", "file": "ダイスチャージ・ダンジョン.html"}, {"name": "チェーンパンチ道場", "file": "チェーンパンチ道場.html"}, {"name": "チャージ一閃", "file": "チャージ一閃.html"}, {"name": "トリックライン・ワンスワイプ", "file": "トリックライン・ワンスワイプ.html"}, {"name": "トレジャー・ロール", "file": "トレジャー・ロール（Treasure Roll）.html"}, {"name": "ドラッグ・マージライン", "file": "ドラッグ・マージライン（Drag Merge Line）.html"}, {"name": "ネオン・ワンショット崩落", "file": "ネオン・ワンショット崩落（NeonOneShotCollapse）.html"}, {"name": "マージファンタジー2D", "file": "マージファンタジー2D.html"}, {"name": "リズムタップ・フリック", "file": "リズムタップ・フリック.html"}, {"name": "リール・オブ・マジック", "file": "リール・オブ・マジック.html"}, {"name": "ワープ連鎖ソート", "file": "ワープ連鎖ソート.html"}, {"name": "元素連鎖反応", "file": "元素連鎖反応（Element Chain Reaction）.html"}, {"name": "崩落ドミノ連鎖", "file": "崩落ドミノ連鎖.html"}, {"name": "恐竜卵ソート", "file": "恐竜卵ソート（孵化演出）.html"}, {"name": "方向連鎖パズル", "file": "方向連鎖パズル.html"}, {"name": "氷滑りソート", "file": "氷滑りソート.html"}, {"name": "灯台の光集約", "file": "灯台の光集約（Lighthouse Convergence）.html"}, {"name": "炎の連鎖滝", "file": "炎の連鎖滝（FlameChainFalls）.html"}, {"name": "矢印スタックパズル", "file": "矢印スタックパズル.html"}, {"name": "矢印ドミノ", "file": "矢印ドミノ.html"}, {"name": "破裂で飛ばす", "file": "破裂で飛ばす.html"}, {"name": "磁力4方向4連", "file": "磁力4方向4連.html"}, {"name": "磁力ホバー", "file": "磁力ホバー（Magnetic Hover 2048）.html"}, {"name": "紐引きアローソート", "file": "紐引きアローソート.html"}, {"name": "紐引きチェーンパズル", "file": "紐引きチェーンパズル（ChainArrow）.html"}, {"name": "花火大輪", "file": "花火大輪（HanabiBloom）.html"}, {"name": "連鎖割り雪崩", "file": "連鎖割り雪崩（Chain Pop Avalanche）.html"}, {"name": "連鎖暴走方程式", "file": "連鎖暴走方程式.html"}, {"name": "連鎖落とし4目ローグ", "file": "連鎖落とし4目ローグ（チェイン・ドロップ・ローグ）.html"}, {"name": "配線タワーディフェンス", "file": "配線タワーディフェンス.html"}, {"name": "重力ルートクラッシュ", "file": "重力ルートクラッシュ.html"}];
const EMOJI={'ソート':'🔀','ソーター':'🔀','パズル':'🧩','連鎖':'⛓️','ダンジョン':'⚔️','リバーシ':'♟️','2048':'🔢','ホバー':'🧲','サバイバー':'🚗','道場':'🥊','花火':'🎆','矢印':'➡️','方程式':'🧮','チャージ':'⚡','ソリティア':'🃏','スマッシュ':'💥','タワー':'🏗️','ロール':'🎲','崩落':'💀','滝':'🌊','雪崩':'❄️','卵':'🥚','磁力':'🧲','紐':'🧵','灯台':'🗼','重力':'⬇️','ドミノ':'🎯','マシン':'🎵','コンボ':'⚽','ライン':'📏','クリスタル':'💎','ファンタジー':'🌟','マジック':'✨','マージ':'🔀','リール':'🎰','リズム':'🎵','Arrow':'➡️','Drop':'⬇️','Frozen':'❄️','Mirror':'🪞'};
function getEmoji(n){for(const[k,v]of Object.entries(EMOJI))if(n.includes(k))return v;return'🎮';}
let shown=[...GAMES];
function openGame(g){const u=BASE+encodeURIComponent(g.file);document.getElementById('mt').textContent=g.name;document.getElementById('gf').src=u;document.getElementById('ml').href=u;document.getElementById('mb').classList.add('open');}
function closeModal(){document.getElementById('mb').classList.remove('open');document.getElementById('gf').src='';}
function closeBG(e){if(e.target===document.getElementById('mb'))closeModal();}
function filter(){const q=document.getElementById('q').value.toLowerCase();shown=q?GAMES.filter(g=>g.name.toLowerCase().includes(q)):[...GAMES];render();}
function render(){
  document.getElementById('cnt').textContent=shown.length+' games';
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  shown.forEach((g,i)=>{
    const c=document.createElement('div');
    c.className='card';
    c.style.animationDelay=(i*0.015)+'s';
    c.innerHTML=`<div class="card-icon">${getEmoji(g.name)}</div><div class="card-name">${g.name}</div>`;
    c.onclick=()=>openGame(g);
    grid.appendChild(c);
  });
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
render();
</script>
</body>
</html>
