<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Game Portal — Grenge Prototype Games</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',system-ui,sans-serif;background:#0a0a0f;color:#e8e8f0;min-height:100vh;}
header{padding:20px 24px 16px;border-bottom:1px solid #1a1a2e;}
header h1{font-size:18px;font-weight:600;color:#c8d0ff;letter-spacing:.04em;}
header p{font-size:12px;color:#666;margin-top:4px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:12px;padding:20px 24px;}
.card{background:#10101c;border:1px solid #1a1a2e;border-radius:10px;padding:14px 14px 12px;cursor:pointer;transition:border-color .15s,transform .1s;}
.card:hover{border-color:#4040a0;transform:translateY(-2px);}
.card .ico{font-size:22px;margin-bottom:8px;opacity:.7;}
.card .nm{font-size:12px;font-weight:500;color:#dde;line-height:1.4;}
.card .sz{font-size:11px;color:#556;margin-top:4px;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#0d0d18;border:1px solid #2a2a50;border-radius:14px;width:96vw;max-width:480px;height:92vh;display:flex;flex-direction:column;overflow:hidden;}
.mhead{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid #1a1a2e;flex-shrink:0;}
.mtitle{flex:1;font-size:13px;font-weight:500;color:#dde;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mclose,.mnew{background:none;border:1px solid #2a2a50;border-radius:7px;padding:5px 10px;font-size:12px;cursor:pointer;color:#888;text-decoration:none;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;}
.mclose:hover,.mnew:hover{background:#1a1a2e;color:#ccc;}
iframe{flex:1;border:none;width:100%;background:#000;}
.search{margin:16px 24px 0;position:relative;}
.search input{width:100%;padding:9px 14px;font-size:14px;background:#10101c;border:1px solid #1a1a2e;border-radius:8px;color:#dde;outline:none;}
.search input:focus{border-color:#4040a0;}
.count{font-size:12px;color:#556;margin:10px 24px 0;}
.note{font-size:11px;color:#444;padding:8px 24px;border-top:1px solid #111;margin-top:auto;}
</style>
</head>
<body>
<header>
  <h1>🎮 Game Portal</h1>
  <p>Grenge prototype games — 40 titles</p>
</header>
<div class="search"><input type="text" id="q" placeholder="Search games..." oninput="filter()"></div>
<div class="count" id="cnt"></div>
<div class="grid" id="grid"></div>

<div class="modal-bg" id="mb" onclick="closeMB(event)">
  <div class="modal">
    <div class="mhead">
      <span class="mtitle" id="mt"></span>
      <a class="mnew" id="ml" href="#" target="_blank">↗ 別タブ</a>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <iframe id="gf" src="" allow="autoplay"></iframe>
  </div>
</div>

<script>
const ICONS = ['🎯','⚡','🔥','❄','💎','🏆','🌀','🎲','🔮','🧩','🎪','🚀','🌊','🎭','💥'];
const BASE = 'games/';
const GAMES = [
  {file:"チャージ一閃.html",name:"チャージ一閃",kb:22},
  {file:"連鎖割り雪崩（Chain Pop Avalanche）.html",name:"連鎖割り雪崩",kb:32},
  {file:"カラーホールドトラップ.html",name:"カラーホールドトラップ",kb:31},
  {file:"連鎖落とし4目ローグ（チェイン・ドロップ・ローグ）.html",name:"連鎖落とし4目ローグ",kb:28},
  {file:"元素連鎖反応（Element Chain Reaction）.html",name:"元素連鎖反応",kb:26},
  {file:"グラビティ・テンウェル.html",name:"グラビティ・テンウェル",kb:45},
  {file:"ダイスチャージ・ダンジョン.html",name:"ダイスチャージ・ダンジョン",kb:55},
  {file:"カタカナしりとりソリティア.html",name:"カタカナしりとりソリティア",kb:32},
  {file:"連鎖暴走方程式.html",name:"連鎖暴走方程式",kb:48},
  {file:"コンボシュート.html",name:"コンボシュート",kb:32},
  {file:"崩落ドミノ連鎖.html",name:"崩落ドミノ連鎖",kb:21},
  {file:"磁力4方向4連.html",name:"磁力4方向4連",kb:27},
  {file:"クリスタルレゾナンス（Crystal Resonance）.html",name:"クリスタルレゾナンス",kb:22},
  {file:"花火大輪（HanabiBloom）.html",name:"花火大輪",kb:32},
  {file:"★バースト連鎖リバーシ.html",name:"★バースト連鎖リバーシ",kb:43},
  {file:"磁力ホバー（Magnetic Hover 2048）.html",name:"磁力ホバー",kb:39},
  {file:"方向連鎖パズル.html",name:"方向連鎖パズル",kb:19},
  {file:"紐引きアローソート.html",name:"紐引きアローソート",kb:52},
  {file:"紐引きチェーンパズル（ChainArrow）.html",name:"紐引きチェーンパズル",kb:32},
  {file:"グラビティスマッシュ (GravitySmash).html",name:"グラビティスマッシュ",kb:55},
  {file:"恐竜卵ソート（孵化演出）.html",name:"恐竜卵ソート",kb:36},
  {file:"トリックライン・ワンスワイプ.html",name:"トリックライン・ワンスワイプ",kb:39},
  {file:"ワープ連鎖ソート.html",name:"ワープ連鎖ソート",kb:25},
  {file:"灯台の光集約（Lighthouse Convergence）.html",name:"灯台の光集約",kb:45},
  {file:"Arrow Sort Frozen Chain.html",name:"Arrow Sort Frozen Chain",kb:25},
  {file:"ドラッグ・マージライン（Drag Merge Line）.html",name:"ドラッグ・マージライン",kb:24},
  {file:"おとマシン.html",name:"おとマシン",kb:32},
  {file:"チェーンパンチ道場.html",name:"チェーンパンチ道場",kb:37},
  {file:"ネオン・ワンショット崩落（NeonOneShotCollapse）.html",name:"ネオン・ワンショット崩落",kb:34},
  {file:"トレジャー・ロール（Treasure Roll）.html",name:"トレジャー・ロール",kb:38},
  {file:"Drop 2048（ぽとぽと合体）.html",name:"Drop 2048",kb:29},
  {file:"破裂で飛ばす.html",name:"破裂で飛ばす",kb:23},
  {file:"矢印スタックパズル.html",name:"矢印スタックパズル",kb:70},
  {file:"Arrow Sort Mirror Path.html",name:"Arrow Sort Mirror Path",kb:22},
  {file:"氷滑りソート.html",name:"氷滑りソート",kb:25},
  {file:"重力ルートクラッシュ.html",name:"重力ルートクラッシュ",kb:35},
  {file:"配線タワーディフェンス.html",name:"配線タワーディフェンス",kb:81},
  {file:"カーサバイバー（Car Survivor）.html",name:"カーサバイバー",kb:63},
  {file:"炎の連鎖滝（FlameChainFalls）.html",name:"炎の連鎖滝",kb:19},
  {file:"矢印ドミノ.html",name:"矢印ドミノ",kb:23},
];

let shown = [...GAMES];

function openGame(g) {
  document.getElementById('mt').textContent = g.name;
  document.getElementById('gf').src = BASE + encodeURIComponent(g.file);
  document.getElementById('ml').href = BASE + encodeURIComponent(g.file);
  document.getElementById('mb').classList.add('open');
}
function closeModal() {
  document.getElementById('mb').classList.remove('open');
  document.getElementById('gf').src = '';
}
function closeMB(e) { if(e.target===document.getElementById('mb')) closeModal(); }

function filter() {
  const q = document.getElementById('q').value.toLowerCase();
  shown = GAMES.filter(g => g.name.toLowerCase().includes(q));
  render();
}

function render() {
  document.getElementById('cnt').textContent = shown.length + ' games';
  document.getElementById('grid').innerHTML = shown.map((g,i) =>
    `<div class="card" onclick='openGame(${JSON.stringify(g)})'>
      <div class="ico">${ICONS[GAMES.indexOf(g) % ICONS.length]}</div>
      <div class="nm">${g.name}</div>
      <div class="sz">${g.kb} KB</div>
    </div>`
  ).join('');
}

render();
</script>
</body>
</html>
