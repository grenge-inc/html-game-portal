<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Game Portal — Grenge Prototype Games</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',system-ui,sans-serif;background:#0a0a0f;color:#e8e8f0;min-height:100vh;}
header{padding:20px 24px 16px;border-bottom:1px solid #1a1a2e;}
header h1{font-size:18px;font-weight:600;color:#c8d0ff;letter-spacing:.04em;}
header p{font-size:12px;color:#666;margin-top:4px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;padding:20px 24px;}
.card{background:#10101c;border:1px solid #1a1a2e;border-radius:10px;padding:14px 14px 12px;cursor:pointer;transition:border-color .15s,transform .1s;}
.card:hover{border-color:#4040a0;transform:translateY(-2px);}
.card .ico{font-size:22px;margin-bottom:8px;opacity:.7;}
.card .nm{font-size:13px;font-weight:500;color:#dde;line-height:1.4;}
.card .sz{font-size:11px;color:#556;margin-top:4px;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#0d0d18;border:1px solid #2a2a50;border-radius:14px;width:94vw;max-width:740px;height:90vh;display:flex;flex-direction:column;overflow:hidden;}
.mhead{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #1a1a2e;flex-shrink:0;}
.mtitle{flex:1;font-size:14px;font-weight:500;color:#dde;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mclose,.mnew{background:none;border:1px solid #2a2a50;border-radius:7px;padding:5px 12px;font-size:12px;cursor:pointer;color:#888;text-decoration:none;display:inline-flex;align-items:center;gap:4px;}
.mclose:hover,.mnew:hover{background:#1a1a2e;color:#ccc;}
iframe{flex:1;border:none;width:100%;}
.search{margin:16px 24px 0;position:relative;}
.search input{width:100%;padding:9px 14px;font-size:14px;background:#10101c;border:1px solid #1a1a2e;border-radius:8px;color:#dde;outline:none;}
.search input:focus{border-color:#4040a0;}
.count{font-size:12px;color:#556;margin:10px 24px 0;}
</style>
</head>
<body>
<header>
  <h1>🎮 Game Portal</h1>
  <p>Grenge prototype games — 40 titles</p>
</header>
<div class="search"><input type="text" id="q" placeholder="Search games..." oninput="filter()"></div>
<div class="count" id="cnt"></div>
<div class="grid" id="grid"></div>

<div class="modal-bg" id="mb" onclick="closeMB(event)">
  <div class="modal">
    <div class="mhead">
      <span class="mtitle" id="mt"></span>
      <a class="mnew" id="ml" href="#" target="_blank">↗ New tab</a>
      <button class="mclose" onclick="closeModal()">✕ Close</button>
    </div>
    <iframe id="gf" src="" allow="autoplay"></iframe>
  </div>
</div>

const GAMES = [
  {id:"14KYa9hTN2oyS3HR9z5Sjfp4LG2e1LSmb",name:"チャージ一閃",kb:22},
  {id:"1Gs6HhLxbFafe3EpGziYlOi9fZ_3OTJ3c",name:"連鎖割り雪崩（Chain Pop Avalanche）",kb:32},
  {id:"1HHT5AssPEvon1u1TGW4wF7YlURLrC4hn",name:"カラーホールドトラップ",kb:31},

  {id:"1deliSkKHB6hg4xBung1jNYdwTSCtY9bn",name:"磁力ホバー（Magnetic Hover 2048）",kb:39},
  {id:"1qPNkcIPnkXjTSsxTA6rrp6Q7shrGF0UM",name:"方向連鎖パズル",kb:19},
  {id:"1dwUL2mKAUhpl30V9ZdHppqrt3UJsp_Vq",name:"紐引きアローソート",kb:52},
  {id:"18FfyZPgOyF2ljOFKdbrgGOK8qfHXX8_D",name:"紐引きチェーンパズル（ChainArrow）",kb:32},
  {id:"12enkKulJE_Y1upa3Ha8LpGNEX-WXBkXp",name:"グラビティスマッシュ (GravitySmash)",kb:55},
  {id:"1y4x4P2c_8fMz6oeRyalb09rsbDu0R0sJ",name:"恐竜卵ソート（孵化演出）",kb:36},
  {id:"1Y55KnWWX1QPO0i0QQoQBIvQaY6UURcy9",name:"トリックライン・ワンスワイプ",kb:39},

  {id:"1JVdmgzXAqzxB5JHMAKRM5FQgmrqJPiYq",name:"氷滑りソート",kb:25},
  {id:"1WgCuecAMDR7LP5Zjhde-lqDYpW-EReak",name:"重力ルートクラッシュ",kb:35},
  {id:"1yBAFL-zR2KfDCBBoMk-ndT1wMtjk_-8J",name:"配線タワーディフェンス",kb:81},
  {id:"1WsZ8lDACQXU0O_d7lfyAXhsByiO0788T",name:"カーサバイバー（Car Survivor）",kb:63},
  {id:"1vrMSMdKYOcm4plW1CmEi7N2ku1fK8mOq",name:"炎の連鎖滝（FlameChainFalls）",kb:19},
  {id:"1Pf03Gw51-U8M5P8iDveUhrDDSXFVm4Bp",name:"矢印ドミノ",kb:23},
];

let shown = [...GAMES];

function openGame(g) {
  document.getElementById('mt').textContent = g.name;
  document.getElementById('gf').src = `https://drive.google.com/file/d/${g.id}/preview`;
  document.getElementById('ml').href = `https://drive.google.com/file/d/${g.id}/view`;
  document.getElementById('mb').classList.add('open');
}
function closeModal() {
  document.getElementById('mb').classList.remove('open');
  document.getElementById('gf').src = '';
}
function closeMB(e) { if(e.target===document.getElementById('mb')) closeModal(); }

function filter() {
  const q = document.getElementById('q').value.toLowerCase();
  shown = GAMES.filter(g => g.name.toLowerCase().includes(q));
  render();
}

function render() {
  document.getElementById('cnt').textContent = shown.length + ' games';
  document.getElementById('grid').innerHTML = shown.map((g,i) =>
    `<div class="card" onclick='openGame(${JSON.stringify(g)})'>
      <div class="ico">${ICONS[GAMES.indexOf(g) % ICONS.length]}</div>
      <div class="nm">${g.name}</div>
      <div class="sz">${g.kb} KB</div>
    </div>`
  ).join('');
}

render();
</script>
</body>
</html>
