          download_game "矢印ドミノ.html" "1Pf03Gw51-U8M5P8iDveUhrDDSXFVm4Bp"
          
          # Check what we got
          echo "--- Downloaded files ---"
          for f in games/*.html; do
            echo "$(wc -c < "$f") bytes: $f"
          done
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add games/
          git diff --staged --quiet || git commit -m "Auto-fetch: update game files from Drive [$(date -u +%Y-%m-%d)]"
          git push
