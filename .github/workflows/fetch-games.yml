name: Fetch games from Google Drive
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Download games from Drive
        run: |
          mkdir -p games
          
          download_game() {
            local name="$1"
            local id="$2"
            echo "Downloading: $name"
            # Try direct download first, follow redirects
            curl -sL "https://drive.google.com/uc?export=download&id=${id}&confirm=t" \
              -o "games/${name}" \
              --max-time 30 || echo "FAILED: $name"
          }
          
          download_game "チャージ一閃.html" "14KYa9hTN2oyS3HR9z5Sjfp4LG2e1LSmb"
          download_game "連鎖割り雪崩（Chain Pop Avalanche）.html" "1Gs6HhLxbFafe3EpGziYlOi9fZ_3OTJ3c"
          download_game "カラーホールドトラップ.html" "1HHT5AssPEvon1u1TGW4wF7YlURLrC4hn"
          download_game "連鎖落とし4目ローグ（チェイン・ドロップ・ローグ）.html" "1H5cvwtGUJmxc6Bnt4v4Ago24WW3uSZUC"
          download_game "元素連鎖反応（Element Chain Reaction）.html" "1BABhOb_g-6eM4ju3hgMWU4QHkA4LGfvw"
