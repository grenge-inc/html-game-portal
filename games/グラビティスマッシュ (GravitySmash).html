<!DOCTYPE html>
<!--
  Phone frame template for hybrid-casual-mentor generated games.
  Aspect ratio: 9:19.5 (iPhone X 系縦長, NEONNOVA2048 基準)。
  PC で開いても常にこの比率を保ち、letterbox（左右黒帯）で中央表示。
  すべてのゲーム要素は #phone の子として配置すること。
-->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>グラビティスマッシュ</title>
<style>
  :root {
    --phone-aspect: 9 / 19.5; /* スマホ縦長基準 (iPhone X 以降) */
    /* === カラートークン（盤面・HUD・エフェクト共通） === */
    --bg-deep:   #02030a;
    --bg-mid:    #0a1430;
    --bg-core:   #161a4a;
    --bg-panel:  #06081a;
    --line:      #1a2848;
    --cyan:      #6ff;
    --cyan-soft: #8df;
    --cyan-grad1:#3df;
    --cyan-grad2:#06a;
    --warn:      #ffb86c;
    --text-main: #eaf3ff;
    --text-sub:  #cdddef;
    --text-dim:  #7a92b5;
    --glass:     #8df;
    --glass-glow:#6ff;
    --rock:      #b8a070;
    --rock-glow: #ffb86c;
    --rock-deep: #5a4020;
    --spike:     #ff5d8a;
    --spike-core:#ffd1de;
    --boss:      #ff3d6e;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html, body {
    width:100%; height:100%;
    overflow:hidden;
    background:#000;            /* letterbox 部分の色 */
    color:var(--text-main);
    font-family:'Helvetica Neue', system-ui, sans-serif;
    user-select:none;
    -webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
  }
  body {
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #phone {
    position:relative;
    overflow:hidden;
    /* 画面に収まる最大の 9:19.5 矩形 */
    width:  min(100vw, calc(100vh * 9 / 19.5));
    height: min(100vh, calc(100vw * 19.5 / 9));
    --pw:   min(100vw, calc(100vh * 9 / 19.5));
    --ph:   min(100vh, calc(100vw * 19.5 / 9));
    --u:    calc(var(--pw) / 100); /* 1u  = phone 幅 1% */
    --uh:   calc(var(--ph) / 100); /* 1uh = phone 高 1% */
    /* 深色 radial グラデ背景（中心輝度高→外周深色） */
    background:
      radial-gradient(120% 80% at 50% 35%, var(--bg-core) 0%, var(--bg-mid) 38%, var(--bg-deep) 100%);
  }
  /* 環境演出：グリッドレイヤー */
  #grid {
    position:absolute; inset:0;
    pointer-events:none; z-index:0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: calc(var(--u)*12) calc(var(--u)*12);
    opacity:0.18;
    mask-image: radial-gradient(80% 70% at 50% 45%, #000 30%, transparent 100%);
    -webkit-mask-image: radial-gradient(80% 70% at 50% 45%, #000 30%, transparent 100%);
  }
  /* 重力方向背景レイヤー */
  #gravity-bg {
    position:absolute; inset:0;
    pointer-events:none; z-index:0;
    transition: background 0.3s ease;
  }
  canvas {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    display:block;
    z-index:1;
  }
  #hud {
    position:absolute;
    top:0; left:0; right:0;
    height: calc(var(--uh) * 9);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: calc(var(--uh)*2) calc(var(--u) * 4) 0;
    pointer-events:none;
    z-index:10;
  }
  #stage-label {
    font-size: calc(var(--u) * 4.6);
    font-weight:800;
    letter-spacing:0.14em;
    font-variant-numeric:tabular-nums;
    padding: calc(var(--uh)*0.9) calc(var(--u)*3.4);
    border-radius: calc(var(--u)*2);
    background: linear-gradient(135deg, rgba(102,255,255,0.16), rgba(6,8,26,0.5));
    border:1px solid rgba(102,255,255,0.4);
    color:var(--text-main);
    box-shadow:0 0 calc(var(--u)*2) rgba(102,255,255,0.3);
  }
  /* ステージゴールバッジ */
  #goal-badge {
    font-size: calc(var(--u) * 3.1);
    font-weight:700;
    letter-spacing:0.06em;
    text-align:right;
    padding: calc(var(--uh)*0.8) calc(var(--u)*2.6);
    border-radius: calc(var(--u)*2);
    background: rgba(6,8,26,0.55);
    border:1px solid var(--line);
    color:var(--cyan-soft);
    max-width: calc(var(--u)*46);
    line-height:1.25;
  }
  #modal {
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(80% 60% at 50% 42%, rgba(22,26,74,0.6) 0%, rgba(2,3,10,0.92) 70%);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    z-index:20;
  }
  #modal.hidden { display:none; }
  #modal-title {
    font-size: calc(var(--u) * 11);
    font-weight:900;
    line-height:1.04;
    text-align:center;
    letter-spacing:0.04em;
    background: linear-gradient(180deg, var(--cyan-soft) 0%, var(--cyan) 45%, var(--cyan-grad2) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    filter: drop-shadow(0 0 calc(var(--u)*2.5) rgba(102,255,255,0.55));
    margin-bottom: calc(var(--uh)*2.5);
  }
  /* GAME OVER バリアント（警告色） */
  #modal.over #modal-title {
    background: linear-gradient(180deg, var(--spike-core) 0%, var(--spike) 60%, var(--boss,#ff3d6e) 100%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    filter: drop-shadow(0 0 calc(var(--u)*2.5) rgba(255,93,138,0.55));
  }
  #modal.over #modal-btn {
    background: linear-gradient(135deg, var(--spike) 0%, var(--warn) 100%);
    box-shadow:0 0 calc(var(--u)*4) rgba(255,93,138,0.5);
  }
  #modal-sub {
    font-size: calc(var(--u) * 4.2);
    color:var(--text-sub);
    margin-bottom: calc(var(--uh)*5);
    text-align:center;
    line-height:1.65;
    padding: 0 calc(var(--u)*8);
  }
  #modal-btn {
    padding: calc(var(--uh)*2) calc(var(--u)*12);
    font-size: calc(var(--u)*5);
    font-weight:800;
    letter-spacing:0.1em;
    color:var(--bg-deep);
    background: linear-gradient(135deg, var(--cyan) 0%, var(--cyan-grad1) 100%);
    border:none;
    border-radius: calc(var(--u)*3);
    cursor:pointer;
    box-shadow:0 0 calc(var(--u)*4) rgba(102,255,255,0.5);
  }
  #modal-btn:active { transform:scale(0.96); opacity:0.9; }
  #swipe-guide {
    position:absolute;
    bottom: calc(var(--uh)*20);
    left:0; right:0;
    text-align:center;
    font-size: calc(var(--u)*3.5);
    color:var(--text-dim);
    pointer-events:none;
    z-index:5;
    animation: pulseHint 1.8s ease-in-out infinite;
  }
  @keyframes pulseHint { 0%,100%{opacity:0.45;} 50%{opacity:1;} }

  /* === 方向ボタン（4方向） === */
  #dir-btns {
    position:absolute;
    bottom: calc(var(--uh)*1.5);
    left:0; right:0;
    height: calc(var(--uh)*16);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:10;
    pointer-events:none;
  }
  .dir-btn-wrap {
    position:relative;
    width: calc(var(--u)*38);
    height: calc(var(--u)*38);
    pointer-events:all;
  }
  .dir-btn {
    position:absolute;
    display:flex;
    align-items:center;
    justify-content:center;
    width: calc(var(--u)*13);
    height: calc(var(--u)*13);
    font-size: calc(var(--u)*6.5);
    border-radius: calc(var(--u)*2.5);
    background: rgba(6,8,26,0.72);
    border: 1.5px solid rgba(102,255,255,0.35);
    color: var(--cyan-soft);
    cursor: pointer;
    user-select:none;
    -webkit-user-select:none;
    transition: background 0.12s, box-shadow 0.12s, transform 0.08s;
    box-shadow: 0 0 calc(var(--u)*1.5) rgba(102,255,255,0.18);
    touch-action:none;
  }
  .dir-btn:active,
  .dir-btn.pressed {
    background: rgba(102,255,255,0.22);
    box-shadow: 0 0 calc(var(--u)*3) rgba(102,255,255,0.55);
    transform: scale(0.93);
  }
  /* 上 */
  #btn-up   { top:0;    left:50%; transform:translateX(-50%); }
  /* 下 */
  #btn-down { bottom:0; left:50%; transform:translateX(-50%); }
  /* 左 */
  #btn-left { top:50%;  left:0;   transform:translateY(-50%); }
  /* 右 */
  #btn-right{ top:50%;  right:0;  transform:translateY(-50%); }
  /* 中央マーカー */
  .dir-center {
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    width: calc(var(--u)*5);
    height: calc(var(--u)*5);
    border-radius:50%;
    background: rgba(102,255,255,0.10);
    border:1px solid rgba(102,255,255,0.20);
    pointer-events:none;
  }
</style>
</head>
<body>
  <div id="phone">
    <div id="gravity-bg"></div>
    <div id="grid"></div>
    <canvas id="gc"></canvas>
    <div id="hud">
      <div id="stage-label">STAGE 1</div>
      <div id="goal-badge">操作理解＋コア体験</div>
    </div>
    <div id="swipe-guide">ドラッグ or ボタンで重力方向を変える</div>

    <!-- 4方向操作ボタン -->
    <div id="dir-btns">
      <div class="dir-btn-wrap">
        <button class="dir-btn" id="btn-up"    data-dx="0"  data-dy="-1">↑</button>
        <button class="dir-btn" id="btn-down"  data-dx="0"  data-dy="1" >↓</button>
        <button class="dir-btn" id="btn-left"  data-dx="-1" data-dy="0" >←</button>
        <button class="dir-btn" id="btn-right" data-dx="1"  data-dy="0" >→</button>
        <div class="dir-center"></div>
      </div>
    </div>

    <div id="modal">
      <div id="modal-title">GRAVITY<br>SMASH</div>
      <div id="modal-sub">ドラッグ or ボタンで重力を操り<br>全オブジェクトを破壊せよ！</div>
      <button id="modal-btn">START</button>
    </div>
  </div>
  <script>
  (function(){
    'use strict';

    /* === カラートークン（CSS :root 変数から取得・一元管理） === */
    const _rs = getComputedStyle(document.documentElement);
    const _v  = (n, fb)=>{ const x=_rs.getPropertyValue(n).trim(); return x||fb; };
    const C = {
      bg:       _v('--bg-mid',    '#0a1430'),
      bgDeep:   _v('--bg-deep',   '#02030a'),
      cyan:     _v('--cyan',      '#6ff'),
      cyanSoft: _v('--cyan-soft', '#8df'),
      warn:     _v('--warn',      '#ffb86c'),
      textMain: _v('--text-main', '#eaf3ff'),
      textSub:  _v('--text-sub',  '#cdddef'),
      textDim:  _v('--text-dim',  '#7a92b5'),
      glass:    _v('--glass',     '#8df'),
      glassGlow:_v('--glass-glow','#6ff'),
      rock:     _v('--rock',      '#b8a070'),
      rockGlow: _v('--rock-glow', '#ffb86c'),
      rockDeep: _v('--rock-deep', '#5a4020'),
      spike:    _v('--spike',     '#ff5d8a'),
      spikeCore:_v('--spike-core','#ffd1de'),
      goalGlow: _v('--cyan',      '#6ff'),
      particle: _v('--text-main', '#fff'),
    };
    // #rgb / #rrggbb → 'r,g,b'
    function hexRGB(h){
      h=h.replace('#','');
      if(h.length===3) h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
      const n=parseInt(h,16);
      return ((n>>16)&255)+','+((n>>8)&255)+','+(n&255);
    }
    const RGB = {
      white: hexRGB(C.textMain),
      glass: hexRGB(C.glassGlow),  // #6ff
      glassDeep: hexRGB(_v('--cyan-grad1','#3df')),
      spike: hexRGB(C.spike),
    };

    /* === DOM === */
    const phone   = document.getElementById('phone');
    const gravBg  = document.getElementById('gravity-bg');
    const canvas  = document.getElementById('gc');
    const ctx     = canvas.getContext('2d');
    const hudLabel= document.getElementById('stage-label');
    const goalBadge=document.getElementById('goal-badge');
    const modal   = document.getElementById('modal');
    const mTitle  = document.getElementById('modal-title');
    const mSub    = document.getElementById('modal-sub');
    const mBtn    = document.getElementById('modal-btn');
    const guide   = document.getElementById('swipe-guide');
    const dirBtns = document.getElementById('dir-btns');

    /* === サイズ === */
    let PW, PH;
    function resize(){
      const r = phone.getBoundingClientRect();
      PW = r.width; PH = r.height;
      canvas.width  = PW;
      canvas.height = PH;
    }
    resize();
    window.addEventListener('resize', ()=>{ resize(); });

    /* === 環境演出：星 === */
    const stars = [];
    for(let i=0;i<28;i++){
      stars.push({ x:Math.random(), y:Math.random(), r:0.4+Math.random()*1.4, ph:Math.random()*Math.PI*2, sp:0.6+Math.random()*1.6 });
    }
    function drawStars(){
      const t = Date.now()/1000;
      ctx.save();
      for(const s of stars){
        const tw = 0.35 + 0.45*(0.5+0.5*Math.sin(t*s.sp + s.ph));
        ctx.globalAlpha = tw;
        ctx.fillStyle = C.cyanSoft;
        ctx.beginPath();
        ctx.arc(s.x*PW, s.y*PH, s.r, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    }

    /* =====================================================
       重力方向背景可視化システム（A. 強化版）
       ===================================================== */

    // 重力の方向を文字列で管理
    let gravDir = 'none'; // 'up'|'down'|'left'|'right'|'none'
    let gravDirPrev = 'none';
    let gravFlashTime = 0; // 重力切り替え時のフラッシュタイマー
    // A. フラッシュ持続を 0.40s に変更（旧 0.35s）
    const GRAV_FLASH_DUR = 0.40;

    // 流れるストリーク粒子（重力方向を示す）
    // A. ストリーク本数 40 本に変更（旧 22 本）
    const gravStreaks = [];
    const STREAK_COUNT = 40;
    function initStreaks(){
      gravStreaks.length = 0;
      for(let i=0;i<STREAK_COUNT;i++){
        gravStreaks.push(newStreak(true));
      }
    }
    function newStreak(randomize){
      return {
        x: Math.random(),
        y: Math.random(),
        len: 0.07 + Math.random()*0.11,
        speed: 0.25 + Math.random()*0.30,
        alpha: 0.45 + Math.random()*0.45,
        phase: randomize ? Math.random()*Math.PI*2 : 0,
      };
    }
    function resetStreak(s){
      // 重力方向の逆端（画面外）から再生成
      if(gravDir==='down'){  s.x=Math.random(); s.y=0; }
      else if(gravDir==='up'){  s.x=Math.random(); s.y=1; }
      else if(gravDir==='right'){ s.x=0; s.y=Math.random(); }
      else if(gravDir==='left'){  s.x=1; s.y=Math.random(); }
      else { s.x=Math.random(); s.y=Math.random(); }
      s.len   = 0.07 + Math.random()*0.11;
      s.speed = 0.25 + Math.random()*0.30;
      s.alpha = 0.45 + Math.random()*0.45;
      s.phase = 0;
    }
    initStreaks();

    // 重力方向ごとの背景カラーテーマ
    const GRAV_THEME = {
      down:  { col1:'#001a4a', col2:'#002266', accent:'#4488ff', dir:[0,1]  },
      up:    { col1:'#1a0030', col2:'#3a0066', accent:'#cc66ff', dir:[0,-1] },
      left:  { col1:'#1a1000', col2:'#332200', accent:'#ffaa22', dir:[-1,0] },
      right: { col1:'#001a10', col2:'#003322', accent:'#22ffaa', dir:[1,0]  },
      none:  { col1:'#02030a', col2:'#0a1430', accent:'#6ff',    dir:[0,0]  },
    };

    // 背景グラデーション CSS を重力方向で変更
    function updateGravBg(){
      if(gravDir === 'none'){
        gravBg.style.background = 'transparent';
        return;
      }
      const th = GRAV_THEME[gravDir];
      const dirMap = {
        down:  'to bottom',
        up:    'to top',
        left:  'to left',
        right: 'to right',
      };
      const dirStr = dirMap[gravDir] || 'to bottom';
      gravBg.style.background =
        `linear-gradient(${dirStr}, ${th.col1} 0%, ${th.col2} 40%, transparent 100%)`;
      gravBg.style.opacity = '0.7';
    }

    // Canvas 上で重力方向ストリーク＋矢印を描画（背景レイヤー）
    function drawGravityBg(dt){
      if(gravDir === 'none') return;
      const th = GRAV_THEME[gravDir];
      const [dx, dy] = th.dir;

      // A. フラッシュエフェクト（最大 alpha 0.55 に変更）
      if(gravFlashTime > 0){
        const flashAlpha = (gravFlashTime / GRAV_FLASH_DUR) * 0.55;
        ctx.save();
        ctx.globalAlpha = flashAlpha;
        ctx.fillStyle = th.accent;
        ctx.fillRect(0, 0, PW, PH);
        ctx.restore();
        gravFlashTime = Math.max(0, gravFlashTime - dt);
      }

      // A. ストリーク（流れる粒子線）の更新・描画
      ctx.save();
      for(const s of gravStreaks){
        // 位置更新（重力方向へ移動）
        s.x += dx * s.speed * dt;
        s.y += dy * s.speed * dt;
        // 画面外に出たらリセット
        if(s.x < -0.15 || s.x > 1.15 || s.y < -0.15 || s.y > 1.15){
          resetStreak(s);
          continue;
        }
        // 描画
        const px = s.x * PW;
        const py = s.y * PH;
        const lx = -dx * s.len * Math.min(PW, PH);
        const ly = -dy * s.len * Math.min(PW, PH);
        const grd = ctx.createLinearGradient(px-lx, py-ly, px, py);
        grd.addColorStop(0, 'rgba(0,0,0,0)');
        grd.addColorStop(1, th.accent);
        ctx.globalAlpha = s.alpha * 0.85;
        ctx.strokeStyle = grd;
        ctx.lineWidth = 3.5 + Math.sin(s.phase + Date.now()*0.001) * 1.5;
        ctx.beginPath();
        ctx.moveTo(px - lx, py - ly);
        ctx.lineTo(px, py);
        ctx.stroke();
      }
      ctx.restore();

      // 中央に重力方向矢印（大きく薄く）
      drawGravArrow(dx, dy, th.accent);

      // A. 画面端インジケータ（新規）
      drawGravEdgeIndicator(dx, dy, th.accent);
    }

    // A. 中央矢印（サイズ・pulse 強化）
    function drawGravArrow(dx, dy, col){
      const cx = PW * 0.5;
      const cy = PH * 0.5;
      const size = Math.min(PW, PH) * 0.32;
      const t = Date.now()/1000;
      const pulse = 0.28 + 0.16*Math.sin(t*3.0);

      ctx.save();
      ctx.globalAlpha = pulse;
      ctx.fillStyle = col;
      ctx.shadowColor = col;
      ctx.shadowBlur = 60;

      // 矢印（三角形）
      const ax = cx + dx * size * 0.6;
      const ay = cy + dy * size * 0.6;
      // 矢印の先端
      const tipX = cx + dx * size;
      const tipY = cy + dy * size;
      // 矢印のテール
      const tailX = cx - dx * size * 0.4;
      const tailY = cy - dy * size * 0.4;
      // 横方向（直交）
      const perpX = -dy * size * 0.35;
      const perpY =  dx * size * 0.35;

      ctx.beginPath();
      ctx.moveTo(tipX, tipY);
      ctx.lineTo(ax + perpX, ay + perpY);
      ctx.lineTo(ax - perpX, ay - perpY);
      ctx.closePath();
      ctx.fill();

      // シャフト（矩形）
      ctx.globalAlpha = pulse * 0.6;
      ctx.fillRect(
        tailX + perpX*0.4, tailY + perpY*0.4,
        (ax - tailX) - perpX*0.4 + (-dy)*Math.abs(perpX)*0.4,
        (ay - tailY) - perpY*0.4 + ( dx)*Math.abs(perpY)*0.4
      );

      ctx.restore();
    }

    // A. 画面端インジケータ（新規関数）
    // 重力方向の先端壁中央に三角形マーカー＋グロー帯を描画
    function drawGravEdgeIndicator(dx, dy, accent){
      const t = Date.now()/1000;
      const markerAlpha = 0.55 + 0.25*Math.sin(t*3.5);

      ctx.save();
      ctx.fillStyle = accent;
      ctx.shadowColor = accent;
      ctx.shadowBlur = 20;

      if(dy !== 0){
        // 縦方向（上 or 下）
        const triSize = PW * 0.10;
        // グロー帯
        ctx.globalAlpha = 0.25;
        ctx.shadowBlur = 0;
        const bandH = PH * 0.03;
        const bandW = PW * 0.4;
        const bandX = PW * 0.5 - bandW * 0.5;
        if(dy > 0){
          // 下重力：下端にマーカー
          ctx.fillRect(bandX, PH - bandH, bandW, bandH);
          ctx.shadowBlur = 20;
          ctx.globalAlpha = markerAlpha;
          const markerY = PH - PH*0.015;
          // 下向き三角
          ctx.beginPath();
          ctx.moveTo(PW*0.5 - triSize*0.5, markerY - triSize*0.9);
          ctx.lineTo(PW*0.5 + triSize*0.5, markerY - triSize*0.9);
          ctx.lineTo(PW*0.5, markerY);
          ctx.closePath();
          ctx.fill();
        } else {
          // 上重力：上端にマーカー
          ctx.fillRect(bandX, 0, bandW, bandH);
          ctx.shadowBlur = 20;
          ctx.globalAlpha = markerAlpha;
          const markerY = PH * 0.015;
          // 上向き三角
          ctx.beginPath();
          ctx.moveTo(PW*0.5 - triSize*0.5, markerY + triSize*0.9);
          ctx.lineTo(PW*0.5 + triSize*0.5, markerY + triSize*0.9);
          ctx.lineTo(PW*0.5, markerY);
          ctx.closePath();
          ctx.fill();
        }
      } else if(dx !== 0){
        // 横方向（左 or 右）
        const triSize = PH * 0.10;
        // グロー帯
        ctx.globalAlpha = 0.25;
        ctx.shadowBlur = 0;
        const bandW = PW * 0.03;
        const bandH = PH * 0.4;
        const bandY = PH * 0.5 - bandH * 0.5;
        if(dx > 0){
          // 右重力：右端にマーカー
          ctx.fillRect(PW - bandW, bandY, bandW, bandH);
          ctx.shadowBlur = 20;
          ctx.globalAlpha = markerAlpha;
          const markerX = PW - PW*0.015;
          // 右向き三角
          ctx.beginPath();
          ctx.moveTo(markerX - triSize*0.9, PH*0.5 - triSize*0.5);
          ctx.lineTo(markerX - triSize*0.9, PH*0.5 + triSize*0.5);
          ctx.lineTo(markerX, PH*0.5);
          ctx.closePath();
          ctx.fill();
        } else {
          // 左重力：左端にマーカー
          ctx.fillRect(0, bandY, bandW, bandH);
          ctx.shadowBlur = 20;
          ctx.globalAlpha = markerAlpha;
          const markerX = PW * 0.015;
          // 左向き三角
          ctx.beginPath();
          ctx.moveTo(markerX + triSize*0.9, PH*0.5 - triSize*0.5);
          ctx.lineTo(markerX + triSize*0.9, PH*0.5 + triSize*0.5);
          ctx.lineTo(markerX, PH*0.5);
          ctx.closePath();
          ctx.fill();
        }
      }

      ctx.restore();
    }

    /* =====================================================
       ゲーム状態
       ===================================================== */
    const STATE = { TITLE:0, PLAYING:1, CLEAR:2, GAMEOVER:3, NEXTREADY:4, ALLCLEAR:5 };
    let state = STATE.TITLE;
    let stage = 0; // 0=St1 ... 6=St7
    let objects = [];
    let particles = [];
    let gravity = { x:0, y:0 };
    let shakeTime = 0;
    let shakeAmp  = 0;
    let goalFaces = [];

    /* === 物理定数（ゆるやか化：加速度半減・最大速度低下・減衰強化） === */
    const G_ACCEL    = 400;   // 旧 800 → 400（半減でゆるやかな加速）
    const MAX_SPEED  = 450;   // 旧 700 → 450（速度上限を緩める）
    const BOUNCE     = 0.60;  // 旧 0.75 → 0.60（非ゴール壁の減衰強化）
    const GOAL_BOUNCE= 0.1;

    /* === 素材定義（必要衝突速度も調整済み） === */
    const MAT = {
      glass: { label:'ガラス', needV:80,  color:C.glass,   glow:C.glassGlow, r:0.06, icon:'💎', hp:1 },
      rock:  { label:'岩',     needV:180, color:C.rock,    glow:C.rockGlow,  r:0.07, icon:'🪨', hp:2 },
    };

    /* =====================================================
       7ステージデータ
       ===================================================== */
    const STAGES = [
      // ── St1: 操作習得＋コア体験（1手）──
      {
        name:'St1 - 操作習得',
        goal:'操作理解＋コア体験',
        goalFaces:[{side:'bottom', matType:null}],
        objects:[
          {mat:'glass', x:0.25, y:0.40},
          {mat:'glass', x:0.50, y:0.35},
          {mat:'glass', x:0.75, y:0.45},
        ],
        spikes:[],
      },
      // ── St2: ゴール面分離（2手）──
      {
        name:'St2 - ゴール面分離',
        goal:'素材別ゴール面を理解',
        goalFaces:[
          {side:'right',  matType:'glass'},
          {side:'bottom', matType:'rock'},
        ],
        objects:[
          {mat:'glass', x:0.20, y:0.35},
          {mat:'glass', x:0.20, y:0.65},
          {mat:'rock',  x:0.55, y:0.50},
        ],
        spikes:[],
      },
      // ── St3: 岩2ヒット＋天井スパイク（3手）──
      {
        name:'St3 - スパイク回避',
        goal:'天井を避けて岩を2回叩け',
        goalFaces:[
          {side:'bottom', matType:'glass'},
          {side:'left',   matType:'rock'},
        ],
        objects:[
          {mat:'glass', x:0.70, y:0.40},
          {mat:'rock',  x:0.30, y:0.35},
          {mat:'rock',  x:0.60, y:0.65},
        ],
        spikes:[{side:'top'}],
      },
      // ── St4: 複合ゴール＋左右スパイク（4〜5手）──
      {
        name:'St4 - 複合ゴール',
        goal:'ゴール面を組み合わせて攻略',
        goalFaces:[
          {side:'top',   matType:'glass'},
          {side:'right', matType:'rock'},
        ],
        objects:[
          {mat:'glass', x:0.30, y:0.60},
          {mat:'glass', x:0.70, y:0.55},
          {mat:'rock',  x:0.20, y:0.30},
        ],
        spikes:[{side:'left'}],
      },
      // ── St5: 全素材複合・最適化（5〜7手）──
      {
        name:'St5 - マスターチャレンジ',
        goal:'全素材を最適手順で破壊',
        goalFaces:[
          {side:'left',   matType:'glass'},
          {side:'bottom', matType:'rock'},
        ],
        objects:[
          {mat:'glass', x:0.65, y:0.30},
          {mat:'glass', x:0.75, y:0.60},
          {mat:'rock',  x:0.30, y:0.35},
          {mat:'rock',  x:0.50, y:0.60},
        ],
        spikes:[{side:'right'}, {side:'top'}],
      },
      // ── St6: 道中スパイク（最短4手）──
      {
        name:'St6 - 道中スパイク',
        goal:'針の壁を縫って全破壊せよ',
        goalFaces:[
          {side:'top',    matType:'glass'},
          {side:'bottom', matType:'rock'},
        ],
        objects:[
          {mat:'glass', x:0.22, y:0.42},
          {mat:'glass', x:0.28, y:0.65},
          {mat:'rock',  x:0.68, y:0.38},
          {mat:'rock',  x:0.75, y:0.60},
        ],
        spikes:[
          {side:'right'},
          {mid:true, dir:'v', face:'left', x:0.47, y:0.25, w:0.06, h:0.50},
        ],
      },
      // ── St7: 移動障害物（4〜7手）──
      // コンセプト: 左右に往復移動する針壁ブロックを避けながら重力切替でオブジェを導く
      // ゴール面: 左壁（ガラス専用）、下壁（岩専用）
      // 障害物: 天井スパイク（全幅）+ 移動する縦針帯（x軸往復, 中下段限定 y:0.42〜0.88）
      //
      // 【配置設計】
      //   ガラスA/B: y:0.16, 0.22（上段）→ 障害物y:0.42〜0.88の外なのでx移動時に交差しない
      //   岩C/D: x:0.78, 0.80（障害物x範囲 rangeMax+w=0.69 の右外）→ ↓操作時に干渉しない
      //
      // 【最短攻略手順 4〜5手（タイミング要素あり）】
      //   1. →スワイプ: ガラスA/Bが上段(y≈0.16/0.22)を水平移動→右壁バウンス→中央へ
      //      ※障害物y:0.42以下なのでガラス上段は安全通過
      //   2. タイミング待ち（移動障害物が右端 x>0.55 に寄った瞬間）
      //   3. ←スワイプ: ガラスが左壁ゴールへ到達→破壊 ✅（障害物が右端にいる間に通過）
      //   4. ↓スワイプ: 岩C/Dが下壁ゴールへ1ヒット（速度450 > 180）→ひび・跳ね返り
      //   5. ↓スワイプ: 岩が再落下→下壁2ヒット→完全破壊 ✅
      //   ※最短4手クリア（タイミング次第で→省略して←直接が可能）
      {
        name:'St7 - 移動障害物',
        goal:'動く針壁のタイミングを計れ',
        goalFaces:[
          {side:'left',   matType:'glass'},
          {side:'bottom', matType:'rock'},
        ],
        objects:[
          {mat:'glass', x:0.20, y:0.16},
          {mat:'glass', x:0.20, y:0.22},
          {mat:'rock',  x:0.78, y:0.52},
          {mat:'rock',  x:0.80, y:0.65},
        ],
        spikes:[
          {side:'top'},
          // 移動する縦針帯: moving=true, axis='h'（水平往復）
          // y:0.42〜0.88（中下段限定）にすることでガラス上段(y<0.40)が安全通過
          // 岩x:0.78〜0.80 は rangeMax+w=0.69 より右なので↓操作時に干渉しない
          {
            mid:true, dir:'v', face:'left',
            x:0.38, y:0.42, w:0.07, h:0.46,
            moving:true, axis:'h',
            baseX:0.38, rangeMin:0.28, rangeMax:0.62,
            speed:0.18, // 1秒あたり画面幅の0.18分移動
            moveDir:1,  // 現在の移動方向（1=右, -1=左）
          },
        ],
      },
    ];

    /* === ステージ初期化 === */
    function initStage(idx){
      const sd = STAGES[idx];
      goalFaces = sd.goalFaces;
      objects = sd.objects.map(o=>{
        const m = MAT[o.mat];
        return {
          mat:  o.mat,
          x:    o.x * PW,
          y:    o.y * PH,
          vx:   0,
          vy:   0,
          r:    m.r * Math.min(PW, PH),
          hp:   m.hp,
          broken: false,
          cracked: false,
          trailX: [], trailY:[],
        };
      });
      particles = [];
      gravity = {x:0, y:0};
      gravDir = 'none';
      gravDirPrev = 'none';
      gravFlashTime = 0;
      updateGravBg();
      shakeTime = 0;
      hudLabel.textContent = 'STAGE '+(idx+1);
      goalBadge.textContent = sd.goal || '';
      guide.style.display = '';
      // ボタン表示（プレイ中は常に表示）
      dirBtns.style.display = 'flex';

      // 移動障害物の初期位置をリセット
      if(sd.spikes){
        for(const sp of sd.spikes){
          if(sp.moving && sp.axis === 'h'){
            sp.x = sp.baseX;
            sp.moveDir = 1;
          }
        }
      }
    }

    /* === 重力方向の設定 === */
    function setGravity(dx, dy){
      gravity.x = dx * G_ACCEL;
      gravity.y = dy * G_ACCEL;

      // 重力方向文字列を更新
      let newDir = 'none';
      if(dx === 1)  newDir = 'right';
      if(dx === -1) newDir = 'left';
      if(dy === 1)  newDir = 'down';
      if(dy === -1) newDir = 'up';

      if(newDir !== gravDir){
        gravDirPrev = gravDir;
        gravDir = newDir;
        gravFlashTime = GRAV_FLASH_DUR;
        updateGravBg();
        // ストリーク粒子を新しい方向でリセット
        for(const s of gravStreaks) resetStreak(s);
      }
    }

    /* === ゴール面判定 === */
    function isGoalFace(side, matType){
      for(const gf of goalFaces){
        if(gf.side === side){
          if(gf.matType === null || gf.matType === matType) return true;
        }
      }
      return false;
    }

    /* === スパイク側面判定ヘルパー === */
    function spikeOnSide(side){
      const sd = STAGES[stage];
      return sd.spikes && sd.spikes.some(s=>s.side===side);
    }

    /* === B. 道中針壁ロスト判定（移動障害物対応） === */
    function checkMidSpikeCollision(obj){
      const sd = STAGES[stage];
      if(!sd.spikes) return false;
      const midSpikes = sd.spikes.filter(s=>s.mid);
      for(const sp of midSpikes){
        // 移動障害物は sp.x が毎フレーム更新済みの現在位置
        const sx  = sp.x  * PW;
        const sy  = sp.y  * PH;
        const sw  = sp.w  * PW;
        const sh  = sp.h  * PH;
        // AABB オーバーラップ判定
        if(obj.x + obj.r > sx && obj.x - obj.r < sx + sw &&
           obj.y + obj.r > sy && obj.y - obj.r < sy + sh){
          // ロスト処理（壁スパイクと同じ）
          obj.broken = true; obj.lost = true;
          spawnParticles(obj.x, obj.y, 10, C.spike);
          spawnParticles(obj.x, obj.y, 5, C.spikeCore);
          shakeTime = 0.25; shakeAmp = 6;
          return true;
        }
      }
      return false;
    }

    /* === 衝突&破壊判定 === */
    function checkWallCollision(obj){
      // B. 道中針壁を先にチェック
      if(checkMidSpikeCollision(obj)) return;

      // 天井
      if(obj.y - obj.r < 0){
        if(spikeOnSide('top')){
          obj.broken = true; obj.lost = true;
          spawnParticles(obj.x, obj.y, 10, C.spike);
          spawnParticles(obj.x, obj.y, 5, C.spikeCore);
          shakeTime = 0.25; shakeAmp = 6;
          return;
        }
        obj.y = obj.r;
        if(isGoalFace('top', obj.mat)){
          handleGoalHit(obj, Math.abs(obj.vy), 'top');
        } else {
          obj.vy = Math.abs(obj.vy) * BOUNCE;
        }
      }
      // 床
      if(obj.y + obj.r > PH){
        obj.y = PH - obj.r;
        if(isGoalFace('bottom', obj.mat)){
          handleGoalHit(obj, Math.abs(obj.vy), 'bottom');
        } else {
          obj.vy = -Math.abs(obj.vy) * BOUNCE;
        }
      }
      // 左壁
      if(obj.x - obj.r < 0){
        if(spikeOnSide('left')){
          obj.broken = true; obj.lost = true;
          spawnParticles(obj.x, obj.y, 10, C.spike);
          spawnParticles(obj.x, obj.y, 5, C.spikeCore);
          shakeTime = 0.25; shakeAmp = 6;
          return;
        }
        obj.x = obj.r;
        if(isGoalFace('left', obj.mat)){
          handleGoalHit(obj, Math.abs(obj.vx), 'left');
        } else {
          obj.vx = Math.abs(obj.vx) * BOUNCE;
        }
      }
      // 右壁
      if(obj.x + obj.r > PW){
        if(spikeOnSide('right')){
          obj.broken = true; obj.lost = true;
          spawnParticles(obj.x, obj.y, 10, C.spike);
          spawnParticles(obj.x, obj.y, 5, C.spikeCore);
          shakeTime = 0.25; shakeAmp = 6;
          return;
        }
        obj.x = PW - obj.r;
        if(isGoalFace('right', obj.mat)){
          handleGoalHit(obj, Math.abs(obj.vx), 'right');
        } else {
          obj.vx = -Math.abs(obj.vx) * BOUNCE;
        }
      }
    }

    function handleGoalHit(obj, spd, wall){
      const m = MAT[obj.mat];
      if(spd >= m.needV){
        obj.hp--;
        if(obj.hp <= 0){
          obj.broken = true;
          spawnBreakEffect(obj);
          shakeTime = 0.3; shakeAmp = obj.mat==='rock'?8:5;
        } else {
          obj.cracked = true;
          spawnParticles(obj.x, obj.y, 6, m.glow);
          if(wall==='left'||wall==='right') obj.vx = -obj.vx * GOAL_BOUNCE;
          else obj.vy = -obj.vy * GOAL_BOUNCE;
        }
      } else {
        if(wall==='left'||wall==='right') obj.vx = -obj.vx * BOUNCE;
        else obj.vy = -obj.vy * BOUNCE;
      }
    }

    /* === パーティクル === */
    function spawnParticles(x, y, n, col){
      for(let i=0;i<n;i++){
        const a = Math.random()*Math.PI*2;
        const s = 50+Math.random()*200;
        particles.push({
          x,y,
          vx: Math.cos(a)*s,
          vy: Math.sin(a)*s,
          life:1, col,
          r: 2+Math.random()*3,
        });
      }
    }

    function spawnBreakEffect(obj){
      const m = MAT[obj.mat];
      const isGlass = obj.mat==='glass';
      const n = isGlass ? 18 : 12;
      spawnParticles(obj.x, obj.y, n, m.glow);
      if(isGlass) spawnParticles(obj.x, obj.y, 8, C.particle);
      const fragN = isGlass ? 5 : 6;
      for(let i=0;i<fragN;i++){
        const a = Math.random()*Math.PI*2;
        const s = (isGlass?160:90)+Math.random()*300;
        particles.push({
          x:obj.x, y:obj.y,
          vx:Math.cos(a)*s, vy:Math.sin(a)*s,
          life:isGlass?1.0:1.4, col:m.color,
          r: (isGlass?3:5)+Math.random()*5,
          isFragment:true,
          shard:isGlass,
          rot:Math.random()*Math.PI, vr:(Math.random()-0.5)*8,
        });
      }
    }

    /* === クリア判定 === */
    function checkClear(){
      const alive = objects.filter(o=>!o.broken && !o.lost);
      const lost   = objects.filter(o=>o.lost);
      if(lost.length > 0) return 'gameover';
      if(alive.length === 0) return 'clear';
      return null;
    }

    /* === 更新処理 === */
    let lastTime = null;
    function update(ts){
      if(!lastTime) lastTime = ts;
      let dt = Math.min((ts - lastTime)/1000, 0.05);
      lastTime = ts;

      if(state !== STATE.PLAYING){ requestAnimationFrame(update); return; }

      if(shakeTime > 0) shakeTime = Math.max(0, shakeTime - dt);
      if(gravFlashTime > 0) gravFlashTime = Math.max(0, gravFlashTime - dt);

      // ── 移動障害物の位置更新 ──
      const sd = STAGES[stage];
      if(sd.spikes){
        for(const sp of sd.spikes){
          if(sp.moving && sp.axis === 'h'){
            sp.x += sp.speed * sp.moveDir * dt;
            if(sp.x >= sp.rangeMax){
              sp.x = sp.rangeMax;
              sp.moveDir = -1;
            } else if(sp.x <= sp.rangeMin){
              sp.x = sp.rangeMin;
              sp.moveDir = 1;
            }
          }
        }
      }

      for(const obj of objects){
        if(obj.broken || obj.lost) continue;
        obj.vx += gravity.x * dt;
        obj.vy += gravity.y * dt;
        const spd = Math.sqrt(obj.vx*obj.vx+obj.vy*obj.vy);
        if(spd > MAX_SPEED){
          obj.vx = obj.vx/spd*MAX_SPEED;
          obj.vy = obj.vy/spd*MAX_SPEED;
        }
        obj.x += obj.vx * dt;
        obj.y += obj.vy * dt;
        obj.trailX.push(obj.x); obj.trailY.push(obj.y);
        if(obj.trailX.length>5){ obj.trailX.shift(); obj.trailY.shift(); }
        checkWallCollision(obj);
      }

      for(const p of particles){
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.vy += 200 * dt;
        if(p.vr) p.rot += p.vr * dt;
        p.life -= dt * 1.5;
      }
      particles = particles.filter(p=>p.life>0);

      const result = checkClear();
      if(result === 'clear'){
        if(stage === STAGES.length-1){
          state = STATE.ALLCLEAR;
          dirBtns.style.display = 'none';
          showModal('ALL<br>CLEAR!', '全7ステージクリア！<br>おめでとう！', 'REPLAY', ()=>{ stage=0; initStage(0); state=STATE.PLAYING; });
        } else {
          state = STATE.NEXTREADY;
          dirBtns.style.display = 'none';
          showModal('STAGE<br>CLEAR!', '次のステージへ', 'NEXT STAGE', ()=>{ stage++; initStage(stage); state=STATE.PLAYING; });
        }
      } else if(result === 'gameover'){
        state = STATE.GAMEOVER;
        dirBtns.style.display = 'none';
        showModal('GAME<br>OVER', 'スパイクに当たった！<br>もう一度挑戦しよう', 'RETRY', ()=>{ initStage(stage); state=STATE.PLAYING; }, true);
      }

      draw(dt);
      requestAnimationFrame(update);
    }

    /* === 描画 === */
    function draw(dt){
      const sx = shakeTime>0 ? (Math.random()-0.5)*shakeAmp : 0;
      const sy = shakeTime>0 ? (Math.random()-0.5)*shakeAmp : 0;
      ctx.save();
      ctx.translate(sx, sy);

      ctx.clearRect(0,0,PW,PH);

      // 重力方向背景（最背面）
      drawGravityBg(dt || 0.016);

      // 環境演出：漂う星
      drawStars();

      // ゴール面グロー（強化版）
      drawGoalFaces();

      // スパイク
      drawSpikes();

      // パーティクル
      for(const p of particles){
        ctx.save();
        ctx.globalAlpha = Math.max(0, Math.min(1,p.life));
        ctx.fillStyle = p.col;
        ctx.shadowColor = p.col;
        ctx.shadowBlur  = p.isFragment ? 8 : 4;
        if(p.isFragment && p.shard){
          ctx.translate(p.x,p.y); ctx.rotate(p.rot||0);
          ctx.beginPath();
          ctx.moveTo(0,-p.r); ctx.lineTo(p.r*0.5,p.r); ctx.lineTo(-p.r*0.4,p.r*0.7);
          ctx.closePath(); ctx.fill();
        } else if(p.isFragment){
          ctx.translate(p.x,p.y); ctx.rotate(p.rot||0);
          ctx.fillRect(-p.r,-p.r*0.8,p.r*2,p.r*1.6);
        } else {
          ctx.beginPath();
          ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
          ctx.fill();
        }
        ctx.restore();
      }

      // オブジェクト
      for(const obj of objects){
        if(obj.broken || obj.lost) continue;
        drawObject(obj);
      }

      ctx.restore();
    }

    /* =====================================================
       drawGoalFaces（強化版）
       改良点:
         - バーの太さ T = max(12, PW*0.045)（旧 max(6, PW*0.02) の約2倍以上）
         - 二重縁取り: 太いバー（本体）＋外側に明色細線（コントラスト強調）
         - pulse 振幅強化: 0.45 + 0.45*sin（旧 0.55 + 0.35）→ 最大 0.90、最小 0.45
         - グロー帯のshadowBlurを 22→40 に拡大
         - グロー帯幅を PW*0.14（旧 PW*0.10）に拡大
       ===================================================== */
    function drawGoalFaces(){
      const t = Date.now()/1000;
      // 振幅強化（最大0.90/最小0.45）
      const pulse = 0.45 + 0.45*Math.sin(t*3);
      const pulseOuter = 0.30 + 0.30*Math.sin(t*3 + 0.6); // 外縁取り用（少し位相ずらし）
      const sdData = STAGES[stage];
      // バー本体の太さ（旧: max(6, PW*0.02) → 新: max(12, PW*0.045)）
      const T  = Math.max(12, PW * 0.045);
      // 外縁取り細線の太さ
      const TO = Math.max(3,  PW * 0.012);
      // グロー帯幅（旧: PW*0.10 → 新: PW*0.14）
      const band = PW * 0.14;

      for(const gf of sdData.goalFaces){
        const col      = gf.matType === 'rock' ? C.rockGlow : C.cyan;
        // 明色外縁取り色（ガラス=白に近いシアン、岩=白に近いオレンジ）
        const colOuter = gf.matType === 'rock' ? '#ffe0a0' : '#ccffff';
        let x, y, w, h, gx0, gy0, gx1, gy1;
        switch(gf.side){
          case 'bottom': x=0;y=PH-band;w=PW;h=band; gx0=0;gy0=PH;  gx1=0;gy1=PH-band; break;
          case 'top':    x=0;y=0;w=PW;h=band;       gx0=0;gy0=0;   gx1=0;gy1=band;    break;
          case 'left':   x=0;y=0;w=band;h=PH;       gx0=0;gy0=0;   gx1=band;gy1=0;    break;
          case 'right':  x=PW-band;y=0;w=band;h=PH; gx0=PW;gy0=0;  gx1=PW-band;gy1=0; break;
          default: continue;
        }

        // ── レイヤー1: グロー帯（グラデーション面）──
        const g = ctx.createLinearGradient(gx0, gy0, gx1, gy1);
        g.addColorStop(0, col);
        g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.save();
        ctx.globalAlpha = pulse * 0.55;
        ctx.shadowColor = col;
        ctx.shadowBlur  = 40;
        ctx.fillStyle   = g;
        ctx.fillRect(x, y, w, h);
        ctx.restore();

        // ── レイヤー2: バー本体（太いメインライン）──
        ctx.save();
        ctx.globalAlpha = pulse;
        ctx.shadowColor = col;
        ctx.shadowBlur  = 30;
        ctx.fillStyle   = col;
        switch(gf.side){
          case 'bottom': ctx.fillRect(0,       PH - T,     PW, T); break;
          case 'top':    ctx.fillRect(0,       0,          PW, T); break;
          case 'left':   ctx.fillRect(0,       0,          T,  PH); break;
          case 'right':  ctx.fillRect(PW - T,  0,          T,  PH); break;
        }
        ctx.restore();

        // ── レイヤー3: 外縁取り細線（明色・高コントラスト）──
        ctx.save();
        ctx.globalAlpha = pulseOuter;
        ctx.shadowColor = colOuter;
        ctx.shadowBlur  = 14;
        ctx.fillStyle   = colOuter;
        switch(gf.side){
          case 'bottom': ctx.fillRect(0,        PH - T - TO, PW, TO); break;
          case 'top':    ctx.fillRect(0,        T,           PW, TO); break;
          case 'left':   ctx.fillRect(T,        0,           TO, PH); break;
          case 'right':  ctx.fillRect(PW-T-TO,  0,           TO, PH); break;
        }
        ctx.restore();
      }
    }

    function drawSpikes(){
      const sd = STAGES[stage];
      if(!sd.spikes || sd.spikes.length===0) return;
      const t = Date.now()/1000;
      const warnA = 0.75 + 0.25*Math.sin(t*5);

      for(const sp of sd.spikes){
        ctx.save();

        // B. 道中針壁（mid:true）描画ブランチ
        // 移動障害物は sp.x が update() で毎フレーム更新済み
        if(sp.mid){
          const bx = sp.x * PW;
          const by = sp.y * PH;
          const bw = sp.w * PW;
          const bh = sp.h * PH;

          // 移動障害物の場合は警告色を少し明るくして区別
          const spikeCol  = sp.moving ? '#ff8ab0' : C.spike;
          const spikeCoreCol = sp.moving ? '#ffe8ee' : C.spikeCore;

          // 帯背景
          ctx.globalAlpha = sp.moving ? 0.28 : 0.18;
          ctx.fillStyle = sp.moving ? 'rgba(255,138,176,1)' : 'rgba('+RGB.spike+',1)';
          ctx.fillRect(bx, by, bw, bh);
          ctx.restore();
          ctx.save();
          if(sp.dir === 'v'){
            const triH = PH * 0.04;
            const pitch = PW * 0.05;
            const n = Math.ceil(bh / pitch);
            for(let i=0;i<n;i++){
              const tyStart = by + i * pitch;
              const tyMid   = tyStart + pitch * 0.5;
              const tyEnd   = tyStart + pitch;
              let tipX;
              if(sp.face === 'left'){
                tipX = bx;
              } else {
                tipX = bx + bw;
              }
              const baseX = sp.face === 'left' ? bx + triH : bx + bw - triH;
              const grd = ctx.createLinearGradient(baseX, tyMid, tipX, tyMid);
              grd.addColorStop(0, spikeCol);
              grd.addColorStop(1, spikeCoreCol);
              ctx.globalAlpha = warnA;
              ctx.shadowColor = spikeCol; ctx.shadowBlur = sp.moving ? 12 : 8;
              ctx.fillStyle = grd;
              ctx.beginPath();
              ctx.moveTo(tipX, tyMid);
              ctx.lineTo(baseX, tyStart);
              ctx.lineTo(baseX, Math.min(tyEnd, by + bh));
              ctx.closePath();
              ctx.fill();
            }
          } else {
            const triH = PW * 0.04;
            const pitch = PH * 0.05;
            const n = Math.ceil(bw / pitch);
            for(let i=0;i<n;i++){
              const txStart = bx + i * pitch;
              const txMid   = txStart + pitch * 0.5;
              const txEnd   = txStart + pitch;
              let tipY;
              if(sp.face === 'top'){
                tipY = by;
              } else {
                tipY = by + bh;
              }
              const baseY = sp.face === 'top' ? by + triH : by + bh - triH;
              const grd = ctx.createLinearGradient(txMid, baseY, txMid, tipY);
              grd.addColorStop(0, spikeCol);
              grd.addColorStop(1, spikeCoreCol);
              ctx.globalAlpha = warnA;
              ctx.shadowColor = spikeCol; ctx.shadowBlur = sp.moving ? 12 : 8;
              ctx.fillStyle = grd;
              ctx.beginPath();
              ctx.moveTo(txMid, tipY);
              ctx.lineTo(txStart, baseY);
              ctx.lineTo(Math.min(txEnd, bx + bw), baseY);
              ctx.closePath();
              ctx.fill();
            }
          }
          ctx.restore();
          continue;
        }

        // 壁スパイク（既存）
        if(sp.side==='top'){
          const w = PW*0.05;
          const h = PH*0.045;
          const n = Math.ceil(PW/w);
          ctx.fillStyle = 'rgba('+RGB.spike+',0.12)';
          ctx.fillRect(0,0,PW,h*0.8);
          for(let i=0;i<n;i++){
            const bx = i*w;
            const grd = ctx.createLinearGradient(bx,0,bx,h);
            grd.addColorStop(0, C.spikeCore);
            grd.addColorStop(1, C.spike);
            ctx.globalAlpha = warnA;
            ctx.shadowColor = C.spike; ctx.shadowBlur = 8;
            ctx.fillStyle = grd;
            ctx.beginPath();
            ctx.moveTo(bx,0); ctx.lineTo(bx+w*0.5,h); ctx.lineTo(bx+w,0);
            ctx.closePath(); ctx.fill();
          }
        } else if(sp.side==='left'){
          const w = PW*0.045;
          const h = PH*0.05;
          const n = Math.ceil(PH/h);
          ctx.fillStyle = 'rgba('+RGB.spike+',0.12)';
          ctx.fillRect(0,0,w*0.8,PH);
          for(let i=0;i<n;i++){
            const by = i*h;
            const grd = ctx.createLinearGradient(0,by,w,by);
            grd.addColorStop(0, C.spikeCore);
            grd.addColorStop(1, C.spike);
            ctx.globalAlpha = warnA;
            ctx.shadowColor = C.spike; ctx.shadowBlur = 8;
            ctx.fillStyle = grd;
            ctx.beginPath();
            ctx.moveTo(0,by); ctx.lineTo(w,by+h*0.5); ctx.lineTo(0,by+h);
            ctx.closePath(); ctx.fill();
          }
        } else if(sp.side==='right'){
          const w = PW*0.045;
          const h = PH*0.05;
          const n = Math.ceil(PH/h);
          ctx.fillStyle = 'rgba('+RGB.spike+',0.12)';
          ctx.fillRect(PW-w*0.8,0,w*0.8,PH);
          for(let i=0;i<n;i++){
            const by = i*h;
            const grd = ctx.createLinearGradient(PW,by,PW-w,by);
            grd.addColorStop(0, C.spikeCore);
            grd.addColorStop(1, C.spike);
            ctx.globalAlpha = warnA;
            ctx.shadowColor = C.spike; ctx.shadowBlur = 8;
            ctx.fillStyle = grd;
            ctx.beginPath();
            ctx.moveTo(PW,by); ctx.lineTo(PW-w,by+h*0.5); ctx.lineTo(PW,by+h);
            ctx.closePath(); ctx.fill();
          }
        }
        ctx.restore();
      }
    }

    function drawObject(obj){
      const m = MAT[obj.mat];
      if(obj.trailX.length>1){
        ctx.save();
        for(let i=1;i<obj.trailX.length;i++){
          const a = (i/obj.trailX.length)*0.3;
          ctx.beginPath();
          ctx.arc(obj.trailX[i], obj.trailY[i], obj.r*(0.3+0.1*i), 0, Math.PI*2);
          ctx.fillStyle = m.color;
          ctx.globalAlpha = a;
          ctx.fill();
        }
        ctx.restore();
      }

      ctx.save();
      ctx.shadowColor = m.glow;
      ctx.shadowBlur  = 15;

      if(obj.mat === 'glass'){
        const grad = ctx.createRadialGradient(
          obj.x-obj.r*0.3, obj.y-obj.r*0.3, obj.r*0.1,
          obj.x, obj.y, obj.r
        );
        grad.addColorStop(0,'rgba('+RGB.white+',0.9)');
        grad.addColorStop(0.4,'rgba('+RGB.glass+',0.7)');
        grad.addColorStop(1,'rgba('+RGB.glassDeep+',0.3)');
        ctx.beginPath();
        ctx.arc(obj.x, obj.y, obj.r, 0, Math.PI*2);
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.strokeStyle = C.cyan;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        if(obj.cracked){
          ctx.strokeStyle = C.textMain;
          ctx.lineWidth = 1;
          for(let i=0;i<3;i++){
            const a = (i/3)*Math.PI*2 + 0.3;
            ctx.beginPath();
            ctx.moveTo(obj.x, obj.y);
            ctx.lineTo(obj.x+Math.cos(a)*obj.r*0.7, obj.y+Math.sin(a)*obj.r*0.7);
            ctx.stroke();
          }
        }
      } else if(obj.mat === 'rock'){
        ctx.beginPath();
        const n=8;
        for(let i=0;i<n;i++){
          const a = (i/n)*Math.PI*2 - Math.PI/8;
          const jitter = obj.r*(0.85+0.15*Math.sin(i*1.7));
          const px2 = obj.x+Math.cos(a)*jitter;
          const py2 = obj.y+Math.sin(a)*jitter;
          if(i===0) ctx.moveTo(px2,py2); else ctx.lineTo(px2,py2);
        }
        ctx.closePath();
        const grad2 = ctx.createRadialGradient(
          obj.x-obj.r*0.2, obj.y-obj.r*0.2, 2,
          obj.x, obj.y, obj.r
        );
        grad2.addColorStop(0, C.rockGlow);
        grad2.addColorStop(0.55, C.rock);
        grad2.addColorStop(1, C.rockDeep);
        ctx.fillStyle = grad2;
        ctx.fill();
        ctx.strokeStyle = C.rockGlow;
        ctx.lineWidth = 2;
        ctx.stroke();
        if(obj.cracked){
          ctx.strokeStyle = C.warn;
          ctx.lineWidth = 2;
          for(let i=0;i<4;i++){
            const a = (i/4)*Math.PI*2 + 0.5;
            ctx.beginPath();
            ctx.moveTo(obj.x, obj.y);
            ctx.lineTo(obj.x+Math.cos(a)*obj.r*0.8, obj.y+Math.sin(a)*obj.r*0.8);
            ctx.stroke();
          }
        }
        ctx.fillStyle = C.textMain;
        ctx.font = `bold ${obj.r*0.8}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('×'+obj.hp, obj.x, obj.y);
      }

      ctx.font = `${obj.r*0.7}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowBlur = 0;
      ctx.fillText(m.icon, obj.x, obj.y-(obj.r*1.4));

      ctx.restore();
    }

    /* === モーダル表示 === */
    function showModal(title, sub, btnText, cb, isOver){
      mTitle.innerHTML = title;
      mSub.innerHTML   = sub;
      mBtn.textContent = btnText;
      modal.classList.toggle('over', !!isOver);
      modal.classList.remove('hidden');
      mBtn.onclick = ()=>{
        modal.classList.add('hidden');
        cb();
      };
    }

    /* === 入力処理（ドラッグで重力方向切り替え） === */
    let dragStart = null;
    const MIN_DRAG = 30;

    phone.addEventListener('mousedown', e=>{
      if(state !== STATE.PLAYING) return;
      // ボタン上のクリックはドラッグ判定から除外
      if(e.target.classList.contains('dir-btn')) return;
      const r = phone.getBoundingClientRect();
      dragStart = {x: e.clientX - r.left, y: e.clientY - r.top};
    });

    phone.addEventListener('mouseup', e=>{
      if(state !== STATE.PLAYING || !dragStart) return;
      if(e.target.classList.contains('dir-btn')){ dragStart=null; return; }
      const r = phone.getBoundingClientRect();
      const ex = e.clientX - r.left;
      const ey = e.clientY - r.top;
      const dx = ex - dragStart.x;
      const dy = ey - dragStart.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if(dist >= MIN_DRAG){
        if(Math.abs(dx) > Math.abs(dy)){
          setGravity(dx>0?1:-1, 0);
        } else {
          setGravity(0, dy>0?1:-1);
        }
        guide.style.display = 'none';
      }
      dragStart = null;
    });

    phone.addEventListener('touchstart', e=>{
      if(state !== STATE.PLAYING) return;
      if(e.target.classList.contains('dir-btn')) return;
      e.preventDefault();
      const r = phone.getBoundingClientRect();
      const t = e.changedTouches[0];
      dragStart = {x: t.clientX - r.left, y: t.clientY - r.top};
    }, {passive:false});

    phone.addEventListener('touchend', e=>{
      if(state !== STATE.PLAYING || !dragStart) return;
      if(e.target.classList.contains('dir-btn')){ dragStart=null; return; }
      e.preventDefault();
      const r = phone.getBoundingClientRect();
      const t = e.changedTouches[0];
      const ex = t.clientX - r.left;
      const ey = t.clientY - r.top;
      const dx = ex - dragStart.x;
      const dy = ey - dragStart.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if(dist >= MIN_DRAG){
        if(Math.abs(dx) > Math.abs(dy)){
          setGravity(dx>0?1:-1, 0);
        } else {
          setGravity(0, dy>0?1:-1);
        }
        guide.style.display = 'none';
      }
      dragStart = null;
    }, {passive:false});

    /* === 4方向ボタン入力処理（pointerイベント） === */
    document.querySelectorAll('.dir-btn').forEach(btn=>{
      btn.addEventListener('pointerdown', e=>{
        e.stopPropagation();
        if(state !== STATE.PLAYING) return;
        btn.classList.add('pressed');
        const dx = parseInt(btn.dataset.dx, 10);
        const dy = parseInt(btn.dataset.dy, 10);
        setGravity(dx, dy);
        guide.style.display = 'none';
      });
      btn.addEventListener('pointerup', e=>{
        e.stopPropagation();
        btn.classList.remove('pressed');
      });
      btn.addEventListener('pointerleave', ()=>{
        btn.classList.remove('pressed');
      });
    });

    /* === スタート === */
    mBtn.onclick = ()=>{
      modal.classList.add('hidden');
      initStage(0);
      state = STATE.PLAYING;
    };
    // タイトル中はボタン非表示
    dirBtns.style.display = 'none';

    requestAnimationFrame(update);
  })();
  </script>
</body>
