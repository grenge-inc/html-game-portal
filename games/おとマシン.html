  o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+0.01);g.gain.exponentialRampToValueAtTime(0.001,t+d);o.connect(g);g.connect(master);o.start(t);o.stop(t+d+0.02); }
function sparkle(){ blip(1320,0.14,0.16); blip(1760,0.2,0.10,0.04); }
function dull(){ blip(150,0.2,0.16); blip(140,0.24,0.09,0.02); }
function crash(){ blip(120,0.5,0.22); blip(80,0.6,0.16,0.06); }
function clash(){ if(audioMuted||!audioCtx)return; blip(220,0.22,0.16); blip(233,0.26,0.13,0.01); blip(110,0.30,0.12,0.02); } // 不一致時の変な音(半音クラッシュ)
function tick(){ blip(620,0.05,0.08); }

const phone=document.getElementById('phone'),canvasEl=document.getElementById('canvas'),ctx=canvasEl.getContext('2d');
const modal=document.getElementById('modal'),modalTitle=document.getElementById('modal-title'),modalSub=document.getElementById('modal-sub'),modalScore=document.getElementById('modal-score'),modalBtn=document.getElementById('modal-btn');
const hudLabel=document.getElementById('stage-label'),scoreEl=document.getElementById('score'),comboEl=document.getElementById('combo'),muteBtn=document.getElementById('mute-btn');
function W(){return canvasEl.width;} function H(){return canvasEl.height;}
function resizeCanvas(){ canvasEl.width=canvasEl.offsetWidth; canvasEl.height=canvasEl.offsetHeight; if(diff){layout();draw();} }
window.addEventListener('resize',resizeCanvas);
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function gameT(){ if(window.__forceT!=null)return window.__forceT; return audioCtx?(audioCtx.currentTime-t0):0; }

// ノートの配置（モードで動きの形が変わる）
function layout(){
  const cw=W(),ch=H(); let x=0.5*cw, y=ch*0.12, dir=1;
  notes=[];
  for(let i=0;i<N;i++){
    const mode=MODES[Math.floor(i/STLEN)%MODES.length];
    if(i>0 && i%STLEN===0) dir*=-1;
    let dx,dy;
    const fam=MODEDEF[mode].m;
    if(fam==='roll'){ dx=dir*cw*0.115; dy=ch*0.036; }
    else if(fam==='bounce'){ dx=dir*cw*0.145; dy=ch*0.020; }
    else { dx=dir*cw*0.085; dy=ch*0.050; }
    x+=dx; if(x<cw*0.15){x=cw*0.15;dir=1;} if(x>cw*0.85){x=cw*0.85;dir=-1;}
    y+=dy;
    notes.push({t:curT[i],f:curF[i],mode,x,y});
  }
  anchor={t:0,x:notes[0].x,y:notes[0].y-ch*0.28,mode:notes[0].mode};
  goalY=notes[N-1].y+ch*0.12;
}
let goalY=0;
function build(){
  const sng=SONGS[selSong]; diff=DIFFS[selDiff];
  curT=sng.t; curF=sng.f; N=curT.length; DUR=curT[N-1]+0.8;
  score=0; combo=0; running=false; ended=false; noteIdx=0; particles=[]; floats=[];
  layout();
  gaps=[]; const cand=[];
  for(let i=3;i<N-3;i++){ const m=modeAt(i); if(modeAt(i-2)===m&&modeAt(i-1)===m&&modeAt(i+1)===m&&modeAt(i+2)===m) cand.push(i); }
  diff.fracs.forEach(fr=>{ if(!cand.length)return; const idx=cand[Math.min(cand.length-1,Math.floor(fr*cand.length))];
    if(notes[idx].gap) return; // 同じ音への重複を避ける
    const correct=modeAt(idx), others=shuffle(MODES.filter(x=>x!==correct));
    const gp={t:notes[idx].t,x:notes[idx].x,y:notes[idx].y,correct,options:shuffle([correct,others[0],others[1]]),installed:null,resolved:false}; notes[idx].gap=gp; gaps.push(gp); });
  ball={x:anchor.x,y:anchor.y,rot:0,squash:0,lastMode:'roll'};
  hudLabel.textContent=diff.name; scoreEl.textContent='0'; comboEl.textContent='';
  initDust(); draw();
}
function initDust(){ dust=[]; for(let i=0;i<22;i++)dust.push({x:Math.random()*W(),y:Math.random()*H(),r:1+Math.random()*1.6,s:0.2+Math.random()*0.5}); }
function nextGap(){ for(const g of gaps){ if(!g.resolved) return g; } return null; }

// ボール位置（時刻→ノート間補間。bounceは放物線で跳ねる）
function posAt(t){
  if(t<=notes[0].t){ return interp(anchor,notes[0],notes[0].t? t/notes[0].t:1, notes[0].mode); }
  if(t>=notes[N-1].t) return {x:notes[N-1].x,y:notes[N-1].y};
  let j=0; while(j<N-1 && notes[j+1].t<=t) j++;
  const a=notes[j], b=notes[j+1]; const u=(t-a.t)/((b.t-a.t)||1);
  return interp(a,b,u,b.mode);
}
function interp(a,b,u,mode){ let x=a.x+(b.x-a.x)*u, y=a.y+(b.y-a.y)*u; const fam=(MODEDEF[mode]||{}).m;
  if(fam==='bounce'){ y -= H()*0.085*4*u*(1-u); }
  else if(fam==='bell'){ y=a.y+(b.y-a.y)*(u*u); }
  return {x,y}; }

function pick(clientX){ if(!running||ended)return; const g=nextGap(); if(!g)return; const t=gameT();
  if(t<g.t-diff.lead||t>=g.t)return; const r=canvasEl.getBoundingClientRect(); const x=(clientX-r.left)/r.width*W();
  g.installed=x<W()/3?0:(x<2*W()/3?1:2); tick(); }
canvasEl.addEventListener('mousedown',e=>{e.preventDefault();pick(e.clientX);});
canvasEl.addEventListener('touchstart',e=>{e.preventDefault();pick(e.touches[0].clientX);},{passive:false});
muteBtn.addEventListener('click',()=>{ audioMuted=!audioMuted; muteBtn.textContent=audioMuted?'🔇':'🔊'; if(master&&audioCtx)master.gain.setTargetAtTime(audioMuted?0:0.5,audioCtx.currentTime,0.03); });

function buildMenu(){
  const sr=document.getElementById('song-row'); sr.innerHTML='';
  SONGS.forEach((s,i)=>{ const b=document.createElement('button'); b.className='sel-btn'+(i===selSong?' on':''); b.textContent=s.name; b.addEventListener('click',()=>{selSong=i;build();buildMenu();}); sr.appendChild(b); });
  const dr=document.getElementById('diff-row'); dr.innerHTML='';
  DIFFS.forEach((d,i)=>{ const b=document.createElement('button'); b.className='sel-btn'+(i===selDiff?' on':''); b.textContent=d.name+'（'+d.nGaps+'択）'; b.addEventListener('click',()=>{selDiff=i;build();buildMenu();}); dr.appendChild(b); });
}
function showSelect(){ ended=false; running=false; modalTitle.textContent='おとマシン'; modalTitle.style.color='';
  modalSub.textContent='曲と難易度をえらんで▶スタート。\n「?」は前後と同じ仕掛けが正解。違うとヘンな音＆ノーポイント（でも最後まで演奏できる）。';
  modalScore.textContent=''; modalBtn.textContent='▶ スタート'; buildMenu(); modal.classList.remove('hidden'); }
function startGame(){ build(); modal.classList.add('hidden'); initAudio(); t0=audioCtx?audioCtx.currentTime:0; running=true; requestAnimationFrame(loop); }
modalBtn.addEventListener('click', startGame);

function fail(reason){ running=false; ended=true; crash(); phone.classList.add('shaking'); setTimeout(()=>phone.classList.remove('shaking'),420);
  burst(ball.x,ball.y-camY(),'#ff5566',24);
  setTimeout(()=>{ modalTitle.textContent='演奏ストップ'; modalTitle.style.color='#ff7a8a';
    modalSub.textContent=reason==='miss'?'仕掛けを選べず球が落ちた…\n来る前に選ぼう！':'流れに合わない仕掛けを選んでしまった…';
    modalScore.textContent='SCORE '+score; modalBtn.textContent='▶ もう一度'; buildMenu(); modal.classList.remove('hidden'); },650); }
function clearStage(){ running=false; ended=true; const bonus=gaps.filter(g=>g.resolved && !g.missed).length*80; score+=bonus; sparkle();
  setTimeout(()=>{ modalTitle.textContent='演奏完遂！'; modalTitle.style.color='';
    modalSub.textContent='最後まで演奏しきった！ 成功ボーナス +'+bonus+'\n曲や難易度を変えてもう一度！'; modalScore.textContent='SCORE '+score;
    modalBtn.textContent='▶ もう一度'; buildMenu(); modal.classList.remove('hidden'); },700); }

function camY(){ return ball.y - H()*0.40; }
function loop(){
  if(!running)return; const t=gameT();
  const p=posAt(t); ball.x=p.x; const moved=Math.abs(p.x-ball.x); ball.y=p.y; ball.rot+=0.25;
  if(ball.squash>0) ball.squash*=0.82;
  // ノート発火（球が当たって音）
  while(noteIdx<N && t>=notes[noteIdx].t){ const nn=notes[noteIdx]; note(nn.f,nn.mode); score+=3; ball.lastMode=nn.mode; ball.squash=(nn.mode==='roll')?0.15:0.5;
    burst(nn.x,nn.y-camY(), nn.mode==='bell'?'#9fe0ff':(nn.mode==='bounce'?'#aef':'#7fe0ff'), nn.mode==='bell'?7:4); noteIdx++; }
  // 隙間判定
  const g=nextGap();
  if(g && t>=g.t){
    if(g.installed!==null && g.options[g.installed]===g.correct){
      g.resolved=true; combo++; const pts=100*combo; score+=pts; sparkle(); float(g.x,g.y-camY(),'+'+pts);
    } else { // 不一致 or 未選択：ゲームオーバーにせず、変な音＋ノーポイントで続行
      g.resolved=true; g.missed=true; combo=0; clash(); float(g.x,g.y-camY(),'×');
    }
    comboEl.textContent=combo>=2?('コンボ ×'+combo):'';
  }
  scoreEl.textContent=score;
  if(t>=DUR-0.05){ draw(); return clearStage(); }
  draw(); requestAnimationFrame(loop);
}

// ===== DRAW =====
function draw(){ if(!canvasEl.width)return; const w=W(),h=H(),cam=camY(); ctx.clearRect(0,0,w,h);
  for(const d of dust){ d.y+=d.s; if(d.y>h){d.y=0;d.x=Math.random()*w;} ctx.fillStyle='rgba(180,210,255,0.3)';ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,7);ctx.fill(); }
  const gl=ctx.createRadialGradient(w*0.5,h*0.4,0,w*0.5,h*0.4,w*0.9);gl.addColorStop(0,'rgba(80,160,255,0.08)');gl.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gl;ctx.fillRect(0,0,w,h);
  drawTrack(cam); drawObjects(cam); drawGoal(cam); drawParticles();
  if(running||ended) drawBall(ball.x,ball.y-cam);
  drawTiles(cam); drawFloats(); drawProgress();
}
// トラック：ノート間を補間サンプルして描く（モードで形が違う）
function drawTrack(cam){ const w=W(),h=H(); ctx.save();ctx.lineCap='round';ctx.lineJoin='round';
  for(let j=0;j<N-1;j++){ const a=notes[j], b=notes[j+1]; const ay=a.y-cam, by=b.y-cam; if((ay<-40&&by<-40)||(ay>h+40&&by>h+40))continue;
    const played = noteIdx>j+1;   // この区間を通過済み＝色付き
    ctx.strokeStyle = played ? modeColor(b.mode) : 'rgba(90,110,135,0.30)';
    ctx.lineWidth = (b.mode==='roll'?Math.max(3,w*0.018):Math.max(2,w*0.009))*(played?1:0.85);
    if(b.mode==='bounce') ctx.setLineDash([5,5]); else ctx.setLineDash([]);
    ctx.beginPath(); let steps=b.mode==='roll'?1:8;
    for(let s=0;s<=steps;s++){ const u=s/steps; const p=interp(a,b,u,b.mode); if(s===0)ctx.moveTo(p.x,p.y-cam);else ctx.lineTo(p.x,p.y-cam);} ctx.stroke(); }
  ctx.setLineDash([]); ctx.restore(); }
function modeColor(m){ return (MODEDEF[m]||MODEDEF.roll).col; }
function drawObjects(cam){ for(let i=0;i<N;i++){ const nn=notes[i], y=nn.y-cam; if(y<-30||y>H()+30)continue; if(nn.gap&&!nn.gap.resolved){ drawSlot(nn.x,y); continue; } drawObj(nn.x,y,nn.mode, i<noteIdx, noteIdx-1===i); } }
// played=演奏済み(音が出た)→色付き / 未演奏→無色グレー / lit=今まさに当たった→白フラッシュ
function drawObj(x,y,mode,played,lit){ const w=W(); ctx.save();
  const col=played?modeColor(mode):'#3c4a5c', c=lit?'#fff':col;
  if(mode==='roll'){ ctx.strokeStyle=c;ctx.lineWidth=Math.max(3,w*0.02);ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x-w*0.03,y+w*0.01);ctx.lineTo(x+w*0.03,y-w*0.01);ctx.stroke(); }
  else if(mode==='harp'){ ctx.strokeStyle=c;ctx.lineWidth=Math.max(1.5,w*0.006);for(let k=-1;k<=1;k++){ctx.beginPath();ctx.moveTo(x+k*w*0.013,y-w*0.022);ctx.lineTo(x+k*w*0.013,y+w*0.022);ctx.stroke();} }
  else if(mode==='bounce'){ ctx.fillStyle=c;ctx.strokeStyle=played?col:'#4a5c70';ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(x,y,w*0.045,w*0.018,0,0,7);ctx.fill();ctx.stroke(); }
  else if(mode==='wood'){ ctx.fillStyle=c;const sx=w*0.03,sy=w*0.02;if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x-sx,y-sy,sx*2,sy*2,sy*0.5);ctx.fill();}else ctx.fillRect(x-sx,y-sy,sx*2,sy*2); }
  else if(mode==='chime'){ ctx.fillStyle=c;const r=w*0.03;ctx.beginPath();ctx.moveTo(x,y-r);ctx.lineTo(x+r,y);ctx.lineTo(x,y+r);ctx.lineTo(x-r,y);ctx.closePath();ctx.fill(); }
  else { const R=lit?w*0.03:w*0.024; ctx.strokeStyle='rgba(150,200,255,0.4)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,y-w*0.05);ctx.lineTo(x,y-R);ctx.stroke();ctx.fillStyle=c;ctx.beginPath();ctx.arc(x,y,R,0,7);ctx.fill(); }
  if(played){ ctx.globalAlpha=lit?0.6:0.22; const g=ctx.createRadialGradient(x,y,1,x,y,w*0.06); g.addColorStop(0,lit?'#fff':col); g.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,w*0.06,0,7);ctx.fill(); }
  ctx.restore(); }
function drawGoal(cam){ const sy=goalY-cam; if(sy<-40||sy>H()+40)return; const w=W();
  ctx.save();const g=ctx.createLinearGradient(0,sy-H()*0.04,0,sy+H()*0.04);g.addColorStop(0,'rgba(102,255,255,0)');g.addColorStop(0.5,'rgba(102,255,255,0.35)');g.addColorStop(1,'rgba(102,255,255,0)');
  ctx.fillStyle=g;ctx.fillRect(0,sy-H()*0.04,w,H()*0.08);ctx.fillStyle='#6ff';ctx.font='900 '+(w*0.06)+'px Helvetica Neue';ctx.textAlign='center';ctx.fillText('FIN',w*0.5,sy+w*0.02);ctx.restore(); }
function drawBall(x,y){ const w=W(),R=w*0.045, sq=ball.squash||0;
  ctx.save();ctx.translate(x,y);ctx.scale(1+sq*0.5,1-sq*0.5);
  const glow=ctx.createRadialGradient(0,0,R*0.4,0,0,R*2);glow.addColorStop(0,'rgba(180,230,255,0.45)');glow.addColorStop(1,'rgba(100,180,255,0)');ctx.fillStyle=glow;ctx.beginPath();ctx.arc(0,0,R*2,0,7);ctx.fill();
  const g=ctx.createRadialGradient(-R*0.3,-R*0.3,R*0.1,0,0,R);g.addColorStop(0,'#fff');g.addColorStop(0.5,'#cdeaff');g.addColorStop(1,'#5fa0d8');ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,R,0,7);ctx.fill();
  ctx.strokeStyle='rgba(60,110,160,0.6)';ctx.lineWidth=Math.max(1,R*0.12);ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(ball.rot)*R*0.7,Math.sin(ball.rot)*R*0.7);ctx.stroke();
  ctx.restore(); }
function drawTiles(cam){ const g=nextGap(); if(!g)return; const t=gameT(); if(t<g.t-diff.lead||t>=g.t)return; const w=W(),h=H();
  ctx.save();
  ctx.fillStyle='rgba(6,16,32,0.86)'; ctx.fillRect(0,h*0.72,w,h*0.28);
  ctx.strokeStyle='rgba(102,180,255,0.3)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,h*0.72);ctx.lineTo(w,h*0.72);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.96)';ctx.font='900 '+(w*0.04)+'px Helvetica Neue';ctx.textAlign='center';ctx.fillText('▼ 前後と同じ仕掛けを選ぼう',w*0.5,h*0.785);
  const frac=Math.max(0,(g.t-t)/diff.lead);ctx.fillStyle='rgba(102,220,255,0.22)';ctx.fillRect(w*0.18,h*0.805,w*0.64,h*0.01);ctx.fillStyle='#6ff';ctx.fillRect(w*0.18,h*0.805,w*0.64*frac,h*0.01);
  ctx.restore();
  const ty=h*0.905; for(let c=0;c<3;c++) drawObjTile(COLF[c]*w,ty,g.options[c],g.installed===c); }
function drawObjTile(x,y,type,sel){ const w=W(),R=w*0.082; ctx.save();
  if(sel){ctx.strokeStyle='#fff';ctx.lineWidth=Math.max(2,w*0.012);ctx.beginPath();ctx.arc(x,y,R*1.3,0,7);ctx.stroke();}
  ctx.fillStyle='rgba(8,20,38,0.82)';ctx.strokeStyle='rgba(120,200,255,0.45)';ctx.lineWidth=2;
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x-R,y-R,R*2,R*2,R*0.3);ctx.fill();ctx.stroke();}else{ctx.fillRect(x-R,y-R,R*2,R*2);ctx.strokeRect(x-R,y-R,R*2,R*2);}
  const col=modeColor(type); ctx.lineCap='round'; const cy=y-R*0.12;
  if(type==='roll'){ ctx.strokeStyle=col;ctx.lineWidth=Math.max(3,w*0.022);ctx.beginPath();ctx.moveTo(x-R*0.5,cy+R*0.2);ctx.lineTo(x+R*0.5,cy-R*0.2);ctx.stroke(); }
  else if(type==='harp'){ ctx.strokeStyle=col;ctx.lineWidth=Math.max(2,w*0.008);for(let k=-1;k<=1;k++){ctx.beginPath();ctx.moveTo(x+k*R*0.3,cy-R*0.45);ctx.lineTo(x+k*R*0.3,cy+R*0.45);ctx.stroke();} }
  else if(type==='bounce'){ ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(x,cy,R*0.55,R*0.22,0,0,7);ctx.fill(); }
  else if(type==='wood'){ ctx.fillStyle=col;const sx=R*0.5,sy=R*0.32;if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x-sx,cy-sy,sx*2,sy*2,sy*0.5);ctx.fill();}else ctx.fillRect(x-sx,cy-sy,sx*2,sy*2); }
  else if(type==='chime'){ ctx.fillStyle=col;const r=R*0.5;ctx.beginPath();ctx.moveTo(x,cy-r);ctx.lineTo(x+r,cy);ctx.lineTo(x,cy+r);ctx.lineTo(x-r,cy);ctx.closePath();ctx.fill(); }
  else { ctx.fillStyle=col;ctx.beginPath();ctx.arc(x,cy,R*0.32,0,7);ctx.fill();ctx.strokeStyle='rgba(150,200,255,0.5)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(x,cy-R*0.62);ctx.lineTo(x,cy-R*0.3);ctx.stroke(); }
  const nm=(MODEDEF[type]||{}).nm||type; ctx.fillStyle='rgba(220,235,255,0.85)';ctx.font='900 '+(w*0.026)+'px Helvetica Neue';ctx.textAlign='center';ctx.fillText(nm,x,y+R*0.92);
  ctx.restore(); }
function drawSlot(x,y){ const w=W(); ctx.save(); const pul=0.5+0.5*Math.sin(Date.now()/150);
  ctx.strokeStyle='rgba(255,255,255,'+(0.35+0.4*pul)+')';ctx.lineWidth=Math.max(2,w*0.008);ctx.setLineDash([5,5]);
  ctx.beginPath();ctx.arc(x,y,w*0.045,0,7);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='rgba(255,255,255,0.9)';ctx.font='900 '+(w*0.05)+'px Helvetica Neue';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('?',x,y);ctx.textBaseline='alphabetic';ctx.restore(); }
function drawProgress(){ const w=W(),h=H();ctx.save();ctx.fillStyle='rgba(255,255,255,0.10)';ctx.fillRect(0,0,w,h*0.012);ctx.fillStyle='#6ff';ctx.fillRect(0,0,w*Math.min(1,gameT()/DUR),h*0.012);ctx.restore(); }
function burst(x,y,col,n){ for(let i=0;i<n;i++){const a=Math.random()*7,s=1+Math.random()*5;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,r:2+Math.random()*3,life:1,col});} }
function drawParticles(){ particles=particles.filter(p=>p.life>0); for(const p of particles){ p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life-=0.03;ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();ctx.restore(); } }
function float(x,y,txt){ floats.push({x,y,txt,life:1}); }
function drawFloats(){ floats=floats.filter(f=>f.life>0); const w=W(); for(const f of floats){ f.y-=1.1;f.life-=0.016;ctx.save();ctx.globalAlpha=Math.max(0,f.life);ctx.fillStyle='#ffe7a0';ctx.font='900 '+(w*0.045)+'px Helvetica Neue';ctx.textAlign='center';ctx.fillText(f.txt,f.x,f.y);ctx.restore(); } }
window.addEventListener('load',()=>{ resizeCanvas(); build(); showSelect(); });
</script>
