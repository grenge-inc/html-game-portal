<!DOCTYPE html>
<!--
  Phone frame template for hybrid-casual-mentor generated games.
  Aspect ratio: 9:19.5 (iPhone X 系縦長, NEONNOVA2048 基準)。
  PC で開いても常にこの比率を保ち、letterbox（左右黒帯）で中央表示。
  すべてのゲーム要素は #phone の子として配置すること。
-->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>氷滑りソート</title>
<style>
  :root {
    --phone-aspect: 9 / 19.5;
    /* 背景階層 */
    --bg-deep:    #02030a;
    --bg-mid:     #0a1430;
    --bg-panel:   #06081a;
    --bg-card:    #0b1228;
    --bg-phone-t: #0a1a3a;
    --bg-phone-m: #041028;
    --bg-phone-b: #020818;
    --bg-grid:    rgba(10,30,70,0.6);
    --line:       #1a2848;
    /* アクセント */
    --cyan:       #6ff;
    --cyan-soft:  #8df;
    --cyan-grad1: #3df;
    --cyan-grad2: #06a;
    /* テキスト */
    --text-main:  #eaf3ff;
    --text-sub:   #cdddef;
    --text-dim:   #7a92b5;
    --text-btn:   #001a2a;
    /* ゲーム矢印色 */
    --col-r:      #ff4466;
    --col-r-lt:   #ff8899;
    --col-b:      #44aaff;
    --col-b-lt:   #88ccff;
    --col-g:      #44ee88;
    --col-g-lt:   #88ffcc;
    --col-y:      #ffdd44;
    --col-y-lt:   #ffee88;
    --col-y-dark: #554400;
    --col-p:      #cc66ff;
    --col-p-lt:   #dd99ff;
    /* 氷 */
    --ice-bg:     #b8e8ff;
    --ice-border: #88ccee;
    --ice-cell:   rgba(180,230,255,0.08);
    --ice-edge:   rgba(180,230,255,0.15);
    --ice-shine:  rgba(255,255,255,0.12);
    /* エフェクト */
    --warn:       #ff8844;
    --warn-hot:   #ff4400;
    --daigo-1:    #ff6600;
    --daigo-2:    #ff2200;
    --daigo-3:    #ff0000;
    --chain-glow: rgba(100,255,255,0.4);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html, body {
    width:100%; height:100%;
    overflow:hidden;
    background:#000;
    color: var(--text-main);
    font-family:'Helvetica Neue', system-ui, sans-serif;
    user-select:none;
    -webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
  }
  body {
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #phone {
    position:relative;
    overflow:hidden;
    width:  min(100vw, calc(100vh * 9 / 19.5));
    height: min(100vh, calc(100vw * 19.5 / 9));
    --pw:   min(100vw, calc(100vh * 9 / 19.5));
    --ph:   min(100vh, calc(100vw * 19.5 / 9));
    --u:    calc(var(--pw) / 100);
    --uh:   calc(var(--ph) / 100);
    background: linear-gradient(180deg, var(--bg-phone-t) 0%, var(--bg-phone-m) 60%, var(--bg-phone-b) 100%);
  }

  /* ===== HUD ===== */
  #hud {
    position:absolute;
    top: calc(var(--uh)*2);
    left: 0; right: 0;
    display:flex;
    justify-content:center;
    align-items:center;
    gap: calc(var(--u)*6);
    z-index:10;
  }
  #stage-label {
    font-size: calc(var(--u)*5);
    font-weight:700;
    color: var(--cyan);
    text-shadow: 0 0 calc(var(--u)*2) var(--cyan);
    letter-spacing: 0.05em;
  }
  #moves-label {
    font-size: calc(var(--u)*4);
    color: var(--text-sub);
  }

  /* ===== TITLE ===== */
  #title {
    position:absolute;
    top: calc(var(--uh)*6);
    left: 0; right: 0;
    text-align:center;
    font-size: calc(var(--u)*8);
    font-weight:900;
    background: linear-gradient(135deg, var(--ice-bg) 0%, var(--cyan) 50%, var(--cyan-soft) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 calc(var(--u)*2) rgba(100,220,255,0.7));
    letter-spacing: 0.04em;
    pointer-events:none;
  }
  #subtitle {
    position:absolute;
    top: calc(var(--uh)*13);
    left: 0; right: 0;
    text-align:center;
    font-size: calc(var(--u)*3.2);
    color: var(--text-dim);
    letter-spacing: 0.18em;
    pointer-events:none;
  }
  #tap-hint {
    position:absolute;
    top: calc(var(--uh)*30);
    left: 0; right: 0;
    text-align:center;
    font-size: calc(var(--u)*4);
    color: var(--cyan);
    letter-spacing: 0.08em;
    pointer-events:none;
    animation: tapPulse 1.5s ease-in-out infinite;
  }
  @keyframes tapPulse {
    0%,100% { opacity:0.5; transform:scale(1); }
    50%      { opacity:1;   transform:scale(1.05); }
  }

  /* ===== BG ICE DECORATION ===== */
  #bg-deco {
    position:absolute;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:0;
  }

  /* ===== STAGE GOAL BADGE ===== */
  #stage-goal {
    position:absolute;
    bottom: calc(var(--uh)*3.5);
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: calc(var(--u)*3);
    padding: calc(var(--uh)*0.7) calc(var(--u)*4);
    font-size: calc(var(--u)*3);
    color: var(--text-dim);
    white-space:nowrap;
    z-index:10;
    display:flex;
    align-items:center;
    gap: calc(var(--u)*1.5);
  }
  #stage-goal .badge-icon {
    font-size: calc(var(--u)*3.5);
  }

  /* ===== GRID ===== */
  #grid-wrap {
    position:absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  #grid {
    display:grid;
    grid-template-columns: repeat(6, 1fr);
    gap: calc(var(--u)*1.2);
    background: var(--bg-grid);
    padding: calc(var(--u)*1.5);
    border-radius: calc(var(--u)*3);
    border: 1px solid var(--line);
    box-shadow: 0 0 calc(var(--u)*8) rgba(0,100,200,0.3),
                inset 0 0 calc(var(--u)*4) rgba(0,50,120,0.4);
  }
  .cell {
    width:  calc(var(--u)*13);
    height: calc(var(--u)*13);
    border-radius: calc(var(--u)*1.5);
    background: var(--ice-cell);
    border: 1px solid var(--ice-edge);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
  }
  /* 氷床キラキラ模様 */
  .cell::before {
    content:'';
    position:absolute;
    top:15%; left:15%;
    width:30%; height:30%;
    background: var(--ice-shine);
    border-radius:50%;
  }

  /* ===== ARROW ===== */
  .arrow {
    position:absolute;
    width:  calc(var(--u)*11);
    height: calc(var(--u)*11);
    border-radius: calc(var(--u)*1.2);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition: transform 0.08s ease, box-shadow 0.1s;
    z-index:2;
    font-size: calc(var(--u)*6.5);
    line-height:1;
    font-weight:900;
    border: calc(var(--u)*0.4) solid rgba(255,255,255,0.4);
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  }
  .arrow:hover { transform: scale(1.08); }
  .arrow.selected {
    transform: scale(1.12);
    filter: brightness(1.3);
    box-shadow: 0 0 calc(var(--u)*4) rgba(255,255,255,0.6);
  }
  .arrow[data-color="R"] {
    background: radial-gradient(circle at 35% 35%, var(--col-r-lt), var(--col-r));
    box-shadow: 0 calc(var(--u)*0.5) calc(var(--u)*3) rgba(255,60,100,0.5);
  }
  .arrow[data-color="B"] {
    background: radial-gradient(circle at 35% 35%, var(--col-b-lt), var(--col-b));
    box-shadow: 0 calc(var(--u)*0.5) calc(var(--u)*3) rgba(50,140,255,0.5);
  }
  .arrow[data-color="G"] {
    background: radial-gradient(circle at 35% 35%, var(--col-g-lt), var(--col-g));
    box-shadow: 0 calc(var(--u)*0.5) calc(var(--u)*3) rgba(50,200,120,0.5);
  }
  .arrow[data-color="Y"] {
    background: radial-gradient(circle at 35% 35%, var(--col-y-lt), var(--col-y));
    box-shadow: 0 calc(var(--u)*0.5) calc(var(--u)*3) rgba(220,180,0,0.5);
    color: var(--col-y-dark);
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  .arrow[data-color="P"] {
    background: radial-gradient(circle at 35% 35%, var(--col-p-lt), var(--col-p));
    box-shadow: 0 calc(var(--u)*0.5) calc(var(--u)*3) rgba(160,80,255,0.5);
  }

  /* ===== SLIDE ANIMATION ===== */
  @keyframes slideFlash {
    0%   { filter: brightness(2.5); }
    100% { filter: brightness(1); }
  }
  .arrow.sliding { animation: slideFlash 0.15s ease-out; }

  @keyframes elimPop {
    0%   { transform: scale(1.2); opacity:1; }
    60%  { transform: scale(1.6); opacity:0.8; }
    100% { transform: scale(0.1); opacity:0; }
  }
  .arrow.eliminating { animation: elimPop 0.28s ease-in forwards; pointer-events:none; }

  /* 氷床スライドトレイル */
  @keyframes iceTrail {
    0%   { opacity:0.6; transform:scaleX(1); }
    100% { opacity:0; transform:scaleX(1.5); }
  }
  .ice-trail {
    position:absolute;
    height: calc(var(--u)*2.5);
    background: linear-gradient(90deg, transparent, rgba(180,230,255,0.7));
    border-radius: calc(var(--u)*1.5);
    pointer-events:none;
    animation: iceTrail 0.3s ease-out forwards;
    z-index:5;
    top:50%; transform:translateY(-50%);
  }

  /* ===== CHAIN INDICATOR ===== */
  #chain-display {
    position:absolute;
    bottom: calc(var(--uh)*22);
    left:0; right:0;
    text-align:center;
    font-size: calc(var(--u)*8);
    font-weight:900;
    color: var(--text-main);
    text-shadow: 0 0 calc(var(--u)*5) var(--warn), 0 0 calc(var(--u)*10) var(--warn-hot);
    opacity:0;
    pointer-events:none;
    z-index:20;
    transition: opacity 0.1s;
  }
  #chain-display.show { opacity:1; }
  @keyframes chainBurst {
    0%   { transform:scale(0.5); opacity:0; }
    30%  { transform:scale(1.3); opacity:1; }
    70%  { transform:scale(1.0); opacity:1; }
    100% { transform:scale(1.1); opacity:0; }
  }
  #chain-display.show { animation: chainBurst 1.2s ease-out forwards; }

  /* ===== DAIGO EFFECT ===== */
  #daigo-display {
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    font-size: calc(var(--u)*12);
    font-weight:900;
    color: var(--text-main);
    text-shadow:
      0 0 calc(var(--u)*6) var(--daigo-1),
      0 0 calc(var(--u)*12) var(--daigo-2),
      0 0 calc(var(--u)*20) var(--daigo-3);
    opacity:0;
    pointer-events:none;
    z-index:30;
    white-space:nowrap;
    text-align:center;
  }
  @keyframes daigoBurst {
    0%   { transform:translate(-50%,-50%) scale(0.3) rotate(-5deg); opacity:0; }
    25%  { transform:translate(-50%,-50%) scale(1.4) rotate(2deg); opacity:1; }
    60%  { transform:translate(-50%,-50%) scale(1.1) rotate(-1deg); opacity:1; }
    100% { transform:translate(-50%,-50%) scale(1.2) rotate(0); opacity:0; }
  }
  #daigo-display.show { animation: daigoBurst 1.6s cubic-bezier(.22,.61,.36,1) forwards; }

  /* ===== MODAL ===== */
  #modal {
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background: rgba(2,3,10,0.88);
    backdrop-filter: blur(calc(var(--u)*2));
    z-index:100;
    opacity:0;
    pointer-events:none;
    transition: opacity 0.3s;
  }
  #modal.show { opacity:1; pointer-events:auto; }
  .modal-title {
    font-size: calc(var(--u)*10);
    font-weight:900;
    color: var(--ice-bg);
    text-shadow: 0 0 calc(var(--u)*5) var(--cyan), 0 0 calc(var(--u)*10) var(--cyan-soft);
    margin-bottom: calc(var(--uh)*2);
  }
  .modal-sub {
    font-size: calc(var(--u)*4.5);
    color: var(--text-sub);
    margin-bottom: calc(var(--uh)*4);
  }
  .modal-btn {
    background: linear-gradient(135deg, var(--cyan-soft), var(--cyan));
    color: var(--text-btn);
    border:none;
    border-radius: calc(var(--u)*4);
    padding: calc(var(--uh)*1.5) calc(var(--u)*12);
    font-size: calc(var(--u)*5);
    font-weight:800;
    cursor:pointer;
    box-shadow: 0 calc(var(--u)*1) calc(var(--u)*4) var(--chain-glow);
    transition: transform 0.1s, filter 0.1s;
  }
  .modal-btn:hover { transform:scale(1.05); filter:brightness(1.1); }
  .modal-btn:active { transform:scale(0.97); }

  /* ===== PARTICLES ===== */
  .particle {
    position:absolute;
    width: calc(var(--u)*2);
    height: calc(var(--u)*2);
    border-radius:50%;
    pointer-events:none;
    z-index:15;
  }
  @keyframes particleFly {
    0%   { transform:translate(0,0) scale(1); opacity:1; }
    100% { transform:translate(var(--dx), var(--dy)) scale(0); opacity:0; }
  }
</style>
</head>
<body>
<div id="phone">
  <!-- 背景氷装飾 -->
  <div id="bg-deco">
    <svg width="100%" height="100%" viewBox="0 0 100 217" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <!-- 氷の結晶風ライン -->
      <g opacity="0.07" stroke="#88ddff" stroke-width="0.3" fill="none">
        <line x1="10" y1="0" x2="10" y2="217"/>
        <line x1="30" y1="0" x2="30" y2="217"/>
        <line x1="50" y1="0" x2="50" y2="217"/>
        <line x1="70" y1="0" x2="70" y2="217"/>
        <line x1="90" y1="0" x2="90" y2="217"/>
        <line x1="0" y1="30" x2="100" y2="30"/>
        <line x1="0" y1="80" x2="100" y2="80"/>
        <line x1="0" y1="130" x2="100" y2="130"/>
        <line x1="0" y1="180" x2="100" y2="180"/>
      </g>
      <!-- 氷の粒子 -->
      <g opacity="0.15" fill="#b8e8ff">
        <circle cx="8"  cy="20"  r="0.8"/>
        <circle cx="25" cy="55"  r="1.2"/>
        <circle cx="42" cy="15"  r="0.6"/>
        <circle cx="60" cy="40"  r="1.0"/>
        <circle cx="78" cy="25"  r="0.7"/>
        <circle cx="92" cy="60"  r="0.9"/>
        <circle cx="15" cy="95"  r="0.8"/>
        <circle cx="50" cy="188" r="1.1"/>
        <circle cx="82" cy="195" r="0.7"/>
        <circle cx="33" cy="200" r="0.9"/>
      </g>
      <!-- 中央グロー -->
      <radialGradient id="bgGlow" cx="50%" cy="45%" r="45%">
        <stop offset="0%"   stop-color="#1a4a8a" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="#02030a" stop-opacity="0"/>
      </radialGradient>
      <rect width="100" height="217" fill="url(#bgGlow)"/>
    </svg>
  </div>

  <div id="hud">
    <span id="stage-label">Stage 1</span>
    <span id="moves-label">手数: 0</span>
  </div>

  <div id="title">氷滑りソート</div>
  <div id="subtitle">ICE SLIDING SORT</div>
  <div id="tap-hint">▼ タップしてスタート</div>

  <div id="grid-wrap">
    <div id="grid"></div>
  </div>

  <div id="stage-goal">
    <span class="badge-icon">🎯</span>
    <span id="stage-goal-text">スライドして隣接させよう</span>
  </div>

  <div id="chain-display">CHAIN!</div>
  <div id="daigo-display">大豪割れ！！</div>

  <div id="modal">
    <div class="modal-title" id="modal-title">CLEAR!</div>
    <div class="modal-sub" id="modal-sub">おめでとう！</div>
    <button class="modal-btn" id="modal-btn">次のステージへ</button>
  </div>
</div>
<script>
// ===== GAME DATA =====
const STAGES = [
  {
    // St1: チュートリアル — スライド→隣接→消去を2回体感
    label: 'Stage 1',
    goal: '矢印を滑らせて同じ色を隣接させよう',
    rows: 6, cols: 6,
    arrows: [
      { r:2, c:1, color:'R', dir:'R' },
      { r:2, c:4, color:'R', dir:'L' },
      { r:3, c:1, color:'B', dir:'R' },
      { r:3, c:4, color:'B', dir:'L' },
    ]
  },
  {
    // St2: 氷床チェーン＝大豪割れ
    // Op1(R), Op2(B), Op3(G), Op4(Y→slides→adj Y←→Y消去→autoChain:P→adj P←→P自動消去=大豪割れ)
    label: 'Stage 2',
    goal: '氷の上を滑らせて大豪割れを起こせ！',
    rows: 6, cols: 6,
    arrows: [
      { r:0, c:0, color:'R', dir:'R' },  // →(0,4) adj R←(0,5)
      { r:0, c:5, color:'R', dir:'L' },
      { r:5, c:0, color:'B', dir:'R' },  // →(5,4) adj B←(5,5)
      { r:5, c:5, color:'B', dir:'L' },
      { r:1, c:1, color:'G', dir:'R' },  // →(1,3) adj G←(1,4)
      { r:1, c:4, color:'G', dir:'L' },
      { r:3, c:1, color:'Y', dir:'R' },  // →(3,2) adj Y←(3,3) → eliminates → auto: P→(3,4) adj P←(3,5)
      { r:3, c:3, color:'Y', dir:'L' },
      { r:3, c:4, color:'P', dir:'R' },  // 大豪割れ auto-chain target (always adjacent to P←)
      { r:3, c:5, color:'P', dir:'L' },
    ]
  }
];

const DIR_ARROW = { R:'→', L:'←', U:'↑', D:'↓' };
const DIR_DELTA = { R:[0,1], L:[0,-1], U:[-1,0], D:[1,0] };

// ===== STATE =====
let stageIdx = 0;
let grid = []; // grid[r][c] = arrow object or null
let moves = 0;
let animating = false;
let chainCount = 0;
let daigoTriggered = false;

// ===== DOM =====
const gridEl      = document.getElementById('grid');
const stageLabel  = document.getElementById('stage-label');
const movesLabel  = document.getElementById('moves-label');
const titleEl     = document.getElementById('title');
const subtitleEl  = document.getElementById('subtitle');
const tapHintEl   = document.getElementById('tap-hint');
const chainDisp   = document.getElementById('chain-display');
const daigoDisp   = document.getElementById('daigo-display');
const modal       = document.getElementById('modal');
const modalTitle  = document.getElementById('modal-title');
const modalSub    = document.getElementById('modal-sub');
const modalBtn    = document.getElementById('modal-btn');
const stageGoalEl = document.getElementById('stage-goal-text');

const STAGE_GOALS = [
  '操作理解：スライドして隣接させよう',
  '思考＋応用：大豪割れを起こせ！'
];

// ===== INIT =====
function initStage(idx) {
  stageIdx = idx;
  moves = 0;
  animating = false;
  chainCount = 0;
  daigoTriggered = false;

  const st = STAGES[idx];
  stageLabel.textContent = st.label;
  movesLabel.textContent = '手数: 0';
  stageGoalEl.textContent = STAGE_GOALS[idx] || st.goal;
  modal.classList.remove('show');
  chainDisp.classList.remove('show');
  daigoDisp.classList.remove('show');

  // build grid data
  grid = Array.from({length:st.rows}, () => Array(st.cols).fill(null));
  st.arrows.forEach(a => {
    grid[a.r][a.c] = { ...a, el:null };
  });

  renderGrid(st);
}

function renderGrid(st) {
  gridEl.innerHTML = '';
  const cells = [];
  for (let r = 0; r < st.rows; r++) {
    for (let c = 0; c < st.cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r;
      cell.dataset.c = c;
      gridEl.appendChild(cell);
      cells.push(cell);
    }
  }

  // place arrows
  st.arrows.forEach(a => {
    const arrow = document.createElement('div');
    arrow.className = 'arrow';
    arrow.dataset.color = a.color;
    arrow.dataset.dir = a.dir;
    arrow.dataset.r = a.r;
    arrow.dataset.c = a.c;
    arrow.textContent = DIR_ARROW[a.dir];
    arrow.addEventListener('pointerdown', onArrowClick);

    const cell = getCellEl(a.r, a.c);
    cell.appendChild(arrow);
    grid[a.r][a.c].el = arrow;
  });
}

function getCellEl(r, c) {
  return gridEl.children[r * STAGES[stageIdx].cols + c];
}

// ===== CLICK =====
function onArrowClick(e) {
  if (animating) return;
  e.stopPropagation();
  const el = e.currentTarget;
  const r = parseInt(el.dataset.r);
  const c = parseInt(el.dataset.c);
  const arrow = grid[r][c];
  if (!arrow) return;

  moves++;
  movesLabel.textContent = `手数: ${moves}`;
  chainCount = 0;
  daigoTriggered = false;
  slideArrow(r, c, () => {
    if (daigoTriggered) showDaigo();
    checkWin();
  });
}

// ===== SLIDE LOGIC =====
function slideArrow(r, c, onDone) {
  const arrow = grid[r][c];
  if (!arrow) { onDone(); return; }

  const [dr, dc] = DIR_DELTA[arrow.dir];
  const st = STAGES[stageIdx];
  let nr = r + dr, nc = c + dc;

  // Find final slide position
  let finalR = r, finalC = c;
  while (nr >= 0 && nr < st.rows && nc >= 0 && nc < st.cols && !grid[nr][nc]) {
    finalR = nr; finalC = nc;
    nr += dr; nc += dc;
  }

  if (finalR === r && finalC === c) {
    // No movement — check if already adjacent to same color
    const adjR = r + dr, adjC = c + dc;
    if (adjR >= 0 && adjR < st.rows && adjC >= 0 && adjC < st.cols) {
      const adj = grid[adjR][adjC];
      if (adj && adj.color === arrow.color) {
        animElim(r, c, adjR, adjC, onDone);
        return;
      }
    }
    onDone();
    return;
  }

  animating = true;
  // Animate slide
  const el = arrow.el;
  el.classList.add('sliding');

  // Move DOM element
  setTimeout(() => {
    el.classList.remove('sliding');
    // Move in grid data
    grid[r][c] = null;
    grid[finalR][finalC] = arrow;
    arrow.r = finalR; arrow.c = finalC;
    el.dataset.r = finalR; el.dataset.c = finalC;
    // Move DOM node
    const newCell = getCellEl(finalR, finalC);
    newCell.appendChild(el);

    // Check adjacency at destination
    const nextR = finalR + dr, nextC = finalC + dc;
    if (nextR >= 0 && nextR < st.rows && nextC >= 0 && nextC < st.cols) {
      const adj = grid[nextR][nextC];
      if (adj && adj.color === arrow.color) {
        animElim(finalR, finalC, nextR, nextC, () => {
          animating = false;
          onDone();
        });
        return;
      }
    }
    animating = false;
    onDone();
  }, 150);
}

// ===== ELIMINATE =====
function animElim(r1, c1, r2, c2, onDone) {
  const a1 = grid[r1][c1], a2 = grid[r2][c2];
  if (!a1 || !a2) { onDone(); return; }

  chainCount++;
  if (chainCount >= 2) daigoTriggered = true;

  spawnParticles(r1, c1, a1.color);
  spawnParticles(r2, c2, a2.color);

  a1.el.classList.add('eliminating');
  a2.el.classList.add('eliminating');

  setTimeout(() => {
    a1.el.remove(); a2.el.remove();
    grid[r1][c1] = null; grid[r2][c2] = null;

    // Show chain indicator
    if (chainCount >= 2) {
      showChain(chainCount);
    }

    // Auto-cascade: check all adjacent same-color pairs
    setTimeout(() => {
      autoChainCheck(onDone);
    }, 80);
  }, 280);
}

function autoChainCheck(onDone) {
  const st = STAGES[stageIdx];
  for (let r = 0; r < st.rows; r++) {
    for (let c = 0; c < st.cols; c++) {
      const a = grid[r][c];
      if (!a) continue;
      const [dr, dc] = DIR_DELTA[a.dir];
      const nr = r + dr, nc = c + dc;
      if (nr < 0 || nr >= st.rows || nc < 0 || nc >= st.cols) continue;
      const adj = grid[nr][nc];
      if (adj && adj.color === a.color) {
        animating = true;
        animElim(r, c, nr, nc, () => {
          animating = false;
          onDone();
        });
        return;
      }
    }
  }
  onDone();
}

// ===== VISUAL EFFECTS =====
function showChain(n) {
  chainDisp.textContent = n >= 3 ? `大豪割れ × ${n}!!` : `CHAIN × ${n}`;
  chainDisp.classList.remove('show');
  void chainDisp.offsetWidth;
  chainDisp.classList.add('show');
  setTimeout(() => chainDisp.classList.remove('show'), 1200);
}

function showDaigo() {
  daigoDisp.classList.remove('show');
  void daigoDisp.offsetWidth;
  daigoDisp.classList.add('show');
  setTimeout(() => daigoDisp.classList.remove('show'), 1600);
}

function spawnParticles(r, c, color) {
  const cell = getCellEl(r, c);
  const rect = cell.getBoundingClientRect();
  const phoneRect = document.getElementById('phone').getBoundingClientRect();
  const cx = rect.left - phoneRect.left + rect.width/2;
  const cy = rect.top  - phoneRect.top  + rect.height/2;

  const colorMap = { R:'#ff4466', B:'#44aaff', G:'#44ee88', Y:'#ffdd44', P:'#cc66ff' };
  const pc = colorMap[color] || '#fff';

  for (let i = 0; i < 8; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (i / 8) * Math.PI * 2;
    const dist = 30 + Math.random() * 40;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    p.style.cssText = `
      left:${cx}px; top:${cy}px;
      background:${pc};
      --dx:${dx}px; --dy:${dy}px;
      animation: particleFly 0.5s ease-out forwards;
      box-shadow: 0 0 4px ${pc};
    `;
    document.getElementById('phone').appendChild(p);
    setTimeout(() => p.remove(), 520);
  }
}

// ===== WIN CHECK =====
function checkWin() {
  const st = STAGES[stageIdx];
  let remaining = 0;
  for (let r = 0; r < st.rows; r++)
    for (let c = 0; c < st.cols; c++)
      if (grid[r][c]) remaining++;

  if (remaining === 0) {
    setTimeout(() => showClear(), 400);
  }
}

function showClear() {
  const isLast = stageIdx >= STAGES.length - 1;
  modalTitle.textContent = 'CLEAR!';
  modalSub.textContent = isLast
    ? `全ステージ制覇！(${moves}手)`
    : `${moves}手でクリア！`;
  modalBtn.textContent = isLast ? 'もう一度' : '次のステージへ';
  modal.classList.add('show');
}

modalBtn.addEventListener('pointerdown', () => {
  const isLast = stageIdx >= STAGES.length - 1;
  initStage(isLast ? 0 : stageIdx + 1);
});

// ===== TITLE SCREEN → GAME =====
let gameStarted = false;
document.getElementById('grid-wrap').style.opacity = '0';
document.getElementById('grid-wrap').style.pointerEvents = 'none';
document.getElementById('hud').style.opacity = '0';
document.getElementById('stage-goal').style.opacity = '0';

function startGame() {
  if (gameStarted) return;
  gameStarted = true;
  [titleEl, subtitleEl, tapHintEl].forEach(el => {
    el.style.transition = 'opacity 0.35s';
    el.style.opacity = '0';
  });
  setTimeout(() => {
    [titleEl, subtitleEl, tapHintEl].forEach(el => el.style.display = 'none');
    document.getElementById('grid-wrap').style.opacity = '1';
    document.getElementById('grid-wrap').style.pointerEvents = '';
    document.getElementById('hud').style.opacity = '1';
    document.getElementById('stage-goal').style.opacity = '1';
    initStage(0);
  }, 350);
}

document.getElementById('phone').addEventListener('pointerdown', (e) => {
  if (!gameStarted) { startGame(); return; }
});

// Init grid data even before start
initStage(0);
// But keep hidden until tap
</script>
</body>
