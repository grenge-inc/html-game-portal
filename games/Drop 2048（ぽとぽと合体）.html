<!DOCTYPE html>
<!--
  Phone frame template for hybrid-casual-mentor generated games.
  Aspect ratio: 9:19.5 (iPhone X 系縦長, NEONNOVA2048 基準)。
  PC で開いても常にこの比率を保ち、letterbox（左右黒帯）で中央表示。
  すべてのゲーム要素は #phone の子として配置すること。
-->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Drop 2048</title>
<style>
  :root {
    --phone-aspect: 9 / 19.5; /* スマホ縦長基準 (iPhone X 以降) */
    --bg-deep:#02030a; --bg-mid:#0a1430; --bg-phone:#060a1e; --line:#1a2848;
    --cyan:#6ff; --cyan-soft:#8df; --cyan-grad-1:#3df; --cyan-grad-2:#06a;
    --cyan-rgb:110,255,255;
    --text-main:#eaf3ff; --text-sub:#cdddef; --text-dim:#7a92b5;
    --nova-7:#ffb24a;
    --enemy:#ff5d8a; --enemy-core:#ffd1de; --enemy-rgb:255,93,138;
    --board-grad-1:rgba(20,40,80,.5); --board-grad-2:rgba(6,8,26,.85);
    --cell-bg:rgba(255,255,255,.025); --cell-line:rgba(255,255,255,.05);
    --tile-ink-hi:#3a1a00; --tile-ink-lo:#0c1730; --tile-spec:rgba(255,255,255,.4);
    --modal-grad-1:rgba(6,12,40,.84); --modal-grad-2:rgba(2,3,10,.95);
    /* タイル値カラー */
    --v2:#eef3fb; --v4:#dbe6ff; --v8:#ffd76b; --v16:#ffb24a;
    --v32:#ff7a3a; --v64:#ff5d8a; --v128:#e06bff; --v256:#9b7bff;
    --v512:#6fd0ff; --v1024:#5effc8; --v2048:#fff3a0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  #phone{
    --cols:4; --rows:6;
    --gap: calc(var(--u) * 1.6);
    --pad: calc(var(--u) * 3);
  }
  /* HUD */
  #hud{position:absolute;top:0;left:0;right:0;height:calc(var(--uh)*9);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 var(--pad);z-index:6;font-variant-numeric:tabular-nums;}
  .hud-st{font-size:calc(var(--u)*3.6);font-weight:700;letter-spacing:.08em;color:var(--text-sub);}
  .hud-st b{color:var(--cyan);}
  .st-goal{display:block;font-size:calc(var(--u)*2.2);font-weight:600;letter-spacing:.14em;
    color:var(--text-dim);margin-top:calc(var(--uh)*.3);
    padding:calc(var(--u)*.3) calc(var(--u)*1.4);border:1px solid var(--line);
    border-radius:calc(var(--u)*1.4);background:rgba(var(--cyan-rgb),.05);}
  .hud-goal{display:flex;align-items:center;gap:calc(var(--u)*1.4);}
  .goal-lab{font-size:calc(var(--u)*2.6);color:var(--text-dim);letter-spacing:.1em;}
  .goal-badge{font-size:calc(var(--u)*4);font-weight:800;padding:calc(var(--u)*.6) calc(var(--u)*2.2);
    border-radius:calc(var(--u)*2);background:rgba(110,255,255,.1);
    border:1px solid var(--cyan);color:var(--cyan);box-shadow:0 0 calc(var(--u)*2) rgba(110,255,255,.4);}
  .hud-best{font-size:calc(var(--u)*3);color:var(--text-dim);}
  .hud-best b{color:var(--nova-7);font-size:calc(var(--u)*4);}
  /* リトライボタン */
  #retryBtn{position:absolute;top:calc(var(--uh)*1.2);right:calc(var(--u)*3);
    z-index:7;font-size:calc(var(--u)*2.6);font-weight:700;letter-spacing:.06em;
    padding:calc(var(--u)*1) calc(var(--u)*2.4);border-radius:calc(var(--u)*4);
    border:1px solid rgba(var(--enemy-rgb),.6);
    background:rgba(var(--enemy-rgb),.12);
    color:var(--enemy-core);cursor:pointer;
    transition:background .15s,box-shadow .15s;}
  #retryBtn:active{background:rgba(var(--enemy-rgb),.28);
    box-shadow:0 0 calc(var(--u)*3) rgba(var(--enemy-rgb),.5);transform:scale(.95);}
  /* 落下待機ゾーン */
  #spawn{position:absolute;top:calc(var(--uh)*10);left:0;right:0;height:calc(var(--uh)*10);
    display:flex;align-items:center;justify-content:center;z-index:5;}
  #spawn .tile{position:relative;}
  .spawn-hint{position:absolute;bottom:calc(var(--uh)*.4);width:100%;text-align:center;
    font-size:calc(var(--u)*2.4);color:var(--text-dim);letter-spacing:.12em;}
  /* 盤面 */
  #board{position:absolute;left:var(--pad);right:var(--pad);
    top:calc(var(--uh)*21);bottom:calc(var(--uh)*5);
    border:1px solid var(--line);border-radius:calc(var(--u)*3);z-index:2;
    background:radial-gradient(120% 90% at 50% 0%, var(--board-grad-1), var(--board-grad-2));
    box-shadow:inset 0 0 calc(var(--u)*8) rgba(0,0,0,.6),0 0 calc(var(--u)*5) rgba(var(--cyan-rgb),.1);
    padding:var(--gap);overflow:hidden;}
  #grid{position:absolute;inset:var(--gap);display:grid;
    grid-template-columns:repeat(var(--cols),1fr);
    grid-template-rows:repeat(var(--rows),1fr);gap:var(--gap);}
  .cell{border-radius:calc(var(--u)*2);background:var(--cell-bg);
    border:1px solid var(--cell-line);}
  /* レーンハイライト */
  #lanes{position:absolute;inset:var(--gap);display:grid;
    grid-template-columns:repeat(var(--cols),1fr);gap:var(--gap);z-index:4;}
  .lane{border-radius:calc(var(--u)*2);transition:background .12s;}
  .lane.hot{background:linear-gradient(180deg,rgba(var(--cyan-rgb),.16),rgba(var(--cyan-rgb),0));
    box-shadow:inset 0 0 calc(var(--u)*3) rgba(var(--cyan-rgb),.25);}
  .lane.hot::after{content:'';position:absolute;left:50%;top:0;width:1px;height:100%;
    transform:translateX(-50%);background:linear-gradient(var(--cyan),transparent);opacity:.6;}
  .lane{position:relative;}
  /* タイル */
  .tile{position:absolute;display:flex;align-items:center;justify-content:center;
    border-radius:calc(var(--u)*2);font-weight:800;
    font-family:'Helvetica Neue',system-ui,sans-serif;font-variant-numeric:tabular-nums;
    color:var(--tile-ink-lo);text-shadow:0 1px 0 var(--tile-spec);
    transition:transform .14s cubic-bezier(.3,1.4,.5,1),top .16s cubic-bezier(.25,.9,.3,1),left .12s;
    will-change:transform,top,left;}
  .tile.pop{animation:pop .26s ease-out;}
  @keyframes pop{0%{transform:scale(1);}40%{transform:scale(1.22);}100%{transform:scale(1);}}
  .tile .ring{position:absolute;inset:0;border-radius:inherit;pointer-events:none;}
  .tile.merge .ring{animation:ring .4s ease-out;}
  @keyframes ring{0%{box-shadow:0 0 0 0 var(--tile-spec);opacity:.9;}
    100%{box-shadow:0 0 0 calc(var(--u)*5) rgba(255,255,255,0);opacity:0;}}
  /* 横マージ演出 */
  .tile.hmerge .ring{animation:hring .5s ease-out;}
  @keyframes hring{0%{box-shadow:0 0 0 0 rgba(110,255,255,.9);opacity:1;}
    100%{box-shadow:0 0 0 calc(var(--u)*8) rgba(110,255,255,0);opacity:0;}}
  /* 盤面シェイク */
  #board.shake{animation:shk var(--shk-t,.3s) ease;}
  @keyframes shk{0%,100%{transform:translate(0,0);}
    20%{transform:translate(calc(var(--shk,1)*-1px),calc(var(--shk,1)*1px));}
    40%{transform:translate(calc(var(--shk,1)*1px),calc(var(--shk,1)*-1px));}
    60%{transform:translate(calc(var(--shk,1)*-1px),0);}
    80%{transform:translate(calc(var(--shk,1)*1px),0);}}
  /* モーダル */
  #modal{position:absolute;inset:0;z-index:10;display:none;
    flex-direction:column;align-items:center;justify-content:center;gap:calc(var(--uh)*2.2);
    background:radial-gradient(80% 60% at 50% 45%,var(--modal-grad-1),var(--modal-grad-2));
    backdrop-filter:blur(2px);}
  #modal.on{display:flex;}
  .m-title{font-size:calc(var(--u)*11);font-weight:900;letter-spacing:.04em;
    background:linear-gradient(180deg,var(--cyan-soft),var(--cyan-grad-2));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .m-title.over{background:linear-gradient(180deg,var(--enemy-core),var(--enemy));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .m-sub{font-size:calc(var(--u)*3.6);color:var(--text-sub);letter-spacing:.06em;}
  .m-btn{margin-top:calc(var(--uh)*1);font-size:calc(var(--u)*4.2);font-weight:700;
    padding:calc(var(--u)*2.4) calc(var(--u)*9);border-radius:calc(var(--u)*8);cursor:pointer;
    color:var(--bg-deep);background:linear-gradient(180deg,var(--cyan-soft),var(--cyan-grad-1));
    border:none;box-shadow:0 0 calc(var(--u)*5) rgba(110,255,255,.5);letter-spacing:.08em;}
  .m-btn:active{transform:scale(.96);}
  html, body {
    width:100%; height:100%;
    overflow:hidden;
    background:#000;            /* letterbox 部分の色 */
    color:#fff;
    font-family:'Helvetica Neue', system-ui, sans-serif;
    user-select:none;
    -webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
  }
  body {
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #phone {
    position:relative;
    overflow:hidden;
    /* 画面に収まる最大の 9:19.5 矩形 */
    width:  min(100vw, calc(100vh * 9 / 19.5));
    height: min(100vh, calc(100vw * 19.5 / 9));
    --pw:   min(100vw, calc(100vh * 9 / 19.5));
    --ph:   min(100vh, calc(100vw * 19.5 / 9));
    --u:    calc(var(--pw) / 100); /* 1u  = phone 幅 1% */
    --uh:   calc(var(--ph) / 100); /* 1uh = phone 高 1% */
    background:
      radial-gradient(120% 70% at 50% 8%, var(--bg-mid), rgba(0,0,0,0) 60%),
      radial-gradient(140% 100% at 50% 100%, rgba(var(--cyan-rgb),.07), rgba(0,0,0,0) 55%),
      var(--bg-deep);
  }
  /* 環境演出：微細グリッド + 上部グロー */
  #amb{position:absolute;inset:0;z-index:0;pointer-events:none;
    background-image:
      linear-gradient(rgba(var(--cyan-rgb),.05) 1px,transparent 1px),
      linear-gradient(90deg,rgba(var(--cyan-rgb),.05) 1px,transparent 1px);
    background-size:calc(var(--u)*10) calc(var(--u)*10),calc(var(--u)*10) calc(var(--u)*10);
    mask-image:radial-gradient(120% 90% at 50% 30%,#000 40%,transparent 85%);
    -webkit-mask-image:radial-gradient(120% 90% at 50% 30%,#000 40%,transparent 85%);}
  #amb i{position:absolute;border-radius:50%;background:var(--cyan);opacity:.5;
    box-shadow:0 0 calc(var(--u)*2) var(--cyan);animation:flo linear infinite;}
  @keyframes flo{0%{transform:translateY(0);opacity:0;}10%{opacity:.6;}90%{opacity:.5;}100%{transform:translateY(calc(var(--uh)*-30));opacity:0;}}
</style>
</head>
<body>
  <div id="phone">
    <div id="amb"></div>
    <div id="hud">
      <div class="hud-st">STAGE <b id="stNo">1</b><span class="st-goal" id="stGoalLab">操作理解</span></div>
      <div class="hud-goal"><span class="goal-lab">GOAL</span><span class="goal-badge" id="goalBadge">8</span></div>
      <div class="hud-best">BEST<br><b id="best">2</b></div>
    </div>
    <button id="retryBtn">↺ RETRY</button>
    <div id="spawn">
      <div class="spawn-hint">タップ or ドラッグでレーンへ落とす</div>
    </div>
    <div id="board">
      <div id="grid"></div>
      <div id="lanes"></div>
    </div>
    <div id="modal">
      <div class="m-title" id="mTitle">CLEAR</div>
      <div class="m-sub" id="mSub"></div>
      <button class="m-btn" id="mBtn">NEXT</button>
    </div>
  </div>
  <script>
  (function(){
    "use strict";
    const COLS=4;
    // ステージ定義（固定初期データ）。col は下→上の配列。
    const STAGES=[
      { rows:5, goal:8,
        cols:[ [], [2], [4], [] ],
        queue:[2,4] },
      { rows:6, goal:64,
        cols:[ [16], [2], [16], [] ],
        queue:[16,16,16,16] }
    ];
    const grid=document.getElementById('grid');
    const lanesEl=document.getElementById('lanes');
    const board=document.getElementById('board');
    const spawn=document.getElementById('spawn');
    const stNoEl=document.getElementById('stNo');
    const goalEl=document.getElementById('goalBadge');
    const bestEl=document.getElementById('best');
    const modal=document.getElementById('modal');
    const mTitle=document.getElementById('mTitle');
    const mSub=document.getElementById('mSub');
    const mBtn=document.getElementById('mBtn');
    const retryBtn=document.getElementById('retryBtn');

    let stageIdx=0, rows=5, goal=8, endless=false;
    let board2d=[];      // board2d[c] = array bottom->top of values
    let queue=[];        // 残り供給
    let current=null;    // 落下待機中の値
    let curTile=null;    // 待機タイル要素
    let best=2;
    let busy=false;      // アニメ中の入力ロック
    let dragging=false, dragLane=-1;

    // リトライボタン：現在のステージを最初からやり直す
    retryBtn.addEventListener('click', ()=>{
      if(modal.classList.contains('on')) return; // モーダル中は無効
      loadStage();
    });

    function valColor(v){
      const t=Math.min(v,2048);
      return getComputedStyle(document.documentElement).getPropertyValue('--v'+t).trim()||'#eef3fb';
    }
    function fontFor(v){
      const len=(''+v).length;
      const base=len<=2?6.5:len===3?5.2:len===4?4.2:3.6;
      return 'calc(var(--u)*'+base+')';
    }

    function buildGrid(){
      document.getElementById('phone').style.setProperty('--rows',rows);
      grid.innerHTML=''; lanesEl.innerHTML='';
      for(let i=0;i<COLS*rows;i++){const d=document.createElement('div');d.className='cell';grid.appendChild(d);}
      for(let c=0;c<COLS;c++){const l=document.createElement('div');l.className='lane';l.dataset.col=c;lanesEl.appendChild(l);}
    }

    // セル幾何（#board の padding=gap を考慮して #grid 内で配置）
    function cellGeom(){
      const gapPx=parseFloat(getComputedStyle(grid).gap)||0;
      const gw=grid.clientWidth, gh=grid.clientHeight;
      const cw=(gw-gapPx*(COLS-1))/COLS;
      const ch=(gh-gapPx*(rows-1))/rows;
      return {gapPx,cw,ch};
    }
    // r=0 が最下段
    function tileXY(c,r){
      const {gapPx,cw,ch}=cellGeom();
      const x=c*(cw+gapPx);
      const y=(rows-1-r)*(ch+gapPx);
      return {x,y,cw,ch};
    }

    function makeTile(v){
      const t=document.createElement('div');
      t.className='tile';
      t.innerHTML='<span class="lbl">'+v+'</span><span class="ring"></span>';
      styleTile(t,v);
      return t;
    }
    function styleTile(t,v){
      const col=valColor(v);
      t.dataset.v=v;
      t.querySelector('.lbl').textContent=v;
      t.style.fontSize=fontFor(v);
      const big=Math.min((Math.log2(v)-1)*0.06,0.55);
      t.style.background='linear-gradient(155deg,'+col+', '+shade(col,-18)+')';
      t.style.boxShadow='0 calc(var(--u)*0.4) calc(var(--u)*1.4) rgba(0,0,0,.45),'
        +'0 0 calc(var(--u)*'+(2+big*14).toFixed(1)+') '+rgba(col,0.15+big)+','
        +'inset 0 calc(var(--u)*0.6) 0 rgba(255,255,255,.4)';
      const cs=getComputedStyle(document.documentElement);
      t.style.color=(v>=8)?cs.getPropertyValue('--tile-ink-hi').trim():cs.getPropertyValue('--tile-ink-lo').trim();
    }
    function shade(hex,p){
      hex=normHex(hex); let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
      const f=(x)=>Math.max(0,Math.min(255,Math.round(x+x*p/100)));
      return '#'+[f(r),f(g),f(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
    }
    function rgba(hex,a){hex=normHex(hex);return 'rgba('+parseInt(hex.slice(1,3),16)+','+parseInt(hex.slice(3,5),16)+','+parseInt(hex.slice(5,7),16)+','+a+')';}
    function normHex(h){h=h.trim();if(h.length===4)h='#'+h[1]+h[1]+h[2]+h[2]+h[3]+h[3];return h;}

    // 盤面モデル：board2d[c] = [{v, el}, ...]（下→上）
    function loadStage(){
      const S=STAGES[stageIdx];
      rows=S.rows; goal=S.goal;
      queue=S.queue.slice();
      endless=false;
      stNoEl.textContent=stageIdx+1;
      goalEl.textContent=goal;
      const lab=document.getElementById('stGoalLab');
      if(lab)lab.textContent=endless?'エンドレス':(stageIdx===0?'操作理解':'思考＋応用');
      buildGrid();
      grid.querySelectorAll('.tile').forEach(t=>t.remove());
      spawn.querySelector('.tile')?.remove();
      best=2;
      board2d=S.cols.map(col=>col.map(v=>{best=Math.max(best,v);return {v:v,el:makeTile(v)};}));
      for(let c=0;c<COLS;c++)for(let r=0;r<board2d[c].length;r++)grid.appendChild(board2d[c][r].el);
      relayout();
      bestEl.textContent=best;
      busy=false; current=null;
      nextBlock();
    }
    function maxValue(){let m=0;for(let c=0;c<COLS;c++)for(const o of board2d[c])m=Math.max(m,o.v);return m;}
    // 各タイルを盤面モデルどおりに配置
    function relayout(){
      for(let c=0;c<COLS;c++){for(let r=0;r<board2d[c].length;r++){
        const o=board2d[c][r]; if(!o||!o.el)continue;
        const {x,y,cw,ch}=tileXY(c,r);
        o.el.style.width=cw+'px';o.el.style.height=ch+'px';o.el.style.left=x+'px';o.el.style.top=y+'px';
      }}
    }

    // 次の落下ブロックを供給
    function nextBlock(){
      if(queue.length===0){
        if(endless){ queue.push(randSupply()); }
        else { return; } // 供給尽き（クリア前提なので通常到達しない）
      }
      current=queue.shift();
      curTile=makeTile(current);
      const {cw,ch}=cellGeom();
      curTile.style.width=cw+'px';curTile.style.height=ch+'px';
      curTile.style.position='relative';curTile.style.left='0';curTile.style.top='0';
      curTile.classList.add('pop');
      spawn.querySelector('.tile')?.remove();
      spawn.appendChild(curTile);
    }
    function randSupply(){
      const r=Math.random();
      return r<0.7?2:(r<0.92?4:8);
    }

    // レーン c に現在ブロックを落とす
    function dropTo(c){
      if(busy||current==null)return;
      if(board2d[c].length>=rows){ flashFull(c); return; }
      busy=true;
      const v=current;
      const r=board2d[c].length;     // 着地行
      const t=curTile; curTile=null; current=null;
      board2d[c].push({v:v,el:t});
      // 待機ゾーン→盤面へ移送
      const {x,y,cw,ch}=tileXY(c,r);
      grid.appendChild(t);
      t.style.position='absolute';t.style.transition='none';t.style.transform='';
      t.style.width=cw+'px';t.style.height=ch+'px';
      t.style.left=x+'px';t.style.top=(-(ch+8))+'px';
      // 落下アニメ
      requestAnimationFrame(()=>{requestAnimationFrame(()=>{
        t.style.transition='';
        t.style.top=y+'px';
      })});
      setTimeout(()=>{ shakeBoard(v); resolveAll(c); }, 180);
    }

    function flashFull(c){
      const lane=lanesEl.children[c];
      lane.style.background='rgba(var(--enemy-rgb),.25)';
      setTimeout(()=>lane.style.background='',180);
    }

    // ===== マージ解決ロジック =====
    // 縦マージ → 横マージ → 縦マージ の連鎖を確実に解決してから afterResolve へ
    // 方針：各フェーズを完全に同期的なデータ操作として実行し、
    //       アニメーションは relayout() と CSS transition に委ねる。
    // これにより「縦→横」のコンボが確実に繋がる。

    function resolveAll(dropCol){
      resolveLoop(dropCol, false, function(){
        afterResolve(dropCol);
      });
    }

    // 縦マージと横マージを交互に繰り返し、変化がなくなるまでループ
    function resolveLoop(dropCol, prevChanged, cb){
      // 縦マージ（全列）
      let vChanged = resolveAllVerticalSync();
      // 横マージ（全行）：dropCol を渡してマージ後の位置を「飛ばしたピース側」に合わせる
      let hChanged = resolveAllHorizontalSync(dropCol);

      if(!vChanged && !hChanged){
        // 変化なし → アニメーション待ちだけして終了
        relayout();
        setTimeout(cb, 160);
        return;
      }

      // 変化があったので画面を更新してアニメーションを見せてから次のループへ
      relayout();
      // マージ演出を各タイルに付与（dirty フラグ方式）
      fireMergeEffects();
      // アニメーション完了後に再チェック
      setTimeout(function(){
        resolveLoop(dropCol, true, cb);
      }, 320);
    }

    // ===== 同期的縦マージ：全列のすべての縦隣接同値を一括処理 =====
    // board2d を直接更新し、削除された DOM 要素を即座に remove()
    // 戻り値：マージが1件でも起きたか
    function resolveAllVerticalSync(){
      let changed = false;
      for(let c=0;c<COLS;c++){
        let merged = true;
        while(merged){
          merged = false;
          const col = board2d[c];
          // 下から上に向かってスキャン（r=0 が最下段）
          for(let r=0;r<col.length-1;r++){
            if(col[r].v === col[r+1].v){
              const nv = col[r].v * 2;
              const keepEl = col[r].el;
              const removeEl = col[r+1].el;
              // モデル更新
              col[r].v = nv;
              col[r].dirty = 'merge'; // 演出フラグ
              col.splice(r+1, 1);
              // DOM から削除（アニメなし・即時）
              removeEl.remove();
              styleTile(keepEl, nv);
              best = Math.max(best, nv); bestEl.textContent = best;
              changed = true;
              merged = true;
              break; // 同列を最初からやり直し
            }
          }
        }
      }
      return changed;
    }

    // ===== 同期的横マージ：全行のすべての横隣接同値を一括処理 =====
    // dropCol：最後に落としたレーン番号。マージ後のピースを「飛ばしたピースが到達した位置」に配置するために使用。
    // 具体的には、落としたピース側の列を「生存側」、もう一方の列を「消滅側」とする。
    // dropCol が右列（c+1）なら右列を生存させ左列を除去、dropCol が左列（c）なら左列を生存させ右列を除去（従来と同じ）。
    // 戻り値：マージが1件でも起きたか
    function resolveAllHorizontalSync(dropCol){
      let changed = false;
      let merged = true;
      // activeCol：現在のラウンドで「飛ばしたピース」がいる列。マージで位置が移動しても追従する。
      let activeCol = (dropCol !== undefined) ? dropCol : -1;
      while(merged){
        merged = false;
        for(let r=0;r<rows;r++){
          for(let c=0;c<COLS-1;c++){
            const leftObj  = board2d[c][r];
            const rightObj = board2d[c+1][r];
            if(leftObj && rightObj && leftObj.v === rightObj.v){
              const nv = leftObj.v * 2;
              // 「飛ばしたピース」が右列（c+1）にいる場合 → 右列を生存させて左列を除去
              // それ以外（飛ばしたピースが左列か不明）→ 左列を生存させて右列を除去（従来動作）
              const keepRight = (activeCol === c + 1);
              if(keepRight){
                // 右列のオブジェクトをマージ結果として更新
                rightObj.v = nv;
                rightObj.dirty = 'hmerge';
                // 左列の r 段目を削除（その上のブロックは重力で詰まる）
                board2d[c].splice(r, 1);
                leftObj.el.remove();
                styleTile(rightObj.el, nv);
                best = Math.max(best, nv); bestEl.textContent = best;
                // activeCol は c+1 のまま維持（生存側が同じ列に留まる）
                // activeCol = c + 1; // 変化なし
              } else {
                // 左列のオブジェクトをマージ結果として更新
                leftObj.v = nv;
                leftObj.dirty = 'hmerge';
                // 右列の r 段目を削除（その上のブロックは重力で board2d が詰まる）
                board2d[c+1].splice(r, 1);
                rightObj.el.remove();
                styleTile(leftObj.el, nv);
                best = Math.max(best, nv); bestEl.textContent = best;
                // activeCol は c に移動（生存側が左列）
                if(activeCol === c + 1) activeCol = c; // 消滅側だったら追従
              }
              changed = true;
              merged = true;
              break; // 全行を最初からやり直し
            }
          }
          if(merged) break;
        }
      }
      return changed;
    }

    // dirty フラグが立ったタイルにマージアニメーションを付与
    function fireMergeEffects(){
      for(let c=0;c<COLS;c++){
        for(const obj of board2d[c]){
          if(obj.dirty){
            const el = obj.el;
            if(obj.dirty === 'merge'){
              el.classList.remove('pop','merge');
              void el.offsetWidth;
              el.classList.add('pop','merge');
              shakeBoard(obj.v);
            } else if(obj.dirty === 'hmerge'){
              el.classList.remove('pop','hmerge');
              void el.offsetWidth;
              el.classList.add('pop','hmerge');
              shakeBoard(obj.v);
            }
            delete obj.dirty;
          }
        }
      }
    }

    function afterResolve(c){
      relayout();
      const maxV=maxValue();
      if(!endless && maxV>=goal){ busy=false; win(); return; }
      if(endless){ goal=Math.max(goal, nextGoalFor(maxV)); goalEl.textContent=goal; }
      if(isJammed()){ busy=false; over(); return; }
      busy=false;
      nextBlock();
    }
    function nextGoalFor(v){ return v*2<=2048? v*2 : 2048; }

    function isJammed(){
      // 全列満杯 かつ 横マージも不可能な場合 = 詰み
      for(let c=0;c<COLS;c++) if(board2d[c].length<rows) return false;
      // 横マージ可能かチェック
      for(let r=0;r<rows;r++){
        for(let c=0;c<COLS-1;c++){
          if(board2d[c][r] && board2d[c+1][r] && board2d[c][r].v===board2d[c+1][r].v) return false;
        }
      }
      return true;
    }

    function shakeBoard(v){
      const amp=Math.min(1+(Math.log2(v)-1)*0.9, 7);
      board.style.setProperty('--shk',amp.toFixed(1));
      board.style.setProperty('--shk-t',(0.24+amp*0.02).toFixed(2)+'s');
      board.classList.remove('shake');void board.offsetWidth;board.classList.add('shake');
    }

    function win(){
      if(stageIdx<STAGES.length-1){
        mTitle.textContent='CLEAR'; mTitle.classList.remove('over');
        mSub.textContent='STAGE '+(stageIdx+1)+' クリア！ 目標 '+goal+' 達成';
        mBtn.textContent='NEXT STAGE';
        modal.classList.add('on');
        mBtn.onclick=()=>{ modal.classList.remove('on'); stageIdx++; loadStage(); };
      } else {
        // 最終ステージクリア → エンドレスへ
        mTitle.textContent='CLEAR'; mTitle.classList.remove('over');
        mSub.textContent='全ステージ制覇！ エンドレスで 2048 を目指せ';
        mBtn.textContent='ENDLESS';
        modal.classList.add('on');
        mBtn.onclick=()=>{ modal.classList.remove('on'); startEndless(); };
      }
    }
    function startEndless(){
      endless=true;
      goal=nextGoalFor(best); goalEl.textContent=goal;
      busy=false; current=null;
      nextBlock();
    }
    function over(){
      mTitle.textContent='GAME OVER'; mTitle.classList.add('over');
      mSub.textContent='盤面が天井まで詰まった　最大値 '+best;
      mBtn.textContent='RETRY';
      modal.classList.add('on');
      mBtn.onclick=()=>{ modal.classList.remove('on'); loadStage(); };
    }

    // ===== 入力（マウスのみ）=====
    function laneFromX(clientX){
      const rect=grid.getBoundingClientRect();
      const gapPx=parseFloat(getComputedStyle(grid).gap)||0;
      const cw=(rect.width-gapPx*(COLS-1))/COLS;
      let rel=clientX-rect.left;
      for(let c=0;c<COLS;c++){ const start=c*(cw+gapPx); if(rel>=start && rel<=start+cw+gapPx) return c; }
      if(rel<0)return 0; if(rel>rect.width)return COLS-1;
      return Math.max(0,Math.min(COLS-1,Math.floor(rel/(rect.width/COLS))));
    }
    function hotLane(c){
      for(const l of lanesEl.children)l.classList.remove('hot');
      if(c>=0 && lanesEl.children[c])lanesEl.children[c].classList.add('hot');
    }
    function clearHot(){for(const l of lanesEl.children)l.classList.remove('hot');}

    // クリックでレーン指定
    board.addEventListener('click',(e)=>{
      if(busy||current==null)return;
      const c=laneFromX(e.clientX);
      dropTo(c);
    });
    // ドラッグ：待機ブロックを掴んで盤面上で離す
    spawn.addEventListener('pointerdown',(e)=>{
      if(busy||current==null)return;
      dragging=true; spawn.setPointerCapture?.(e.pointerId);
      dragLane=laneFromX(e.clientX); hotLane(dragLane);
    });
    window.addEventListener('pointermove',(e)=>{
      if(!dragging)return;
      dragLane=laneFromX(e.clientX); hotLane(dragLane);
      if(curTile){ const rect=board.getBoundingClientRect();
        const dx=Math.max(-rect.width/3,Math.min(rect.width/3,e.clientX-(rect.left+rect.width/2)));
        curTile.style.transform='translateX('+dx+'px)'; }
    });
    window.addEventListener('pointerup',(e)=>{
      if(!dragging)return;
      dragging=false; clearHot();
      if(curTile)curTile.style.transform='';
      const overBoard = (function(){const r=board.getBoundingClientRect();return e.clientY>=r.top-40 && e.clientY<=r.bottom;})();
      const c=laneFromX(e.clientX);
      if(overBoard) dropTo(c);
    });
    window.addEventListener('resize',()=>{ relayout(); });

    // 環境パーティクル
    (function initAmb(){
      const amb=document.getElementById('amb');
      for(let i=0;i<14;i++){
        const s=document.createElement('i');
        const sz=(0.6+Math.random()*1.2).toFixed(2);
        s.style.width='calc(var(--u)*'+sz+')';s.style.height='calc(var(--u)*'+sz+')';
        s.style.left=(Math.random()*100).toFixed(1)+'%';
        s.style.top=(60+Math.random()*40).toFixed(1)+'%';
        s.style.animationDuration=(7+Math.random()*9).toFixed(1)+'s';
        s.style.animationDelay=(-Math.random()*12).toFixed(1)+'s';
        amb.appendChild(s);
      }
    })();

    // start
    loadStage();
  })();
  </script>
</body>
