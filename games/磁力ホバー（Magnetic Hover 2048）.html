<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>磁力ホバー - Magnetic Hover 2048</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body {
    width:100%; height:100%; overflow:hidden;
    background:#04060d; color:#e8f0ff;
    font-family: "Hiragino Kaku Gothic ProN", "Meiryo", system-ui, sans-serif;
    user-select:none; -webkit-user-select:none;
    touch-action:none;
  }
  #stage-wrap {
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(ellipse at 50% 30%, #0a1a3a 0%, #04060d 60%, #000 100%);
  }
  #frame {
    position:relative;
    width: min(100vw, calc(100vh * 9 / 16));
    height: min(100vh, calc(100vw * 16 / 9));
    max-width:540px;
    aspect-ratio: 9/16;
    background: linear-gradient(180deg, #050813 0%, #0a1027 50%, #050813 100%);
    overflow:hidden;
    box-shadow: 0 0 40px rgba(80,180,255,.25), inset 0 0 80px rgba(40,80,180,.2);
    border: 1px solid rgba(120,200,255,.15);
  }
  #canvas { position:absolute; inset:0; width:100%; height:100%; display:block; }
  #ui-top {
    position:absolute; top:0; left:0; right:0;
    padding: 14px 18px;
    display:flex; justify-content:space-between; align-items:center;
    font-weight:700; letter-spacing:.1em;
    z-index:5; pointer-events:none;
    text-shadow: 0 0 8px rgba(140,220,255,.8), 0 0 18px rgba(60,140,255,.5);
  }
  #ui-top .label { font-size:11px; opacity:.7; letter-spacing:.2em; }
  #ui-top .value { font-size:22px; }
  #ui-bottom {
    position:absolute; left:0; right:0; bottom:0;
    padding:12px 16px;
    text-align:center;
    z-index:5; pointer-events:none;
    font-size:12px; letter-spacing:.15em; opacity:.85;
    text-shadow: 0 0 6px rgba(140,220,255,.6);
  }
  #polarity-badge {
    position:absolute; left:50%; top:54px; transform:translateX(-50%);
    padding:6px 18px; border-radius:20px;
    font-size:12px; letter-spacing:.3em; font-weight:700;
    z-index:5; pointer-events:none;
    transition: all .2s ease;
  }
  #polarity-badge.attract {
    color:#a8e6ff;
    background:rgba(20,60,140,.4);
    border:1px solid rgba(140,220,255,.6);
    box-shadow: 0 0 20px rgba(80,180,255,.6);
  }
  #polarity-badge.repel {
    color:#ffd4a8;
    background:rgba(140,40,20,.4);
    border:1px solid rgba(255,180,100,.6);
    box-shadow: 0 0 20px rgba(255,120,60,.6);
  }
  #overlay {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:20;
    background: radial-gradient(circle at 50% 50%, rgba(5,10,30,.85) 0%, rgba(0,0,0,.95) 80%);
    opacity:0; pointer-events:none;
    transition: opacity .5s;
  }
  #overlay.show { opacity:1; pointer-events:auto; }
  #overlay h1 {
    font-size:48px; font-weight:900; letter-spacing:.1em;
    background: linear-gradient(180deg, #fff 0%, #6fc8ff 50%, #2a78ff 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow: 0 0 40px rgba(120,200,255,.8);
    animation: titlePulse 2s infinite ease-in-out;
  }
  #overlay h2 { font-size:24px; margin-top:20px; color:#a8d8ff; letter-spacing:.3em; }
  #overlay p  { font-size:14px; margin-top:14px; color:#cce0ff; opacity:.85; max-width:80%; text-align:center; line-height:1.7; }
  #overlay .btn {
    margin-top:28px; padding:14px 36px;
    font-size:16px; font-weight:700; letter-spacing:.2em;
    background: linear-gradient(135deg, #2a78ff, #6fc8ff);
    color:#031126; border:none; border-radius:30px;
    cursor:pointer; pointer-events:auto;
    box-shadow: 0 0 30px rgba(80,180,255,.6), 0 6px 18px rgba(0,0,0,.5);
    transition: transform .15s;
  }
  #overlay .btn:hover { transform: scale(1.06); }
  #overlay .btn:active { transform: scale(.96); }
  @keyframes titlePulse {
    0%,100% { filter: brightness(1) drop-shadow(0 0 12px rgba(120,200,255,.5)); }
    50%     { filter: brightness(1.3) drop-shadow(0 0 24px rgba(120,200,255,.9)); }
  }
  #clear-burst {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    z-index:15; pointer-events:none;
    opacity:0;
  }
  #clear-burst.show { animation: burstAnim 1.8s forwards ease-out; }
  #clear-burst .txt {
    font-size:64px; font-weight:900; letter-spacing:.15em;
    background: linear-gradient(180deg, #fff 0%, #ffe66f 40%, #ff6a2a 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow: 0 0 50px rgba(255,200,80,.9);
  }
  @keyframes burstAnim {
    0% { opacity:0; transform: scale(.4); }
    20% { opacity:1; transform: scale(1.2); }
    60% { opacity:1; transform: scale(1); }
    100% { opacity:0; transform: scale(1.5); }
  }
  #flash {
    position:absolute; inset:0; background:#fff;
    opacity:0; z-index:18; pointer-events:none; mix-blend-mode:screen;
  }
  #lockfx {
    position:absolute; inset:0; pointer-events:none; z-index:6;
    opacity:0; transition: opacity .3s;
    background:
      repeating-linear-gradient(45deg, rgba(255,40,40,.08) 0 6px, transparent 6px 14px),
      radial-gradient(circle at 50% 50%, transparent 40%, rgba(120,20,20,.3) 100%);
  }
  #lockfx.show { opacity:1; animation: lockShake .15s infinite alternate; }
  @keyframes lockShake {
    from { transform: translate(0,0); }
    to   { transform: translate(-2px,1px); }
  }
  #stage-title-anim {
    position:absolute; left:0; right:0; top:30%; text-align:center;
    z-index:12; pointer-events:none;
    opacity:0;
  }
  #stage-title-anim.show { animation: stageIn 1.6s forwards; }
  #stage-title-anim .num {
    font-size:96px; font-weight:900; letter-spacing:.1em;
    background: linear-gradient(180deg, #fff 0%, #6fc8ff 50%, #2a78ff 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow: 0 0 40px rgba(120,200,255,.9);
  }
  #stage-title-anim .nm {
    font-size:18px; letter-spacing:.4em; color:#a8d8ff; margin-top:6px;
    text-shadow: 0 0 12px rgba(120,200,255,.7);
  }
  @keyframes stageIn {
    0%  { opacity:0; transform: scale(.5) translateY(-30px); filter: blur(10px); }
    25% { opacity:1; transform: scale(1.1) translateY(0); filter: blur(0); }
    75% { opacity:1; transform: scale(1) translateY(0); filter: blur(0); }
    100%{ opacity:0; transform: scale(1.2) translateY(20px); filter: blur(6px); }
  }
  #hint {
    position:absolute; left:0; right:0; top:48%;
    text-align:center;
    z-index:7; pointer-events:none;
    font-size:13px; letter-spacing:.15em; color:#a8d8ff;
    text-shadow: 0 0 10px rgba(80,160,240,.7);
    opacity:0; transition: opacity .4s;
    padding:0 24px;
    line-height:1.7;
  }
  #hint.show { opacity:1; }
</style>
</head>
<body>
<div id="stage-wrap">
  <div id="frame">
    <canvas id="canvas"></canvas>
    <div id="lockfx"></div>
    <div id="ui-top">
      <div><div class="label">STAGE</div><div class="value" id="ui-stage">1 / 10</div></div>

      <h2>MAGNETIC HOVER 2048</h2>

      <button class="btn" id="start-btn">START</button>
    </div>
  </div>
</div>

<script>
"use strict";

/* =======================================================
   磁力ホバー Magnetic Hover 2048
   - 操作: mousemove / mousedown / pointermove / pointerdown / touch*
   - 禁止: keydown / keyup / wheel / contextmenu
   ======================================================= */

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const frame = document.getElementById("frame");

let W = 0, H = 0, DPR = 1;
function resize() {
  const r = frame.getBoundingClientRect();
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = Math.floor(r.width);
  H = Math.floor(r.height);
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + "px";
  canvas.style.height = H + "px";
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener("resize", resize);
resize();

/* ====== 色定義（値→色） ====== */
const TILE_COLORS = {
  2:    { fill:"#3a78ff", glow:"#7fb6ff", edge:"#9fd8ff", txt:"#fff" },
  4:    { fill:"#28b0e8", glow:"#79e3ff", edge:"#aef0ff", txt:"#fff" },
  8:    { fill:"#16d6c0", glow:"#7af2e2", edge:"#b0f7ec", txt:"#03242a" },
  16:   { fill:"#4ae650", glow:"#a9ffac", edge:"#d4ffd6", txt:"#062a08" },
  32:   { fill:"#e6d24a", glow:"#fff39a", edge:"#fff7c8", txt:"#3a2a00" },
  64:   { fill:"#ff9a32", glow:"#ffce80", edge:"#ffe5b0", txt:"#3a1500" },
  128:  { fill:"#ff5a2a", glow:"#ffb088", edge:"#ffd9c0", txt:"#3a0a00" },
  256:  { fill:"#ff3a72", glow:"#ff8aae", edge:"#ffc0d4", txt:"#3a002a" },
  512:  { fill:"#c63aff", glow:"#dc8aff", edge:"#ecc0ff", txt:"#fff" },
  1024: { fill:"#7a3aff", glow:"#a989ff", edge:"#d3c0ff", txt:"#fff" },
  2048: { fill:"#fff060", glow:"#ffffff", edge:"#ffffff", txt:"#2a2200" }
};
function colorOf(v){
  return TILE_COLORS[v] || TILE_COLORS[2048];
}

/* ====== ステージデータ ====== */
const TILE_R = 38;     // タイル半径
const LOCK_R = 44;     // ロック半径

/* -------------------------------------------------------
   10 ステージ構成（2 段階学習曲線を維持）

   ◆ 前半 St1 群（St1〜St5）= 操作理解 + コア体験 / 1〜3 操作
     - St1 ホバー＝吸引（操作ロジック理解）
     - St2 極性切替の体感（ギミック理解）
     - St3 ロック領域回避（勝敗条件理解）
     - St4 反発の活用導入（吸引だけでは届かない配置）
     - St5 短い一直線連鎖（前半の総まとめ）

   ◆ 後半 St2 群（St6〜St10）= 思考 + 応用 / 4〜7 操作
     - St6 4 連鎖チェーン（連鎖最適化の導入）
     - St7 ロック多重 + 迂回連鎖（空間思考）
     - St8 5 操作の精密連鎖（128 到達）
     - St9 極性切替を組み込む複合制御（256 到達）
     - St10 全要素統合・最適化（512 到達 / 最大 7 操作）
   ------------------------------------------------------- */
const STAGES = [
  // ===== 前半 St1 群：操作理解 + コア体験 =====

  // St1: 操作ロジック理解 — 4 つの 2 をホバー吸引で 8 まで連鎖
  {
    name: "INTRO",
    goal: "ホバーで 4 つの 2 を吸引、連鎖で 8 を作れ",
    hint: "盤面中央にマウスを置くだけ",
    targetValue: 8,
    locks: [],
    walls: [],
    tiles: [
      { v:2, x:0.30, y:0.40 },
      { v:2, x:0.70, y:0.40 },
      { v:2, x:0.30, y:0.70 },
      { v:2, x:0.70, y:0.70 }
    ],
    expectedOps: 3
  },
  // St2: ギミック理解 — 極性切替の効果を体感しつつ 16 まで連鎖
  {
    name: "POLARITY",
    goal: "左クリックで磁極反転。反発を試しつつ 16 を作れ",
    hint: "左クリックで青(吸引)↔橙(反発)が切り替わる",
    targetValue: 16,
    locks: [],
    walls: [],
    tiles: [
      { v:2, x:0.25, y:0.30 },
      { v:2, x:0.75, y:0.30 },
      { v:4, x:0.25, y:0.55 },
      { v:4, x:0.75, y:0.55 },

      { v:8, x:0.75, y:0.78 }
    ],
    expectedOps: 3
  },
  // St3: 勝敗条件理解 — ロック領域。誤ホバーで盤面ロック=リトライ
  {
    name: "LOCK ZONE",
    goal: "赤いロック領域を避けて 16 を作れ",
    hint: "赤い円に磁界を入れると盤面ロック→リトライ",
    targetValue: 16,
    locks: [
      { x:0.50, y:0.55, r:0.12 }
    ],
    walls: [],
    tiles: [
      { v:2, x:0.22, y:0.30 },
      { v:2, x:0.78, y:0.30 },
      { v:4, x:0.22, y:0.50 },
      { v:4, x:0.78, y:0.50 },
      { v:8, x:0.22, y:0.78 },
      { v:8, x:0.78, y:0.78 }
    ],
    expectedOps: 3
  },
  // St4: 反発の活用導入 — 吸引だけでは届かない左右対称配置を反発で寄せる
  {
    name: "REPULSE",
    goal: "反発を使ってタイルを中央へ集め、16 を作れ",
    hint: "外周の同値を反発で内側へ押し込む",
    targetValue: 16,
    locks: [],
    walls: [],
    tiles: [
      { v:2, x:0.18, y:0.34 },
      { v:2, x:0.82, y:0.34 },
      { v:4, x:0.18, y:0.66 },
      { v:4, x:0.82, y:0.66 },
      { v:8, x:0.40, y:0.50 },
      { v:8, x:0.60, y:0.50 }
    ],
    expectedOps: 3
  },
  // St5: 前半総まとめ — 3 操作一直線連鎖で 32 へ
  {
    name: "FLOW",
    goal: "4→8→16→32 と一直線に連鎖させろ",
    hint: "中央へホバーして連続合体",
    targetValue: 32,
    locks: [
      { x:0.50, y:0.28, r:0.09 }
    ],
    walls: [],
    tiles: [
      { v:4,  x:0.22, y:0.48 },
      { v:4,  x:0.78, y:0.48 },
      { v:8,  x:0.50, y:0.62 },
      { v:16, x:0.50, y:0.76 }
    ],
    expectedOps: 3
  },

  // ===== 後半 St2 群：思考 + 応用 =====

  // St6: 連鎖最適化の導入 — 4 連鎖チェーンで 32
  {
    name: "CHAIN",
    goal: "ロックを避け、2→4→8→16→32 と積み上げよ",
    hint: "合体させたいペアの中間にホバー",
    targetValue: 32,
    locks: [
      { x:0.50, y:0.30, r:0.10 }
    ],
    walls: [],
    tiles: [
      { v:2,  x:0.22, y:0.50 },
      { v:2,  x:0.78, y:0.50 },
      { v:4,  x:0.50, y:0.62 },
      { v:8,  x:0.25, y:0.78 },
      { v:16, x:0.75, y:0.78 }
    ],
    expectedOps: 4
  },
  // St7: 空間思考 — ロック多重、迂回しながら 64 へ
  {
    name: "DETOUR",
    goal: "2 つのロックを迂回して 64 を作れ",
    hint: "左右のロックの間を縫って連鎖",
    targetValue: 64,
    locks: [
      { x:0.32, y:0.42, r:0.09 },
      { x:0.68, y:0.42, r:0.09 }
    ],
    walls: [],
    tiles: [
      { v:2,  x:0.22, y:0.62 },
      { v:2,  x:0.78, y:0.62 },
      { v:4,  x:0.50, y:0.55 },
      { v:8,  x:0.30, y:0.80 },
      { v:16, x:0.70, y:0.80 },
      { v:32, x:0.50, y:0.88 }
    ],
    expectedOps: 5
  },
  // St8: 精密連鎖 — 5 操作で 128 到達
  {
    name: "PRECISION",
    goal: "5 操作で 128 を作れ",
    hint: "順に下へホバーを移し精密に連鎖",
    targetValue: 128,
    locks: [
      { x:0.50, y:0.22, r:0.08 }
    ],
    walls: [],
    tiles: [
      { v:2,  x:0.24, y:0.40 },
      { v:2,  x:0.76, y:0.40 },
      { v:4,  x:0.50, y:0.48 },
      { v:8,  x:0.26, y:0.62 },
      { v:16, x:0.74, y:0.62 },
      { v:32, x:0.36, y:0.78 },
      { v:64, x:0.64, y:0.78 }
    ],
    expectedOps: 6
  },
  // St9: 複合制御 — 極性切替を組み込み 256 へ
  {
    name: "VORTEX",
    goal: "吸引と反発を切替えながら 256 を作れ",
    hint: "詰まったら反発で散らして組み直す",
    targetValue: 256,
    locks: [
      { x:0.30, y:0.30, r:0.08 },
      { x:0.70, y:0.30, r:0.08 }
    ],
    walls: [],

      { v:2,   x:0.22, y:0.52 },
      { v:2,   x:0.78, y:0.52 },
      { v:4,   x:0.50, y:0.46 },
      { v:8,   x:0.26, y:0.66 },
      { v:16,  x:0.74, y:0.66 },
      { v:32,  x:0.36, y:0.80 },
      { v:64,  x:0.64, y:0.80 },
      { v:128, x:0.50, y:0.88 }
    ],
    expectedOps: 7
  },
  // St10: 全要素統合 — ロック多重 + 極性 + 精密、512 到達（最終）
  {
    name: "MAESTRO",
    goal: "全ての磁界を制し、512 を作れ",
    hint: "ロックを避け吸引と反発を駆使せよ",
    targetValue: 512,
    locks: [
      { x:0.50, y:0.18, r:0.08 },
      { x:0.22, y:0.50, r:0.07 },
      { x:0.78, y:0.50, r:0.07 },
      { x:0.50, y:0.86, r:0.08 }
    ],
    walls: [],
    tiles: [
      { v:4,   x:0.36, y:0.36 },
      { v:4,   x:0.64, y:0.36 },
      { v:8,   x:0.50, y:0.44 },
      { v:16,  x:0.38, y:0.56 },
      { v:32,  x:0.62, y:0.56 },
      { v:64,  x:0.38, y:0.66 },
      { v:128, x:0.62, y:0.66 },
      { v:256, x:0.50, y:0.74 }
    ],
    expectedOps: 7
  }
];

/* ====== ゲーム状態 ====== */
let state = {
  stageIdx: 0,
  tiles: [],
  locks: [],
  walls: [],
  mouse: { x: W/2, y: H/2, inside:false },
  polarity: +1,        // +1 = attract, -1 = repel
  ops: 0,
  cleared: false,
  locked: false,       // ロック領域に侵入したか
  goalValue: 4,
  particles: [],
  shockwaves: [],
  bolts: [],
  blackhole: null,
  cameraShake: 0,
  filings: [],          // 金属粉
  timeStart: 0,
  running: false
};

/* ====== 入力 ====== */
function setMouseFromEvent(e) {
  const r = canvas.getBoundingClientRect();
  let cx, cy;
  if (e.touches && e.touches[0]) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
  else { cx = e.clientX; cy = e.clientY; }
  state.mouse.x = cx - r.left;
  state.mouse.y = cy - r.top;
  state.mouse.inside = state.mouse.x >= 0 && state.mouse.x <= W && state.mouse.y >= 0 && state.mouse.y <= H;
}
canvas.addEventListener("mousemove", e => { setMouseFromEvent(e); });
canvas.addEventListener("pointermove", e => { setMouseFromEvent(e); });
canvas.addEventListener("touchmove", e => { setMouseFromEvent(e); e.preventDefault(); }, {passive:false});
canvas.addEventListener("touchstart", e => { setMouseFromEvent(e); });
canvas.addEventListener("mouseenter", () => { state.mouse.inside = true; });
canvas.addEventListener("mouseleave", () => { state.mouse.inside = false; });

// 左クリックで極性反転
function togglePolarity() {
  if (!state.running || state.cleared || state.locked) return;
  state.polarity *= -1;
  updatePolarityBadge();
  state.ops += 1;
  updateOpsUI();
  // 衝撃波
  state.shockwaves.push({ x: state.mouse.x, y: state.mouse.y, r: 10, alpha: 1, color: state.polarity > 0 ? "#7fdcff" : "#ffb066" });
  for (let i = 0; i < 30; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 4 + Math.random() * 6;
    state.particles.push({
      x: state.mouse.x, y: state.mouse.y,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 40 + Math.random() * 30, max: 70,
      color: state.polarity > 0 ? "#7fdcff" : "#ffb066",
      size: 2 + Math.random() * 2
    });
  }
  triggerFlash(0.3);
}
canvas.addEventListener("mousedown", e => {
  if (e.button === 0) togglePolarity();
});
canvas.addEventListener("pointerdown", e => {
  // pointerdown は mousedown と重複するため、touch のみ反応
  if (e.pointerType === "touch") togglePolarity();
});

/* ====== UI 更新 ====== */
const uiStage = document.getElementById("ui-stage");
const uiMoves = document.getElementById("ui-moves");
const uiBottom = document.getElementById("ui-bottom");
const polarityBadge = document.getElementById("polarity-badge");
function updatePolarityBadge() {
  if (state.polarity > 0) {
    polarityBadge.textContent = "ATTRACT";
    polarityBadge.className = "attract";
  } else {
    polarityBadge.textContent = "REPEL";
    polarityBadge.className = "repel";
  }
}
function updateOpsUI() { uiMoves.textContent = state.ops; }
function updateStageUI() { uiStage.textContent = (state.stageIdx + 1) + " / " + STAGES.length; }
function updateGoalUI(text) { uiBottom.textContent = text; }

/* ====== ステージ初期化 ====== */
function loadStage(idx) {
  const def = STAGES[idx];
  state.stageIdx = idx;
  state.tiles = def.tiles.map((t, i) => ({
    id: i,
    v: t.v,
    x: t.x * W,
    y: t.y * H,
    vx: 0, vy: 0,
    r: TILE_R,
    alive: true,
    born: 0,
    pulse: 0,
    mergeAnim: 0
  }));
  state.locks = (def.locks || []).map(l => ({ x: l.x * W, y: l.y * H, r: l.r * Math.min(W,H) }));
  state.walls = (def.walls || []);
  state.polarity = +1;
  state.ops = 0;
  state.cleared = false;
  state.locked = false;
  state.goalValue = def.targetValue;
  state.particles = [];
  state.shockwaves = [];
  state.bolts = [];
  state.blackhole = null;
  state.cameraShake = 0;
  state.filings = makeFilings();
  state.timeStart = performance.now();
  state.running = true;
  document.getElementById("lockfx").classList.remove("show");

  updateStageUI();
  updateOpsUI();
  updatePolarityBadge();
  updateGoalUI(def.goal);

  // ステージタイトル演出
  const sta = document.getElementById("stage-title-anim");
  document.getElementById("sta-num").textContent = (idx + 1);
  document.getElementById("sta-nm").textContent = def.name;
  sta.classList.remove("show");
  void sta.offsetWidth;
  sta.classList.add("show");

  // ヒント表示
  const hint = document.getElementById("hint");
  hint.textContent = def.hint;
  hint.classList.add("show");
  setTimeout(() => hint.classList.remove("show"), 2800);
}

function makeFilings() {
  const arr = [];
  const n = 140;
  for (let i = 0; i < n; i++) {
    arr.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: 0, vy: 0,
      a: Math.random() * Math.PI * 2,
      base: 0.35 + Math.random() * 0.45
    });
  }
  return arr;
}

/* ====== 物理 ====== */
function step(dt) {
  if (!state.running) return;

  // ロック領域チェック
  if (!state.locked && state.mouse.inside) {
    for (const lk of state.locks) {
      const dx = state.mouse.x - lk.x, dy = state.mouse.y - lk.y;
      if (dx*dx + dy*dy < lk.r * lk.r) {
        triggerLock();
        break;
      }
    }
  }

  // タイル更新
  const mx = state.mouse.x, my = state.mouse.y;
  const active = state.mouse.inside && !state.locked && !state.cleared;
  const pol = state.polarity;

  for (const t of state.tiles) {
    if (!t.alive) continue;
    t.pulse *= 0.92;
    if (t.mergeAnim > 0) t.mergeAnim -= dt * 3;
    if (active) {
      const dx = mx - t.x, dy = my - t.y;
      const dist2 = dx*dx + dy*dy;
      const dist = Math.sqrt(dist2) + 0.001;
      // 力 = K * sign(pol) / dist
      // 範囲制限：距離 < 380 のみ
      const RANGE = 380;
      if (dist < RANGE) {
        const falloff = (1 - dist / RANGE);
        const K = 1.05 * pol * falloff;
        const fx = (dx / dist) * K;
        const fy = (dy / dist) * K;
        t.vx += fx * dt * 60 * 0.45;
        t.vy += fy * dt * 60 * 0.45;
      }
    }
    // 減衰
    t.vx *= 0.86;
    t.vy *= 0.86;
    t.x += t.vx;
    t.y += t.vy;

    // 壁
    const pad = t.r + 4;
    if (t.x < pad) { t.x = pad; t.vx *= -0.5; }
    if (t.x > W - pad) { t.x = W - pad; t.vx *= -0.5; }
    if (t.y < pad + 90) { t.y = pad + 90; t.vy *= -0.5; }
    if (t.y > H - pad - 50) { t.y = H - pad - 50; t.vy *= -0.5; }

    // ロック領域の境界では反射（タイル自体は通れない）
    for (const lk of state.locks) {
      const ddx = t.x - lk.x, ddy = t.y - lk.y;
      const dd = Math.sqrt(ddx*ddx + ddy*ddy);
      const min = lk.r + t.r * 0.4;
      if (dd < min) {
        const nx = ddx / (dd + 0.001), ny = ddy / (dd + 0.001);
        t.x = lk.x + nx * min;
        t.y = lk.y + ny * min;
        const dot = t.vx * nx + t.vy * ny;
        t.vx -= 2 * dot * nx * 0.6;
        t.vy -= 2 * dot * ny * 0.6;
      }
    }
  }

  // タイル間衝突＆合体
  for (let i = 0; i < state.tiles.length; i++) {
    const a = state.tiles[i];
    if (!a.alive) continue;
    for (let j = i + 1; j < state.tiles.length; j++) {
      const b = state.tiles[j];
      if (!b.alive) continue;
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      const min = a.r + b.r;
      if (d < min) {
        if (a.v === b.v && a.mergeAnim <= 0 && b.mergeAnim <= 0) {
          // 合体
          doMerge(a, b);
        } else {
          // 押し戻し
          const nx = dx / (d + 0.001), ny = dy / (d + 0.001);
          const overlap = (min - d) * 0.5;
          a.x -= nx * overlap; a.y -= ny * overlap;
          b.x += nx * overlap; b.y += ny * overlap;
          const va = a.vx * nx + a.vy * ny;
          const vb = b.vx * nx + b.vy * ny;
          const exchange = (va - vb) * 0.6;
          a.vx -= exchange * nx; a.vy -= exchange * ny;
          b.vx += exchange * nx; b.vy += exchange * ny;
        }
      }
    }
  }

  // パーティクル
  for (const p of state.particles) {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.94; p.vy *= 0.94;
    p.life -= 1;
  }
  state.particles = state.particles.filter(p => p.life > 0);

  // ショックウェーブ
  for (const s of state.shockwaves) {
    s.r += 6;
    s.alpha *= 0.94;
  }
  state.shockwaves = state.shockwaves.filter(s => s.alpha > 0.02);

  // 電撃
  for (const b of state.bolts) {
    b.life -= 1;
  }
  state.bolts = state.bolts.filter(b => b.life > 0);

  // 金属粉
  for (const f of state.filings) {
    if (active) {
      const dx = mx - f.x, dy = my - f.y;
      const d = Math.sqrt(dx*dx + dy*dy) + 0.01;
      if (d < 260) {
        const k = pol * 0.6 * (1 - d / 260);
        f.vx += (dx / d) * k;
        f.vy += (dy / d) * k;
        f.a = Math.atan2(dy * pol, dx * pol);
      }
    }
    f.vx *= 0.9; f.vy *= 0.9;
    f.x += f.vx; f.y += f.vy;
    if (f.x < 0) f.x = W; if (f.x > W) f.x = 0;
    if (f.y < 0) f.y = H; if (f.y > H) f.y = 0;
  }

  // ブラックホール演出
  if (state.blackhole) {
    state.blackhole.t += dt;
    state.blackhole.r += 4;
    for (const t of state.tiles) {
      const dx = state.blackhole.x - t.x;
      const dy = state.blackhole.y - t.y;
      const d = Math.sqrt(dx*dx + dy*dy) + 0.01;
      t.x += (dx / d) * 8;
      t.y += (dy / d) * 8;
      t.r *= 0.96;
    }
  }

  // カメラ振動
  state.cameraShake *= 0.86;
}

function doMerge(a, b) {
  const nv = a.v * 2;
  const cx = (a.x + b.x) / 2;
  const cy = (a.y + b.y) / 2;
  a.alive = false;
  b.alive = false;

  // 新タイル生成
  const nt = {
    id: Date.now() + Math.random(),
    v: nv,
    x: cx, y: cy,
    vx: (a.vx + b.vx) * 0.3,
    vy: (a.vy + b.vy) * 0.3,
    r: TILE_R,
    alive: true,
    born: performance.now(),
    pulse: 1.0,
    mergeAnim: 1.0
  };
  state.tiles.push(nt);

  // 操作カウント (合体イベント = 1 操作)
  state.ops += 1;
  updateOpsUI();

  // エフェクト
  const col = colorOf(nv);
  // パーティクル
  for (let i = 0; i < 50 + Math.min(80, nv); i++) {
    const a2 = Math.random() * Math.PI * 2;
    const sp = 3 + Math.random() * (6 + nv * 0.04);
    state.particles.push({
      x: cx, y: cy,
      vx: Math.cos(a2) * sp, vy: Math.sin(a2) * sp,
      life: 40 + Math.random() * 40, max: 80,
      color: col.glow,
      size: 2 + Math.random() * 3
    });
  }
  // ショックウェーブ
  state.shockwaves.push({ x: cx, y: cy, r: 18, alpha: 1, color: col.glow });
  state.shockwaves.push({ x: cx, y: cy, r: 6,  alpha: .8, color: col.edge });

  // 電磁パルス（高数値）
  if (nv >= 16) {
    for (let i = 0; i < 6 + Math.min(10, nv / 16); i++) {
      const ang = Math.random() * Math.PI * 2;
      const len = 60 + Math.random() * 150;
      state.bolts.push({
        x1: cx, y1: cy,
        x2: cx + Math.cos(ang) * len,
        y2: cy + Math.sin(ang) * len,
        life: 14 + Math.random() * 8,
        color: col.glow,
        zig: 4 + Math.random() * 8
      });
    }
    state.cameraShake = Math.min(14, 4 + nv * 0.1);
    triggerFlash(Math.min(.8, .25 + nv * 0.005));
  } else {
    triggerFlash(.15);
  }

  // クリア判定
  checkClear();
}

function checkClear() {
  // 各ステージの targetValue 以上を作ったらクリア
  for (const t of state.tiles) {
    if (t.alive && t.v >= state.goalValue) {
      triggerClear();
      return;
    }
  }
}

let lockCooldown = 0;
function triggerLock() {
  if (state.locked) return;
  state.locked = true;
  document.getElementById("lockfx").classList.add("show");
  state.cameraShake = 18;
  triggerFlash(.5);
  // タイル即停止
  for (const t of state.tiles) { t.vx = 0; t.vy = 0; }
  // 強制リトライ
  setTimeout(() => {
    loadStage(state.stageIdx);
  }, 1300);
}

function triggerFlash(amount) {
  const f = document.getElementById("flash");
  f.style.transition = "none";
  f.style.opacity = String(amount);
  requestAnimationFrame(() => {
    f.style.transition = "opacity .4s ease-out";
    f.style.opacity = "0";
  });
}

function triggerClear() {
  if (state.cleared) return;
  state.cleared = true;
  state.running = false;
  // 最終演出：ブラックホール
  // 中央に作成
  let cx = 0, cy = 0, n = 0;
  for (const t of state.tiles) if (t.alive) { cx += t.x; cy += t.y; n++; }
  if (n > 0) { cx /= n; cy /= n; }
  state.blackhole = { x: cx, y: cy, r: 10, t: 0 };
  state.cameraShake = 18;

  // CLEAR テキスト
  const cb = document.getElementById("clear-burst");
  cb.classList.remove("show");
  void cb.offsetWidth;
  cb.classList.add("show");
  triggerFlash(.7);

  setTimeout(() => {
    // 大爆発
    for (let i = 0; i < 220; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 3 + Math.random() * 14;
      state.particles.push({
        x: cx, y: cy,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 60 + Math.random() * 60, max: 120,
        color: ["#fff060","#ff8a32","#ff3a72","#7fdcff"][Math.floor(Math.random()*4)],
        size: 2 + Math.random() * 4
      });
    }
    state.cameraShake = 22;
    triggerFlash(1.0);
  }, 700);

  // 次ステージへ or ゲーム終了
  setTimeout(() => {
    if (state.stageIdx + 1 < STAGES.length) {
      loadStage(state.stageIdx + 1);
    } else {
      showFinalOverlay();
    }
  }, 2400);
}

/* ====== 描画 ====== */
function draw() {
  const shx = (Math.random() - .5) * state.cameraShake;
  const shy = (Math.random() - .5) * state.cameraShake;

  ctx.setTransform(DPR, 0, 0, DPR, shx * DPR, shy * DPR);

  // 背景
  ctx.fillStyle = "#04060d";
  ctx.fillRect(0, 0, W, H);

  // 背景グリッド・ガイド
  drawGuideGrid();

  // ロック領域
  drawLocks();

  // 金属粉
  drawFilings();

  // 磁界
  drawMagneticField();

  // タイル
  drawTiles();

  // ショックウェーブ
  for (const s of state.shockwaves) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.strokeStyle = s.color;
    ctx.globalAlpha = s.alpha;
    ctx.lineWidth = 3;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // 電撃
  for (const b of state.bolts) {
    drawBolt(b);
  }

  // パーティクル
  for (const p of state.particles) {
    const a = Math.max(0, p.life / p.max);
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // ブラックホール
  if (state.blackhole) {
    const bh = state.blackhole;
    const grad = ctx.createRadialGradient(bh.x, bh.y, 0, bh.x, bh.y, bh.r * 2);
    grad.addColorStop(0, "rgba(0,0,0,1)");
    grad.addColorStop(.6, "rgba(40,10,80,.8)");
    grad.addColorStop(1, "rgba(180,80,255,0)");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(bh.x, bh.y, bh.r * 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "rgba(255,255,255,.8)";
    ctx.lineWidth = 2;
    for (let k = 0; k < 4; k++) {
      ctx.beginPath();
      ctx.arc(bh.x, bh.y, bh.r + k * 8, 0, Math.PI * 2);
      ctx.globalAlpha = .2 - k * .04;
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // カーソル円
  if (state.mouse.inside && !state.cleared && !state.locked) {
    drawCursor();
  }
}

function drawGuideGrid() {
  ctx.save();
  ctx.strokeStyle = "rgba(60,120,200,.06)";
  ctx.lineWidth = 1;
  const step = 60;
  for (let x = 0; x < W; x += step) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += step) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.restore();
}

function drawLocks() {
  const tt = performance.now() / 1000;
  for (const lk of state.locks) {
    const pulse = 0.5 + Math.sin(tt * 4) * 0.5;
    const g = ctx.createRadialGradient(lk.x, lk.y, 0, lk.x, lk.y, lk.r);
    g.addColorStop(0, `rgba(255,60,60,${0.35 + pulse * 0.2})`);
    g.addColorStop(0.7, `rgba(180,30,30,${0.2 + pulse * 0.15})`);
    g.addColorStop(1, "rgba(120,10,10,0)");
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(lk.x, lk.y, lk.r, 0, Math.PI * 2);
    ctx.fill();

    // 渦巻きライン
    ctx.strokeStyle = `rgba(255,80,80,${0.4 + pulse * 0.3})`;
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 6]);
    ctx.beginPath();
    ctx.arc(lk.x, lk.y, lk.r * 0.85, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);

    // 警告アイコン
    ctx.fillStyle = `rgba(255,200,200,${0.7 + pulse * 0.3})`;
    ctx.font = "bold 18px system-ui";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("✕", lk.x, lk.y);
  }
}

function drawFilings() {
  ctx.save();
  for (const f of state.filings) {
    ctx.globalAlpha = f.base;
    ctx.strokeStyle = "rgba(160,200,255,.6)";
    ctx.lineWidth = 1.2;
    const L = 4;
    ctx.beginPath();
    ctx.moveTo(f.x - Math.cos(f.a) * L, f.y - Math.sin(f.a) * L);
    ctx.lineTo(f.x + Math.cos(f.a) * L, f.y + Math.sin(f.a) * L);
    ctx.stroke();
  }
  ctx.restore();
}

function drawMagneticField() {
  if (!state.mouse.inside) return;
  if (state.cleared || state.locked) return;
  const mx = state.mouse.x, my = state.mouse.y;
  const tt = performance.now() / 1000;
  const pol = state.polarity;

  // 中心のコア光
  const baseCol = pol > 0 ? "120,200,255" : "255,160,80";
  const g = ctx.createRadialGradient(mx, my, 0, mx, my, 200);
  g.addColorStop(0, `rgba(${baseCol},.55)`);
  g.addColorStop(0.3, `rgba(${baseCol},.2)`);
  g.addColorStop(1, `rgba(${baseCol},0)`);
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(mx, my, 200, 0, Math.PI * 2);
  ctx.fill();

  // 渦巻き磁界ライン
  ctx.save();
  ctx.translate(mx, my);
  ctx.rotate(tt * pol * 0.8);
  for (let i = 0; i < 5; i++) {
    const r0 = 20 + i * 22;
    ctx.beginPath();
    for (let a = 0; a < Math.PI * 2 + 0.1; a += 0.15) {
      const rad = r0 + Math.sin(a * 3 + tt * 4 * pol) * 6;
      const x = Math.cos(a) * rad;
      const y = Math.sin(a) * rad;
      if (a === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = `rgba(${baseCol},${0.5 - i * 0.08})`;
    ctx.lineWidth = 1.6;
    ctx.stroke();
  }
  ctx.restore();

  // 中央コア
  ctx.beginPath();
  ctx.arc(mx, my, 8, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(${baseCol},1)`;
  ctx.shadowColor = `rgba(${baseCol},.9)`;
  ctx.shadowBlur = 20;
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawTiles() {
  const tt = performance.now() / 1000;
  for (const t of state.tiles) {
    if (!t.alive) continue;
    const col = colorOf(t.v);

    const scale = 1 + t.pulse * 0.3 + t.mergeAnim * 0.5;
    const rr = t.r * scale;

    // グロー
    const g = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, rr * 2.2);
    g.addColorStop(0, hexA(col.glow, 0.7));
    g.addColorStop(0.4, hexA(col.glow, 0.25));
    g.addColorStop(1, hexA(col.glow, 0));
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(t.x, t.y, rr * 2.2, 0, Math.PI * 2);
    ctx.fill();

    // 本体
    const bg = ctx.createRadialGradient(t.x - rr * 0.3, t.y - rr * 0.3, 0, t.x, t.y, rr);
    bg.addColorStop(0, col.edge);
    bg.addColorStop(0.5, col.fill);
    bg.addColorStop(1, shade(col.fill, -.3));
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.arc(t.x, t.y, rr, 0, Math.PI * 2);
    ctx.fill();

    // 外枠
    ctx.strokeStyle = col.edge;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(t.x, t.y, rr, 0, Math.PI * 2);
    ctx.stroke();

    // 内側リング
    ctx.strokeStyle = hexA(col.edge, 0.4);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(t.x, t.y, rr * 0.78, 0, Math.PI * 2);
    ctx.stroke();

    // 数値
    const fs = Math.max(14, rr * 0.7);
    ctx.font = `900 ${fs}px system-ui`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = col.txt;
    ctx.shadowColor = hexA(col.glow, 0.8);
    ctx.shadowBlur = 12;
    ctx.fillText(String(t.v), t.x, t.y + 1);
    ctx.shadowBlur = 0;
  }
}

function drawCursor() {
  // 既に drawMagneticField で描画
}

function drawBolt(b) {
  ctx.strokeStyle = b.color;
  ctx.lineWidth = 2 + Math.random() * 2;
  ctx.shadowColor = b.color;
  ctx.shadowBlur = 18;
  ctx.beginPath();
  const segments = 10;
  let x = b.x1, y = b.y1;
  ctx.moveTo(x, y);
  for (let i = 1; i <= segments; i++) {
    const t = i / segments;
    const lx = b.x1 + (b.x2 - b.x1) * t;
    const ly = b.y1 + (b.y2 - b.y1) * t;
    const nx = lx + (Math.random() - .5) * b.zig * 2;
    const ny = ly + (Math.random() - .5) * b.zig * 2;
    ctx.lineTo(nx, ny);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function hexA(hex, a) {
  const h = hex.replace("#", "");
  const r = parseInt(h.substr(0,2),16);
  const g = parseInt(h.substr(2,2),16);
  const b = parseInt(h.substr(4,2),16);
  return `rgba(${r},${g},${b},${a})`;
}
function shade(hex, amt) {
  const h = hex.replace("#", "");
  let r = parseInt(h.substr(0,2),16);
  let g = parseInt(h.substr(2,2),16);
  let b = parseInt(h.substr(4,2),16);
  r = Math.max(0, Math.min(255, Math.floor(r + r * amt)));
  g = Math.max(0, Math.min(255, Math.floor(g + g * amt)));
  b = Math.max(0, Math.min(255, Math.floor(b + b * amt)));
  return `rgb(${r},${g},${b})`;
}

/* ====== メインループ (16ms 想定) ====== */
let lastT = performance.now();
function loop() {
  const now = performance.now();
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  step(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
