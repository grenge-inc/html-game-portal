<!DOCTYPE html>
<!--
  Phone frame template for hybrid-casual-mentor generated games.
  Aspect ratio: 9:19.5 (iPhone X 系縦長, NEONNOVA2048 基準)。
  PC で開いても常にこの比率を保ち、letterbox（左右黒帯）で中央表示。
  すべてのゲーム要素は #phone の子として配置すること。
-->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>ドラッグ・マージライン</title>
<style>
  :root {
    --phone-aspect: 9 / 19.5; /* スマホ縦長基準 (iPhone X 以降) */
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html, body {
    width:100%; height:100%;
    overflow:hidden;
    background:var(--bg-deep);  /* letterbox 部分の色 */
    color:var(--text-main);
    font-family:'Helvetica Neue', system-ui, sans-serif;
    user-select:none;
    -webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
  }
  body {
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #phone {
    position:relative;
    overflow:hidden;
    /* 画面に収まる最大の 9:19.5 矩形 */
    width:  min(100vw, calc(100vh * 9 / 19.5));
    height: min(100vh, calc(100vw * 19.5 / 9));
    --pw:   min(100vw, calc(100vh * 9 / 19.5));
    --ph:   min(100vh, calc(100vw * 19.5 / 9));
    --u:    calc(var(--pw) / 100); /* 1u  = phone 幅 1% */
    --uh:   calc(var(--ph) / 100); /* 1uh = phone 高 1% */
    background:var(--bg-deep);     /* phone 内の基調色（下の #phone ルールで上書き） */
  }

  /* ===== color tokens ===== */
  :root{
    --bg-deep:#02030a; --bg-mid:#0a1430; --bg-panel:#06081a; --bg-card:#0b1228;
    --line:#1a2848;
    --cyan:#6ff; --cyan-soft:#8df; --cyan-grad-1:#3df; --cyan-grad-2:#06a;
    --hp-pink:#ff8aa0; --warn:#ffb86c; --danger-deep:#a33;
    --text-main:#eaf3ff; --text-sub:#cdddef; --text-dim:#7a92b5;
    --nova-9:#ffd76b; --nova-7:#ffb24a; --nova-5:#ff7a3a; --nova-3:#ff5d8a; --nova-1:#b585ff; --nova-0:#ffffff;
    /* 値強度ごとのグラデ濃色側（spec 演出メモの強度遷移） */
    --v2-deep:var(--cyan-grad-2);
    --v4-deep:#7a4fd4; --v4-glow:#6a3fc4;
    --v8-deep:#c43a68; --v8-glow:#a32f56;
    --v16-deep:#cc5520; --v16-glow:#b34a1c;
    --v32-deep:#d4862a; --v32-glow:#b3701f;
    --v64-deep:#e0b040;
    --v128-deep:#3fd49a; --v128-glow:#2fb37f;
    --v256-deep:#3f8fd4; --v256-glow:#2f6fb3;
    --v512-deep:#9a5cff; --v512-glow:#7f3fdf;
    --player:#6ff; --player-core:#eaffff;
  }
  html,body{ background:var(--bg-deep); color:var(--text-main); }
  #phone{
    background:
      radial-gradient(120% 90% at 50% 14%, var(--bg-mid) 0%, var(--bg-deep) 72%),
      var(--bg-deep);
    color:var(--text-main);
  }
  /* 環境演出：奥行きグリッドのアンビエントライン */
  #phone::before{
    content:''; position:absolute; inset:0; pointer-events:none; z-index:0;
    opacity:.5;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:calc(11*var(--u)) calc(11*var(--u));
    -webkit-mask-image:radial-gradient(80% 60% at 50% 45%, #000 0%, transparent 80%);
            mask-image:radial-gradient(80% 60% at 50% 45%, #000 0%, transparent 80%);
  }
  #phone>*{ position:absolute; z-index:1; }

  /* ===== title & HUD ===== */
  #title{
    position:absolute; top:calc(2.2*var(--uh)); left:0; right:0;
    text-align:center; font-size:calc(3.4*var(--u)); font-weight:800;
    letter-spacing:.3em;
    background:linear-gradient(100deg,var(--cyan-soft),var(--cyan-grad-1),var(--player-core));
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent; color:transparent;
    filter:drop-shadow(0 0 calc(1.4*var(--u)) var(--cyan-grad-2));
  }
  #hud{
    position:absolute; top:calc(5.6*var(--uh)); left:calc(4*var(--u)); right:calc(4*var(--u));
    display:flex; align-items:stretch; justify-content:space-between; gap:calc(1.4*var(--u));
  }
  .badge{
    background:linear-gradient(180deg,var(--bg-card),var(--bg-panel));
    border:1px solid var(--line);
    border-radius:calc(2*var(--u)); padding:calc(1.2*var(--u)) calc(1.8*var(--u));
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-width:calc(16*var(--u));
    box-shadow:0 calc(.4*var(--u)) calc(1.6*var(--u)) rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05);
  }
  .badge.goal{ border-color:var(--nova-7); box-shadow:0 0 calc(2.2*var(--u)) rgba(255,178,74,.4), inset 0 1px 0 rgba(255,255,255,.06); }
  .badge .bl{ font-size:calc(1.8*var(--u)); color:var(--text-dim); letter-spacing:.14em; }
  .badge .bv{ font-size:calc(3.4*var(--u)); font-weight:800; color:var(--text-main); font-variant-numeric:tabular-nums; }
  #stSub{ font-size:calc(1.7*var(--u)); color:var(--cyan-soft); margin-top:calc(.4*var(--uh)); white-space:nowrap; }
  #goalVal{ color:var(--nova-9); text-shadow:0 0 calc(2*var(--u)) var(--nova-7); }
  #retryBtn{
    background:var(--bg-card); border:1px solid var(--line); color:var(--text-sub);
    border-radius:calc(2*var(--u)); padding:0 calc(2.4*var(--u));
    font-size:calc(2.4*var(--u)); font-weight:700; letter-spacing:.1em;
    font-family:inherit; cursor:pointer;
  }
  #retryBtn:active{ filter:brightness(1.5); }

  /* ===== stage progress dots ===== */
  #progress{
    position:absolute; top:calc(15.6*var(--uh)); left:calc(4*var(--u)); right:calc(4*var(--u));
    display:flex; align-items:center; justify-content:center; gap:calc(1.4*var(--u));
  }
  #progress .dot{
    width:calc(2*var(--u)); height:calc(2*var(--u)); border-radius:50%;
    background:var(--bg-card); border:1px solid var(--line);
  }
  #progress .dot.done{ background:var(--nova-9); border-color:var(--nova-7); box-shadow:0 0 calc(1.4*var(--u)) var(--nova-7); }
  #progress .dot.cur{ background:var(--cyan); border-color:var(--cyan); box-shadow:0 0 calc(1.6*var(--u)) var(--cyan-grad-1); transform:scale(1.25); }

  /* ===== board ===== */
  #board{
    position:absolute; left:calc(4*var(--u)); top:calc(20*var(--uh));
    width:calc(92*var(--u)); height:calc(92*var(--u));
    border-radius:calc(3*var(--u));
    background:var(--bg-panel);
    border:1px solid var(--line);
    box-shadow:0 0 calc(6*var(--u)) rgba(0,40,80,.55) inset;
    touch-action:none;
  }
  .cell{
    position:absolute; border-radius:14%;
    background:var(--bg-card); border:1px solid var(--line);
  }
  .cell.path{
    border-color:var(--cyan);
    background:color-mix(in srgb, var(--cyan-grad-2) 35%, var(--bg-card));
    box-shadow:0 0 calc(1.6*var(--u)) var(--cyan-grad-2) inset, 0 0 calc(1.8*var(--u)) var(--cyan-grad-1);
  }
  .tile{
    position:absolute; border-radius:14%;
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:calc(var(--tfs)*var(--u));
    color:var(--bg-deep);
    transition:transform .12s ease, filter .12s ease;
    pointer-events:none;
  }
  .v2  { background:linear-gradient(160deg,var(--cyan-grad-1),var(--v2-deep)); color:var(--player-core); box-shadow:0 0 calc(2*var(--u)) var(--cyan-grad-2), inset 0 calc(.6*var(--u)) calc(1.4*var(--u)) rgba(255,255,255,.35); }
  .v4  { background:linear-gradient(160deg,var(--nova-1),var(--v4-deep)); color:var(--nova-0); box-shadow:0 0 calc(2*var(--u)) var(--v4-glow), inset 0 calc(.6*var(--u)) calc(1.4*var(--u)) rgba(255,255,255,.3); }
  .v8  { background:linear-gradient(160deg,var(--nova-3),var(--v8-deep)); color:var(--nova-0); box-shadow:0 0 calc(2*var(--u)) var(--v8-glow), inset 0 calc(.6*var(--u)) calc(1.4*var(--u)) rgba(255,255,255,.3); }
  .v16 { background:linear-gradient(160deg,var(--nova-5),var(--v16-deep)); color:var(--nova-0); box-shadow:0 0 calc(2.4*var(--u)) var(--v16-glow), inset 0 calc(.6*var(--u)) calc(1.4*var(--u)) rgba(255,255,255,.3); }
  .v32 { background:linear-gradient(160deg,var(--nova-7),var(--v32-deep)); color:var(--bg-deep); box-shadow:0 0 calc(2.8*var(--u)) var(--v32-glow), inset 0 calc(.6*var(--u)) calc(1.4*var(--u)) rgba(255,255,255,.45); }
  .v64 { background:linear-gradient(160deg,var(--nova-9),var(--v64-deep)); color:var(--bg-deep); box-shadow:0 0 calc(4*var(--u)) var(--nova-7), inset 0 calc(.6*var(--u)) calc(1.6*var(--u)) rgba(255,255,255,.55); }
  .v128{ background:linear-gradient(160deg,#7affd0,var(--v128-deep)); color:var(--bg-deep); box-shadow:0 0 calc(4*var(--u)) var(--v128-glow), inset 0 calc(.6*var(--u)) calc(1.6*var(--u)) rgba(255,255,255,.55); }
  .v256{ background:linear-gradient(160deg,#7ac6ff,var(--v256-deep)); color:var(--bg-deep); box-shadow:0 0 calc(4*var(--u)) var(--v256-glow), inset 0 calc(.6*var(--u)) calc(1.6*var(--u)) rgba(255,255,255,.55); }
  .v512{ background:linear-gradient(160deg,#c6a0ff,var(--v512-deep)); color:var(--nova-0); box-shadow:0 0 calc(4.4*var(--u)) var(--v512-glow), inset 0 calc(.6*var(--u)) calc(1.6*var(--u)) rgba(255,255,255,.55); }
  .v1024{ background:linear-gradient(160deg,var(--nova-9),#ff7a3a); color:var(--bg-deep); box-shadow:0 0 calc(5*var(--u)) var(--nova-9), inset 0 calc(.6*var(--u)) calc(1.8*var(--u)) rgba(255,255,255,.6); }
  .tile.hit{ transform:scale(1.08); filter:brightness(1.45); }
  .tile.zap{ animation:zap .18s ease forwards; }
  @keyframes zap{ to{ transform:scale(.55); filter:brightness(2.4); opacity:.15; } }
  .tile.pop{ animation:pop .3s cubic-bezier(.2,1.6,.4,1); }
  @keyframes pop{ 0%{ transform:scale(.2); } 60%{ transform:scale(1.18); } 100%{ transform:scale(1); } }

  #pathsvg{
    position:absolute; inset:0; width:100%; height:100%;
    pointer-events:none; overflow:visible;
  }
  #pathline{
    fill:none; stroke:var(--cyan); stroke-opacity:.85;
    stroke-linecap:round; stroke-linejoin:round;
    filter:drop-shadow(0 0 6px var(--cyan-grad-1)) drop-shadow(0 0 14px var(--cyan-grad-2));
    stroke-dasharray:34 26; animation:flow .6s linear infinite;
  }
  @keyframes flow{ to{ stroke-dashoffset:-60; } }
  #preview{
    position:absolute; display:none; pointer-events:none;
    transform:translate(-50%,-135%);
    background:linear-gradient(180deg,var(--bg-card),var(--bg-panel)); border:1px solid var(--cyan);
    border-radius:calc(1.6*var(--u)); padding:calc(.8*var(--u)) calc(2*var(--u));
    font-size:calc(3*var(--u)); font-weight:800; color:var(--cyan);
    font-variant-numeric:tabular-nums;
    text-shadow:0 0 calc(1.4*var(--u)) var(--cyan-grad-2);
    box-shadow:0 0 calc(2.4*var(--u)) var(--cyan-grad-2);
    white-space:nowrap; z-index:5; animation:prevPulse .7s ease-in-out infinite;
  }
  @keyframes prevPulse{ 0%,100%{ transform:translate(-50%,-135%) scale(1); } 50%{ transform:translate(-50%,-135%) scale(1.06); } }

  #hint{
    position:absolute; bottom:calc(5*var(--uh)); left:0; right:0;
    text-align:center; font-size:calc(2.7*var(--u)); color:var(--text-dim);
    line-height:1.7;
  }

  /* ===== modal ===== */
  #modal{
    position:absolute; inset:0; display:none;
    align-items:center; justify-content:center;
    background:rgba(2,3,10,.78); backdrop-filter:blur(2px); z-index:10;
  }
  #mcard{
    width:calc(76*var(--u));
    background:var(--bg-card); border:1px solid var(--line);
    border-radius:calc(3*var(--u)); padding:calc(4*var(--uh)) calc(5*var(--u));
    text-align:center;
    box-shadow:0 0 calc(8*var(--u)) rgba(0,60,120,.45);
  }
  #mcard .mlabel{
    font-size:calc(2.6*var(--u)); color:var(--cyan-soft); letter-spacing:.3em; font-weight:700;
  }
  #mcard .msub{
    display:inline-block; margin-top:calc(1*var(--uh));
    font-size:calc(2.4*var(--u)); color:var(--text-sub);
    border:1px solid var(--line); border-radius:calc(4*var(--u));
    padding:calc(.5*var(--uh)) calc(3*var(--u)); background:var(--bg-panel);
  }
  #mcard h1{
    margin:calc(1.6*var(--uh)) 0 calc(1*var(--uh));
    font-size:calc(7.4*var(--u)); letter-spacing:.06em; color:var(--text-main);
    text-shadow:0 0 calc(3*var(--u)) var(--cyan-grad-2);
  }
  #mcard h1.gold{ color:var(--nova-9); text-shadow:0 0 calc(3*var(--u)) var(--nova-7); }
  #mcard h1.pink{ color:var(--hp-pink); text-shadow:0 0 calc(3*var(--u)) var(--danger-deep); }
  #mcard .mtext{
    font-size:calc(3*var(--u)); color:var(--text-sub); line-height:1.8;
    margin-bottom:calc(2.2*var(--uh));
  }
  #mcard .mtext b{ color:var(--nova-9); font-size:calc(3.6*var(--u)); }
  #mcard button{
    width:100%; border:none; cursor:pointer; font-family:inherit;
    background:linear-gradient(160deg,var(--cyan-grad-1),var(--cyan-grad-2));
    color:var(--bg-deep); font-size:calc(3.8*var(--u)); font-weight:800;
    letter-spacing:.18em; border-radius:calc(2*var(--u));
    padding:calc(1.6*var(--uh)) 0;
    box-shadow:0 0 calc(3*var(--u)) var(--cyan-grad-2);
  }
  #mcard button:active{ filter:brightness(1.3); }
</style>
</head>
<body>
  <div id="phone">
    <div id="title">DRAG MERGE LINE</div>
    <div id="hud">
      <div class="badge">
        <span class="bl">STAGE</span>
        <span class="bv" id="stName">1</span>
        <span id="stSub">操作理解</span>
      </div>
      <div class="badge goal">
        <span class="bl">GOAL</span>
        <span class="bv" id="goalVal">8</span>
      </div>
      <div class="badge">
        <span class="bl">MOVES</span>
        <span class="bv" id="moveVal">0</span>
      </div>
      <button id="retryBtn">RETRY</button>
    </div>
    <div id="progress"></div>
    <div id="board">
      <div id="cells"></div>
      <div id="tiles"></div>
      <svg id="pathsvg" preserveAspectRatio="none"><polyline id="pathline"/></svg>
      <div id="preview"></div>
    </div>
    <div id="hint">同じ数字をなぞって 一括マージ<br>違う数字と空マスは 通過できる（巻き込まれない）</div>
    <div id="modal"><div id="mcard"></div></div>
  </div>
  <script>
    'use strict';
    // ===== ステージ固定データ（spec.md と同一。ランダム生成なし） =====
    // tiles: [row, col, value]。座標は 0 始まり。
    const STAGES = [
      // --- St1〜3：操作理解＋コア体験（最短 1〜3 手 / 最小盤面） ---
      { rows:4, cols:4, goal:8, sub:'操作理解',
        hint:'2 を 3 枚 ひとなぞりで 8！',
        tiles:[[0,1,2],[1,1,2],[2,1,2]] },
      { rows:4, cols:4, goal:16, sub:'コア体験',
        hint:'2 を 4 枚 横になぞって 16！',
        tiles:[[1,0,2],[1,1,2],[1,2,2],[1,3,2]] },
      { rows:4, cols:4, goal:16, sub:'2 手の連結',
        hint:'まず 8 をつくり、置いてある 8 と合体！',
        tiles:[[0,0,2],[0,1,2],[0,2,2],[3,3,8],[1,2,4]] },
      // --- St4〜10：思考＋応用（ギミック追加・複数解法・最短 4〜7 手） ---
      { rows:5, cols:5, goal:32, sub:'素材づくり',
        hint:'4 を 3 枚で 16、置いてある 16 と合体して 32',
        tiles:[[0,0,4],[0,1,4],[0,2,4],[4,4,16],[2,0,2],[2,2,2]] },
      { rows:5, cols:5, goal:64, sub:'4 枚一括',
        hint:'むだなマージは 詰みのもと。8 を 4 枚そろえる',
        tiles:[[0,0,2],[0,4,2],[0,2,4],[2,0,4],[2,4,4],[2,2,8],[4,0,8]] },
      { rows:5, cols:5, goal:128, sub:'順序の設計',
        hint:'8 から 16 を量産し 4 枚そろえて 128！',
        tiles:[[0,0,8],[0,2,8],[2,0,8],[2,2,8],[0,4,16],[4,4,16]] },
      { rows:6, cols:6, goal:128, sub:'広い盤面',
        hint:'同値ペアを温存しながら 16 を 4 枚に',
        tiles:[[0,0,2],[0,1,2],[1,4,2],[1,5,2],[3,0,4],[3,1,4],[4,4,4],[4,5,4],[5,2,16],[5,3,16]] },
      { rows:6, cols:6, goal:256, sub:'長い経路',
        hint:'8→16→32 と積み上げ 32 を 4 枚で 256！',
        tiles:[[0,0,8],[0,1,8],[1,0,8],[1,1,8],[3,0,16],[3,1,16],[0,4,32],[5,5,32]] },
      { rows:6, cols:6, goal:512, sub:'過剰マージ注意',
        hint:'64 を 4 枚に。早すぎる合体は 詰みのもと',
        tiles:[[0,0,2],[0,1,2],[2,0,4],[2,1,4],[0,4,8],[0,5,8],[2,4,16],[2,5,16],[4,0,32],[4,5,32],[5,2,64],[5,3,64]] },
      { rows:6, cols:6, goal:1024, sub:'最終決戦',
        hint:'すべてを 128 にそろえ 4 枚一括で 1024！',
        tiles:[[0,0,2],[0,1,2],[1,0,4],[1,1,4],[3,0,8],[3,1,8],[4,0,16],[4,1,16],[0,4,32],[1,4,32],[3,4,64],[4,4,64],[5,2,128],[5,3,128]] }
    ];
    const GAP = 0.06; // セル間ギャップ（セル幅比）

    const $ = s => document.querySelector(s);
    const board = $('#board'), cellsEl = $('#cells'), tilesEl = $('#tiles');
    const poly = $('#pathline'), svg = $('#pathsvg'), prev = $('#preview');
    const modal = $('#modal'), mcard = $('#mcard'), progressEl = $('#progress');

    let stage = 0, R = 0, C = 0, goal = 0, moves = 0;
    let grid = [], cellMap = {}, tileMap = {};
    let path = [], drag = false, lock = true;

    // ===== 盤面構築 =====
    function geo(r, c){
      const w = 100 / C, h = 100 / R;
      return { left:(c*w + w*GAP/2)+'%', top:(r*h + h*GAP/2)+'%',
               width:(w*(1-GAP))+'%', height:(h*(1-GAP))+'%' };
    }
    function buildCells(){
      cellsEl.innerHTML = ''; cellMap = {};
      svg.setAttribute('viewBox', `0 0 ${C*100} ${R*100}`);
      poly.setAttribute('stroke-width', 16);
      board.style.setProperty('--tfs', (32/C).toFixed(2));
      for(let r=0; r<R; r++) for(let c=0; c<C; c++){
        const d = document.createElement('div');
        d.className = 'cell'; Object.assign(d.style, geo(r,c));
        cellsEl.appendChild(d); cellMap[r+','+c] = d;
      }
    }
    function renderTiles(popAt){
      tilesEl.innerHTML = ''; tileMap = {};
      for(let r=0; r<R; r++) for(let c=0; c<C; c++){
        const v = grid[r][c]; if(!v) continue;
        const d = document.createElement('div');
        d.className = 'tile v'+v; d.textContent = v;
        Object.assign(d.style, geo(r,c));
        if(popAt && popAt[0]===r && popAt[1]===c) d.classList.add('pop');
        tilesEl.appendChild(d); tileMap[r+','+c] = d;
      }
    }
    function buildProgress(){
      progressEl.innerHTML = '';
      for(let i=0; i<STAGES.length; i++){
        const d = document.createElement('div');
        d.className = 'dot' + (i<stage ? ' done' : i===stage ? ' cur' : '');
        progressEl.appendChild(d);
      }
    }

    // ===== ステージ進行 =====
    function loadStage(i){
      stage = i; const st = STAGES[i];
      R = st.rows; C = st.cols; goal = st.goal; moves = 0;
      grid = Array.from({length:R}, () => Array(C).fill(0));
      st.tiles.forEach(([r,c,v]) => grid[r][c] = v);
      path = []; drag = false; lock = true;
      $('#stName').textContent = i+1;
      $('#stSub').textContent = st.sub;
      $('#goalVal').textContent = goal;
      $('#moveVal').textContent = '0';
      clearPathFx(); buildCells(); renderTiles(); buildProgress();
      showModal(`
        <div class="mlabel">STAGE ${i+1} / ${STAGES.length}</div>
        <div class="msub">${st.sub}</div>
        <h1>READY?</h1>
        <div class="mtext">なぞって <b>${goal}</b> をつくれ<br>${st.hint}</div>
        <button>START</button>`, hideModal);
    }
    function showModal(html, fn){
      mcard.innerHTML = html; modal.style.display = 'flex';
      mcard.querySelector('button').addEventListener('pointerup', fn);
    }
    function hideModal(){ modal.style.display = 'none'; lock = false; }

    // ===== 経路入力（pointer のみ） =====
    function cellAt(e){
      const rc = board.getBoundingClientRect();
      const x = (e.clientX - rc.left) / rc.width, y = (e.clientY - rc.top) / rc.height;
      if(x < 0 || x >= 1 || y < 0 || y >= 1) return null;
      return [Math.floor(y*R), Math.floor(x*C)];
    }
    const inPath = (r,c) => path.some(p => p[0]===r && p[1]===c);
    function extend(tr, tc){
      let guard = R*C;
      while(guard--){
        const [lr, lc] = path[path.length-1];
        if(lr===tr && lc===tc) break;
        const nr = lr + Math.sign(tr-lr), nc = lc + Math.sign(tc-lc);
        if(path.length > 1){
          const [pr, pc] = path[path.length-2];
          if(pr===nr && pc===nc){ path.pop(); continue; } // バックトラック
        }
        if(inPath(nr,nc)) break; // 再通過禁止
        path.push([nr,nc]);
      }
      drawPath();
    }
    function drawPath(){
      Object.values(cellMap).forEach(el => el.classList.remove('path'));
      Object.values(tileMap).forEach(el => el.classList.remove('hit'));
      if(!path.length){ poly.setAttribute('points',''); prev.style.display='none'; return; }
      const v0 = grid[path[0][0]][path[0][1]];
      let m = 0;
      path.forEach(([r,c]) => {
        cellMap[r+','+c].classList.add('path');
        if(grid[r][c] === v0){ m++; const t = tileMap[r+','+c]; if(t) t.classList.add('hit'); }
      });
      poly.setAttribute('points', path.map(([r,c]) => (c*100+50)+','+(r*100+50)).join(' '));
      if(m >= 2){
        const [lr, lc] = path[path.length-1];
        prev.textContent = '×'+m+' → '+(v0 * 2**(m-1));
        prev.style.left = ((lc+0.5)*100/C)+'%';
        prev.style.top = (lr*100/R)+'%';
        prev.style.display = 'block';
      } else prev.style.display = 'none';
    }
    function clearPathFx(){ path = []; drawPath(); }

    board.addEventListener('pointerdown', e => {
      if(lock || drag) return;
      const cc = cellAt(e); if(!cc) return;
      const [r,c] = cc; if(!grid[r][c]) return;
      drag = true; path = [[r,c]];
      board.setPointerCapture(e.pointerId);
      drawPath();
    });
    board.addEventListener('pointermove', e => {
      if(!drag) return;
      const cc = cellAt(e); if(!cc) return;
      extend(cc[0], cc[1]);
    });
    window.addEventListener('pointerup', () => {
      if(!drag) return;
      drag = false; resolvePath();
    });

    // ===== マージ解決：経路上の「先頭と同値」を一括結合 v×2^(k-1) =====
    function resolvePath(){
      const pts = path.slice(); clearPathFx();
      if(pts.length < 2) return;
      const v0 = grid[pts[0][0]][pts[0][1]];
      const hits = pts.filter(([r,c]) => grid[r][c] === v0);
      if(hits.length < 2) return;
      lock = true;
      moves++; $('#moveVal').textContent = moves;
      const nv = v0 * 2**(hits.length-1);
      hits.forEach(([r,c]) => tileMap[r+','+c].classList.add('zap'));
      setTimeout(() => {
        hits.forEach(([r,c]) => grid[r][c] = 0);
        const [lr, lc] = hits[hits.length-1]; // 経路上最後の同値マスに出現
        grid[lr][lc] = nv;
        renderTiles([lr,lc]);
        setTimeout(checkEnd, 300);
      }, 190);
    }

    // ===== 勝敗判定 =====
    function checkEnd(){
      let max = 0; const cnt = {};
      for(let r=0; r<R; r++) for(let c=0; c<C; c++){
        const v = grid[r][c]; if(!v) continue;
        max = Math.max(max, v); cnt[v] = (cnt[v]||0)+1;
      }
      if(max >= goal){
        if(stage < STAGES.length-1){
          showModal(`
            <div class="mlabel">STAGE ${stage+1} / ${STAGES.length}</div>
            <h1 class="gold">CLEAR!</h1>
            <div class="mtext"><b>${max}</b> 達成 ／ ${moves} 手</div>
            <button>NEXT STAGE</button>`, () => loadStage(stage+1));
        } else {
          showModal(`
            <div class="mlabel">DRAG MERGE LINE</div>
            <h1 class="gold">ALL CLEAR!</h1>
            <div class="mtext"><b>${max}</b> 達成 ／ ${moves} 手<br>全 ${STAGES.length} ステージ制覇！</div>
            <button>RESTART</button>`, () => loadStage(0));
        }
        return;
      }
      // 手詰まり：同値ペアが 1 組もない（経路は空マスを通過できるため位置は不問）
      if(!Object.values(cnt).some(n => n >= 2)){
        showModal(`
          <div class="mlabel">STAGE ${stage+1} / ${STAGES.length}</div>
          <h1 class="pink">手詰まり…</h1>
          <div class="mtext">同じ数字が 1 組もない<br>マージの順番を変えてみよう</div>
          <button>RETRY</button>`, () => loadStage(stage));
        return;
      }
      lock = false;
    }

    $('#retryBtn').addEventListener('pointerup', () => { if(!drag) loadStage(stage); });

    loadStage(0);
  </script>
</body>
</html>
