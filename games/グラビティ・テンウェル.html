<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>グラビティ・テンウェル</title>
<style>
  :root {
    --phone-aspect: 9 / 19.5;
    --bg-deep: #02030a;
    --bg-mid: #0a1430;
    --bg-panel: #06081a;
    --bg-card: #0b1228;
    --line: #1a2848;
    --cyan: #6ff;
    --cyan-soft: #8df;
    --cyan-grad-2: #06a;
    --cyan-deep: #0a1430;
    --hp-pink: #ff8aa0;
    --warn: #ffb86c;
    --text-main: #eaf3ff;
    --text-sub: #cdddef;
    --text-dim: #7a92b5;
    --nova-0: #ffffff;
    --nova-9: #ffd76b;
    --nova-5: #ff7a3a;
    --nova-3: #ff5d8a;
    --nova-1: #b585ff;
    --enemy: #ff5d8a;
    --player: #6ff;
    --rb-deep: #2a0a40;
    --rb-core: #0a0024;
    /* RGB 成分（rgba 透明度用） */
    --cyan-rgb: 102,255,255;
    --enemy-rgb: 255,93,138;
    --nova-1-rgb: 181,133,255;
    --bg-deep-rgb: 2,3,10;
    --bg-panel-rgb: 6,8,26;
    --white-rgb: 255,255,255;
    --black: #000;
    --well-fill-rgb: 10,20,48;
    /* 共通グロー/グラデ */
    --glow-cyan: 0 0 12px var(--cyan), 0 0 4px var(--cyan-soft);
    --grad-bg: radial-gradient(120% 90% at 50% 18%, var(--bg-mid) 0%, var(--bg-deep) 55%, var(--black) 100%);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    width:100%;height:100%;
    overflow:hidden;
    background:var(--black);
    color:var(--text-main);
    font-family:'Helvetica Neue',system-ui,sans-serif;
    user-select:none;
    -webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
  }
  body{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #phone{
    position:relative;
    overflow:hidden;
    width:min(100vw,calc(100vh*9/19.5));
    height:min(100vh,calc(100vw*19.5/9));
    --pw:min(100vw,calc(100vh*9/19.5));
    --ph:min(100vh,calc(100vw*19.5/9));
    --u:calc(var(--pw)/100);
    --uh:calc(var(--ph)/100);
    background:var(--grad-bg);
  }
  /* 環境演出：ネオン星屑レイヤー */
  #bg-stars{
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index:0;
    background-image:
      radial-gradient(1px 1px at 20% 15%, rgba(var(--cyan-rgb),0.7), transparent),
      radial-gradient(1px 1px at 70% 25%, rgba(var(--nova-1-rgb),0.6), transparent),
      radial-gradient(1.5px 1.5px at 45% 8%, rgba(var(--cyan-rgb),0.5), transparent),
      radial-gradient(1px 1px at 85% 12%, rgba(var(--white-rgb),0.5), transparent),
      radial-gradient(1px 1px at 12% 30%, rgba(var(--nova-1-rgb),0.4), transparent);
    animation:starTwinkle 4s ease-in-out infinite alternate;
  }
  @keyframes starTwinkle{from{opacity:0.5;}to{opacity:1;}}

  /* 画面フラッシュオーバーレイ */
  #screen-flash{
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index:100;
    opacity:0;
    background:radial-gradient(50% 50% at 50% 50%, rgba(255,240,100,0.55) 0%, rgba(255,160,30,0.3) 40%, transparent 70%);
  }
  @keyframes screenFlash{
    0%{opacity:0;}
    15%{opacity:1;}
    100%{opacity:0;}
  }
  /* 画面振動 */
  @keyframes screenShake{
    0%{transform:translate(0,0);}
    15%{transform:translate(-4px,2px);}
    30%{transform:translate(4px,-3px);}
    45%{transform:translate(-3px,3px);}
    60%{transform:translate(3px,-2px);}
    75%{transform:translate(-2px,2px);}
    90%{transform:translate(1px,-1px);}
    100%{transform:translate(0,0);}
  }
  @keyframes screenShakeChain{
    0%{transform:translate(0,0);}
    10%{transform:translate(-6px,4px);}
    20%{transform:translate(6px,-5px);}
    30%{transform:translate(-5px,5px);}
    40%{transform:translate(5px,-4px);}
    50%{transform:translate(-4px,4px);}
    60%{transform:translate(4px,-3px);}
    70%{transform:translate(-3px,3px);}
    80%{transform:translate(3px,-2px);}
    90%{transform:translate(-1px,1px);}
    100%{transform:translate(0,0);}
  }

  /* HUD */
  #hud{
    position:absolute;
    top:0;left:0;right:0;
    height:calc(10*var(--uh));
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 calc(4*var(--u));
    background:linear-gradient(180deg, rgba(var(--bg-panel-rgb),0.95), rgba(var(--bg-panel-rgb),0.7));
    border-bottom:1px solid var(--line);
    backdrop-filter:blur(2px);
    z-index:10;
  }
  #stage-label{
    font-size:calc(2.8*var(--u));
    color:var(--cyan);
    font-weight:700;
    text-shadow:0 0 8px var(--cyan);
  }
  #score-label{
    font-size:calc(2.8*var(--u));
    color:var(--nova-9);
    font-weight:700;
    text-shadow:0 0 8px var(--nova-9);
  }
  #goal-label{
    font-size:calc(2.2*var(--u));
    color:var(--text-sub);
  }

  /* 落下ゾーン（拡張: HUDの下からパドルの上まで） */
  #drop-zone{
    position:absolute;
    top:calc(10*var(--uh));
    left:0;right:0;
    height:calc(48*var(--uh));
  }

  /* 落下中の数字 */
  #falling-num{
    position:absolute;
    width:calc(8*var(--u));
    height:calc(8*var(--u));
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:calc(3.5*var(--u));
    font-weight:900;
    transition:left 0.08s linear;
    z-index:5;
    pointer-events:none;
  }
  .num-normal{
    background:radial-gradient(circle at 38% 32%, var(--line) 55%, var(--cyan-deep) 100%);
    border:2px solid var(--cyan);
    color:var(--cyan);
    text-shadow:0 0 6px var(--cyan);
    box-shadow:0 0 14px var(--cyan),0 0 6px var(--cyan-soft),inset 0 0 8px rgba(var(--cyan-rgb),0.25);
  }
  .num-rainbow{
    background:radial-gradient(circle at 38% 32%, var(--rb-deep) 55%, var(--rb-core) 100%);
    border:2px solid var(--nova-1);
    color:var(--nova-9);
    text-shadow:0 0 8px var(--nova-9);
    box-shadow:0 0 16px var(--nova-1),0 0 8px var(--nova-9),inset 0 0 8px rgba(var(--nova-1-rgb),0.3);
    animation:rainbowPulse 0.5s ease-in-out infinite alternate;
  }
  @keyframes rainbowPulse{
    from{box-shadow:0 0 16px var(--nova-1),0 0 8px var(--nova-9);}
    to{box-shadow:0 0 24px var(--nova-3),0 0 12px var(--nova-1),0 0 4px var(--nova-9);}
  }

  /* パドル（ウェルゾーン縮小に合わせて上へ移動） */
  #paddle{
    position:absolute;
    top:calc(57*var(--uh));
    width:calc(20*var(--u));
    height:calc(4*var(--uh));
    background:linear-gradient(90deg,transparent,var(--cyan),transparent);
    border-radius:calc(2*var(--uh));
    box-shadow:0 0 16px var(--cyan),0 0 6px var(--cyan-soft);
    transform:translateX(-50%);
    pointer-events:none;
    z-index:5;
  }
  #paddle::before{
    content:'';
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    width:calc(6*var(--u));
    height:calc(1.5*var(--uh));
    background:var(--player);
    border-radius:calc(1*var(--uh));
    box-shadow:0 0 8px var(--player);
  }

  /* ウェルゾーン（高さを短縮: 34uh） */
  #wells-zone{
    position:absolute;
    bottom:0;left:0;right:0;
    height:calc(34*var(--uh));
    display:flex;
    align-items:flex-start;
    justify-content:space-around;
    padding:calc(2*var(--uh)) calc(0.5*var(--u)) 0;
    gap:calc(0.5*var(--u));
  }

  /* 各ウェル（10個対応、幅はflex自動） */
  .well{
    flex:1;
    height:calc(28*var(--uh));
    border-radius:calc(1.5*var(--u)) calc(1.5*var(--u)) calc(3*var(--u)) calc(3*var(--u));
    border:2px solid var(--cyan);
    background:linear-gradient(180deg, rgba(var(--well-fill-rgb),0.35) 0%, rgba(var(--well-fill-rgb),0.8) 100%);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;
    padding-bottom:calc(1.2*var(--uh));
    position:relative;
    overflow:hidden;
    transition:border-color 0.3s, box-shadow 0.3s;
  }
  /* ウェル内壁の発光リム */
  .well::after{
    content:'';
    position:absolute;
    left:0;right:0;bottom:0;
    height:calc(6*var(--uh));
    background:linear-gradient(180deg, transparent, rgba(var(--cyan-rgb),0.18));
    pointer-events:none;
  }
  .well.active{
    border-color:var(--cyan);
    box-shadow:0 0 10px var(--cyan),inset 0 0 12px rgba(var(--cyan-rgb),0.05);
  }
  /* 連鎖直前ウェル強調（残り0〜1で光る） */
  .well.chain-ready{
    border-color:var(--nova-9);
    box-shadow:0 0 18px var(--nova-9),0 0 6px var(--nova-5),inset 0 0 14px rgba(255,215,107,0.15);
    animation:chainReadyPulse 0.4s ease-in-out infinite alternate;
  }
  @keyframes chainReadyPulse{
    from{box-shadow:0 0 12px var(--nova-9),inset 0 0 8px rgba(255,215,107,0.1);}
    to{box-shadow:0 0 28px var(--nova-9),0 0 10px var(--nova-5),inset 0 0 20px rgba(255,215,107,0.2);}
  }
  .well.locked{
    border-color:var(--enemy);
    box-shadow:0 0 10px var(--enemy),inset 0 0 12px rgba(var(--enemy-rgb),0.1);
    animation:lockPulse 0.5s ease-in-out infinite alternate;
  }
  .well.rainbow-well{
    border-color:var(--nova-1);
    box-shadow:0 0 18px var(--nova-1),inset 0 0 16px rgba(var(--nova-1-rgb),0.1);
    animation:rainbowWellPulse 0.6s ease-in-out infinite alternate;
  }
  @keyframes lockPulse{
    from{box-shadow:0 0 6px var(--enemy);}
    to{box-shadow:0 0 16px var(--enemy),inset 0 0 16px rgba(var(--enemy-rgb),0.2);}
  }
  @keyframes rainbowWellPulse{
    from{box-shadow:0 0 10px var(--nova-1),inset 0 0 10px rgba(var(--nova-1-rgb),0.1);}
    to{box-shadow:0 0 24px var(--nova-3),0 0 6px var(--nova-9),inset 0 0 20px rgba(var(--enemy-rgb),0.15);}
  }

  .well-sum{
    font-size:calc(4.5*var(--u));
    font-weight:900;
    color:var(--cyan);
    text-shadow:0 0 10px var(--cyan);
    line-height:1;
    transition:color 0.2s, text-shadow 0.2s;
  }
  .well-sum.danger{
    color:var(--warn);
    text-shadow:0 0 10px var(--warn);
  }
  .well-sum.locked-text{
    color:var(--enemy);
    text-shadow:0 0 10px var(--enemy);
  }
  /* 連鎖直前の数字強調 */
  .well-sum.chain-ready-text{
    color:var(--nova-9);
    text-shadow:0 0 12px var(--nova-9), 0 0 20px var(--nova-5);
  }
  .well-cap{
    font-size:calc(1.5*var(--u));
    color:var(--text-dim);
    margin-top:calc(0.3*var(--uh));
  }
  .well-lock-overlay{
    position:absolute;
    inset:0;
    background:rgba(var(--enemy-rgb),0.12);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:calc(5*var(--u));
    pointer-events:none;
    opacity:0;
    transition:opacity 0.3s;
  }
  .well.locked .well-lock-overlay{
    opacity:1;
  }
  .well-lock-timer{
    position:absolute;
    top:calc(0.6*var(--uh));
    font-size:calc(1.5*var(--u));
    color:var(--enemy);
    font-weight:700;
  }

  /* 落下ライン（ガイド） */
  .drop-guide{
    position:absolute;
    top:calc(58*var(--uh));
    width:1px;
    height:calc(10*var(--uh));
    background:rgba(var(--cyan-rgb),0.15);
    pointer-events:none;
    z-index:1;
  }

  /* パーティクル/爆発エフェクト */
  .particle{
    position:absolute;
    pointer-events:none;
    z-index:20;
  }
  @keyframes particleFly{
    0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg);}
    100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0.1) rotate(var(--dr));}
  }
  @keyframes particleFlyShape{
    0%{opacity:1;transform:translate(0,0) scale(1.2) rotate(0deg);}
    60%{opacity:0.8;}
    100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0.2) rotate(var(--dr));}
  }
  .explode-ring{
    position:absolute;
    border-radius:50%;
    border:3px solid var(--nova-9);
    pointer-events:none;
    z-index:20;
    animation:explodeRing 0.55s ease-out forwards;
  }
  @keyframes explodeRing{
    0%{opacity:0.9;transform:translate(-50%,-50%) scale(0.3);}
    100%{opacity:0;transform:translate(-50%,-50%) scale(3.5);}
  }
  /* 二次衝撃波（シアン外輪） */
  .explode-ring.outer{
    border-color:var(--cyan);
    border-width:2px;
    animation:explodeRingOuter 0.75s ease-out forwards;
  }
  @keyframes explodeRingOuter{
    0%{opacity:0.7;transform:translate(-50%,-50%) scale(0.5);}
    100%{opacity:0;transform:translate(-50%,-50%) scale(5);}
  }
  /* 3枚目リング（紫） */
  .explode-ring.ring3{
    border-color:var(--nova-1);
    border-width:2px;
    animation:explodeRing3 0.9s ease-out forwards;
  }
  @keyframes explodeRing3{
    0%{opacity:0.6;transform:translate(-50%,-50%) scale(0.8);}
    100%{opacity:0;transform:translate(-50%,-50%) scale(6);}
  }
  /* 中心フラッシュ */
  .explode-flash{
    position:absolute;
    border-radius:50%;
    pointer-events:none;
    z-index:19;
    background:radial-gradient(circle, var(--nova-0) 0%, var(--nova-9) 30%, var(--nova-5) 55%, transparent 75%);
    animation:explodeFlash 0.45s ease-out forwards;
  }
  @keyframes explodeFlash{
    0%{opacity:0.98;transform:translate(-50%,-50%) scale(0.3);}
    40%{opacity:0.9;}
    100%{opacity:0;transform:translate(-50%,-50%) scale(2.8);}
  }
  .bonus-float{
    position:absolute;
    font-weight:900;
    color:var(--nova-9);
    text-shadow:0 0 8px var(--nova-9),0 0 16px var(--nova-5);
    pointer-events:none;
    z-index:25;
    animation:bonusFloat 0.9s ease-out forwards;
  }
  @keyframes bonusFloat{
    0%{opacity:1;transform:translateY(0) scale(1);}
    100%{opacity:0;transform:translateY(calc(-10*var(--uh))) scale(1.4);}
  }

  /* チェインテキスト */
  .chain-text{
    position:absolute;
    font-weight:900;
    pointer-events:none;
    z-index:30;
    text-align:center;
    animation:chainTextAnim 1.0s ease-out forwards;
  }
  @keyframes chainTextAnim{
    0%{opacity:0;transform:translate(-50%,-50%) scale(0.3);}
    20%{opacity:1;transform:translate(-50%,-50%) scale(1.4);}
    70%{opacity:1;transform:translate(-50%,-100%) scale(1.2);}
    100%{opacity:0;transform:translate(-50%,-130%) scale(1.0);}
  }

  /* モーダル */
  #modal{
    position:absolute;
    inset:0;
    background:radial-gradient(80% 60% at 50% 40%, rgba(var(--bg-deep-rgb),0.82), rgba(var(--bg-deep-rgb),0.95));
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:50;
    gap:calc(3*var(--uh));
  }
  #modal.hidden{display:none;}
  .modal-title{
    font-size:calc(8*var(--u));
    font-weight:900;
    letter-spacing:0.04em;
    background:linear-gradient(180deg, var(--cyan-soft), var(--cyan) 55%, var(--cyan-grad-2));
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 18px var(--cyan)) drop-shadow(0 0 36px rgba(var(--cyan-rgb),0.6));
    text-align:center;
    animation:modalTitle 0.5s ease-out;
  }
  @keyframes modalTitle{
    from{opacity:0;transform:scale(0.7);}
    to{opacity:1;transform:scale(1);}
  }
  .modal-sub{
    font-size:calc(3.2*var(--u));
    color:var(--text-sub);
    text-align:center;
    line-height:1.6;
    padding:0 calc(6*var(--u));
  }
  .modal-btn{
    margin-top:calc(2*var(--uh));
    padding:calc(2*var(--uh)) calc(10*var(--u));
    background:transparent;
    border:2px solid var(--cyan);
    border-radius:calc(4*var(--u));
    color:var(--cyan);
    font-size:calc(4*var(--u));
    font-weight:700;
    cursor:pointer;
    box-shadow:0 0 12px var(--cyan);
    transition:background 0.2s, box-shadow 0.2s;
  }
  .modal-btn:active{
    background:rgba(var(--cyan-rgb),0.1);
    box-shadow:0 0 24px var(--cyan);
  }

  /* ステージクリア画面 */
  #stage-clear{
    position:absolute;
    inset:0;
    background:radial-gradient(80% 60% at 50% 40%, rgba(var(--bg-deep-rgb),0.85), rgba(var(--bg-deep-rgb),0.96));
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:50;
    gap:calc(2.5*var(--uh));
  }
  #stage-clear.hidden{display:none;}
  .clear-title{
    font-size:calc(9*var(--u));
    font-weight:900;
    letter-spacing:0.04em;
    background:linear-gradient(180deg, var(--nova-9), var(--nova-5));
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 20px var(--nova-9)) drop-shadow(0 0 40px var(--nova-5));
    animation:modalTitle 0.4s ease-out;
  }
  /* ステージゴールバッジ（template 07） */
  .goal-badge{
    display:inline-flex;
    align-items:center;
    gap:calc(1*var(--u));
    padding:calc(0.8*var(--uh)) calc(3*var(--u));
    border:1px solid var(--cyan);
    border-radius:calc(4*var(--u));
    background:rgba(var(--cyan-rgb),0.06);
    color:var(--cyan-soft);
    font-size:calc(2.4*var(--u));
    font-weight:700;
    box-shadow:0 0 8px rgba(var(--cyan-rgb),0.3),inset 0 0 6px rgba(var(--cyan-rgb),0.08);
  }

  /* 背景グリッド */
  #bg-grid{
    position:absolute;
    inset:0;
    opacity:0.06;
    pointer-events:none;
    background-image:
      linear-gradient(rgba(var(--cyan-rgb),0.5) 1px,transparent 1px),
      linear-gradient(90deg,rgba(var(--cyan-rgb),0.5) 1px,transparent 1px);
    background-size:calc(10*var(--u)) calc(5*var(--uh));
  }
</style>
</head>
<body>
<div id="phone">
  <div id="bg-stars"></div>
  <div id="bg-grid"></div>
  <!-- 画面フラッシュオーバーレイ -->
  <div id="screen-flash"></div>

  <!-- HUD -->
  <div id="hud">
    <span id="stage-label">ST 1</span>
    <span id="goal-label">爆発目標: <span id="goal-val">3</span></span>
    <span id="score-label">爆発: <span id="explosion-count">0</span></span>
  </div>

  <!-- 落下ゾーン -->
  <div id="drop-zone">
    <div id="falling-num" class="num-normal">3</div>
  </div>

  <!-- パドル -->
  <div id="paddle"></div>

  <!-- ウェルゾーン（10個） -->
  <div id="wells-zone">
    <div class="well active" id="well-0">
      <div class="well-lock-overlay">🔒</div>
      <div class="well-lock-timer" id="lock-timer-0"></div>
      <div class="well-sum" id="sum-0">8</div>
      <div class="well-cap">残 <span id="cap-0">2</span></div>
    </div>
    <div class="well active" id="well-1">
      <div class="well-lock-overlay">🔒</div>
      <div class="well-lock-timer" id="lock-timer-1"></div>
      <div class="well-sum" id="sum-1">6</div>
      <div class="well-cap">残 <span id="cap-1">4</span></div>
    </div>
    <div class="well active" id="well-2">
      <div class="well-lock-overlay">🔒</div>
      <div class="well-lock-timer" id="lock-timer-2"></div>
      <div class="well-sum" id="sum-2">9</div>
      <div class="well-cap">残 <span id="cap-2">1</span></div>
    </div>

<script>
// ===== 定数・設定 =====

const WELL_COUNT = 10;

const STAGES = [

    goalExplosions: 11,

    sequence: [1, 'R', 2, 1, 2, 1, 'R', 1, 2, 1, 3, 1, 'R', 2, 1, 2, 1, 'R', 1, 2, 'R', 1],

  }
];

// ===== 状態 =====
const state = {
  stage: 0,
  wellSums: new Array(WELL_COUNT).fill(0),
  wellLocked: new Array(WELL_COUNT).fill(false),
  lockTimers: new Array(WELL_COUNT).fill(0),
  sequence: [],
  seqIdx: 0,
  explosions: 0,
  goalExplosions: 0,
  paddleX: 50,  // %
  fallingY: 0,  // % (phone高さ基準)
  falling: false,
  fallingVal: 0,
  fallingIsRainbow: false,
  animId: null,
  stageActive: false,
  gameOver: false,
  lockIntervals: new Array(WELL_COUNT).fill(null),
  fallingSpeed: 0.22, // %/frame
  chainCount: 0,       // 連鎖カウンタ（爆発連鎖の深さを追跡）
  currentChainDepth: 0, // 現在の連鎖深度
};

// ===== DOM =====
const phone    = document.getElementById('phone');
const fallingEl= document.getElementById('falling-num');
const paddleEl = document.getElementById('paddle');
const modal    = document.getElementById('modal');
const stageClearEl = document.getElementById('stage-clear');
const startBtn = document.getElementById('start-btn');
const nextBtn  = document.getElementById('next-btn');
const stageLabel = document.getElementById('stage-label');
const goalVal  = document.getElementById('goal-val');
const explCount= document.getElementById('explosion-count');
const clearSub = document.getElementById('clear-sub');
const screenFlash = document.getElementById('screen-flash');

function getSumEl(i){ return document.getElementById('sum-'+i); }
function getCapEl(i){ return document.getElementById('cap-'+i); }
function getLockTimerEl(i){ return document.getElementById('lock-timer-'+i); }
function getWellEl(i){ return document.getElementById('well-'+i); }

// ===== ステージ初期化 =====
function initStage(idx){
  const s = STAGES[idx];
  state.stage = idx;
  state.wellSums = [...s.wellInit];
  state.wellLocked = new Array(WELL_COUNT).fill(false);
  state.lockTimers = new Array(WELL_COUNT).fill(0);
  state.sequence = [...s.sequence];
  state.seqIdx = 0;
  state.explosions = 0;
  state.goalExplosions = s.goalExplosions;
  state.stageActive = false;
  state.gameOver = false;
  state.chainCount = 0;
  state.currentChainDepth = 0;
  // St1=0.22, St2=0.28, St3=0.34, St4=0.40, St5=0.46（0.06ずつ増加）
  state.fallingSpeed = 0.22 + idx * 0.06;

  stageLabel.textContent = 'ST '+s.stageNum;
  goalVal.textContent = s.goalExplosions;
  explCount.textContent = '0';

  // ウェルロック解除
  for(let i=0;i<WELL_COUNT;i++){
    if(state.lockIntervals[i]) clearInterval(state.lockIntervals[i]);
    state.lockIntervals[i]=null;
    getWellEl(i).className='well active';
    getLockTimerEl(i).textContent='';
  }
  updateWellUI();
  spawnFalling();
}

function updateWellUI(){
  for(let i=0;i<WELL_COUNT;i++){
    const sum = state.wellSums[i];
    const cap = 10 - sum;
    const sumEl = getSumEl(i);
    const capEl = getCapEl(i);
    const wellEl = getWellEl(i);
    sumEl.textContent = sum;
    capEl.textContent = Math.max(0,cap);
    sumEl.className = 'well-sum';
    if(state.wellLocked[i]){
      sumEl.classList.add('locked-text');
    } else if(sum >= 9){
      // 残り1以下：連鎖直前の強調（金色）
      sumEl.classList.add('chain-ready-text');
      if(!wellEl.classList.contains('locked') && !wellEl.classList.contains('rainbow-well')){
        wellEl.classList.remove('active','chain-ready');
        wellEl.classList.add('chain-ready');
      }
    } else if(sum >= 8){
      sumEl.classList.add('danger');
      if(!wellEl.classList.contains('locked') && !wellEl.classList.contains('rainbow-well')){
        wellEl.classList.remove('chain-ready');
        if(!wellEl.classList.contains('active')) wellEl.classList.add('active');
      }
    } else {
      if(!wellEl.classList.contains('locked') && !wellEl.classList.contains('rainbow-well')){
        wellEl.classList.remove('chain-ready');
        if(!wellEl.classList.contains('active')) wellEl.classList.add('active');
      }
    }
  }
}

// ===== 落下数字生成 =====
function spawnFalling(){
  if(state.gameOver) return;
  if(state.seqIdx >= state.sequence.length){
    // 全数字消費 → クリアチェック
    checkStageClear();
    return;
  }
  const val = state.sequence[state.seqIdx];
  const isRainbow = (val === 'R');
  state.fallingVal = isRainbow ? 'R' : val;
  state.fallingIsRainbow = isRainbow;
  // 新しい数字のスポーン時にチェーンをリセット
  state.currentChainDepth = 0;

  fallingEl.textContent = isRainbow ? '★' : val;
  fallingEl.className = isRainbow ? 'num-rainbow' : 'num-normal';

  // 初期位置: 上部から落下開始（5%）
  state.fallingY = 5;
  setFallingPos(state.paddleX, state.fallingY);
  fallingEl.style.display = 'flex';
  state.falling = true;
  state.stageActive = true;
}

function setFallingPos(xPct, yPct){
  // xPct, yPct はphone幅・高さに対する%
  const pw = phone.getBoundingClientRect().width;
  const ph = phone.getBoundingClientRect().height;
  const w = pw * 0.08; // 8u（10ウェル対応で小さく）
  fallingEl.style.left = (xPct/100*pw - w/2) + 'px';
  fallingEl.style.top  = (yPct/100*ph) + 'px';
  fallingEl.style.width  = w + 'px';
  fallingEl.style.height = w + 'px';
}

// ===== ゲームループ =====
function gameLoop(){
  if(!state.stageActive || state.gameOver){
    state.animId = requestAnimationFrame(gameLoop);
    return;
  }
  if(state.falling){
    state.fallingY += state.fallingSpeed;
    setFallingPos(state.paddleX, state.fallingY);

    // パドル付近(57uh)に到達したら、パドル位置でウェルへ
    if(state.fallingY >= 57){
      // パドル位置でウェルを決定
      const wellIdx = getTargetWell(state.paddleX);
      if(wellIdx !== -1){
        dropIntoWell(wellIdx);
      } else {
        // 画面外へ消える（ミス）→ 再スポーン
        state.seqIdx++;
        state.falling = false;
        setTimeout(spawnFalling, 400);
      }
    }
  }
  state.animId = requestAnimationFrame(gameLoop);
}

function getTargetWell(xPct){
  // パドルX位置に応じてウェルを決定（10等分: 各10%幅）
  // well-0: 0〜10%, well-1: 10〜20%, ..., well-9: 90〜100%
  const step = 100 / WELL_COUNT;
  const idx = Math.floor(xPct / step);
  return Math.min(idx, WELL_COUNT - 1);
}

// ===== ウェル投入 =====
function dropIntoWell(idx){
  state.falling = false;
  fallingEl.style.display = 'none';

  if(state.wellLocked[idx]){
    // ロック中は弾かれる演出のみ（ペナルティなし、次の数字へ）
    showBounce(idx);
    state.seqIdx++;
    setTimeout(spawnFalling, 500);
    return;
  }

  const val = state.fallingVal;
  const isRainbow = state.fallingIsRainbow;
  const wellEl = getWellEl(idx);

  // レインボーウェル or レインボー数字 → 即爆発
  if(isRainbow || wellEl.classList.contains('rainbow-well')){
    state.wellSums[idx] = 10; // 強制爆発値
    updateWellUI();
    setTimeout(()=>triggerExplosion(idx, 0), 100);
    state.seqIdx++;
    setTimeout(spawnFalling, 900);
    return;
  }

  const newSum = state.wellSums[idx] + val;

  if(newSum === 10){
    state.wellSums[idx] = 10;
    updateWellUI();
    showDropEffect(idx);
    setTimeout(()=>triggerExplosion(idx, 0), 150);
    state.seqIdx++;
    setTimeout(spawnFalling, 900);
  } else if(newSum > 10){
    // オーバー → ロック
    state.wellSums[idx] = newSum;
    updateWellUI();
    showDropEffect(idx);
    setTimeout(()=>triggerLock(idx), 150);
    state.seqIdx++;
    setTimeout(spawnFalling, 800);
  } else {
    state.wellSums[idx] = newSum;
    updateWellUI();
    showDropEffect(idx);
    state.seqIdx++;
    setTimeout(spawnFalling, 400);
  }
}

// ===== 爆発処理 =====
// chainDepth: 連鎖の深さ（0=直接爆発、1以上=連鎖爆発）
function triggerExplosion(idx, chainDepth){
  state.explosions++;
  explCount.textContent = state.explosions;
  state.chainCount++;

  const wellEl = getWellEl(idx);
  // 爆発エフェクト（連鎖深度を渡して演出をエスカレート）
  spawnExplosionFX(idx, chainDepth);

  // ウェルリセット
  state.wellSums[idx] = 0;
  wellEl.classList.remove('rainbow-well','locked','chain-ready');
  wellEl.classList.add('active');
  updateWellUI();

  // おすそ分け: 連鎖深度に応じて隣接ウェルへの加算量を増加
  // depth=0: +1, depth=1: +2, depth=2以上: +3
  const bonusAmount = Math.min(chainDepth + 1, 3);
  setTimeout(()=>{
    const neighbors = [];
    if(idx > 0) neighbors.push(idx-1);
    if(idx < WELL_COUNT-1) neighbors.push(idx+1);
    neighbors.forEach(ni=>{
      if(!state.wellLocked[ni]){
        const prevSum = state.wellSums[ni];
        state.wellSums[ni] = Math.min(state.wellSums[ni] + bonusAmount, 10);
        updateWellUI();
        // 加算量を表示（連鎖時は+2/+3を表示）
        showBonusFloat(ni, `+${bonusAmount}`);
        // 連鎖チェック: おすそ分けで10以上になった場合は爆発（ロック回避・連鎖優先）
        if(state.wellSums[ni] >= 10){
          state.wellSums[ni] = 10; // 10にキャップして爆発
          updateWellUI();
          setTimeout(()=>triggerExplosion(ni, chainDepth+1), 300);
        }
      }
    });
    checkStageClear();
  }, 300);
}

// ===== ロック処理 =====
function triggerLock(idx){
  state.wellLocked[idx] = true;
  state.lockTimers[idx] = 4; // 4秒
  const wellEl = getWellEl(idx);
  wellEl.classList.remove('active','rainbow-well','chain-ready');
  wellEl.classList.add('locked');
  updateWellUI();

  getLockTimerEl(idx).textContent = state.lockTimers[idx];

  if(state.lockIntervals[idx]) clearInterval(state.lockIntervals[idx]);
  state.lockIntervals[idx] = setInterval(()=>{
    state.lockTimers[idx]--;
    getLockTimerEl(idx).textContent = state.lockTimers[idx];
    if(state.lockTimers[idx] <= 0){
      clearInterval(state.lockIntervals[idx]);
      state.lockIntervals[idx] = null;
      state.wellLocked[idx] = false;
      state.wellSums[idx] = 0;
      wellEl.classList.remove('locked');
      wellEl.classList.add('active');
      getLockTimerEl(idx).textContent = '';
      updateWellUI();
    }
  },1000);
}

// ===== クリアチェック =====
function checkStageClear(){
  if(state.explosions >= state.goalExplosions){
    setTimeout(()=>showStageClear(), 600);
  }
}

function showStageClear(){
  if(state.gameOver) return;
  state.gameOver = true;
  const s = STAGES[state.stage];
  clearSub.textContent = `ステージ${s.stageNum} クリア！\n爆発 ${state.explosions} 回！`;
  if(state.stage < STAGES.length-1){
    nextBtn.textContent = '次のステージへ';
  } else {
    nextBtn.textContent = 'もう一度プレイ';
    clearSub.textContent = 'ゲームクリア！\n全ステージ制覇！';
  }
  stageClearEl.classList.remove('hidden');
}

// 虹色グラデーション用の色リスト（爆発ごとにランダムにシフト）
const RAINBOW_PALETTES = [
  ['#ff4444','#ff8800','#ffdd00','#44ff88','#00ccff','#aa44ff','#ff44aa'],
  ['#ffd76b','#ff7a3a','#ff5d8a','#6ff','#b585ff','#fff','#ffb86c'],
  ['#00ffe5','#00bfff','#ff00ff','#ff4488','#ffdd00','#88ff00','#fff'],
  ['#ff6b6b','#ffa94d','#ffe066','#69db7c','#74c0fc','#da77f2','#ff80ab'],
];

// 星型SVGパスを描くCanvas用関数
function drawStar(ctx, x, y, r, n, color){
  ctx.save();
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = r * 2;
  ctx.beginPath();
  for(let i=0;i<n*2;i++){
    const rad = (i/n/2)*Math.PI*2 - Math.PI/2;
    const rr = (i%2===0) ? r : r*0.45;
    if(i===0) ctx.moveTo(x+Math.cos(rad)*rr, y+Math.sin(rad)*rr);
    else ctx.lineTo(x+Math.cos(rad)*rr, y+Math.sin(rad)*rr);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// ハート型を描く
function drawHeart(ctx, x, y, size, color){
  ctx.save();
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = size * 2;
  ctx.beginPath();
  ctx.moveTo(x, y + size*0.35);
  ctx.bezierCurveTo(x, y, x - size*0.5, y, x - size*0.5, y + size*0.35);
  ctx.bezierCurveTo(x - size*0.5, y + size*0.7, x, y + size*1.0, x, y + size*1.2);
  ctx.bezierCurveTo(x, y + size*1.0, x + size*0.5, y + size*0.7, x + size*0.5, y + size*0.35);
  ctx.bezierCurveTo(x + size*0.5, y, x, y, x, y + size*0.35);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// 画面フラッシュ
function triggerScreenFlash(intensity){
  // intensity: 0〜1（連鎖深度に応じて強くなる）
  screenFlash.style.opacity = '0';
  screenFlash.style.animation = 'none';
  // reflow
  void screenFlash.offsetWidth;
  const dur = 0.25 + intensity * 0.2;
  screenFlash.style.animation = `screenFlash ${dur}s ease-out forwards`;
  screenFlash.style.opacity = '';
}

// 画面振動
function triggerScreenShake(chainDepth){
  phone.style.animation = 'none';
  void phone.offsetWidth;
  const animName = chainDepth >= 2 ? 'screenShakeChain' : 'screenShake';
  const dur = chainDepth >= 2 ? 0.35 : 0.22;
  phone.style.animation = `${animName} ${dur}s ease-out`;
  setTimeout(()=>{ phone.style.animation = ''; }, dur * 1000 + 50);
}

// チェインテキスト表示（連鎖2以上）
function showChainText(cx, cy, chainDepth){
  if(chainDepth < 1) return;
  const el = document.createElement('div');
  el.className = 'chain-text';
  const labels = ['','CHAIN!','DOUBLE!!','TRIPLE!!!','QUAD!!!!','PENTA!!!!!'];
  const label = labels[Math.min(chainDepth, labels.length-1)] || `CHAIN x${chainDepth}!!`;
  el.textContent = label;
  const colorList = ['','#ffd76b','#ff7a3a','#ff5d8a','#b585ff','#6ff'];
  const col = colorList[Math.min(chainDepth, colorList.length-1)] || '#fff';
  const sizeMul = Math.min(1 + chainDepth * 0.4, 3.0);
  const pw = phone.getBoundingClientRect().width;
  const fontSize = pw * 0.06 * sizeMul;
  el.style.cssText = `
    left:${cx}px;top:${cy}px;
    font-size:${fontSize}px;
    color:${col};
    text-shadow:0 0 ${fontSize*0.5}px ${col}, 0 0 ${fontSize}px ${col}, 0 0 ${fontSize*2}px ${col};
    -webkit-text-stroke:1px rgba(0,0,0,0.6);
  `;
  phone.appendChild(el);
  setTimeout(()=>el.remove(), 1100);
}

function spawnExplosionFX(idx, chainDepth){
  const wellEl = getWellEl(idx);
  const rect = wellEl.getBoundingClientRect();
  const pRect = phone.getBoundingClientRect();
  const cx = rect.left - pRect.left + rect.width/2;
  const cy = rect.top  - pRect.top  + rect.height/2;
  const pw = pRect.width;

  // 連鎖深度に応じたスケール倍率（爆発サイズを大きく: 連鎖するほど拡大）
  const scaleMul = 1.0 + Math.min(chainDepth, 4) * 0.5; // 最大3倍
  const flashSize = pw * 0.18 * scaleMul * Math.min(1+chainDepth*0.4, 2.5);

  // 中心フラッシュ（大型化）
  const flash = document.createElement('div');
  flash.className = 'explode-flash';
  flash.style.cssText = `left:${cx}px;top:${cy}px;width:${flashSize}px;height:${flashSize}px`;
  phone.appendChild(flash);
  setTimeout(()=>flash.remove(), 450);

  // 三重リング（内輪:ゴールド、中輪:シアン、外輪:紫）
  const ringSize1 = pw * 0.12 * scaleMul;
  const ring = document.createElement('div');
  ring.className = 'explode-ring';
  ring.style.cssText = `left:${cx}px;top:${cy}px;width:${ringSize1}px;height:${ringSize1}px`;
  phone.appendChild(ring);
  setTimeout(()=>ring.remove(), 550);

  const ringSize2 = pw * 0.08 * scaleMul;
  const ring2 = document.createElement('div');
  ring2.className = 'explode-ring outer';
  ring2.style.cssText = `left:${cx}px;top:${cy}px;width:${ringSize2}px;height:${ringSize2}px`;
  phone.appendChild(ring2);
  setTimeout(()=>ring2.remove(), 750);

  const ringSize3 = pw * 0.06 * scaleMul;
  const ring3 = document.createElement('div');
  ring3.className = 'explode-ring ring3';
  ring3.style.cssText = `left:${cx}px;top:${cy}px;width:${ringSize3}px;height:${ringSize3}px`;
  phone.appendChild(ring3);
  setTimeout(()=>ring3.remove(), 900);

  // 虹色グラデーションパーティクル（大幅増加: 基本48個、連鎖で更に増加）
  const paletteIdx = (state.chainCount + chainDepth) % RAINBOW_PALETTES.length;
  const palette = RAINBOW_PALETTES[paletteIdx];
  const baseN = 48;
  const N = baseN + Math.min(chainDepth, 4) * 16; // 連鎖で最大112個
  const maxDist = pw * (0.18 + chainDepth * 0.07);

  for(let i=0;i<N;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (i/N)*Math.PI*2 + Math.random()*0.5;
    const dist = pw*0.04 + Math.random()*maxDist;
    const dx = Math.cos(angle)*dist;
    const dy = Math.sin(angle)*dist;
    const dr = (Math.random()-0.5)*720;
    const col = palette[i % palette.length];
    const dur = 0.45 + Math.random()*0.35;

    // 形状をランダムに決定（丸/星/ハート）
    const shapeRnd = Math.random();
    if(shapeRnd < 0.55){
      // 丸パーティクル
      const sz = pw*0.012 + Math.random()*pw*0.022;
      p.style.cssText = `
        left:${cx}px;top:${cy}px;
        width:${sz}px;height:${sz}px;
        border-radius:50%;
        background:${col};
        box-shadow:0 0 ${sz*1.5}px ${col}, 0 0 ${sz*0.5}px #fff;
        --dx:${dx}px;--dy:${dy}px;--dr:${dr}deg;
        animation:particleFly ${dur}s ease-out forwards;
      `;
    } else if(shapeRnd < 0.80){
      // 星型（Canvas使用）
      const sz = pw*0.018 + Math.random()*pw*0.02;
      const cvs = document.createElement('canvas');
      cvs.width = sz*4; cvs.height = sz*4;
      cvs.style.cssText = `
        position:absolute;
        left:${cx - sz*2}px;top:${cy - sz*2}px;
        width:${sz*4}px;height:${sz*4}px;
        --dx:${dx}px;--dy:${dy}px;--dr:${dr}deg;
        animation:particleFlyShape ${dur}s ease-out forwards;
        pointer-events:none;z-index:20;
      `;
      const ctx2d = cvs.getContext('2d');
      drawStar(ctx2d, sz*2, sz*2, sz*1.5, 5, col);
      phone.appendChild(cvs);
      setTimeout(()=>cvs.remove(), dur*1000+100);
      continue;
    } else {
      // ハート型（Canvas使用）
      const sz = pw*0.015 + Math.random()*pw*0.018;
      const cvs = document.createElement('canvas');
      cvs.width = sz*4; cvs.height = sz*4;
      cvs.style.cssText = `
        position:absolute;
        left:${cx - sz*2}px;top:${cy - sz*2}px;
        width:${sz*4}px;height:${sz*4}px;
        --dx:${dx}px;--dy:${dy}px;--dr:${dr}deg;
        animation:particleFlyShape ${dur}s ease-out forwards;
        pointer-events:none;z-index:20;
      `;
      const ctx2d = cvs.getContext('2d');
      drawHeart(ctx2d, sz*2, sz, sz*0.8, col);
      phone.appendChild(cvs);
      setTimeout(()=>cvs.remove(), dur*1000+100);
      continue;
    }
    phone.appendChild(p);
    setTimeout(()=>p.remove(), dur*1000+100);
  }

  // 画面フラッシュ（連鎖時は必ず、通常爆発は50%の確率）
  if(chainDepth >= 1 || Math.random() < 0.5){
    const flashIntensity = Math.min(chainDepth / 3, 1.0);
    triggerScreenFlash(flashIntensity);
  }

  // 画面振動（全爆発で発動）
  triggerScreenShake(chainDepth);

  // チェインテキスト（連鎖1以上で表示）
  if(chainDepth >= 1){
    // 画面中央上部に大きなチェインテキスト
    const pct50x = pRect.width / 2;
    const pct30y = pRect.height * 0.35;
    showChainText(pct50x, pct30y, chainDepth);
  }

  // BOOM テキスト（連鎖時はサイズアップ）
  const boomSize = chainDepth >= 1
    ? `calc(${4 + chainDepth*1.5}*var(--u))`
    : 'calc(3*var(--u))';
  showBonusFloat(idx, '💥BOOM!', boomSize);
}

function showBonusFloat(idx, text, fontSize){
  const wellEl = getWellEl(idx);
  const rect = wellEl.getBoundingClientRect();
  const pRect = phone.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'bonus-float';
  el.textContent = text;
  if(fontSize) el.style.fontSize = fontSize;
  else el.style.fontSize = 'calc(3*var(--u))';
  el.style.left = (rect.left - pRect.left + rect.width/2 - rect.width*0.2) + 'px';
  el.style.top  = (rect.top  - pRect.top + rect.height*0.3) + 'px';
  phone.appendChild(el);
  setTimeout(()=>el.remove(), 940);
}

function showDropEffect(idx){
  const sumEl = getSumEl(idx);
  sumEl.style.transform = 'scale(1.3)';
  sumEl.style.transition = 'transform 0.15s';
  setTimeout(()=>{
    sumEl.style.transform = '';
  },150);
}

function showBounce(idx){
  const wellEl = getWellEl(idx);
  wellEl.style.transform = 'translateX(4px)';
  setTimeout(()=>{wellEl.style.transform='translateX(-4px)';},80);
  setTimeout(()=>{wellEl.style.transform='';},160);
}

// ===== パドル操作 =====
function handlePointerMove(e){
  if(!state.stageActive) return;
  const rect = phone.getBoundingClientRect();
  let clientX;
  if(e.touches){
    clientX = e.touches[0].clientX;
  } else {
    clientX = e.clientX;
  }
  const relX = clientX - rect.left;
  const pct = Math.max(5, Math.min(95, relX/rect.width*100));
  state.paddleX = pct;
  paddleEl.style.left = pct + '%';
  // 落下中の数字も追従
  if(state.falling){
    setFallingPos(pct, state.fallingY);
  }
}

phone.addEventListener('mousemove', handlePointerMove);
phone.addEventListener('pointermove', handlePointerMove);
phone.addEventListener('touchmove', e=>{e.preventDefault(); handlePointerMove(e);}, {passive:false});

// ===== ボタン =====
startBtn.addEventListener('pointerup', ()=>{
  modal.classList.add('hidden');
  initStage(0);
  state.stageActive = true;
  gameLoop();
});

nextBtn.addEventListener('pointerup', ()=>{
  stageClearEl.classList.add('hidden');
  if(state.stage < STAGES.length-1){
    initStage(state.stage+1);
  } else {
    initStage(0);
  }
  state.stageActive = true;
});

// パドル初期位置
paddleEl.style.left = '50%';

// ゲームループ開始（モーダル表示中は待機）
gameLoop();
</script>
</body>
</html>
