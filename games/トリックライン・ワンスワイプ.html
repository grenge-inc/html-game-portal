<!DOCTYPE html>
<!--
  トリックライン・ワンスワイプ — 9:19.5 phone frame
  FF7ゴールドソーサー風スノボ：手前固定キャラ＋セグメント擬似3D（カーブ/下り/ジャンプ台）。
  左右クリック/ドラッグでキャラ移動。Phase1: 擬似3D描画コア＋赤バルーン。
-->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>トリックライン・ワンスワイプ</title>
<style>
  :root {
    --sky-top: #7ec8e3;
    --sky-mid: #b0dff0;
    --sky-bot: #dff2fb;
    --snow-top: #e8f6ff;
    --snow-bot: #ffffff;
    --course-edge: #d4a017;
    --fence-brown: #8b5e3c;
    --fence-light: #c8965a;
    --rider-body: #3d2e7c;
    --rider-jacket: #5b3fa0;
    --rider-board: #ff8c00;
    --hud-bg: rgba(0,0,0,0.35);
    --hud-accent: #ffd700;
    --popup-col: #ffd700;
    --btn-bg: #4a90d9;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;
    font-family:'Helvetica Neue',system-ui,sans-serif;user-select:none;
    -webkit-user-select:none;-webkit-tap-highlight-color:transparent;touch-action:none;}
  body{position:relative;display:flex;align-items:center;justify-content:center;}
  #phone{
    position:relative;overflow:hidden;
    width:min(100vw, calc(100vh * 9 / 19.5));
    height:min(100vh, calc(100vw * 19.5 / 9));
    --pw:min(100vw, calc(100vh * 9 / 19.5));
    --ph:min(100vh, calc(100vw * 19.5 / 9));
    --u:calc(var(--pw) / 100);
    --uh:calc(var(--ph) / 100);
    background:#1a6030;
  }
  canvas{position:absolute;top:0;left:0;width:100%;height:100%;display:block;}

  /* HUD */
  #hud{
    position:absolute;top:0;left:0;right:0;
    padding:calc(var(--uh)*1.8) calc(var(--u)*3.5);
    display:flex;justify-content:space-between;align-items:flex-start;
    pointer-events:none;z-index:10;
  }
  #hud-left{display:flex;flex-direction:column;gap:calc(var(--uh)*.5);}
  .hud-row{
    display:flex;align-items:center;gap:calc(var(--u)*2);
    background:var(--hud-bg);
    padding:calc(var(--uh)*.5) calc(var(--u)*2.5);
    border-radius:calc(var(--u)*1.5);
  }
  .hud-label{
    font-size:calc(var(--u)*2.8);font-weight:700;
    color:rgba(255,255,255,0.8);letter-spacing:.12em;text-transform:uppercase;
  }
  .hud-value{
    font-size:calc(var(--u)*3.8);font-weight:900;
    color:var(--hud-accent);font-variant-numeric:tabular-nums;
    text-shadow:0 1px 3px rgba(0,0,0,.6);
  }
  #stage-label{
    font-size:calc(var(--u)*2.8);font-weight:700;color:rgba(255,255,255,0.85);
    letter-spacing:.1em;text-transform:uppercase;
    padding:calc(var(--uh)*.5) calc(var(--u)*2.5);
    background:var(--hud-bg);
    border-radius:calc(var(--u)*1.5);
  }
  #combo-display{
    position:absolute;top:calc(var(--uh)*11);right:calc(var(--u)*3.5);
    font-size:calc(var(--u)*4);font-weight:900;
    color:#fff;
    letter-spacing:.08em;
    text-shadow:0 0 calc(var(--u)*3) rgba(255,200,50,.8),0 2px 4px rgba(0,0,0,.5);
    pointer-events:none;z-index:10;transition:opacity .3s;
    background:rgba(0,0,0,.3);padding:calc(var(--uh)*.5) calc(var(--u)*2);
    border-radius:calc(var(--u)*1.5);
  }

  /* Progress bar (distance to goal) */
  #progress-wrap{
    position:absolute;top:calc(var(--uh)*1.8);right:calc(var(--u)*3.5);
    width:calc(var(--u)*4);height:calc(var(--uh)*16);
    background:rgba(0,0,0,.35);border-radius:calc(var(--u)*2);
    overflow:hidden;display:flex;flex-direction:column-reverse;
    z-index:10;pointer-events:none;
  }
  #progress-fill{
    width:100%;background:linear-gradient(0deg,#ffd700,#ffec80);
    border-radius:calc(var(--u)*2);transition:height .1s linear;
  }
  #progress-flag{
    position:absolute;top:calc(var(--uh)*1);right:calc(var(--u)*3);
    font-size:calc(var(--u)*3.2);pointer-events:none;z-index:10;
  }

  /* Score popup */
  #score-popup{position:absolute;top:38%;left:50%;
    transform:translate(-50%,-50%) scale(0);
    font-size:calc(var(--u)*13);font-weight:900;
    color:var(--popup-col);
    filter:drop-shadow(0 0 calc(var(--u)*3) rgba(255,180,0,.9))
           drop-shadow(0 2px 6px rgba(0,0,0,.7));
    pointer-events:none;z-index:20;white-space:nowrap;opacity:0;
    -webkit-text-stroke:calc(var(--u)*.4) rgba(180,100,0,.5);
  }
  #score-popup.burst{transform:translate(-50%,-50%) scale(1.4);opacity:1;
    transition:transform .18s cubic-bezier(.34,1.56,.64,1);}
  #score-popup.fade{transform:translate(-50%,-50%) scale(1.1);opacity:0;
    transition:transform .5s ease-out,opacity .45s ease-out;}

  /* Hint */
  #hint{position:absolute;bottom:calc(var(--uh)*23);left:50%;transform:translateX(-50%);
    font-size:calc(var(--u)*3);color:rgba(255,255,255,0.85);pointer-events:none;z-index:10;
    white-space:nowrap;transition:opacity .5s;
    background:rgba(0,0,0,.4);padding:calc(var(--uh)*.6) calc(var(--u)*3);
    border-radius:calc(var(--u)*2);text-shadow:0 1px 3px rgba(0,0,0,.6);}

  /* Modals */
  .modal{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    background:rgba(10,30,80,0.82);
    backdrop-filter:blur(4px);
    z-index:30;gap:calc(var(--uh)*2.2);}
  .modal.hidden{display:none;}
  .modal-title{
    font-size:calc(var(--u)*10);font-weight:900;letter-spacing:.08em;text-transform:uppercase;
    position:relative;z-index:1;
    text-shadow:0 2px 8px rgba(0,0,0,.6);
  }
  .t-cyan{color:#7ec8e3;text-shadow:0 0 calc(var(--u)*6) rgba(126,200,227,.6),0 2px 6px rgba(0,0,0,.5);}
  .t-gold{color:var(--hud-accent);text-shadow:0 0 calc(var(--u)*6) rgba(255,215,0,.6),0 2px 6px rgba(0,0,0,.5);}
  .t-pink{color:#ff6b8a;text-shadow:0 0 calc(var(--u)*6) rgba(255,107,138,.5),0 2px 6px rgba(0,0,0,.5);}
  .modal-sub{
    font-size:calc(var(--u)*3.8);color:rgba(255,255,255,.9);text-align:center;
    max-width:82%;line-height:1.65;position:relative;z-index:1;letter-spacing:.04em;
    text-shadow:0 1px 4px rgba(0,0,0,.6);
  }
  .modal-score{
    font-size:calc(var(--u)*8);font-weight:800;color:var(--hud-accent);
    font-variant-numeric:tabular-nums;
    text-shadow:0 0 calc(var(--u)*4) rgba(255,215,0,.7),0 2px 6px rgba(0,0,0,.6);
    position:relative;z-index:1;
  }
  .goal-badge{
    padding:calc(var(--uh)*.8) calc(var(--u)*4);border-radius:calc(var(--u)*3);
    font-size:calc(var(--u)*3);font-weight:700;letter-spacing:.06em;
    position:relative;z-index:1;
  }
  .b-st1{background:rgba(126,200,227,.2);color:#7ec8e3;border:1px solid rgba(126,200,227,.6);}
  .b-st2{background:rgba(255,215,0,.15);color:var(--hud-accent);border:1px solid rgba(255,215,0,.5);}
  .btn{
    padding:calc(var(--uh)*1.8) calc(var(--u)*13);border-radius:calc(var(--u)*3);
    border:none;font-size:calc(var(--u)*5);font-weight:800;cursor:pointer;
    letter-spacing:.06em;text-transform:uppercase;
    background:linear-gradient(135deg,#4a90d9 0%,#2563b0 100%);
    color:#fff;
    box-shadow:0 calc(var(--uh)*.4) calc(var(--u)*3) rgba(0,0,0,.4),
               0 0 calc(var(--u)*6) rgba(74,144,217,.4);
    position:relative;z-index:1;
  }
  .btn:hover{filter:brightness(1.15);}
</style>
</head>
<body>
<div id="phone">
  <canvas id="c"></canvas>
  <div id="hud">
    <div id="hud-left">
      <div class="hud-row">
        <span class="hud-label">SCORE</span>
        <span class="hud-value" id="score-display">0</span>
      </div>
      <div class="hud-row">
        <span class="hud-label">TIME</span>
        <span class="hud-value" id="time-display">0.0</span>
      </div>
    </div>
    <div id="stage-label">STAGE 1</div>
  </div>
  <div id="combo-display" style="opacity:0"></div>
  <div id="progress-wrap">
    <div id="progress-fill" style="height:0%"></div>
  </div>
  <div id="progress-flag">🏁</div>
  <div id="score-popup"></div>
  <div id="hint">カーソル/スライドで左右移動 ・ ジャンプ中クリックでトリック</div>

  <!-- Difficulty select -->
  <div class="modal" id="m-select">
    <div class="modal-title t-cyan">コース選択</div>
    <div class="modal-sub">難易度を選んでスタート<br><span style="font-size:0.8em;opacity:.85">カーソル/スライドで移動・ジャンプ中クリックでトリック</span></div>
    <button class="btn" id="btn-easy">初級</button>
    <button class="btn" id="btn-normal">中級</button>
    <button class="btn" id="btn-hard">上級</button>
  </div>

  <!-- Clear -->
  <div class="modal hidden" id="m-clear">
    <div class="modal-title t-gold">STAGE CLEAR!</div>
    <div class="modal-sub" id="cl-detail"></div>
    <div class="modal-score" id="cl-score">0</div>
    <button class="btn" id="btn-next">コース選択へ</button>
  </div>

  <!-- Over -->
  <div class="modal hidden" id="m-over">
    <div class="modal-title t-pink">GAME OVER</div>
    <div class="modal-score" id="ov-score">0</div>
    <button class="btn" id="btn-retry">RETRY</button>
  </div>

  <!-- All Clear -->
  <div class="modal hidden" id="m-allclear">
    <div class="modal-title t-gold">ALL CLEAR!</div>
    <div class="modal-sub">PERFECT RUN!</div>
    <div class="modal-score" id="ac-score">0</div>
    <button class="btn" id="btn-again">PLAY AGAIN</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════════════════
//  セグメント擬似3D スノボ（Phase 1: カーブ / 下り / ジャンプ台 / 赤バルーン）
//  OutRun 系のセグメント方式。各セグメントに curve（左右）と world.y（高低）を
//  持たせ、カメラから遠→近へ投影して road ポリゴンを描く。
// ════════════════════════════════════════════════════════════════════════════
'use strict';

const phone  = document.getElementById('phone');
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── 擬似3Dパラメータ ──
const SEG_LEN     = 200;     // 1セグメントの奥行き（world z）
const RUMBLE_LEN  = 4;       // 縞の色グループ（手前へ流れる縞）
const ROAD_WIDTH  = 1100;    // コース半幅（world x）
const CAM_HEIGHT  = 1100;    // カメラ高
const DRAW_DIST   = 70;      // 描画セグメント数（短めにして「先が見えない」視界に）
const FOG_DENSITY = 2.2;     // フォグの強さ（大きいほど近くから霞む）
const FOV          = 100;
const CAM_DEPTH   = 1 / Math.tan((FOV / 2) * Math.PI / 180);
const CRUISE      = SEG_LEN * 0.58;  // 巡航速度（world z / frame @ dt=1）

let PW = 0, PH = 0, U = 1;
function resize(){
  PW = phone.offsetWidth; PH = phone.offsetHeight;
  canvas.width = PW; canvas.height = PH;
  U = PW / 100;
}

// ── 状態 ──
let segments = [];
let trackLength = 0;
let position = 0;       // カメラのz
let playerX = 0;        // -1..1（コース幅の割合）
let playerTargetX = 0;
let speed = 0;
let boostT = 0;        // 加速バルーンの残フレーム
let elapsed = 0;       // 経過フレーム（/60で秒）
let lastClearInfo = null;
let stageIdx = 0, score = 0, combo = 0;
// gameState: 'ready' | 'playing' | 'clear' | 'over' | 'allclear'
let gameState = 'ready';
let animId = null, lastTime = 0;
let frameCount = 0;

// ジャンプ
let airborne = false;
let airT = 0, airDur = 0;
let airTricks = 0;     // 空中でタップした回数（着地で加点）

// バルーン: {z, offset(-1..1), kind:'red', taken}
let balloons = [];
// 障害物: {z, offset(-1..1), kind:'rock'|'tree'|'penguin', hit}
let obstacles = [];
let _sprites = [];        // 1フレーム分のスプライト画面位置（ループ後にまとめ描画）
let spinT = 0;            // 衝突スピンの残フレーム

// パーティクル・吹雪・トレイル
let particles = [];
let snowFlakes = [];
let trail = [];
let popTimer = null;

// 入力（PC=カーソル左右で操舵 / スマホ=スライド ・ クリック/タップ=トリック）
let mDown=false, mDownX=0, mDownMoved=false;          // マウス(PC) クリック判定
let tDown=false, tStartX=0, tStartPX=0, tMoved=false; // タッチ(スマホ) スライド判定

// ── ステージ定義（Phase1: トラック台本＋バルーン）──
const STAGES = [
  {
    label:'初級', badge:'BEGINNER', badgeClass:'b-st1', parSec:15,
    sub:'左右クリックで移動！<br>カーブ・下り・ジャンプ台を滑り、<br>赤バルーンを集めよう！',
    build:function(){
      addRoad(28,22,18, 0,    0);      // 導入ストレート
      addRoad(20,28,20, 6.0,  -600);   // 大きい右カーブ（下りつき）
      addRoad(16,24,16, 0,  -2200);    // 下り
      addRamp();                        // ジャンプ台
      addRoad(20,28,20,-6.5,  0);      // 大きい左カーブ
      addRoad(18,24,18, 0,   1700);    // 上り
      addRoad(36, 0, 0, 0,    0);      // フィニッシュ直線
    },
    balloons:[ [38,0],[70,0.4,'speed'],[120,-0.3],[175,0.2],[235,0.5,'speed'] ],  // [segIndex, offset, kind?]
    obstacles:[ [52,0.55,'rock'],[100,-0.55,'tree'],[155,0.45,'penguin'],[255,-0.45,'rock'],[320,0.5,'tree'] ]
  },
  {
    label:'中級', badge:'INTERMEDIATE', badgeClass:'b-st2', parSec:26,
    sub:'うねるコースとジャンプを攻略！<br>バルーンを集めてハイスコアを狙え！',
    build:function(){
      addRoad(22,18,14, 0,    0);
      addRoad(18,22,18, 7.0,  0);      // 大きい右
      addRoad(16,22,16, 0,  -2400);    // 下り
      addRoad(18,22,18,-7.5,  0);      // 大きい左
      addRamp();
      addRoad(18,20,18, 6.0, 1900);    // 上り右
      addRoad(18,20,18,-5.5,-1500);    // 下り左
      addRamp();
      addRoad(18,22,18, 7.0,  0);      // 大きい右
      addRoad(36, 0, 0, 0,    0);
    },
    balloons:[ [34,0],[62,0.5,'speed'],[96,-0.4],[150,0.3],[205,-0.5,'speed'],[250,0.4],[300,0,'speed'],[345,0.3] ],
    obstacles:[ [48,-0.5,'tree'],[80,0.55,'rock'],[120,-0.45,'penguin'],[175,0.5,'tree'],
                [230,-0.55,'rock'],[275,0.45,'penguin'],[325,-0.5,'tree'],[370,0.5,'rock'] ]
  },
  {
    label:'上級', badge:'EXPERT', badgeClass:'b-st2', parSec:42,
    sub:'',
    build:function(){
      addRoad(22,16,12, 0,    0);
      addRoad(16,20,16, 9.0,  -900);   // 急右＋下り
      addRoad(14,18,14, 0,  -2800);    // 急下り
      addRoad(16,20,16,-10.0, 700);    // 急左
      addRamp();
      addRoad(16,20,16, 8.5, 2000);    // 急右上り
      addRoad(14,18,14,-9.5,-1900);    // 急左下り
      addRamp();
      addRoad(16,22,16, 10.5, 0);      // 急右
      addRoad(14,18,14,-8.5, 1600);    // 急左上り
      addRamp();
      addRoad(16,20,16, 9.5,-2100);    // 急右下り
      addRoad(16,20,16,-10.5, 0);      // 急左
      addRoad(30, 0, 0, 0,   0);       // フィニッシュ
    },
    balloons:[ [40,0],[85,0.5,'speed'],[140,-0.4],[200,0.3],[260,-0.5,'speed'],
               [330,0.4],[400,-0.3],[470,0.5,'speed'],[540,-0.4],[600,0.3] ],
    obstacles:[ [60,-0.5,'tree'],[95,0.55,'rock'],[130,-0.45,'penguin'],[175,0.5,'tree'],[215,-0.55,'rock'],
                [285,0.5,'penguin'],[350,-0.5,'tree'],[420,0.55,'rock'],[455,-0.45,'penguin'],[510,0.5,'tree'],
                [560,-0.55,'rock'],[610,0.45,'penguin'] ]
  }
];

// ── トラック構築ヘルパー ──
function lastY(){ return segments.length===0 ? 0 : segments[segments.length-1].p2.world.y; }
function easeIn(a,b,p){ return a+(b-a)*p*p; }
function easeInOut(a,b,p){ return a+(b-a)*(-Math.cos(p*Math.PI)/2+0.5); }

function addSegment(curve, y){
  const n = segments.length;
  segments.push({
    index:n,
    p1:{world:{x:0,y:lastY(),z:n*SEG_LEN},     camera:{x:0,y:0,z:0}, screen:{x:0,y:0,w:0,scale:0}},
    p2:{world:{x:0,y:y,     z:(n+1)*SEG_LEN}, camera:{x:0,y:0,z:0}, screen:{x:0,y:0,w:0,scale:0}},
    curve:curve,
    light:(Math.floor(n/RUMBLE_LEN)%2)===0,
    ramp:false
  });
}
// enter/hold/leave セグメント数, curve量, hill(world y 差分)
function addRoad(enter, hold, leave, curve, hill){
  const startY = lastY();
  const endY   = startY + hill;
  const total  = enter + hold + leave;
  let n;
  for(n=0;n<enter;n++) addSegment(easeIn(0,curve,n/enter),      easeInOut(startY,endY,n/total));
  for(n=0;n<hold; n++) addSegment(curve,                         easeInOut(startY,endY,(enter+n)/total));
  for(n=0;n<leave;n++) addSegment(easeInOut(curve,0,n/leave),    easeInOut(startY,endY,(enter+hold+n)/total));
}
// ジャンプ台：急な上り→頂点をrampに→急な下り（空中区間）
function addRamp(){
  const start = segments.length;
  addRoad(6,3,3, 0, 1700);   // 跳ね上がり
  if(segments[start+9]) segments[start+9].ramp = true; // 頂点付近をトリガに
  addRoad(3,6,14, 0, -1700); // 着地側の落ち込み
}

function buildTrack(idx){
  segments = [];
  STAGES[idx].build();
  trackLength = segments.length * SEG_LEN;
  // バルーン配置
  balloons = (STAGES[idx].balloons||[]).map(b=>({
    z:(Math.min(b[0],segments.length-1))*SEG_LEN,
    offset:b[1],
    kind:b[2]||'red',
    taken:false
  }));
  obstacles = (STAGES[idx].obstacles||[]).map(o=>({
    z:(Math.min(o[0],segments.length-1))*SEG_LEN,
    offset:o[1],
    kind:o[2]||'rock',
    hit:false
  }));
}

function findSegment(z){
  return segments[Math.floor(z/SEG_LEN) % segments.length];
}

// ── 投影 ──
function project(p, camX, camY, camZ){
  p.camera.x = (p.world.x||0) - camX;
  p.camera.y = (p.world.y||0) - camY;
  p.camera.z = (p.world.z)    - camZ;
  if(p.camera.z < 1) p.camera.z = 1;          // 0除算/裏回り防止
  p.screen.scale = CAM_DEPTH / p.camera.z;
  p.screen.x = Math.round(PW/2 + p.screen.scale * p.camera.x * PW/2);
  p.screen.y = Math.round(PH/2 - p.screen.scale * p.camera.y * PH/2);
  p.screen.w = Math.round(p.screen.scale * ROAD_WIDTH * PW/2);
}

// プレイヤーの足元z（カメラ手前のオフセット）
const PLAYER_Z = CAM_HEIGHT * CAM_DEPTH;

function playerScreenBaseY(){ return PH*0.82; }

// ── 入力 ──
const SLIDE_THRESH = 14;   // タッチ：これ未満の指移動はタップ扱い（移動しない）
const TAP_MOVE     = 8;    // マウス：これ未満の移動のクリック＝タップ(トリック)

// カーソル位置→目標X（絶対追従）。PCはカーソルを左右に動かすだけで操舵。
function steerToCursor(cx){
  if(gameState!=='playing') return;
  const r = phone.getBoundingClientRect();
  const t = ((cx - r.left)/PW - 0.5) * 2.4;
  playerTargetX = Math.max(-1.4, Math.min(1.4, t));
}

// クリック/タップ＝トリック（空中なら加点、地上は予約）
function doTrick(){
  if(gameState!=='playing') return;
  if(airborne){
    airTricks++; combo++;
    spawnParticles(PW/2, playerScreenBaseY()-PH*0.08, 9, '#ffe066');
    const el=document.getElementById('combo-display'); el.textContent='TRICK x'+airTricks; el.style.opacity='1';
  }
}

// ▼ マウス(PC)：ホバー（ボタン不要）でカーソル追従操舵。クリック=トリック。
phone.addEventListener('mousemove',(e)=>{
  steerToCursor(e.clientX);
  if(mDown && Math.abs(e.clientX - mDownX) > TAP_MOVE) mDownMoved = true;
});
phone.addEventListener('mousedown',(e)=>{ mDown=true; mDownX=e.clientX; mDownMoved=false; e.preventDefault(); });
window.addEventListener('mouseup',()=>{ if(mDown && !mDownMoved) doTrick(); mDown=false; });

// ▼ タッチ(スマホ)：スライドで操舵。タップ(動かさず離す)=トリック。
phone.addEventListener('touchstart',(e)=>{ if(gameState!=='playing')return; tDown=true; tStartX=e.touches[0].clientX; tStartPX=playerTargetX; tMoved=false; e.preventDefault(); },{passive:false});
phone.addEventListener('touchmove',(e)=>{
  if(!tDown||gameState!=='playing')return;
  const d = e.touches[0].clientX - tStartX;
  if(Math.abs(d) > SLIDE_THRESH){
    tMoved = true;
    const eff = d - Math.sign(d)*SLIDE_THRESH;
    playerTargetX = Math.max(-1.4, Math.min(1.4, tStartPX + eff/(PW*0.34)));
  }
  e.preventDefault();
},{passive:false});
window.addEventListener('touchend',()=>{ if(tDown && !tMoved) doTrick(); tDown=false; });

// ── 吹雪 ──
function initSnow(){
  snowFlakes=[];
  for(let i=0;i<28;i++){
    snowFlakes.push({ x:Math.random(), y:Math.random(), r:0.4+Math.random()*0.8,
      spd:0.004+Math.random()*0.01, drift:(Math.random()-.5)*0.003, a:0.25+Math.random()*0.45 });
  }
}

// ── ステージ初期化 ──
function buildStage(idx){
  buildTrack(idx);
  position = 0; speed = 0; playerX = 0; playerTargetX = 0;
  combo = 0; frameCount = 0; airborne = false; airT = 0;
  elapsed = 0; boostT = 0; spinT = 0; airTricks = 0;
  particles = []; trail = [];
  document.getElementById('stage-label').textContent = STAGES[idx].label;
  updateHUD();
}

// ── HUD ──
const fmt = (n)=>Math.round(n).toLocaleString();
function updateHUD(){
  document.getElementById('score-display').textContent = fmt(score);
  const ce = document.getElementById('combo-display');
  ce.textContent = combo>0 ? combo+' COMBO' : '';
  ce.style.opacity = combo>0 ? '1' : '0';
}
function triggerPop(amount){
  score += amount; updateHUD();
  const el = document.getElementById('score-popup');
  el.textContent = '+'+fmt(amount);
  el.className = 'burst';
  clearTimeout(popTimer);
  popTimer = setTimeout(()=>el.className='fade', 650);
}

// ── パーティクル ──
function spawnParticles(x,y,n,col){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=Math.random()*U*1.4+U*0.3;
    particles.push({ x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-U*0.4, r:U*1.2*Math.random(), life:1, col });
  }
}

// ════════════════════════════════════════════════════════════════════════════
//  メインループ
// ════════════════════════════════════════════════════════════════════════════
function startGame(idx){
  stageIdx = idx;
  score = 0;
  gameState = 'playing';
  buildStage(idx);
  hideAll();
  document.getElementById('hint').style.opacity = '1';
  if(animId!==null){ cancelAnimationFrame(animId); animId=null; }
  lastTime = performance.now();
  animId = requestAnimationFrame(loop);
}
function loop(now){
  const dt = Math.min((now-lastTime)/16.67, 3);
  lastTime = now;
  if(gameState==='playing'){
    tick(dt);
    render();
    animId = requestAnimationFrame(loop);
  } else { animId = null; }
}

function tick(dt){
  frameCount++;
  elapsed += dt;
  document.getElementById('time-display').textContent = (elapsed/60).toFixed(1);
  // 加速して巡航（加速バルーン中は目標速度UP）
  if(boostT>0) boostT -= dt;
  const tgtSpeed = boostT>0 ? CRUISE*1.7 : CRUISE;
  speed += (tgtSpeed - speed) * 0.05 * dt;
  position += speed * dt;
  if(position >= trackLength){ position = trackLength - 1; reachGoal(); return; }

  // スピン中（障害物ヒット後）は操作が効きにくい
  if(spinT>0) spinT -= dt;
  const ctrl = spinT>0 ? 0.25 : 1;

  // プレイヤー横移動（カーブの遠心力も少し）
  const seg = findSegment(position + PLAYER_Z);
  playerX += (playerTargetX - playerX) * 0.12 * dt * 3 * ctrl;
  playerX -= (seg.curve * (speed/CRUISE) * 0.0009) * dt;   // カーブで外へ流れる
  playerX = Math.max(-1.4, Math.min(1.4, playerX));

  // ジャンプ台
  if(seg.ramp && !airborne && speed>CRUISE*0.6){
    airborne = true; airDur = 52; airT = airDur; airTricks = 0;
  }
  if(airborne){
    airT -= dt;
    if(airT<=0){
      airborne = false;
      // 空中タップ回数でトリック加点（タップ無しでも着地ボーナス）
      const trickPts = (200 + airTricks*300) * Math.max(1, combo);
      triggerPop(trickPts);
      spawnParticles(PW/2, playerScreenBaseY(), 16+airTricks*4, '#bfe6ff');
    }
  }

  // バルーン取得（z到達＋横距離）
  const pz = position + PLAYER_Z;
  balloons.forEach(b=>{
    if(b.taken) return;
    if(pz < b.z) return;          // まだ到達していない
    b.taken = true;               // 到達＝処理済み（取得 or 通過）
    if(airborne || Math.abs(playerX - b.offset) >= 0.42) return;
    if(b.kind==='speed'){
      boostT = 100;                       // 加速
      speed = Math.max(speed, CRUISE*1.7);
      triggerPop(300*Math.max(1,combo));  // 少し加点
      spawnParticles(PW/2, playerScreenBaseY()-U*4, 18, '#66e0ff');
      const el=document.getElementById('combo-display'); el.textContent='BOOST!'; el.style.opacity='1';
    } else {
      combo++;
      triggerPop(500*Math.max(1,combo));
      spawnParticles(PW/2, playerScreenBaseY()-U*4, 12, '#ff5a6e');
    }
  });

  // 障害物（当たってもゲームオーバーにせず、減速＋スピンのペナルティ）
  obstacles.forEach(o=>{
    if(o.hit) return;
    if(pz < o.z) return;
    o.hit = true;
    if(!airborne && Math.abs(playerX - o.offset) < 0.38){
      speed *= 0.32;             // 減速
      spinT = 28;                // スピン＋操作低下
      combo = 0; updateHUD();    // コンボ途切れ
      spawnParticles(PW/2, playerScreenBaseY(), 22, '#cfe6ff');
    }
  });

  // 吹雪・パーティクル
  snowFlakes.forEach(s=>{ s.y+=s.spd*dt; s.x+=s.drift*dt; if(s.y>1)s.y=0; if(s.x<0)s.x=1; if(s.x>1)s.x=0; });
  particles.forEach(p=>{ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=0.12*U*0.5*dt; p.life-=0.022*dt; });
  particles = particles.filter(p=>p.life>0);

  document.getElementById('progress-fill').style.height =
    Math.min(position/trackLength*100,100)+'%';
}

function reachGoal(){
  gameState = 'clear';
  // タイムボーナス：par より速いほど高得点（FF7の「テクニック＋タイム＋バルーン」）
  const t = elapsed/60;
  const par = STAGES[stageIdx].parSec || 20;
  const timeBonus = Math.max(0, Math.round((par - t) * 400));
  const base = 1000;
  score += base + timeBonus; updateHUD();
  lastClearInfo = { t, timeBonus, base };
  triggerPop(base + timeBonus);
  render();
  endGame(true);
}

function endGame(cleared){
  document.getElementById('hint').style.opacity='0';
  if(cleared){
    const ci = lastClearInfo || {t:0,timeBonus:0,base:1000};
    document.getElementById('cl-detail').textContent =
      STAGES[stageIdx].label+' クリア　TIME '+ci.t.toFixed(1)+'s　クリア+'+fmt(ci.base)+'　タイム+'+fmt(ci.timeBonus);
    document.getElementById('cl-score').textContent = fmt(score);
    showM('m-clear');
  } else {
    document.getElementById('ov-score').textContent = fmt(score);
    showM('m-over');
  }
}

// ════════════════════════════════════════════════════════════════════════════
//  描画
// ════════════════════════════════════════════════════════════════════════════
function render(){
  ctx.clearRect(0,0,PW,PH);
  drawSky();
  renderRoad();
  drawSnow();
  drawPlayer();
  drawParticles();
  if(boostT>0) drawBoostFX();
}

// 加速中の放射スピードライン
function drawBoostFX(){
  ctx.save();
  ctx.globalAlpha = Math.min(0.45, boostT/100*0.45);
  ctx.strokeStyle = 'rgba(180,240,255,0.9)';
  ctx.lineWidth = 2;
  const cx=PW/2, cy=PH*0.55, r1=PW*0.22, r2=PW*0.6;
  for(let i=0;i<16;i++){
    const a=(i/16)*Math.PI*2 + frameCount*0.25;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*r1, cy+Math.sin(a)*r1);
    ctx.lineTo(cx+Math.cos(a)*r2, cy+Math.sin(a)*r2);
    ctx.stroke();
  }
  ctx.restore();
}

function drawSky(){
  const g = ctx.createLinearGradient(0,0,0,PH);
  g.addColorStop(0,'#5ab0d0');
  g.addColorStop(0.42,'#9dd0ec');
  g.addColorStop(0.62,'#d4ecf8');
  g.addColorStop(0.62,'#ffffff');   // 地表のベース白
  g.addColorStop(1,'#ffffff');
  ctx.fillStyle=g; ctx.fillRect(0,0,PW,PH);
  // 遠景の山（中央やや上）
  const hY=PH*0.46;
  ctx.fillStyle='rgba(150,198,226,0.45)';
  ctx.beginPath(); ctx.moveTo(0,hY);
  const mts=[0.1,0.24,0.4,0.55,0.7,0.85,1.0], mhts=[0.10,0.17,0.07,0.15,0.05,0.13,0.09];
  for(let i=0;i<mts.length;i++) ctx.lineTo(PW*mts[i], hY-PH*mhts[i]);
  ctx.lineTo(PW,hY); ctx.closePath(); ctx.fill();
}

// 台形ポリゴン塗り
function polygon(x1,y1,x2,y2,x3,y3,x4,y4,color){
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.lineTo(x4,y4);
  ctx.closePath(); ctx.fill();
}

function renderRoad(){
  _sprites.length = 0;
  const base = findSegment(position);
  const basePercent = (position % SEG_LEN)/SEG_LEN;
  const playerSeg = findSegment(position + PLAYER_Z);
  const playerPercent = ((position+PLAYER_Z) % SEG_LEN)/SEG_LEN;
  const playerY = easeInOut(playerSeg.p1.world.y, playerSeg.p2.world.y, playerPercent);

  let maxy = PH;
  let x = 0;
  let dx = -(base.curve * basePercent);
  const camX = playerX * ROAD_WIDTH;
  const camY = CAM_HEIGHT + playerY;

  for(let n=0;n<DRAW_DIST;n++){
    const idx = base.index + n;
    if(idx >= segments.length) break;
    const seg = segments[idx];

    project(seg.p1, camX - x,      camY, position);
    project(seg.p2, camX - x - dx, camY, position);
    x  += dx;
    dx += seg.curve;

    const p1=seg.p1.screen, p2=seg.p2.screen;
    if(p1.camera<=0) {}
    if(seg.p1.camera.z<=CAM_DEPTH || p2.y>=p1.y || p2.y>=maxy) continue;

    // 雪面（手前の縞で奥行き）
    const snow = seg.light ? '#ffffff' : '#e3eefb';
    polygon(0,p1.y, 0,p2.y, PW,p2.y, PW,p1.y, snow);
    // 道（コース）本体：やや青みの帯
    const road = seg.light ? '#eef6ff' : '#dcebfb';
    polygon(p1.x-p1.w,p1.y, p2.x-p2.w,p2.y, p2.x+p2.w,p2.y, p1.x+p1.w,p1.y, road);
    // コース端ライン（金）
    const rumbleW1 = p1.w*0.13, rumbleW2 = p2.w*0.13;
    const edge = seg.light ? '#e8b923' : '#c4951a';
    polygon(p1.x-p1.w-rumbleW1,p1.y, p2.x-p2.w-rumbleW2,p2.y, p2.x-p2.w,p2.y, p1.x-p1.w,p1.y, edge);
    polygon(p1.x+p1.w,p1.y, p2.x+p2.w,p2.y, p2.x+p2.w+rumbleW2,p2.y, p1.x+p1.w+rumbleW1,p1.y, edge);
    // 中央ガイド（破線的に light セグメントだけ）
    if(seg.light){
      const cw1=p1.w*0.04, cw2=p2.w*0.04;
      polygon(p1.x-cw1,p1.y, p2.x-cw2,p2.y, p2.x+cw2,p2.y, p1.x+cw1,p1.y, 'rgba(255,255,255,0.5)');
    }
    // ジャンプ台マーカー
    if(seg.ramp){
      polygon(p1.x-p1.w,p1.y, p2.x-p2.w,p2.y, p2.x+p2.w,p2.y, p1.x+p1.w,p1.y, 'rgba(255,180,74,0.9)');
    }

    // フォグ：遠いセグメントほど白く霞ませ「先が見えない」視界にする
    const fog = Math.pow(n/DRAW_DIST, FOG_DENSITY);
    if(fog>0.02) polygon(0,p1.y, 0,p2.y, PW,p2.y, PW,p1.y, 'rgba(224,239,250,'+Math.min(0.96,fog)+')');

    // スプライト（バルーン・障害物）は収集だけ。描画はループ後にまとめて＝手前を上に重ねる
    collectSpritesOnSegment(seg, p1, p2);

    maxy = p2.y;
  }
  renderSprites();
}

// スプライト（バルーン・障害物）の画面位置を収集（フォグに埋もれないようループ後に描く）
function collectSpritesOnSegment(seg, p1, p2){
  const z0 = seg.index*SEG_LEN, z1 = z0+SEG_LEN;
  const proj=(zz, off, sizeK, minR)=>{
    const f=(zz-z0)/SEG_LEN;
    const w=p1.w + (p2.w-p1.w)*f;
    return { sx:p1.x+(p2.x-p1.x)*f + off*w, sy:p1.y+(p2.y-p1.y)*f, r:Math.max(minR, w*sizeK) };
  };
  balloons.forEach(b=>{
    if(b.taken || b.z<z0 || b.z>=z1) return;
    const s=proj(b.z, b.offset, 0.26, 3); _sprites.push({type:'balloon', kind:b.kind, sx:s.sx, sy:s.sy, r:s.r});
  });
  obstacles.forEach(o=>{
    if(o.hit || o.z<z0 || o.z>=z1) return;
    const s=proj(o.z, o.offset, 0.34, 4); _sprites.push({type:'obstacle', kind:o.kind, sx:s.sx, sy:s.sy, r:s.r});
  });
}

function renderSprites(){
  _sprites.sort((a,b)=>a.r-b.r);   // 遠い(小)→近い(大) の順で重ねる
  _sprites.forEach(s=>{
    if(s.type==='balloon') drawBalloonSprite(s.sx,s.sy,s.r,s.kind);
    else drawObstacleSprite(s.kind,s.sx,s.sy,s.r);
  });
}

function drawBalloonSprite(sx,sy,r,kind){
  const by = sy - r*2.8;
  const speed = (kind==='speed');
  const col0 = speed ? '#cffcff' : '#ffb3bb';
  const col1 = speed ? '#22d3ff' : '#ff3b52';
  const col2 = speed ? '#0a86c2' : '#c81f33';
  const edge = speed ? 'rgba(10,120,180,0.85)' : 'rgba(160,20,40,0.8)';
  ctx.strokeStyle='rgba(90,70,70,0.5)'; ctx.lineWidth=Math.max(1,r*0.1);
  ctx.beginPath(); ctx.moveTo(sx,by+r*0.95); ctx.lineTo(sx,sy); ctx.stroke();
  const g=ctx.createRadialGradient(sx-r*0.34,by-r*0.36,r*0.1,sx,by,r);
  g.addColorStop(0,col0); g.addColorStop(0.5,col1); g.addColorStop(1,col2);
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.ellipse(sx,by,r*0.86,r,0,0,Math.PI*2); ctx.fill();
  ctx.lineWidth=Math.max(1,r*0.08); ctx.strokeStyle=edge;
  ctx.beginPath(); ctx.ellipse(sx,by,r*0.86,r,0,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.beginPath(); ctx.ellipse(sx-r*0.32,by-r*0.38,r*0.18,r*0.28,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=col2;
  ctx.beginPath(); ctx.moveTo(sx,by+r); ctx.lineTo(sx-r*0.16,by+r*1.18); ctx.lineTo(sx+r*0.16,by+r*1.18); ctx.closePath(); ctx.fill();
  // 加速バルーンは ⚡ マーク
  if(speed && r>8){
    ctx.fillStyle='#fff8b0';
    ctx.beginPath();
    ctx.moveTo(sx+r*0.10,by-r*0.5); ctx.lineTo(sx-r*0.28,by+r*0.08); ctx.lineTo(sx-r*0.02,by+r*0.08);
    ctx.lineTo(sx-r*0.12,by+r*0.55); ctx.lineTo(sx+r*0.30,by-r*0.06); ctx.lineTo(sx+r*0.02,by-r*0.06);
    ctx.closePath(); ctx.fill();
  }
}

function drawObstacleSprite(kind,sx,sy,r){
  // 影
  ctx.fillStyle='rgba(60,90,140,0.28)';
  ctx.beginPath(); ctx.ellipse(sx,sy,r*0.95,r*0.28,0,0,Math.PI*2); ctx.fill();
  if(kind==='tree'){
    // 雪化粧した針葉樹
    ctx.fillStyle='#5a3a1e';
    ctx.fillRect(sx-r*0.13, sy-r*0.6, r*0.26, r*0.7);
    for(let i=0;i<3;i++){
      const yy=sy-r*0.5-i*r*0.7, ww=r*(1.1-i*0.28);
      ctx.fillStyle='#1f7a44';
      ctx.beginPath(); ctx.moveTo(sx,yy-r*0.9); ctx.lineTo(sx-ww,yy); ctx.lineTo(sx+ww,yy); ctx.closePath(); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.85)';
      ctx.beginPath(); ctx.moveTo(sx,yy-r*0.9); ctx.lineTo(sx-ww*0.5,yy-r*0.45); ctx.lineTo(sx+ww*0.5,yy-r*0.45); ctx.closePath(); ctx.fill();
    }
  } else if(kind==='penguin'){
    ctx.fillStyle='#1b2330';
    ctx.beginPath(); ctx.ellipse(sx,sy-r*0.7,r*0.6,r*0.85,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(sx,sy-r*0.55,r*0.36,r*0.6,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffb300';
    ctx.beginPath(); ctx.moveTo(sx,sy-r*0.95); ctx.lineTo(sx-r*0.18,sy-r*0.78); ctx.lineTo(sx+r*0.18,sy-r*0.78); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#1b2330';
    ctx.beginPath(); ctx.arc(sx-r*0.18,sy-r*1.05,r*0.07,0,Math.PI*2); ctx.arc(sx+r*0.18,sy-r*1.05,r*0.07,0,Math.PI*2); ctx.fill();
  } else {
    // 岩
    const g=ctx.createLinearGradient(sx-r,sy-r,sx+r,sy);
    g.addColorStop(0,'#9aa6b2'); g.addColorStop(1,'#5d6b7a');
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.moveTo(sx-r*0.9,sy); ctx.lineTo(sx-r*0.5,sy-r*0.85); ctx.lineTo(sx+r*0.2,sy-r*1.0);
    ctx.lineTo(sx+r*0.85,sy-r*0.5); ctx.lineTo(sx+r*0.9,sy); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.beginPath(); ctx.moveTo(sx-r*0.5,sy-r*0.85); ctx.lineTo(sx+r*0.2,sy-r*1.0); ctx.lineTo(sx-r*0.1,sy-r*0.7); ctx.closePath(); ctx.fill();
  }
}

function drawSnow(){
  snowFlakes.forEach(s=>{
    ctx.globalAlpha=s.a*0.6; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x*PW,s.y*PH*0.6, s.r*U*0.7,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawPlayer(){
  const baseY = playerScreenBaseY();
  // 空中は弧を描いて持ち上げ
  let lift = 0;
  if(airborne){ const t=1-airT/airDur; lift = -Math.sin(t*Math.PI)*PH*0.16; }
  // 擬似3Dではカメラが playerX を追従して道側がずれるため、プレイヤーは画面中央固定。
  // 傾きだけ動きに応じて付ける。
  const sx = PW/2;
  const sy = baseY + lift;
  const sz = U*8;
  const lean = (playerTargetX - playerX)*0.5;
  const spin = spinT>0 ? spinT*0.5 : 0;   // 衝突時はくるくる回る
  // 空中はタップ数ぶんフリップ（トリック演出）
  const airSpin = airborne ? (1-airT/airDur)*airTricks*Math.PI : 0;

  ctx.save();
  ctx.translate(sx,sy); ctx.rotate(lean + spin + airSpin);
  // 影
  ctx.globalAlpha=airborne?0.15:0.28; ctx.fillStyle='rgba(60,100,160,0.5)';
  ctx.beginPath(); ctx.ellipse(0, sz*0.2 - lift*0.0, sz*0.75, sz*0.2,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  // ボード
  const bg=ctx.createLinearGradient(-sz*0.8,0,sz*0.8,0);
  bg.addColorStop(0,'#ff8c00'); bg.addColorStop(1,'#ffb347');
  ctx.fillStyle=bg;
  ctx.beginPath();
  (ctx.roundRect? ctx.roundRect(-sz*0.8,sz*0.05,sz*1.6,sz*0.34,sz*0.16) : ctx.rect(-sz*0.8,sz*0.05,sz*1.6,sz*0.34));
  ctx.fill();
  // 体
  ctx.fillStyle='#5b3fa0';
  ctx.beginPath(); ctx.ellipse(0,-sz*0.45,sz*0.32,sz*0.5,0,0,Math.PI*2); ctx.fill();
  // 頭
  ctx.fillStyle='#3d2e7c';
  ctx.beginPath(); ctx.arc(0,-sz*1.0,sz*0.26,0,Math.PI*2); ctx.fill();
  // 雪しぶき
  if(!airborne && speed>1){
    ctx.fillStyle='rgba(255,255,255,0.5)';
    for(let i=0;i<3;i++){ ctx.beginPath(); ctx.arc((-1+i)*sz*0.5, sz*0.3, sz*0.12,0,Math.PI*2); ctx.fill(); }
  }
  ctx.restore();
}

function drawParticles(){
  particles.forEach(p=>{
    const life=Math.max(0,p.life);
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*life,0,Math.PI*2);
    const a=Math.floor(life*255).toString(16).padStart(2,'0');
    ctx.fillStyle=p.col+a; ctx.fill();
  });
}

// ── モーダル ──
function showM(id){ hideAll(); document.getElementById(id).classList.remove('hidden'); }
function hideAll(){ ['m-select','m-clear','m-over','m-allclear'].forEach(id=>document.getElementById(id).classList.add('hidden')); }
function showSelect(){
  gameState='select';
  document.getElementById('progress-fill').style.height='0%';
  document.getElementById('hint').style.opacity='0';
  resize(); initSnow(); buildStage(0); render();   // 背景に初級コースを描画
  showM('m-select');
}

// ── ボタン ──
document.getElementById('btn-easy').addEventListener('click',()=>{ startGame(0); });
document.getElementById('btn-normal').addEventListener('click',()=>{ startGame(1); });
document.getElementById('btn-hard').addEventListener('click',()=>{ startGame(2); });
document.getElementById('btn-next').addEventListener('click',()=>{ showSelect(); });   // クリア→コース選択へ
document.getElementById('btn-retry').addEventListener('click',()=>{ startGame(stageIdx); });
document.getElementById('btn-again').addEventListener('click',()=>{ showSelect(); });
window.addEventListener('resize',()=>{ resize(); if(gameState!=='playing') render(); });

// ── Init ──
resize();
initSnow();
showSelect();
</script>
