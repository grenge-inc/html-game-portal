<!DOCTYPE html>
<!--
  Phone frame template for hybrid-casual-mentor generated games.
  Aspect ratio: 9:19.5 (iPhone X 系縦長, NEONNOVA2048 基準)。
  PC で開いても常にこの比率を保ち、letterbox（左右黒帯）で中央表示。
  すべてのゲーム要素は #phone の子として配置すること。
-->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>ダイスチャージ・ダンジョン</title>
<style>
  :root {
    --phone-aspect: 9 / 19.5;
    /* 背景階層（ダンジョンの深い闇） */
    --bg-deep: #02030a;
    --bg-mid: #0a1430;
    --bg-panel: #06081a;
    --bg-card: #0b1228;
    --line: #1a2848;
    /* ダンジョン環境の主題色 */
    --dungeon-1: #160b2e;
    --dungeon-2: #0a0a24;
    --dungeon-glow: #4a2a8a;
    /* アクセント主役色（魔力のシアン） */
    --cyan: #6ff;
    --cyan-soft: #8df;
    --cyan-grad-1: #3df;
    --cyan-grad-2: #06a;
    /* テキスト・罫線 */
    --text-main: #eaf3ff;
    --text-sub: #cdddef;
    --text-dim: #7a92b5;
    --white: #fff;
    /* HP・警告 */
    --hp-pink: #ff8aa0;
    --warn: #ffb86c;
    /* 強度バリエーション（炎〜光） */
    --nova-9: #ffd76b;
    --nova-7: #ffb24a;
    --nova-5: #ff7a3a;
    --nova-3: #ff5d8a;
    --nova-1: #b585ff;
    --nova-0: #ffffff;
    /* 敵カラー */
    --enemy: #ff5d8a;
    --enemy-core: #ffd1de;
    --player: #6ff;
    /* プレイヤーHP */
    --player-hp: #ff4466;
    --player-hp-bg: #3a0a14;
    --player-hp-border: #ff6688;
    /* 黄金（ゾロ目・勝利） */
    --gold: #ffd700;
    --gold-bright: #fff0a0;
    --gold-deep: #b8860b;
    /* 回復サイコロ（緑系） */
    --heal-green: #5dff8f;
    --heal-green-soft: #8fffb8;
    --heal-green-grad: #2daa5f;
    --heal-green-deep: #0a4a20;
    --heal-green-glow: rgba(93,255,143,0.5);
    --heal-green-tint: rgba(93,255,143,0.18);
    /* 半透明ユーティリティ */
    --sheen: rgba(255,255,255,0.12);
    --sheen-strong: rgba(255,255,255,0.2);
    --gold-aura: rgba(255,215,0,0.6);
    --gold-soft: rgba(255,215,0,0.4);
    --scrim: rgba(0,0,0,0.82);
    --btn-blue-1: #1a3a6a;
    --btn-blue-2: #0e2448;
    --btn-green: #5dff8f;
    --btn-green-1: #1a5a2a;
    --btn-green-2: #0e3a18;
    --btn-green-glow: rgba(93,255,143,0.4);
    --crit-yellow: #ff0;
    --red-glow: rgba(255,90,90,0.5);
    --letterbox: #000;
    --cyan-tint: rgba(111,255,255,0.18);
    --cyan-tint-soft: rgba(111,255,255,0.08);
    --panel-tint: rgba(6,8,26,0.6);
    --gold-tint: rgba(255,215,0,0.12);
    --gold-ring: rgba(255,215,0,0.25);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html, body {
    width:100%; height:100%;
    overflow:hidden;
    background:var(--letterbox);
    color:var(--text-main);
    font-family:'Helvetica Neue', 'Hiragino Kaku Gothic ProN', system-ui, sans-serif;
    font-variant-numeric: tabular-nums;
    user-select:none;
    -webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
  }
  body {
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #phone {
    position:relative;
    overflow:hidden;
    width:  min(100vw, calc(100vh * 9 / 19.5));
    height: min(100vh, calc(100vw * 19.5 / 9));
    --pw:   min(100vw, calc(100vh * 9 / 19.5));
    --ph:   min(100vh, calc(100vw * 19.5 / 9));
    --u:    calc(var(--pw) / 100);
    --uh:   calc(var(--ph) / 100);
    background:
      radial-gradient(120% 60% at 50% 18%, var(--dungeon-glow) 0%, transparent 55%),
      radial-gradient(90% 50% at 50% 100%, var(--dungeon-1) 0%, transparent 60%),
      linear-gradient(180deg, var(--dungeon-2) 0%, var(--bg-mid) 55%, var(--bg-deep) 100%);
  }
  /* ダンジョンの石組み環境ライン */
  #dungeon-bg {
    position:absolute; inset:0;
    pointer-events:none;
    z-index:0;
    background:
      repeating-linear-gradient(0deg, transparent 0, transparent calc(var(--uh)*7.5), rgba(74,42,138,0.08) calc(var(--uh)*7.5), rgba(74,42,138,0.08) calc(var(--uh)*7.5 + 1px)),
      repeating-linear-gradient(90deg, transparent 0, transparent calc(var(--u)*16), rgba(74,42,138,0.06) calc(var(--u)*16), rgba(74,42,138,0.06) calc(var(--u)*16 + 1px));
    -webkit-mask: radial-gradient(120% 80% at 50% 40%, #000 30%, transparent 90%);
            mask: radial-gradient(120% 80% at 50% 40%, #000 30%, transparent 90%);
    opacity:0.7;
  }
  /* 上部の祭壇グロー */
  #altar-glow {
    position:absolute;
    top: calc(var(--uh)*10); left:50%;
    transform:translateX(-50%);
    width: calc(var(--u)*70); height: calc(var(--uh)*30);
    pointer-events:none; z-index:0;
    background: radial-gradient(ellipse at center, var(--gold-soft) 0%, transparent 70%);
    opacity:0.18;
    filter: blur(calc(var(--u)*2));
  }

  /* HUD（敵HP） */
  #hud {
    position:absolute; top:0; left:0; right:0;
    height: calc(var(--uh) * 12);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap: calc(var(--uh) * 0.8);
    padding: calc(var(--uh) * 1.5) calc(var(--u) * 3);
    z-index:10;
  }
  #stage-label {
    display:inline-flex; align-items:center; gap: calc(var(--u)*1.2);
    font-size: calc(var(--u) * 3.6);
    font-weight:700;
    color: var(--cyan-soft);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: calc(var(--uh)*0.4) calc(var(--u)*3);
    border: 1px solid var(--line);
    border-radius: 99px;
    background: linear-gradient(180deg, var(--cyan-tint-soft), var(--panel-tint));
    box-shadow: inset 0 1px 0 var(--sheen);
  }
  #enemy-name {
    font-size: calc(var(--u) * 6.5);
    font-weight: 800;
    letter-spacing:0.04em;
    background: linear-gradient(180deg, var(--enemy-core), var(--enemy));
    -webkit-background-clip: text;
            background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 calc(var(--u)*2.5) var(--enemy));
  }
  .hp-bar-wrap {
    position:relative;
    width: 80%; height: calc(var(--uh) * 1.9);
    background: var(--bg-panel);
    border-radius: 99px;
    border: 1px solid var(--line);
    overflow:hidden;
    box-shadow: inset 0 calc(var(--uh)*0.3) calc(var(--uh)*0.6) rgba(0,0,0,0.6);
  }
  #hp-bar {
    height:100%;
    background: linear-gradient(90deg, var(--nova-3), var(--nova-5), var(--nova-7));
    border-radius: 99px;
    transition: width 0.4s ease;
    box-shadow: 0 0 calc(var(--u)*2) var(--nova-5);
  }
  #hp-bar::after {
    content:''; position:absolute; inset:0;
    background: linear-gradient(180deg, var(--sheen-strong), transparent 60%);
    border-radius: 99px;
  }
  #hp-text {
    font-size: calc(var(--u) * 3.5);
    font-weight:700;
    color: var(--hp-pink);
    letter-spacing:0.05em;
  }

  /* プレイヤーHP表示エリア */
  #player-hud {
    position:absolute;
    top: calc(var(--uh) * 12.5);
    left: 0; right: 0;
    height: calc(var(--uh) * 6);
    display:flex; align-items:center; justify-content:center;
    gap: calc(var(--u) * 2);
    z-index:10;
    padding: 0 calc(var(--u) * 4);
  }
  #player-hp-label {
    font-size: calc(var(--u) * 3.2);
    font-weight:700;
    color: var(--player-hp);
    letter-spacing:0.08em;
    text-shadow: 0 0 calc(var(--u)*2) var(--player-hp);
  }
  #player-hearts {
    display:flex;
    gap: calc(var(--u) * 1.5);
    align-items:center;
  }
  .heart {
    font-size: calc(var(--u) * 5.5);
    line-height:1;
    transition: transform 0.2s, opacity 0.3s;
    filter: drop-shadow(0 0 calc(var(--u)*1.5) var(--player-hp));
  }
  .heart.lost {
    opacity: 0.2;
    filter: none;
    transform: scale(0.8);
  }
  @keyframes heartShake {
    0%,100%{transform:scale(1) rotate(0deg);}
    25%{transform:scale(1.3) rotate(-15deg);}
    75%{transform:scale(1.1) rotate(10deg);}
  }
  .heart.hit {
    animation: heartShake 0.35s ease;
  }
  @keyframes heartHeal {
    0%{transform:scale(1);}
    40%{transform:scale(1.4);}
    70%{transform:scale(1.1);}
    100%{transform:scale(1);}
  }
  .heart.healed {
    animation: heartHeal 0.4s ease;
  }

  /* 敵エリア */
  #enemy-area {
    position:absolute;
    top: calc(var(--uh) * 19);
    left:0; right:0;
    height: calc(var(--uh) * 24);
    display:flex; align-items:center; justify-content:center;
    z-index:5;
  }
  /* 召喚の魔法陣 */
  #enemy-area::before {
    content:''; position:absolute;
    bottom: calc(var(--uh)*2);
    width: calc(var(--u)*46); height: calc(var(--u)*46);
    border-radius:50%;
    background: radial-gradient(circle, var(--gold-soft) 0%, transparent 62%);
    border: 1px solid var(--gold-ring);
    opacity:0.5;
    animation: ringSpin 9s linear infinite;
  }
  @keyframes ringSpin {
    from{transform:rotate(0) scaleY(0.42);}
    to{transform:rotate(360deg) scaleY(0.42);}
  }
  #enemy-sprite {
    position:relative;
    font-size: calc(var(--u) * 22);
    line-height:1;
    filter: drop-shadow(0 0 calc(var(--u)*4) var(--enemy));
    transition: transform 0.1s;
    animation: enemyBob 2.6s ease-in-out infinite;
  }
  @keyframes enemyBob {
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(calc(var(--uh)*-1.5));}
  }
  #enemy-sprite.shake {
    animation: shake 0.3s ease;
  }
  @keyframes shake {
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(calc(var(--u)*-2));}
    75%{transform:translateX(calc(var(--u)*2));}
  }

  /* 敵攻撃エフェクト */
  #player-hit-flash {
    position:absolute; inset:0;
    background: radial-gradient(ellipse at 50% 100%, var(--player-hp) 0%, transparent 60%);
    opacity:0;
    pointer-events:none;
    z-index:48;
  }
  #player-hit-flash.pop {
    animation: playerHitPop 0.5s ease forwards;
  }
  @keyframes playerHitPop {
    0%{opacity:0.55;}
    100%{opacity:0;}
  }

  /* 回復エフェクト */
  #heal-flash {
    position:absolute; inset:0;
    background: radial-gradient(ellipse at 50% 80%, var(--heal-green) 0%, transparent 60%);
    opacity:0;
    pointer-events:none;
    z-index:48;
  }
  #heal-flash.pop {
    animation: healFlashPop 0.5s ease forwards;
  }
  @keyframes healFlashPop {
    0%{opacity:0.4;}
    100%{opacity:0;}
  }

  /* ダメージ数値 */
  .dmg-float {
    position:absolute;
    font-size: calc(var(--u) * 8);
    font-weight:900;
    color: var(--warn);
    text-shadow: 0 0 calc(var(--u)*2) var(--nova-7);
    pointer-events:none;
    animation: floatUp 0.9s ease forwards;
    z-index:20;
  }
  .dmg-float.critical {
    font-size: calc(var(--u) * 12);
    color: var(--gold-bright);
    text-shadow: 0 0 calc(var(--u)*4) var(--gold), 0 0 calc(var(--u)*8) var(--crit-yellow);
  }
  .dmg-float.player-dmg {
    color: var(--player-hp);
    font-size: calc(var(--u) * 7);
    text-shadow: 0 0 calc(var(--u)*2) var(--player-hp);
  }
  .dmg-float.heal-float {
    color: var(--heal-green);
    font-size: calc(var(--u) * 7);
    text-shadow: 0 0 calc(var(--u)*3) var(--heal-green);
  }
  /* 回復失敗MISS表示 */
  .dmg-float.heal-miss {
    color: #ff9900;
    font-size: calc(var(--u) * 6.5);
    text-shadow: 0 0 calc(var(--u)*2) #ff6600;
  }
  @keyframes floatUp {
    0%{opacity:1;transform:translateY(0) scale(1);}
    60%{opacity:1;transform:translateY(calc(var(--uh)*-8)) scale(1.2);}
    100%{opacity:0;transform:translateY(calc(var(--uh)*-14)) scale(0.8);}
  }

  /* ゾロ目ボーナステキスト */
  #zoroeye-text {
    position:absolute;
    top: calc(var(--uh) * 41);
    left:0; right:0;
    text-align:center;
    font-size: calc(var(--u) * 11);
    font-weight:900;
    letter-spacing:0.04em;
    background: linear-gradient(180deg, var(--gold-bright), var(--gold), var(--gold-deep));
    -webkit-background-clip: text;
            background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 calc(var(--u)*4) var(--gold));
    opacity:0;
    pointer-events:none;
    z-index:25;
  }
  #zoroeye-text.show {
    animation: zoroShow 1.0s ease forwards;
  }
  @keyframes zoroShow {
    0%{opacity:0;transform:scale(0.5);}
    30%{opacity:1;transform:scale(1.3);}
    70%{opacity:1;transform:scale(1.1);}
    100%{opacity:0;transform:scale(0.9);}
  }

  /* ダイスエリア */
  #dice-area {
    position:absolute;
    bottom: calc(var(--uh) * 23);
    left:0; right:0;
    height: calc(var(--uh) * 20);
    display:flex; align-items:center; justify-content:center;
    gap: calc(var(--u) * 3);
    z-index:8;
    flex-wrap: wrap;
  }
  /* 通常ダイス（シアン系・攻撃モード） */
  .die {
    width: calc(var(--u) * 18);
    height: calc(var(--u) * 18);
    background:
      radial-gradient(120% 80% at 30% 22%, var(--cyan-grad-1) 0%, transparent 45%),
      linear-gradient(135deg, var(--bg-card) 0%, var(--bg-mid) 100%);
    border: 2px solid var(--cyan);
    border-radius: calc(var(--u) * 3);
    display:flex; align-items:center; justify-content:center;
    font-size: calc(var(--u) * 9);
    font-weight:900;
    color: var(--text-main);
    text-shadow: 0 0 calc(var(--u)*1.5) var(--cyan);
    box-shadow: 0 0 calc(var(--u)*3) var(--cyan-soft),
                inset 0 1px 0 var(--sheen);
    transition: transform 0.1s, box-shadow 0.2s, border-color 0.2s;
    position:relative;
    overflow:hidden;
    cursor: pointer; /* 全ダイスがタップ可能 */
  }
  .die::before {
    content:''; position:absolute;
    top:0; left:0; right:0;
    height:45%;
    background: linear-gradient(180deg, var(--sheen-strong), transparent);
    border-radius: calc(var(--u)*3) calc(var(--u)*3) 0 0;
    pointer-events:none;
  }
  /* 切り替えヒント（全ダイスにタップ可能表示） */
  .die::after {
    content: '⇄';
    position: absolute;
    top: calc(var(--u)*0.6);
    left: calc(var(--u)*0.8);
    font-size: calc(var(--u)*2.6);
    color: var(--cyan-soft);
    opacity: 0.7;
    pointer-events: none;
    font-weight: 400;
  }
  /* 通常ダイスが回復モードに切り替え済み（緑系） */
  .die.heal-mode {
    background:
      radial-gradient(120% 80% at 30% 22%, var(--heal-green-grad) 0%, transparent 45%),
      linear-gradient(135deg, var(--heal-green-deep) 0%, #051a0c 100%);
    border: 2px solid var(--heal-green);
    color: var(--heal-green-soft);
    text-shadow: 0 0 calc(var(--u)*1.5) var(--heal-green);
    box-shadow: 0 0 calc(var(--u)*3) var(--heal-green),
                inset 0 1px 0 var(--sheen);
  }
  .die.heal-mode::after {
    color: var(--heal-green-soft);
  }
  /* 旧来の緑ダイス（spec上の healDice）: デフォルト回復モード */
  .die.heal-die {
    background:
      radial-gradient(120% 80% at 30% 22%, var(--heal-green-grad) 0%, transparent 45%),
      linear-gradient(135deg, var(--heal-green-deep) 0%, #051a0c 100%);
    border: 2px solid var(--heal-green);
    color: var(--heal-green-soft);
    text-shadow: 0 0 calc(var(--u)*1.5) var(--heal-green);
    box-shadow: 0 0 calc(var(--u)*3) var(--heal-green),
                inset 0 1px 0 var(--sheen);
  }
  .die.heal-die::after {
    color: var(--heal-green-soft);
  }
  /* 回復ダイス（攻撃モードに切り替え済み: 赤橙系） */
  .die.heal-die.atk-mode {
    background:
      radial-gradient(120% 80% at 30% 22%, var(--nova-7) 0%, transparent 45%),
      linear-gradient(135deg, #3a1000 0%, #1a0800 100%);
    border: 2px solid var(--nova-5);
    color: var(--nova-9);
    text-shadow: 0 0 calc(var(--u)*1.5) var(--nova-7);
    box-shadow: 0 0 calc(var(--u)*3) var(--nova-5),
                inset 0 1px 0 var(--sheen);
  }
  .die.heal-die.atk-mode::after {
    color: var(--nova-7);
  }
  .die.rolling {
    animation: rollAnim 0.15s ease infinite;
  }
  .die.landed {
    box-shadow: 0 0 calc(var(--u)*5) var(--gold),
                inset 0 1px 0 var(--sheen-strong);
    border-color: var(--gold);
  }
  .die.heal-mode.landed {
    box-shadow: 0 0 calc(var(--u)*5) var(--heal-green),
                inset 0 1px 0 var(--sheen-strong);
    border-color: var(--heal-green-soft);
  }
  .die.heal-die.landed {
    box-shadow: 0 0 calc(var(--u)*5) var(--heal-green),
                inset 0 1px 0 var(--sheen-strong);
    border-color: var(--heal-green-soft);
  }
  .die.heal-die.atk-mode.landed {
    box-shadow: 0 0 calc(var(--u)*5) var(--nova-7),
                inset 0 1px 0 var(--sheen-strong);
    border-color: var(--nova-9);
  }
  /* 回復失敗（misfire）: オレンジ枠でクロスマーク */
  .die.heal-miss-die {
    box-shadow: 0 0 calc(var(--u)*5) #ff6600,
                inset 0 1px 0 var(--sheen-strong);
    border-color: #ff9900;
    animation: missPulse 0.4s ease;
  }
  @keyframes missPulse {
    0%{transform:scale(1);}
    30%{transform:scale(0.88) rotate(-6deg);}
    70%{transform:scale(1.06) rotate(3deg);}
    100%{transform:scale(1) rotate(0deg);}
  }
  .die.zoro {
    box-shadow: 0 0 calc(var(--u)*8) var(--gold),
                0 0 calc(var(--u)*15) var(--gold-aura),
                inset 0 1px 0 var(--sheen-strong);
    border-color: var(--gold-bright);
    color: var(--gold-bright);
    text-shadow: 0 0 calc(var(--u)*2) var(--gold);
    background:
      radial-gradient(120% 80% at 30% 22%, var(--gold) 0%, transparent 50%),
      linear-gradient(135deg, var(--gold-deep) 0%, #1a1000 100%);
    animation: zoroPulse 0.5s ease;
  }
  /* 回復ダイスが着地・回復した瞬間 */
  .die.heal-activated {
    box-shadow: 0 0 calc(var(--u)*8) var(--heal-green),
                0 0 calc(var(--u)*15) var(--heal-green-glow),
                inset 0 1px 0 var(--sheen-strong);
    border-color: var(--heal-green-soft);
    animation: healPulse 0.5s ease;
  }
  @keyframes healPulse {
    0%{transform:scale(1);}
    40%{transform:scale(1.18);}
    100%{transform:scale(1);}
  }
  @keyframes zoroPulse {
    0%{transform:scale(1);}
    40%{transform:scale(1.18);}
    100%{transform:scale(1);}
  }
  @keyframes rollAnim {
    0%{transform:rotate(-5deg) scale(1.05);}
    50%{transform:rotate(5deg) scale(0.95);}
    100%{transform:rotate(-5deg) scale(1.05);}
  }
  /* ダイス切り替え時フィードバック */
  .die.toggled {
    animation: toggleBounce 0.25s ease;
  }
  @keyframes toggleBounce {
    0%{transform:scale(1);}
    40%{transform:scale(0.85);}
    80%{transform:scale(1.12);}
    100%{transform:scale(1);}
  }
  .die-face-label {
    position:absolute;
    bottom: calc(var(--u)*0.8);
    right: calc(var(--u)*1);
    font-size: calc(var(--u)*2.2);
    color: var(--text-dim);

    -webkit-background-clip: text;

  .modal-btn {

  /* ゲームオーバーモーダル */
  #gameover-modal {

  .go-box {

<body>
  <div id="phone">

    <!-- ダンジョン環境演出 -->
    <div id="dungeon-bg"></div>
    <div id="altar-glow"></div>

    <!-- 星の背景はJSで生成 -->

    <!-- HUD（敵HP） -->
    <div id="hud">
      <div id="stage-label">Stage 1 / 5</div>
      <div id="enemy-name">スライム</div>
      <div class="hp-bar-wrap">
        <div id="hp-bar" style="width:100%"></div>
      </div>
      <div id="hp-text">HP: 6 / 6</div>
    </div>

    <!-- プレイヤーHP表示 -->
    <div id="player-hud">
      <div id="player-hp-label">PLAYER</div>
      <div id="player-hearts">
        <!-- JSで動的生成 -->
      </div>
    </div>

    <!-- 敵エリア -->
    <div id="enemy-area">
      <div id="enemy-sprite">🟢</div>
    </div>

    <!-- ゾロ目テキスト -->
    <div id="zoroeye-text">LUCKY!×2</div>

    <!-- ダイスエリア -->
    <div id="dice-area">
      <!-- JSで動的生成 -->
    </div>

    <!-- スコアライン -->
    <div id="score-line">
      <div id="total-dmg"></div>
    </div>

    <!-- クリックボタン -->
    <div id="click-btn">
      <span id="click-btn-text">⚔ ROLL DICE!</span>
    </div>

    <!-- フラッシュ -->
    <div id="flash"></div>

    <!-- プレイヤー被ダメフラッシュ -->
    <div id="player-hit-flash"></div>

    <!-- 回復フラッシュ -->
    <div id="heal-flash"></div>

    <!-- ステージクリアモーダル -->
    <div id="modal">
      <div class="modal-box">
        <div class="modal-title">CLEAR!</div>
        <div class="modal-sub" id="modal-sub">敵を倒した！</div>
        <div class="modal-btn" id="modal-btn">次のステージへ →</div>
      </div>
    </div>

    <!-- ゲームオーバーモーダル -->
    <div id="gameover-modal">
      <div class="go-box">
        <div class="go-title">💀 GAME OVER</div>
        <div class="go-sub" id="go-sub">力尽きてしまった…</div>
        <div class="go-btn" id="go-restart-btn">もう一度挑戦</div>
      </div>
    </div>

    <!-- ゲームクリアモーダル -->
    <div id="gameclear-modal">
      <div class="gc-box">
        <div class="gc-title">🏆 DUNGEON<br>CLEARED!</div>
        <div class="gc-sub">全ステージ制覇！<br>勇者の伝説が刻まれた</div>
        <div class="gc-btn" id="gc-restart-btn">もう一度プレイ</div>
      </div>
    </div>

  </div>
<script>
// ===== ゲームデータ =====
// 全ダイスが攻撃↔回復の切り替え可能。
// normalDice: 通常ダイス（デフォルト攻撃モード: シアン色）
// healDice: 特殊回復ダイス（デフォルト回復モード: 緑色）
// 両タイプとも個別タップで攻撃モード/回復モードを切り替え可能。
// 回復モードのダイスはロール時に50%の確率で失敗する（ギャンブル要素）
const STAGES = [
  {
    id: 1,
    label: 'Stage 1 / 5',
    enemyName: 'スライム',
    enemyEmoji: '🟢',
    enemyHP: 6,
    diceCount: 2,
    diceFaces: 4,
    enemyAtk: 1,
    healDice: 0,    // St1: 緑ダイスなし（全通常ダイスが攻撃↔回復切り替え可）
    healAmount: 1,
    desc: '操作を覚えよう！ダイスをタップして攻撃⇄回復を切り替えられる！',
    learningGoal: '操作理解＋コア体験'
  },
  {
    id: 2,
    label: 'Stage 2 / 5',
    enemyName: 'ゴブリン',
    enemyEmoji: '👺',
    enemyHP: 9,
    diceCount: 3,
    diceFaces: 4,
    enemyAtk: 1,
    healDice: 1,    // 緑ダイス1個（デフォルト回復モード）+ 通常ダイスも切り替え可
    healAmount: 1,
    desc: '全ダイスをタップして攻撃⇄回復を切り替えよう！',
    learningGoal: '操作理解＋コア体験（発展）＋全ダイス切り替え応用'
  },
  {
    id: 3,
    label: 'Stage 3 / 5',
    enemyName: 'オーク',
    enemyEmoji: '👹',
    enemyHP: 12,
    diceCount: 2,
    diceFaces: 6,
    enemyAtk: 2,
    healDice: 1,    // 緑ダイス1個
    healAmount: 1,
    desc: 'D6ダイス！どのダイスを回復に回すか戦略的に判断せよ！',
    learningGoal: '思考＋応用（入門）'
  },
  {
    id: 4,
    label: 'Stage 4 / 5',
    enemyName: 'ゴーレム',
    enemyEmoji: '🗿',
    enemyHP: 60,
    diceCount: 3,
    diceFaces: 6,
    enemyAtk: 2,
    healDice: 1,    // 緑ダイス1個
    healAmount: 1,
    desc: 'HP管理しながら全ダイスの攻撃↔回復を賢く使え！',
    learningGoal: '思考＋応用（中級）'
  },
  {
    id: 5,
    label: 'Stage 5 / 5',
    enemyName: 'ドラゴン',
    enemyEmoji: '🐉',
    enemyHP: 100,
    diceCount: 3,
    diceFaces: 8,
    enemyAtk: 3,
    healDice: 2,    // 緑ダイス2個 + 通常ダイスも切り替え可能
    healAmount: 1,
    desc: '最強D8！全5ダイスをどう配分する？',
    learningGoal: '思考＋応用（最終決戦）'
  }
];

// ===== プレイヤーHP設定 =====
const PLAYER_MAX_HP = 6;
let playerHP = PLAYER_MAX_HP;

// ===== 状態 =====
let stageIdx = 0;
let currentStage = null;
let enemyHP = 0;
let enemyMaxHP = 0;
let isRolling = false;
let clickCount = 0;
let totalDmgSoFar = 0;

// 通常ダイスのモード管理: インデックス → true=攻撃モード / false=回復モード
// 通常ダイスはデフォルト攻撃モード（true）
let normalDiceModes = {};

// 回復ダイスのモード管理: インデックス → true=回復モード / false=攻撃モード
// 緑ダイスはデフォルト回復モード（true）
let healDiceModes = {};

// ===== DOM =====
const phoneEl      = document.getElementById('phone');
const stageLabel   = document.getElementById('stage-label');
const enemyName    = document.getElementById('enemy-name');
const enemySprite  = document.getElementById('enemy-sprite');
const hpBar        = document.getElementById('hp-bar');
const hpText       = document.getElementById('hp-text');
const diceArea     = document.getElementById('dice-area');
const totalDmgEl   = document.getElementById('total-dmg');
const clickBtn     = document.getElementById('click-btn');
const clickBtnTx   = document.getElementById('click-btn-text');
const flashEl      = document.getElementById('flash');
const playerHitFlash = document.getElementById('player-hit-flash');
const healFlashEl  = document.getElementById('heal-flash');
const modalEl      = document.getElementById('modal');
const modalSub     = document.getElementById('modal-sub');
const modalBtnEl   = document.getElementById('modal-btn');
const zoroText     = document.getElementById('zoroeye-text');
const gcModal      = document.getElementById('gameclear-modal');
const gcRestart    = document.getElementById('gc-restart-btn');
const goModal      = document.getElementById('gameover-modal');
const goSub        = document.getElementById('go-sub');
const goRestart    = document.getElementById('go-restart-btn');
const playerHeartsEl = document.getElementById('player-hearts');

// ===== プレイヤーHP表示 =====
function buildPlayerHearts() {
  playerHeartsEl.innerHTML = '';
  for (let i = 0; i < PLAYER_MAX_HP; i++) {
    const h = document.createElement('div');
    h.className = 'heart' + (i >= playerHP ? ' lost' : '');
    h.id = `heart-${i}`;
    h.textContent = '❤';
    playerHeartsEl.appendChild(h);
  }
}

function updatePlayerHPDisplay() {
  for (let i = 0; i < PLAYER_MAX_HP; i++) {
    const h = document.getElementById(`heart-${i}`);
    if (!h) continue;
    if (i < playerHP) {
      h.classList.remove('lost');
    } else {
      h.classList.add('lost');
    }
  }
}

// ===== 初期化 =====
function initStars() {
  for (let i = 0; i < 40; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2 + 1;
    s.style.cssText = `
      width:${sz}px; height:${sz}px;
      left:${Math.random()*100}%;
      top:${Math.random()*50}%;
      opacity:${Math.random()*0.5+0.1};
    `;
    phoneEl.insertBefore(s, phoneEl.firstChild);
  }
}

function loadStage(idx) {
  stageIdx = idx;
  currentStage = STAGES[idx];
  enemyMaxHP = currentStage.enemyHP;
  enemyHP = enemyMaxHP;
  clickCount = 0;
  totalDmgSoFar = 0;
  isRolling = false;

  // 通常ダイスのモードをデフォルト（攻撃モード: true）にリセット
  normalDiceModes = {};
  for (let i = 0; i < (currentStage.diceCount || 0); i++) {
    normalDiceModes[i] = true; // true = 攻撃モード
  }

  // 回復ダイスのモードをデフォルト（回復モード: true）にリセット
  healDiceModes = {};
  for (let j = 0; j < (currentStage.healDice || 0); j++) {
    healDiceModes[j] = true; // true = 回復モード
  }

  stageLabel.textContent = currentStage.label;
  enemyName.textContent  = currentStage.enemyName;
  enemySprite.textContent= currentStage.enemyEmoji;
  updateHPDisplay();
  updatePlayerHPDisplay();
  totalDmgEl.textContent = '';
  buildDice(currentStage.diceCount, currentStage.diceFaces, currentStage.healDice);
  clickBtn.classList.remove('disabled');
  clickBtnTx.textContent = '⚔ ROLL DICE!';
  modalEl.classList.remove('show');
}

function gameStart() {
  playerHP = PLAYER_MAX_HP;
  buildPlayerHearts();
  loadStage(0);
}

function updateHPDisplay() {
  const pct = Math.max(0, enemyHP / enemyMaxHP * 100);
  hpBar.style.width = pct + '%';
  hpText.textContent = `HP: ${Math.max(0,enemyHP)} / ${enemyMaxHP}`;
}

// ===== ダイス生成（全ダイスが攻撃↔回復切り替え可） =====
function buildDice(count, faces, healCount) {
  diceArea.innerHTML = '';

  // 通常ダイス（count個）: デフォルト攻撃モード（シアン色）、タップで回復モードに切り替え可
  for (let i = 0; i < count; i++) {
    const d = document.createElement('div');
    d.className = 'die'; // デフォルト: 攻撃モード（シアン）
    d.id = `die-${i}`;
    d.dataset.type = 'normal';
    d.dataset.dieIdx = i;
    d.innerHTML = `<span class="die-val">?</span><span class="die-face-label">D${faces}</span>`;
    // pointerdown で攻撃↔回復を切り替え（ロール中は除く）
    d.addEventListener('pointerdown', (e) => {
      e.stopPropagation();
      if (isRolling) return;
      toggleNormalDiceMode(i, d, faces);
    });
    diceArea.appendChild(d);
  }

  // 回復ダイス（healCount個）: デフォルト回復モード（緑色）、タップで攻撃モードに切り替え可
  for (let j = 0; j < healCount; j++) {
    const d = document.createElement('div');
    d.className = 'die heal-die'; // デフォルト: 回復モード（緑）
    d.id = `die-${count + j}`;
    d.dataset.type = 'heal';
    d.dataset.healIdx = j;
    d.innerHTML = `<span class="die-val">💚</span><span class="die-face-label">回復</span>`;
    // pointerdown で攻撃↔回復を切り替え（ロール中は除く）
    d.addEventListener('pointerdown', (e) => {
      e.stopPropagation();
      if (isRolling) return;
      toggleHealDiceMode(j, d, faces);
    });
    diceArea.appendChild(d);
  }
}

// ===== 通常ダイスのモード切り替え（攻撃↔回復） =====
function toggleNormalDiceMode(dieIdx, dieEl, faces) {
  const isAtk = normalDiceModes[dieIdx]; // true=攻撃モード
  normalDiceModes[dieIdx] = !isAtk;
  const nowAtk = normalDiceModes[dieIdx];

  // バウンスフィードバック
  dieEl.classList.remove('toggled');
  void dieEl.offsetWidth;
  dieEl.classList.add('toggled');
  setTimeout(() => dieEl.classList.remove('toggled'), 300);

  if (nowAtk) {
    // 攻撃モードへ（シアン色に戻す）
    dieEl.classList.remove('heal-mode');
    dieEl.querySelector('.die-val').textContent = '?';
    dieEl.querySelector('.die-face-label').textContent = `D${faces}`;
  } else {
    // 回復モードへ（緑色に切り替え）
    dieEl.classList.add('heal-mode');
    dieEl.querySelector('.die-val').textContent = '💚';
    dieEl.querySelector('.die-face-label').textContent = '回復';
  }
}

// ===== 回復ダイスのモード切り替え（回復↔攻撃） =====
function toggleHealDiceMode(healIdx, dieEl, faces) {
  const isHeal = healDiceModes[healIdx];
  healDiceModes[healIdx] = !isHeal;
  const nowHeal = healDiceModes[healIdx];

  // バウンスフィードバック
  dieEl.classList.remove('toggled');
  void dieEl.offsetWidth;
  dieEl.classList.add('toggled');
  setTimeout(() => dieEl.classList.remove('toggled'), 300);

  if (nowHeal) {
    // 回復モードへ
    dieEl.classList.remove('atk-mode');
    dieEl.querySelector('.die-val').textContent = '💚';
    dieEl.querySelector('.die-face-label').textContent = '回復';
  } else {
    // 攻撃モードへ
    dieEl.classList.add('atk-mode');
    dieEl.querySelector('.die-val').textContent = '?';
    dieEl.querySelector('.die-face-label').textContent = `D${faces}`;
  }
}

// ===== ロール処理 =====
function rollDice() {
  if (isRolling || enemyHP <= 0) return;
  isRolling = true;
  clickCount++;
  clickBtn.classList.add('disabled');
  totalDmgEl.textContent = '';

  const count = currentStage.diceCount;
  const faces = currentStage.diceFaces;
  const healCount = currentStage.healDice || 0;
  const healAmount = currentStage.healAmount || 1;

  // 通常ダイスの結果: 攻撃モードはロール値、回復モードは回復値
  // normalDiceInfos[i] = { isAtk: bool, value: number, healFailed: bool }
  // healFailed: 回復モード時に50%の確率で回復が失敗する
  const normalDiceInfos = [];
  for (let i = 0; i < count; i++) {
    const isAtk = normalDiceModes[i] !== false; // デフォルト true=攻撃
    if (isAtk) {
      normalDiceInfos.push({ isAtk: true, value: Math.floor(Math.random() * faces) + 1, healFailed: false });
    } else {
      // 回復モード: 50%の確率で失敗
      const healFailed = Math.random() < 0.5;
      normalDiceInfos.push({ isAtk: false, value: healAmount, healFailed });
    }
  }

  // 回復ダイスの結果: モードによって攻撃値か回復値を決定
  // healDiceInfos[j] = { isHeal: bool, value: number, healFailed: bool }
  // healFailed: 回復モード時に50%の確率で回復が失敗する
  const healDiceInfos = [];
  for (let j = 0; j < healCount; j++) {
    const isHeal = healDiceModes[j] !== false; // デフォルト true=回復
    if (isHeal) {
      // 回復モード: 50%の確率で失敗
      const healFailed = Math.random() < 0.5;
      healDiceInfos.push({ isHeal: true, value: healAmount, healFailed });
    } else {
      // 攻撃モード: 通常ダイスと同じ面数でロール
      healDiceInfos.push({ isHeal: false, value: Math.floor(Math.random() * faces) + 1, healFailed: false });
    }
  }

  // ゾロ目判定（攻撃モードの全ダイスを対象）
  const atkNormalVals = normalDiceInfos.filter(d => d.isAtk).map(d => d.value);
  const atkHealVals = healDiceInfos.filter(h => !h.isHeal).map(h => h.value);
  const allAtkVals = [...atkNormalVals, ...atkHealVals];
  const zoroMultiplier = calcZoroMultiplier(allAtkVals);

  // 全ダイス（通常 + 回復）を順次アニメーション
  const totalDice = count + healCount;
  let landed = 0;
  let runningTotal = 0;

  // 通常ダイスアニメーション
  normalDiceInfos.forEach((info, i) => {
    const dieEl = document.getElementById(`die-${i}`);
    dieEl.classList.add('rolling');
    dieEl.classList.remove('landed','zoro','heal-activated','heal-miss-die');
    dieEl.querySelector('.die-val').textContent = '?';

    setTimeout(() => {
      dieEl.classList.remove('rolling');
      dieEl.classList.add('landed');

      if (info.isAtk) {
        // 攻撃モード: 出目表示
        dieEl.querySelector('.die-val').textContent = info.value;
        runningTotal += info.value;
        if (count > 1 || healCount > 0) {
          totalDmgEl.textContent = `攻撃: ${runningTotal}`;
        }
      } else if (info.healFailed) {
        // 回復モード・失敗: 💀表示＋オレンジ枠エフェクト
        dieEl.querySelector('.die-val').textContent = '💀';
        dieEl.classList.remove('landed');
        dieEl.classList.add('heal-miss-die');
      } else {
        // 回復モード・成功: 💚表示（ランディング時は緑の着地エフェクト）
        dieEl.querySelector('.die-val').textContent = '💚';
        dieEl.classList.add('heal-activated');
      }

      landed++;
      if (landed === totalDice) {
        setTimeout(() => onAllLanded(normalDiceInfos, healDiceInfos, runningTotal, zoroMultiplier, healAmount, faces), 200);
      }
    }, 300 + i * 280);
  });

  // 回復ダイスアニメーション（通常ダイスの後に表示）
  healDiceInfos.forEach((info, j) => {
    const dieEl = document.getElementById(`die-${count + j}`);
    dieEl.classList.add('rolling');
    dieEl.classList.remove('landed','heal-activated','heal-miss-die');
    dieEl.querySelector('.die-val').textContent = '?';

    setTimeout(() => {
      dieEl.classList.remove('rolling');
      dieEl.classList.add('landed');

      if (info.isHeal) {
        if (info.healFailed) {
          // 回復モード・失敗: 💀表示＋オレンジ枠エフェクト
          dieEl.querySelector('.die-val').textContent = '💀';
          dieEl.classList.remove('landed');
          dieEl.classList.add('heal-miss-die');
        } else {
          // 回復モード・成功
          dieEl.querySelector('.die-val').textContent = '💚';
        }
      } else {
        dieEl.querySelector('.die-val').textContent = info.value;
        runningTotal += info.value;
        if (count > 1 || healCount > 0) {
          totalDmgEl.textContent = `攻撃: ${runningTotal}`;
        }
      }

      landed++;
      if (landed === totalDice) {
        setTimeout(() => onAllLanded(normalDiceInfos, healDiceInfos, runningTotal, zoroMultiplier, healAmount, faces), 200);
      }
    }, 300 + (count + j) * 280);
  });
}

function calcZoroMultiplier(results) {
  if (results.length < 2) return 1;
  const freq = {};
  results.forEach(v => { freq[v] = (freq[v]||0) + 1; });
  const maxMatch = Math.max(...Object.values(freq));
  if (maxMatch >= 2) return maxMatch;
  return 1;
}

function onAllLanded(normalDiceInfos, healDiceInfos, rawTotal, zoroMult, healAmount, faces) {
  const finalDmg = rawTotal * zoroMult;

  // ゾロ目演出（攻撃モードの全ダイスを対象）
  if (zoroMult >= 2) {
    const atkNormalVals = normalDiceInfos.filter(d => d.isAtk).map(d => d.value);
    const atkHealVals = healDiceInfos.filter(h => !h.isHeal).map(h => h.value);
    const allAtkVals = [...atkNormalVals, ...atkHealVals];
    const freq = {};
    allAtkVals.forEach(v => { freq[v] = (freq[v]||0) + 1; });

    // 攻撃モードの通常ダイスにゾロ目クラス
    normalDiceInfos.forEach((info, i) => {
      if (info.isAtk && freq[info.value] >= 2) {
        const el = document.getElementById(`die-${i}`);
        el.classList.add('zoro');
      }
    });
    // 攻撃モードの緑ダイスにゾロ目クラス
    healDiceInfos.forEach((info, j) => {
      if (!info.isHeal && freq[info.value] >= 2) {
        const el = document.getElementById(`die-${currentStage.diceCount + j}`);
        el.classList.add('zoro');
      }
    });

    zoroText.textContent = `×${zoroMult}!  ZORO!!`;
    zoroText.classList.remove('show');
    void zoroText.offsetWidth;
    zoroText.classList.add('show');
    spawnParticles();
  }

  // 回復ダイスのカウント（成功した回復のみ）
  // 通常ダイスの回復モード成功 + 緑ダイスの回復モード成功
  const healFromNormal = normalDiceInfos.filter(d => !d.isAtk && !d.healFailed).length;
  const healFromHeal = healDiceInfos.filter(h => h.isHeal && !h.healFailed).length;
  const totalHealCount = healFromNormal + healFromHeal;

  // 失敗した回復のカウント（MISS表示用）
  const missFromNormal = normalDiceInfos.filter(d => !d.isAtk && d.healFailed).length;
  const missFromHeal = healDiceInfos.filter(h => h.isHeal && h.healFailed).length;
  const totalMissCount = missFromNormal + missFromHeal;

  // 合計ダメージ表示
  if (zoroMult >= 2) {
    totalDmgEl.textContent = totalHealCount > 0
      ? `${rawTotal}×${zoroMult}=${finalDmg} DMG! 💚+${totalHealCount}`
      : `${rawTotal} × ${zoroMult} = ${finalDmg} DMG!`;
  } else {
    let dispText = `合計: ${finalDmg} DMG!`;
    if (totalHealCount > 0) dispText += ` 💚+${totalHealCount}`;
    if (totalMissCount > 0) dispText += ` 💀MISS×${totalMissCount}`;
    totalDmgEl.textContent = dispText;
  }

  // フラッシュ
  flashEl.classList.remove('pop');
  void flashEl.offsetWidth;
  flashEl.classList.add('pop');

  // 敵HPを減らす
  enemyHP -= finalDmg;
  updateHPDisplay();

  // ダメージ浮遊テキスト
  spawnDmgFloat(finalDmg, zoroMult >= 2);

  // 敵シェイク
  enemySprite.classList.remove('shake');
  void enemySprite.offsetWidth;
  enemySprite.classList.add('shake');

  // 回復処理用: 回復モードかつ成功したダイス情報をまとめる
  // normalの回復モード成功 + healDiceの回復モード成功
  const healOnlyInfos = [
    ...normalDiceInfos.filter(d => !d.isAtk && !d.healFailed),
    ...healDiceInfos.filter(h => h.isHeal && !h.healFailed)
  ];

  // 敵撃破判定
  if (enemyHP <= 0) {
    enemyHP = 0;
    updateHPDisplay();
    if (healOnlyInfos.length > 0) {
      applyHealDice(healOnlyInfos, healAmount, normalDiceInfos, healDiceInfos, () => {
        setTimeout(() => onEnemyDefeated(), 400);
      });
    } else {
      // MISS演出（失敗した回復がある場合）
      if (totalMissCount > 0) spawnHealMissFloat(totalMissCount);
      setTimeout(() => onEnemyDefeated(), 600);
    }
  } else {
    // 回復ダイス処理 → 敵の反撃
    if (healOnlyInfos.length > 0) {
      applyHealDice(healOnlyInfos, healAmount, normalDiceInfos, healDiceInfos, () => {
        // MISS演出（失敗した回復がある場合）
        if (totalMissCount > 0) spawnHealMissFloat(totalMissCount);
        setTimeout(() => applyEnemyAttack(), 300);
      });
    } else {
      // 全部MISSまたは回復なし
      if (totalMissCount > 0) spawnHealMissFloat(totalMissCount);
      setTimeout(() => applyEnemyAttack(), 500);
    }
  }
}

// ===== 回復ダイス処理（回復モードかつ成功したものだけ） =====
function applyHealDice(healOnlyInfos, healAmount, normalDiceInfos, healDiceInfos, callback) {
  const count = currentStage.diceCount;
  const healCount = healOnlyInfos.length;
  let totalHeal = 0;

  const maxHeal = PLAYER_MAX_HP - playerHP;
  totalHeal = Math.min(healAmount * healCount, maxHeal);

  if (totalHeal > 0) {
    playerHP = Math.min(PLAYER_MAX_HP, playerHP + totalHeal);
    updatePlayerHPDisplay();

    // 成功した回復モードの緑ダイスを光らせる
    healDiceInfos.forEach((info, j) => {
      if (info.isHeal && !info.healFailed) {
        const dieEl = document.getElementById(`die-${count + j}`);
        if (dieEl) {
          dieEl.classList.remove('landed');
          dieEl.classList.add('heal-activated');
        }
      }
    });

    healFlashEl.classList.remove('pop');
    void healFlashEl.offsetWidth;
    healFlashEl.classList.add('pop');

    for (let k = playerHP - totalHeal; k < playerHP; k++) {
      const heartEl = document.getElementById(`heart-${k}`);
      if (heartEl) {
        heartEl.classList.remove('healed');
        void heartEl.offsetWidth;
        heartEl.classList.add('healed');
        setTimeout(() => heartEl.classList.remove('healed'), 500);
      }
    }

    spawnHealFloat(totalHeal);
    spawnHealParticles();
  }

  setTimeout(callback, 400);
}

// ===== 敵の反撃処理 =====
function applyEnemyAttack() {
  const atk = currentStage.enemyAtk || 1;
  playerHP = Math.max(0, playerHP - atk);
  updatePlayerHPDisplay();

  const hitHeartIdx = playerHP;
  const heartEl = document.getElementById(`heart-${hitHeartIdx}`);
  if (heartEl) {
    heartEl.classList.remove('hit');
    void heartEl.offsetWidth;
    heartEl.classList.add('hit');
    setTimeout(() => heartEl.classList.remove('hit'), 400);
  }

  playerHitFlash.classList.remove('pop');
  void playerHitFlash.offsetWidth;
  playerHitFlash.classList.add('pop');

  spawnPlayerDmgFloat(atk);

  if (playerHP <= 0) {
    setTimeout(() => onGameOver(), 400);
  } else {
    // ロール後、各ダイスのモードはリセットせず維持（プレイヤーの選択を尊重）
    setTimeout(() => {
      isRolling = false;
      clickBtn.classList.remove('disabled');
    }, 300);
  }
}

function onEnemyDefeated() {
  clickBtn.classList.add('disabled');
  if (stageIdx + 1 < STAGES.length) {
    modalSub.textContent = `${currentStage.enemyName}を倒した！\n次のステージへ進め！`;
    modalBtnEl.textContent = '次のステージへ →';
    modalEl.classList.add('show');
  } else {
    setTimeout(() => gcModal.classList.add('show'), 300);
  }
}

function onGameOver() {
  clickBtn.classList.add('disabled');
  goSub.textContent = `${currentStage.enemyName}に力尽きた…\nもう一度挑戦しよう！`;
  goModal.classList.add('show');
}

// ===== 演出ヘルパー =====
function spawnDmgFloat(dmg, isCrit) {
  const el = document.createElement('div');
  el.className = 'dmg-float' + (isCrit ? ' critical' : '');
  el.textContent = (isCrit ? '★' : '') + dmg;
  const rx = 30 + Math.random() * 40;
  const ry = 25 + Math.random() * 15;
  el.style.left = rx + '%';
  el.style.top  = ry + '%';
  phoneEl.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function spawnPlayerDmgFloat(dmg) {
  const el = document.createElement('div');
  el.className = 'dmg-float player-dmg';
  el.textContent = `-${dmg} HP`;
  const rx = 35 + Math.random() * 30;
  el.style.left = rx + '%';
  el.style.top  = '75%';
  phoneEl.appendChild(el);
  setTimeout(() => el.remove(), 1100);
}

function spawnHealFloat(amount) {
  const el = document.createElement('div');
  el.className = 'dmg-float heal-float';
  el.textContent = `+${amount} HP 💚`;
  const rx = 35 + Math.random() * 30;
  el.style.left = rx + '%';
  el.style.top  = '72%';
  phoneEl.appendChild(el);
  setTimeout(() => el.remove(), 1100);
}

// 回復失敗MISSフロート
function spawnHealMissFloat(count) {
  const el = document.createElement('div');
  el.className = 'dmg-float heal-miss';
  el.textContent = count > 1 ? `💀 HEAL MISS ×${count}` : '💀 HEAL MISS!';
  const rx = 25 + Math.random() * 25;
  el.style.left = rx + '%';
  el.style.top  = '68%';
  phoneEl.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

function spawnParticles() {
  const colors = ['var(--gold)','var(--crit-yellow)','var(--nova-7)','var(--gold-bright)'];
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = Math.random() * 360;
    const dist  = 15 + Math.random() * 25;
    const dx = Math.cos(angle * Math.PI/180) * dist + 'vmin';
    const dy = Math.sin(angle * Math.PI/180) * dist + 'vmin';
    p.style.cssText = `
      left:${40+Math.random()*20}%;
      top:${40+Math.random()*20}%;
      background:${colors[i%colors.length]};
      --dx:${dx}; --dy:${dy};
    `;
    phoneEl.appendChild(p);
    setTimeout(() => p.remove(), 900);
  }
}

function spawnHealParticles() {
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'particle heal-particle';
    const angle = Math.random() * 360;
    const dist  = 10 + Math.random() * 20;
    const dx = Math.cos(angle * Math.PI/180) * dist + 'vmin';
    const dy = Math.sin(angle * Math.PI/180) * dist + 'vmin';
    p.style.cssText = `
      left:${35+Math.random()*30}%;
      top:${68+Math.random()*8}%;
      --dx:${dx}; --dy:${dy};
    `;
    phoneEl.appendChild(p);
    setTimeout(() => p.remove(), 900);
  }
}

// ===== イベント =====
clickBtn.addEventListener('pointerdown', () => {
  if (!isRolling && enemyHP > 0) {
    clickBtn.classList.add('pressed');
    rollDice();
  }
});
clickBtn.addEventListener('pointerup', () => clickBtn.classList.remove('pressed'));
clickBtn.addEventListener('pointercancel', () => clickBtn.classList.remove('pressed'));

modalBtnEl.addEventListener('pointerdown', () => {
  modalEl.classList.remove('show');
  loadStage(stageIdx + 1);
});

gcRestart.addEventListener('pointerdown', () => {
  gcModal.classList.remove('show');
  gameStart();
});

goRestart.addEventListener('pointerdown', () => {
  goModal.classList.remove('show');
  gameStart();
});

// ===== 起動 =====
initStars();
gameStart();
</script>
