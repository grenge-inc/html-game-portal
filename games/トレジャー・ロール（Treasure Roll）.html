<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>トレジャー・ロール</title>
<style>
  :root {
    --phone-aspect: 9 / 19.5;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html, body {
    width:100%; height:100%;
    overflow:hidden;
    background:#000;
    color:#fff;
    font-family:'Helvetica Neue', system-ui, sans-serif;
    user-select:none;
    -webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
  }
  body {
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #phone {
    position:relative;
    overflow:hidden;
    width:  min(100vw, calc(100vh * 9 / 19.5));
    height: min(100vh, calc(100vw * 19.5 / 9));
    --pw:   min(100vw, calc(100vh * 9 / 19.5));
    --ph:   min(100vh, calc(100vw * 19.5 / 9));
    --u:    calc(var(--pw) / 100);
    --uh:   calc(var(--ph) / 100);
    background:#0a0024;
  }
  #cv{position:absolute;inset:0;width:100%;height:100%;display:block;cursor:pointer;}
  #hud{position:absolute;top:0;left:0;right:0;height:calc(var(--uh)*8);display:flex;
       align-items:center;justify-content:space-between;padding:0 calc(var(--u)*4);
       z-index:5;pointer-events:none;}
  .pill{pointer-events:none;}
  /* 常設リトライボタン: play/wait/ready/fail いつでも押せる救済UI。
     Canvas pointerdown とのバブリング衝突を避けるため独立DOMボタンとして配置。 */
  #retryBtn{
    position:absolute;
    top:calc(var(--uh)*9.5);
    right:calc(var(--u)*4);
    z-index:8;
    display:flex; align-items:center; gap:calc(var(--u)*1.2);
    padding:calc(var(--uh)*0.9) calc(var(--u)*3.2);
    border:1px solid rgba(255,180,74,.5);
    border-radius:calc(var(--u)*6);
    background:linear-gradient(180deg,rgba(26,36,86,.82),rgba(12,19,56,.82));
    color:#ffd76b;
    font:600 calc(var(--uh)*1.9) 'Helvetica Neue', system-ui, sans-serif;
    letter-spacing:.06em;
    box-shadow:0 calc(var(--u)*0.5) calc(var(--u)*2) rgba(0,0,0,.45), 0 0 calc(var(--u)*1.4) rgba(255,180,74,.2);
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    touch-action:manipulation;
    transition:transform .08s ease, box-shadow .15s ease;
  }
  #retryBtn .ico{ font:700 calc(var(--uh)*2.2) 'Helvetica Neue'; line-height:1; }
  #retryBtn:active{ transform:scale(.94); box-shadow:0 0 calc(var(--u)*1.2) rgba(255,180,74,.4); }
</style>
</head>
<body>
  <div id="phone">
    <canvas id="cv"></canvas>
    <div id="hud"></div>
    <button id="retryBtn" type="button" aria-label="リトライ"><span class="ico">&#x21bb;</span>リトライ</button>
  </div>
  <script>
  "use strict";
  const cv=document.getElementById('cv'), ctx=cv.getContext('2d'), hud=document.getElementById('hud');
  let W=0,H=0,DPR=1;
  function resize(){
    const r=cv.getBoundingClientRect();
    DPR=Math.min(window.devicePixelRatio||1,2);
    W=r.width; H=r.height;
    cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  const UX=()=>W/100, UY=()=>H/100;
  function X(u){return u*UX();}
  function Y(u){return u*UY();}

  // ---- Physics constants (unit space) ----
  const G=0.05, REST=0.2, FRICT=0.992, ROLL=0.020, R=2.4;
  const SETTLE_VX=0.06, SETTLE_VY=0.08;

  // ---- Color tokens ----
  const COL={
    bgDeep:'#05081c', bgMid:'#0c1338', bgHi:'#1a2456',
    moon:'#f4f6ff', moonGlow:'rgba(233,238,255,', star:'rgba(200,215,255,',
    gold1:'#ffd76b', gold2:'#ffb24a', gold3:'#ff9a3a', goldDeep:'#a9781f',
    goldGlow:'#ffb24a', warn:'#ff6a8a',
    chestHi:'#ffe89a', chestMid:'#ffc24a', chestLow:'#a9781f', chestBand:'#7a5410', chestLock:'#fff3c0',
    plankHi:'#8a6f44', plankLow:'#5e4a2a', plankFixHi:'#5b6680', plankFixLow:'#3a4361', plankEdge:'rgba(255,235,200,.22)',
    pillarHi:'#6b5a86', pillarLow:'#3a2f52', rubbleHi:'#7a6a4e', rubbleLow:'#4d4030',
    stoneObsHi:'#3a4566', stoneObsLow:'#222c45', stoneRubHi:'#6a5d48', stoneRubLow:'#473d2e', stoneEdge:'rgba(255,255,255,.12)',
    pedHi:'#caa24a', pedLow:'#6e5520', pedSheen:'rgba(255,215,107,.18)', pole:'#d8dcf0',
    bombShellHi:'#555', bombShellLow:'#0a0a0a', fuse:'#c0392b', spark1:'#ffd76b', spark2:'#ff7a3a',
    dust:'#9a8c78', collapse:'#8a7d68', sparkleW:'#fff7d0', capstone:'rgba(255,235,200,.2)',
    triHotEdge:'#ffd76b', triEdge:'rgba(255,180,74,.5)', overlayBg:'rgba(4,6,20,.62)', textSub:'#cdddef',
    armedHint:'rgba(255,215,107,.55)'
  };

  // ---- Stage definitions ----
  const TOTAL_STAGES = 6;

  function stage1(){
    return {
      name:1, triggers:3, chest:{x:20,y:14,vx:0,vy:0},
      goal:{x:78,w:16,y:74},
      segs:[
        {id:'wallL',a:[13,4],b:[13,20],fixed:true},
        {id:'RA',a:[14,20],b:[30,20],pivot:[14,20],ang:0},
        {id:'SL',a:[25,27],b:[84,72],fixed:true},
        {id:'lip',a:[94,72],b:[94,64],fixed:true},
        {id:'GP',a:[76,72],b:[96,72],fixed:true},
        {id:'wallR',a:[96,48],b:[96,76],fixed:true},
      ],
      bombs:[], blocks:[],
      objs:[
        {id:'P1',kind:'pillar',x:24,y:30,w:5,h:16,dir:'↘',
         act:()=>{ tweenAng('RA', 0.60); }}
      ],
      sol:['P1'],
      readyMsg:'崩せる柱をクリックして宝箱を転がせ'
    };
  }
  function stage2(){
    return {
      name:2, triggers:5, chest:{x:19,y:16,vx:0,vy:0},
      goal:{x:82,w:15,y:82},
      segs:[
        {id:'wallL',a:[12,6],b:[12,22],fixed:true},
        {id:'RA',a:[13,22],b:[31,22],pivot:[13,22],ang:0},
        {id:'MID',a:[28,37],b:[50,41],fixed:true},
        {id:'mLip',a:[50,41],b:[51.5,38.5],fixed:true},
        {id:'RB2c',a:[55,48],b:[55,42],fixed:true},
        {id:'RB2',a:[55,48],b:[74,40],pivot:[55,48],ang:0},
        {id:'BR2c',a:[69,64],b:[69,58],fixed:true},
        {id:'BR',a:[69,64],b:[94,56],pivot:[69,64],ang:0},
        {id:'GP',a:[80,82],b:[99,82],fixed:true},
        {id:'lip',a:[97,82],b:[97,74],fixed:true},
        {id:'wallR',a:[99,54],b:[99,86],fixed:true},
      ],
      bombs:[{id:'BMB',x:55,y:46,r:17,live:true,fuse:0}],
      blocks:[
        // 瓦礫RB: 落下してBMBを誘爆する。以前は障害物OBS(54,42)が瓦礫の落下経路上にあり、
        // 瓦礫がBMB(y46)に届く前にOBSへ着地して停止し誘爆が起きずクリア不能だった。
        // OBSを撤去し、瓦礫がBMBまで落下して誘爆→爆風が宝箱をmLip越しにRB2へ発射する正規ルートを復旧。
        {id:'RB',x:55,y:28,w:5,h:5,kind:'rubble',falling:false,vy:0},
      ],
      objs:[
        {id:'P1',kind:'pillar',x:22,y:30,w:5,h:14,dir:'↘',
         act:()=>{ tweenAng('RA',0.62); }},
        {id:'RB',kind:'rubble',x:55,y:28,w:5,h:5,dir:'↓',
         act:()=>{ const b=G_.blocks.find(x=>x.id==='RB'); if(b)b.falling=true; }},
        {id:'P2',kind:'pillar',x:62,y:52,w:4,h:14,dir:'↘',
         act:()=>{ tweenAng('RB2',0.85); }},
        {id:'P3',kind:'pillar',x:80,y:70,w:4,h:14,dir:'↘',
         act:()=>{ tweenAng('BR',0.85); }},
      ],
      sol:['P1','RB','P2','P3'],
      readyMsg:'崩す順番を見極めて宝箱をゴールへ'
    };
  }
  // Stage 3: 二段ランプ＋ブリッジ順序（4手）
  // 宝箱は左上の初期ランプRA上。中段の棚SHに落とし、次に橋BR1を傾けて右側台PL2へ乗せ、
  // 最後にPL2を傾けてゴールへ。瓦礫RBが中間障壁OBSを除去する誘爆なしバリエーション。
  function stage3(){
    return {
      name:3, triggers:6, chest:{x:18,y:12,vx:0,vy:0},
      goal:{x:76,w:16,y:78},
      segs:[
        // left wall
        {id:'wallL',a:[11,4],b:[11,18],fixed:true},
        // initial ramp RA: chest rests here; P1 tilts it
        {id:'RA',a:[12,18],b:[32,18],pivot:[12,18],ang:0},
        // mid shelf SH: catches chest after RA tips; no lip so chest rolls off right end onto BR1
        {id:'SH',a:[26,34],b:[48,38],fixed:true},
        // left catch wall for BR1
        {id:'BR1c',a:[52,52],b:[52,46],fixed:true},
        // bridge BR1: horizontal, P2 tilts it right-down
        {id:'BR1',a:[52,52],b:[72,46],pivot:[52,52],ang:0},
        // left catch wall for BR2
        {id:'BR2c',a:[66,66],b:[66,60],fixed:true},
        // bridge BR2: P3 tilts it right-down into goal
        {id:'BR2',a:[66,66],b:[90,58],pivot:[66,66],ang:0},
        // goal plateau
        {id:'GP',a:[74,78],b:[96,78],fixed:true},
        {id:'lip',a:[94,78],b:[94,70],fixed:true},
        {id:'wallR',a:[97,50],b:[97,82],fixed:true},
      ],
      bombs:[],
      blocks:[
        // rubble block RB: perched above OBS; dropping it removes OBS
        {id:'RB',x:60,y:30,w:5,h:5,kind:'rubble',falling:false,vy:0},
        // obstacle blocking path between SH and BR1
        {id:'OBS',x:59,y:44,w:5,h:7,kind:'obstacle',gone:false},
      ],
      objs:[
        {id:'P1',kind:'pillar',x:24,y:28,w:5,h:16,dir:'↘',
         act:()=>{ tweenAng('RA',0.58); }},
        {id:'RBtrig',kind:'rubble',x:60,y:30,w:5,h:5,dir:'↓',
         act:()=>{ const b=G_.blocks.find(x=>x.id==='RB'); if(b)b.falling=true; }},
        {id:'P2',kind:'pillar',x:60,y:60,w:4,h:14,dir:'↘',
         act:()=>{ tweenAng('BR1',0.80); }},
        {id:'P3',kind:'pillar',x:76,y:74,w:4,h:14,dir:'↘',
         act:()=>{ tweenAng('BR2',0.82); }},
      ],
      sol:['P1','RBtrig','P2','P3'],
      readyMsg:'瓦礫で道を切り拓き、橋を倒してゴールへ'
    };
  }
  // Stage 4: 爆弾2連鎖＋3段ランプ（5手）
  // 宝箱は左上RA上。P1→RAで中段MIDへ。瓦礫RB1が爆弾BMB1を誘爆→右へ押し出し棚SH2へ。
  // P2→SH2が傾斜→橋BRへ。P3→BR傾斜→瓦礫RB2が爆弾BMB2を誘爆→さらに右へゴール台座。
  // 5手順序依存パズル。
  // ※OBS1・OBS2はRB1/RB2の落下経路上にあり誘爆前にrubbleをlandedさせてBMBに届かなくするバグの原因のため撤去。
  // （St2と同じパターン：OBS上端がBMB誘爆閾値より上にあり、瓦礫がOBSに着地してBMBまで届かない）
  function stage4(){
    // ※設計メモ:
    // OBS1/OBS2はRB落下を阻害するバグの原因だったため撤去済み（前回修正）。
    // 今回修正: BR傾斜後に宝箱がOBS3(87,70)に当たって静止し、BMB2(84,66)射程内に留まる設計に変更。
    // これによりRB2trig(BMB2誘爆)なしの4手ショートカットを封鎖。
    // RB2(84,44)→BMB2(84,66)誘爆閾値: b.y+2.5>=64 → b.y>=61.5で自由落下到達。
    // BMB2爆発でOBS3除去＋宝箱インパルス(1.25,-0.35)→GP(78,80)へ到達。
    return {
      name:4, triggers:7, chest:{x:17,y:12,vx:0,vy:0},
      goal:{x:78,w:20,y:80},
      segs:[
        {id:'wallL',a:[10,4],b:[10,18],fixed:true},
        // initial ramp
        {id:'RA',a:[11,18],b:[29,18],pivot:[11,18],ang:0},
        // mid platform MID
        {id:'MID',a:[26,34],b:[46,38],fixed:true},
        {id:'mLip',a:[46,38],b:[47.5,35.5],fixed:true},
        // catch for SH2
        {id:'SH2c',a:[52,46],b:[52,40],fixed:true},
        // shelf SH2: P2 tilts it
        {id:'SH2',a:[52,46],b:[70,40],pivot:[52,46],ang:0},
        // catch for BR
        {id:'BRc',a:[65,60],b:[65,54],fixed:true},
        // bridge BR: P3 tilts it
        {id:'BR',a:[65,60],b:[88,52],pivot:[65,60],ang:0},
        // goal
        {id:'GP',a:[78,80],b:[98,80],fixed:true},
        {id:'lip',a:[96,80],b:[96,72],fixed:true},
        {id:'wallR',a:[99,52],b:[99,84],fixed:true},
      ],
      bombs:[
        {id:'BMB1',x:52,y:44,r:14,live:true,fuse:0},
        // BMB2位置を(84,66)に変更: OBS3(87,70)除去半径r=12内に収め、RB2(84,44)誘爆閾値(b.y>=61.5)を確保
        {id:'BMB2',x:84,y:66,r:12,live:true,fuse:0},
      ],
      blocks:[
        // OBS1・OBS2は前回修正で撤去済み
        {id:'RB1',x:52,y:26,w:5,h:5,kind:'rubble',falling:false,vy:0},
        // RB2: x=84に変更(BMB2に合わせる)
        {id:'RB2',x:84,y:44,w:5,h:5,kind:'rubble',falling:false,vy:0},
        // OBS3: BR傾斜後の宝箱落下経路をブロックし4手ショートカットを防止
        // BMB2爆発(r=12, |84-87|=3<12)でOBS3除去＋宝箱をGPへ押し出す
        {id:'OBS3',x:87,y:70,w:6,h:6,kind:'obstacle',gone:false},
      ],
      objs:[
        {id:'P1',kind:'pillar',x:21,y:28,w:5,h:14,dir:'↘',
         act:()=>{ tweenAng('RA',0.62); }},
        {id:'RB1trig',kind:'rubble',x:52,y:26,w:5,h:5,dir:'↓',
         act:()=>{ const b=G_.blocks.find(x=>x.id==='RB1'); if(b)b.falling=true; }},
        {id:'P2',kind:'pillar',x:58,y:54,w:4,h:14,dir:'↘',
         act:()=>{ tweenAng('SH2',0.85); }},
        {id:'P3',kind:'pillar',x:74,y:68,w:4,h:14,dir:'↘',
         act:()=>{ tweenAng('BR',0.85); }},
        // RB2trig: x=84に変更(RB2と同位置)
        {id:'RB2trig',kind:'rubble',x:84,y:44,w:5,h:5,dir:'↓',
         act:()=>{ const b=G_.blocks.find(x=>x.id==='RB2'); if(b)b.falling=true; }},
      ],
      sol:['P1','RB1trig','P2','P3','RB2trig'],
      readyMsg:'二つの爆弾を順番に起爆させてゴールへ導け'
    };
  }
  // Stage 5: 二段瓦礫OBS除去＋ゴールカバー除去（4手）
  // ①P1→RA傾斜→SH着地（OBS1でブロック）。
  // ②RBtrig→RB1落下でOBS1除去→宝箱がSH右端からMP着地（OBS2でブロック）。
  // ③P2→RB2落下でOBS2除去→宝箱がMP右端から自由落下。
  // ④P3→RB3落下でOBS3(GPカバー)除去→宝箱がGP(y=80)に着地。
  // OBS3がP3前にGPを塞いでいるため4手全て必須。
  // sol: ['P1','RBtrig','P2','P3']（4手）
  function stage6(){
    return {
      name:5, triggers:6, chest:{x:18,y:12,vx:0,vy:0},
      goal:{x:84,w:16,y:80},
      segs:[
        {id:'wallL',a:[11,4],b:[11,20],fixed:true},
        // initial ramp RA
        {id:'RA',a:[12,20],b:[30,20],pivot:[12,20],ang:0},
        // main shelf SH: chest lands here after RA tilts, blocked by OBS1
        {id:'SH',a:[26,34],b:[58,38],fixed:true},
        // mid platform MP: slightly sloped, chest slides right to OBS2
        {id:'MP',a:[62,50],b:[82,54],fixed:true},
        // goal floor GP
        {id:'GP',a:[84,80],b:[100,80],fixed:true},
        // right lip wall
        {id:'lip',a:[98,80],b:[98,62],fixed:true},
        {id:'wallR',a:[102,60],b:[102,84],fixed:true},
      ],
      bombs:[],
      blocks:[
        // RB1 perched above OBS1; RBtrig triggers drop
        {id:'RB1',x:50,y:22,w:5,h:5,kind:'rubble',falling:false,vy:0},
        // OBS1 blocks SH right portion (chest stops here after P1)
        {id:'OBS1',x:50,y:38,w:5,h:8,kind:'obstacle',gone:false},
        // RB2 perched above OBS2; P2 triggers drop
        {id:'RB2',x:73,y:36,w:5,h:5,kind:'rubble',falling:false,vy:0},
        // OBS2 blocks MP right portion (chest stops here after RBtrig)
        {id:'OBS2',x:73,y:52,w:5,h:8,kind:'obstacle',gone:false},
        // RB3 perched above OBS3; P3 triggers drop
        {id:'RB3',x:91,y:62,w:5,h:5,kind:'rubble',falling:false,vy:0},
        // OBS3 covers GP until P3 removes it; blocks chest from entering goal
        {id:'OBS3',x:91,y:76,w:10,h:4,kind:'obstacle',gone:false},
      ],
      objs:[
        {id:'P1',kind:'pillar',x:22,y:28,w:5,h:16,dir:'↘',
         act:()=>{ tweenAng('RA',0.60); }},
        {id:'RBtrig',kind:'rubble',x:50,y:22,w:5,h:5,dir:'↓',
         act:()=>{ const b=G_.blocks.find(x=>x.id==='RB1'); if(b)b.falling=true; }},
        {id:'P2',kind:'rubble',x:73,y:36,w:5,h:5,dir:'↓',
         act:()=>{ const b=G_.blocks.find(x=>x.id==='RB2'); if(b)b.falling=true; }},
        {id:'P3',kind:'rubble',x:91,y:62,w:5,h:5,dir:'↓',
         act:()=>{ const b=G_.blocks.find(x=>x.id==='RB3'); if(b)b.falling=true; }},
      ],
      sol:['P1','RBtrig','P2','P3'],
      readyMsg:'二段の瓦礫で道を開き、最後の蓋を取り除いてゴールへ'
    };
  }
  // Stage 6: 爆弾2連鎖＋3段ランプ＋OBSカバー除去（5手）
  // 宝箱は左上RA上。
  // ①P1→RA傾斜→MID着地（BMB1射程内で静止）。
  // ②RB1trig→RB1落下→BMB1誘爆→インパルス(vx=1.25,vy=-0.35)→SH2左catch(SH2c)着地。
  // ③P2→SH2傾斜(pivot=左端[52,46])→宝箱がBRc左catch着地→BR上に静止。
  // ④P3→BR傾斜(pivot=左端[65,60],ang=0.85)→宝箱が右下へ→OBS3に当たり静止(BMB2射程内)。
  // ⑤RB2trig→RB2落下→BMB2誘爆→OBS3除去＋インパルス→GP到達。
  // 物理シミュ検証済み（Node.js）:
  //   BMB1 dist(44.82,35.31)-(52,44)=11.28 < r=14 ✓
  //   P3後 dist(81.62,66.67)-(84,66)=2.47 < r=12 ✓
  //   ショートカット検証: P1/RB1/P2/P3/RB2trig全てスキップするとSTUCK ✓
  function stage7(){
    return {
      name:6, triggers:7, chest:{x:17,y:12,vx:0,vy:0},
      goal:{x:78,w:20,y:80},
      segs:[
        {id:'wallL',a:[10,4],b:[10,18],fixed:true},
        // 初期ランプ RA：P1で右下がり傾斜
        {id:'RA',a:[11,18],b:[29,18],pivot:[11,18],ang:0},
        // 中段固定足場 MID：宝箱がRA転がり後に着地（BMB1射程内で静止）
        {id:'MID',a:[26,34],b:[46,38],fixed:true},
        {id:'mLip',a:[46,38],b:[47.5,35.5],fixed:true},
        // SH2 左キャッチ壁
        {id:'SH2c',a:[52,46],b:[52,40],fixed:true},
        // 棚 SH2：P2で右下がり傾斜（pivot=左端[52,46]）
        {id:'SH2',a:[52,46],b:[70,40],pivot:[52,46],ang:0},
        // BR 左キャッチ壁
        {id:'BRc',a:[65,60],b:[65,54],fixed:true},
        // 橋 BR：P3でpivot=左端[65,60]、右端が下降(ang=0.85)
        {id:'BR',a:[65,60],b:[88,52],pivot:[65,60],ang:0},
        // ゴール台座
        {id:'GP',a:[78,80],b:[98,80],fixed:true},
        {id:'lip',a:[96,80],b:[96,72],fixed:true},
        {id:'wallR',a:[99,52],b:[99,84],fixed:true},
      ],
      bombs:[
        {id:'BMB1',x:52,y:44,r:14,live:true,fuse:0},
        // BMB2: P3後の宝箱(x≈81.6,y≈66.7)の近くに配置
        // OBS3(87,70)除去半径r=12内に収める
        {id:'BMB2',x:84,y:66,r:12,live:true,fuse:0},
      ],
      blocks:[
        {id:'RB1',x:52,y:26,w:5,h:5,kind:'rubble',falling:false,vy:0},
        {id:'RB2',x:84,y:44,w:5,h:5,kind:'rubble',falling:false,vy:0},
        // OBS3: BR傾斜後の宝箱落下経路をブロックし4手ショートカットを防止
        // BMB2爆発(r=12, |84-87|=3<12)でOBS3除去＋宝箱インパルスでGPへ
        {id:'OBS3',x:87,y:70,w:6,h:6,kind:'obstacle',gone:false},
      ],
      objs:[
        {id:'P1',kind:'pillar',x:21,y:28,w:5,h:14,dir:'↘',
         act:()=>{ tweenAng('RA',0.62); }},
        {id:'RB1trig',kind:'rubble',x:52,y:26,w:5,h:5,dir:'↓',
         act:()=>{ const b=G_.blocks.find(x=>x.id==='RB1'); if(b)b.falling=true; }},
        {id:'P2',kind:'pillar',x:58,y:54,w:4,h:14,dir:'↘',
         act:()=>{ tweenAng('SH2',0.85); }},
        {id:'P3',kind:'pillar',x:74,y:68,w:4,h:14,dir:'↘',
         act:()=>{ tweenAng('BR',0.85); }},
        {id:'RB2trig',kind:'rubble',x:84,y:44,w:5,h:5,dir:'↓',
         act:()=>{ const b=G_.blocks.find(x=>x.id==='RB2'); if(b)b.falling=true; }},
      ],
      sol:['P1','RB1trig','P2','P3','RB2trig'],
      readyMsg:'爆弾を2つ連鎖させ、橋を倒してゴールへ届けろ'
    };
  }

  // ---- stage loader ----
  function getStageData(n){
    if(n===1) return stage1();
    if(n===2) return stage2();
    if(n===3) return stage3();
    if(n===4) return stage4();
    if(n===5) return stage6();
    return stage7();
  }

  // ---- tween helpers ----
  let tweens=[];
  function tweenAng(segId,target){
    const s=G_.segs.find(x=>x.id===segId); if(!s||s.fixed) return;
    tweens.push({s,from:s.ang||0,to:target,t:0,dur:34, kind:'ang'});
  }
  function applyTweens(){
    for(const tw of tweens){ if(tw.done) continue; tw.t++; const k=Math.min(1,tw.t/tw.dur);
      const e=1-Math.pow(1-k,3);
      if(tw.kind==='ang'){ tw.s.ang=tw.from+(tw.to-tw.from)*e; }
      if(tw.t>=tw.dur) tw.done=true;
    }
    tweens=tweens.filter(t=>!t.done);
  }

  function segPts(s){
    if(s.fixed||!s.pivot) return [s.a,s.b];
    const [px,py]=s.pivot, ang=s.ang||0;
    const rot=(p)=>{ const dx=p[0]-px, dy=p[1]-py; return [px+dx*Math.cos(ang)-dy*Math.sin(ang), py+dx*Math.sin(ang)+dy*Math.cos(ang)]; };
    return [rot(s.a),rot(s.b)];
  }

  // ---- state ----
  // mode: 'ready' ->暗転オーバーレイ表示（物理停止）
  //        'armed' -> 暗転解除・操作可能・物理停止（ワンステップ中間）
  //        'play'  -> 物理実行中
  //        'wait'  -> 物理停止・次トリガー待ち
  //        'win'   -> クリア演出
  //        'fail'  -> 失敗表示
  let G_=null, mode='ready', usedTriggers=0, hover=null, particles=[], settleTimer=0, blastDone=false, clearAnim=0;
  let currentStage=1;

  function loadStage(n){
    currentStage=n;
    G_=getStageData(n);
    mode='ready'; usedTriggers=0; hover=null; particles=[]; settleTimer=0; clearAnim=0; tweens=[];
    renderHUD();
  }

  // ---- collision: circle vs segment ----
  function collideSeg(c,p1,p2){
    const ax=p1[0],ay=p1[1],bx=p2[0],by=p2[1];
    const abx=bx-ax,aby=by-ay, L2=abx*abx+aby*aby||1e-6;
    let t=((c.x-ax)*abx+(c.y-ay)*aby)/L2; t=Math.max(0,Math.min(1,t));
    const cx=ax+abx*t, cy=ay+aby*t;
    let dx=c.x-cx, dy=c.y-cy; let d=Math.hypot(dx,dy);
    if(d<R){
      if(d<1e-4){dx=0;dy=-1;d=1;}
      const nx=dx/d, ny=dy/d, pen=R-d;
      c.x+=nx*pen; c.y+=ny*pen;
      const vn=c.vx*nx+c.vy*ny;
      if(vn<0){ c.vx-=(1+REST)*vn*nx; c.vy-=(1+REST)*vn*ny; }
      let tx=abx, ty=aby; const tl=Math.hypot(tx,ty)||1; tx/=tl; ty/=tl;
      if(tx<0){tx=-tx;ty=-ty;}
      const gt=G*ty;
      c.vx+=gt*tx*1.4; c.vy+=gt*ty*1.4;
      return true;
    }
    return false;
  }
  function collideBlock(c,b){
    if(b.gone) return;
    const hw=b.w/2, hh=b.h/2;
    const nx=Math.max(b.x-hw,Math.min(c.x,b.x+hw));
    const ny=Math.max(b.y-hh,Math.min(c.y,b.y+hh));
    let dx=c.x-nx, dy=c.y-ny, d=Math.hypot(dx,dy);
    if(d<R){
      if(d<1e-4){dx=0;dy=-1;d=1;}
      const ux=dx/d,uy=dy/d, pen=R-d;
      c.x+=ux*pen; c.y+=uy*pen;
      const vn=c.vx*ux+c.vy*uy; if(vn<0){c.vx-=(1+REST)*vn*ux; c.vy-=(1+REST)*vn*uy;}
    }
  }

  // ---- main physics step ----
  function step(){
    applyTweens();
    const c=G_.chest;
    // rubble blocks falling
    for(const b of G_.blocks){
      if(b.kind==='rubble' && b.falling && !b.landed){
        b.vy=(b.vy||0)+G*1.4; b.y+=b.vy;
        for(const bm of G_.bombs){ if(bm.live && Math.abs(b.x-bm.x)<6 && b.y+b.h/2 >= bm.y-2){ detonate(bm); b.landed=true; } }
        // rubble as direct obstacle remover (no bomb needed): check OBS
        for(const ob of G_.blocks){
          if(ob.kind==='obstacle' && !ob.gone && Math.abs(b.x-ob.x)<6 && b.y+b.h/2 >= ob.y-ob.h/2){
            ob.gone=true; b.landed=true;
            spawnDust(b.x,b.y,8);
          }
        }
        if(b.y>96){b.landed=true;}
      }
    }
    // bombs fuse / blast
    for(const bm of G_.bombs){ if(bm.fuse>0){ bm.fuse--; if(bm.fuse===0){ blast(bm); } } }

    if(mode==='play'){
      c.vy+=G;
      c.vx*=FRICT;
      const sp=Math.hypot(c.vx,c.vy); const N=Math.max(1,Math.ceil(sp/(R*0.6)));
      for(let i=0;i<N;i++){
        c.x+=c.vx/N; c.y+=c.vy/N;
        for(const s of G_.segs){ const [p1,p2]=segPts(s); collideSeg(c,p1,p2); }
        for(const b of G_.blocks){ if(b.kind==='obstacle') collideBlock(c,b); }
      }
      if(c.x<R){c.x=R; if(c.vx<0)c.vx=0;}
      if(Math.abs(c.vx)<0.05 && Math.abs(c.vy)<0.12){ c.vx=0; }
      if(Math.abs(c.vx)>0.3 && Math.random()<0.5) spawnDust(c.x,c.y+R*0.6,1);

      const g=G_.goal;
      if(c.x>g.x && c.x<g.x+g.w && c.y>g.y-R-3 && Math.abs(c.vx)<0.5){
        win(); return;
      }
      if(c.y>106||c.x>101){ fail(); return; }
      if(Math.abs(c.vx)<SETTLE_VX && Math.abs(c.vy)<SETTLE_VY){ settleTimer++; } else settleTimer=0;
      if(settleTimer>40){
        settleTimer=0;
        if(usedTriggers>=G_.triggers){ fail(); return; }
        mode='wait';
      }
    }
    // particles
    for(const p of particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=p.g||0.02; p.life--; p.vx*=0.97; }
    particles=particles.filter(p=>p.life>0);
  }

  function detonate(bm){ bm.live=false; bm.fuse=6; bm.flash=12; }
  function blast(bm){
    for(const b of G_.blocks){ if(b.kind==='obstacle' && !b.gone && Math.abs(b.x-bm.x)<bm.r) b.gone=true; }
    const c=G_.chest; const dx=c.x-bm.x, dy=c.y-bm.y, d=Math.hypot(dx,dy);
    if(d<bm.r){
      c.vx=bm.impulse?bm.impulse.vx:1.25; c.vy=bm.impulse?bm.impulse.vy:-0.35;
      if(mode==='wait'){ mode='play'; }
    }
    for(let i=0;i<26;i++){ const a=Math.random()*Math.PI*2, sp=0.6+Math.random()*1.6;
      particles.push({x:bm.x,y:bm.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-0.4,life:24+Math.random()*16,g:0.03,c:Math.random()<0.5?COL.spark1:COL.spark2,r:0.6+Math.random()});
    }
    bm.ring=18;
  }
  function spawnDust(x,y,n){ for(let i=0;i<n;i++){ particles.push({x:x+(Math.random()-.5)*2,y,vx:(Math.random()-.5)*0.3,vy:-0.1-Math.random()*0.2,life:18+Math.random()*10,g:0.005,c:COL.dust,r:0.8+Math.random()*0.8,soft:true}); } }
  function spawnCollapse(o){ for(let i=0;i<18;i++){ particles.push({x:o.x+(Math.random()-.5)*o.w,y:o.y+(Math.random()-.5)*o.h,vx:(Math.random()-.5)*0.5,vy:Math.random()*0.4,life:24+Math.random()*14,g:0.02,c:COL.collapse,r:0.8+Math.random()*1.1,soft:true}); } }

  function win(){ if(mode==='win')return; mode='win'; clearAnim=0;
    const c=G_.chest;
    for(let i=0;i<60;i++){ const a=Math.random()*Math.PI*2, sp=0.5+Math.random()*2.2;
      particles.push({x:c.x,y:c.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:40+Math.random()*30,g:0.03,
        c:[COL.gold1,COL.gold2,COL.chestLock,COL.spark2][Math.floor(Math.random()*4)],r:0.7+Math.random()*1.4}); }
    renderHUD();
  }
  function fail(){ if(mode==='fail'||mode==='win')return; mode='fail'; renderHUD(); }

  // ---- input ----
  function toUnit(ev){ const r=cv.getBoundingClientRect(); return {x:(ev.clientX-r.left)/UX(), y:(ev.clientY-r.top)/UY()}; }
  function hitObj(u){
    for(const o of G_.objs){ if(o.used) continue;
      if(Math.abs(u.x-o.x)<o.w/2+2 && u.y>o.y-o.h/2-2 && u.y<o.y+o.h/2+2) return o; }
    return null;
  }
  cv.addEventListener('pointermove',(e)=>{
    // ホバー: armed/wait/play のみ受付（ready は暗転中なので不要）
    if(mode!=='armed'&&mode!=='wait'&&mode!=='play'){hover=null;return;}
    hover=hitObj(toUnit(e));
  });
  cv.addEventListener('pointerdown',(e)=>{
    // win: 次ステージへ（1→2→3→4→5→6→1 ループ）
    if(mode==='win'){
      const next=(currentStage % TOTAL_STAGES)+1;
      loadStage(next);
      return;
    }
    // fail: 同ステージリトライ
    if(mode==='fail'){ loadStage(currentStage); return; }

    // ready -> armed: 暗転解除のみ（トリガー発火しない）
    // 画面のどこかをタップするだけで暗転が解除され、即操作可能状態になる
    if(mode==='ready'){
      mode='armed';
      hover=null;
      return;
    }

    // armed/wait/play: トリガーオブジェクトをクリックで発火
    if(mode==='armed'||mode==='wait'||mode==='play'){
      const u=toUnit(e);
      const o=hitObj(u);
      if(o && usedTriggers<G_.triggers){
        o.used=true; usedTriggers++; spawnCollapse(o); o.act();
        // armed/wait -> play に遷移
        if(mode==='armed'||mode==='wait'){ mode='play'; settleTimer=0; }
        renderHUD();
      }
    }
  });

  // ---- HUD ----
  function renderHUD(){
    const totalStr=`${TOTAL_STAGES}`;
    const left=`<div class="pill" style="font:600 calc(var(--uh)*2.3) 'Helvetica Neue';letter-spacing:.12em;color:var(--gold-1);text-shadow:0 0 calc(var(--u)*1.5) var(--gold-glow)">STAGE ${G_.name}/${totalStr}</div>`;
    const dots=[]; for(let i=0;i<G_.triggers;i++){ dots.push(`<span style="display:inline-block;width:calc(var(--u)*2.4);height:calc(var(--u)*2.4);border-radius:50%;margin-left:calc(var(--u)*0.8);background:${i<G_.triggers-usedTriggers?'radial-gradient(circle at 35% 30%,var(--dot-hi),var(--gold-1) 60%,var(--gold-2))':'var(--dot-empty)'};box-shadow:${i<G_.triggers-usedTriggers?'0 0 calc(var(--u)*1.2) var(--gold-glow)':'none'}"></span>`); }
    const right=`<div class="pill" style="display:flex;align-items:center"><span style="font:500 calc(var(--uh)*1.7) 'Helvetica Neue';color:var(--text-dim);margin-right:calc(var(--u)*1.2);letter-spacing:.1em">崩</span>${dots.join('')}</div>`;
    hud.innerHTML=left+right;
  }

  // ---- draw ----
  function draw(){
    ctx.clearRect(0,0,W,H);
    const bg=ctx.createRadialGradient(X(50),Y(22),X(4),X(50),Y(50),X(80));
    bg.addColorStop(0,COL.bgHi); bg.addColorStop(.5,COL.bgMid); bg.addColorStop(1,COL.bgDeep);
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
    ctx.save(); ctx.globalAlpha=.5; const mg=ctx.createRadialGradient(X(74),Y(16),0,X(74),Y(16),X(20));
    mg.addColorStop(0,COL.moonGlow+'1)'); mg.addColorStop(1,COL.moonGlow+'0)'); ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(X(74),Y(16),X(20),0,7); ctx.fill(); ctx.restore();
    ctx.fillStyle=COL.moon; ctx.beginPath(); ctx.arc(X(74),Y(15),X(5),0,7); ctx.fill();
    for(let i=0;i<26;i++){ const sx=((i*53)%100), sy=((i*37)%40); ctx.globalAlpha=.3+((i*7)%5)/10; ctx.fillStyle=COL.star+'.6)'; ctx.fillRect(X(sx),Y(sy),1.4,1.4);} ctx.globalAlpha=1;

    const g=G_.goal;
    drawGoal(g);

    for(const b of G_.blocks){
      if(b.gone) continue;
      if(b.kind==='obstacle') drawStone(b.x,b.y,b.w,b.h,COL.stoneObsHi,COL.stoneObsLow);
      if(b.kind==='rubble'){ drawStone(b.x,b.y,b.w,b.h,COL.stoneRubHi,COL.stoneRubLow); }
    }
    for(const bm of G_.bombs){ drawBomb(bm); }

    for(const s of G_.segs){ if(s.id==='wallR'||s.id==='GP') continue; const [p1,p2]=segPts(s); drawPlank(p1,p2,s); }

    for(const o of G_.objs){ if(o.used)continue; drawTrigger(o, hover&&hover.id===o.id); }

    drawChest(G_.chest);

    for(const p of particles){ ctx.globalAlpha=Math.min(1,p.life/24);
      if(p.soft){ ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(X(p.x),Y(p.y),X(p.r),0,7); ctx.fill(); }
      else { ctx.fillStyle=p.c; ctx.shadowColor=p.c; ctx.shadowBlur=8; ctx.beginPath(); ctx.arc(X(p.x),Y(p.y),X(p.r),0,7); ctx.fill(); ctx.shadowBlur=0; }
    } ctx.globalAlpha=1;

    // overlays
    // ready: 暗転＋操作案内（タップして開始）
    if(mode==='ready') overlay('READY','タップして開始',COL.gold1, G_.readyMsg||'崩す順番を見極めてゴールへ');
    // armed: 暗転なし。controls hint のみ（控えめ）
    if(mode==='armed') armedHint();
    if(mode==='win'){
      const isLast=(currentStage===TOTAL_STAGES);
      overlay(isLast?'ALL CLEAR':'CLEAR', isLast?'タップで最初から':'タップで次のステージへ', COL.gold1);
    }
    if(mode==='fail') overlay('FAILED','タップでリトライ',COL.warn);
  }

  function armedHint(){
    // 控えめなヒント文：下部に小さく表示
    ctx.save();
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=COL.armedHint;
    ctx.font=`500 ${Y(2.2)}px 'Helvetica Neue'`;
    ctx.fillText('崩すオブジェクトをクリック', W/2, H*0.92);
    ctx.restore();
  }

  function drawGoal(g){
    const x0=X(g.x), x1=X(g.x+g.w), y=Y(g.y);
    const grad=ctx.createLinearGradient(0,y,0,y+Y(8)); grad.addColorStop(0,COL.pedHi); grad.addColorStop(1,COL.pedLow);
    ctx.fillStyle=grad; ctx.fillRect(x0,y,x1-x0,Y(9));
    ctx.fillStyle=COL.pedSheen; ctx.fillRect(x0,y,x1-x0,Y(1.4));
    const fx=X(g.x+g.w-3);
    ctx.strokeStyle=COL.pole; ctx.lineWidth=Math.max(2,X(0.6)); ctx.beginPath(); ctx.moveTo(fx,y); ctx.lineTo(fx,y-Y(12)); ctx.stroke();
    const fl=ctx.createLinearGradient(fx,0,fx-X(9),0); fl.addColorStop(0,COL.gold1); fl.addColorStop(1,COL.gold3);
    ctx.fillStyle=fl; ctx.beginPath(); ctx.moveTo(fx,y-Y(12)); ctx.lineTo(fx-X(9),y-Y(10)); ctx.lineTo(fx,y-Y(7.5)); ctx.closePath(); ctx.fill();
    ctx.save(); ctx.globalAlpha=.4+0.2*Math.sin(Date.now()/300); ctx.strokeStyle=COL.gold1; ctx.lineWidth=X(0.5);
    ctx.beginPath(); ctx.arc(X(g.x+g.w/2-1.5),y-Y(2),X(6),0,7); ctx.stroke(); ctx.restore();
  }
  function drawPlank(p1,p2,s){
    const x1=X(p1[0]),y1=Y(p1[1]),x2=X(p2[0]),y2=Y(p2[1]);
    ctx.save(); ctx.lineCap='round';
    const grad=ctx.createLinearGradient(x1,y1,x2,y2); grad.addColorStop(0,COL.plankHi); grad.addColorStop(1,COL.plankLow);
    if(s.fixed){ grad.addColorStop(0,COL.plankFixHi); grad.addColorStop(1,COL.plankFixLow); }
    ctx.strokeStyle=grad; ctx.lineWidth=X(3.4); ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    ctx.strokeStyle=COL.plankEdge; ctx.lineWidth=X(0.8); ctx.beginPath(); ctx.moveTo(x1,y1-X(1.2)); ctx.lineTo(x2,y2-X(1.2)); ctx.stroke();
    ctx.restore();
  }
  function drawTrigger(o,hot){
    const x=X(o.x),y=Y(o.y),w=X(o.w),h=Y(o.h);
    ctx.save();
    const grad=ctx.createLinearGradient(x,y-h/2,x,y+h/2);
    if(o.kind==='rubble'){ grad.addColorStop(0,COL.rubbleHi); grad.addColorStop(1,COL.rubbleLow); }
    else { grad.addColorStop(0,COL.pillarHi); grad.addColorStop(1,COL.pillarLow); }
    ctx.fillStyle=grad;
    if(hot){ ctx.shadowColor=COL.goldGlow; ctx.shadowBlur=22; }
    ctx.fillRect(x-w/2,y-h/2,w,h);
    ctx.shadowBlur=0;
    ctx.strokeStyle=hot?COL.triHotEdge:COL.triEdge; ctx.lineWidth=hot?X(0.9):X(0.5);
    ctx.strokeRect(x-w/2,y-h/2,w,h);
    ctx.fillStyle=COL.capstone; ctx.fillRect(x-w/2,y-h/2,w,Y(1));
    if(hot){
      ctx.fillStyle=COL.gold1; ctx.font=`${X(5)}px 'Helvetica Neue'`; ctx.textAlign='center'; ctx.textBaseline='middle';
      const ax=o.dir==='↓'?x:x+w/2+X(5), ay=o.dir==='↓'?y+h/2+Y(4):y;
      ctx.globalAlpha=.6+0.4*Math.sin(Date.now()/200);
      ctx.fillText(o.dir,ax,ay); ctx.globalAlpha=1;
    }
    ctx.restore();
  }
  function drawStone(cx,cy,w,h,c1,c2){
    const x=X(cx),y=Y(cy),ww=X(w),hh=Y(h);
    const g=ctx.createLinearGradient(x,y-hh/2,x,y+hh/2); g.addColorStop(0,c1); g.addColorStop(1,c2);
    ctx.fillStyle=g; ctx.fillRect(x-ww/2,y-hh/2,ww,hh);
    ctx.strokeStyle=COL.stoneEdge; ctx.lineWidth=X(0.5); ctx.strokeRect(x-ww/2,y-hh/2,ww,hh);
  }
  function drawBomb(bm){
    const x=X(bm.x),y=Y(bm.y);
    if(bm.live){
      ctx.save(); ctx.globalAlpha=.35; ctx.strokeStyle=COL.spark2; ctx.lineWidth=X(0.5); ctx.setLineDash([X(2),X(2)]);
      ctx.beginPath(); ctx.arc(x,y,X(bm.r),0,7); ctx.stroke(); ctx.restore();
      const g=ctx.createRadialGradient(x-X(1),y-X(1),X(0.3),x,y,X(3)); g.addColorStop(0,COL.bombShellHi); g.addColorStop(1,COL.bombShellLow);
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,X(3),0,7); ctx.fill();
      ctx.strokeStyle=COL.fuse; ctx.lineWidth=X(0.7); ctx.beginPath(); ctx.moveTo(x,y-X(3)); ctx.quadraticCurveTo(x+X(2),y-X(5),x+X(3),y-X(6)); ctx.stroke();
      ctx.fillStyle=COL.gold1; ctx.beginPath(); ctx.arc(x+X(3),y-X(6),X(0.9),0,7); ctx.fill();
    }
    if(bm.flash>0){ bm.flash--; ctx.save(); ctx.globalAlpha=bm.flash/12;
      const g=ctx.createRadialGradient(x,y,0,x,y,X(bm.r)); g.addColorStop(0,COL.chestLock); g.addColorStop(.4,COL.gold1); g.addColorStop(1,'rgba(255,122,58,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,X(bm.r),0,7); ctx.fill(); ctx.restore(); }
    if(bm.ring>0){ bm.ring--; ctx.save(); ctx.globalAlpha=bm.ring/18; ctx.strokeStyle=COL.gold1; ctx.lineWidth=X(1);
      ctx.beginPath(); ctx.arc(x,y,X(bm.r)*(1-bm.ring/18)+X(2),0,7); ctx.stroke(); ctx.restore(); }
  }
  function drawChest(c){
    const x=X(c.x),y=Y(c.y),r=X(R);
    ctx.save(); ctx.shadowColor=COL.gold1; ctx.shadowBlur=18;
    const g=ctx.createLinearGradient(x,y-r,x,y+r); g.addColorStop(0,COL.chestHi); g.addColorStop(.5,COL.chestMid); g.addColorStop(1,COL.chestLow);
    const rot=(c.x*0.18)%(Math.PI*2);
    ctx.translate(x,y); ctx.rotate(Math.abs(c.vx)>0.05?rot:0);
    ctx.fillStyle=g; roundRect(-r,-r*0.8,r*2,r*1.6,r*0.4); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle=COL.chestBand; ctx.fillRect(-r,-r*0.18,r*2,r*0.36);
    ctx.fillStyle=COL.chestHi; ctx.fillRect(-r*0.18,-r*0.8,r*0.36,r*1.6);
    ctx.fillStyle=COL.chestLock; ctx.beginPath(); ctx.arc(0,0,r*0.26,0,7); ctx.fill();
    ctx.restore();
    if(Math.random()<0.3){ particles.push({x:c.x+(Math.random()-.5)*4,y:c.y-2-Math.random()*2,vx:0,vy:-0.05,life:14,c:COL.sparkleW,r:0.5,soft:false}); }
  }
  function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

  // overlay: ready/win/fail
  // title: 大見出し, sub: タップ指示, col: 色, hint: ステージ説明（readyのみ）
  function overlay(title,sub,col,hint){
    ctx.save(); ctx.fillStyle=COL.overlayBg; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=20;
    ctx.font=`700 ${Y(7)}px 'Helvetica Neue'`; ctx.fillText(title,W/2,H*0.38);
    ctx.shadowBlur=0;
    if(hint){
      ctx.fillStyle=COL.textSub; ctx.font=`500 ${Y(2.4)}px 'Helvetica Neue'`;
      ctx.fillText(hint,W/2,H*0.46);
    }
    ctx.fillStyle=COL.textSub; ctx.font=`500 ${Y(2.2)}px 'Helvetica Neue'`;
    ctx.fillText(sub,W/2,hint?H*0.53:H*0.50);
    ctx.restore();
  }

  // ---- loop ----
  // 物理実行: play/wait のみ。armed は物理停止だが applyTweens/particles は動かす
  function loop(){
    if(mode==='play'||mode==='wait'){
      step();
    } else {
      // armed/ready/win/fail: tweens と particles の見た目更新は維持
      applyTweens();
      for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=p.g||0.02;p.life--;p.vx*=0.97;}
      particles=particles.filter(p=>p.life>0);
    }
    draw();
    requestAnimationFrame(loop);
  }

  // ---- color tokens injected via :root extension ----
  const styleEl=document.createElement('style');
  styleEl.textContent=`#phone{--gold-1:${COL.gold1};--gold-2:${COL.goldDeep};--gold-glow:rgba(255,180,74,.6);--text-dim:#7a92b5;--dot-empty:#1a2238;--dot-hi:#fff;}`;
  document.head.appendChild(styleEl);

  // ---- 常設リトライボタン ----
  // mode を問わず（play/wait/ready/fail/win/armed いずれでも）現ステージを完全初期化する救済UI。
  // loadStage(currentStage) が宝箱配置・blocks/bombs・segs角度・usedTriggers・particles・tweens を
  // 全て初期状態へ戻す（getStageData でリテラル再生成 + 状態変数リセット）。
  const retryBtn=document.getElementById('retryBtn');
  retryBtn.addEventListener('click',(e)=>{
    e.preventDefault();
    loadStage(currentStage);
  });

  window.addEventListener('resize',()=>{resize();});
  resize(); loadStage(1); loop();
  </script>
</body>
