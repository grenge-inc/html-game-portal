<!DOCTYPE html>
<!--
  磁力4方向4連 — 9:19.5 phone frame. All elements inside #phone. Mouse (pointer) only.
-->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>磁力4方向4連</title>
<style>
  :root {
    --phone-aspect: 9 / 19.5;
    --bg-deep:#02030a; --bg-mid:#0a1430; --bg-panel:#06081a; --bg-card:#0b1228;
    --line:#1a2848;
    --cyan:#6ff; --cyan-soft:#8df; --cyan-grad-1:#3df; --cyan-grad-2:#06a;
    --mag:#f6a; --mag-soft:#fbd;
    --warn:#ffb86c;
    --text-main:#eaf3ff; --text-sub:#cdddef; --text-dim:#7a92b5;
    --nova-9:#ffd76b; --nova-7:#ffb24a; --nova-5:#ff7a3a; --nova-3:#ff5d8a; --nova-0:#fff;
    --player:#6ff; --player-core:#eaffff;
    --block:#5a6478; --block-edge:#ffb86c;
    --dir-R:#f6a; --dir-D:#a6f; --dir-L:#6ff; --dir-U:#6fa;
    --ground-top:#5a8a2a; --ground-mid:#3d6b18; --ground-soil:#2a4410;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;color:var(--text-main);
    font-family:'Helvetica Neue',system-ui,sans-serif;user-select:none;-webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;touch-action:none;}
  body{position:relative;display:flex;align-items:center;justify-content:center;}
  #phone{position:relative;overflow:hidden;
    width:min(100vw,calc(100vh*9/19.5));height:min(100vh,calc(100vw*19.5/9));
    --pw:min(100vw,calc(100vh*9/19.5));--ph:min(100vh,calc(100vw*19.5/9));
    --u:calc(var(--pw)/100);--uh:calc(var(--ph)/100);
    background:radial-gradient(120% 90% at 50% 22%,#13224a 0%,var(--bg-mid) 38%,var(--bg-deep) 100%);}
  #phone::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:.5;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:calc(var(--u)*10) calc(var(--u)*10);mask:radial-gradient(80% 70% at 50% 45%,#000 30%,transparent 100%);}
  #stars{position:absolute;inset:0;pointer-events:none;z-index:0;opacity:.8;
    background-image:
      radial-gradient(1.4px 1.4px at 18% 14%,rgba(141,221,255,.9),transparent),
      radial-gradient(1.2px 1.2px at 72% 9%,rgba(255,182,213,.7),transparent),
      radial-gradient(1.6px 1.6px at 41% 30%,rgba(234,243,255,.8),transparent),
      radial-gradient(1.2px 1.2px at 86% 26%,rgba(110,255,255,.6),transparent),
      radial-gradient(1.3px 1.3px at 28% 78%,rgba(255,182,213,.55),transparent),
      radial-gradient(1.5px 1.5px at 64% 88%,rgba(141,221,255,.6),transparent);
    animation:twinkle 5.5s ease-in-out infinite alternate;}
  @keyframes twinkle{from{opacity:.5;}to{opacity:.95;}}

  /* HUD */
  #hud{position:absolute;top:calc(var(--uh)*2.2);left:calc(var(--u)*4);right:calc(var(--u)*4);
    display:flex;align-items:flex-start;justify-content:space-between;z-index:5;}
  .stbox{display:flex;flex-direction:column;gap:calc(var(--uh)*.5);}
  #stLabel{font-size:calc(var(--u)*5);font-weight:800;letter-spacing:.06em;
    background:linear-gradient(90deg,var(--cyan),var(--cyan-soft));-webkit-background-clip:text;background-clip:text;color:transparent;}
  #goalBadge{font-size:calc(var(--u)*2.5);color:var(--text-sub);background:rgba(110,255,255,.08);
    border:1px solid rgba(110,255,255,.25);border-radius:999px;padding:calc(var(--uh)*.45) calc(var(--u)*2.2);width:max-content;max-width:calc(var(--u)*55);}
  /* moves counter under goal badge */
  #movesBox{font-size:calc(var(--u)*2.5);color:var(--nova-7);background:rgba(255,178,74,.08);
    border:1px solid rgba(255,178,74,.3);border-radius:999px;padding:calc(var(--uh)*.4) calc(var(--u)*2.2);
    width:max-content;display:flex;gap:calc(var(--u)*1.2);align-items:center;}
  #movesBox .label{color:var(--text-dim);}
  #movesVal{font-weight:800;color:var(--nova-7);}

  /* total score HUD box */
  #scoreBox{font-size:calc(var(--u)*2.5);background:rgba(255,215,107,.08);
    border:1px solid rgba(255,215,107,.3);border-radius:999px;padding:calc(var(--uh)*.4) calc(var(--u)*2.2);
    width:max-content;display:flex;gap:calc(var(--u)*1.2);align-items:center;}
  #scoreBox .label{color:var(--text-dim);}
  #scoreVal{font-weight:800;color:var(--nova-9);}
  #scoreBox.bump{animation:scoreBump .45s ease-out;}
  @keyframes scoreBump{
    0%{transform:scale(1);}
    30%{transform:scale(1.22);}
    60%{transform:scale(.97);}
    100%{transform:scale(1);}
  }

  /* direction indicator */
  .dirbox{display:flex;flex-direction:column;align-items:flex-end;gap:calc(var(--uh)*.4);}
  #dirNow{font-size:calc(var(--u)*8);font-weight:800;line-height:1;transition:color .25s,text-shadow .25s;}
  #dirNow.R{color:var(--dir-R);text-shadow:0 0 calc(var(--u)*3) var(--dir-R);}
  #dirNow.D{color:var(--dir-D);text-shadow:0 0 calc(var(--u)*3) var(--dir-D);}
  #dirNow.L{color:var(--dir-L);text-shadow:0 0 calc(var(--u)*3) var(--dir-L);}
  #dirNow.U{color:var(--dir-U);text-shadow:0 0 calc(var(--u)*3) var(--dir-U);}
  #dirNext{font-size:calc(var(--u)*2.4);color:var(--text-dim);display:flex;align-items:center;gap:calc(var(--u)*1);}
  #dirNext span{font-size:calc(var(--u)*3.5);font-weight:700;}
  #dirNext span.R{color:var(--dir-R);}
  #dirNext span.D{color:var(--dir-D);}
  #dirNext span.L{color:var(--dir-L);}
  #dirNext span.U{color:var(--dir-U);}

  /* board */
  #boardWrap{position:absolute;left:50%;top:calc(var(--uh)*20);transform:translateX(-50%);
    z-index:2;}
  #boardInner{position:relative;
    border:2px solid var(--line);border-radius:calc(var(--u)*2.5);
    background:linear-gradient(180deg,rgba(8,14,34,.7),rgba(4,6,16,.85));
    box-shadow:inset 0 0 calc(var(--u)*8) rgba(0,0,0,.6),0 calc(var(--u)*2) calc(var(--u)*6) rgba(0,0,0,.5);}
  /* pole walls — 4 sides */
  .poleWall{position:absolute;z-index:1;opacity:.15;transition:opacity .3s,box-shadow .3s;}
  #pwR{top:0;right:0;bottom:0;width:calc(var(--u)*1.4);background:linear-gradient(270deg,var(--dir-R),transparent);}
  #pwD{left:0;right:0;bottom:0;height:calc(var(--u)*1.4);background:linear-gradient(180deg,transparent,var(--dir-D));}
  #pwL{top:0;left:0;bottom:0;width:calc(var(--u)*1.4);background:linear-gradient(90deg,var(--dir-L),transparent);}
  #pwU{left:0;right:0;top:0;height:calc(var(--u)*1.4);background:linear-gradient(0deg,transparent,var(--dir-U));}
  #boardInner.poleR #pwR{opacity:.9;box-shadow:0 0 calc(var(--u)*3) var(--dir-R);animation:pulseW 1.8s ease-in-out infinite;}
  #boardInner.poleD #pwD{opacity:.9;box-shadow:0 0 calc(var(--u)*3) var(--dir-D);animation:pulseW 1.8s ease-in-out infinite;}
  #boardInner.poleL #pwL{opacity:.9;box-shadow:0 0 calc(var(--u)*3) var(--dir-L);animation:pulseW 1.8s ease-in-out infinite;}
  #boardInner.poleU #pwU{opacity:.9;box-shadow:0 0 calc(var(--u)*3) var(--dir-U);animation:pulseW 1.8s ease-in-out infinite;}
  @keyframes pulseW{0%,100%{filter:brightness(1);}50%{filter:brightness(1.6);}}

  #board{position:absolute;inset:calc(var(--u)*2);}
  .cell{position:absolute;border-radius:18%;transition:left .22s cubic-bezier(.4,1.2,.5,1),top .22s cubic-bezier(.4,1.2,.5,1);}
  .piece{box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);}
  .piece.p{background:radial-gradient(circle at 35% 28%,var(--player-core),var(--cyan) 42%,var(--cyan-grad-2) 100%);
    box-shadow:0 0 calc(var(--u)*2.6) rgba(110,255,255,.65),inset 0 0 calc(var(--u)*1.1) rgba(255,255,255,.55);}
  .piece.p::after{content:"";position:absolute;inset:14%;border-radius:50%;
    border:1px solid rgba(234,255,255,.45);box-shadow:0 0 calc(var(--u)*1) rgba(141,221,255,.6) inset;}
  .piece.b{background:linear-gradient(160deg,#7a8499,var(--block) 60%,#3a4250);
    border:1.5px solid var(--block-edge);
    box-shadow:inset 0 calc(var(--u)*.6) calc(var(--u)*1) rgba(255,255,255,.18),0 0 calc(var(--u)*1) rgba(0,0,0,.5);}
  .piece.b::after{content:"";position:absolute;inset:30%;border-radius:8%;
    background:repeating-linear-gradient(45deg,rgba(255,184,108,.25) 0 2px,transparent 2px 5px);}
  .piece.win{animation:winp .55s ease-in-out infinite alternate;z-index:2;}
  @keyframes winp{from{box-shadow:0 0 calc(var(--u)*2.5) rgba(255,215,107,.55),inset 0 0 0 transparent;
    background:radial-gradient(circle at 35% 28%,var(--player-core),var(--cyan) 42%,var(--cyan-grad-2) 100%);}
    to{box-shadow:0 0 calc(var(--u)*6) var(--nova-9),0 0 calc(var(--u)*2) #fff,inset 0 0 calc(var(--u)*1.6) #fff;
    background:radial-gradient(circle at 35% 28%,#fff,var(--nova-9) 55%,var(--nova-7) 100%);}}

  /* ground strip — placed directly below #boardInner */
  #groundStrip{position:absolute;left:0;right:0;z-index:2;pointer-events:none;
    display:flex;flex-direction:column;overflow:hidden;}
  /* grass layer */
  #groundGrass{height:calc(var(--u)*3.2);background:linear-gradient(180deg,#6eae2a 0%,#4d891a 100%);
    position:relative;overflow:visible;}
  /* grass tufts rendered as inline SVG-like pseudo elements via repeating gradient */
  #groundGrass::before{content:"";position:absolute;top:calc(var(--u)*-1.5);left:0;right:0;height:calc(var(--u)*3);
    background-image:
      radial-gradient(ellipse 3px 8px at 6% 100%,#7ac527,transparent),
      radial-gradient(ellipse 3px 10px at 10% 100%,#5ea81a,transparent),
      radial-gradient(ellipse 3px 9px at 14% 100%,#7ac527,transparent),
      radial-gradient(ellipse 3px 8px at 19% 100%,#6eae2a,transparent),
      radial-gradient(ellipse 3px 10px at 24% 100%,#7ac527,transparent),
      radial-gradient(ellipse 3px 8px at 29% 100%,#5ea81a,transparent),
      radial-gradient(ellipse 3px 9px at 34% 100%,#7ac527,transparent),
      radial-gradient(ellipse 3px 10px at 39% 100%,#6eae2a,transparent),
      radial-gradient(ellipse 3px 8px at 44% 100%,#7ac527,transparent),
      radial-gradient(ellipse 3px 10px at 49% 100%,#5ea81a,transparent),
      radial-gradient(ellipse 3px 9px at 54% 100%,#7ac527,transparent),
      radial-gradient(ellipse 3px 8px at 59% 100%,#6eae2a,transparent),
      radial-gradient(ellipse 3px 10px at 64% 100%,#7ac527,transparent),
      radial-gradient(ellipse 3px 8px at 69% 100%,#5ea81a,transparent),
      radial-gradient(ellipse 3px 9px at 74% 100%,#7ac527,transparent),
      radial-gradient(ellipse 3px 10px at 79% 100%,#6eae2a,transparent),
      radial-gradient(ellipse 3px 8px at 84% 100%,#7ac527,transparent),
      radial-gradient(ellipse 3px 9px at 89% 100%,#5ea81a,transparent),
      radial-gradient(ellipse 3px 10px at 94% 100%,#7ac527,transparent);
    background-size:100% 100%;}
  /* soil layer */
  #groundSoil{height:calc(var(--u)*4.5);
    background:linear-gradient(180deg,#5a3a1a 0%,#3d2510 55%,#2a1a08 100%);
    border-bottom:2px solid #1a0e04;}

  /* column/row tap targets */
  #cols{position:absolute;inset:calc(var(--u)*2);z-index:3;display:flex;}
  .col{flex:1;height:100%;cursor:pointer;}
  #boardInner.poleR .col:hover{background:linear-gradient(180deg,rgba(255,102,170,.12),transparent 40%);}
  #boardInner.poleL .col:hover{background:linear-gradient(180deg,rgba(110,255,255,.12),transparent 40%);}
  #boardInner.poleD .col:hover{background:linear-gradient(0deg,rgba(170,102,255,.12),transparent 40%);}
  #boardInner.poleU .col:hover{background:linear-gradient(180deg,rgba(102,255,170,.12),transparent 40%);}

  /* flash */
  #flash{position:absolute;inset:0;z-index:4;pointer-events:none;opacity:0;border-radius:calc(var(--u)*2.5);}
  #flash.go{animation:flashAnim .45s ease-out;}
  @keyframes flashAnim{0%{opacity:.6;}100%{opacity:0;}}

  /* footer */
  #foot{position:absolute;left:0;right:0;bottom:calc(var(--uh)*3);text-align:center;
    font-size:calc(var(--u)*2.8);color:var(--text-dim);z-index:5;}
  #foot b{color:var(--cyan-soft);}

  /* overlay */
  #ov{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:calc(var(--uh)*2);background:radial-gradient(60% 50% at 50% 45%,rgba(6,8,26,.82),rgba(2,3,10,.95));
    backdrop-filter:blur(2px);transition:opacity .3s;}
  #ov.hide{opacity:0;pointer-events:none;}
  #ovTitle{font-size:calc(var(--u)*11);font-weight:800;letter-spacing:.04em;
    background:linear-gradient(90deg,var(--nova-0),var(--nova-9));-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 calc(var(--u)*6) rgba(255,215,107,.25);}
  #ovSub{font-size:calc(var(--u)*3.2);color:var(--text-sub);max-width:calc(var(--u)*80);text-align:center;line-height:1.65;}
  /* score display in overlay */
  #ovScore{font-size:calc(var(--u)*5.5);font-weight:800;letter-spacing:.05em;
    background:linear-gradient(90deg,var(--nova-9),var(--nova-5));-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 calc(var(--u)*4) rgba(255,215,107,.35);display:none;}
  #ovScoreLabel{font-size:calc(var(--u)*2.8);color:var(--text-dim);margin-top:calc(var(--uh)*-.8);display:none;}
  #ovBtn{cursor:pointer;font-size:calc(var(--u)*4.2);font-weight:700;color:var(--bg-deep);
    padding:calc(var(--uh)*1.4) calc(var(--u)*9);border-radius:999px;border:none;
    background:linear-gradient(90deg,var(--cyan),var(--cyan-soft));box-shadow:0 0 calc(var(--u)*4) rgba(110,255,255,.5);}
  #ovBtn:active{transform:scale(.96);}
</style>
</head>
<body>
  <div id="phone">
    <div id="stars"></div>
    <div id="hud">
      <div class="stbox">
        <div id="stLabel">St 1</div>
        <div id="goalBadge">操作理解＋コア体験</div>
        <div id="movesBox"><span class="label">手数</span><span id="movesVal">0</span></div>
        <div id="scoreBox"><span class="label">合計PT</span><span id="scoreVal">0</span></div>
      </div>
      <div class="dirbox">
        <div id="dirNow" class="R">→</div>
        <div id="dirNext">次: <span id="dirNextArrow" class="D">↓</span></div>
      </div>
    </div>

    <div id="boardWrap">
      <div id="boardInner" class="poleR">
        <div class="poleWall" id="pwR"></div>
        <div class="poleWall" id="pwD"></div>
        <div class="poleWall" id="pwL"></div>
        <div class="poleWall" id="pwU"></div>
        <div id="board"></div>
        <div id="cols"></div>
        <div id="flash"></div>
      </div>
      <!-- Ground: grass + soil strip directly below the board -->
      <div id="groundStrip">
        <div id="groundGrass"></div>
        <div id="groundSoil"></div>
      </div>
    </div>

    <div id="foot">列を<b>クリック</b>してコマを置く</div>

    <div id="ov">
      <div id="ovTitle">READY</div>
      <div id="ovSub"></div>
      <div id="ovScore"></div>
      <div id="ovScoreLabel"></div>
      <button id="ovBtn">START</button>
    </div>
  </div>

  <script>
  (function(){
    // Direction cycle: R -> D -> L -> U -> R ...
    const DIR_CYCLE = ['R','D','L','U'];
    const DIR_ARROW = {R:'→', D:'↓', L:'←', U:'↑'};

    const boardWrap   = document.getElementById('boardWrap');
    const boardInner  = document.getElementById('boardInner');
    const boardEl     = document.getElementById('board');
    const colsEl      = document.getElementById('cols');
    const stLabel     = document.getElementById('stLabel');
    const goalBadge   = document.getElementById('goalBadge');
    const movesVal    = document.getElementById('movesVal');
    const scoreBox    = document.getElementById('scoreBox');
    const scoreVal    = document.getElementById('scoreVal');
    const dirNow      = document.getElementById('dirNow');
    const dirNextArrow= document.getElementById('dirNextArrow');
    const flash       = document.getElementById('flash');
    const ov          = document.getElementById('ov');
    const ovTitle     = document.getElementById('ovTitle');
    const ovSub       = document.getElementById('ovSub');
    const ovScore     = document.getElementById('ovScore');
    const ovScoreLabel= document.getElementById('ovScoreLabel');
    const ovBtn       = document.getElementById('ovBtn');
    const foot        = document.getElementById('foot');
    const groundStrip = document.getElementById('groundStrip');

    // 0=empty, 1=player, 2=blocker
    function mk(c,r){ return Array.from({length:r},()=>Array(c).fill(0)); }

    // parScore: base multiplier for score calculation per stage (based on optimal moves)
    const STAGES = [
      // St1 — 4×4, dirIdx=0(R), tutorial: place 1 piece, magnetic push right = 4 in a row
      { cols:4, rows:4, dirIdx:0,
        label:'St 1', goal:'操作理解＋コア体験',
        sub:'コマを置くたびに盤面全体が矢印の方向へ吸い寄せられる。右矢印の今、1クリックで4連結を完成させよう。',
        parMoves: 1,
        initFn: function(){
          const g=mk(4,4);
          g[0][0]=1; g[0][1]=1; g[0][2]=1; // row0: three player pieces on left
          return g;
        }
      },
      // St2 — 5×5, dirIdx=0(R), learn: direction changes each move
      { cols:5, rows:5, dirIdx:0,
        label:'St 2', goal:'方向変化を読む',
        sub:'一手ごとに磁力の向きが変わる。今の方向と次の方向を読んで、どこに置くかを判断しよう。',
        parMoves: 2,
        initFn: function(){
          const g=mk(5,5);
          g[0][0]=1; g[0][1]=1; // row0: two pieces left
          g[1][0]=1;             // row1: one piece
          return g;
        }
      },
      // St3 — 5×5, dirIdx=2(L), chain: blocker placement forces chain
      { cols:5, rows:5, dirIdx:2,
        label:'St 3', goal:'連鎖を起こす',
        sub:'ブロッカー（橙縁）を利用して磁力連鎖を起こそう。コマを置いた後の吸着で4連結が成立することがある。',
        parMoves: 2,
        initFn: function(){
          const g=mk(5,5);
          g[0][4]=2; // blocker right wall bottom
          g[1][4]=2; // blocker right wall
          g[0][0]=1; g[0][1]=1; g[0][2]=1; // 3 player pieces bottom-left
          g[1][0]=1;
          return g;
        }
      },
      // St4 — 6×6, dirIdx=1(D), complex vertical chain
      { cols:6, rows:6, dirIdx:1,
        label:'St 4', goal:'縦・斜め連鎖',
        sub:'今度は下方向の磁力から始まる。磁力方向が回るたびに盤面が変わる。縦か斜めの4連を狙おう。',
        parMoves: 4,
        initFn: function(){
          const g=mk(6,6);
          g[5][0]=2; g[5][1]=2; g[5][2]=2; // top row blockers
          g[0][5]=2; g[1][5]=2;             // right col blockers
          g[0][0]=1; g[1][0]=1;             // player pieces left bottom
          g[0][1]=1;
          return g;
        }
      },
      // St5 — 6×6, dirIdx=3(U), advanced chain + precise control
      { cols:6, rows:6, dirIdx:3,
        label:'St 5', goal:'精密連鎖制御',
        sub:'上方向磁力でスタート。方向サイクルR→D→L→Uを4〜5手読み切り、縦に4連を完成させよ。',
        parMoves: 5,
        initFn: function(){
          const g=mk(6,6);
          g[0][5]=2; g[1][5]=2; g[2][5]=2; // right column bottom blockers
          return g;
        }
      },
    ];

    let stageIdx=0, COLS=4, ROWS=4, grid=null, dirIdx=0, moves=0, busy=true;
    let cells = new Map();
    let totalScore = 0; // cumulative score across stages

    // Update HUD score display with bump animation
    function updateScoreHUD(){
      scoreVal.textContent = totalScore;
      scoreBox.classList.remove('bump');
      void scoreBox.offsetWidth;
      scoreBox.classList.add('bump');
    }

    // Build column click targets (rebuilt each stage because COLS can change)
    function buildCols(){
      colsEl.innerHTML='';
      for(let c=0;c<COLS;c++){
        const d=document.createElement('div'); d.className='col'; d.dataset.c=c;
        d.addEventListener('pointerdown',onColumn);
        colsEl.appendChild(d);
      }
    }

    ovBtn.addEventListener('pointerdown',onOvBtn);

    function cellSize(){ return boardEl.clientWidth/COLS; }
    function place(el,r,c){
      const s=cellSize(); const pad=s*0.10; const d=s-pad*2;
      el.style.width=d+'px'; el.style.height=d+'px';
      el.style.left=(c*s+pad)+'px';
      el.style.top=((ROWS-1-r)*s+pad)+'px';
    }

    function render(animate){
      const want=new Map();
      for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
        const v=grid[r][c]; if(v) want.set(r*COLS+c,v);
      }
      for(const [k,o] of [...cells]){ if(!want.has(k)){ o.el.remove(); cells.delete(k); } }
      for(const [k,v] of want){
        const r=Math.floor(k/COLS), c=k%COLS;
        let o=cells.get(k);
        if(!o){
          const el=document.createElement('div');
          el.className='cell piece '+(v===1?'p':'b');
          boardEl.appendChild(el); o={el,v}; cells.set(k,o);
          place(el,r,c);
        } else {
          o.el.className='cell piece '+(v===1?'p':'b');
          place(o.el,r,c);
        }
      }
    }

    function sizeBoard(){
      const pw = boardWrap.parentElement.clientWidth;
      const ph = boardWrap.parentElement.clientHeight;
      const u  = pw / 100;
      let cellU = COLS <= 5 ? 15 : 12.5;
      const bw = cellU * COLS * u;
      const bh = cellU * ROWS * u;
      boardInner.style.width  = bw + 'px';
      boardInner.style.height = bh + 'px';
      boardEl.style.inset = (u*2)+'px';
      // Position ground strip directly below boardInner
      groundStrip.style.width = bw + 'px';
      groundStrip.style.top = bh + 'px';
      groundStrip.style.left = '0px';
    }

    function loadStage(i){
      const st = STAGES[i];
      COLS = st.cols; ROWS = st.rows;
      grid = st.initFn();
      dirIdx = st.dirIdx; moves = 0; busy = true;
      stLabel.textContent = st.label;
      goalBadge.textContent = st.goal;
      movesVal.textContent = '0';
      scoreVal.textContent = totalScore;
      for(const [,o] of cells) o.el.remove();
      cells.clear();
      sizeBoard();
      buildCols();
      // initial settle for the starting direction
      applyMagnetic(DIR_CYCLE[dirIdx]);
      render(false);
      updateDirUI();
      showOverlay('READY', 'St '+(i+1)+' — '+st.sub, 'START', false, false);
    }

    function updateDirUI(){
      const d   = DIR_CYCLE[dirIdx];
      const nd  = DIR_CYCLE[(dirIdx+1)%4];
      dirNow.className = d;
      dirNow.textContent = DIR_ARROW[d];
      dirNextArrow.className = nd;
      dirNextArrow.textContent = DIR_ARROW[nd];
      // pole wall highlight
      boardInner.className = 'pole'+d;
      // flash color
      const colors={R:'rgba(255,102,170,.6)',D:'rgba(170,102,255,.6)',L:'rgba(110,255,255,.6)',U:'rgba(102,255,170,.6)'};
      flash.style.background = 'radial-gradient(60% 60% at 50% 50%,'+colors[d]+',transparent 70%)';
    }

    // ---- magnetic slide logic ----
    function applyMagnetic(d){
      if(d==='L'){
        for(let r=0;r<ROWS;r++){
          const pieces=[];
          for(let c=0;c<COLS;c++) if(grid[r][c]) pieces.push(grid[r][c]);
          const nr=Array(COLS).fill(0);
          for(let i=0;i<pieces.length;i++) nr[i]=pieces[i];
          grid[r]=nr;
        }
      } else if(d==='R'){
        for(let r=0;r<ROWS;r++){
          const pieces=[];
          for(let c=0;c<COLS;c++) if(grid[r][c]) pieces.push(grid[r][c]);
          const nr=Array(COLS).fill(0);
          for(let i=0;i<pieces.length;i++) nr[COLS-pieces.length+i]=pieces[i];
          grid[r]=nr;
        }
      } else if(d==='D'){
        for(let c=0;c<COLS;c++){
          const pieces=[];
          for(let r=0;r<ROWS;r++) if(grid[r][c]) pieces.push(grid[r][c]);
          for(let r=0;r<ROWS;r++) grid[r][c]= r<pieces.length ? pieces[r] : 0;
        }
      } else if(d==='U'){
        for(let c=0;c<COLS;c++){
          const pieces=[];
          for(let r=0;r<ROWS;r++) if(grid[r][c]) pieces.push(grid[r][c]);
          for(let r=0;r<ROWS;r++) grid[r][c]= r>=(ROWS-pieces.length) ? pieces[r-(ROWS-pieces.length)] : 0;
        }
      }
    }

    // Find winning line (4+ in a row of player pieces)
    function winLine(){
      const dirs=[[0,1],[1,0],[1,1],[1,-1]];
      for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
        if(grid[r][c]!==1) continue;
        for(const [dr,dc] of dirs){
          const line=[[r,c]]; let rr=r+dr,cc=c+dc;
          while(rr>=0&&rr<ROWS&&cc>=0&&cc<COLS&&grid[rr][cc]===1){line.push([rr,cc]);rr+=dr;cc+=dc;}
          if(line.length>=4) return line.slice(0,4);
        }
      }
      return null;
    }

    // Drop a player piece into the column (any empty row; magnetics settle it)
    function dropAt(c){
      for(let r=0;r<ROWS;r++) if(grid[r][c]===0){ grid[r][c]=1; return true; }
      return false;
    }

    // Score calculation: 1-move clear = 2000pt, each additional move -100pt, minimum 0pt
    // score = max(0, 2000 - (actualMoves - 1) * 100)
    function calcScore(actualMoves){
      return Math.max(0, 2000 - (actualMoves - 1) * 100);
    }

    function onColumn(e){
      e.preventDefault();
      if(busy) return;
      const c=+e.currentTarget.dataset.c;
      let full=true;
      for(let r=0;r<ROWS;r++) if(grid[r][c]===0){full=false;break;}
      if(full) return;

      busy=true;
      dropAt(c);
      render(true);

      setTimeout(()=>{
        dirIdx = (dirIdx+1)%4;
        moves++;
        movesVal.textContent = moves;
        const d = DIR_CYCLE[dirIdx];
        applyMagnetic(d);
        render(true);
        updateDirUI();
        doFlash();

        setTimeout(()=>{
          const wl=winLine();
          if(wl){
            for(const [r,cc] of wl){
              const o=cells.get(r*COLS+cc);
              if(o) o.el.classList.add('win');
            }
            setTimeout(onClear, 650);
          } else {
            busy=false;
          }
        }, 260);
      }, 200);
    }

    function doFlash(){
      flash.classList.remove('go'); void flash.offsetWidth; flash.classList.add('go');
    }

    function onClear(){
      busy=true;
      const stScore = calcScore(moves);
      totalScore += stScore;
      // Update HUD score immediately with bump animation
      updateScoreHUD();

      if(stageIdx>=STAGES.length-1){
        showOverlay('ALL CLEAR','全5ステージ制覇！磁力と連鎖を読み切った。','もう一度',true,true,totalScore,moves);
      } else {
        showOverlay('CLEAR','St '+(stageIdx+1)+' クリア。次のステージへ！','NEXT',false,true,stScore,moves);
      }
    }

    let ovMode='start';
    function showOverlay(title,sub,btn,allclear,showScoreFlag,scoreVal_,movesUsed){
      ovTitle.textContent=title; ovSub.textContent=sub; ovBtn.textContent=btn;
      if(showScoreFlag && scoreVal_ !== undefined){
        ovScore.style.display='block';
        ovScoreLabel.style.display='block';
        ovScore.textContent = scoreVal_ + ' pt';
        if(allclear){
          ovScoreLabel.textContent = '合計スコア（全5ステージ）';
        } else {
          const comment = movesUsed === 1 ? '最速クリア！' : (movesUsed <= 3 ? 'ナイス！' : '');
          ovScoreLabel.textContent = movesUsed + '手クリア' + (comment ? ' — '+comment : '');
        }
      } else {
        ovScore.style.display='none';
        ovScoreLabel.style.display='none';
      }
      ov.classList.remove('hide');
      ovMode = title==='READY'?'start' : (allclear?'restart':(title==='CLEAR'?'next':'start'));
    }
    function onOvBtn(e){
      e.preventDefault();
      ov.classList.add('hide');
      if(ovMode==='start'){ busy=false; }
      else if(ovMode==='next'){ stageIdx++; loadStage(stageIdx); }
      else if(ovMode==='restart'){ stageIdx=0; totalScore=0; scoreVal.textContent='0'; loadStage(0); }
    }

    window.addEventListener('resize',()=>{ sizeBoard(); render(false); });
    loadStage(0);
  })();
  </script>
</body>
</html>
