<!DOCTYPE html>
<!--
  Phone frame template for hybrid-casual-mentor generated games.
  Aspect ratio: 9:19.5 (iPhone X 系縦長)
  PC で開いても常にこの比率を保ち、letterbox（左右黒帯）で中央表示。
-->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>紐引きアローソート</title>
<style>
  :root {
    --phone-aspect: 9 / 19.5;
    --blue:        #3A8EFF;
    --blue-hi:     #6fb8ff;
    --blue-lo:     #1a5fcc;
    --red:         #FF3B3B;
    --red-hi:      #ff8080;
    --red-lo:      #cc0a0a;
    --yellow:      #FFD000;
    --yellow-hi:   #ffe860;
    --yellow-lo:   #c89000;
    --green:       #44CC44;
    --green-hi:    #80e880;
    --green-lo:    #18a018;
    --purple:      #CC44CC;
    --purple-hi:   #e880e8;
    --purple-lo:   #8a188a;
    --wood-light:  #f0d898;
    --wood-mid:    #deb96a;
    --wood-dark:   #c09030;
    --wood-shadow: rgba(120,70,10,0.45);
    --cell-bg:     rgba(200,155,60,0.18);
    --cell-border: rgba(160,110,30,0.28);
    --bg-top:      #c8f090;
    --bg-mid:      #a0d860;
    --bg-bot:      #78b030;
    --tree-a:      #5a9030;
    --tree-b:      #6aaa40;
    --tree-dark:   #3a6010;
    --flower-a:    #ffb0c0;
    --flower-b:    #fff0a0;
    --trunk:       #8B5E2A;
    --grass-strip: #58a818;
    --hud-bg:      rgba(255,255,255,0.65);
    --hud-text:    #3a2800;
    --modal-bg-top:#fff8e0;
    --modal-bg-bot:#ffe080;
    --modal-text:  #e06000;
    --modal-sub:   #885500;
    --btn-grad-top:rgba(255,255,255,0.35);
    --btn-grad-bot:rgba(255,255,255,0.1);
    --btn-base:    rgba(60,120,30,0.45);
    --btn-shadow:  rgba(20,80,10,0.35);
    --next-top:    #ff9020;
    --next-bot:    #e06000;
    --text-main:   #fff;
    --text-dim:    rgba(255,255,255,0.7);
    --badge-ops:   #7040e0;
    --badge-think: #e07020;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html, body {
    width:100%; height:100%;
    overflow:hidden;
    background:#000;
    color:#fff;
    font-family:'Helvetica Neue', system-ui, sans-serif;
    user-select:none;
    -webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
  }
  body {
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #phone {
    position:relative;
    overflow:hidden;
    width:  min(100vw, calc(100vh * 9 / 19.5));
    height: min(100vh, calc(100vw * 19.5 / 9));
    --pw:   min(100vw, calc(100vh * 9 / 19.5));
    --ph:   min(100vh, calc(100vw * 19.5 / 9));
    --u:    calc(var(--pw) / 100);
    --uh:   calc(var(--ph) / 100);
    background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 50%, var(--bg-bot) 100%);
  }
  #bg-deco { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
  .tree { position:absolute; border-radius:50% 50% 45% 45%; opacity:0.82; box-shadow:inset 0 -4px 8px rgba(0,0,0,0.15); }
  .flower { position:absolute; border-radius:50%; opacity:0.9; box-shadow:0 1px 4px rgba(0,0,0,0.2); }
  .water-blob { position:absolute; border-radius:50%; opacity:0.45; }
  #grass-strip { position:absolute; bottom:0; left:0; right:0; height:calc(var(--uh)*9); background:linear-gradient(0deg,var(--grass-strip) 0%,transparent 100%); pointer-events:none; }
  #hud { position:absolute; top:calc(var(--uh)*3); left:0; right:0; display:flex; align-items:center; justify-content:space-between; padding:0 calc(var(--u)*5); }
  #stage-label { font-size:calc(var(--u)*5.5); font-weight:800; color:var(--hud-text); text-shadow:0 1px 0 rgba(255,255,255,0.6); background:var(--hud-bg); border-radius:calc(var(--u)*3); padding:calc(var(--u)*1.5) calc(var(--u)*4); letter-spacing:0.04em; box-shadow:0 2px 8px rgba(0,0,0,0.15),inset 0 1px 0 rgba(255,255,255,0.8); backdrop-filter:blur(4px); }
  #stage-badge { font-size:calc(var(--u)*3); font-weight:700; border-radius:calc(var(--u)*2.5); padding:calc(var(--u)*1) calc(var(--u)*3); color:var(--text-main); box-shadow:0 2px 6px rgba(0,0,0,0.25); white-space:nowrap; }
  #stage-badge.ops   { background:var(--badge-ops); }
  #stage-badge.think { background:var(--badge-think); }
  #color-status { display:flex; gap:calc(var(--u)*2); align-items:center; }
  .cs-dot { width:calc(var(--u)*5.5); height:calc(var(--u)*5.5); border-radius:50%; border:2px solid rgba(255,255,255,0.6); box-shadow:0 2px 6px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.4); transition:opacity 0.4s,transform 0.4s; }
  .cs-dot.done { opacity:0.22; transform:scale(0.8); }
  #board-wrap { position:absolute; left:50%; transform:translateX(-50%); top:calc(var(--uh)*14); display:flex; align-items:center; justify-content:center; }
  #board { position:relative; border-radius:calc(var(--u)*4.5); padding:calc(var(--u)*3.5); background: repeating-linear-gradient(91deg,rgba(160,100,20,0.08) 0,rgba(160,100,20,0.08) 1px,transparent 1px,transparent calc(var(--u)*10)), repeating-linear-gradient(3deg,rgba(160,100,20,0.06) 0,rgba(160,100,20,0.06) 1px,transparent 1px,transparent calc(var(--u)*13)), linear-gradient(145deg,var(--wood-light) 0%,var(--wood-mid) 55%,var(--wood-dark) 100%); box-shadow:0 8px 28px var(--wood-shadow),0 2px 6px rgba(0,0,0,0.2),inset 0 2px 0 rgba(255,245,190,0.75),inset 0 -3px 6px rgba(120,70,10,0.35); border:2.5px solid rgba(255,225,145,0.45); }
  /* rope canvas is BEHIND blocks (z-index:1) */
  #rope-canvas { position:absolute; top:calc(var(--u)*3.5); left:calc(var(--u)*3.5); pointer-events:none; z-index:1; }
  #grid { display:grid; gap:calc(var(--u)*1.8); position:relative; }
  .cell { border-radius:calc(var(--u)*2); background:var(--cell-bg); border:1px solid var(--cell-border); position:relative; display:flex; align-items:center; justify-content:center; box-shadow:inset 0 1px 3px rgba(0,0,0,0.12); }
  /* arrow-block is ABOVE canvas (z-index:10) */
  .arrow-block { position:absolute; inset:7%; border-radius:calc(var(--u)*2.2); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:transform 0.08s,filter 0.15s; will-change:transform; z-index:10; box-shadow:0 5px 0 rgba(0,0,0,0.38),0 7px 14px rgba(0,0,0,0.28),inset 0 1px 0 rgba(255,255,255,0.5),inset 0 -2px 4px rgba(0,0,0,0.22); }
  .arrow-block::before { content:''; position:absolute; top:6%; left:9%; right:9%; height:38%; background:rgba(255,255,255,0.32); border-radius:calc(var(--u)*1.8) calc(var(--u)*1.8) 45% 45%; pointer-events:none; }
  .arrow-block.selected { filter:brightness(1.25) drop-shadow(0 0 calc(var(--u)*2.5) rgba(255,255,200,0.9)); transform:scale(1.07) translateY(-2px); }
  .arrow-block.flash { animation:blockFlash 0.38s ease-out; }
  @keyframes blockFlash { 0%{filter:brightness(3.5) saturate(0);}40%{filter:brightness(2) saturate(2.5);}100%{filter:brightness(1);} }
  /* SVG arrow sits inside the block — pointer-events:none ensures no click blocking */
  .arrow-block svg { width:60%; height:60%; filter:drop-shadow(0 1px 2px rgba(0,0,0,0.6)); pointer-events:none; position:relative; z-index:1; }
  .color-blue   { background:linear-gradient(145deg,var(--blue-hi) 0%,var(--blue) 45%,var(--blue-lo) 100%); }
  .color-red    { background:linear-gradient(145deg,var(--red-hi) 0%,var(--red) 45%,var(--red-lo) 100%); }
  .color-yellow { background:linear-gradient(145deg,var(--yellow-hi) 0%,var(--yellow) 45%,var(--yellow-lo) 100%); }
  .color-green  { background:linear-gradient(145deg,var(--green-hi) 0%,var(--green) 45%,var(--green-lo) 100%); }
  .color-purple { background:linear-gradient(145deg,var(--purple-hi) 0%,var(--purple) 45%,var(--purple-lo) 100%); }
  #btns { position:absolute; bottom:calc(var(--uh)*4.5); left:0; right:0; display:flex; justify-content:center; gap:calc(var(--u)*8); }
  .btn { width:calc(var(--u)*22); height:calc(var(--u)*14); border-radius:calc(var(--u)*4); border:1.5px solid rgba(255,255,255,0.4); cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:calc(var(--u)*0.5); font-size:calc(var(--u)*3.2); font-weight:700; color:var(--text-main); background:linear-gradient(160deg,var(--btn-grad-top) 0%,var(--btn-grad-bot) 100%),var(--btn-base); box-shadow:0 3px 10px var(--btn-shadow),inset 0 1px 0 rgba(255,255,255,0.35); transition:transform 0.1s,filter 0.1s; touch-action:manipulation; }
  .btn:active { transform:scale(0.93); filter:brightness(0.88); }
  .btn-icon { font-size:calc(var(--u)*5.5); line-height:1; }
  #particle-layer { position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:50; }
  .particle { position:absolute; border-radius:50%; pointer-events:none; will-change:transform,opacity; }
  .burst-ring { position:absolute; border-radius:50%; border:3px solid; pointer-events:none; will-change:transform,opacity; }
  #modal { position:absolute; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.5); z-index:100; }
  #modal.show { display:flex; }
  #modal-box { background:linear-gradient(160deg,var(--modal-bg-top) 0%,var(--modal-bg-bot) 100%); border-radius:calc(var(--u)*5); padding:calc(var(--u)*8) calc(var(--u)*10); text-align:center; box-shadow:0 8px 40px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.8); animation:popIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275); border:2px solid rgba(255,220,100,0.6); }
  @keyframes popIn { from{transform:scale(0.5);opacity:0;}to{transform:scale(1);opacity:1;} }
  #modal-title { font-size:calc(var(--u)*11); font-weight:900; color:var(--modal-text); text-shadow:0 2px 6px rgba(200,100,0,0.35); letter-spacing:0.05em; }
  #modal-sub { font-size:calc(var(--u)*4.5); color:var(--modal-sub); margin:calc(var(--u)*2) 0 calc(var(--u)*5); }
  #modal-next { background:linear-gradient(160deg,var(--next-top) 0%,var(--next-bot) 100%); border:none; border-radius:calc(var(--u)*4); color:var(--text-main); font-weight:800; font-size:calc(var(--u)*5.5); padding:calc(var(--u)*3) calc(var(--u)*10); cursor:pointer; box-shadow:0 4px 14px rgba(200,80,0,0.55),inset 0 1px 0 rgba(255,200,100,0.4); touch-action:manipulation; }
  .confetti-piece { position:absolute; width:calc(var(--u)*2.5); height:calc(var(--u)*2.5); border-radius:2px; pointer-events:none; }
  #all-clear { position:absolute; inset:0; display:none; align-items:center; justify-content:center; flex-direction:column; background:linear-gradient(160deg,var(--modal-bg-top) 0%,var(--modal-bg-bot) 60%,#ffb800 100%); z-index:200; }
  #all-clear.show { display:flex; }
  #all-clear-title { font-size:calc(var(--u)*14); font-weight:900; color:var(--modal-text); text-shadow:0 3px 10px rgba(200,100,0,0.4); animation:bounce 0.6s ease infinite alternate; }
  @keyframes bounce { from{transform:translateY(0) scale(1);}to{transform:translateY(calc(var(--u)*-2)) scale(1.03);} }
  #all-clear-sub { font-size:calc(var(--u)*5); color:var(--modal-sub); margin-top:calc(var(--u)*3); }

  /* Block-to-rope transform animation: block squashes then fades into rope shape */
  .arrow-block.merging {
    animation: blockToRope 0.55s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  @keyframes blockToRope {
    0%   { transform: scale(1);        filter: brightness(1); border-radius: 40%; }
    20%  { transform: scale(1.3, 0.7); filter: brightness(2.5) saturate(2); }
    50%  { transform: scale(0.6, 1.6); filter: brightness(2) saturate(1.5); border-radius: 50%; }
    80%  { transform: scale(0.25, 2.2); filter: brightness(1.5); border-radius: 50%; opacity: 0.6; }
    100% { transform: scale(0.1, 2.5); filter: brightness(1); border-radius: 50%; opacity: 0; }
  }
  /* Tail block recoil: shows that the tail was "pulled by the rope" */
  .arrow-block.tail-recoil {
    animation: tailRecoil 0.25s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  @keyframes tailRecoil {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.15, 0.88); }
    100% { transform: scale(1); }
  }
</style>
</head>
<body>
  <div id="phone">
    <div id="bg-deco">
      <div class="tree" style="top:-6%;left:-9%;width:calc(var(--u)*30);height:calc(var(--u)*28);background:radial-gradient(circle at 50% 40%,var(--tree-b),var(--tree-dark));"></div>
      <div class="tree" style="top:-5%;right:-8%;width:calc(var(--u)*26);height:calc(var(--u)*24);background:radial-gradient(circle at 50% 45%,var(--tree-a),var(--tree-dark));"></div>
      <div class="tree" style="bottom:12%;left:-7%;width:calc(var(--u)*24);height:calc(var(--u)*22);background:radial-gradient(circle at 50% 40%,var(--tree-b),var(--tree-dark));"></div>
      <div class="tree" style="bottom:10%;right:-6%;width:calc(var(--u)*22);height:calc(var(--u)*20);background:radial-gradient(circle at 50% 42%,var(--tree-a),var(--tree-dark));"></div>
      <div class="flower" style="top:9%;left:7%;width:calc(var(--u)*4.5);height:calc(var(--u)*4.5);background:var(--flower-a);"></div>
      <div class="flower" style="top:7%;right:9%;width:calc(var(--u)*4);height:calc(var(--u)*4);background:var(--flower-b);"></div>
      <div class="flower" style="top:12%;left:16%;width:calc(var(--u)*3.2);height:calc(var(--u)*3.2);background:var(--flower-b);"></div>
      <div class="flower" style="top:11%;right:16%;width:calc(var(--u)*3.5);height:calc(var(--u)*3.5);background:var(--flower-a);"></div>
      <div class="flower" style="bottom:15%;left:11%;width:calc(var(--u)*4);height:calc(var(--u)*4);background:var(--flower-a);"></div>
      <div class="flower" style="bottom:17%;right:13%;width:calc(var(--u)*3.5);height:calc(var(--u)*3.5);background:var(--flower-b);"></div>
      <div class="water-blob" style="bottom:4%;right:3%;width:calc(var(--u)*20);height:calc(var(--u)*10);background:linear-gradient(135deg,#70d0f8,#38a8d0);"></div>
    </div>
    <div id="grass-strip"></div>
    <div id="hud">
      <div id="stage-label">Stage 1</div>
      <div id="stage-badge" class="ops">操作理解</div>
      <div id="color-status"></div>
    </div>
    <div id="board-wrap">
      <div id="board">
        <canvas id="rope-canvas"></canvas>
        <div id="grid"></div>
      </div>
    </div>
    <div id="btns">
      <button class="btn" id="btn-undo"><span class="btn-icon">↩️</span><span>Undo</span></button>
      <button class="btn" id="btn-hint"><span class="btn-icon">💡</span><span>Hint</span></button>
    </div>
    <div id="particle-layer"></div>
    <div id="modal">
      <div id="modal-box">
        <div id="modal-title">CLEAR! 🎉</div>
        <div id="modal-sub">次のステージへ</div>
        <button id="modal-next">Next Stage →</button>
      </div>
    </div>
    <div id="all-clear">
      <div id="all-clear-title">ALL CLEAR!</div>
      <div id="all-clear-sub">全ステージクリア！おめでとう🎊</div>
    </div>
  </div>
<script>
// ============================================================
// 紐引きアローソート v9 — Rope-Pulled Snake + Block-to-Rope Merge
// ============================================================
//
// CORE MECHANIC:
//   Each group = [TailBlock] ---rope--- [HeadBlock]
//
//   ARROW RULE:
//     The arrow on each block always shows the MOVEMENT DIRECTION,
//     which is the direction OPPOSITE to where the rope is attached on that block.
//     Example: rope attached to the RIGHT side of a block → arrow points LEFT.
//
//   MOVEMENT RULE (tap HeadBlock):
//     1. HeadBlock slides in its arrow direction (opposite to rope attachment).
//     2. The rope travels to HeadBlock's old position.
//     3. TailBlock is pulled along — it moves to where the rope was.
//     This creates a "snake train" animation: head leads, rope follows, tail trails.
//
//   MERGE RULE:
//     When two same-color blocks collide (overlap at same cell or adjacent):
//     - The colliding blocks FUSE into the rope segment between them.
//     - The non-colliding outer blocks become the new Head and Tail.
//     - If this merge brings all groups of that color together → full dissolve.
//     Visual: the colliding blocks play a "block-to-rope" shrink animation,
//             then the extended rope is drawn connecting the outer blocks.
//
//   GROUP STRUCTURE (always):
//     [TailBlock] ---rope--- [HeadBlock]
//     (After merge: outer blocks become new Tail/Head, middle fused blocks = rope)
//
// IMPLEMENTATION DETAILS:
//   - chain.blocks[0] = HeadBlock (front, tapped block, has the arrow direction)
//   - chain.blocks[last] = TailBlock (back, pulled by rope)
//   - Rope is drawn between ALL consecutive blocks (canvas z-index:1, blocks z-index:10)
//   - Arrow direction = chain.dir for ALL blocks in chain (they all point same way)
//
// ============================================================

const BLOCK_STAGGER_MS = 90; // delay between each block in snake train animation

const DIRV = {
  RIGHT: {dr:0,  dc:1},
  LEFT:  {dr:0,  dc:-1},
  UP:    {dr:-1, dc:0},
  DOWN:  {dr:1,  dc:0},
};

// For a given movement direction, the rope attaches on the OPPOSITE side of each block
const OPPOSITE_DIR = {
  RIGHT: 'LEFT',
  LEFT:  'RIGHT',
  UP:    'DOWN',
  DOWN:  'UP',
};

const COLOR_MAP = {
  blue:   '#3A8EFF',
  red:    '#FF3B3B',
  yellow: '#FFD000',
  green:  '#44CC44',
  purple: '#CC44CC',
};

// ============================================================
// STAGE DATA
// ============================================================
//
// Each group has exactly 2 blocks connected by a rope:
//   blocks[0] = HeadBlock (with arrow, tapped to move)
//   blocks[1] = TailBlock (pulled by rope)
//
// Arrow direction = dir = direction of movement = opposite of rope attachment side
//
// Stage 1: 7×7, blue, 2 groups → merge into 1 → dissolve (threshold=4)
//   BlueA: head at (0,2), tail at (0,3), dir=RIGHT
//     → arrow on both blocks points RIGHT
//     → rope attaches on LEFT side of head, RIGHT side of tail
//   BlueB: head at (6,3), tail at (6,4), dir=UP
//     → arrow points UP
//   Solve: tap BlueA → slides RIGHT → head(0,2)→(0,5), tail(0,3)→(0,4) ... stops approaching wall
//          tap BlueB → slides UP → head(6,3)→(0,3), tail(6,4)→(0,4)?... no
//          BlueA ends at (0,4)(0,5). BlueB slides UP from (6,3)(6,4):
//          (0,4) is BlueA's tail. BlueB head blocked at row1. BlueB stops at (1,3)(1,4).
//          (1,4) adj (0,4) → MERGE → 4 blocks = threshold → DISSOLVE ✓
//
// Stage 2: 7×7, red, 4 groups → sequential merge → dissolve (threshold=8)
//   RedA: head(0,3) DOWN, tail(1,3)
//   RedB: head(3,3) DOWN, tail(4,3)  ← immediately below A after 1-cell slide
//   RedC: head(5,0) RIGHT, tail(5,1) ← row 5, going right
//   RedD: head(3,6) LEFT, tail(3,5)  ← row 3, going left
//   Solve (4 taps, order-dependent):
//     Tap 1 RedA↓: A slides 1 step → adj B → merge AB (4<8, dir=DOWN)
//     Tap 2 AB↓:   AB slides 2 steps → rows3-6 col3 (AB.tail now at (6,3))
//     Tap 3 RedC→: C slides 1 step → (5,1)(5,2) adj (5,3)=AB → merge ABC (6<8, dir=RIGHT)
//     Tap 4 ABC→:  ABC slides 1 step RIGHT → (3,4) adj (3,5)=D.tail → merge ABCD (8=threshold) → DISSOLVE ✓
//
// Stage 3: 7×7, green, 5 groups → sequential merge → dissolve (threshold=10)
//   GreenA: head(0,3) DOWN, tail(1,3)
//   GreenB: head(4,3) DOWN, tail(5,3)
//   GreenC: head(3,0) RIGHT, tail(3,1)
//   GreenD: head(3,5) LEFT, tail(3,6)
//   GreenE: head(6,5) LEFT, tail(6,6)
//   Solve (5 taps, order-dependent):
//     Tap 1 A↓:    A slides 2 steps → adj B → merge AB (4<10, dir=DOWN)
//     Tap 2 C→:    C slides 1 step → adj AB → merge ABC (6<10, dir=RIGHT)
//     Tap 3 D←:    D slides 1 step → adj ABC → merge ABCD (8<10, dir=LEFT)
//     Tap 4 E←:    E slides left to wall → (6,1)(6,2), not yet adj to ABCD
//     Tap 5 ABCD←: ABCD slides 1 step left → (5,2) adj (6,2)=E → merge ABCDE (10=threshold) → DISSOLVE ✓
//

const STAGES = [
  // ── Stage 1 ── 7×7, 1 color (blue), 2 groups ──────────────────────
  {
    rows: 7, cols: 7,
    badge: '操作理解',
    badgeClass: 'ops',
    colors: ['blue'],
    colorThreshold: { blue: 4 },
    chains: [
      // BlueA: head(0,2) RIGHT → slides right. Rope attached LEFT of head, RIGHT of tail.
      { color:'blue', dir:'RIGHT', blocks:[{id:0,r:0,c:2},{id:1,r:0,c:3}] },  // head, tail
      // BlueB: head(6,3) UP → slides up. Rope attached DOWN of head, UP of tail.
      { color:'blue', dir:'UP',    blocks:[{id:2,r:6,c:3},{id:3,r:6,c:4}] },  // head, tail
    ],
  },

  // ── Stage 2 ── 7×7, 1 color (red), 4 groups (threshold=8) ──────────
  // Minimum 4 taps, order-dependent:
  // Tap1 RedA↓ → merge AB (4<8) | Tap2 AB↓ → repos rows3-6 col3
  // Tap3 RedC→ → merge ABC (6<8) | Tap4 ABC→ → auto-merge D → DISSOLVE
  {
    rows: 7, cols: 7,
    badge: '思考+応用',
    badgeClass: 'think',
    colors: ['red'],
    colorThreshold: { red: 8 },
    chains: [
      // RedA: head(0,3) DOWN, tail(1,3) — top center, going down
      { color:'red', dir:'DOWN',  blocks:[{id:0,r:0,c:3},{id:1,r:1,c:3}] },
      // RedB: head(3,3) DOWN, tail(4,3) — center, going down (A slides into B)
      { color:'red', dir:'DOWN',  blocks:[{id:2,r:3,c:3},{id:3,r:4,c:3}] },
      // RedC: head(5,0) RIGHT, tail(5,1) — row5 left, going right (reaches AB after repos)
      { color:'red', dir:'RIGHT', blocks:[{id:4,r:5,c:0},{id:5,r:5,c:1}] },
      // RedD: head(3,6) LEFT, tail(3,5) — row3 right, going left (ABC slides into D)
      { color:'red', dir:'LEFT',  blocks:[{id:6,r:3,c:6},{id:7,r:3,c:5}] },
    ],
  },

  // ── Stage 3 ── 7×7, 1 color (green), 5 groups (threshold=10) ─────
  // Minimum 5 taps, order-dependent:
  // Tap1 A↓ → merge AB (4<10) | Tap2 C→ → merge ABC (6<10)
  // Tap3 D← → merge ABCD (8<10) | Tap4 E← → E to wall, not yet adj
  // Tap5 ABCD← → slides, (5,2) adj (6,2)=E → DISSOLVE (10=threshold)
  {
    rows: 7, cols: 7,
    badge: '5グループ統合',
    badgeClass: 'think',
    colors: ['green'],
    colorThreshold: { green: 10 },
    chains: [
      // GreenA: head(0,3) DOWN, tail(1,3)
      { color:'green', dir:'DOWN',  blocks:[{id:0,r:0,c:3},{id:1,r:1,c:3}] },
      // GreenB: head(4,3) DOWN, tail(5,3)
      { color:'green', dir:'DOWN',  blocks:[{id:2,r:4,c:3},{id:3,r:5,c:3}] },
      // GreenC: head(3,0) RIGHT, tail(3,1)
      { color:'green', dir:'RIGHT', blocks:[{id:4,r:3,c:0},{id:5,r:3,c:1}] },
      // GreenD: head(3,5) LEFT, tail(3,6)
      { color:'green', dir:'LEFT',  blocks:[{id:6,r:3,c:5},{id:7,r:3,c:6}] },
      // GreenE: head(6,5) LEFT, tail(6,6) — bottom right, goes to wall
      { color:'green', dir:'LEFT',  blocks:[{id:8,r:6,c:5},{id:9,r:6,c:6}] },
    ],
  },
];

// ============================================================
// GAME STATE
// ============================================================
let currentStage  = 0;
let chains        = [];
let blockMap      = {};
let clearedColors = new Set();
let history       = [];
let isAnimating   = false;
let cellSizePx    = 0;
let cellGapPx     = 0;
let nextBlockId   = 1000;

const phoneEl       = document.getElementById('phone');
const gridEl        = document.getElementById('grid');
const boardEl       = document.getElementById('board');
const ropeCanvas    = document.getElementById('rope-canvas');
const stageLabel    = document.getElementById('stage-label');
const stageBadge    = document.getElementById('stage-badge');
const colorStatus   = document.getElementById('color-status');
const modalEl       = document.getElementById('modal');
const modalNext     = document.getElementById('modal-next');
const allClearEl    = document.getElementById('all-clear');
const particleLayer = document.getElementById('particle-layer');

function getU() {
  return parseFloat(getComputedStyle(phoneEl).getPropertyValue('--u')) || 3.6;
}

// ============================================================
// INIT
// ============================================================
function initStage(idx) {
  currentStage  = idx;
  clearedColors = new Set();
  history       = [];
  isAnimating   = false;
  nextBlockId   = 1000;

  const s = STAGES[idx];

  chains = s.chains.map((ch) => ({
    color:   ch.color,
    dir:     ch.dir,
    cleared: false,
    blocks:  ch.blocks.map(b => ({...b})),
  }));

  rebuildBlockMap();
  renderBoard(s);
  updateHUD();
}

function rebuildBlockMap() {
  blockMap = {};
  chains.forEach((ch, ci) => {
    ch.blocks.forEach((b, bi) => {
      blockMap[b.id] = {chainIdx: ci, posInChain: bi};
    });
  });
}

// ============================================================
// RENDER
// ============================================================
function renderBoard(s) {
  const u   = getU();
  const pw  = parseFloat(getComputedStyle(phoneEl).width) || (u * 100);
  // For 7×7 grids use smaller cells (11%), for 5×5 use 14%
  const cellPct = s.cols >= 7 ? 11 : (s.cols <= 4 ? 17 : 14);
  cellSizePx = pw * cellPct / 100;
  cellGapPx  = u * 1.8;

  gridEl.style.gridTemplateColumns = `repeat(${s.cols}, ${cellSizePx}px)`;
  gridEl.style.gap = cellGapPx + 'px';
  gridEl.innerHTML = '';

  for (let r = 0; r < s.rows; r++) {
    for (let c = 0; c < s.cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r;
      cell.dataset.c = c;
      cell.style.width  = cellSizePx + 'px';
      cell.style.height = cellSizePx + 'px';
      gridEl.appendChild(cell);
    }
  }

  const totalW = s.cols * cellSizePx + (s.cols - 1) * cellGapPx;
  const totalH = s.rows * cellSizePx + (s.rows - 1) * cellGapPx;
  ropeCanvas.width  = totalW;
  ropeCanvas.height = totalH;
  ropeCanvas.style.width  = totalW + 'px';
  ropeCanvas.style.height = totalH + 'px';

  renderBlocksAndRopes();
}

function cellCenter(r, c) {
  const step = cellSizePx + cellGapPx;
  return {
    x: c * step + cellSizePx / 2,
    y: r * step + cellSizePx / 2,
  };
}

function cellTopLeft(r, c) {
  const step = cellSizePx + cellGapPx;
  return {
    x: c * step,
    y: r * step,
  };
}

function renderBlocksAndRopes() {
  const s = STAGES[currentStage];

  // Remove all block elements
  gridEl.querySelectorAll('.arrow-block').forEach(el => el.remove());

  const ctx = ropeCanvas.getContext('2d');
  ctx.clearRect(0, 0, ropeCanvas.width, ropeCanvas.height);

  chains.forEach(ch => {
    if (ch.cleared) return;
    if (ch.blocks.length < 1) return;

    const colHex = COLOR_MAP[ch.color];

    // Draw rope between consecutive blocks (rope = between tail and head)
    // For a 2-block chain: one rope segment between blocks[0](head) and blocks[1](tail)
    // For merged chains: rope connects ALL blocks in order
    for (let i = 0; i < ch.blocks.length - 1; i++) {
      const bA = ch.blocks[i];
      const bB = ch.blocks[i + 1];
      if (bA.r < 0 || bA.r >= s.rows || bA.c < 0 || bA.c >= s.cols) continue;
      if (bB.r < 0 || bB.r >= s.rows || bB.c < 0 || bB.c >= s.cols) continue;

      const pA = cellCenter(bA.r, bA.c);
      const pB = cellCenter(bB.r, bB.c);

      // Thick colored rope
      ctx.save();
      ctx.strokeStyle = colHex;
      ctx.lineWidth   = cellSizePx * 0.28;
      ctx.lineCap     = 'round';
      ctx.setLineDash([]);
      ctx.shadowColor = 'rgba(0,0,0,0.35)';
      ctx.shadowBlur  = 5;
      ctx.globalAlpha = 0.88;
      ctx.beginPath();
      ctx.moveTo(pA.x, pA.y);
      ctx.lineTo(pB.x, pB.y);
      ctx.stroke();

      // White highlight stripe (rope texture)
      ctx.shadowBlur  = 0;
      ctx.globalAlpha = 0.5;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth   = cellSizePx * 0.09;
      ctx.beginPath();
      ctx.moveTo(pA.x, pA.y);
      ctx.lineTo(pB.x, pB.y);
      ctx.stroke();
      ctx.restore();
    }

    // Knot dots at each INTERNAL block position (non-head, non-tail = merged rope nodes)
    // For 2-block chains: no internal nodes. For longer merged chains: middle blocks are rope.
    if (ch.blocks.length > 2) {
      for (let i = 1; i < ch.blocks.length - 1; i++) {
        const b = ch.blocks[i];
        if (b.r < 0 || b.r >= s.rows || b.c < 0 || b.c >= s.cols) continue;
        const p = cellCenter(b.r, b.c);
        ctx.save();
        ctx.beginPath();
        ctx.arc(p.x, p.y, cellSizePx * 0.13, 0, Math.PI * 2);
        ctx.fillStyle = darkenColor(colHex, 0.7);
        ctx.shadowColor = 'rgba(0,0,0,0.45)';
        ctx.shadowBlur  = 4;
        ctx.fill();
        // White center dot for knot detail
        ctx.beginPath();
        ctx.arc(p.x, p.y, cellSizePx * 0.05, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.shadowBlur = 0;
        ctx.fill();
        ctx.restore();
      }
    }
  });

  // Place block DOM elements AFTER drawing canvas (blocks are above canvas via z-index)
  // Only HEAD (blocks[0]) and TAIL (blocks[last]) get rendered as visible arrow-blocks.
  // Middle blocks (after merge) are represented as rope on canvas only.
  chains.forEach((ch, ci) => {
    if (ch.cleared) return;
    const len = ch.blocks.length;
    ch.blocks.forEach((b, bi) => {
      // Only render head (bi=0) and tail (bi=last) as visible blocks
      // Middle blocks in merged chains are pure rope nodes (canvas only)
      const isHead = bi === 0;
      const isTail = bi === len - 1;
      const isEndBlock = isHead || isTail;

      if (!isEndBlock) return; // middle merged blocks = rope only, no DOM block

      if (b.r < 0 || b.r >= s.rows || b.c < 0 || b.c >= s.cols) return;
      const s2 = STAGES[currentStage];
      const flatIdx = b.r * s2.cols + b.c;
      const cellEl  = gridEl.children[flatIdx];
      if (!cellEl) return;

      const div = document.createElement('div');
      div.className = `arrow-block color-${ch.color}`;
      div.dataset.blockId  = b.id;
      div.dataset.chainIdx = ci;
      div.dataset.isHead   = isHead ? '1' : '0';

      // Arrow always shows movement direction for head block
      // Tail block: arrow shows direction of rope pull (same as chain dir, since tail is dragged along)
      // Both show the same direction arrow (the chain's movement direction)
      div.innerHTML = `<svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">${arrowSVGPath(ch.dir)}</svg>`;
      div.addEventListener('pointerdown', onBlockDown);
      cellEl.appendChild(div);
    });
  });
}

function darkenColor(hex, factor) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.floor(r*factor)},${Math.floor(g*factor)},${Math.floor(b*factor)})`;
}

function arrowSVGPath(dir) {
  switch(dir) {
    case 'RIGHT': return '<path d="M5 11h10.586l-3.293-3.293 1.414-1.414L19.414 12l-5.707 5.707-1.414-1.414L15.586 13H5z"/>';
    case 'LEFT':  return '<path d="M19 11H8.414l3.293-3.293-1.414-1.414L4.586 12l5.707 5.707 1.414-1.414L8.414 13H19z"/>';
    case 'UP':    return '<path d="M13 19V8.414l3.293 3.293 1.414-1.414L12 4.586l-5.707 5.707 1.414 1.414L11 8.414V19z"/>';
    case 'DOWN':  return '<path d="M11 5v10.586L7.707 12.293l-1.414 1.414L12 19.414l5.707-5.707-1.414-1.414L13 15.586V5z"/>';
  }
  return '';
}

function updateHUD() {
  stageLabel.textContent = `Stage ${currentStage + 1}`;
  const s = STAGES[currentStage];
  stageBadge.textContent = s.badge;
  stageBadge.className   = s.badgeClass;
  stageBadge.id          = 'stage-badge';

  colorStatus.innerHTML = '';
  s.colors.forEach(c => {
    const dot = document.createElement('div');
    dot.className = 'cs-dot' + (clearedColors.has(c) ? ' done' : '');
    dot.style.background = COLOR_MAP[c];
    colorStatus.appendChild(dot);
  });
}

// ============================================================
// OCCUPANCY MAP
// ============================================================
function getOccupancy(skipChainIdx = -1) {
  const occ = {};
  chains.forEach((ch, ci) => {
    if (ch.cleared) return;
    if (ci === skipChainIdx) return;
    ch.blocks.forEach((b) => {
      if (b.r < 0 || b.c < 0) return;
      occ[`${b.r},${b.c}`] = {chainIdx: ci};
    });
  });
  return occ;
}

// ============================================================
// INPUT — tap any block in the chain to activate it
// ============================================================
function onBlockDown(e) {
  e.preventDefault();
  e.stopPropagation();
  if (isAnimating) return;
  const bid  = parseInt(e.currentTarget.dataset.blockId);
  const info = blockMap[bid];
  if (!info) return;
  const ch = chains[info.chainIdx];
  if (!ch || ch.cleared) return;
  attemptSlide(info.chainIdx);
}

// ============================================================
// SLIDE MECHANIC — ROPE-PULLED SNAKE TRAIN
//
// Movement rule:
//   HeadBlock slides N steps in chain.dir direction.
//   Rope moves to HeadBlock's old position.
//   TailBlock is pulled to rope's old position.
//   (For longer merged chains: each block follows the previous one's old position)
//
// This is the "snake train" or "rope pull" mechanic:
//   Head leads → rope travels through → tail trails behind.
// ============================================================
function attemptSlide(chainIdx) {
  const ch  = chains[chainIdx];
  const s   = STAGES[currentStage];
  const d   = DIRV[ch.dir];
  const occ = getOccupancy(chainIdx);

  let steps = 0;
  const maxSteps = s.rows + s.cols;

  for (let step = 1; step <= maxSteps; step++) {
    let canStep = true;
    for (const b of ch.blocks) {
      const nr = b.r + d.dr * step;
      const nc = b.c + d.dc * step;
      if (nr < 0 || nr >= s.rows || nc < 0 || nc >= s.cols) {
        canStep = false; break;
      }
      if (occ[`${nr},${nc}`]) {
        canStep = false; break;
      }
    }
    if (!canStep) { steps = step - 1; break; }
    steps = step;
    if (step === maxSteps) break;
  }

  if (steps === 0) {
    bumpChain(chainIdx, d);
    return;
  }

  saveHistory();
  isAnimating = true;

  // Animate snake train: head moves first, each subsequent block follows with stagger delay
  animateSnakeTrain(chainIdx, steps, d, () => {
    // Commit new block positions
    ch.blocks.forEach(b => {
      b.r += d.dr * steps;
      b.c += d.dc * steps;
    });
    isAnimating = false;
    renderBlocksAndRopes();
    updateHUD();

    // Check for same-color adjacent chains (merge trigger)
    checkSameColorMerge(chainIdx);
  });
}

// ============================================================
// SNAKE TRAIN ANIMATION
//
// Rope-pull mechanics visualization:
//   1. HeadBlock (blocks[0]) animates first, moving N steps in dir.
//   2. Each subsequent block animates with BLOCK_STAGGER_MS delay,
//      creating the visual of blocks being "dragged" by the rope.
//
// All blocks move the same total distance (steps * cellSize+gap),
// but staggered in time — giving the snake/train effect.
// ============================================================
function animateSnakeTrain(chainIdx, steps, d, onDone) {
  const ch   = chains[chainIdx];
  const s    = STAGES[currentStage];
  const step = cellSizePx + cellGapPx;

  const totalDx = d.dc * step * steps;
  const totalDy = d.dr * step * steps;

  // Duration scales with distance
  const baseDur = 180 + steps * 40; // ms

  // Collect only blocks that have corresponding DOM elements (head + tail only for merged chains)
  const animBlocks = [];
  const len = ch.blocks.length;
  ch.blocks.forEach((b, bi) => {
    const isHead = bi === 0;
    const isTail = bi === len - 1;
    if (!isHead && !isTail) return; // middle blocks = rope-only, no DOM element
    if (b.r < 0 || b.r >= s.rows || b.c < 0 || b.c >= s.cols) return;
    const flatIdx = b.r * s.cols + b.c;
    const cellEl  = gridEl.children[flatIdx];
    const el      = cellEl?.querySelector('.arrow-block');
    if (el) animBlocks.push({ el, bi });
  });

  let doneCount = 0;
  const total   = animBlocks.length;

  animBlocks.forEach(({ el, bi }) => {
    // Head block (bi=0): moves first (no delay)
    // Tail block (bi=last): delayed by BLOCK_STAGGER_MS * (len-1)
    // This creates the "rope pull" snake train visual
    const delay = bi * BLOCK_STAGGER_MS;

    el.style.transition = 'none';
    el.getBoundingClientRect(); // force reflow

    setTimeout(() => {
      // Update arrow to confirm direction during move
      const svg = el.querySelector('svg');
      if (svg) svg.innerHTML = arrowSVGPath(ch.dir);

      el.style.transition = `transform ${baseDur}ms cubic-bezier(0.22,1,0.36,1)`;
      el.style.transform  = `translate(${totalDx}px,${totalDy}px) scale(1.06)`;

      setTimeout(() => {
        el.style.transition = '';
        el.style.transform  = '';
        doneCount++;
        if (doneCount === total) onDone();
      }, baseDur);
    }, delay);
  });

  if (total === 0) onDone();
}

// ============================================================
// SAME-COLOR MERGE CHECK
// Called after a chain finishes moving.
// If same-color chains are adjacent, trigger merge/dissolve.
// ============================================================
function checkSameColorMerge(movedChainIdx) {
  const ch  = chains[movedChainIdx];
  if (ch.cleared) return;

  const sameColorAdj = findSameColorAdjacentChains(movedChainIdx);
  if (sameColorAdj.length === 0) return;

  const s = STAGES[currentStage];
  const threshold = (s.colorThreshold && s.colorThreshold[ch.color]) || 4;

  // Count total blocks that would be in the merged group
  let totalBlocks = ch.blocks.length;
  sameColorAdj.forEach(ci => { totalBlocks += chains[ci].blocks.length; });

  if (totalBlocks >= threshold) {
    // All blocks of this color are now together → merge animation + dissolve
    const toDissolve = [...new Set([movedChainIdx, ...sameColorAdj])];
    playMergeAndDissolve(toDissolve, ch.color);
  } else {
    // Not enough blocks yet → physically merge into longer chain
    // The colliding blocks become the rope middle nodes
    mergeChainsTogether(movedChainIdx, sameColorAdj);
  }
}

// Returns chainIndices that are adjacent (4-dir, dist=1) AND same color
function findSameColorAdjacentChains(chainIdx) {
  const ch     = chains[chainIdx];
  const result = [];

  chains.forEach((other, ci) => {
    if (ci === chainIdx || other.cleared) return;
    if (other.color !== ch.color) return;
    for (const bA of ch.blocks) {
      let found = false;
      for (const bB of other.blocks) {
        const dr = Math.abs(bA.r - bB.r);
        const dc = Math.abs(bA.c - bB.c);
        if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
          found = true; break;
        }
      }
      if (found) { result.push(ci); break; }
    }
  });

  return result;
}

// ============================================================
// MERGE CHAINS INTO LONGER CHAIN (threshold not yet reached)
//
// ROPE MECHANIC:
//   When two same-color blocks collide and combine:
//   - The colliding block-ends fuse into the rope segment.
//   - The outer (non-colliding) ends become the new Head and Tail.
//   - Visually: colliding blocks play "blockToRope" shrink animation,
//               then the extended rope is redrawn on canvas.
//
// For simplicity in this implementation:
//   - We absorb all other chains' blocks into the main chain's block list.
//   - The head stays at blocks[0], tail at blocks[last].
//   - Middle blocks (from the merge) act as rope nodes (no DOM element rendered).
// ============================================================
function mergeChainsTogether(movedChainIdx, otherIdxs) {
  const mainChain = chains[movedChainIdx];
  const colHex    = COLOR_MAP[mainChain.color];

  // Flash effect on all colliding blocks — shows "fusion into rope"
  const allInvolvedIdxs = [movedChainIdx, ...otherIdxs];
  allInvolvedIdxs.forEach(ci => {
    const ch = chains[ci];
    ch.blocks.forEach(b => {
      const s2 = STAGES[currentStage];
      const flatIdx = b.r * s2.cols + b.c;
      const cellEl  = gridEl.children[flatIdx];
      const el      = cellEl?.querySelector('.arrow-block');
      if (el) {
        el.style.transition = 'none';
        el.style.filter = `brightness(2.8) drop-shadow(0 0 10px ${colHex})`;
        setTimeout(() => {
          el.style.transition = 'filter 0.25s';
          el.style.filter = '';
          setTimeout(() => { el.style.transition = ''; }, 260);
        }, 120);
      }
    });
  });

  // Absorb all other chains' blocks into mainChain
  // New structure: [...mainChain.blocks, ...otherChain.blocks]
  // Head = mainChain.blocks[0], Tail = last block of the combined list
  otherIdxs.forEach(ci => {
    const other = chains[ci];
    other.blocks.forEach(b => {
      mainChain.blocks.push({...b, id: nextBlockId++});
    });
    other.cleared = true;
  });

  rebuildBlockMap();
  setTimeout(() => {
    renderBlocksAndRopes();
    updateHUD();
  }, 280);
}

// ============================================================
// MERGE + DISSOLVE ANIMATION (threshold reached)
//
// Visual sequence:
//   1. All blocks in merging chains flash bright (recognition moment)
//   2. Extended rope drawn across all blocks on canvas
//   3. "blockToRope" animation: all blocks shrink/squash into rope segments
//   4. Canvas rope fades out with particle burst → full dissolve
// ============================================================
function playMergeAndDissolve(chainIdxs, color) {
  const s      = STAGES[currentStage];
  const colHex = COLOR_MAP[color];

  isAnimating = true;

  // Step 1: Flash all blocks bright
  chainIdxs.forEach(ci => {
    const ch = chains[ci];
    ch.blocks.forEach(b => {
      if (b.r < 0 || b.r >= s.rows || b.c < 0 || b.c >= s.cols) return;
      const flatIdx = b.r * s.cols + b.c;
      const cellEl  = gridEl.children[flatIdx];
      const el      = cellEl?.querySelector('.arrow-block');
      if (el) {
        el.style.transition = 'none';
        el.style.filter = `brightness(3.5) saturate(2) drop-shadow(0 0 14px ${colHex})`;
      }
    });
  });

  // Step 2: Draw combined "long rope" showing all chains connected
  setTimeout(() => {
    drawMergedRope(chainIdxs, colHex);
  }, 100);

  // Step 3: Play block-to-rope animation (blocks transform into rope segments)
  setTimeout(() => {
    chainIdxs.forEach((ci) => {
      const ch = chains[ci];
      ch.blocks.forEach((b) => {
        if (b.r < 0 || b.r >= s.rows || b.c < 0 || b.c >= s.cols) return;
        const flatIdx = b.r * s.cols + b.c;
        const cellEl  = gridEl.children[flatIdx];
        const el      = cellEl?.querySelector('.arrow-block');
        if (el) {
          el.style.filter = '';
          el.classList.add('merging'); // blockToRope animation
        }
      });
    });
  }, 220);

  // Step 4: After animation, fully dissolve all chains + particle burst
  setTimeout(() => {
    chainIdxs.forEach(ci => {
      chains[ci].cleared = true;
      clearedColors.add(chains[ci].color);
    });

    // Particle burst at center of merged group
    const allBlocks = chainIdxs.flatMap(ci => chains[ci].blocks.filter(b =>
      b.r >= 0 && b.r < s.rows && b.c >= 0 && b.c < s.cols
    ));
    if (allBlocks.length > 0) {
      const boardRect = boardEl.getBoundingClientRect();
      const phoneRect = phoneEl.getBoundingClientRect();
      const boardPad  = parseFloat(getComputedStyle(boardEl).paddingLeft) || (getU() * 3.5);
      const bx = boardRect.left - phoneRect.left + boardPad;
      const by = boardRect.top  - phoneRect.top  + boardPad;
      const stepPx = cellSizePx + cellGapPx;

      const avgR = allBlocks.reduce((sum,b) => sum+b.r, 0) / allBlocks.length;
      const avgC = allBlocks.reduce((sum,b) => sum+b.c, 0) / allBlocks.length;
      spawnBurst(bx + avgC*stepPx + cellSizePx/2, by + avgR*stepPx + cellSizePx/2, colHex, 52);
    }

    isAnimating = false;
    renderBlocksAndRopes();
    updateHUD();
    checkStageClear();
  }, 740);
}

// Draw extended rope connecting all blocks in the merging chains
function drawMergedRope(chainIdxs, colHex) {
  const s   = STAGES[currentStage];
  const ctx = ropeCanvas.getContext('2d');

  const allBlocks = chainIdxs.flatMap(ci =>
    chains[ci].blocks.filter(b => b.r >= 0 && b.r < s.rows && b.c >= 0 && b.c < s.cols)
  );
  if (allBlocks.length < 2) return;

  allBlocks.sort((a, b) => a.r !== b.r ? a.r - b.r : a.c - b.c);

  ctx.save();
  ctx.strokeStyle = colHex;
  ctx.lineWidth   = cellSizePx * 0.38;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.globalAlpha = 0.92;
  ctx.shadowColor = colHex;
  ctx.shadowBlur  = 14;

  ctx.beginPath();
  const first = cellCenter(allBlocks[0].r, allBlocks[0].c);
  ctx.moveTo(first.x, first.y);
  for (let i = 1; i < allBlocks.length; i++) {
    const p = cellCenter(allBlocks[i].r, allBlocks[i].c);
    ctx.lineTo(p.x, p.y);
  }
  ctx.stroke();

  // White highlight stripe
  ctx.globalAlpha = 0.55;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth   = cellSizePx * 0.11;
  ctx.shadowBlur  = 0;
  ctx.beginPath();
  ctx.moveTo(first.x, first.y);
  for (let i = 1; i < allBlocks.length; i++) {
    const p = cellCenter(allBlocks[i].r, allBlocks[i].c);
    ctx.lineTo(p.x, p.y);
  }
  ctx.stroke();
  ctx.restore();
}

// ============================================================
// BUMP (can't move — wall or blocked)
// ============================================================
function bumpChain(chainIdx, d) {
  const ch  = chains[chainIdx];
  const s   = STAGES[currentStage];
  const bumpX = d.dc * cellSizePx * 0.13;
  const bumpY = d.dr * cellSizePx * 0.13;

  ch.blocks.forEach(b => {
    if (b.r < 0 || b.r >= s.rows || b.c < 0 || b.c >= s.cols) return;
    const flatIdx = b.r * s.cols + b.c;
    const cellEl  = gridEl.children[flatIdx];
    const el      = cellEl?.querySelector('.arrow-block');
    if (!el) return;
    el.style.transition = 'transform 0.12s ease-out';
    el.style.transform  = `translate(${bumpX}px,${bumpY}px)`;
    setTimeout(() => {
      el.style.transition = 'transform 0.12s ease-out';
      el.style.transform  = '';
    }, 130);
  });
}

// ============================================================
// PARTICLES
// ============================================================
function spawnBurst(cx, cy, color, count) {
  const u = getU();
  for (let ring = 0; ring < 2; ring++) {
    const div  = document.createElement('div');
    div.className = 'burst-ring';
    const size = u * (14 + ring * 16);
    div.style.cssText = `left:${cx-size/2}px;top:${cy-size/2}px;width:${size}px;height:${size}px;border-color:${color};animation:ringExpand${ring} 0.5s ease-out forwards;`;
    particleLayer.appendChild(div);
    setTimeout(() => div.remove(), 600);
  }
  for (let i = 0; i < count; i++) {
    const div   = document.createElement('div');
    div.className = 'particle';
    const angle = (Math.PI * 2 * i / count) + Math.random() * 0.3;
    const speed = u * (7 + Math.random() * 18);
    const size  = u * (1.5 + Math.random() * 3.5);
    div.style.cssText = `left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;background:${Math.random()<0.5?color:'#ffffff'};box-shadow:0 0 ${size}px ${color};`;
    particleLayer.appendChild(div);
    const tx2 = Math.cos(angle) * speed;
    const ty2 = Math.sin(angle) * speed;
    div.animate([
      {transform:`translate(-50%,-50%) scale(1)`,    opacity:1},
      {transform:`translate(calc(-50% + ${tx2*3}px), calc(-50% + ${ty2*3}px)) scale(0)`, opacity:0}
    ], {duration: 700 + Math.random() * 400, easing: 'cubic-bezier(0,0.6,1,1)', fill:'forwards'});
    setTimeout(() => div.remove(), 1200);
  }
}

const styleSheet = document.createElement('style');
styleSheet.textContent = `
  @keyframes ringExpand0{from{transform:scale(0);opacity:1;}to{transform:scale(2.5);opacity:0;}}
  @keyframes ringExpand1{from{transform:scale(0);opacity:0.7;}to{transform:scale(3.5);opacity:0;}}
`;
document.head.appendChild(styleSheet);

// ============================================================
// STAGE CLEAR
// ============================================================
function checkStageClear() {
  const s = STAGES[currentStage];
  if (s.colors.every(c => clearedColors.has(c))) {
    spawnConfetti();
    if (currentStage + 1 < STAGES.length) {
      setTimeout(() => { modalEl.classList.add('show'); }, 600);
    } else {
      setTimeout(() => { allClearEl.classList.add('show'); }, 800);
    }
  }
}

function spawnConfetti() {
  const u    = getU();
  const cols = ['#FF4444','#3A8EFF','#FFD000','#44CC44','#FF88CC','#88FFAA'];
  for (let i = 0; i < 60; i++) {
    const div = document.createElement('div');
    div.className = 'confetti-piece';
    div.style.left       = Math.random() * 100 + '%';
    div.style.top        = '-5%';
    div.style.background = cols[i % cols.length];
    div.style.transform  = `rotate(${Math.random() * 360}deg)`;
    phoneEl.appendChild(div);
    div.animate([
      {transform:`translateY(0) rotate(0deg)`,                                opacity:1},
      {transform:`translateY(${u*85}px) rotate(${360+Math.random()*360}deg)`, opacity:0}
    ], {
      duration: 1200 + Math.random() * 800,
      delay:    Math.random() * 400,
      easing:   'cubic-bezier(0.25,0.46,0.45,0.94)',
      fill:     'forwards'
    });
    setTimeout(() => div.remove(), 2200);
  }
}

// ============================================================
// UNDO
// ============================================================
function saveHistory() {
  history.push({
    chains:        JSON.parse(JSON.stringify(chains)),
    blockMap:      JSON.parse(JSON.stringify(blockMap)),
    clearedColors: new Set(clearedColors),
    nextBlockId,
  });
  if (history.length > 20) history.shift();
}

document.getElementById('btn-undo').addEventListener('pointerdown', e => {
  e.preventDefault();
  if (isAnimating) return;
  if (history.length === 0) return;
  const snap    = history.pop();
  chains        = snap.chains;
  blockMap      = snap.blockMap;
  clearedColors = snap.clearedColors;
  nextBlockId   = snap.nextBlockId;
  renderBlocksAndRopes();
  updateHUD();
});

// ============================================================
// HINT — highlights a chain that can move
// ============================================================
document.getElementById('btn-hint').addEventListener('pointerdown', e => {
  e.preventDefault();
  if (isAnimating) return;
  const s   = STAGES[currentStage];
  const occ = getOccupancy();

  for (let ci = 0; ci < chains.length; ci++) {
    const ch = chains[ci];
    if (ch.cleared) continue;
    const d = DIRV[ch.dir];
    let canMove = true;
    for (const b of ch.blocks) {
      const nr = b.r + d.dr;
      const nc = b.c + d.dc;
      if (nr < 0 || nr >= s.rows || nc < 0 || nc >= s.cols) { canMove = false; break; }
      if (occ[`${nr},${nc}`]) { canMove = false; break; }
    }
    if (!canMove) continue;

    // Highlight the head block (blocks[0]) of the movable chain
    ch.blocks.forEach((b, bi) => {
      if (b.r < 0 || b.r >= s.rows || b.c < 0 || b.c >= s.cols) return;
      const flatIdx = b.r * s.cols + b.c;
      const cellEl  = gridEl.children[flatIdx];
      const el      = cellEl?.querySelector('.arrow-block');
      if (el) {
        el.animate([
          {filter:'brightness(1)'},
          {filter:'brightness(2.8) drop-shadow(0 0 12px white)'},
          {filter:'brightness(1)'}
        ], {duration:600, iterations:3});
      }
    });
    break;
  }
});

// ============================================================
// NEXT STAGE
// ============================================================
modalNext.addEventListener('pointerdown', e => {
  e.preventDefault();
  modalEl.classList.remove('show');
  particleLayer.innerHTML = '';
  initStage(currentStage + 1);
});

// ============================================================
// RESIZE
// ============================================================
let resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (!isAnimating) initStage(currentStage);
  }, 200);
});

// ============================================================
// START
// ============================================================
initStage(0);
</script>
