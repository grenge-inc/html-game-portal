<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>チャージ一閃</title>
<style>
  :root {
    --phone-aspect: 9 / 19.5;
    --bg-deep: #02030a;
    --bg-mid: #0a1430;
    --bg-panel: #06081a;
    --bg-card: #0b1228;
    --line: #1a2848;
    --cyan: #6ff;
    --text-main: #eaf3ff;
    --text-sub: #cdddef;
    --text-dim: #7a92b5;
    --warn: #ffb86c;
    --hp-pink: #ff8aa0;
    --core-1: #ffd76b;
    --core-2: #ff7a3a;
    --core-3: #ff5d8a;
    --p-r: #ff6b8a;
    --p-g: #6ff0a8;
    --p-b: #6fb8ff;
    --p-y: #ffd76b;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html, body {
    width:100%; height:100%;
    overflow:hidden;
    background:var(--bg-deep);
    color:var(--text-main);
    font-family:'Helvetica Neue', system-ui, sans-serif;
    user-select:none; -webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
  }
  body { position:relative; display:flex; align-items:center; justify-content:center; }
  #phone {
    position:relative; overflow:hidden;
    width:  min(100vw, calc(100vh * 9 / 19.5));
    height: min(100vh, calc(100vw * 19.5 / 9));
    --pw:   min(100vw, calc(100vh * 9 / 19.5));
    --ph:   min(100vh, calc(100vw * 19.5 / 9));
    --u:    calc(var(--pw) / 100);
    --uh:   calc(var(--ph) / 100);
    background:
      radial-gradient(circle at 50% 34%, rgba(255,122,58,0.10) 0%, rgba(10,20,48,0) 38%),
      radial-gradient(circle at 50% 30%, var(--bg-mid) 0%, var(--bg-deep) 72%);
  }
  /* ambient environment layer */
  #env {
    position:absolute; inset:0; z-index:0; pointer-events:none;
    background-image:
      linear-gradient(rgba(111,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(111,255,255,0.04) 1px, transparent 1px);
    background-size: calc(var(--u)*11) calc(var(--u)*11), calc(var(--u)*11) calc(var(--u)*11);
    mask-image: radial-gradient(circle at 50% 50%, #000 30%, transparent 78%);
    -webkit-mask-image: radial-gradient(circle at 50% 50%, #000 30%, transparent 78%);
    opacity:.6;
  }

  /* ===== HUD ===== */
  #hud {
    position:absolute; top:0; left:0; width:100%;
    padding:calc(var(--u)*3) calc(var(--u)*4) 0;
    display:flex; justify-content:space-between; align-items:flex-start;
    z-index:6;
  }
  .hud-box { display:flex; flex-direction:column; gap:calc(var(--u)*0.6); }
  .hud-label { font-size:calc(var(--u)*2.6); letter-spacing:.12em; color:var(--text-dim); text-transform:uppercase; }
  .hud-val { font-size:calc(var(--u)*5); font-weight:700; font-variant-numeric:tabular-nums; }
  #stageLabel { color:var(--cyan); }
  #scoreVal { color:var(--core-1); }
  .hud-right { text-align:right; }

  /* ===== gauge ===== */
  #gaugeWrap {
    position:absolute; top:calc(var(--u)*14); left:calc(var(--u)*8); width:calc(var(--u)*84);
    z-index:6;
  }
  #gaugeTrack {
    position:relative; height:calc(var(--u)*4.2);
    background:var(--bg-card); border:1px solid var(--line);
    border-radius:calc(var(--u)*2.1); overflow:hidden;
  }
  #gaugeFill {
    position:absolute; top:0; left:0; height:100%; width:0%;
    background:linear-gradient(90deg, var(--core-3), var(--core-2) 50%, var(--core-1));
    box-shadow:0 0 calc(var(--u)*3) var(--core-2);
    transition:width .12s ease-out;
  }
  #gaugeText {
    position:absolute; width:100%; top:50%; left:0; transform:translateY(-50%);
    text-align:center; font-size:calc(var(--u)*2.6); font-weight:700;
    color:var(--text-main); text-shadow:0 0 calc(var(--u)*1) #000;
    font-variant-numeric:tabular-nums; pointer-events:none;
  }

  /* ===== board ===== */
  #boardWrap {
    position:absolute; left:50%; top:calc(var(--u)*22);
    transform:translateX(-50%);
    width:calc(var(--u)*88); height:calc(var(--u)*88);
    z-index:3;
    border:1px solid var(--line);
    border-radius:calc(var(--u)*3);
    background:
      radial-gradient(circle at 50% 50%, rgba(255,122,58,0.06), rgba(6,8,26,0.0) 70%),
      var(--bg-panel);
    box-shadow:
      0 0 calc(var(--u)*6) rgba(255,122,58,0.18),
      inset 0 0 calc(var(--u)*8) rgba(2,3,10,0.85);
    overflow:hidden;
  }
  #board { position:absolute; width:100%; height:100%; display:block; }

  /* ===== diagonal hint badge ===== */
  #diagBadge {
    position:absolute; top:calc(var(--u)*20); right:calc(var(--u)*4);
    font-size:calc(var(--u)*2.4); color:var(--cyan);
    background:rgba(0,0,0,0.5); border:1px solid var(--cyan);
    border-radius:calc(var(--u)*2); padding:calc(var(--u)*0.8) calc(var(--u)*2);
    z-index:6; pointer-events:none;
    opacity:0; transition:opacity .3s;
  }
  #diagBadge.show { opacity:1; }

  /* ===== bottom hint ===== */
  #hint {
    position:absolute; bottom:calc(var(--u)*5); left:0; width:100%;
    text-align:center; font-size:calc(var(--u)*3); color:var(--text-sub);
    padding:0 calc(var(--u)*6); line-height:1.5; z-index:6;
  }
  #moveWrap {
    position:absolute; bottom:calc(var(--u)*13); left:0; width:100%;
    text-align:center; z-index:6;
  }
  #moveVal { font-size:calc(var(--u)*4); font-weight:700; color:var(--text-main); font-variant-numeric:tabular-nums; }
  #moveWrap .hud-label { display:inline; }

  /* ===== modal ===== */
  #modal {
    position:absolute; inset:0; z-index:20;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(2,3,10,.82); backdrop-filter:blur(2px);
    text-align:center; padding:0 calc(var(--u)*8);
  }
  #modal.hidden { display:none; }
  #modalTitle {
    font-size:calc(var(--u)*10); font-weight:800; letter-spacing:.04em;
    background:linear-gradient(90deg, var(--core-1), var(--core-3));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  #modalSub { margin-top:calc(var(--u)*2); font-size:calc(var(--u)*3.4); color:var(--text-sub); line-height:1.6; }
  #modalBtn {
    margin-top:calc(var(--u)*6); padding:calc(var(--u)*3) calc(var(--u)*10);
    font-size:calc(var(--u)*4); font-weight:700; color:var(--bg-deep);
    background:linear-gradient(90deg, var(--core-2), var(--core-1));
    border:none; border-radius:calc(var(--u)*6); cursor:pointer;
    box-shadow:0 0 calc(var(--u)*4) var(--core-2);
  }
  #modalBtn:active { transform:scale(.96); }
  .badge {
    display:inline-block; margin-top:calc(var(--u)*4);
    padding:calc(var(--u)*1.4) calc(var(--u)*4);
    font-size:calc(var(--u)*2.8); letter-spacing:.1em;
    border:1px solid var(--cyan); border-radius:calc(var(--u)*4); color:var(--cyan);
  }

  /* ===== flash ===== */
  #flash {
    position:absolute; inset:0; z-index:15; pointer-events:none;
    background:radial-gradient(circle at 50% 50%, #fff 0%, rgba(255,255,255,0) 60%);
    opacity:0;
  }
  #flash.fire { animation:flashAnim .5s ease-out; }
  @keyframes flashAnim { 0%{opacity:0;} 12%{opacity:.95;} 100%{opacity:0;} }
</style>
</head>
<body>
  <div id="phone">
    <div id="env"></div>
    <div id="hud">
      <div class="hud-box">
        <span class="hud-label">Stage</span>
        <span class="hud-val" id="stageLabel">1</span>
      </div>
      <div class="hud-box hud-right">
        <span class="hud-label">Cleared / Goal</span>
        <span class="hud-val" id="scoreVal">0 / 0</span>
      </div>
    </div>

    <div id="gaugeWrap">
      <div id="gaugeTrack">
        <div id="gaugeFill"></div>
        <div id="gaugeText">CHARGE 0</div>
      </div>
    </div>

    <div id="diagBadge" id="diagBadge">↗ 斜め接続ON</div>

    <div id="boardWrap">
      <canvas id="board"></canvas>
    </div>

    <div id="moveWrap">
      <span class="hud-label">Moves left&nbsp;</span><span id="moveVal">0</span>
    </div>
    <div id="hint">同色ピースをなぞってコアへ充填。コアをクリックで一閃。</div>

    <div id="flash"></div>

    <div id="modal">
      <div id="modalTitle">チャージ一閃</div>
      <div id="modalSub">同色をなぞって溜め、コアで放つ。<br>溜めるほど爆発は巨大化する。</div>
      <span class="badge" id="modalBadge">St1 操作理解＋コア体験</span>
      <button id="modalBtn">START</button>
    </div>
  </div>

  <script>
  "use strict";
  const COLORS = ["r","g","b","y"];
  const COLMAP = { r:"--p-r", g:"--p-g", b:"--p-b", y:"--p-y" };
  const cssVar = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();

  // ----- Stage definitions -----
  // grid[row] strings, '.'=empty, 'C'=core (exactly one), color letters else.
  // diagOnly: if true, this stage requires diagonal connections to solve optimally (hint shown)
  const STAGES = [
    {
      // St1: 上下左右のみで解ける。操作理解。6x6。赤が中央コア周囲に密集。
      name:"St1", goal:10, moves:3, mult:1.6, fullCharge:8, diagOnly:false,
      badge:"St1 操作理解＋コア体験",
      grid:[
        "r b g r b y",
        "g r r b g r",
        "b r C r g b",
        "y g r r b y",
        "r b g y r g",
        "g y b r g b",
      ],
    },
    {
      // St2: 斜めを初めて使う。コア周囲に斜め方向でしかつながらない青の塊を配置。6x6。
      name:"St2", goal:12, moves:4, mult:1.6, fullCharge:10, diagOnly:true,
      badge:"St2 斜め接続チャレンジ",
      grid:[
        "g b g r g b",
        "b g b g b g",
        "g b C b g b",
        "b g b g b g",
        "g r g b g r",
        "b g b g b g",
      ],
    },
    {
      // St3: 斜め＋連鎖応用。8x8。緑と赤が斜め経路で散在。複数回のなぞりを組み合わせる。
      name:"St3", goal:22, moves:6, mult:1.55, fullCharge:14, diagOnly:true,
      badge:"St3 斜め連鎖応用",
      grid:[
        "b y g b y g b y",
        "g b y g b y g b",
        "y g b b y g y g",
        "b y g C g y b y",
        "g b y g g b g b",
        "y g b y b y y g",
        "b y g b g b b y",
        "g b y g y g g b",
      ],
    },
    {
      // St4: 中級。7x7。斜めを駆使した複数連鎖。赤が斜め方向に多く伸びる。
      name:"St4", goal:28, moves:7, mult:1.5, fullCharge:16, diagOnly:true,
      badge:"St4 斜め多重連鎖",
      grid:[
        "r b r g r b r",
        "b r b r b r b",
        "r b r b r b r",
        "g r b C b r g",
        "r b r b r b r",
        "b r b r b r b",
        "r g r b r g r",
      ],
    },
    {
      // St5: 上級。8x8。全方向を駆使した挑戦的盤面。長い連鎖経路をなぞる。
      name:"St5", goal:38, moves:8, mult:1.45, fullCharge:18, diagOnly:true,
      badge:"St5 全方向マスター",
      grid:[
        "r b g r b g r b",
        "b g r b g r b g",
        "g r b g r b g r",
        "r b g C g b r b",
        "b g r b g r b g",
        "g r b g r b g r",
        "r b g r b g r b",
        "b g r b g r b g",
      ],
    },
  ];

  // runtime
  let stageIdx = 0;
  let cells = [];      // {r,c,color} or core
  let rows=0, cols=0;
  let cell = 0;        // pixel size of a cell
  let core = {r:0,c:0};
  let charge = 0;
  let movesLeft = 0;
  let cleared = 0;
  let goal = 0;
  let mult = 1, fullCharge = 1;
  let dragging = false;
  let path = [];       // list of {r,c}
  let explosions = []; // active explosion anims
  let pulse = 0;

  const canvas = document.getElementById("board");
  const ctx = canvas.getContext("2d");
  const gaugeFill = document.getElementById("gaugeFill");
  const gaugeText = document.getElementById("gaugeText");
  const scoreVal = document.getElementById("scoreVal");
  const stageLabel = document.getElementById("stageLabel");
  const moveVal = document.getElementById("moveVal");
  const modal = document.getElementById("modal");
  const modalTitle = document.getElementById("modalTitle");
  const modalSub = document.getElementById("modalSub");
  const modalBtn = document.getElementById("modalBtn");
  const modalBadge = document.getElementById("modalBadge");
  const flash = document.getElementById("flash");
  const diagBadge = document.getElementById("diagBadge");

  function fitCanvas(){
    const wrap = document.getElementById("boardWrap");
    const rect = wrap.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    cell = rect.width / cols;
  }

  function loadStage(i){
    const s = STAGES[i];
    rows = s.grid.length; cols = s.grid[0].split(/\s+/).length;
    cells = [];
    for(let r=0;r<rows;r++){
      const toks = s.grid[r].trim().split(/\s+/);
      const rowArr=[];
      for(let c=0;c<cols;c++){
        const t = toks[c];
        if(t==="C"){ core={r,c}; rowArr.push({core:true}); }
        else if(t===".") rowArr.push(null);
        else rowArr.push({color:t});
      }
      cells.push(rowArr);
    }
    charge=0; movesLeft=s.moves; cleared=0; goal=s.goal;
    mult=s.mult; fullCharge=s.fullCharge;
    // show diagonal badge for stages that use diagonal connections
    if(s.diagOnly){
      diagBadge.classList.add("show");
      setTimeout(()=>diagBadge.classList.remove("show"), 2500);
    }
    fitCanvas();
    updateHUD();
    draw();
  }

  function updateHUD(){
    stageLabel.textContent = (stageIdx+1);
    scoreVal.textContent = cleared + " / " + goal;
    moveVal.textContent = movesLeft;
    const pct = Math.min(100, charge/fullCharge*100);
    gaugeFill.style.width = pct + "%";
    gaugeText.textContent = "CHARGE " + Math.floor(charge) + (charge>=fullCharge ? " ⚡FULL" : "");
  }

  // ----- geometry -----
  function cellCenter(r,c){ return { x:(c+0.5)*cell, y:(r+0.5)*cell }; }
  function ptToCell(x,y){
    const c = Math.floor(x/cell), r = Math.floor(y/cell);
    if(r<0||c<0||r>=rows||c>=cols) return null;
    return {r,c};
  }
  // 8-directional adjacency (includes diagonals)
  function adjacent8(a,b){ return Math.abs(a.r-b.r)<=1 && Math.abs(a.c-b.c)<=1 && !(a.r===b.r&&a.c===b.c); }

  // ----- drawing -----
  function draw(){
    const px = cell*cols;
    const py = cell*rows;
    ctx.clearRect(0,0,px,py);
    // grid backdrop
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
      ctx.fillStyle = "rgba(255,255,255,0.02)";
      ctx.fillRect(c*cell+1, r*cell+1, cell-2, cell-2);
    }
    // diagonal connection lines in path (drawn before pieces)
    if(path.length>1){
      for(let i=1;i<path.length;i++){
        const a=path[i-1], b=path[i];
        const isDiag = Math.abs(a.r-b.r)===1 && Math.abs(a.c-b.c)===1;
        if(isDiag){
          const pa=cellCenter(a.r,a.c), pb=cellCenter(b.r,b.c);
          ctx.save();
          ctx.strokeStyle = "rgba(111,255,255,0.65)";
          ctx.lineWidth = cell*0.13; ctx.lineCap="round";
          ctx.setLineDash([cell*0.15, cell*0.1]);
          ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.restore();
        }
      }
    }
    // pieces
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
      const cl = cells[r][c];
      if(!cl) continue;
      const {x,y}=cellCenter(r,c);
      if(cl.core){ drawCore(x,y); continue; }
      const inPath = path.some(p=>p.r===r&&p.c===c);
      drawPiece(x,y, cl.color, inPath);
    }
    // path links (orthogonal segments)
    if(path.length>1){
      ctx.strokeStyle = "rgba(255,255,255,0.75)";
      ctx.lineWidth = cell*0.16; ctx.lineCap="round"; ctx.lineJoin="round";
      ctx.beginPath();
      const first=cellCenter(path[0].r,path[0].c); ctx.moveTo(first.x,first.y);
      for(let i=1;i<path.length;i++){ const p=cellCenter(path[i].r,path[i].c); ctx.lineTo(p.x,p.y); }
      ctx.stroke();
    }
    // explosions
    for(const e of explosions){
      const grad = ctx.createRadialGradient(e.x,e.y,0, e.x,e.y, e.r);
      grad.addColorStop(0, "rgba(255,255,255,"+ (0.9*e.a) +")");
      grad.addColorStop(0.4, "rgba(255,150,60,"+ (0.7*e.a) +")");
      grad.addColorStop(1, "rgba(255,60,120,0)");
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,7); ctx.fill();
    }
  }

  function drawPiece(x,y,color,hi){
    const rad = cell*0.38;
    const col = cssVar(COLMAP[color]);
    ctx.save();
    if(hi){ ctx.shadowColor=col; ctx.shadowBlur=cell*0.5; }
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(x,y,rad,0,7); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.35)";
    ctx.beginPath(); ctx.arc(x-rad*0.3,y-rad*0.3,rad*0.32,0,7); ctx.fill();
    ctx.restore();
  }

  function drawCore(x,y){
    const base = cell*0.42;
    const grow = base * (1 + Math.min(1,charge/fullCharge)*0.55 + Math.sin(pulse)*0.04);
    ctx.save();
    const g = ctx.createRadialGradient(x,y,0,x,y,grow);
    g.addColorStop(0, cssVar("--core-1"));
    g.addColorStop(0.5, cssVar("--core-2"));
    g.addColorStop(1, cssVar("--core-3"));
    ctx.shadowColor = cssVar("--core-2");
    ctx.shadowBlur = cell*(0.5 + Math.min(1,charge/fullCharge)*0.9);
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x,y,grow,0,7); ctx.fill();
    // ring
    ctx.shadowBlur=0;
    ctx.strokeStyle="rgba(255,255,255,0.85)"; ctx.lineWidth=cell*0.04;
    ctx.beginPath(); ctx.arc(x,y,grow*0.66,0,7); ctx.stroke();
    ctx.restore();
  }

  // ----- input -----
  function localPt(ev){
    const rect = canvas.getBoundingClientRect();
    const cx = ev.clientX - rect.left;
    const cy = ev.clientY - rect.top;
    return {x:cx, y:cy};
  }

  function onDown(ev){
    if(!modal.classList.contains("hidden")) return;
    if(explosions.length) return;
    ev.preventDefault();
    const p = localPt(ev);
    const hit = ptToCell(p.x,p.y);
    if(!hit) return;
    const cl = cells[hit.r][hit.c];
    if(cl && cl.core){ detonate(); return; }
    if(!cl) return;
    dragging = true;
    path = [hit];
    draw();
  }

  function onMove(ev){
    if(!dragging) return;
    ev.preventDefault();
    const p = localPt(ev);
    const hit = ptToCell(p.x,p.y);
    if(!hit) return;
    const cl = cells[hit.r][hit.c];
    if(!cl || cl.core) return;
    const last = path[path.length-1];
    // backtrack
    if(path.length>=2 && path[path.length-2].r===hit.r && path[path.length-2].c===hit.c){
      path.pop(); draw(); return;
    }
    if(path.some(q=>q.r===hit.r&&q.c===hit.c)) return;
    const firstColor = cells[path[0].r][path[0].c].color;
    if(cl.color!==firstColor) return;
    // 8-directional adjacency check (includes diagonals)
    if(!adjacent8(last,hit)) return;
    path.push(hit);
    // show diagonal badge when user actually makes a diagonal connection
    if(Math.abs(last.r-hit.r)===1 && Math.abs(last.c-hit.c)===1){
      diagBadge.classList.add("show");
      setTimeout(()=>diagBadge.classList.remove("show"), 1200);
    }
    draw();
  }

  function onUp(ev){
    if(!dragging) return;
    dragging=false;
    if(path.length>=2){
      // commit charge: remove pieces, add fuel
      const n = path.length;
      const add = n * mult;
      charge += add;
      for(const q of path){ cells[q.r][q.c]=null; }
      applyGravity();
      pulse=0;
    }
    path=[];
    updateHUD();
    draw();
  }

  function applyGravity(){
    for(let c=0;c<cols;c++){
      let write = rows-1;
      for(let r=rows-1;r>=0;r--){
        const cl = cells[r][c];
        if(cl && cl.core){ write = r-1; continue; }
        if(cl){ if(write!==r){ cells[write][c]=cl; cells[r][c]=null; } write--; }
      }
      // refill top with deterministic-ish colors
      for(let r=write;r>=0;r--){
        if(cells[r][c] && cells[r][c].core) continue;
        cells[r][c] = {color: COLORS[(r*31 + c*17 + stageIdx*7) % 4]};
      }
    }
  }

  // ----- detonation -----
  function detonate(){
    if(charge<=0) return;
    if(movesLeft<=0) return;
    movesLeft--;
    const cc = cellCenter(core.r,core.c);
    const radCells = 1.1 + Math.pow(charge/fullCharge, 0.9) * (Math.max(rows,cols)*0.62);
    const radPx = radCells*cell;
    let count=0;
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
      const cl=cells[r][c];
      if(!cl||cl.core) continue;
      const ctr=cellCenter(r,c);
      const d=Math.hypot(ctr.x-cc.x, ctr.y-cc.y);
      if(d<=radPx){ cells[r][c]=null; count++; }
    }
    cleared += count;
    charge = 0;
    flash.classList.remove("fire"); void flash.offsetWidth; flash.classList.add("fire");
    explosions.push({x:cc.x,y:cc.y,r:cell*0.4,max:radPx,a:1,t:0});
    setTimeout(()=>{ applyGravity(); updateHUD(); draw(); checkEnd(); }, 520);
    updateHUD();
  }

  function checkEnd(){
    if(cleared>=goal){ win(); return; }
    if(movesLeft<=0 && charge<=0){ lose("手数切れ"); return; }
    if(movesLeft<=0 && charge>0){ /* still can detonate once */ }
  }

  function getNextBadge(){
    if(stageIdx+1 < STAGES.length) return STAGES[stageIdx+1].badge;
    return "Complete";
  }

  function win(){
    if(stageIdx < STAGES.length-1){
      showModal("STAGE CLEAR",
        "目標達成！ 一閃で "+cleared+" 個を一掃。<br>次のステージへ。",
        "NEXT", getNextBadge(),
        ()=>{ stageIdx++; loadStage(stageIdx); hideModal(); });
    } else {
      showModal("ALL CLEAR", "全5ステージ制覇！<br>チャージ一閃をマスターした。",
        "REPLAY", "Complete", ()=>{ stageIdx=0; loadStage(0); hideModal(); });
    }
  }
  function lose(reason){
    showModal("GAME OVER", reason+"。<br>もう一度溜め方を見直そう。",
      "RETRY", STAGES[stageIdx].badge+" 再挑戦", ()=>{ loadStage(stageIdx); hideModal(); });
  }

  function showModal(title,sub,btn,badge,onClick){
    modalTitle.textContent=title; modalSub.innerHTML=sub;
    modalBtn.textContent=btn; modalBadge.textContent=badge;
    modal.classList.remove("hidden");
    modalBtn.onclick=onClick;
  }
  function hideModal(){ modal.classList.add("hidden"); }

  // ----- loop -----
  function tick(){
    pulse += 0.08;
    let active=false;
    for(const e of explosions){
      e.t+=1; e.r += (e.max-e.r)*0.28; e.a *= 0.9;
      if(e.a>0.04) active=true;
    }
    explosions = explosions.filter(e=>e.a>0.04);
    if(charge>=fullCharge || explosions.length || dragging || active) draw();
    else draw();
    requestAnimationFrame(tick);
  }

  // events (mouse only; no keyboard)
  canvas.addEventListener("mousedown", onDown);
  window.addEventListener("mousemove", onMove);
  window.addEventListener("mouseup", onUp);
  window.addEventListener("resize", ()=>{ fitCanvas(); draw(); });

  modalBtn.onclick = ()=>{ hideModal(); loadStage(0); };

  // init
  loadStage(0);
  modal.classList.remove("hidden");
  modalTitle.textContent="チャージ一閃";
  modalSub.innerHTML="同色をなぞって溜め、コアで放つ。<br>斜めにもつなげられるようになった！";
  modalBtn.textContent="START";
  modalBadge.textContent="St1 操作理解＋コア体験";
  requestAnimationFrame(tick);
  </script>
</body>
</html>
