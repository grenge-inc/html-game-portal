<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>配線タワーディフェンス</title>
<style>
  :root{
    --phone-aspect:9 / 19.5;
    --bg-deep:#02030a; --bg-mid:#0a1430; --bg-panel:#06081a; --bg-card:#0b1228;
    --line:#1a2848; --cyan:#6ff; --cyan-soft:#8df; --cyan-g1:#3df; --cyan-g2:#06a;
    --pink:#b585ff; --warn:#ffb86c; --text:#eaf3ff; --sub:#cdddef; --dim:#7a92b5;
    --enemy:#ff5d8a; --boss:#ff3d6e; --hp:#ff8aa0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;
    font-family:'Helvetica Neue',system-ui,sans-serif;user-select:none;-webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;touch-action:none;}
  body{position:relative;display:flex;align-items:center;justify-content:center;}
  #phone{position:relative;overflow:hidden;
    width:min(100vw,calc(100vh*9/19.5));height:min(100vh,calc(100vw*19.5/9));
    --pw:min(100vw,calc(100vh*9/19.5));--ph:min(100vh,calc(100vw*19.5/9));
    --u:calc(var(--pw)/100);--uh:calc(var(--ph)/100);
    background:radial-gradient(120% 90% at 50% 38%,#0a1638 0%,var(--bg-deep) 70%);}

  /* HUD */
  #hud{position:absolute;top:0;left:0;width:100%;height:9%;display:flex;align-items:center;
    justify-content:space-between;padding:0 calc(var(--u)*2.5);z-index:30;
    background:linear-gradient(#06081aee,#06081a00);font-size:calc(var(--u)*3.2);}
  .stat{display:flex;flex-direction:column;align-items:center;line-height:1.1;}
  .stat b{font-size:calc(var(--u)*4.2);color:var(--cyan);text-shadow:0 0 6px var(--cyan-g2);}
  .stat.hpv b{color:var(--hp);text-shadow:0 0 6px #a03;}
  .stat.stagev b{color:#ffd76b;text-shadow:0 0 6px #f80;}
  .lbl{color:var(--dim);font-size:calc(var(--u)*2.4);letter-spacing:.5px;}

  /* スクロールヒント */
  #scroll-hint{position:absolute;top:10%;left:50%;transform:translateX(-50%);
    font-size:calc(var(--u)*2.6);color:var(--dim);z-index:28;pointer-events:none;
    transition:opacity .4s;white-space:nowrap;}

  /* board */
  #board{position:absolute;top:9%;left:0;width:100%;height:62%;overflow:hidden;cursor:grab;}
  #board.dragging-cam{cursor:grabbing;}
  /* カメラ層：ドラッグスクロール可能 */
  #cam{position:absolute;top:0;left:0;width:100%;height:100%;transform-origin:0 0;}
  #fx{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:20;}
  .hex{position:absolute;width:calc(var(--u)*15);height:calc(var(--u)*17);
    transform:translate(-50%,-50%);clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);
    background:#0c1736;border:0;display:flex;align-items:center;justify-content:center;
    transition:background .18s,box-shadow .18s;}
  /* 配線タイルの枠：.hex の背景を枠色にし .in（86%）との差分で六角形の枠を表現 */
  .hex.wire{background:#1a8888;}
  .hex.wireP{background:#6030a8;}
  .hex .in{width:86%;height:86%;clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);
    background:#030609;display:flex;align-items:center;justify-content:center;font-size:calc(var(--u)*5);
    position:relative;overflow:hidden;}
  /* シアン配線（通電する）：素地はほぼ黒、durfill が満タン時にシアンで覆う */
  .hex.wire .in{background:#030609;
    box-shadow:inset 0 0 calc(var(--u)*1.5) #3df4;}
  /* 色不一致配線（通電しない＝紫）：素地はほぼ黒、durfill が満タン時に紫で覆う */
  .hex.wireP .in{background:#030609;
    box-shadow:inset 0 0 calc(var(--u)*1.5) #9a6bff4;}
  .hex.core .in{background:radial-gradient(circle,#eaffff,#3df 55%,#06a);
    box-shadow:0 0 calc(var(--u)*4) var(--cyan);}
  .hex.hub .in{background:repeating-linear-gradient(45deg,#243a66,#243a66 14%,#1a2c52 14%,#1a2c52 28%);}
  /* リング1〜2セル */
  .hex.ring2bg .in{background:#0d1830;opacity:.85;}
  .hex.ring2bg.wire{background:#156868;}
  .hex.ring2bg.wireP{background:#4a2488;}
  .hex.ring2bg.wire .in{background:#030609;opacity:1;
    box-shadow:inset 0 0 calc(var(--u)*1.5) #3df4;}
  .hex.ring2bg.wireP .in{background:#030609;opacity:1;
    box-shadow:inset 0 0 calc(var(--u)*1.5) #9a6bff4;}
  /* リング3〜4セル（中間プレイヤブル） */
  .hex.ring3bg .in{background:#090f25;opacity:.75;}
  .hex.ring3bg.wire{background:#105858;}
  .hex.ring3bg.wireP{background:#3a1868;}
  .hex.ring3bg.wire .in{background:#030609;opacity:1;
    box-shadow:inset 0 0 calc(var(--u)*1.5) #3df4;}
  .hex.ring3bg.wireP .in{background:#030609;opacity:1;
    box-shadow:inset 0 0 calc(var(--u)*1.5) #9a6bff4;}
  /* リング5セル（最外周プレイヤブル） */
  .hex.ring5bg .in{background:#060a1e;opacity:.65;}
  .hex.ring5bg.wire{background:#0c4848;}
  .hex.ring5bg.wireP{background:#2e1250;}
  .hex.ring5bg.wire .in{background:#030609;opacity:1;
    box-shadow:inset 0 0 calc(var(--u)*1.5) #3df4;}
  .hex.ring5bg.wireP .in{background:#030609;opacity:1;
    box-shadow:inset 0 0 calc(var(--u)*1.5) #9a6bff4;}
  .hex.gap{animation:gap 1s infinite;}
  .hex.gap .in{background:#10204a;border:1px dashed #4a6fb0;}
  .hex.ring2bg.gap .in{background:#0c1a3a;border:1px dashed #2a4a80;}
  .hex.ring3bg.gap .in{background:#080e20;border:1px dashed #1e3660;}
  .hex.ring5bg.gap .in{background:#040810;border:1px dashed #142040;}
  .hex.prevok .in{background:#5fe6ff;box-shadow:0 0 calc(var(--u)*3) #bff;}
  .hex.prevokP .in{background:#9d6cf0;box-shadow:0 0 calc(var(--u)*3) #d9b8ff;}
  .hex.prevng .in{background:#5a1326;box-shadow:0 0 calc(var(--u)*2) #f57;}
  /* ---- タレット構造：基部（六角ベース）+ 砲塔ボディ（円）+ 砲身（バレル） ---- */
  /* 砲塔ベース：六角セル中央に六角形の土台 */
  .hex.turret .in{position:relative;}
  .hex.turret .in::before{content:"";position:absolute;
    width:64%;height:64%;
    clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);
    background:radial-gradient(circle,#1a3a5a 0%,#0d2040 60%,#081628 100%);
    box-shadow:0 0 calc(var(--u)*1.5) #06a4;
    z-index:1;}
  /* 砲塔球体（上に重なる）*/
  .hex.turret .in::after{content:"";position:absolute;width:38%;height:38%;border-radius:50%;
    background:radial-gradient(circle,#fff 0%,#6ff 45%,#09c 75%,#06a 100%);
    box-shadow:0 0 calc(var(--u)*2) #6ff,0 0 calc(var(--u)*1) #0af;
    z-index:3;}
  /* lv2（紫タレット）ベース＋球体は金色系 */
  .hex.turret.lv2 .in::before{background:radial-gradient(circle,#3a2a0a 0%,#201508 60%,#120e04 100%);}
  .hex.turret.lv2 .in::after{background:radial-gradient(circle,#fff,#ffd76b 55%,#ff7a3a);box-shadow:0 0 calc(var(--u)*2.5) #fb4;}
  .hex.turret.offline .in::before,.hex.turret.offline .in::after{filter:grayscale(1) brightness(.4);}
  /* 紫タイル上タレット（on-purple）：紫系グラデーション */
  .hex.turret.on-purple .in::before{background:radial-gradient(circle,#2a1a4a 0%,#1a0c32 60%,#100820 100%);box-shadow:0 0 calc(var(--u)*1.5) #7a3df04;}
  .hex.turret.on-purple .in::after{background:radial-gradient(circle,#fff 0%,#d4a0ff 45%,#8a2ee0 75%,#5a10b0 100%);box-shadow:0 0 calc(var(--u)*2) #b585ff,0 0 calc(var(--u)*1) #7a3df0;}
  .hex.turret.on-purple.offline .in::before,.hex.turret.on-purple.offline .in::after{filter:grayscale(1) brightness(.4);}
  /* 砲身（バレル）：JS で transform:rotate(Xdeg) を設定して方向を示す */
  .turret-barrel{
    position:absolute;left:50%;top:50%;
    width:38%;height:14%;
    border-radius:0 calc(var(--u)*.7) calc(var(--u)*.7) 0;
    transform-origin:0% 50%;
    transform:translateY(-50%) rotate(0deg);
    background:linear-gradient(to right,#3bf 0%,#0af 55%,#07a 100%);
    box-shadow:0 0 calc(var(--u)*.8) #6ff8;
    z-index:4;
    transition:transform .12s ease-out;}
  /* lv2（紫タレット）砲身は金色 */
  .hex.turret.lv2 .turret-barrel{
    background:linear-gradient(to right,#ffe080 0%,#ffb030 55%,#d06010 100%);
    box-shadow:0 0 calc(var(--u)*.8) #fb48;}
  /* 紫タイル上タレット砲身は紫色 */
  .hex.turret.on-purple .turret-barrel{
    background:linear-gradient(to right,#c090ff 0%,#9050e0 55%,#6020b0 100%);
    box-shadow:0 0 calc(var(--u)*.8) #b585ff8;}
  .hex.turret.offline .turret-barrel{filter:grayscale(1) brightness(.4);}
  /* 砲身根元の台座リング */
  .turret-pivot{
    position:absolute;left:50%;top:50%;
    width:20%;height:20%;border-radius:50%;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle,#5df 0%,#09c 60%,#057 100%);
    border:1px solid #6ff6;
    box-shadow:0 0 calc(var(--u)*.6) #3af6;
    z-index:5;}
  .hex.turret.lv2 .turret-pivot{
    background:radial-gradient(circle,#ffe080 0%,#d08820 60%,#805010 100%);
    border-color:#ffd76b6;
    box-shadow:0 0 calc(var(--u)*.6) #fb46;}
  /* 紫タイル上タレット台座は紫色 */
  .hex.turret.on-purple .turret-pivot{
    background:radial-gradient(circle,#d4a0ff 0%,#8a2ee0 60%,#5a10b0 100%);
    border-color:#b585ff6;
    box-shadow:0 0 calc(var(--u)*.6) #9050e06;}
  .hex.turret.offline .turret-pivot{filter:grayscale(1) brightness(.4);}
  /* 発砲リコイルアニメーション */
  @keyframes barrel-recoil{
    0%{transform:translateY(-50%) rotate(var(--bangle,0deg)) scaleX(.72);}
    55%{transform:translateY(-50%) rotate(var(--bangle,0deg)) scaleX(1.06);}
    100%{transform:translateY(-50%) rotate(var(--bangle,0deg)) scaleX(1);}}
  /* タレットレベル表示（LvX）：タレット上に数字バッジを表示 */
  .turret-lv{
    position:absolute;left:50%;top:5%;
    transform:translateX(-50%);
    z-index:6;pointer-events:none;
    font-size:calc(var(--u)*3);font-weight:bold;line-height:1;
    color:#eaffff;text-shadow:0 0 calc(var(--u)*.8) #06a,0 0 calc(var(--u)*.4) #000;
    letter-spacing:-.5px;white-space:nowrap;}
  .hex.turret.lv2 .turret-lv{color:#ffe7a8;text-shadow:0 0 calc(var(--u)*.8) #f80,0 0 calc(var(--u)*.4) #000;}
  .hex.turret.on-purple .turret-lv{color:#e8d4ff;text-shadow:0 0 calc(var(--u)*.8) #7a3df0,0 0 calc(var(--u)*.4) #000;}
  .hex.turret.offline .turret-lv{filter:grayscale(1) brightness(.6);}
  /* 吸収（レベルアップ）フラッシュ：新規設置が既存に吸収された時のポンプ演出 */
  @keyframes turret-absorb{
    0%{transform:translate(-50%,-50%) scale(1);}
    40%{transform:translate(-50%,-50%) scale(1.4);}
    100%{transform:translate(-50%,-50%) scale(1);}}
  .hex.turret.absorbing .in::after{animation:turret-absorb .32s ease-out;}
  /* タイル耐久：タイル自体を上→下消耗ゲージ化 */
  /* .in は position:relative 済み。.durfill は底辺起点で height = ratio*100% */
  /* opacity:1 で完全不透明。タイル充填色はグラデーションを廃し単色（フラット）塗り。状態識別色を維持しつつ height で上から減る */
  .durfill{display:none;position:absolute;bottom:0;left:0;width:100%;height:100%;
    clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);
    pointer-events:none;z-index:2;transition:height .12s linear;}
  .hex.wire .durfill{display:block;
    background:#1fa6d8;
    opacity:1;}
  .hex.wireP .durfill{display:block;
    background:#7a4ad0;
    opacity:1;}
  /* 消耗部（上部の空き）はタイル本体のほぼ黒い素地が露出する（背景と同化するほど暗い） */
  /* タレット搭載セルでは durfill を最背面にしつつ視認できる opacity を維持 */
  .hex.turret .durfill{z-index:0;opacity:.75;}
  /* crit: 赤みがかった警告光、枠も赤に変更。充填色はフラット赤単色 */
  .hex.wire.crit,.hex.wireP.crit{background:#882020;}
  .hex.wire.crit .in,.hex.wireP.crit .in{box-shadow:inset 0 0 calc(var(--u)*3) #f84,inset 0 0 calc(var(--u)*1) #f00;}
  .hex.wire.crit .durfill{background:#e0552a;opacity:1;}
  .hex.wireP.crit .durfill{background:#e0552a;opacity:1;}
  .hex.turret.crit .durfill{opacity:.55;}
  @keyframes gap{0%,100%{box-shadow:0 0 0 #4a6fb0;}50%{box-shadow:0 0 calc(var(--u)*2.5) #6cf;}}

  .enemy{position:absolute;width:calc(var(--u)*5);height:calc(var(--u)*5);transform:translate(-50%,-50%);
    border-radius:18%;background:linear-gradient(150deg,#ff8fb0,#ff3d6e);z-index:15;
    box-shadow:0 0 calc(var(--u)*1.5) #f47;transition:left .08s linear,top .08s linear;}
  .enemy.fast{background:linear-gradient(150deg,#ffd1a0,#ff8a3a);clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);}
  .enemy.boss{width:calc(var(--u)*9);height:calc(var(--u)*9);background:radial-gradient(circle,#ffd1de,#ff3d6e 60%,#900);
    box-shadow:0 0 calc(var(--u)*3) #f06;}
  .enemy.digging{box-shadow:0 0 calc(var(--u)*2.5) #ff0,0 0 calc(var(--u)*1) #f80;animation:dig .3s infinite alternate;}
  @keyframes dig{0%{transform:translate(-50%,-50%) scale(1);}100%{transform:translate(-50%,-50%) scale(1.2);}}
  .ebar{position:absolute;left:0;top:-22%;width:100%;height:14%;background:#400;border-radius:2px;overflow:hidden;}
  .ebar i{display:block;height:100%;background:#ff8aa0;}

  /* hand */
  #hand{position:absolute;bottom:0;left:0;width:100%;height:29%;z-index:30;
    background:linear-gradient(#06081a00,#06081a 30%);padding-top:calc(var(--u)*1.5);}
  /* ENERGY 表示（手札領域の右上＝右端カードのすぐ上）。HUD から移設。 */
  #energy-hand{position:absolute;top:calc(var(--u)*1);right:calc(var(--u)*3);
    z-index:31;flex-direction:row;align-items:baseline;gap:calc(var(--u)*1);
    pointer-events:none;}
  #energy-hand b{font-size:calc(var(--u)*4.6);color:var(--cyan);text-shadow:0 0 6px var(--cyan-g2);}
  #energy-hand .lbl{color:var(--dim);font-size:calc(var(--u)*2.6);letter-spacing:.5px;}
  #cards{display:flex;justify-content:center;align-items:flex-end;gap:calc(var(--u)*1.6);height:72%;padding:0 calc(var(--u)*2);}
  .card{position:relative;width:calc(var(--u)*17);height:92%;border-radius:calc(var(--u)*1.6);
    background:linear-gradient(160deg,var(--bg-card),#060b1c);border:1px solid var(--cyan-g2);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:calc(var(--u)*.8);
    cursor:grab;transition:transform .12s,box-shadow .12s;touch-action:none;}
  .card:active{cursor:grabbing;}
  .card.sel{transform:translateY(calc(var(--u)*-2));box-shadow:0 0 calc(var(--u)*3) var(--cyan);border-color:var(--cyan);}
  .card.cP{border-color:#7a3df0;}
  .card.cP.sel{box-shadow:0 0 calc(var(--u)*3) #b585ff;border-color:#b585ff;}
  .card .ct{font-size:calc(var(--u)*2.2);color:var(--sub);text-align:center;line-height:1.05;}
  .card .cost{position:absolute;top:calc(var(--u)*.6);right:calc(var(--u)*1);font-size:calc(var(--u)*2.4);
    color:var(--warn);}
  .card.dis{opacity:.4;pointer-events:none;}
  /* カード内ミニ盤面（ピース形状プレビュー） */
  .piecemini{position:relative;width:calc(var(--u)*12);height:calc(var(--u)*11);}
  .piecemini i{position:absolute;width:calc(var(--u)*3.4);height:calc(var(--u)*3.8);transform:translate(-50%,-50%);
    clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);}
  .piecemini i.c{background:linear-gradient(150deg,var(--cyan-g1),var(--cyan-g2));}
  .piecemini i.p{background:linear-gradient(150deg,#9a6bff,#4a1f8c);}
  .piecemini i.tur::after{content:"";position:absolute;left:50%;top:50%;width:48%;height:48%;
    transform:translate(-50%,-50%);border-radius:50%;
    background:radial-gradient(circle,#fff,#6ff 60%,#06a);box-shadow:0 0 calc(var(--u)*1) #6ff;}

  #ghost{position:absolute;z-index:60;pointer-events:none;display:none;
    transform:translate(-50%,-50%);opacity:.92;}
  #ghost .gmini{position:relative;width:calc(var(--u)*1);height:calc(var(--u)*1);}
  #ghost .gmini i{position:absolute;transform:translate(-50%,-50%);
    width:calc(var(--u)*5.2);height:calc(var(--u)*5.8);
    clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);}
  #ghost.cC .gmini i{background:linear-gradient(150deg,#9ff,#3df);box-shadow:0 0 calc(var(--u)*1.5) #bff;}
  #ghost.cP .gmini i{background:linear-gradient(150deg,#c4a0ff,#7a3df0);box-shadow:0 0 calc(var(--u)*1.5) #d9b8ff;}
  #ghost .gmini i.tur::after{content:"";position:absolute;left:50%;top:50%;width:48%;height:48%;
    transform:translate(-50%,-50%);border-radius:50%;
    background:radial-gradient(circle,#fff,#6ff 60%,#06a);box-shadow:0 0 calc(var(--u)*1.2) #6ff;}

  /* 画面端スクロールゾーン（タイルドラッグ中のみ有効） */
  #edge-zones{position:absolute;top:9%;left:0;width:100%;height:62%;pointer-events:none;z-index:55;}
  .edge-zone{position:absolute;opacity:0;transition:opacity .2s;}
  .edge-zone.active{opacity:1;}
  #ez-top{top:0;left:0;width:100%;height:12%;
    background:linear-gradient(#4af4 0%,transparent 100%);}
  #ez-bottom{bottom:0;left:0;width:100%;height:12%;
    background:linear-gradient(transparent 0%,#4af4 100%);}
  #ez-left{top:0;left:0;width:10%;height:100%;
    background:linear-gradient(to right,#4af4 0%,transparent 100%);}
  #ez-right{top:0;right:0;width:10%;height:100%;
    background:linear-gradient(to left,#4af4 0%,transparent 100%);}

  #bar{display:flex;justify-content:center;align-items:center;gap:calc(var(--u)*3);height:18%;}
  .btn{padding:calc(var(--u)*1.4) calc(var(--u)*4);border-radius:calc(var(--u)*4);
    background:linear-gradient(150deg,#13335f,#0a1f3c);border:1px solid var(--cyan-g2);
    color:var(--cyan-soft);font-size:calc(var(--u)*3);cursor:pointer;}
  .btn:active{transform:scale(.96);}
  .btn.dis{opacity:.4;pointer-events:none;}
  /* リロール無料状態：緑系で強調＋「初回無料」バッジ */
  #reroll{position:relative;}
  #reroll.free{background:linear-gradient(150deg,#0a4f2a,#062918);border-color:#3f8;
    color:#3f8;text-shadow:0 0 6px #3f8;box-shadow:0 0 calc(var(--u)*2.5) #3f86;}
  #reroll.free::after{content:"初回無料";position:absolute;top:calc(var(--u)*-1.6);
    right:calc(var(--u)*-1);font-size:calc(var(--u)*2);color:#02140a;
    background:#3f8;border-radius:calc(var(--u)*1.5);padding:0 calc(var(--u)*1.2);
    box-shadow:0 0 calc(var(--u)*1.5) #3f8;}

  /* START ボタン（準備フェーズ） */
  #start-btn{
    position:absolute;bottom:30%;left:50%;transform:translateX(-50%);
    z-index:70;display:none;
    padding:calc(var(--u)*2.5) calc(var(--u)*10);
    border-radius:calc(var(--u)*5);
    background:linear-gradient(150deg,#0a4f2a,#062918);
    border:2px solid #3f8;
    color:#3f8;font-size:calc(var(--u)*5);font-weight:bold;
    cursor:pointer;
    text-shadow:0 0 8px #3f8;
    box-shadow:0 0 calc(var(--u)*4) #3f8a,0 0 calc(var(--u)*8) #3f84;
    animation:pulse-start 1.2s infinite alternate;}

  .flash{position:absolute;inset:0;z-index:50;background:radial-gradient(circle at 50% 50%,#fff,#bff 30%,#06a 60%,transparent 75%);

  .shock{position:absolute;z-index:19;border-radius:50%;border:calc(var(--u)*1.4) solid #bff;

  .pop{position:absolute;z-index:55;color:#ffd76b;font-weight:bold;font-size:calc(var(--u)*5);
    transform:translate(-50%,-50%);pointer-events:none;text-shadow:0 0 6px #f80;}

  /* ---- 弾（プロジェクタイル）---- */
  .bullet{position:absolute;z-index:18;border-radius:50%;pointer-events:none;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle,#fff 0%,#6ff 45%,#0af 80%,transparent 100%);

  /* 着弾エフェクト */

  /* ---- 射程円（タレットホバー時） ---- */
  .range-ring{position:absolute;z-index:16;border-radius:50%;pointer-events:none;
    transform:translate(-50%,-50%);

    box-shadow:0 0 8px rgba(51,255,255,0.3),inset 0 0 12px rgba(51,255,255,0.05);}

  /* ---- 通電ウェーブパルス（接続成立時にコア→タレットのルートを進行波で1回点滅）---- */
  .wave-pulse{position:absolute;z-index:17;pointer-events:none;
    width:calc(var(--u)*13);height:calc(var(--u)*15);
    transform:translate(-50%,-50%);
    clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);
    background:radial-gradient(circle,#fff 0%,#bff 35%,#3df 65%,transparent 90%);
    opacity:0;
    animation:wave-pulse-anim .42s ease-out forwards;}
  @keyframes wave-pulse-anim{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.55);}
    35%{opacity:.95;transform:translate(-50%,-50%) scale(1.12);}

  /* ---- Wave 残り時間ゲージ ---- */
  #wave-timer-bar{
    position:absolute;top:9%;left:0;width:100%;height:calc(var(--u)*1.6);

  #wave-timer-label{
    position:absolute;top:calc(9% + calc(var(--u)*1.8));right:calc(var(--u)*3);

  /* Wave 進行カウントダウン表示（右上） */
  #wave-info{position:absolute;top:9.5%;right:calc(var(--u)*3);z-index:28;
    font-size:calc(var(--u)*2.8);color:var(--warn);text-shadow:0 0 6px #f80;

  /* ---- ステージ突破バナー ---- */
  #stage-banner{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    z-index:75;display:none;

<body>

<script>
(function(){
"use strict";
var $=function(s){return document.querySelector(s);};
var board=$("#board"),cam=$("#cam"),fx=$("#fx"),cardsEl=$("#cards"),ghost=$("#ghost");
var PW,PH,U,HEXW,HEXH;

/* ---- ヘックス axial -> #cam ピクセル ---- */
function metrics(){
  PW=board.clientWidth;PH=board.clientHeight;U=PW/100;
  HEXW=U*15;HEXH=U*17;
}
function hexPos(q,r){
  var x=PW/2 + q*HEXW*0.78 + r*HEXW*0.39;
  var y=PH/2 + r*HEXH*0.70;
  return {x:x,y:y};
}

/* ---- リング定義（axial max(|q|,|r|,|q+r|) <= N） ---- */
function buildRing(N){
  var cells=[];
  for(var q=-N;q<=N;q++){
    for(var r=-N;r<=N;r++){
      if(Math.abs(q)<=N && Math.abs(r)<=N && Math.abs(q+r)<=N){
        cells.push([q,r]);
      }
    }
  }
  return cells;
}
function buildRingShell(N){
  // distance === N のセルのみ
  var cells=[];
  for(var q=-N;q<=N;q++){
    for(var r=-N;r<=N;r++){
      if(Math.max(Math.abs(q),Math.abs(r),Math.abs(q+r))===N){
        cells.push([q,r]);
      }
    }
  }
  return cells;
}

var RING1=buildRingShell(1);   // 6セル
var RING2=buildRingShell(2);   // 12セル
var RING3=buildRingShell(3);   // 18セル
var RING4=buildRingShell(4);   // 24セル
var RING5=buildRingShell(5);   // 30セル
// リング6（視覚外枠）
var RING6=buildRingShell(6);   // 36セル

// プレイヤブルセル：リング1〜5
var ALL_PLAY=buildRing(5).filter(function(c){return !(c[0]===0&&c[1]===0);});

function key(q,r){return q+","+r;}

var HEX_DIRS=[[1,0],[1,-1],[0,-1],[-1,0],[-1,1],[0,1]];

function hexDist(q,r){return Math.max(Math.abs(q),Math.abs(r),Math.abs(q+r));}

function isPlayCell(q,r){
  if(q===0&&r===0) return false;
  return hexDist(q,r)<=5;
}
function isRingN(q,r,n){return hexDist(q,r)===n;}

/* ---- ピース形状テンプレート ---- */
var PIECE_SHAPES=[
  {id:"L2a",cells:[[0,0],[1,0]],n:2},
  {id:"L2b",cells:[[0,0],[0,1]],n:2},
  {id:"L3a",cells:[[0,0],[1,0],[2,0]],n:3},
  {id:"L3b",cells:[[0,0],[0,1],[0,2]],n:3},
  {id:"V3", cells:[[0,0],[1,0],[1,-1]],n:3},
  {id:"V3b",cells:[[0,0],[0,1],[-1,1]],n:3},
  {id:"L4", cells:[[0,0],[1,0],[2,0],[2,-1]],n:4},
  {id:"Z4", cells:[[0,0],[1,0],[1,-1],[2,-1]],n:4},
  {id:"S4", cells:[[0,0],[0,1],[0,2],[1,1]],n:4},
  {id:"A5", cells:[[0,0],[1,0],[1,-1],[0,-1],[-1,0]],n:5},
  {id:"T5", cells:[[0,0],[1,0],[2,0],[1,-1],[1,1]],n:5}
];

/* ====================================================
   カードプール（22種）：1枚 = 1色・2〜4マス・タレット有無バリエーション
   col:"C"=シアン（通電）/ col:"P"=紫（盾）
   コスト = タイルのマス数×1 + タレット有なら+2
     タレットなし: 2マス=2, 3マス=3, 4マス=4
     タレット付き: 2マス=4, 3マス=5, 4マス=6
   ==================================================== */
var CARD_POOL = [
  /* ── シアン + タレット付き（9種）─ 2〜4マス形状 ── */
  {shape:"L2a", col:"C", turretAt:[0,0],  cost:4},  // 直線2: 先頭に砲 (2+2)
  {shape:"L2b", col:"C", turretAt:[0,0],  cost:4},  // 縦2: 先頭に砲 (2+2)
  {shape:"L3a", col:"C", turretAt:[1,0],  cost:5},  // 直線3: 中央に砲 (3+2)
  {shape:"L3b", col:"C", turretAt:[0,1],  cost:5},  // 縦3: 中央に砲 (3+2)
  {shape:"V3",  col:"C", turretAt:[1,0],  cost:5},  // くの字3: 折れ先に砲 (3+2)
  {shape:"V3b", col:"C", turretAt:[0,1],  cost:5},  // くの字3b: 折れ先に砲 (3+2)
  {shape:"L4",  col:"C", turretAt:[2,0],  cost:6},  // L字4: 長辺端に砲 (4+2)
  {shape:"Z4",  col:"C", turretAt:[1,-1], cost:6},  // Z字4: 中央折れに砲 (4+2)
  {shape:"S4",  col:"C", turretAt:[0,1],  cost:6},  // S字4: 縦中に砲 (4+2)
  /* ── シアン + タレットなし（5種）── */
  {shape:"L2a", col:"C", turretAt:null,   cost:2},  // 直線2: 配線のみ (2)
  {shape:"L2b", col:"C", turretAt:null,   cost:2},  // 縦2: 配線のみ (2)
  {shape:"L3a", col:"C", turretAt:null,   cost:3},  // 直線3: 配線のみ (3)
  {shape:"L3b", col:"C", turretAt:null,   cost:3},  // 縦3: 配線のみ (3)
  {shape:"L4",  col:"C", turretAt:null,   cost:4},  // L字4: 配線ブリッジ (4)
  /* ── 紫 + タレットなし（4種）── */
  {shape:"V3",  col:"P", turretAt:null,   cost:3},  // くの字3: 盾 (3)
  {shape:"V3b", col:"P", turretAt:null,   cost:3},  // くの字3b: 盾 (3)
  {shape:"Z4",  col:"P", turretAt:null,   cost:4},  // Z字4: 盾 (4)
  {shape:"S4",  col:"P", turretAt:null,   cost:4},  // S字4: 盾 (4)
  /* ── 紫 + タレット付き（4種：珍しい砲盾コンボ）── */
  {shape:"L2a", col:"P", turretAt:[0,0],  cost:4},  // 直線2紫: 端に砲 (2+2)
  {shape:"L3a", col:"P", turretAt:[0,0],  cost:5},  // 直線3紫: 端に砲（通電しないが砲台配置できる）(3+2)
  {shape:"L4",  col:"P", turretAt:[1,0],  cost:6},  // L字4紫: 中央に砲 (4+2)
  {shape:"Z4",  col:"P", turretAt:[1,0],  cost:6}   // Z字4紫: 折れ先に砲 (4+2)
];

/* ====================================================
   Wave 定義（5 Wave / 各 Wave 最大 5 体 / ボスは Wave 5）
   ここはベース値（Stage 1 の値）。実際のスポーン時にステージ係数を掛ける。
   sp は元の約 50%（元: 1.6〜2.4 → 改修後: 0.8〜1.2）
   ==================================================== */
var WAVES_BASE = [
  // Wave 1: 通常敵 3 体（軽め）
  [
    {q:0,  r:7,  hp:14, sp:1.65},
    {q:6,  r:-6, hp:12, sp:1.65},
    {q:-6, r:0,  hp:12, sp:1.8}
  ],
  // Wave 2: 通常敵 4 体（速敵 1 体混じる）
  [
    {q:0,  r:7,  hp:14, sp:1.65},
    {q:6,  r:0,  hp:14, sp:1.65},
    {q:-5, r:6,  hp:12, sp:1.8, fast:1},
    {q:5,  r:1,  hp:12, sp:1.65}
  ],
  // Wave 3: 通常敵 3 体 + 速敵 2 体
  [
    {q:0,  r:7,  hp:16, sp:1.65},
    {q:6,  r:-6, hp:14, sp:1.65},
    {q:-5, r:6,  hp:12, sp:1.8, fast:1},
    {q:5,  r:1,  hp:12, sp:1.8, fast:1},
    {q:-6, r:0,  hp:14, sp:1.65}
  ],
  // Wave 4: 通常敵 2 体 + 速敵 3 体（強め）
  [
    {q:0,  r:7,  hp:18, sp:1.65},
    {q:6,  r:-6, hp:14, sp:1.65},
    {q:-5, r:-2, hp:12, sp:1.8, fast:1},
    {q:5,  r:1,  hp:12, sp:1.8, fast:1},
    {q:-5, r:6,  hp:12, sp:1.8, fast:1}
  ],
  // Wave 5: ボス + 通常敵 4 体
  [
    {q:0,  r:7,  hp:30, sp:1.2, boss:1},
    {q:6,  r:-6, hp:14, sp:1.65},
    {q:-6, r:0,  hp:12, sp:1.8, fast:1},
    {q:6,  r:0,  hp:14, sp:1.65},
    {q:-5, r:6,  hp:12, sp:1.8, fast:1}
  ]
];

/* ---- ステージ定義（リング5盤面）---- */
var STAGE={
  hp:40,energy:20,reroll:3,
  wires:[],
  turrets:[],
  hubs:[],
  hand:[],
  tip:"タイルを丸ごと欠けセルに置け。シアン配線がコアに通電しタレットが自動射撃する"
};

/* ====================================================
   エンドレスステージ管理
   currentStage: 1-indexed のステージ番号（1, 2, 3, ...）
   ステージが進むごとに敵の速度・体力・攻撃力を漸増させる。
   スケーリング係数（ステージ n 時）:
     速度:  ×(1 + 0.07*(n-1))  — Stage5 で約 1.28 倍
     体力:  ×(1 + 0.10*(n-1))  — Stage5 で約 1.40 倍
     攻撃力(TILE_ATTACK_RATE 倍率): ×(1 + 0.08*(n-1)) — Stage5 で約 1.32 倍
   ==================================================== */
var currentStage = 1;

function stageSpScale(){ return 1 + 0.07 * (currentStage - 1); }
function stageHpScale(){ return 1 + 0.10 * (currentStage - 1); }
function stageAttkScale(){ return 1 + 0.08 * (currentStage - 1); }

/* WAVES_BASE にステージ係数を掛けた配列を生成して返す */
function buildScaledWaves(){
  var spScale = stageSpScale();
  var hpScale = stageHpScale();
  return WAVES_BASE.map(function(wave){
    return wave.map(function(d){
      var scaled = Object.assign({}, d);
      scaled.hp = Math.round(d.hp * hpScale);
      scaled.sp = d.sp * spScale;
      return scaled;
    });
  });
}

var WAVES; // buildScaledWaves() の結果を格納

var S;
var wireData={}, hubs={}, turrets={}, gapCells=[], hexEls={};
var enemies=[], hp, energy, rerollCost, hand=[], cleared=false, running=false;
/* 各ステージ最初の 1 回のリロールは無料。ステージ開始時に true へ初期化し、
   無料リロール消費時に false にする。2 回目以降は従来コスト（逓増）を維持。 */
var rerollFreeAvailable=true;
var dragging=null, dragCard=null;

/* ---- Wave 進行管理 ---- */
var currentWave=0;       // 0-indexed (0 = Wave 1)
var TOTAL_WAVES=5;
var WAVE_INTERVAL=10000; // 10 秒間隔（ms）
var waveTimer=null;      // setTimeout の ID
var allWavesSpawned=false;
var spawned=false;

/* ---- 準備フェーズ管理 ---- */
var prepPhase=false;        // 準備フェーズ中かどうか
var waveTimerStartMs=0;     // Wave タイマー開始時刻（Date.now()）
var waveTimerDurationMs=0;  // タイマー全体の時間

/* ---- タイル耐久定数（ステージ係数で動的に変わる） ---- */
var TILE_DEFAULT_HP = 20;
var TILE_CRIT_RATIO = 0.3;

/* TILE_ATTACK_RATE はステージ係数で変化する（spawnWave 時に設定） */
var TILE_ATTACK_RATE = 0.7;

function hasWire(q,r){return !!wireData[key(q,r)];}
function wireCol(q,r){var w=wireData[key(q,r)];return w?w.col:null;}
function setWire(q,r,col){
  var k=key(q,r);
  if(!wireData[k]){
    wireData[k]={hp:TILE_DEFAULT_HP,maxHp:TILE_DEFAULT_HP,col:col||"C",barEl:null};
  }
}
function removeWire(q,r){delete wireData[key(q,r)];}

function shapeById(id){
  for(var i=0;i<PIECE_SHAPES.length;i++) if(PIECE_SHAPES[i].id===id) return PIECE_SHAPES[i];
  return PIECE_SHAPES[0];
}
function pieceCellsAt(card,aq,ar){
  var sh=shapeById(card.shape);
  return sh.cells.map(function(off){return [aq+off[0],ar+off[1]];});
}
function pieceTurretCellAt(card,aq,ar){
  if(!card.turretAt) return null;
  return [aq+card.turretAt[0], ar+card.turretAt[1]];
}
function canPlacePiece(card,aq,ar){
  var cells=pieceCellsAt(card,aq,ar);
  for(var i=0;i<cells.length;i++){
    var q=cells[i][0],r=cells[i][1];
    if(!isPlayCell(q,r)) return false;
    if(hasWire(q,r)) return false;
    if(hubs[key(q,r)]) return false;
  }
  return true;
}

/* ---- BFS：コアからシアン配線経路の連結判定 ---- */
function computeConnectedToCore(){
  var visited={};
  var queue=[[0,0]];
  visited[key(0,0)]=true;
  while(queue.length>0){
    var cur=queue.shift();
    var cq=cur[0],cr=cur[1];
    HEX_DIRS.forEach(function(d){
      var nq=cq+d[0],nr=cr+d[1];
      var nk=key(nq,nr);
      if(visited[nk]) return;
      if((hasWire(nq,nr) && wireCol(nq,nr)==="C") || hubs[nk]){
        visited[nk]=true;
        queue.push([nq,nr]);
      }
    });
  }
  return visited;
}
function isConnectedToCore(q,r){
  return !!computeConnectedToCore()[key(q,r)];
}

/* ---- 盤面構築 ---- */
function getBgClass(q,r){
  var d=hexDist(q,r);
  if(d===0) return false;
  if(d<=2) return "ring2bg";
  if(d<=4) return "ring3bg";
  return "ring5bg";
}

function buildBoard(){
  metrics();
  cam.querySelectorAll(".hex").forEach(function(e){e.remove();});
  hexEls={};
  ALL_PLAY.forEach(function(c){makeHex(c[0],c[1],getBgClass(c[0],c[1]));});
  makeHex(0,0,false);
  S.hubs.forEach(function(c){makeHex(c[0],c[1],getBgClass(c[0],c[1]));});
  fitCameraToBoard();
}
function makeHex(q,r,bgClass){
  var k=key(q,r);
  if(hexEls[k]) return;
  var p=hexPos(q,r);
  var el=document.createElement("div");
  el.className="hex";
  if(bgClass) bgClass.split(" ").forEach(function(cls){if(cls)el.classList.add(cls);});
  el.style.left=p.x+"px";el.style.top=p.y+"px";
  var inner=document.createElement("div");inner.className="in";
  el.appendChild(inner);
  var df=document.createElement("div");df.className="durfill";
  inner.appendChild(df);
  if(q===0&&r===0) el.classList.add("core");
  cam.insertBefore(el, fx);
  hexEls[k]=el;
}

function refreshBoard(){
  var connected=computeConnectedToCore();
  ALL_PLAY.forEach(function(c){
    var el=hexEls[key(c[0],c[1])];if(!el)return;
    el.classList.remove("wire","wireP","gap","turret","lv2","on-purple","prevok","prevokP","prevng","crit","offline");
    var k=key(c[0],c[1]);
    if(hasWire(c[0],c[1])){
      var wd=wireData[k];
      el.classList.add(wd.col==="P"?"wireP":"wire");
      if(wd){
        var ratio=wd.hp/wd.maxHp;
        var fill=el.querySelector(".durfill");
        if(fill) fill.style.height=(ratio*100)+"%";
        if(ratio<=TILE_CRIT_RATIO) el.classList.add("crit");
        if(!wd.barEl) wd.barEl=fill;
      }
    } else { el.classList.add("gap"); }
    var t=turrets[k];
    if(t){
      el.classList.add("turret");
      if(t>=2) el.classList.add("lv2");
      /* 紫タイル上のタレットは on-purple クラスで紫系の色に */
      var wd2=wireData[k];
      if(wd2 && wd2.col==="P") el.classList.add("on-purple");
      if(!connected[k]) el.classList.add("offline");
      /* 砲身・台座・レベルバッジ要素を一度だけ追加する */
      if(!el._barrelAdded){
        el._barrelAdded=true;
        var inner2=el.querySelector(".in");
        if(inner2){
          var barrel=document.createElement("div");
          barrel.className="turret-barrel";
          inner2.appendChild(barrel);
          var pivot=document.createElement("div");
          pivot.className="turret-pivot";
          inner2.appendChild(pivot);
          var lvBadge=document.createElement("div");
          lvBadge.className="turret-lv";
          inner2.appendChild(lvBadge);
        }
      }
      /* レベル数字（LvX）を毎回更新 */
      var lvEl=el.querySelector(".turret-lv");
      if(lvEl) lvEl.textContent="Lv"+t;
      if(!el._rangeHoverBound){
        el._rangeHoverBound=true;
        var qq=c[0],rr=c[1];
        el.addEventListener("pointerover",function(ev){
          if(dragging!==null) return;
          showRangeRing(qq,rr);
        });
        el.addEventListener("pointerout",function(ev){
          hideRangeRing();
        });
      }
    } else {
      /* タレットが除去された場合（タイル破壊等）は砲身・台座・Lv バッジも除去 */
      if(el._barrelAdded){
        el._barrelAdded=false;
        var inner3=el.querySelector(".in");
        if(inner3){
          var oldBarrel=inner3.querySelector(".turret-barrel");
          if(oldBarrel) oldBarrel.remove();
          var oldPivot=inner3.querySelector(".turret-pivot");
          if(oldPivot) oldPivot.remove();
          var oldLv=inner3.querySelector(".turret-lv");
          if(oldLv) oldLv.remove();
        }
      }
    }
  });
  S.hubs.forEach(function(c){var el=hexEls[key(c[0],c[1])];if(el)el.classList.add("hub");});
  gapCells=ALL_PLAY.filter(function(c){return !hasWire(c[0],c[1]) && !hubs[key(c[0],c[1])];});
}

/* ====================================================
   カメラ制御
   ==================================================== */
var camScale=1.0;
var camTX=0, camTY=0;
var camDrag={active:false, startX:0, startY:0, origTX:0, origTY:0};
var edgeScroll={vx:0, vy:0, active:false};
var edgeScrollRAF=null;

function clampCam(){
  var outerCells=RING6;
  var xs=outerCells.map(function(c){return hexPos(c[0],c[1]).x*camScale+camTX;});
  var ys=outerCells.map(function(c){return hexPos(c[0],c[1]).y*camScale+camTY;});
  var minX=Math.min.apply(null,xs);
  var maxX=Math.max.apply(null,xs);
  var minY=Math.min.apply(null,ys);
  var maxY=Math.max.apply(null,ys);
  var margin=HEXW*camScale*0.5;
  if(maxX<margin) camTX+=margin-maxX;
  if(minX>PW-margin) camTX-=minX-(PW-margin);
  if(maxY<margin) camTY+=margin-maxY;
  if(minY>PH-margin) camTY-=minY-(PH-margin);
}

function applyCamTransform(animate){
  clampCam();
  if(animate){
    cam.style.transition="transform 0.45s cubic-bezier(.33,1,.55,1)";
  } else {
    cam.style.transition="none";
  }
  cam.style.transform="translate("+camTX+"px,"+camTY+"px) scale("+camScale+")";
  cam.style.transformOrigin="0 0";
}

function fitCameraToBoard(){
  var allCells=buildRing(6);
  var xs=allCells.map(function(c){return hexPos(c[0],c[1]).x;});
  var ys=allCells.map(function(c){return hexPos(c[0],c[1]).y;});
  var minX=Math.min.apply(null,xs)-HEXW*0.6;
  var maxX=Math.max.apply(null,xs)+HEXW*0.6;
  var minY=Math.min.apply(null,ys)-HEXH*0.6;
  var maxY=Math.max.apply(null,ys)+HEXH*0.6;
  var bboxW=maxX-minX;
  var bboxH=maxY-minY;
  var fitScale=Math.min(PW/bboxW, PH/bboxH, 1.0)*0.88;
  if(fitScale<0.18) fitScale=0.18;
  var bbCX=(minX+maxX)/2;
  var bbCY=(minY+maxY)/2;
  camScale=fitScale;
  camTX=PW/2 - bbCX*fitScale;
  camTY=PH/2 - bbCY*fitScale;
  applyCamTransform(true);
}

function boardToCam(bx, by){
  return {x:(bx-camTX)/camScale, y:(by-camTY)/camScale};
}

function boardPt(e){
  var r=board.getBoundingClientRect();
  return {bx:e.clientX-r.left, by:e.clientY-r.top};
}

function startCamDrag(e){
  var bp=boardPt(e);
  camDrag.active=true;
  camDrag.startX=bp.bx;camDrag.startY=bp.by;
  camDrag.origTX=camTX;camDrag.origTY=camTY;
  board.classList.add("dragging-cam");
  window.addEventListener("pointermove",onCamDragMove);
  window.addEventListener("pointerup",onCamDragEnd);
}
function onCamDragMove(e){
  if(!camDrag.active)return;
  var bp=boardPt(e);
  var dx=bp.bx-camDrag.startX;
  var dy=bp.by-camDrag.startY;
  camTX=camDrag.origTX+dx;
  camTY=camDrag.origTY+dy;
  applyCamTransform(false);
}
function onCamDragEnd(e){
  if(!camDrag.active)return;
  camDrag.active=false;
  board.classList.remove("dragging-cam");
  window.removeEventListener("pointermove",onCamDragMove);
  window.removeEventListener("pointerup",onCamDragEnd);
}

/* ---- 画面端スクロール ---- */
var EDGE_SPEED=3.5;
var EDGE_THRESH_H=0.12;
var EDGE_THRESH_W=0.10;

function updateEdgeZones(bx, by){
  var BW=board.clientWidth, BH=board.clientHeight;
  var vx=0, vy=0;
  var ez_t=$('#ez-top'), ez_b=$('#ez-bottom'), ez_l=$('#ez-left'), ez_r=$('#ez-right');
  if(by < BH*EDGE_THRESH_H){vy=EDGE_SPEED*(1-(by/(BH*EDGE_THRESH_H)));ez_t.classList.add("active");}
  else {ez_t.classList.remove("active");}
  if(by > BH*(1-EDGE_THRESH_H)){vy=-EDGE_SPEED*(1-((BH-by)/(BH*EDGE_THRESH_H)));ez_b.classList.add("active");}
  else {ez_b.classList.remove("active");}
  if(bx < BW*EDGE_THRESH_W){vx=EDGE_SPEED*(1-(bx/(BW*EDGE_THRESH_W)));ez_l.classList.add("active");}
  else {ez_l.classList.remove("active");}
  if(bx > BW*(1-EDGE_THRESH_W)){vx=-EDGE_SPEED*(1-((BW-bx)/(BW*EDGE_THRESH_W)));ez_r.classList.add("active");}
  else {ez_r.classList.remove("active");}
  edgeScroll.vx=vx;edgeScroll.vy=vy;
  var wasActive=edgeScroll.active;
  edgeScroll.active=(vx!==0||vy!==0);
  if(edgeScroll.active && !wasActive) runEdgeScroll();
}

function clearEdgeZones(){
  edgeScroll.vx=0;edgeScroll.vy=0;edgeScroll.active=false;
  ['#ez-top','#ez-bottom','#ez-left','#ez-right'].forEach(function(s){$(s).classList.remove("active");});
}

function runEdgeScroll(){
  if(!edgeScroll.active){edgeScrollRAF=null;return;}
  camTX+=edgeScroll.vx;
  camTY+=edgeScroll.vy;
  applyCamTransform(false);
  edgeScrollRAF=requestAnimationFrame(runEdgeScroll);
}

var rangeRingEl = null;

/* タレット射程: リング 2 つ分の半径に固定 */
var TURRET_RANGE_U = 38;

function getRangeRadius(){
  return U * TURRET_RANGE_U;
}

function showRangeRing(q, r){
  if(!rangeRingEl){
    rangeRingEl = document.createElement("div");

}

function spawnBullet(tx, ty, ex, ey){
  var bul = document.createElement("div");

  bul.style.height = size + "px";

function spawnHitFx(ex, ey){

}

/* ====================================================
   Wave 残り時間ゲージ制御
   ==================================================== */
var waveTimerRAF = null;

function startWaveTimerBar(durationMs){
  waveTimerStartMs = Date.now();
  waveTimerDurationMs = durationMs;
  var barEl = $("#wave-timer-bar");
  var fillEl = $("#wave-timer-fill");
  var labelEl = $("#wave-timer-label");
  barEl.style.display = "block";
  labelEl.style.display = "block";
  if(waveTimerRAF){ cancelAnimationFrame(waveTimerRAF); waveTimerRAF=null; }
  (function updateBar(){
    var elapsed = Date.now() - waveTimerStartMs;
    var ratio = Math.max(0, 1 - elapsed / waveTimerDurationMs);
    fillEl.style.width = (ratio * 100) + "%";
    // ゲージ色: 残り 30% 以下で赤く
    if(ratio < 0.3){
      fillEl.style.background = "linear-gradient(to right,#a00,#f44,#f88)";
    } else if(ratio < 0.6){
      fillEl.style.background = "linear-gradient(to right,#862,#fc4,#ffa)";
    } else {
      fillEl.style.background = "linear-gradient(to right,var(--cyan-g2),var(--cyan-g1),#6ff)";
    }
    var remaining = Math.ceil((waveTimerDurationMs - elapsed) / 1000);
    if(remaining < 0) remaining = 0;
    var nextWave = currentWave + 2; // 0-indexed+1+1
    if(nextWave <= TOTAL_WAVES){
      labelEl.textContent = "Wave " + nextWave + " まで " + remaining + "s";
    } else {
      labelEl.textContent = "";
    }
    if(ratio > 0 && running){
      waveTimerRAF = requestAnimationFrame(updateBar);
    } else {
      stopWaveTimerBar();
    }
  })();
}

function stopWaveTimerBar(){
  if(waveTimerRAF){ cancelAnimationFrame(waveTimerRAF); waveTimerRAF=null; }
  var barEl = $("#wave-timer-bar");
  var labelEl = $("#wave-timer-label");
  if(barEl) barEl.style.display = "none";
  if(labelEl) labelEl.style.display = "none";
}

/* ---- カード pointerdown：タイルドラッグ開始 ---- */
function onCardDown(e){
  /* 準備フェーズ・通常 running どちらでも配置可能 */
  if(!running && !prepPhase) return;
  var idx=+this.dataset.idx, c=hand[idx];
  if(c.cost>energy) return;
  e.stopPropagation();
  dragging=idx; dragCard=c;
  hideRangeRing();
  this.classList.add("sel");
  ghost.className=(c.col==="P"?"cP":"cC");
  buildGhost(c);
  ghost.style.display="block";
  moveGhost(e);
  window.addEventListener("pointermove",onTileMove);
  window.addEventListener("pointerup",onTileUp);
  window.addEventListener("pointercancel",onTileCancel);
}
function buildGhost(c){
  var sh=shapeById(c.shape);
  var gm=ghost.querySelector(".gmini");
  var stepX=U*4.0, stepY=U*4.6;
  var html="";
  sh.cells.forEach(function(o){
    var lx=o[0]*stepX + o[1]*stepX*0.5;
    var ly=o[1]*stepY;
    var isTur=(c.turretAt && c.turretAt[0]===o[0] && c.turretAt[1]===o[1]);
    html+='<i class="'+(isTur?"tur":"")+'" style="left:'+lx+'px;top:'+ly+'px;"></i>';
  });
  gm.innerHTML=html;
}
function localPt(e){
  var r=$("#phone").getBoundingClientRect();
  return {x:e.clientX-r.left,y:e.clientY-r.top};
}
function moveGhost(e){
  var p=localPt(e);
  ghost.style.left=p.x+"px";ghost.style.top=p.y+"px";
}
function boardPtFromEvent(e){
  var r=board.getBoundingClientRect();
  return {bx:e.clientX-r.left, by:e.clientY-r.top};
}
function nearestAnchorGap(e){
  var bp=boardPtFromEvent(e);
  var cam2=boardToCam(bp.bx,bp.by);
  var best=null,bd=1e9;
  gapCells.forEach(function(c){
    var hp2=hexPos(c[0],c[1]);
    var d=(cam2.x-hp2.x)*(cam2.x-hp2.x)+(cam2.y-hp2.y)*(cam2.y-hp2.y);
    if(d<bd){bd=d;best=c;}
  });
  if(best && bd<(HEXW*HEXW*1.4)) return best;
  return null;
}
function clearPreview(){
  Object.keys(hexEls).forEach(function(k){
    var el=hexEls[k];
    if(el) el.classList.remove("prevok","prevokP","prevng");
  });
}

function onTileMove(e){
  if(dragging===null) return;
  moveGhost(e);
  var r=board.getBoundingClientRect();
  var bx=e.clientX-r.left, by=e.clientY-r.top;
  if(bx>=0 && bx<=PW && by>=0 && by<=PH){
    updateEdgeZones(bx,by);
  } else {
    clearEdgeZones();
  }
  refreshBoard();
  clearPreview();
  var anchor=nearestAnchorGap(e);
  if(!anchor) return;
  var ok=canPlacePiece(dragCard,anchor[0],anchor[1]);
  var cells=pieceCellsAt(dragCard,anchor[0],anchor[1]);
  if(ok){
    var cls=(dragCard.col==="P"?"prevokP":"prevok");
    cells.forEach(function(cc){
      var el=hexEls[key(cc[0],cc[1])];
      if(el){el.classList.remove("gap");el.classList.add(cls);}
    });
  } else {
    cells.forEach(function(cc){
      var el=hexEls[key(cc[0],cc[1])];
      if(el){el.classList.remove("gap");el.classList.add("prevng");}
    });
  }
}

function cancelTileDrag(){
  dragging=null;dragCard=null;
  ghost.style.display="none";
  clearEdgeZones();
  window.removeEventListener("pointermove",onTileMove);
  window.removeEventListener("pointerup",onTileUp);
  window.removeEventListener("pointercancel",onTileCancel);
  var selEl=cardsEl.querySelector(".sel");if(selEl)selEl.classList.remove("sel");
  clearPreview();
  refreshBoard();
}
function onTileCancel(){
  if(dragging===null) return;
  cancelTileDrag();
}
function onTileUp(e){
  if(dragging===null) return;
  var idx=dragging, c=dragCard;
  cancelTileDrag();

  var placed=false;
  /* 配置前の通電集合を退避（接続成立検出＝ウェーブ点滅のため） */
  var prevConnected=computeConnectedToCore();
  var anchor=nearestAnchorGap(e);
  if(anchor && canPlacePiece(c,anchor[0],anchor[1])){
    var cells=pieceCellsAt(c,anchor[0],anchor[1]);
    cells.forEach(function(cc){
      setWire(cc[0],cc[1],c.col);
      if(!prepPhase) checkEnemiesOnNewTile(hexPos(cc[0],cc[1]));
    });
    var tc=pieceTurretCellAt(c,anchor[0],anchor[1]);
    if(tc){ placeOrAbsorbTurret(tc[0],tc[1]); }
    placed=true;
  } else if(anchor){
    flashMsg("ここには丸ごと収まらない。別の欠けセルへ");
  }

  if(placed){
    energy-=c.cost;
    drawFreshHand();
    refreshBoard();renderHand();
    updateHud();
    checkTurretPower();
    /* 接続成立時：コア→新規通電タレットのルートをウェーブ状に1回点滅 */
    triggerConnectionPulse(prevConnected);
    checkLoop();
    if(c.col==="P"){ flashMsg("色不一致タイル設置。通電しないが敵を足止めする盾だ"); }
  } else {
    refreshBoard();
  }
}

board.addEventListener("pointerdown",function(e){
  if(!running && !prepPhase) return;
  if(dragging!==null) return;
  startCamDrag(e);
});

/* ---- タレット通電チェック ---- */
function checkTurretPower(){
  var connected=computeConnectedToCore();
  ALL_PLAY.forEach(function(c){
    var k=key(c[0],c[1]);
    var t=turrets[k];
    if(!t) return;
    if(connected[k]){
      var el=hexEls[k];
      if(el && el.classList.contains("offline")){
        flashTurretOnline(c[0],c[1]);
      }
    }
  });
}
function flashTurretOnline(q,r){
  var tp=hexPos(q,r);
  var popFx=document.createElement("div");popFx.className="pop";popFx.textContent="ON";
  popFx.style.left=tp.x+"px";popFx.style.top=tp.y+"px";
  popFx.style.fontSize="calc("+U*5+"px)";popFx.style.color="#6ff";
  fx.appendChild(popFx);
  var t0=performance.now();
  (function up(t){var e=(t-t0)/600;if(e>1){popFx.remove();return;}
    popFx.style.top=(tp.y-e*U*8)+"px";popFx.style.opacity=String(1-e);requestAnimationFrame(up);})(t0);
  var s=document.createElement("div");s.className="shock";
  s.style.left=tp.x+"px";s.style.top=tp.y+"px";
  var sz=U*2;s.style.width=sz+"px";s.style.height=sz+"px";
  fx.appendChild(s);
  var t1=performance.now();
  (function grow(t){
    var e=(t-t1)/400;if(e>1){s.remove();return;}
    var d=U*2+e*U*28;
    s.style.width=d+"px";s.style.height=d+"px";s.style.opacity=String(1-e);
    requestAnimationFrame(grow);
  })(t1);
}

/* ====================================================
   通電ウェーブパルス
   接続が成立した瞬間、コア(0,0)→新規通電タレットまでの
   シアン配線ルートを BFS の最短経路で割り出し、
   起点(コア)から終点(タレット)へ向けて時間差で順に
   1 回だけ点滅させる進行波を流す。
   ==================================================== */

/* コア(0,0)から指定セルまでの BFS 最短経路（セル配列）を返す。
   通電可能（シアン配線 or hub）なセルのみ伝播する。
   tk: "q,r" 形式の終点キー。到達不能なら null。 */
function bfsRouteToCore(tk){
  if(tk===key(0,0)) return [[0,0]];
  var prev={};
  var visited={};
  var startK=key(0,0);
  visited[startK]=true;
  var queue=[[0,0]];
  while(queue.length>0){
    var cur=queue.shift();
    var cq=cur[0],cr=cur[1];
    var ck=key(cq,cr);
    if(ck===tk){
      // 経路復元（コア→終点の順）
      var path=[];
      var k=tk;
      while(k!==undefined){
        var p=k.split(",");
        path.push([parseInt(p[0],10),parseInt(p[1],10)]);
        k=prev[k];
      }
      path.reverse();
      return path;
    }
    for(var i=0;i<HEX_DIRS.length;i++){
      var nq=cq+HEX_DIRS[i][0], nr=cr+HEX_DIRS[i][1];
      var nk=key(nq,nr);
      if(visited[nk]) continue;
      // 終点セル自身、または通電可能なセル（シアン配線 / hub）のみ辿る
      var passable=(nk===tk) || (hasWire(nq,nr)&&wireCol(nq,nr)==="C") || hubs[nk];
      if(!passable) continue;
      visited[nk]=true;
      prev[nk]=ck;
      queue.push([nq,nr]);
    }
  }
  return null;
}

/* 指定セルに 1 回だけウェーブパルスのフラッシュを出す */
function spawnWavePulseAt(q,r){
  var p=hexPos(q,r);
  var el=document.createElement("div");
  el.className="wave-pulse";
  el.style.left=p.x+"px";
  el.style.top=p.y+"px";
  fx.appendChild(el);
  // アニメーション終了で自動除去（フォールバックの setTimeout 併用）
  var removed=false;
  function rm(){ if(removed) return; removed=true; if(el.parentNode) el.parentNode.removeChild(el); }
  el.addEventListener("animationend",rm);
  setTimeout(rm,700);
}

/* ルート（コア→終点のセル配列）を起点から終点へ時間差で 1 回だけ点滅させる */
function playRoutePulse(route){
  if(!route || route.length===0) return;
  var STEP_MS=70; // セル間の進行波の時間差
  route.forEach(function(cell,idx){
    setTimeout(function(){
      spawnWavePulseAt(cell[0],cell[1]);
    }, idx*STEP_MS);
  });
}

/* 配置前後の通電集合を比較し、新たにコア通電したタレットへ
   コア→タレットのルートをウェーブ点滅させる。
   prevConnected: 配置前の computeConnectedToCore() 結果 */
function triggerConnectionPulse(prevConnected){
  var nowConnected=computeConnectedToCore();
  var fired={};
  ALL_PLAY.forEach(function(c){
    var k=key(c[0],c[1]);
    if(!turrets[k]) return;
    // 新たに通電したタレットのみ（配置前は未通電 → 配置後は通電）
    if(nowConnected[k] && !prevConnected[k]){
      var route=bfsRouteToCore(k);
      if(route){
        // 同一フレームでの経路重複点滅を避けつつ各ルートを流す
        var sig=route.map(function(rc){return key(rc[0],rc[1]);}).join("|");
        if(fired[sig]) return;
        fired[sig]=true;
        playRoutePulse(route);
      }
    }
  });
}

/* ====================================================
   タレット設置／隣接吸収（レベルアップ）
   設置先セルの隣接 6 方向に既存タレットがある場合は、
   新規設置せず、その隣接タレット（最も低レベルの 1 基）の
   レベルを +1 する（新規設置がレベルアップに変換される）。
   隣接タレットが無ければ Lv1 のタレットを新規設置する。
   ==================================================== */
function placeOrAbsorbTurret(q,r){
  var absorbK=null, absorbLv=1e9;
  for(var i=0;i<HEX_DIRS.length;i++){
    var nq=q+HEX_DIRS[i][0], nr=r+HEX_DIRS[i][1];
    var nk=key(nq,nr);
    var nt=turrets[nk];
    if(nt){
      /* 隣接タレットのうち最も低レベルの 1 基に吸収させる */
      if(nt<absorbLv){ absorbLv=nt; absorbK=nk; }
    }
  }
  if(absorbK){
    /* 既存隣接タレットへ吸収＝レベル +1（新規設置はしない） */
    turrets[absorbK]+=1;
    /* 吸収先セルへポンプ演出を付与（次の refreshBoard 後に発火） */
    flashTurretAbsorb(absorbK,turrets[absorbK]);
  } else {
    /* 隣接タレットなし → Lv1 で新規設置 */
    turrets[key(q,r)]=1;
  }
}

/* 吸収（レベルアップ）演出：吸収先のタレットにポンプアニメと Lv ポップを出す */

    popFx.style.top=(tp.y-e*U*9)+"px";popFx.style.opacity=String(1-e);requestAnimationFrame(up);})(t0);
}

function checkEnemiesOnNewTile(fp){
  enemies.forEach(function(en){
    if(en.dead||en.digging) return;
    var ex=en.x,ey=en.y;
    var dd=(ex-fp.x)*(ex-fp.x)+(ey-fp.y)*(ey-fp.y);
    if(dd < (HEXW*0.6)*(HEXW*0.6)){
      en.digging=true;
      var bestK=null,bestD=1e9;
      ALL_PLAY.forEach(function(c){
        var k2=key(c[0],c[1]);

        var d2=(en.x-cp.x)*(en.x-cp.x)+(en.y-cp.y)*(en.y-cp.y);
        if(d2<bestD){bestD=d2;bestK=k2;}
      });
      en.digTarget=bestK;
      en.el.classList.add("digging");
    }
  });
}

var coreP;

/* ---- tick毎の攻撃クールダウン管理 ---- */
var turretAttackCooldown = {};
var ATTACK_CD_TICKS = 4;

function tick(){
  if(!running)return;
  if(!coreP)coreP=hexPos(0,0);
  var connected=computeConnectedToCore();
  enemies.forEach(function(en){
    if(en.dead)return;
    if(en.digging && en.digTarget){
      var wd=wireData[en.digTarget];
      if(!wd){
        en.digging=false;en.digTarget=null;
        if(en.el) en.el.classList.remove("digging");
      } else {
        var dmg=TILE_ATTACK_RATE*(en.boss?3:(en.fast?1.5:1));
        wd.hp-=dmg;
        if(wd.barEl) wd.barEl.style.height=Math.max(0,(wd.hp/wd.maxHp)*100)+"%";
        var hexEl=hexEls[en.digTarget];
        if(hexEl){
          var ratio=wd.hp/wd.maxHp;
          if(ratio<=TILE_CRIT_RATIO) hexEl.classList.add("crit");
          else hexEl.classList.remove("crit");
        }
        if(wd.hp<=0){
          var parts=en.digTarget.split(",");
          var dq=parseInt(parts[0]),dr=parseInt(parts[1]);
          destroyTile(dq,dr);
          en.digging=false;en.digTarget=null;
          if(en.el) en.el.classList.remove("digging");
          flashMsg("タイルが破壊された！配線を引き直してタレットを再接続");
        }
        return;
      }
    }
    var dx=coreP.x-en.x,dy=coreP.y-en.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<U*7){
      en.dead=true;hp-=en.boss?34:(en.fast?7:9);if(hp<0)hp=0;
      updateHud();
      if(hp<=0){lose();}
    } else {
      en.x+=dx/d*en.sp;en.y+=dy/d*en.sp;
      en.el.style.left=en.x+"px";en.el.style.top=en.y+"px";
      en.bar.style.width=Math.max(0,en.hp/en.max*100)+"%";
      if(!en.digging){
        var landed=checkEnemyOnTile(en);
        if(landed){
          en.digging=true;en.digTarget=landed;
          if(en.el) en.el.classList.add("digging");
        }
      }
    }
  });
  cleanEnemies();

  // タレット射撃＋砲身方向更新
  // レベル強化：レベル L のタレットは
  //   攻撃力 / 連射速度 / 射程 = それぞれ 1.2^(L-1) 倍（累乗）
  //   同時攻撃数 = L（最近傍 L 体に同時着弾）
  var energyBefore=energy;
  ALL_PLAY.forEach(function(c){
    var k=key(c[0],c[1]);
    var t=turrets[k];if(!t)return;
    if(!connected[k]) return;
    var lvMul=Math.pow(1.2, t-1);              // レベル倍率（攻撃力・連射・射程共通）
    var range = U * TURRET_RANGE_U * lvMul;     // 射程：レベルで拡大
    var rangeSq = range*range;
    var tp=hexPos(c[0],c[1]);
    var alive=enemies.filter(function(e){return !e.dead;});
    /* 射程内の敵を距離昇順に並べ、上位 L 体を同時攻撃対象とする */
    var inRange=[];
    alive.forEach(function(e){
      var dd=(e.x-tp.x)*(e.x-tp.x)+(e.y-tp.y)*(e.y-tp.y);
      if(dd<rangeSq) inRange.push({e:e,d:dd});
    });
    inRange.sort(function(a,b){return a.d-b.d;});
    var targets=inRange.slice(0, t);            // 最大 L 体
    /* 最近傍敵（射程内優先・なければ全体最近傍）を砲身の向き基準にする */
    var aimTgt=null;
    if(targets.length>0){ aimTgt=targets[0].e; }
    else {
      var nearAll=null,nd=1e9;
      alive.forEach(function(e){var dd=(e.x-tp.x)*(e.x-tp.x)+(e.y-tp.y)*(e.y-tp.y);if(dd<nd){nd=dd;nearAll=e;}});
      aimTgt=nearAll;
    }

    /* 砲身方向を更新：攻撃対象 or 最近傍敵の方向 */
    var hexEl2=hexEls[k];
    if(hexEl2){
      var barrel=hexEl2.querySelector(".turret-barrel");
      if(barrel){
        var aimAngleDeg=0; // デフォルト（右向き）
        if(aimTgt){
          var adx=aimTgt.x-tp.x, ady=aimTgt.y-tp.y;
          aimAngleDeg=Math.atan2(ady,adx)*180/Math.PI;
        }
        var transformVal="translateY(-50%) rotate("+aimAngleDeg+"deg)";
        barrel.style.setProperty("--bangle",aimAngleDeg+"deg");
        barrel.style.transform=transformVal;
      }
    }

    if(targets.length>0){
      var dmg=0.22*lvMul; // 攻撃力：レベルで上昇
      var fired=false;
      var canFire=(!turretAttackCooldown[k] || turretAttackCooldown[k]<=0);
      targets.forEach(function(it){
        var tgt=it.e;
        tgt.hp-=dmg;
        if(tgt.hp<=0){tgt.dead=true;energy+=tgt.boss?3:(tgt.fast?1:2);}
        if(canFire){ spawnBullet(tp.x, tp.y, tgt.x, tgt.y); fired=true; }
      });
      if(canFire){
        /* 発砲時：砲身にリコイルアニメーション */
        if(hexEl2){
          var barrel2=hexEl2.querySelector(".turret-barrel");
          if(barrel2){
            barrel2.style.animation="none";
            /* reflow を強制してアニメーションをリセット */
            void barrel2.offsetWidth;
            barrel2.style.animation="barrel-recoil .12s ease-out";
          }
        }
        /* 連射速度：レベルで CD 短縮（最低 1 tick） */
        var cd=Math.max(1, Math.round(ATTACK_CD_TICKS/lvMul));
        turretAttackCooldown[k]=cd;
      } else {
        turretAttackCooldown[k]--;
      }
    }
  });
  if(energy!==energyBefore){ updateHud(); }
  cleanEnemies();

  if(running && !cleared){
    var rem=enemies.filter(function(e){return !e.dead;}).length;
    if(rem===0 && allWavesSpawned){ advanceStage(); }
  }
}

function checkEnemyOnTile(en){
  var found=null;
  ALL_PLAY.forEach(function(c){
    var k=key(c[0],c[1]);
    if(!wireData[k]) return;
    var tp=hexPos(c[0],c[1]);
    var dd=(en.x-tp.x)*(en.x-tp.x)+(en.y-tp.y)*(en.y-tp.y);
    if(dd < (HEXW*0.55)*(HEXW*0.55)){found=k;}

  $("#wave-disp").textContent=(currentWave+1)+"/"+TOTAL_WAVES;
  $("#enemies").textContent=enemies.filter(function(e){return !e.dead;}).length;
  $("#energy").textContent=energy;
  refreshCardAffordability();
}

/* ---- ENERGY 変動時のカード購入可否を再評価 ---- */
function refreshCardAffordability(){
  if(!cardsEl) return;
  var cards=cardsEl.querySelectorAll(".card");
  for(var i=0;i<cards.length;i++){
    var el=cards[i];
    var c=hand[+el.dataset.idx];
    if(!c) continue;
    el.classList.toggle("dis", c.cost>energy);
  }
  updateRerollButton();
}

/* ---- カード使用後の手札全引き直し（CARD_POOL からランダム抽選）---- */
function drawFreshHand(){
  var cPool = CARD_POOL.filter(function(c){return c.col==="C";});
  var pPool = CARD_POOL.filter(function(c){return c.col==="P";});

  function shuffle(arr){
    var a=arr.slice();
    for(var i=a.length-1;i>0;i--){
      var j=Math.floor(Math.random()*(i+1));
      var tmp=a[i];a[i]=a[j];a[j]=tmp;
    }
    return a;
  }

  var shuffledC = shuffle(cPool);
  var shuffledP = shuffle(pPool);

  var cCount = 2 + Math.floor(Math.random() * 3); // 2,3,4 のいずれか
  if(cCount > shuffledC.length) cCount = shuffledC.length;
  var picked = shuffledC.slice(0, cCount);

  var remain = 5 - cCount;
  var pPicked = shuffledP.slice(0, Math.min(remain, shuffledP.length));
  picked = picked.concat(pPicked);
  if(picked.length < 5){
    var moreC = shuffledC.slice(cCount);
    picked = picked.concat(moreC.slice(0, 5 - picked.length));
  }

  hand = picked.slice(0, 5).map(function(c){return Object.assign({}, c);});
}

/* ---- リロール ---- */
$("#reroll").addEventListener("pointerdown",function(){
  if(!running && !prepPhase) return;
  if(rerollFreeAvailable){
    /* 各ステージ初回のリロールは無料：energy を消費せず、コストも逓増させない。
       無料権を消費して 2 回目以降を従来コストに切り替える。 */
    rerollFreeAvailable=false;
    drawFreshHand();
    renderHand();updateHud();
    flashMsg("初回リロールは無料！手札を引き直した。砲タイルをコアへ繋げ");
    return;
  }
  if(rerollCost>energy)return;
  energy-=rerollCost;rerollCost+=2;
  drawFreshHand();
  renderHand();updateHud();
  flashMsg("手札を引き直した。砲タイルをコアへ繋いでタレットを通電させろ");
});

function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

/* ====================================================
   準備フェーズ：START ボタン
   ==================================================== */
function showPrepPhase(){
  prepPhase=true;
  running=false;
  var startBtn=$("#start-btn");
  var startLabel=$("#start-label");
  startBtn.style.display="block";
  startLabel.style.display="block";
  flashMsg("タレットを配置して準備せよ。準備ができたら START WAVE 1 を押せ");
}

function hidePrepPhase(){
  prepPhase=false;
  var startBtn=$("#start-btn");
  var startLabel=$("#start-label");
  startBtn.style.display="none";
  startLabel.style.display="none";
}

$("#start-btn").addEventListener("pointerdown",function(){
  if(!prepPhase) return;
  hidePrepPhase();
  running=true;
  // Wave 1 スポーン → 10 秒後に Wave 2
  spawnWave();
  waveTimer=setTimeout(advanceWave, WAVE_INTERVAL);
  startWaveTimerBar(WAVE_INTERVAL);
});

/* ---- 初回ステージロード（リトライ用） ---- */
function loadStage(){
  currentStage=1;
  S=STAGE;cleared=false;running=false;spawned=false;
  prepPhase=false;
  currentWave=0;allWavesSpawned=false;
  if(waveTimer){clearTimeout(waveTimer);waveTimer=null;}
  stopWaveTimerBar();
  /* ドラッグ中リセット */
  if(dragging!==null){
    dragging=null;dragCard=null;
    ghost.style.display="none";
    clearEdgeZones();
    window.removeEventListener("pointermove",onTileMove);
    window.removeEventListener("pointerup",onTileUp);
    window.removeEventListener("pointercancel",onTileCancel);
    var selEl=cardsEl.querySelector(".sel");if(selEl)selEl.classList.remove("sel");
  }
  /* 前プレイの敵 DOM を全除去してから配列をクリア */
  enemies.forEach(function(en){ if(en.el){ en.el.remove(); en.el=null; } });
  wireData={};hubs={};turrets={};enemies=[];coreP=null;
  turretAttackCooldown={};
  rangeRingEl=null;
  /* Stage 1 は係数 ×1.0（ベース値） */
  WAVES = buildScaledWaves();
  TILE_ATTACK_RATE = 0.7;
  hp=S.hp;energy=S.energy;rerollCost=S.reroll;rerollFreeAvailable=true;
  S.wires.forEach(function(c){setWire(c[0],c[1],c[2]||"C");});
  S.hubs.forEach(function(c){hubs[key(c[0],c[1])]=1;});
  S.turrets.forEach(function(c){turrets[key(c[0],c[1])]=c[2];});
  /* 初期手札もプールからランダムドロー */
  drawFreshHand();
  buildBoard();refreshBoard();renderHand();
  $("#modal").style.display="none";
  flashMsg(S.tip);
  updateHud();
  // 準備フェーズ開始（Wave 1 前のみ）
  showPrepPhase();
  requestAnimationFrame(function(){
    metrics();
    renderHand();
  });
}
function win(){
  /* win() は使用しない。ステージクリアは advanceStage() が担う */
}
function lose(){
  if(cleared)return;cleared=true;running=false;
  if(waveTimer){clearTimeout(waveTimer);waveTimer=null;}
  stopWaveTimerBar();
  cancelTileDrag();
  clearEdgeZones();hideRangeRing();
  var m=$("#modal");
  $("#mtitle").textContent="CORE LOST";
  $("#mtext").textContent="Stage "+currentStage+" でコアが陥落した。\n最高ステージに到達した記録を胸に再挑戦せよ。";
  $("#mbtn").textContent="リトライ";
  m.style.display="flex";
}
$("#mbtn").addEventListener("pointerdown",function(){
  loadStage();
});

window.addEventListener("resize",function(){
  if(S){ metrics(); buildBoard(); refreshBoard(); coreP=null; }
});

setInterval(tick,55);
loadStage();
})();
</script>
