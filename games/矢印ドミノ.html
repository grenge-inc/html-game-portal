<!DOCTYPE html>
<!--
  Phone frame template for hybrid-casual-mentor generated games.
  Aspect ratio: 9:19.5 (iPhone X 系縦長, NEONNOVA2048 基準)。
  PC で開いても常にこの比率を保ち、letterbox（左右黒帯）で中央表示。
  すべてのゲーム要素は #phone の子として配置すること。
-->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>矢印ドミノ</title>
<style>
  :root {
    --phone-aspect: 9 / 19.5;
    /* カラートークン */
    --bg-deep: #02030a;
    --bg-mid: #0a0820;
    --bg-panel: #06081a;
    --bg-card: #0b0e28;
    --line: #1a2040;
    --arrow-active: #ff8c00;
    --arrow-glow: #ffb84a;
    --arrow-core: #fff0c0;
    --ghost-color: rgba(255,180,60,0.22);
    --ghost-border: rgba(255,160,40,0.45);
    --fire-1: #ff4400;
    --fire-2: #ff8800;
    --fire-3: #ffcc00;
    --fire-4: #fff0a0;
    --chain-color: #ffaa22;
    --text-main: #eaf3ff;
    --text-sub: #cdddef;
    --text-dim: #7a92b5;
    --accent: #ff9500;
    --accent-bright: #ffcc44;
    --clear-color: #44ffaa;
    --hud-bg: rgba(2,3,10,0.85);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html, body {
    width:100%; height:100%;
    overflow:hidden;
    background: var(--bg-deep);
    color: var(--text-main);
    font-family:'Helvetica Neue', system-ui, sans-serif;
    user-select:none;
    -webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
  }
  body {
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #phone {
    position:relative;
    overflow:hidden;
    width:  min(100vw, calc(100vh * 9 / 19.5));
    height: min(100vh, calc(100vw * 19.5 / 9));
    --pw:   min(100vw, calc(100vh * 9 / 19.5));
    --ph:   min(100vh, calc(100vw * 19.5 / 9));
    --u:    calc(var(--pw) / 100);
    --uh:   calc(var(--ph) / 100);
    background: radial-gradient(ellipse at 50% 25%, var(--bg-mid) 0%, var(--bg-panel) 40%, var(--bg-deep) 100%);
  }
  /* 背景星 */
  #bg-stars {
    position:absolute;
    top:0;left:0;right:0;bottom:0;
    pointer-events:none;
    z-index:0;
    overflow:hidden;
  }
  #bg-stars span {
    position:absolute;
    border-radius:50%;
    background:var(--fire-3);
    animation: star-twinkle var(--tw,3s) var(--td,0s) infinite ease-in-out alternate;
    opacity:var(--op,0.4);
  }
  @keyframes star-twinkle {
    0%  { opacity: var(--op,0.4); transform:scale(1); }
    100%{ opacity: calc(var(--op,0.4)*0.25); transform:scale(0.6); }
  }
  /* HUD */
  #hud {
    position:absolute;
    top:0; left:0; right:0;
    height: calc(var(--uh)*10);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 0 calc(var(--u)*4);
    background: var(--hud-bg);
    border-bottom: 1px solid var(--line);
    z-index:10;
  }
  #stage-label {
    font-size: calc(var(--u)*3.4);
    font-weight:900;
    letter-spacing:0.15em;
    background: linear-gradient(135deg, var(--accent-bright), var(--arrow-glow));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    text-transform:uppercase;
  }
  #stage-goal {
    font-size: calc(var(--u)*2.4);
    padding: calc(var(--u)*0.8) calc(var(--u)*2.2);
    border-radius: calc(var(--u)*2);
    border: 1px solid var(--ghost-border);
    color: var(--accent-bright);
    background: rgba(255,150,0,0.12);
    letter-spacing:0.06em;
    font-weight:600;
  }
  #arrows-count {
    font-size: calc(var(--u)*3.6);
    font-weight:900;
    font-variant-numeric: tabular-nums;
    color: var(--arrow-glow);
    text-shadow: 0 0 calc(var(--u)*2) var(--arrow-glow),
                 0 0 calc(var(--u)*4) var(--fire-2);
  }
  /* ゲームキャンバス */
  #game-canvas {
    position:absolute;
    top: calc(var(--uh)*10);
    left:0; right:0;
    bottom: calc(var(--uh)*10);
    overflow:hidden;
  }
  #grid-canvas {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
  }
  /* フッター */
  #footer {
    position:absolute;
    bottom:0; left:0; right:0;
    height: calc(var(--uh)*10);
    display:flex;
    align-items:center;
    justify-content:center;
    background: var(--hud-bg);
    border-top: 1px solid var(--line);
    z-index:10;
  }
  #hint-text {
    font-size: calc(var(--u)*2.8);
    color: var(--text-dim);
    letter-spacing:0.05em;
    text-align:center;
  }
  /* モーダル共通 */
  .modal {
    position:absolute;
    top:0; left:0; right:0; bottom:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background: rgba(2,3,10,0.93);
    z-index:100;
    opacity:0;
    pointer-events:none;
    transition: opacity 0.3s ease;
  }
  .modal.show {
    opacity:1;
    pointer-events:all;
  }
  .modal-title {
    font-size: calc(var(--u)*9);
    font-weight:900;
    letter-spacing:0.08em;
    margin-bottom: calc(var(--uh)*2);
    text-align:center;
  }
  .modal-sub {
    font-size: calc(var(--u)*3.2);
    color: var(--text-sub);
    margin-bottom: calc(var(--uh)*4);
    text-align:center;
    line-height:1.6;
  }
  .modal-btn {
    padding: calc(var(--uh)*2) calc(var(--u)*10);
    border-radius: calc(var(--u)*3);
    border: 2px solid var(--accent);
    background: rgba(255,149,0,0.15);
    color: var(--accent-bright);
    font-size: calc(var(--u)*4.5);
    font-weight:700;
    letter-spacing:0.1em;
    cursor:pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .modal-btn:active { transform:scale(0.96); }
  /* READY */
  #modal-ready .modal-title {
    background: linear-gradient(135deg, var(--fire-3) 0%, var(--accent) 50%, var(--fire-1) 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    filter: drop-shadow(0 0 calc(var(--u)*3) var(--fire-2));
  }
  /* CLEAR */
  #modal-clear .modal-title {
    background: linear-gradient(135deg, var(--fire-3) 0%, var(--clear-color) 60%, var(--arrow-core) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 calc(var(--u)*3) var(--clear-color));
  }
  /* Stage goal badge */
  .goal-badge {
    display:inline-block;
    padding: calc(var(--uh)*0.8) calc(var(--u)*3);
    border-radius: calc(var(--u)*2);
    font-size: calc(var(--u)*2.8);
    font-weight:700;
    letter-spacing:0.08em;
    margin-bottom: calc(var(--uh)*3);
    border: 1px solid var(--ghost-border);
    background: rgba(255,150,0,0.1);
    color: var(--accent-bright);
  }
  /* パーティクルレイヤー */
  #particle-layer {
    position:absolute;
    top:0; left:0; right:0; bottom:0;
    pointer-events:none;
    z-index:5;
    overflow:hidden;
  }
  .spark {
    position:absolute;
    width: calc(var(--u)*1.2);
    height: calc(var(--u)*1.2);
    border-radius:50%;
    pointer-events:none;
    animation: spark-fly 0.6s ease-out forwards;
  }
  @keyframes spark-fly {
    0%   { opacity:1; transform:scale(1) translate(0,0); }
    100% { opacity:0; transform:scale(0.2) translate(var(--sx), var(--sy)); }
  }
  .chain-line {
    position:absolute;
    height: 2px;
    background: linear-gradient(90deg, var(--fire-2), transparent);
    transform-origin: left center;
    pointer-events:none;
    animation: chain-fade 0.4s ease-out forwards;
  }
  @keyframes chain-fade {
    0%   { opacity:0.9; }
    100% { opacity:0; }
  }
</style>
</head>
<body>
  <div id="phone">
    <div id="bg-stars"></div>
    <!-- HUD -->
    <div id="hud">
      <div id="stage-label">STAGE 1</div>
      <div id="stage-goal">操作理解</div>
      <div id="arrows-count">▼ 4</div>
    </div>
    <!-- ゲームエリア -->
    <div id="game-canvas">
      <canvas id="grid-canvas"></canvas>
    </div>
    <!-- パーティクルレイヤー -->
    <div id="particle-layer"></div>
    <!-- フッター -->
    <div id="footer">
      <div id="hint-text">光る枠をタップして矢印を置こう</div>
    </div>
    <!-- READY モーダル -->
    <div class="modal" id="modal-ready">
      <div class="modal-title">READY</div>
      <div class="modal-sub">光る枠に矢印を置くと<br>ドミノ連鎖が起きる！</div>
      <div class="modal-btn" id="btn-ready">START</div>
    </div>
    <!-- CLEAR モーダル -->
    <div class="modal" id="modal-clear">
      <div class="modal-title">CLEAR!</div>
      <div class="modal-sub" id="clear-sub">全矢印ドミノ倒壊！</div>
      <div class="modal-btn" id="btn-next">NEXT STAGE</div>
    </div>
  </div>

  <script>
  (function(){
    'use strict';

    // ===== カラーパレット（CSS変数に対応） =====
    const C = {
      arrowActive: '#ff9500',
      arrowGlow:   '#ffb84a',
      arrowCore:   '#fff0c0',
      fire1: '#ff4400',
      fire2: '#ff8800',
      fire3: '#ffcc00',
      fire4: '#fff0a0',
      fallen: '#7a5030',
      gridLine: 'rgba(30,32,60,0.4)',
      ghostFill: (a) => `rgba(255,160,40,${a})`,
      ghostBorder:(a) => `rgba(255,185,60,${a})`,
      ghostArrow: (a) => `rgba(255,210,90,${a})`,
      chainLine: '#ff8800',
      white: '#ffffff'
    };

    // ===== 背景星生成 =====
    (function initStars(){
      const el = document.getElementById('bg-stars');
      if(!el) return;
      const fireColors = ['#ff4400','#ff8800','#ffcc00','#ff6600'];
      for(let i=0;i<28;i++){
        const sp = document.createElement('span');
        const sz = 1+Math.random()*2;
        const tw = 2+Math.random()*4;
        const td = Math.random()*3;
        const op = 0.15 + Math.random()*0.45;
        const col = fireColors[Math.floor(Math.random()*fireColors.length)];
        sp.style.cssText = `
          width:${sz}px;height:${sz}px;
          left:${Math.random()*100}%;
          top:${Math.random()*100}%;
          --tw:${tw}s;--td:${td}s;--op:${op};
          background:${col};
          box-shadow:0 0 ${sz*2}px ${col};
        `;
        el.appendChild(sp);
      }
    })();

    // ===== ステージデータ =====
    const STAGES = [
      {
        // Stage 1: 操作理解＋コア体験（1操作）
        cols: 5, rows: 7,
        arrows: [
          {c:1,r:3,dir:'R'},{c:2,r:3,dir:'R'},
          {c:3,r:3,dir:'D'},{c:3,r:4,dir:'R'}
        ],
        ghosts: [
          {c:0,r:3,dir:'R'},  // 正解
          {c:1,r:2,dir:'D'},
          {c:4,r:3,dir:'L'},
          {c:3,r:5,dir:'U'}
        ],
        goal:'操作理解',
        hint:'光る枠をタップして矢印を置こう'
      },
      {
        // Stage 2: 思考＋応用（4操作）
        cols: 5, rows: 10,
        arrows: [
          // グループA
          {c:2,r:1,dir:'R'},{c:3,r:1,dir:'D'},{c:3,r:2,dir:'L'},
          // グループB
          {c:1,r:4,dir:'R'},{c:2,r:4,dir:'D'},{c:2,r:5,dir:'R'},
          // グループC
          {c:1,r:6,dir:'R'},{c:2,r:6,dir:'D'},
          // グループD
          {c:2,r:8,dir:'R'},{c:3,r:8,dir:'U'}
        ],
        ghosts: [
          {c:1,r:1,dir:'R'}, // A起動
          {c:0,r:4,dir:'R'}, // B起動
          {c:0,r:6,dir:'R'}, // C起動
          {c:1,r:8,dir:'R'}, // D起動
          {c:0,r:1,dir:'R'}, // 外れ
          {c:4,r:1,dir:'L'}, // 外れ（部分）
          {c:0,r:5,dir:'R'}, // 外れ
          {c:4,r:8,dir:'L'}  // 外れ
        ],
        goal:'思考＋応用',
        hint:'どの枠からトリガーすれば全部倒せる？'
      }
    ];

    // ===== 状態 =====
    let stageIdx = 0;
    let arrows = []; // {c,r,dir,fallen,fallAnim}
    let ghosts = []; // {c,r,dir,used}
    let chainQueue = [];
    let animating = false;
    let totalArrows = 0;
    let fallenCount = 0;
    let placedCount = 0;

    // ===== キャンバス =====
    const phone = document.getElementById('phone');
    const canvas = document.getElementById('grid-canvas');
    const ctx = canvas.getContext('2d');
    let CW, CH, cellW, cellH, offsetX, offsetY;
    let COLS, ROWS;

    function resize(){
      const gameArea = document.getElementById('game-canvas');
      const rect = gameArea.getBoundingClientRect();
      CW = rect.width;
      CH = rect.height;
      canvas.width = CW;
      canvas.height = CH;
      const st = STAGES[stageIdx];
      COLS = st.cols; ROWS = st.rows;
      const maxCellW = Math.floor(CW / COLS);
      const maxCellH = Math.floor(CH / ROWS);
      const cell = Math.min(maxCellW, maxCellH, Math.floor(CW * 0.16));
      cellW = cell; cellH = cell;
      offsetX = (CW - cellW * COLS) / 2;
      offsetY = (CH - cellH * ROWS) / 2;
    }

    // ===== ステージ初期化 =====
    function initStage(idx){
      stageIdx = idx;
      const st = STAGES[idx];
      COLS = st.cols; ROWS = st.rows;
      arrows = st.arrows.map(a=>({...a, fallen:false, fallAnim:0}));
      ghosts = st.ghosts.map(g=>({...g, used:false}));
      totalArrows = arrows.length;
      fallenCount = 0;
      placedCount = 0;
      animating = false;
      chainQueue = [];
      resize();
      document.getElementById('stage-label').textContent = 'STAGE ' + (idx+1);
      document.getElementById('stage-goal').textContent = st.goal;
      updateHUD();
    }

    function updateHUD(){
      const remaining = totalArrows - fallenCount;
      document.getElementById('arrows-count').textContent = '▼ ' + remaining;
      document.getElementById('hint-text').textContent = STAGES[stageIdx].hint;
    }

    // ===== 矢印方向 =====
    const DIR_VEC = {R:{dc:1,dr:0},L:{dc:-1,dr:0},U:{dc:0,dr:-1},D:{dc:0,dr:1}};
    const DIR_CHAR = {R:'→',L:'←',U:'↑',D:'↓'};
    const DIR_ANGLE = {R:0,D:Math.PI/2,L:Math.PI,U:-Math.PI/2};

    function getArrowAt(c,r){
      return arrows.find(a=>a.c===c&&a.r===r&&!a.fallen)||null;
    }

    // ===== 連鎖処理 =====
    function triggerArrow(c, r, dir, isPlaced){
      // 連鎖アニメーション付きで順次倒す
      if(animating) return;
      animating = true;

      // 置いた矢印を倒す（または既存矢印を倒す）
      let fallen = [];
      let visited = new Set();

      function knock(c, r, dir, delay){
        const key = c+','+r;
        if(visited.has(key)) return;
        visited.add(key);

        const vec = DIR_VEC[dir];
        const nc = c + vec.dc;
        const nr = r + vec.dr;
        const target = getArrowAt(nc, nr);
        if(!target) return;

        setTimeout(()=>{
          if(target.fallen) return;
          target.fallen = true;
          target.fallAnim = 1;
          fallenCount++;
          spawnChainEffect(c, r, nc, nr);
          spawnSparks(nc, nr);
          updateHUD();
          render();

          // 連鎖
          knock(nc, nr, target.dir, 0);

          // クリア判定
          if(fallenCount >= totalArrows){
            setTimeout(()=>showClear(), 400);
          }
        }, delay);
      }

      knock(c, r, dir, 80);

      // アニメ終了後フラグ解除
      setTimeout(()=>{ animating = false; }, 1000);
    }

    // ===== クリック処理 =====
    canvas.addEventListener('pointerdown', onTap);
    function onTap(e){
      if(animating) return;
      const rect = canvas.getBoundingClientRect();
      const px = e.clientX - rect.left;
      const py = e.clientY - rect.top;
      const c = Math.floor((px - offsetX) / cellW);
      const r = Math.floor((py - offsetY) / cellH);
      if(c<0||c>=COLS||r<0||r>=ROWS) return;

      // ゴーストマスか確認
      const ghost = ghosts.find(g=>g.c===c&&g.r===r&&!g.used);
      if(!ghost) return;

      ghost.used = true;
      placedCount++;

      // 置いた矢印をarrowsに追加（fallenにすぐなる - 起動済み）
      const placed = {c,r,dir:ghost.dir,fallen:true,fallAnim:1,isPlaced:true};
      arrows.push(placed);
      spawnSparks(c, r);
      spawnChainEffect(c-0.5, r, c, r);
      render();

      // 向いている方向で連鎖
      triggerArrow(c, r, ghost.dir, true);
    }

    // ===== 描画 =====
    function render(){
      ctx.clearRect(0,0,CW,CH);

      // 背景グリッドライン
      ctx.strokeStyle = C.gridLine;
      ctx.lineWidth = 0.5;
      for(let c=0;c<=COLS;c++){
        const x = offsetX + c*cellW;
        ctx.beginPath();
        ctx.moveTo(x, offsetY);
        ctx.lineTo(x, offsetY+ROWS*cellH);
        ctx.stroke();
      }
      for(let r=0;r<=ROWS;r++){
        const y = offsetY + r*cellH;
        ctx.beginPath();
        ctx.moveTo(offsetX, y);
        ctx.lineTo(offsetX+COLS*cellW, y);
        ctx.stroke();
      }

      // ゴーストマス
      for(const g of ghosts){
        if(g.used) continue;
        const x = offsetX + g.c*cellW;
        const y = offsetY + g.r*cellH;
        // 点滅効果
        const t = Date.now()/600;
        const alpha = 0.3 + 0.2*Math.sin(t + g.c*0.7 + g.r*0.5);
        ctx.fillStyle = C.ghostFill(alpha);
        ctx.strokeStyle = C.ghostBorder(alpha+0.2);
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        // roundRect polyfill
        const rx=x+3,ry=y+3,rw=cellW-6,rh=cellH-6,rr=4;
        ctx.moveTo(rx+rr,ry);ctx.lineTo(rx+rw-rr,ry);ctx.quadraticCurveTo(rx+rw,ry,rx+rw,ry+rr);
        ctx.lineTo(rx+rw,ry+rh-rr);ctx.quadraticCurveTo(rx+rw,ry+rh,rx+rw-rr,ry+rh);
        ctx.lineTo(rx+rr,ry+rh);ctx.quadraticCurveTo(rx,ry+rh,rx,ry+rh-rr);
        ctx.lineTo(rx,ry+rr);ctx.quadraticCurveTo(rx,ry,rx+rr,ry);ctx.closePath();
        ctx.fill();
        ctx.stroke();
        // ゴースト矢印
        drawArrowSymbol(ctx, x+cellW/2, y+cellH/2, cellW*0.32, g.dir, C.ghostArrow(alpha+0.3));
      }

      // 倒れた矢印（灰色残骸）
      for(const a of arrows){
        if(!a.fallen) continue;
        const x = offsetX + a.c*cellW + cellW/2;
        const y = offsetY + a.r*cellH + cellH/2;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(DIR_ANGLE[a.dir] + Math.PI/2); // 倒れた向き
        ctx.globalAlpha = 0.25;
        drawArrowShape(ctx, 0, 0, cellW*0.35, C.fallen);
        ctx.restore();
      }

      // 立っている矢印
      for(const a of arrows){
        if(a.fallen) continue;
        const x = offsetX + a.c*cellW + cellW/2;
        const y = offsetY + a.r*cellH + cellH/2;
        drawActiveArrow(ctx, x, y, cellW*0.38, a.dir);
      }

      requestAnimationFrame(render);
    }

    function drawActiveArrow(ctx, x, y, size, dir){
      ctx.save();
      ctx.translate(x, y);
      // 外輪グロー
      ctx.shadowColor = C.fire2;
      ctx.shadowBlur = size * 1.2;
      drawArrowShape(ctx, 0, 0, size, C.arrowActive);
      ctx.shadowBlur = 0;
      // 内輪コア
      drawArrowShape(ctx, 0, 0, size*0.55, C.arrowCore);
      ctx.restore();
      // 方向テキスト（グロー付き）
      ctx.save();
      ctx.translate(x, y);
      ctx.font = `bold ${Math.round(size*1.15)}px sans-serif`;
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.shadowColor = C.fire2;
      ctx.shadowBlur = size*0.7;
      ctx.fillStyle = C.white;
      ctx.fillText(DIR_CHAR[dir], 0, 0);
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    function drawArrowSymbol(ctx, x, y, size, dir, color){
      ctx.save();
      ctx.translate(x, y);
      ctx.font = `bold ${Math.round(size*1.8)}px sans-serif`;
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillStyle=color;
      ctx.fillText(DIR_CHAR[dir], 0, 0);
      ctx.restore();
    }

    function drawArrowShape(ctx, x, y, size, color){
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, size*0.5, 0, Math.PI*2);
      ctx.fill();
    }

    // ===== エフェクト =====
    function spawnSparks(c, r){
      const particleLayer = document.getElementById('particle-layer');
      const gameCanvas = document.getElementById('game-canvas');
      const rect = gameCanvas.getBoundingClientRect();
      const phoneRect = phone.getBoundingClientRect();

      const cx = rect.left - phoneRect.left + offsetX + c*cellW + cellW/2;
      const cy = rect.top  - phoneRect.top  + offsetY + r*cellH + cellH/2;

      const colors = [C.fire1, C.fire2, C.fire3, C.fire4];
      for(let i=0;i<8;i++){
        const sp = document.createElement('div');
        sp.className = 'spark';
        const angle = (i/8)*Math.PI*2;
        const dist = 20 + Math.random()*30;
        const sx = Math.cos(angle)*dist + 'px';
        const sy = Math.sin(angle)*dist + 'px';
        sp.style.cssText = `
          left:${cx}px; top:${cy}px;
          background:${colors[i%colors.length]};
          --sx:${sx}; --sy:${sy};
          box-shadow:0 0 4px ${colors[i%colors.length]};
        `;
        particleLayer.appendChild(sp);
        setTimeout(()=>sp.remove(), 650);
      }
    }

    function spawnChainEffect(c1, r1, c2, r2){
      const particleLayer = document.getElementById('particle-layer');
      const gameCanvas = document.getElementById('game-canvas');
      const rect = gameCanvas.getBoundingClientRect();
      const phoneRect = phone.getBoundingClientRect();

      const x1 = rect.left - phoneRect.left + offsetX + c1*cellW + cellW/2;
      const y1 = rect.top  - phoneRect.top  + offsetY + r1*cellH + cellH/2;
      const x2 = rect.left - phoneRect.left + offsetX + c2*cellW + cellW/2;
      const y2 = rect.top  - phoneRect.top  + offsetY + r2*cellH + cellH/2;

      const dx = x2-x1, dy = y2-y1;
      const len = Math.sqrt(dx*dx+dy*dy);
      const angle = Math.atan2(dy,dx)*180/Math.PI;

      const line = document.createElement('div');
      line.className = 'chain-line';
      line.style.cssText = `
        left:${x1}px; top:${y1}px;
        width:${len}px;
        transform:rotate(${angle}deg);
        background:linear-gradient(90deg,${C.chainLine},rgba(255,200,0,0.25));
        box-shadow:0 0 6px ${C.chainLine};
      `;
      particleLayer.appendChild(line);
      setTimeout(()=>line.remove(), 450);
    }

    // ===== モーダル =====
    function showModal(id){
      document.querySelectorAll('.modal').forEach(m=>m.classList.remove('show'));
      document.getElementById(id).classList.add('show');
    }
    function hideModals(){
      document.querySelectorAll('.modal').forEach(m=>m.classList.remove('show'));
    }

    function showClear(){
      const sub = document.getElementById('clear-sub');
      if(stageIdx < STAGES.length-1){
        sub.textContent = '全矢印ドミノ倒壊！';
        document.getElementById('btn-next').textContent = 'NEXT STAGE';
      } else {
        sub.textContent = '全ステージ完全クリア！\n矢印ドミノマスター！';
        document.getElementById('btn-next').textContent = 'PLAY AGAIN';
      }
      showModal('modal-clear');
    }

    document.getElementById('btn-ready').addEventListener('pointerdown', ()=>{
      hideModals();
    });

    document.getElementById('btn-next').addEventListener('pointerdown', ()=>{
      hideModals();
      const nextIdx = stageIdx < STAGES.length-1 ? stageIdx+1 : 0;
      const isLast = stageIdx >= STAGES.length-1;
      initStage(nextIdx);
      showModal('modal-ready');
      if(!isLast){
        document.getElementById('modal-ready').querySelector('.modal-sub').textContent =
          nextIdx===1 ? '複数グループを正しい順でトリガーせよ！' : '矢印の連鎖を攻略しよう！';
      } else {
        document.getElementById('modal-ready').querySelector('.modal-sub').textContent =
          '光る枠をタップして矢印を置くと\nドミノ連鎖が起きる！';
      }
    });

    // ===== 起動 =====
    window.addEventListener('resize', ()=>{
      resize();
    });

    initStage(0);
    showModal('modal-ready');
    // ゴースト点滅のためrequestAnimationFrameループ開始（1回のみ）
    requestAnimationFrame(render);
  })();
  </script>
</body>
</html>
