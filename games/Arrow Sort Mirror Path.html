<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Arrow Sort Mirror Path</title>
<style>
:root{
  --phone-aspect:9/19.5;
  /* Game color tokens */
  --bg-garden-hi:#8ed44a; --bg-garden-mid:#5aaa30; --bg-garden-lo:#2d6e10;
  --wood-hi:#e8c06a; --wood-mid:#c4923e; --wood-lo:#9a6820;
  --cell-fill:#ddb86040; --cell-line:#b8823055;
  --mirror-fill:#d4eeffcc; --mirror-line:#a0c8f0; --mirror-glow:#aef;
  --blk-red-hi:#ff7777; --blk-red-lo:#bb1111; --blk-red-sh:#cc000099;
  --blk-blue-hi:#77bbff; --blk-blue-lo:#1144bb; --blk-blue-sh:#0033aa99;
  --blk-green-hi:#77ee77; --blk-green-lo:#119911; --blk-green-sh:#007700aa;
  --blk-yellow-hi:#ffe877; --blk-yellow-lo:#cc8800; --blk-yellow-sh:#aa660099;
  --hud-bg:#00000033; --hud-text:#fff;
  --modal-bg:linear-gradient(145deg,#fffbe8,#ffd580);
  --modal-title:#b85000; --modal-sub:#7a4400;
  --btn-hi:#ffaa44; --btn-lo:#c05000; --btn-sh:#88440099;
  --text-main:#ffffff; --text-sub:#d4eedd;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;
  background:radial-gradient(ellipse at 50% 40%,#3a6b1e,#1a3a08);
  color:var(--text-main);
  font-family:'Helvetica Neue',system-ui,sans-serif;user-select:none;
  -webkit-user-select:none;-webkit-tap-highlight-color:transparent;touch-action:none;}
body{position:relative;display:flex;align-items:center;justify-content:center;}
#phone{
  position:relative;overflow:hidden;
  width:min(100vw,calc(100vh*9/19.5));
  height:min(100vh,calc(100vw*19.5/9));
  --pw:min(100vw,calc(100vh*9/19.5));
  --ph:min(100vh,calc(100vw*19.5/9));
  --u:calc(var(--pw)/100);
  --uh:calc(var(--ph)/100);
  background:linear-gradient(175deg,var(--bg-garden-hi) 0%,var(--bg-garden-mid) 55%,var(--bg-garden-lo) 100%);
}
/* Garden background decoration */
#phone::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 40% 18% at 8% 3%, #a8e060aa 0%,transparent 65%),
    radial-gradient(ellipse 35% 22% at 88% 5%, #90cc4888 0%,transparent 65%),
    radial-gradient(ellipse 25% 12% at 5% 92%, #60a82888 0%,transparent 70%),
    radial-gradient(ellipse 30% 14% at 90% 88%, #70b83488 0%,transparent 70%),
    radial-gradient(circle 8% at 15% 7%, #c8f07088 0%,transparent 100%),
    radial-gradient(circle 6% at 80% 9%, #b8e86888 0%,transparent 100%);
}
/* Floating flowers/dots */
#phone::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(circle 1.2% at 20% 88%,#fff8 0%,transparent 100%),
    radial-gradient(circle 0.8% at 75% 91%,#fff6 0%,transparent 100%),
    radial-gradient(circle 1% at 90% 85%,#fff7 0%,transparent 100%),
    radial-gradient(circle 0.9% at 8% 93%,#fff6 0%,transparent 100%);
}
/* HUD */
#hud{
  position:absolute;top:0;left:0;right:0;
  height:calc(var(--uh)*10);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 calc(var(--u)*4);
  background:var(--hud-bg);
  z-index:10;
}
#stageLabel{
  font-size:calc(var(--u)*5.5);font-weight:900;
  color:var(--hud-text);
  text-shadow:0 1px 6px #0008, 0 0 12px #00880044;
  letter-spacing:0.03em;
}
#movesLabel{
  font-size:calc(var(--u)*4.2);font-weight:700;
  background:#ffffffdd;color:#334;
  border-radius:calc(var(--u)*3);
  padding:calc(var(--uh)*0.7) calc(var(--u)*3);
  box-shadow:0 2px 6px #0004;
}
#goalBadge{
  font-size:calc(var(--u)*3.2);font-weight:700;
  background:#ffffff22;color:var(--text-sub);
  border:1px solid #ffffff44;
  border-radius:calc(var(--u)*2);
  padding:calc(var(--uh)*0.4) calc(var(--u)*2);
}
/* Board container */
#boardWrap{
  position:absolute;
  top:calc(var(--uh)*12);
  left:50%;transform:translateX(-50%);
  z-index:5;
}
#board{
  position:relative;
  background:linear-gradient(148deg,var(--wood-hi) 0%,var(--wood-mid) 55%,var(--wood-lo) 100%);
  border-radius:calc(var(--u)*3);
  box-shadow:
    0 calc(var(--u)*1.5) calc(var(--u)*5) #0009,
    0 0 0 calc(var(--u)*0.6) #a07020,
    inset 0 1px 3px #fff5,
    inset 0 -2px 4px #0003;
  padding:calc(var(--u)*1.5);
}
.cell{
  position:absolute;
  border:1px solid var(--cell-line);
  background:linear-gradient(145deg,var(--cell-fill),#c89a4028);
  border-radius:calc(var(--u)*0.6);
}
/* Mirror tile */
.mirror{
  position:absolute;
  display:flex;align-items:center;justify-content:center;
  z-index:2;pointer-events:none;
  border-radius:calc(var(--u)*0.8);
  background:linear-gradient(135deg,#eef8ffee,#b8d8f4cc,#c0d8f8aa);
  border:1px solid var(--mirror-line);
  box-shadow:
    0 0 calc(var(--u)*2) var(--mirror-glow),
    inset 0 1px 2px #ffffffcc,
    inset 0 -1px 2px #a0c0e088;
}
.mirror-slash{
  color:#fff;font-weight:900;line-height:1;
  text-shadow:0 0 calc(var(--u)*2) var(--mirror-glow),0 0 calc(var(--u)*4) #88ccff;
}
/* Arrow block - 3D chunky style */
.block{
  position:absolute;
  display:flex;align-items:center;justify-content:center;
  border-radius:calc(var(--u)*2);
  cursor:pointer;z-index:3;
  transition:transform 0.08s ease,filter 0.08s ease;
}
.block:hover{transform:scale(1.07);filter:brightness(1.12);}
.block:active{transform:scale(0.94);}
.block.sliding{transition:left 0.18s cubic-bezier(.3,0,.2,1),top 0.18s cubic-bezier(.3,0,.2,1);}
.block-red{
  background:linear-gradient(145deg,var(--blk-red-hi) 0%,var(--blk-red-lo) 100%);
  box-shadow:0 calc(var(--u)*0.8) 0 #880000,
             0 calc(var(--u)*1.5) calc(var(--u)*3) var(--blk-red-sh),
             inset 0 1px 3px #ffaaaa,
             inset 0 -2px 3px #99000088;
}
.block-blue{
  background:linear-gradient(145deg,var(--blk-blue-hi) 0%,var(--blk-blue-lo) 100%);
  box-shadow:0 calc(var(--u)*0.8) 0 #001888,
             0 calc(var(--u)*1.5) calc(var(--u)*3) var(--blk-blue-sh),
             inset 0 1px 3px #aaccff,
             inset 0 -2px 3px #00228888;
}
.block-green{
  background:linear-gradient(145deg,var(--blk-green-hi) 0%,var(--blk-green-lo) 100%);
  box-shadow:0 calc(var(--u)*0.8) 0 #005500,
             0 calc(var(--u)*1.5) calc(var(--u)*3) var(--blk-green-sh),
             inset 0 1px 3px #aaeeaa,
             inset 0 -2px 3px #00440088;
}
.block-yellow{
  background:linear-gradient(145deg,var(--blk-yellow-hi) 0%,var(--blk-yellow-lo) 100%);
  box-shadow:0 calc(var(--u)*0.8) 0 #885500,
             0 calc(var(--u)*1.5) calc(var(--u)*3) var(--blk-yellow-sh),
             inset 0 1px 3px #ffee99,
             inset 0 -2px 3px #88440088;
}
/* Mirror flash effect */
.mirror.flash{animation:mirrorFlash 0.45s ease-out;}
@keyframes mirrorFlash{
  0%{box-shadow:0 0 calc(var(--u)*2) #aef,0 0 calc(var(--u)*8) #cefcff,0 0 calc(var(--u)*14) #88eeff88;filter:brightness(1.8);}
  50%{filter:brightness(1.4);}
  100%{box-shadow:0 0 calc(var(--u)*2) var(--mirror-glow),inset 0 1px 2px #ffffffcc;filter:brightness(1);}
}
/* Merge particle */
.particle{
  position:absolute;border-radius:50%;pointer-events:none;z-index:20;
  animation:particleFly 0.55s ease-out forwards;
}
@keyframes particleFly{
  0%{opacity:1;transform:scale(1.2);}
  60%{opacity:0.7;}
  100%{opacity:0;transform:scale(0.2) translate(var(--px),var(--py));}
}
/* Clear modal */
#modal{
  position:absolute;inset:0;
  background:linear-gradient(180deg,#00000088 0%,#00000066 100%);
  backdrop-filter:blur(2px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:50;opacity:0;pointer-events:none;transition:opacity 0.35s;
}
#modal.show{opacity:1;pointer-events:all;}
#modalBox{
  background:var(--modal-bg);
  border-radius:calc(var(--u)*6);
  padding:calc(var(--uh)*4.5) calc(var(--u)*9);
  text-align:center;
  box-shadow:0 calc(var(--u)*3) calc(var(--u)*10) #0009,
             0 0 0 calc(var(--u)*0.5) #cc881044;
  min-width:calc(var(--u)*72);
}
#modalTitle{
  font-size:calc(var(--u)*9);font-weight:900;color:var(--modal-title);
  margin-bottom:calc(var(--uh)*1.5);
  text-shadow:0 2px 6px #aa440055;
}
#modalSub{font-size:calc(var(--u)*4.2);color:var(--modal-sub);margin-bottom:calc(var(--uh)*3);}
#modalBtn{
  background:linear-gradient(145deg,var(--btn-hi),var(--btn-lo));
  color:#fff;font-size:calc(var(--u)*5.2);font-weight:800;
  border:none;border-radius:calc(var(--u)*4);cursor:pointer;
  padding:calc(var(--uh)*1.8) calc(var(--u)*9);
  box-shadow:0 calc(var(--u)*0.8) 0 #884400,
             0 calc(var(--u)*2) calc(var(--u)*5) var(--btn-sh);
  letter-spacing:0.04em;
}
#modalBtn:active{transform:scale(0.95);}
</style>
</head>
<body>
<div id="phone">
  <div id="hud">
    <div id="stageLabel">Stage 1</div>
    <div id="goalBadge">ミラー体験</div>
    <div id="movesLabel">手数: <span id="moveCount">0</span></div>
  </div>
  <div id="boardWrap"><div id="board"></div></div>
  <div id="modal">
    <div id="modalBox">
      <div id="modalTitle">✨ Clear!</div>
      <div id="modalSub" id="modalSub"></div>
      <button id="modalBtn">Next Stage</button>
    </div>
  </div>
</div>
<script>
// ─── Constants ───────────────────────────────────────────────
const COLORS = ['red','blue','green','yellow'];
const ARROW = {UP:'↑',DOWN:'↓',LEFT:'←',RIGHT:'→'};
const DX = {UP:-1,DOWN:1,LEFT:0,RIGHT:0};
const DY = {UP:0,DOWN:0,LEFT:-1,RIGHT:1};
// Mirror reflection tables
const MIRROR_SLASH  = {RIGHT:'UP',UP:'RIGHT',LEFT:'DOWN',DOWN:'LEFT'};  // /
const MIRROR_BACK   = {RIGHT:'DOWN',DOWN:'RIGHT',LEFT:'UP',UP:'LEFT'};  // \

// ─── Stage Data ───────────────────────────────────────────────
const STAGE_GOALS=['ミラー体験','マルチミラー思考'];
const STAGES = [
  {
    // Stage 1: 5x5, 2 colors, 1 mirror, 3 ops
    rows:5, cols:5,
    blocks:[
      {id:'rA',r:3,c:2,color:'red',  dir:'UP'},
      {id:'rB',r:3,c:4,color:'red',  dir:'LEFT'},
      {id:'bA',r:4,c:0,color:'blue', dir:'UP'},
      {id:'bB',r:4,c:4,color:'blue', dir:'LEFT'},
    ],
    mirrors:[
      {r:2,c:2,type:'back'}, // \ mirror
    ]
  },
  {
    // Stage 2: 6x6, 4 colors, 2 mirrors, 7 ops
    // Solve: Red(1→2), Blue(3→4), Yellow(5), Green(6→7)
    rows:6, cols:6,
    blocks:[
      {id:'rA',r:1,c:0,color:'red',   dir:'RIGHT'},
      {id:'rB',r:0,c:5,color:'red',   dir:'DOWN'},
      {id:'bA',r:2,c:1,color:'blue',  dir:'RIGHT'},
      {id:'bB',r:0,c:3,color:'blue',  dir:'LEFT'},
      {id:'gA',r:4,c:1,color:'green', dir:'RIGHT'},
      {id:'gB',r:5,c:4,color:'green', dir:'LEFT'},
      {id:'yA',r:5,c:0,color:'yellow',dir:'UP'},
      {id:'yB',r:3,c:0,color:'yellow',dir:'DOWN'},
    ],
    mirrors:[
      {r:2,c:2,type:'slash'}, // / mirror: RIGHT→UP
      {r:4,c:3,type:'back'},  // \ mirror: RIGHT→DOWN
    ]
  }
];

// ─── State ───────────────────────────────────────────────────
let stageIdx=0, moveCount=0, animating=false;
let groups=[]; // {id, cells:[{r,c}], color, dir}
let mirrorMap={};  // "r,c" -> {type}
let rows, cols, cellSize;

// ─── DOM helpers ─────────────────────────────────────────────
const phone   = document.getElementById('phone');
const boardEl = document.getElementById('board');
const boardWrap=document.getElementById('boardWrap');
const moveCountEl=document.getElementById('moveCount');
const stageLabelEl=document.getElementById('stageLabel');
const modal=document.getElementById('modal');
const modalSub=document.getElementById('modalSub');
const modalBtn=document.getElementById('modalBtn');
const goalBadgeEl=document.getElementById('goalBadge');
modalBtn.addEventListener('pointerdown',e=>{e.preventDefault();nextStage();});

function px(val){return val+'px';}

// ─── Layout ──────────────────────────────────────────────────
function calcLayout(r,c){
  const pw=phone.clientWidth, ph=phone.clientHeight;
  const maxW=pw*0.88, maxH=ph*0.62;
  const byW=Math.floor(maxW/c), byH=Math.floor(maxH/r);
  cellSize=Math.min(byW,byH);
  return {w:cellSize*c,h:cellSize*r};
}

// ─── Init stage ──────────────────────────────────────────────
function initStage(idx){
  stageIdx=idx; moveCount=0; animating=false;
  moveCountEl.textContent='0';
  stageLabelEl.textContent='Stage '+(idx+1);
  if(goalBadgeEl) goalBadgeEl.textContent=STAGE_GOALS[idx]||'';
  modal.classList.remove('show');
  boardEl.innerHTML='';

  const st=STAGES[idx];
  rows=st.rows; cols=st.cols;
  const {w,h}=calcLayout(rows,cols);
  boardEl.style.width=px(w); boardEl.style.height=px(h);
  boardWrap.style.top='calc(var(--uh)*12)';

  const bpad=Math.round(cellSize*0.15); // board inner padding

  // Draw grid cells
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const d=document.createElement('div');
    d.className='cell';
    d.style.cssText=`left:${px(c*cellSize)};top:${px(r*cellSize)};width:${px(cellSize)};height:${px(cellSize)};`;
    boardEl.appendChild(d);
  }

  // Build mirror map & draw mirrors
  mirrorMap={};
  for(const m of st.mirrors){
    const key=m.r+','+m.c;
    mirrorMap[key]=m;
    drawMirror(m,bpad);
  }

  // Build groups from blocks
  groups=[];
  for(const b of st.blocks){
    groups.push({id:b.id,cells:[{r:b.r,c:b.c}],color:b.color,dir:b.dir});
  }
  renderGroups(bpad);
}

// SVG arrow paths for each direction
function arrowSVG(dir,sz){
  const half=sz/2, q=sz*0.28, tip=sz*0.72, stem=sz*0.35;
  const paths={
    UP:`M${half},${sz*0.1} L${sz*0.82},${tip} L${sz*0.62},${tip} L${sz*0.62},${sz*0.92} L${sz*0.38},${sz*0.92} L${sz*0.38},${tip} L${sz*0.18},${tip} Z`,
    DOWN:`M${half},${sz*0.9} L${sz*0.82},${sz*0.28} L${sz*0.62},${sz*0.28} L${sz*0.62},${sz*0.08} L${sz*0.38},${sz*0.08} L${sz*0.38},${sz*0.28} L${sz*0.18},${sz*0.28} Z`,
    LEFT:`M${sz*0.1},${half} L${tip},${sz*0.18} L${tip},${sz*0.38} L${sz*0.92},${sz*0.38} L${sz*0.92},${sz*0.62} L${tip},${sz*0.62} L${tip},${sz*0.82} Z`,
    RIGHT:`M${sz*0.9},${half} L${sz*0.28},${sz*0.18} L${sz*0.28},${sz*0.38} L${sz*0.08},${sz*0.38} L${sz*0.08},${sz*0.62} L${sz*0.28},${sz*0.62} L${sz*0.28},${sz*0.82} Z`,
  };
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}">
    <path d="${paths[dir]}" fill="rgba(255,255,255,0.92)" filter="drop-shadow(0 1px 2px rgba(0,0,0,0.4))"/>
  </svg>`;
}

function drawMirror(m,bpad){
  const d=document.createElement('div');
  d.className='mirror';
  d.dataset.mirrorKey=m.r+','+m.c;
  const pad=Math.round(cellSize*0.12);
  d.style.cssText=`left:${px(m.c*cellSize+pad)};top:${px(m.r*cellSize+pad)};
    width:${px(cellSize-pad*2)};height:${px(cellSize-pad*2)};`;
  const span=document.createElement('span');
  span.className='mirror-slash';
  span.style.cssText=`font-size:${px(Math.round(cellSize*0.6))};`;
  span.textContent=m.type==='slash'?'/':'\\';
  d.appendChild(span);
  boardEl.appendChild(d);
}

// ─── Render groups ───────────────────────────────────────────
function renderGroups(bpadArg){
  // Remove old block elements
  boardEl.querySelectorAll('.block').forEach(e=>e.remove());
  const bpad=bpadArg||Math.round(cellSize*0.15);
  const asize=Math.round(cellSize*0.55);
  for(const g of groups){
    for(const cell of g.cells){
      const d=document.createElement('div');
      d.className='block block-'+g.color;
      const pad=Math.round(cellSize*0.07);
      const bs=cellSize-pad*2;
      d.style.cssText=`left:${px(cell.c*cellSize+pad)};top:${px(cell.r*cellSize+pad)};
        width:${px(bs)};height:${px(bs)};`;
      d.innerHTML=arrowSVG(g.dir,Math.round(bs*0.72));
      d.dataset.groupId=g.id;
      d.addEventListener('pointerdown',onBlockClick);
      boardEl.appendChild(d);
    }
  }
}

// ─── Grid occupancy ──────────────────────────────────────────
function buildOccupancy(excludeGroup){
  const occ={};
  for(const g of groups){
    if(g===excludeGroup) continue;
    for(const cell of g.cells) occ[cell.r+','+cell.c]=g;
  }
  return occ;
}

// ─── Slide logic ─────────────────────────────────────────────
function slideGroup(group){
  const occ=buildOccupancy(group);
  let dir=group.dir;
  let cells=group.cells.map(c=>({...c}));
  let moved=false;
  let mirrorHit=null;

  // Move one step at a time until blocked
  for(let step=0;step<(rows+cols)*3;step++){
    // Try moving all cells one step in current direction
    const dr=DX[dir], dc=DY[dir];
    const newCells=cells.map(c=>({r:c.r+dr,c:c.c+dc}));

    // Check if any new cell is out of bounds
    const oob=newCells.some(c=>c.r<0||c.r>=rows||c.c<0||c.c>=cols);
    if(oob) break;

    // Check if any new cell has a mirror
    const mirrorCell=newCells.find(c=>mirrorMap[c.r+','+c.c]);
    if(mirrorCell){
      // Reflect: stay in place, change direction
      const m=mirrorMap[mirrorCell.r+','+mirrorCell.c];
      const newDir=(m.type==='slash')?MIRROR_SLASH[dir]:MIRROR_BACK[dir];
      dir=newDir;
      mirrorHit=mirrorCell;
      continue; // re-loop with new direction
    }

    // Check if any new cell is blocked by another group
    const blocked=newCells.some(c=>{
      const key=c.r+','+c.c;
      return occ[key] && occ[key].color!==group.color;
    });
    if(blocked) break;

    // Check merge: new cell occupied by same color group (stay adjacent, merge)
    const mergeTarget=newCells.map(c=>occ[c.r+','+c.c]).find(g=>g&&g.color===group.color);
    if(mergeTarget){
      // Stay at current cells (don't move INTO target), merge together
      moved=true;
      mergeGroups(group,mergeTarget,cells,dir);
      return {moved:true,mergedWith:mergeTarget,mirrorHit};
    }

    cells=newCells;
    moved=true;
  }

  if(moved){
    group.cells=cells;
    group.dir=dir;
  }
  return {moved,mergedWith:null,mirrorHit};
}

function mergeGroups(groupA,groupB,newCellsA,dir){
  // groupA gets all cells from both, remove groupB
  groupA.cells=[...newCellsA,...groupB.cells];
  groupA.dir=dir;
  const idx=groups.indexOf(groupB);
  if(idx>=0) groups.splice(idx,1);
}

// ─── Check win ───────────────────────────────────────────────
function checkWin(){
  // Win: for each color, only 1 group remains
  const colorGroups={};
  for(const g of groups){
    if(!colorGroups[g.color]) colorGroups[g.color]=0;
    colorGroups[g.color]++;
  }
  // All colors have exactly 1 group
  const allColors=STAGES[stageIdx].blocks.map(b=>b.color).filter((v,i,a)=>a.indexOf(v)===i);
  return allColors.every(c=>(colorGroups[c]||0)<=1);
}

// ─── Particles ───────────────────────────────────────────────
function spawnParticles(r,c,color){
  const x=c*cellSize+cellSize/2, y=r*cellSize+cellSize/2;
  const colorMap={red:'#ff4444',blue:'#4488ff',green:'#44cc44',yellow:'#ffcc00'};
  for(let i=0;i<8;i++){
    const p=document.createElement('div');
    p.className='particle';
    const angle=Math.random()*Math.PI*2;
    const dist=cellSize*(0.5+Math.random()*0.8);
    const px2=Math.round(Math.cos(angle)*dist), py2=Math.round(Math.sin(angle)*dist);
    const sz=Math.round(cellSize*0.12+Math.random()*cellSize*0.1);
    p.style.cssText=`left:${x-sz/2}px;top:${y-sz/2}px;width:${sz}px;height:${sz}px;
      background:${colorMap[color]};--px:${px2}px;--py:${py2}px;`;
    boardEl.appendChild(p);
    p.addEventListener('animationend',()=>p.remove());
  }
}

function flashMirror(r,c){
  const el=boardEl.querySelector(`[data-mirror-key="${r},${c}"]`);
  if(!el) return;
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
}

// ─── Click handler ───────────────────────────────────────────
function onBlockClick(e){
  e.preventDefault();
  if(animating) return;
  const gid=e.currentTarget.dataset.groupId;
  const group=groups.find(g=>g.id===gid);
  if(!group) return;

  animating=true;
  const result=slideGroup(group);
  moveCount++;
  moveCountEl.textContent=moveCount;

  if(result.mirrorHit) flashMirror(result.mirrorHit.r,result.mirrorHit.c);

  // Animate blocks to new positions
  animateGroups(()=>{
    if(result.mergedWith){
      for(const cell of result.mergedWith.cells) spawnParticles(cell.r,cell.c,group.color);
    }
    renderGroups();
    animating=false;
    if(checkWin()){
      setTimeout(()=>showClear(),350);
    }
  });
}

function animateGroups(cb){
  // Re-render with sliding class for smooth CSS transition
  boardEl.querySelectorAll('.block').forEach(e=>e.remove());
  for(const g of groups){
    for(const cell of g.cells){
      const d=document.createElement('div');
      d.className='block block-'+g.color+' sliding';
      const pad=Math.round(cellSize*0.07);
      const bs=cellSize-pad*2;
      d.style.cssText=`left:${px(cell.c*cellSize+pad)};top:${px(cell.r*cellSize+pad)};
        width:${px(bs)};height:${px(bs)};`;
      d.innerHTML=arrowSVG(g.dir,Math.round(bs*0.72));
      boardEl.appendChild(d);
    }
  }
  setTimeout(cb,220);
}

// ─── Clear / next stage ───────────────────────────────────────
function showClear(){
  const isLast=stageIdx>=STAGES.length-1;
  modalSub.textContent=isLast?`全ステージクリア！ ${moveCount}手`:`${moveCount}手でクリア！`;
  modalBtn.textContent=isLast?'もう一度':'Next Stage';
  modal.classList.add('show');
}

function nextStage(){
  modal.classList.remove('show');
  if(stageIdx<STAGES.length-1) initStage(stageIdx+1);
  else initStage(0);
}

// ─── Start ───────────────────────────────────────────────────
initStage(0);
</script>
</body>
</html>
