<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>崩落ドミノ連鎖</title>
<style>
  :root {
    --bg-deep: #02030a;
    --bg-mid: #080d1e;
    --bg-panel: #06081a;
    --bg-card: #0b1228;
    --line: #1a2848;
    --cyan: #6ff;
    --cyan-soft: #8df;
    --cyan-glow: rgba(102,255,255,0.18);
    --warn: #ffb86c;
    --text-main: #eaf3ff;
    --text-sub: #cdddef;
    --text-dim: #7a92b5;
    --nova-9: #ffd76b;
    --nova-7: #ffb24a;
    --nova-5: #ff7a3a;
    --nova-3: #ff5d8a;
    --nova-1: #b585ff;
    --block-normal: #253d6e;
    --block-key: #7a2a0a;
    --block-star-bg: #0f280a;
    --drop-zone-bg: #041208;
    --drop-zone-border: #2a6a2a;
    --drop-zone-text: #4aaa4a;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;
    font-family:'Helvetica Neue',system-ui,sans-serif;user-select:none;
    -webkit-user-select:none;-webkit-tap-highlight-color:transparent;touch-action:none;}
  body{position:relative;display:flex;align-items:center;justify-content:center;}
  #phone{
    position:relative;overflow:hidden;
    width:min(100vw,calc(100vh * 9/19.5));
    height:min(100vh,calc(100vw * 19.5/9));
    --pw:min(100vw,calc(100vh * 9/19.5));
    --ph:min(100vh,calc(100vw * 19.5/9));
    --u:calc(var(--pw)/100);
    --uh:calc(var(--ph)/100);
    background: radial-gradient(ellipse at 50% 30%, #0d1a3a 0%, var(--bg-mid) 60%, var(--bg-deep) 100%);
  }
  #phone::before {
    content:'';position:absolute;inset:0;
    background-image:radial-gradient(circle, rgba(102,255,255,.06) 1px, transparent 1px);
    background-size: calc(8*var(--u)) calc(8*var(--u));
    pointer-events:none;z-index:0;
  }
  #hud{
    position:absolute;top:0;left:0;right:0;
    height:calc(12*var(--uh));
    display:flex;align-items:center;justify-content:space-between;
    padding:0 calc(4*var(--u));
    background:linear-gradient(180deg,var(--bg-panel) 0%, rgba(6,8,26,.92) 100%);
    border-bottom:1px solid var(--line);
    box-shadow:0 calc(.5*var(--uh)) calc(3*var(--uh)) rgba(0,0,0,.5);
    z-index:10;
  }
  #stage-label{font-size:calc(2.5*var(--u));color:var(--text-dim);letter-spacing:.15em;text-transform:uppercase;}
  #stage-num{font-size:calc(5.5*var(--u));font-weight:700;color:var(--cyan);
    text-shadow:0 0 calc(1.5*var(--u)) var(--cyan-glow);font-variant-numeric:tabular-nums;}
  #star-count{font-size:calc(4.5*var(--u));color:var(--nova-9);font-weight:700;
    text-shadow:0 0 calc(1*var(--u)) rgba(255,215,0,.3);}
  #turn-count{font-size:calc(3.2*var(--u));color:var(--text-sub);font-variant-numeric:tabular-nums;}
  #grid-area{
    position:absolute;
    top:calc(13*var(--uh));left:calc(5*var(--u));
    right:calc(5*var(--u));bottom:calc(10*var(--uh));
  }
  #drop-zone-bar{
    position:absolute;bottom:0;
    left:calc(5*var(--u));right:calc(5*var(--u));
    height:calc(9*var(--uh));
    background:linear-gradient(180deg, var(--drop-zone-bg) 0%, #001a08 100%);
    border:1px solid var(--drop-zone-border);
    border-radius:calc(1.5*var(--u));
    box-shadow:0 0 calc(2*var(--u)) rgba(42,106,42,.35), inset 0 1px rgba(80,180,80,.1);
    display:flex;align-items:center;justify-content:center;gap:calc(1.5*var(--u));
    font-size:calc(2.5*var(--u));color:var(--drop-zone-text);letter-spacing:.18em;
    font-weight:600;z-index:5;
  }
  canvas#grid{position:absolute;top:0;left:0;width:100%;height:100%;cursor:default;}
  .modal{
    display:none;position:absolute;top:0;left:0;right:0;bottom:0;
    background:rgba(2,3,10,.88);backdrop-filter:blur(2px);
    align-items:center;justify-content:center;flex-direction:column;z-index:100;
  }
  .modal.visible{display:flex;}
  .modal-box{
    background:linear-gradient(135deg, #0e1530 0%, var(--bg-card) 100%);
    border:1px solid var(--line);border-radius:calc(3.5*var(--u));
    padding:calc(7*var(--uh)) calc(9*var(--u));
    text-align:center;min-width:calc(72*var(--u));
    box-shadow:0 calc(2*var(--uh)) calc(6*var(--uh)) rgba(0,0,0,.6),
               0 0 calc(2*var(--u)) var(--cyan-glow);
  }
  .modal-title{font-size:calc(8*var(--u));font-weight:700;margin-bottom:calc(3*var(--uh));letter-spacing:.05em;}
  .modal-sub{font-size:calc(3.5*var(--u));color:var(--text-sub);margin-bottom:calc(5*var(--uh));line-height:1.7;white-space:pre-line;}
  .btn{
    background:linear-gradient(135deg, var(--cyan) 0%, #3af 100%);
    color:#001a2a;border:none;border-radius:calc(2.5*var(--u));
    padding:calc(2.5*var(--uh)) calc(9*var(--u));
    font-size:calc(4*var(--u));font-weight:700;cursor:pointer;letter-spacing:.08em;
    box-shadow:0 calc(.5*var(--uh)) calc(2*var(--uh)) rgba(102,255,255,.25);
    transition:transform .1s,box-shadow .1s;
  }
  .btn:active{opacity:.85;transform:translateY(1px);box-shadow:0 0 calc(1*var(--uh)) rgba(102,255,255,.15);}
  .stage-badge{
    display:inline-block;font-size:calc(2.8*var(--u));color:var(--text-dim);
    border:1px solid var(--line);border-radius:calc(1*var(--u));
    padding:calc(.5*var(--uh)) calc(2.5*var(--u));margin-bottom:calc(3*var(--uh));
    letter-spacing:.1em;background:var(--bg-panel);
  }
</style>
</head>
<body>
<div id="phone">
  <div id="hud">
    <div>
      <div id="stage-label">STAGE</div>
      <div id="stage-num">1</div>
    </div>
    <div id="star-count">★ 0/1</div>
    <div id="turn-count">TURN 0</div>
  </div>
  <div id="grid-area"><canvas id="grid"></canvas></div>
  <div id="drop-zone-bar">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="opacity:.7">
      <path d="M7 2v8M3.5 7.5L7 11l3.5-3.5" stroke="#4aaa4a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    FALL ZONE
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="opacity:.7">
      <path d="M7 2v8M3.5 7.5L7 11l3.5-3.5" stroke="#4aaa4a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <div class="modal" id="modal-ready">
    <div class="modal-box">
      <div class="stage-badge" id="ready-badge">操作理解 + コア体験</div>
      <div class="modal-title" style="color:var(--cyan);text-shadow:0 0 calc(2*var(--u)) var(--cyan-glow)" id="ready-title">STAGE 1</div>
      <div class="modal-sub" id="ready-sub">キーストーン(×)を
タップして消去！
★を落下ゾーンへ！</div>
      <button class="btn" id="btn-ready">START</button>
    </div>
  </div>

  <div class="modal" id="modal-clear">
    <div class="modal-box">
      <div class="modal-title" style="color:var(--nova-9);text-shadow:0 0 calc(2*var(--u)) rgba(255,215,0,.4)">CLEAR!</div>
      <div class="modal-sub" id="clear-sub">★をすべて落とした！</div>
      <button class="btn" id="btn-next">NEXT STAGE</button>
    </div>
  </div>

  <div class="modal" id="modal-complete">
    <div class="modal-box">
      <div class="modal-title" style="color:var(--nova-9);text-shadow:0 0 calc(2*var(--u)) rgba(255,215,0,.4)">COMPLETE!</div>
      <div class="modal-sub">全ステージクリア！
崩落の連鎖マスター！</div>
      <button class="btn" id="btn-restart">もう一度</button>
    </div>
  </div>
</div>

<script>
(() => {
  const COLS = 5, ROWS = 7;

  function buildGrid(cells) {
    const g = [];
    for (let r = 0; r < ROWS; r++) g.push(new Array(COLS).fill(null));
    for (const [c, r, type] of cells) {
      if (r >= 0 && r < ROWS && c >= 0 && c < COLS) g[r][c] = { type };
    }
    return g;
  }

  // =========================================================
  // ステージ設計（全5ステージ）
  // =========================================================
  const STAGES = [
    {
      // St1: 1手 / ★1個 / 直落ち
      label: '1', goal: 1,
      badge: '操作理解 + コア体験',
      hint: 'キーストーン(×)を\nタップして消去！\n★を落下ゾーンへ！',
      grid: buildGrid([
        [2, 1, 'star'],
        [2, 2, 'key'],
      ])
    },
    {
      // St2: 2手 / ★2個 / 隣接消去を発見
      label: '2', goal: 2,
      badge: '新ルール発見',
      hint: '★が2つ並ぶと\n消えるよ！\nうまく落とそう',
      grid: buildGrid([
        [1, 1, 'star'], [1, 2, 'key'], [1, 3, 'normal'],
        [2, 1, 'star'], [2, 2, 'key'], [2, 3, 'normal'],
      ])
    },
    {
      // St3: 3手 / ★3個 / 隣接消去(2個) + 直落ち(1個)
      label: '3', goal: 3,
      badge: '思考 + 応用',
      hint: '★を並べて\nまとめて消せ！',
      grid: buildGrid([
        [0, 1, 'star'], [0, 2, 'key'], [0, 4, 'normal'],
        [1, 1, 'star'], [1, 2, 'key'], [1, 4, 'normal'],
        [2, 5, 'normal'],
        [3, 1, 'star'], [3, 2, 'key'],
      ])
    },
    {
      // St4: 4手 / ★4個 / 先読み（隣接消去2個 + 直落ち2個）
      label: '4', goal: 4,
      badge: '先読み',
      hint: '隣接消去と\n落下を使い分けろ！',
      grid: buildGrid([
        [0, 0, 'star'], [0, 1, 'key'], [0, 3, 'normal'],
        [1, 0, 'star'], [1, 1, 'key'], [1, 3, 'normal'],
        [3, 0, 'star'], [3, 1, 'key'],
        [4, 0, 'star'], [4, 1, 'key'],
      ])
    },
    {
      // St5: 5手 / ★4個 / 複合連鎖（隣接消去2個 + 2段キー + 直落ち）
      label: '5', goal: 4,
      badge: '連鎖マスター',
      hint: 'すべての★を落とせ！\n順番を読んで\n最短手数を狙え！',
      grid: buildGrid([
        [1, 0, 'star'], [1, 1, 'key'], [1, 4, 'normal'],
        [2, 0, 'star'], [2, 1, 'key'], [2, 4, 'normal'],
        [3, 2, 'star'], [3, 3, 'key'],
        [4, 1, 'star'], [4, 2, 'key'], [4, 3, 'key'],
      ])
    },
  ];

  // --- ゲーム状態 ---
  let stageIdx = 0;
  let grid = [];
  let turnCount = 0;
  let starsDropped = 0;

  // --- ホバー状態 ---
  let hoverCol = -1, hoverRow = -1;

  const canvas = document.getElementById('grid');
  const ctx = canvas.getContext('2d');
  const hudStageNum = document.getElementById('stage-num');
  const hudStarCount = document.getElementById('star-count');
  const hudTurnCount = document.getElementById('turn-count');

  function resizeCanvas() {
    const area = document.getElementById('grid-area');
    canvas.width = area.clientWidth;
    canvas.height = area.clientHeight;
    draw();
  }

  function cellSize() {
    return Math.min(canvas.width / COLS, canvas.height / ROWS);
  }

  function gridOffset() {
    const cs = cellSize();
    return {
      ox: (canvas.width - cs * COLS) / 2,
      oy: (canvas.height - cs * ROWS) / 2
    };
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const cs = cellSize();
    const { ox, oy } = gridOffset();
    const pad = cs * 0.07;
    const rad = s => s * 0.14;

    const gBg = ctx.createLinearGradient(ox, oy, ox, oy + cs * ROWS);
    gBg.addColorStop(0, '#060e24');
    gBg.addColorStop(1, '#040918');
    ctx.fillStyle = gBg;
    roundRect(ctx, ox, oy, cs * COLS, cs * ROWS, 4);
    ctx.fill();

    ctx.strokeStyle = 'rgba(26,40,72,.7)';
    ctx.lineWidth = 1;
    for (let r = 0; r <= ROWS; r++) {
      ctx.beginPath();ctx.moveTo(ox, oy + r * cs);ctx.lineTo(ox + cs * COLS, oy + r * cs);ctx.stroke();
    }
    for (let c = 0; c <= COLS; c++) {
      ctx.beginPath();ctx.moveTo(ox + c * cs, oy);ctx.lineTo(ox + c * cs, oy + cs * ROWS);ctx.stroke();
    }

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const cell = grid[r][c];
        if (!cell) continue;
        const x = ox + c * cs + pad;
        const y = oy + r * cs + pad;
        const s = cs - pad * 2;
        const rr = rad(s);

        // ホバー中のキーストーンは明るく強調
        const isHoveredKey = cell.type === 'key' && r === hoverRow && c === hoverCol;

        if (cell.type === 'normal') {
          const gN = ctx.createLinearGradient(x, y, x, y + s);
          gN.addColorStop(0, '#3e62a8');gN.addColorStop(1, '#223060');
          ctx.fillStyle = gN;roundRect(ctx, x, y, s, s, rr);ctx.fill();
          ctx.strokeStyle = '#4a6aaa';ctx.lineWidth = 1;ctx.stroke();
          ctx.fillStyle = 'rgba(120,160,255,.12)';
          roundRect(ctx, x + s*.1, y + s*.05, s*.8, s*.25, rr*.6);ctx.fill();
        } else if (cell.type === 'key') {
          ctx.shadowColor = isHoveredKey ? 'rgba(255,120,40,.9)' : 'rgba(255,80,20,.55)';
          ctx.shadowBlur = isHoveredKey ? s * 0.55 : s * 0.3;
          const gK = ctx.createLinearGradient(x, y, x, y + s);
          if (isHoveredKey) {
            gK.addColorStop(0, '#c44018');gK.addColorStop(1, '#7a2508');
          } else {
            gK.addColorStop(0, '#9a3412');gK.addColorStop(1, '#5a1a05');
          }
          ctx.fillStyle = gK;roundRect(ctx, x, y, s, s, rr);ctx.fill();
          ctx.shadowBlur = 0;
          ctx.strokeStyle = isHoveredKey ? '#ff8050' : '#ff6030';
          ctx.lineWidth = isHoveredKey ? 3 : 2;ctx.stroke();
          ctx.strokeStyle = isHoveredKey ? '#ffe0c0' : '#ffcc99';
          ctx.lineWidth = Math.max(1.5, s * 0.08);ctx.lineCap = 'round';
          const m = s * 0.26;
          ctx.beginPath();
          ctx.moveTo(x + m, y + m);ctx.lineTo(x + s - m, y + s - m);
          ctx.moveTo(x + s - m, y + m);ctx.lineTo(x + m, y + s - m);
          ctx.stroke();ctx.lineCap = 'butt';
        } else if (cell.type === 'star') {
          ctx.shadowColor = 'rgba(255,215,0,.6)';ctx.shadowBlur = s * 0.4;
          const gS = ctx.createLinearGradient(x, y, x, y + s);
          gS.addColorStop(0, '#1e3e10');gS.addColorStop(1, '#0a1e08');
          ctx.fillStyle = gS;roundRect(ctx, x, y, s, s, rr);ctx.fill();
          ctx.shadowBlur = 0;ctx.strokeStyle = '#ffd700';ctx.lineWidth = 2;ctx.stroke();
          ctx.shadowColor = 'rgba(255,215,0,.8)';ctx.shadowBlur = s * 0.25;
          drawStar(ctx, x + s / 2, y + s / 2, s * 0.36, '#ffd700');
          ctx.shadowBlur = 0;
        }
      }
    }
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);ctx.lineTo(x + w - r, y);ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
  }

  function drawStar(ctx, cx, cy, r, color) {
    ctx.fillStyle = color;ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = (i * 4 * Math.PI / 5) - Math.PI / 2;
      const a2 = (i * 4 * Math.PI / 5 + 2 * Math.PI / 5) - Math.PI / 2;
      const px = cx + r * Math.cos(a), py = cy + r * Math.sin(a);
      const px2 = cx + r * 0.42 * Math.cos(a2), py2 = cy + r * 0.42 * Math.sin(a2);
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      ctx.lineTo(px2, py2);
    }
    ctx.closePath();ctx.fill();
  }

  function updateHUD() {
    const stage = STAGES[stageIdx];
    hudStageNum.textContent = stage.label;
    hudStarCount.textContent = `★ ${starsDropped}/${stage.goal}`;
    hudTurnCount.textContent = `TURN ${turnCount}`;
  }

  // 重力1ステップ
  function applyGravityOnce() {
    let changed = false;
    for (let c = 0; c < COLS; c++) {
      for (let r = ROWS - 2; r >= 0; r--) {
        if (grid[r][c] && !grid[r + 1][c]) {
          grid[r + 1][c] = grid[r][c];
          grid[r][c] = null;
          changed = true;
        }
      }
    }
    return changed;
  }

  // 最下行のブロックを落下ゾーンへ
  function dropBottomRow() {
    let dropped = false;
    for (let c = 0; c < COLS; c++) {
      if (grid[ROWS - 1][c]) {
        if (grid[ROWS - 1][c].type === 'star') starsDropped++;
        grid[ROWS - 1][c] = null;
        dropped = true;
      }
    }
    return dropped;
  }

  // 重力を完全収束（落下→最下行消去を繰り返し）
  function applyFullGravity() {
    let any = true;
    while (any) {
      while (applyGravityOnce()) {}
      any = dropBottomRow();
    }
  }

  // 2個以上隣接する★グループを消去（上下左右）
  function applyStarAdjacentClear() {
    const visited = Array.from({ length: ROWS }, () => new Array(COLS).fill(false));
    const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
    let cleared = false;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (visited[r][c] || !grid[r][c] || grid[r][c].type !== 'star') continue;
        const group = [];
        const queue = [[r, c]];
        visited[r][c] = true;
        while (queue.length) {
          const [cr, cc] = queue.shift();
          group.push([cr, cc]);
          for (const [dr, dc] of dirs) {
            const nr = cr + dr, nc = cc + dc;
            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS
                && !visited[nr][nc] && grid[nr][nc] && grid[nr][nc].type === 'star') {
              visited[nr][nc] = true;
              queue.push([nr, nc]);
            }
          }
        }
        if (group.length >= 2) {
          for (const [gr, gc] of group) { grid[gr][gc] = null; starsDropped++; }
          cleared = true;
        }
      }
    }
    return cleared;
  }

  // 物理収束：重力→隣接消去→繰り返し
  function applyPhysics() {
    let any = true;
    while (any) {
      applyFullGravity();
      any = applyStarAdjacentClear();
    }
  }

  // キーストーン消去：タップしたセルにキーストーンがあれば1つ消去
  // キーストーン以外のセルをタップしても何も起きない
  function removeBlock(col, row) {
    if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return;
    const cell = grid[row][col];
    if (!cell) return;                    // 空セル → 無視
    if (cell.type !== 'key') return;     // キーストーン以外 → 無視
    // タップしたセルのキーストーン1つのみ消去
    grid[row][col] = null;
    turnCount++;
    applyPhysics();
    updateHUD();
    draw();
    const stage = STAGES[stageIdx];
    if (starsDropped >= stage.goal) {
      setTimeout(showClear, 350);
    }
  }

  function showClear() {
    document.getElementById('clear-sub').textContent =
      `★ ${starsDropped}個を落とした！（${turnCount}手）`;
    if (stageIdx < STAGES.length - 1) {
      document.getElementById('modal-clear').classList.add('visible');
    } else {
      document.getElementById('modal-complete').classList.add('visible');
    }
  }

  function loadStage(idx) {
    stageIdx = idx;
    const stage = STAGES[idx];
    grid = stage.grid.map(row => row.map(c => c ? { ...c } : null));
    turnCount = 0;
    starsDropped = 0;
    hoverCol = -1;
    hoverRow = -1;
    updateHUD();
    draw();
  }

  // セル座標を取得するヘルパー
  function getCellFromEvent(e) {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
    const my = (e.clientY - rect.top) * (canvas.height / rect.height);
    const cs = cellSize();
    const { ox, oy } = gridOffset();
    const col = Math.floor((mx - ox) / cs);
    const row = Math.floor((my - oy) / cs);
    return { col, row };
  }

  // タップ（左クリック）: キーストーンのみ消去
  canvas.addEventListener('pointerdown', (e) => {
    const { col, row } = getCellFromEvent(e);
    removeBlock(col, row);
  });

  // ホバー: キーストーン上でカーソルをポインターに変更 + ハイライト描画
  canvas.addEventListener('pointermove', (e) => {
    const { col, row } = getCellFromEvent(e);
    let newCursor = 'default';
    let needRedraw = false;
    if (col >= 0 && col < COLS && row >= 0 && row < ROWS && grid[row][col] && grid[row][col].type === 'key') {
      newCursor = 'pointer';
      if (hoverCol !== col || hoverRow !== row) {
        hoverCol = col; hoverRow = row;
        needRedraw = true;
      }
    } else {
      if (hoverCol !== -1 || hoverRow !== -1) {
        hoverCol = -1; hoverRow = -1;
        needRedraw = true;
      }
    }
    canvas.style.cursor = newCursor;
    if (needRedraw) draw();
  });

  canvas.addEventListener('pointerleave', () => {
    if (hoverCol !== -1 || hoverRow !== -1) {
      hoverCol = -1; hoverRow = -1;
      canvas.style.cursor = 'default';
      draw();
    }
  });

  document.getElementById('btn-ready').addEventListener('pointerdown', () => {
    document.getElementById('modal-ready').classList.remove('visible');
  });

  function showReadyModal(idx) {
    const stage = STAGES[idx];
    document.getElementById('ready-title').textContent = `STAGE ${stage.label}`;
    document.getElementById('ready-sub').textContent = stage.hint;
    document.getElementById('ready-badge').textContent = stage.badge;
    document.getElementById('modal-ready').classList.add('visible');
  }

  document.getElementById('btn-next').addEventListener('pointerdown', () => {
    document.getElementById('modal-clear').classList.remove('visible');
    loadStage(stageIdx + 1);
    showReadyModal(stageIdx);
  });

  document.getElementById('btn-restart').addEventListener('pointerdown', () => {
    document.getElementById('modal-complete').classList.remove('visible');
    loadStage(0);
    showReadyModal(0);
  });

  window.addEventListener('resize', resizeCanvas);

  loadStage(0);
  setTimeout(resizeCanvas, 50);
  document.getElementById('modal-ready').classList.add('visible');
})();
</script>
</body>
</html>
