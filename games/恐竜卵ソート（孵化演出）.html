<!DOCTYPE html>
<!--
  Phone frame template for hybrid-casual-mentor generated games.
  Aspect ratio: 9:19.5 (iPhone X 系縦長, NEONNOVA2048 基準)。
  PC で開いても常にこの比率を保ち、letterbox（左右黒帯）で中央表示。
  すべてのゲーム要素は #phone の子として配置すること。
-->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>恐竜卵ソート（孵化演出）</title>
<style>
  :root {
    --phone-aspect: 9 / 19.5;
    --bg-deep: #02030a;
    --bg-mid: #0a1430;
    --bg-panel: #06081a;
    --bg-card: #0b1228;
    --line: #1a2848;
    --cyan: #6ff;
    --cyan-soft: #8df;
    --hp-pink: #ff8aa0;
    --warn: #ffb86c;
    --text-main: #eaf3ff;
    --text-sub: #cdddef;
    --text-dim: #7a92b5;
    --nova-9: #ffd76b;
    --nova-7: #ffb24a;
    --nova-5: #ff7a3a;
    --nova-3: #ff5d8a;
    --nova-1: #b585ff;
    --nova-0: #ffffff;
    /* Egg type colors */
    --trex-shell: #e8c84a;
    --trex-spot: #8b5e0a;
    --trex-glow: #ffec80;
    --tri-shell: #5abf6e;
    --tri-spot: #1a6b2e;
    --tri-glow: #80ffaa;
    --rap-shell: #6a8fe0;
    --rap-spot: #1a3a8b;
    --rap-glow: #aaccff;
    --steg-shell: #e06060;
    --steg-spot: #8b1010;
    --steg-glow: #ff9090;
    --anky-shell: #c080e0;
    --anky-spot: #6030a0;
    --anky-glow: #e0aaff;
    /* Stock slot */
    --slot-bg: #111830;
    --slot-border: #2a4060;
    --hatch-gold: #ffe066;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    width:100%;height:100%;
    overflow:hidden;
    background:#000;
    color:#fff;
    font-family:'Helvetica Neue',system-ui,sans-serif;
    user-select:none;
    -webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
  }
  body{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #phone{
    position:relative;
    overflow:hidden;
    width:min(100vw,calc(100vh * 9 / 19.5));
    height:min(100vh,calc(100vw * 19.5 / 9));
    --pw:min(100vw,calc(100vh * 9 / 19.5));
    --ph:min(100vh,calc(100vw * 19.5 / 9));
    --u:calc(var(--pw) / 100);
    --uh:calc(var(--ph) / 100);
    background:
      radial-gradient(ellipse 80% 45% at 50% 20%, #0d2a4a 0%, transparent 70%),
      radial-gradient(ellipse 60% 35% at 20% 80%, #0a1a30 0%, transparent 60%),
      linear-gradient(180deg, var(--bg-mid) 0%, var(--bg-deep) 100%);
  }

  /* ─── TOP BAR: HUD + Stock Area ─── */
  /* HUD はステージ番号と孵化カウント（右側） */
  #hud{
    position:absolute;top:0;left:0;width:100%;
    height:calc(10 * var(--uh));
    display:flex;align-items:center;justify-content:flex-end;
    padding:calc(1.5*var(--uh)) calc(4 * var(--u)) 0;
    background:linear-gradient(180deg,var(--bg-panel) 60%,transparent);
    border-bottom:1px solid var(--line);
    z-index:10;
  }
  #hatch-count{
    font-size:calc(1.8 * var(--u));
    color:var(--text-dim);
    text-align:right;
    line-height:1.4;
  }
  #hatch-count span{
    color:var(--nova-9);
    font-weight:800;
    font-size:calc(2.4 * var(--u));
  }

  /* ─── Stock area（上部配置・小さめ） ─── */
  #stock-area{
    position:absolute;
    top:calc(10 * var(--uh));
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:calc(2.5 * var(--u));
    align-items:center;
    justify-content:center;
    padding:calc(1*var(--uh)) calc(3*var(--u));
    background:linear-gradient(135deg, var(--bg-card) 0%, var(--bg-panel) 100%);
    border-radius:0 0 calc(4*var(--u)) calc(4*var(--u));
    border:1px solid var(--line);
    border-top:none;
    box-shadow:0 calc(.5*var(--u)) calc(3*var(--u)) rgba(0,0,0,.5);
    z-index:10;
  }
  .stock-slot{
    width:calc(18 * var(--u));
    height:calc(21 * var(--u));
    border-radius:calc(2 * var(--u));
    background:radial-gradient(ellipse at 50% 30%, rgba(255,255,255,.04) 0%, var(--slot-bg) 80%);
    border:2px solid var(--slot-border);
    display:flex;align-items:center;justify-content:center;
    position:relative;
    overflow:hidden;
    transition:border-color .2s, box-shadow .2s;
  }
  .stock-slot:has(svg){
    box-shadow:0 0 calc(2*var(--u)) rgba(255,255,255,.06) inset;
  }
  .stock-slot svg{
    width:calc(13 * var(--u));
    height:calc(16 * var(--u));
  }

  /* ─── Stock label（ストックエリア左端の小ラベル） ─── */
  #stock-label{
    position:absolute;
    top:calc(10 * var(--uh));
    left:calc(2 * var(--u));
    height:calc(8 * var(--uh));
    display:flex;
    align-items:center;
    font-size:calc(1.4 * var(--u));
    color:var(--text-dim);
    letter-spacing:.15em;
    white-space:nowrap;
    text-transform:uppercase;
    z-index:11;
  }

  /* ─── Goal badge（画面左上、ストックエリアUIの左） ─── */
  #goal-badge{
    position:absolute;
    top:calc(1.5 * var(--uh));
    left:calc(2 * var(--u));
    padding:calc(.5*var(--uh)) calc(3*var(--u));
    border-radius:calc(5*var(--u));
    border:1px solid var(--line);
    background:linear-gradient(135deg, var(--bg-panel) 0%, var(--bg-card) 100%);
    font-size:calc(1.5*var(--u));
    color:var(--text-dim);
    white-space:nowrap;
    box-shadow:0 calc(.3*var(--u)) calc(2*var(--u)) rgba(0,0,0,.4);
    max-width:calc(52*var(--u));
    overflow:hidden;
    text-overflow:ellipsis;
    z-index:15;
  }
  #goal-badge span{color:var(--nova-9);font-weight:700;}

  /* ─── Egg field（ストックエリアの下から画面下まで） ─── */
  #field{
    position:absolute;
    top:calc(19 * var(--uh));
    left:calc(4 * var(--u));
    width:calc(92 * var(--u));
    bottom:calc(5 * var(--uh));
    display:grid;
    gap:calc(2 * var(--u));
    align-content:start;
  }
  .egg-slot{
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    position:relative;
    border-radius:calc(3*var(--u));
    background:radial-gradient(ellipse at 50% 30%, rgba(255,255,255,.03) 0%, transparent 70%);
    transition:background .15s;
  }
  .egg-slot:hover{
    background:radial-gradient(ellipse at 50% 30%, rgba(255,255,255,.07) 0%, transparent 70%);
  }
  .egg-slot svg{
    filter:drop-shadow(0 0 calc(2*var(--u)) var(--eglow));
    transition:transform .12s,filter .12s;
  }
  .egg-slot:active svg,.egg-slot.tap svg{
    transform:scale(.82) translateY(calc(.5*var(--uh)));
    filter:drop-shadow(0 0 calc(4*var(--u)) var(--eglow)) brightness(1.4);
  }
  .egg-slot.used{opacity:0;pointer-events:none;transition:opacity .25s;}
  /* 上の卵がブロックしている状態（下の卵は暗くタップ不可） */
  .egg-slot.blocked{
    opacity:0.45;
    pointer-events:none;
    cursor:default;
    filter:saturate(.3) brightness(.55);
  }
  /* ブロックされた卵の上に「重さ」アイコンを重ねる */
  .egg-slot.blocked::before{
    content:'';
    position:absolute;
    inset:0;
    border-radius:calc(3*var(--u));
    background:linear-gradient(180deg,
      rgba(0,0,0,.55) 0%,
      rgba(0,0,0,.0) 55%
    );
    pointer-events:none;
    z-index:2;
  }
  .egg-slot.blocked::after{
    content:'▼';
    position:absolute;
    top:calc(1*var(--u));
    left:50%;
    transform:translateX(-50%);
    font-size:calc(2*var(--u));
    color:rgba(255,160,80,.75);
    text-shadow:0 0 calc(1.5*var(--u)) rgba(255,100,0,.6);
    pointer-events:none;
    z-index:3;
    animation:weightPulse 1.4s ease-in-out infinite;
  }
  @keyframes weightPulse{
    0%,100%{opacity:.6;transform:translateX(-50%) translateY(0);}
    50%{opacity:1;transform:translateX(-50%) translateY(calc(.8*var(--u)));}
  }

  /* ─── Hatch burst overlay（ボタンなし・自動クローズ） ─── */
  #hatch-overlay{
    position:absolute;inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    z-index:30;
    background:radial-gradient(ellipse at 50% 40%, rgba(20,40,80,.75) 0%, rgba(2,3,10,.88) 100%);
    flex-direction:column;
    gap:calc(3.5 * var(--uh));
  }
  #hatch-overlay.show{display:flex;}
  #dino-display{
    font-size:calc(25 * var(--u));
    line-height:1;
    filter:drop-shadow(0 0 calc(4*var(--u)) var(--hatch-gold));
    animation:dinoAppear .55s cubic-bezier(.17,.67,.4,1.4) both;
  }
  @keyframes dinoAppear{
    0%{transform:scale(0) rotate(-20deg);opacity:0;}
    60%{transform:scale(1.3) rotate(6deg);}
    100%{transform:scale(1) rotate(0);opacity:1;}
  }
  #hatch-name{
    font-size:calc(6 * var(--u));
    font-weight:900;
    background:linear-gradient(135deg, var(--nova-9) 0%, var(--nova-7) 50%, var(--nova-5) 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    filter:drop-shadow(0 0 calc(1.5*var(--u)) var(--nova-7));
    animation:fadeUp .45s .2s both;
    letter-spacing:.04em;
  }
  #hatch-sub{
    font-size:calc(2.4 * var(--u));
    color:var(--text-sub);
    animation:fadeUp .4s .35s both;
    letter-spacing:.03em;
  }
  @keyframes fadeUp{
    from{opacity:0;transform:translateY(calc(3*var(--uh)));}
    to{opacity:1;transform:none;}
  }
  /* Particle canvas */
  #particles{
    position:absolute;inset:0;
    pointer-events:none;
    z-index:20;
  }
  /* Modal overlay */
  #modal{
    position:absolute;inset:0;
    display:none;
    align-items:center;justify-content:center;
    z-index:40;
    background:radial-gradient(ellipse at 50% 40%, rgba(10,20,50,.92) 0%, rgba(2,3,10,.96) 100%);
    flex-direction:column;
    gap:calc(2.5*var(--uh));
  }
  #modal.show{display:flex;}
  #modal-badge{
    font-size:calc(1.8 * var(--u));
    font-weight:700;
    letter-spacing:.25em;
    color:var(--text-dim);
    text-transform:uppercase;
    border:1px solid var(--line);
    padding:calc(.5*var(--uh)) calc(4*var(--u));
    border-radius:calc(5*var(--u));
    background:var(--bg-panel);
  }
  #modal-title{
    font-size:calc(11 * var(--u));
    font-weight:900;
    letter-spacing:.04em;
    background:linear-gradient(135deg, var(--nova-9) 0%, var(--nova-7) 40%, var(--nova-5) 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    filter:drop-shadow(0 0 calc(2*var(--u)) var(--nova-7));
    text-shadow:none;
  }
  #modal-sub{
    font-size:calc(2.4*var(--u));
    color:var(--text-sub);
    text-align:center;
    line-height:1.6;
    padding:0 calc(10*var(--u));
    white-space:pre-line;
  }
  #modal-btn{
    padding:calc(2.2*var(--uh)) calc(14*var(--u));
    border-radius:calc(12*var(--u));
    background:linear-gradient(135deg, var(--cyan) 0%, var(--cyan-soft) 100%);
    color:#001824;
    font-size:calc(3*var(--u));
    font-weight:900;
    border:none;cursor:pointer;
    box-shadow:0 0 calc(4*var(--u)) rgba(102,255,255,.5), 0 calc(.5*var(--u)) calc(2*var(--u)) rgba(0,0,0,.4);
    letter-spacing:.04em;
  }
  #modal-btn:active{transform:scale(.95);}
  /* Stock clear button */
  #stock-clear-btn{
    position:absolute;
    top:calc(18.5 * var(--uh));
    right:calc(3 * var(--u));
    padding:calc(.4*var(--uh)) calc(4*var(--u));
    border-radius:calc(6*var(--u));
    background:rgba(255,90,90,.18);
    border:1px solid rgba(255,90,90,.4);
    color:var(--hp-pink);
    font-size:calc(1.6*var(--u));
    font-weight:700;
    cursor:pointer;
    white-space:nowrap;
    display:none;
    z-index:12;
  }
  /* Background stars */
  #stars{position:absolute;inset:0;pointer-events:none;z-index:0;}
</style>
</head>
<body>
<div id="phone">
  <canvas id="stars"></canvas>
  <canvas id="particles"></canvas>

  <!-- HUD（右側：孵化カウント） -->
  <div id="hud">
    <div id="hatch-count">孵化 <span id="hatch-done">0</span> / <span id="hatch-need">1</span></div>
  </div>

  <!-- Goal badge（画面左上、お題表示） -->
  <div id="goal-badge"><span id="goal-text">卵を3つ集めて孵化！</span></div>

  <!-- Stock area（上部配置・小さめ） -->
  <div id="stock-area">
    <div class="stock-slot" id="ss0"></div>
    <div class="stock-slot" id="ss1"></div>
    <div class="stock-slot" id="ss2"></div>
  </div>

  <!-- Stock label（ストックエリア左端） -->
  <div id="stock-label">STOCK</div>

  <!-- Stock clear button -->
  <button id="stock-clear-btn">↩ もどす</button>

  <!-- Egg field -->
  <div id="field"></div>

  <!-- Hatch burst overlay（ボタンなし・自動クローズ） -->
  <div id="hatch-overlay">
    <div id="dino-display"></div>
    <div id="hatch-name"></div>
    <div id="hatch-sub"></div>
  </div>

  <!-- Stage/Clear modal -->
  <div id="modal">
    <div id="modal-badge"></div>
    <div id="modal-title"></div>
    <div id="modal-sub"></div>
    <button id="modal-btn"></button>
  </div>
</div>
<script>
// ─── 恐竜卵ソート（孵化演出）10ステージ版 ───────────────────────────
// EGG TYPES：各種ごとに形状（shape）を割り当て
// shape: 'oval'=通常卵, 'star'=星形, 'square'=四角, 'diamond'=ひし形, 'hexagon'=六角形
const TYPES = {
  trex:  { name:'T-REX',       emoji:'🦖', shell:'--trex-shell', spot:'--trex-spot', glow:'--trex-glow', label:'T-レックス',    shape:'oval'    },
  tri:   { name:'TRICERATOPS', emoji:'🦕', shell:'--tri-shell',  spot:'--tri-spot',  glow:'--tri-glow',  label:'トリケラ',      shape:'square'  },
  rap:   { name:'RAPTOR',      emoji:'🦷', shell:'--rap-shell',  spot:'--rap-spot',  glow:'--rap-glow',  label:'ラプトル',      shape:'star'    },
  steg:  { name:'STEGOSAURUS', emoji:'🐉', shell:'--steg-shell', spot:'--steg-spot', glow:'--steg-glow', label:'ステゴ',        shape:'diamond' },
  anky:  { name:'ANKYLOSAURUS',emoji:'🦎', shell:'--anky-shell', spot:'--anky-spot', glow:'--anky-glow', label:'アンキロ',      shape:'hexagon' },
};

// mulberry32 PRNG（STAGES 定数・ランダム配置で使用）
function mulberry32(seed) {
  let s = seed;
  return function() {
    s += 0x6D2B79F5;
    let t = s; t = Math.imul(t ^ t>>>15, t|1); t ^= t + Math.imul(t ^ t>>>7, t|61);
    return ((t ^ t>>>14) >>> 0) / 4294967296;
  };
}

// ─── ランダム配置ヘルパー ─────────────────
// seed を固定して同じステージは常に同じランダム配置になるようにする
function shuffleEggs(eggs, seed) {
  const arr = eggs.slice();
  const rng = mulberry32(seed);
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr.map((e, i) => ({ ...e, id: 'e' + i }));
}

// ─── STAGE DATA ──────────────────────────
// 各ステージの eggs は「どの種が何個あるか」を定義し、
// loadStage 時に seed でランダムシャッフル + col 再割り当てを行う
const STAGES = [
  {
    id: 1,
    goal: '卵を3つ集めて孵化！',
    goalLabel: '操作理解',
    hatches: 1,
    cols: 3,
    eggs: [
      {id:'e0', type:'trex'},
      {id:'e1', type:'trex'},
      {id:'e2', type:'trex'},
    ],
    hint: 'タップして卵をストックに！3個で孵化！',
  },
  {
    id: 2,
    goal: '同じ種類を3個集めて孵化！',
    goalLabel: '種類の見分け方を学ぼう',
    hatches: 1,
    cols: 3,
    eggs: [
      {id:'e0', type:'trex'},
      {id:'e1', type:'tri'},
      {id:'e2', type:'trex'},
      {id:'e3', type:'tri'},
      {id:'e4', type:'trex'},
      {id:'e5', type:'tri'},
    ],
    hint: 'T-REXを3個集めよう！',
  },
  {
    id: 3,
    goal: '上の卵をどかさないと届かない！T-REXを3個集めて孵化！',
    goalLabel: '縦積みを攻略しよう',
    hatches: 1,
    cols: 3,
    eggs: [
      {id:'e0', type:'trex'},
      {id:'e1', type:'trex'},
      {id:'e2', type:'rap'},
      {id:'e3', type:'trex'},
      {id:'e4', type:'tri'},
      {id:'e5', type:'trex'},
    ],
    hint: '▼マークの卵は上の卵が乗っているので選べない！',
  },
  {
    id: 4,
    goal: '種類ごとに3個集めて2回孵化！',
    goalLabel: '思考 ＋ 応用',
    hatches: 2,
    cols: 3,
    eggs: [
      {id:'e0', type:'tri'},
      {id:'e1', type:'rap'},
      {id:'e2', type:'tri'},
      {id:'e3', type:'rap'},
      {id:'e4', type:'tri'},
      {id:'e5', type:'rap'},
    ],
    hint: '同じ種類を3個集めよう！',
  },
  {
    id: 5,
    goal: '3種混在！2種類を孵化させよう！',
    goalLabel: '3種同時進行',
    hatches: 2,
    cols: 3,
    eggs: [
      {id:'e0', type:'trex'},
      {id:'e1', type:'tri'},
      {id:'e2', type:'rap'},
      {id:'e3', type:'tri'},
      {id:'e4', type:'rap'},
      {id:'e5', type:'trex'},
      {id:'e6', type:'rap'},
      {id:'e7', type:'trex'},
      {id:'e8', type:'tri'},
    ],
    hint: '3種混在から同種3個を2回集めよう！',
  },
  {
    id: 6,
    goal: '4種混在！2種類を孵化させよう！',
    goalLabel: '4種選別チャレンジ',
    hatches: 2,
    cols: 4,
    eggs: [
      {id:'e0',  type:'trex'},
      {id:'e1',  type:'tri'},
      {id:'e2',  type:'rap'},
      {id:'e3',  type:'steg'},
      {id:'e4',  type:'steg'},
      {id:'e5',  type:'rap'},
      {id:'e6',  type:'tri'},
      {id:'e7',  type:'trex'},
      {id:'e8',  type:'rap'},
      {id:'e9',  type:'steg'},
      {id:'e10', type:'trex'},
      {id:'e11', type:'tri'},
    ],
    hint: 'ステゴが新登場！4種から2種を見極めよう！',
  },
  {
    id: 7,
    goal: '大量卵から2種類を孵化させよう！',
    goalLabel: '上級への橋渡し',
    hatches: 2,
    cols: 3,
    eggs: (() => {
      const a = [];
      ['trex','tri','rap'].forEach(t => {
        for (let k = 0; k < 6; k++) a.push({id:'e'+(a.length), type:t});
      });
      return a;
    })(),
    hint: '計18個の中から素早く同種を2回集めよう！',
  },
  {
    id: 8,
    goal: '5種類の恐竜を全員孵化させよう！',
    goalLabel: '上級：5種混戦',
    hatches: 5,
    cols: 4,
    eggs: (() => {
      const a = [];
      ['trex','tri','rap','steg','anky'].forEach(t => {
        for (let k = 0; k < 3; k++) a.push({id:'e'+(a.length), type:t});
      });
      return a;
    })(),
    hint: 'アンキロが新登場！5種類を制覇しよう！',
  },
  {
    id: 9,
    goal: '5種類、各2セット！計10回孵化！',
    goalLabel: '上級：大量孵化戦',
    hatches: 10,
    cols: 4,
    eggs: (() => {
      const a = [];
      ['trex','tri','rap','steg','anky'].forEach(t => {
        for (let k = 0; k < 6; k++) a.push({id:'e'+(a.length), type:t});
      });
      return a;
    })(),
    hint: '計30個！5種類を2セットずつ集めよう！',
  },
  {
    id: 10,
    goal: '最終決戦！5種類×4セット！計20回孵化！',
    goalLabel: '最終ステージ：究極の孵化師',
    hatches: 20,
    cols: 4,
    eggs: (() => {
      const a = [];
      ['trex','tri','rap','steg','anky'].forEach(t => {
        for (let k = 0; k < 12; k++) a.push({id:'e'+(a.length), type:t});
      });
      return a;
    })(),
    hint: '全60個！究極の孵化師を目指せ！',
  },
];

// ─── State ───────────────────────────
let stageIdx = 0;
let eggs = [];
let stock = [];
let hatchDone = 0;
let hatchNeed = 0;
let busy = false;
// モーダル状態管理：'ready' | 'clear' | 'gameclear' | 'none'
let modalMode = 'none';
// colMap（列ごとの卵リスト）—ブロック判定に使用
let colMap = {};

// ─── DOM refs ───────────────────────
const phone    = document.getElementById('phone');
const fieldEl  = document.getElementById('field');
const hatchDoneEl = document.getElementById('hatch-done');
const hatchNeedEl = document.getElementById('hatch-need');
const goalText = document.getElementById('goal-text');
const stockSlots = [0,1,2].map(i => document.getElementById('ss'+i));
const hatchOverlay = document.getElementById('hatch-overlay');
const dinoDisplay  = document.getElementById('dino-display');
const hatchName    = document.getElementById('hatch-name');
const hatchSub     = document.getElementById('hatch-sub');
const modalEl      = document.getElementById('modal');
const stockClearBtn = document.getElementById('stock-clear-btn');
const modalBadge   = document.getElementById('modal-badge');
const modalTitle   = document.getElementById('modal-title');
const modalSub     = document.getElementById('modal-sub');
const modalBtn     = document.getElementById('modal-btn');
const particleCanvas = document.getElementById('particles');
const pctx = particleCanvas.getContext('2d');
const starsCanvas  = document.getElementById('stars');
const sctx = starsCanvas.getContext('2d');

// ─── Stars background ───────────────
function resizeCanvases() {
  const pw = phone.clientWidth, ph = phone.clientHeight;
  particleCanvas.width = starsCanvas.width = pw;
  particleCanvas.height = starsCanvas.height = ph;
  drawStars();
}

function drawStars() {
  const w = starsCanvas.width, h = starsCanvas.height;
  sctx.clearRect(0,0,w,h);
  const rng = mulberry32(42);
  for (let i=0; i<60; i++) {
    const x=rng()*w, y=rng()*h, r=rng()*1.2+.3, a=rng()*.6+.2;
    sctx.beginPath();
    sctx.arc(x,y,r,0,Math.PI*2);
    sctx.fillStyle=`rgba(200,220,255,${a})`;
    sctx.fill();
  }
}

// ─── getCSSVar ───────────────────────
function getCSSVar(name) {
  return getComputedStyle(phone).getPropertyValue(name).trim();
}

// ─── SVG shape builders ──────────────
function buildShapeSVG(type, shellColor, spotColor) {
  const t = TYPES[type];
  switch (t.shape) {
    case 'oval':
      return `<ellipse cx="13" cy="17" rx="11" ry="14" fill="url(#eg_${type})"/>
        <ellipse cx="13" cy="14" rx="3" ry="2.5" fill="${spotColor}" opacity=".7"/>
        <ellipse cx="9"  cy="20" rx="2.5" ry="2" fill="${spotColor}" opacity=".6"/>
        <ellipse cx="18" cy="21" rx="2" ry="1.8" fill="${spotColor}" opacity=".6"/>
        <ellipse cx="10" cy="11" rx="3.5" ry="2" fill="white" opacity=".18"/>`;
    case 'square':
      return `<rect x="2" y="4" width="22" height="24" rx="4" fill="url(#eg_${type})"/>
        <circle cx="10" cy="11" r="2.5" fill="${spotColor}" opacity=".7"/>
        <circle cx="17" cy="11" r="2"   fill="${spotColor}" opacity=".6"/>
        <circle cx="10" cy="19" r="2"   fill="${spotColor}" opacity=".6"/>
        <circle cx="17" cy="19" r="2.5" fill="${spotColor}" opacity=".6"/>
        <rect x="3" y="5" width="8" height="5" rx="2" fill="white" opacity=".15"/>`;
    case 'star':
      return `<polygon points="13,2 15.5,9 23,9 17,14 19.5,22 13,17.5 6.5,22 9,14 3,9 10.5,9" fill="url(#eg_${type})"/>
        <polygon points="13,6 14.2,10 18,10 15,12.5 16.2,16.5 13,14 9.8,16.5 11,12.5 8,10 11.8,10" fill="${spotColor}" opacity=".5"/>
        <circle cx="13" cy="7" r="1.5" fill="white" opacity=".3"/>`;
    case 'diamond':
      return `<polygon points="13,1 24,16 13,31 2,16" fill="url(#eg_${type})"/>
        <rect x="9" y="11" width="8" height="8" rx="1" transform="rotate(45 13 15)" fill="${spotColor}" opacity=".5"/>
        <circle cx="13" cy="8" r="2" fill="white" opacity=".2"/>`;
    case 'hexagon':
      return `<polygon points="13,1 23,7 23,19 13,25 3,19 3,7" fill="url(#eg_${type})"/>
        <polygon points="13,7 17,10 17,16 13,19 9,16 9,10" fill="${spotColor}" opacity=".5"/>
        <circle cx="13" cy="7" r="2" fill="white" opacity=".2"/>`;
    default:
      return `<ellipse cx="13" cy="17" rx="11" ry="14" fill="url(#eg_${type})"/>
        <ellipse cx="10" cy="11" rx="3.5" ry="2" fill="white" opacity=".18"/>`;
  }
}

// サイズ指定付き SVG（フィールド用）
function eggSVGSized(type, w, h) {
  const t = TYPES[type];
  const shell = getCSSVar(t.shell);
  const spot  = getCSSVar(t.spot);
  const shapeContent = buildShapeSVG(type, shell, spot);
  return `<svg viewBox="0 0 26 32" xmlns="http://www.w3.org/2000/svg"
    style="width:calc(${w}*var(--u));height:calc(${h}*var(--u));filter:drop-shadow(0 0 calc(2*var(--u)) var(--eglow))">
    <defs>
      <radialGradient id="eg_${type}" cx="38%" cy="30%" r="65%">
        <stop offset="0%" stop-color="${shell}" stop-opacity=".95"/>
        <stop offset="100%" stop-color="${spot}" stop-opacity=".85"/>
      </radialGradient>
    </defs>
    ${shapeContent}
  </svg>`;
}

// ストック表示用 SVG（固定サイズ）
function eggSVG(type) {
  const t = TYPES[type];
  const shell = getCSSVar(t.shell);
  const spot  = getCSSVar(t.spot);
  const shapeContent = buildShapeSVG(type, shell, spot);
  return `<svg viewBox="0 0 26 32" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="eg_${type}" cx="38%" cy="30%" r="65%">
        <stop offset="0%" stop-color="${shell}" stop-opacity=".95"/>
        <stop offset="100%" stop-color="${spot}" stop-opacity=".85"/>
      </radialGradient>
    </defs>
    ${shapeContent}
  </svg>`;
}

// ─── Blocked state update（縦積みレベルデザイン） ─────────────────────
// 各列で「上の卵（row=0が最上段）がused/blocked状態かどうか」を確認し、
// 一番上にある未使用卵のみタップ可能にする。
function updateBlockedState() {
  // colMap の各列で、未使用・非ブロック状態の卵を確認
  Object.keys(colMap).forEach(col => {
    const colEggs = colMap[col];
    // row昇順（0=最上段）でソート済みのはず
    let topAccessible = true;
    colEggs.forEach(egg => {
      if (egg.used) {
        // 使用済み → スキップ（下の卵に影響しない）
        return;
      }
      // 未使用の卵
      if (topAccessible) {
        // この卵が列の最上位未使用 → タップ可能
        egg.el.classList.remove('blocked');
        topAccessible = false; // 以降の卵はブロック
      } else {
        // 上にまだ未使用の卵がある → ブロック
        egg.el.classList.add('blocked');
      }
    });
  });
}

// ─── Load stage ──────────────────────
function loadStage(idx) {
  const s = STAGES[idx];
  stageIdx = idx;
  stock = [];
  hatchDone = 0;
  hatchNeed = s.hatches;
  busy = false;

  hatchDoneEl.textContent = hatchDone;
  hatchNeedEl.textContent = hatchNeed;
  goalText.textContent = s.goal;

  // ステージIDをseedにしてランダムシャッフル + col再割り当て
  const shuffled = shuffleEggs(s.eggs, s.id * 1000 + 7);
  const cols = s.cols;

  // col を行ごとに順番に割り当て（row=0が上段）
  const withCol = shuffled.map((e, i) => ({ ...e, col: i % cols, row: Math.floor(i / cols) }));

  // colMap を構築（各列の卵を row 昇順で格納）
  colMap = {};
  withCol.forEach(e => {
    if (!colMap[e.col]) colMap[e.col] = [];
    colMap[e.col].push(e);
  });
  // row 昇順にソート
  Object.keys(colMap).forEach(col => {
    colMap[col].sort((a, b) => a.row - b.row);
  });
  const maxRows = Math.max(...Object.values(colMap).map(a => a.length));

  fieldEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  fieldEl.style.gridTemplateRows = `repeat(${maxRows}, 1fr)`;
  fieldEl.innerHTML = '';

  // 卵サイズをステージに応じて調整（大量卵は小さく）
  const eggW = maxRows > 8 ? 12 : maxRows > 5 ? 15 : 20;
  const eggH = Math.round(eggW * 1.2);

  eggs = [];
  for (let row = 0; row < maxRows; row++) {
    for (let col = 0; col < cols; col++) {
      const colEggs = (colMap[col] || []);
      const egg = colEggs[row];
      const cell = document.createElement('div');
      cell.className = 'egg-slot';
      if (egg) {
        const t = TYPES[egg.type];
        cell.style.setProperty('--eglow', getCSSVar(t.glow));
        cell.innerHTML = eggSVGSized(egg.type, eggW, eggH);
        cell.dataset.eid = egg.id;
        const eobj = { id: egg.id, type: egg.type, col, row, el: cell, used: false };
        eggs.push(eobj);
        // colMap の参照を eobj で置き換え（blocked state 更新のため）
        colMap[col][row] = eobj;
        cell.addEventListener('pointerdown', () => onEggTap(eobj));
      }
      fieldEl.appendChild(cell);
    }
  }

  updateStockUI();
  clearParticles();
  // 初期ブロック状態を設定（各列の1段目以外はブロック）
  updateBlockedState();
}

// ─── Egg tap ─────────────────────────
function onEggTap(egg) {
  if (busy || egg.used) return;
  if (stock.length >= 3) return;

  egg.used = true;
  egg.el.classList.add('used');
  egg.el.classList.remove('blocked');

  egg.el.classList.add('tap');
  setTimeout(() => egg.el.classList.remove('tap'), 150);

  stock.push({ type: egg.type, eggId: egg.id });

  // この卵が除去されたのでブロック状態を再計算
  updateBlockedState();

  updateStockUI();
  checkMatch();
}

// ─── Stock UI ────────────────────────
function updateStockUI() {
  for (let i = 0; i < 3; i++) {
    const slot = stockSlots[i];
    if (stock[i]) {
      const t = TYPES[stock[i].type];
      slot.style.setProperty('--eglow', getCSSVar(t.glow));
      slot.style.borderColor = getCSSVar(t.shell);
      slot.innerHTML = eggSVG(stock[i].type);
    } else {
      slot.innerHTML = '';
      slot.style.borderColor = '';
    }
  }
  stockClearBtn.style.display = (stock.length > 0 && !busy) ? 'block' : 'none';
}

// ─── Check match ─────────────────────
function checkMatch() {
  if (stock.length < 3) return;
  const t0 = stock[0].type, t1 = stock[1].type, t2 = stock[2].type;
  if (t0 === t1 && t1 === t2) {
    busy = true;
    stockClearBtn.style.display = 'none';
    triggerHatch(t0);
  }
}

// ─── Particles ───────────────────────
let particles = [];
let animFrameId = null;

function clearParticles() {
  particles = [];
  if (animFrameId) cancelAnimationFrame(animFrameId);
  animFrameId = null;
  pctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
}

function spawnParticles(cx, cy, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i / count) + Math.random() * .3;
    const speed = 2 + Math.random() * 5;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      r: 3 + Math.random() * 5,
      alpha: 1,
      color,
      life: 1,
    });
  }
  if (!animFrameId) animLoop();
}

function animLoop() {
  pctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
  particles = particles.filter(p => p.alpha > .02);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += .15;
    p.alpha *= .93;
    p.r *= .98;
    pctx.save();
    pctx.globalAlpha = p.alpha;
    pctx.beginPath();
    pctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    pctx.fillStyle = p.color;
    pctx.shadowColor = p.color;
    pctx.shadowBlur = 8;
    pctx.fill();
    pctx.restore();
  });
  if (particles.length > 0) {
    animFrameId = requestAnimationFrame(animLoop);
  } else {
    animFrameId = null;
    pctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
  }
}

// ─── Hatch trigger ───────────────────
function triggerHatch(type) {
  const t = TYPES[type];
  const glowColor = getCSSVar(t.glow);

  const stockAreaEl = document.getElementById('stock-area');
  const r = stockAreaEl.getBoundingClientRect();
  const pr = phone.getBoundingClientRect();
  const cx = r.left + r.width / 2 - pr.left;
  const cy = r.top + r.height / 2 - pr.top;
  spawnParticles(cx, cy, glowColor, 32);

  stockSlots.forEach(s => {
    s.style.background = glowColor;
    s.style.boxShadow = `0 0 calc(4*var(--u)) ${glowColor}`;
  });
  setTimeout(() => {
    stockSlots.forEach(s => {
      s.style.background = '';
      s.style.boxShadow = '';
    });
  }, 300);

  setTimeout(() => showHatchOverlay(type), 350);
}

function showHatchOverlay(type) {
  const t = TYPES[type];
  dinoDisplay.textContent = t.emoji;
  hatchName.textContent = t.label + ' 誕生！';
  hatchSub.textContent = '卵から恐竜が飛び出した！';
  hatchOverlay.classList.add('show');

  const cx = particleCanvas.width / 2;
  const cy = particleCanvas.height / 2;
  const glowColor = getCSSVar(t.glow);
  spawnParticles(cx, cy, glowColor, 50);
  spawnParticles(cx, cy, '#ffe066', 30);

  // ボタンなし：1秒後に自動クローズ
  setTimeout(() => closeHatchOverlay(type), 1000);
}

// ─── Hatch overlay close（自動・ボタンなし） ─────────────────────
function closeHatchOverlay(type) {
  hatchOverlay.classList.remove('show');
  stock = [];
  updateStockUI();

  hatchDone++;
  hatchDoneEl.textContent = hatchDone;

  if (hatchDone >= hatchNeed) {
    setTimeout(() => showStageClear(), 200);
  } else {
    busy = false;
  }
}

// ─── Stock clear ──────────────────────
stockClearBtn.addEventListener('pointerdown', () => {
  if (busy || stock.length === 0) return;
  stock.forEach(s => {
    const egg = eggs.find(e => e.id === s.eggId);
    if (egg) {
      egg.used = false;
      egg.el.classList.remove('used');
    }
  });
  stock = [];
  updateStockUI();
  // 戻した卵のブロック状態を再計算
  updateBlockedState();
});

// ─── Stage clear / next ──────────────
function showStageClear() {
  const s = STAGES[stageIdx];
  const isLast = stageIdx >= STAGES.length - 1;

  modalBadge.textContent = isLast ? 'GAME CLEAR' : 'STAGE CLEAR';
  modalTitle.textContent = isLast ? 'COMPLETE!' : 'CLEAR!';
  modalSub.textContent = isLast
    ? 'すべての恐竜を孵化させた！\n伝説の孵化師に認定！'
    : `Stage ${s.id} クリア！\n次のステージへ進もう！`;
  modalBtn.textContent = isLast ? 'もう一度' : '次のステージへ';
  modalMode = isLast ? 'gameclear' : 'clear';
  modalEl.classList.add('show');

  const w = particleCanvas.width, h = particleCanvas.height;
  spawnParticles(w * .3, h * .4, '#ffd76b', 25);
  spawnParticles(w * .7, h * .4, '#6ff', 25);
  spawnParticles(w * .5, h * .5, '#ff8aa0', 25);
}

// ─── READY modal ─────────────────────
function showReady(idx) {
  const s = STAGES[idx];
  modalBadge.textContent = `STAGE ${s.id}`;
  modalTitle.textContent = 'READY';
  modalSub.textContent = `${s.goalLabel}\n${s.hint}`;
  modalBtn.textContent = 'スタート！';
  modalMode = 'ready';
  modalEl.classList.add('show');
}

// ─── Modal button ─ 単一ハンドラーで状態管理 ───
modalBtn.addEventListener('pointerdown', () => {
  if (modalMode === 'ready') {
    // READY → ゲーム開始
    modalEl.classList.remove('show');
    modalMode = 'none';
  } else if (modalMode === 'clear') {
    // STAGE CLEAR → 次のステージへ即開始（READYモーダルなし）
    modalEl.classList.remove('show');
    modalMode = 'none';
    const nextIdx = stageIdx + 1;
    loadStage(nextIdx);
    // 即開始：READYモーダルを表示しない
  } else if (modalMode === 'gameclear') {
    // GAME CLEAR → 最初から（READYモーダルあり）
    modalEl.classList.remove('show');
    modalMode = 'none';
    loadStage(0);
    setTimeout(() => showReady(0), 100);
  }
});

// ─── Init ────────────────────────────
window.addEventListener('resize', resizeCanvases);
resizeCanvases();
loadStage(0);
setTimeout(() => showReady(0), 100);
</script>
