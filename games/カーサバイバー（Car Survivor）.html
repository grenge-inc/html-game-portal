<!DOCTYPE html>
<!--
  Phone frame template for hybrid-casual-mentor generated games.
  Aspect ratio: 9:19.5 (iPhone X 系縦長, NEONNOVA2048 基準)。
  PC で開いても常にこの比率を保ち、letterbox（左右黒帯）で中央表示。
  すべてのゲーム要素は #phone の子として配置すること。
-->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>カーサバイバー</title>
<style>
  :root {
    --phone-aspect: 9 / 19.5; /* スマホ縦長基準 (iPhone X 以降) */
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html, body {
    width:100%; height:100%;
    overflow:hidden;
    background:#000;            /* letterbox 部分の色 */
    color:#fff;
    font-family:'Helvetica Neue', system-ui, sans-serif;
    user-select:none;
    -webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
  }
  body {
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #phone {
    position:relative;
    overflow:hidden;
    /* 画面に収まる最大の 9:19.5 矩形 */
    width:  min(100vw, calc(100vh * 9 / 19.5));
    height: min(100vh, calc(100vw * 19.5 / 9));
    --pw:   min(100vw, calc(100vh * 9 / 19.5));
    --ph:   min(100vh, calc(100vw * 19.5 / 9));
    --u:    calc(var(--pw) / 100); /* 1u  = phone 幅 1% */
    --uh:   calc(var(--ph) / 100); /* 1uh = phone 高 1% */
    /* マッドマックス荒野トーン */
    --sand:#c9a36b; --sand-d:#9c7b46; --sand-dd:#6e5631;
    --steel:#6b7280; --steel-l:#9aa3ad; --steel-d:#3a3f48;
    --rust:#a0522d; --fire:#ff7a2a; --fire-l:#ffd34a;
    --grunt:#8a5a3c; --raider:#b04a2a; --heavy:#5a4636; --boss:#3d2c20;
    --grunt_small:#c08a6a; --grunt_large:#6a3a20;
    --hp:#ff5d4a; --xp:#ffd34a; --ink:#1a120a; --paper:#f1e2c4;
    background:radial-gradient(120% 80% at 50% 30%, #d8b87a 0%, #b88f54 45%, #8a6a3c 100%);
    cursor:crosshair;
  }
  /* 砂塵レイヤ */
  #dust{position:absolute;inset:0;pointer-events:none;
    background:repeating-radial-gradient(circle at 30% 20%, rgba(255,255,255,.04) 0 2px, transparent 2px 30px),
               repeating-radial-gradient(circle at 70% 70%, rgba(110,86,49,.10) 0 3px, transparent 3px 40px);
    opacity:.7;animation:drift 14s linear infinite;}
  @keyframes drift{to{background-position:60px 30px,-50px -40px;}}
  #board{position:absolute;inset:0;}
  canvas{position:absolute;inset:0;width:100%;height:100%;}
  /* HUD 上部 */
  #hud{position:absolute;top:calc(var(--uh)*1.5);left:calc(var(--u)*3);right:calc(var(--u)*3);
    z-index:5;pointer-events:none;font-weight:800;letter-spacing:.04em;text-shadow:0 1px 0 #000;}
  .bar{height:calc(var(--uh)*1.7);border:2px solid var(--steel-d);border-radius:99px;
    background:rgba(20,12,6,.55);overflow:hidden;position:relative;margin-top:calc(var(--uh)*.6);}
  .bar > i{position:absolute;inset:0;width:100%;transform-origin:left;transition:transform .12s linear;}
  #hpFill{background:linear-gradient(90deg,#ff8a4a,var(--hp));}
  #xpFill{background:linear-gradient(90deg,#fff0a0,var(--xp));}
  #bossFill{background:linear-gradient(90deg,#ffb24a,var(--rust));}
  .row{display:flex;justify-content:space-between;align-items:center;font-size:calc(var(--u)*3.3);}
  #stTag{color:var(--paper);}
  #scrapTag{color:var(--fire-l);}
  #killTag{color:#ff9f6a;font-size:calc(var(--u)*3);}
  #bossWrap{display:none;margin-top:calc(var(--uh)*.8);}
  #bossWrap.on{display:block;}
  #bossLbl{font-size:calc(var(--u)*3);color:var(--fire);}
  /* パーツ章標（盛り具合の表示） */
  #parts{position:absolute;left:calc(var(--u)*3);bottom:calc(var(--uh)*2);z-index:5;
    display:flex;gap:calc(var(--u)*1.4);pointer-events:none;}
  .chip{font-size:calc(var(--u)*3);font-weight:800;padding:calc(var(--uh)*.4) calc(var(--u)*2);
    border-radius:99px;background:rgba(20,12,6,.6);border:2px solid var(--steel-d);color:var(--paper);}
  .chip b{color:var(--fire-l);}
  /* 自機方向インジケータ（画面外の自機方向を示す矢印・カメラ追従の保険） */
  #offArrow{position:absolute;z-index:4;display:none;pointer-events:none;
    font-size:calc(var(--u)*5);color:var(--fire-l);text-shadow:0 0 calc(var(--u)*2) var(--fire);
    transform:translate(-50%,-50%);}
  /* モーダル共通 */
  .modal{position:absolute;inset:0;z-index:20;display:none;align-items:center;justify-content:center;
    flex-direction:column;background:radial-gradient(circle at 50% 40%, rgba(40,24,12,.78), rgba(10,6,2,.92));
    text-align:center;padding:calc(var(--u)*6);}
  .modal.on{display:flex;}
  .modal h1{font-size:calc(var(--u)*8.5);color:var(--fire-l);text-shadow:0 calc(var(--uh)*.5) 0 #5a2a00,0 0 calc(var(--u)*4) var(--fire);
    letter-spacing:.06em;line-height:1.05;}
  .modal p{font-size:calc(var(--u)*3.6);color:var(--paper);margin-top:calc(var(--uh)*1.4);line-height:1.5;}
  .btn{margin-top:calc(var(--uh)*2.4);font-size:calc(var(--u)*4.2);font-weight:900;letter-spacing:.05em;
    padding:calc(var(--uh)*1.4) calc(var(--u)*9);border:3px solid #2a1a0a;border-radius:calc(var(--u)*2.5);
    color:#2a1505;background:linear-gradient(180deg,var(--fire-l),var(--fire));cursor:pointer;
    box-shadow:0 calc(var(--uh)*.6) 0 #7a2a00,0 calc(var(--uh)*1.4) calc(var(--u)*3) rgba(0,0,0,.5);}
  .btn:active{transform:translateY(2px);}
  /* レベルアップ選択 */
  #lvTitle{font-size:calc(var(--u)*6);color:var(--fire-l);text-shadow:0 0 calc(var(--u)*3) var(--fire);}
  #picks{display:flex;flex-direction:column;gap:calc(var(--uh)*1.6);margin-top:calc(var(--uh)*2.5);width:100%;}
  .pick{display:flex;align-items:center;gap:calc(var(--u)*3);text-align:left;cursor:pointer;
    padding:calc(var(--uh)*1.4) calc(var(--u)*4);border:3px solid #2a1a0a;border-radius:calc(var(--u)*2.5);
    background:linear-gradient(180deg,#4a3a28,#2c2114);box-shadow:0 calc(var(--uh)*.6) 0 #120a02;}
  .pick:active{transform:translateY(2px);}
  .pick .ic{font-size:calc(var(--u)*8);filter:drop-shadow(0 0 calc(var(--u)*2) var(--fire));}
  .pick .tx b{display:block;font-size:calc(var(--u)*4.4);color:var(--fire-l);}
  .pick .tx span{font-size:calc(var(--u)*3.2);color:var(--paper);}
  #hint{position:absolute;bottom:calc(var(--uh)*7.5);left:0;right:0;z-index:4;text-align:center;
    font-size:calc(var(--u)*3.2);color:rgba(255,240,200,.85);text-shadow:0 1px 2px #000;pointer-events:none;
    transition:opacity .5s;}
  /* スタート画面：大小対比ダイアグラム */
  .start-diagram{display:flex;align-items:center;justify-content:center;gap:calc(var(--u)*1.5);
    margin-top:calc(var(--uh)*2);padding:calc(var(--uh)*1.2) calc(var(--u)*4);
    border:2px solid rgba(255,211,74,.35);border-radius:calc(var(--u)*3);
    background:rgba(20,12,6,.55);}
  .start-diagram .car-big{font-size:calc(var(--u)*12);filter:drop-shadow(0 0 calc(var(--u)*3) var(--fire-l));line-height:1;}
  .start-diagram .arrow-fly{font-size:calc(var(--u)*7);color:var(--fire-l);line-height:1;}
  .start-diagram .car-small{font-size:calc(var(--u)*6.5);opacity:.8;line-height:1;}
  .start-diagram .fly-dots{font-size:calc(var(--u)*6);color:var(--fire-l);line-height:1;}
  .start-tips{margin-top:calc(var(--uh)*1.6);width:100%;display:flex;flex-direction:column;
    gap:calc(var(--uh)*.85);}
  .start-tip{display:flex;align-items:center;gap:calc(var(--u)*2.5);
    font-size:calc(var(--u)*3.5);color:var(--paper);line-height:1.35;text-align:left;}
  .start-tip .tip-ic{font-size:calc(var(--u)*5.5);flex-shrink:0;}
</style>
</head>
<body>
  <div id="phone">
    <div id="dust"></div>
    <div id="board"><canvas id="cv"></canvas></div>

    <div id="hud">
      <div class="row"><span id="stTag">STAGE 1</span><span id="scrapTag">SCRAP 0  Lv1</span></div>
      <div class="row" style="margin-top:calc(var(--uh)*.4)"><span id="killTag"></span></div>
      <div class="bar"><i id="hpFill"></i></div>
      <div class="bar"><i id="xpFill"></i></div>
      <div id="bossWrap"><div id="bossLbl">⛟ 重装トラック</div><div class="bar"><i id="bossFill"></i></div></div>
    </div>

    <div id="parts">
      <span class="chip">🔩<b id="cRam">0</b></span>
      <span class="chip">🛡<b id="cArm">0</b></span>
      <span class="chip">⚙<b id="cSpk">0</b></span>
      <span class="chip">💨<b id="cSpd">0</b></span>
      <span class="chip">🎯<b id="cHdl">0</b></span>
      <span class="chip">🚀<b id="cMsl">0</b></span>
    </div>

    <div id="offArrow">➤</div>

    <div id="hint">荒野を押し続けて旋回轢殺。離すとブレーキ。</div>

    <!-- スタート -->
    <div class="modal on" id="mStart">
      <h1>カー<br>サバイバー</h1>
      <!-- 大小対比ダイアグラム：自機（大）が弱い敵（小）を弾き飛ばす瞬間 -->
      <div class="start-diagram">
        <span class="car-big">🚛</span>
        <span class="arrow-fly">💥</span>
        <span class="car-small">🚗</span>
        <span class="fly-dots">✦✦</span>
      </div>
      <div class="start-tips">
        <div class="start-tip"><span class="tip-ic">👊</span><span>自分より<b>小さい敵</b>は体当たりで弾き飛ばせる</span></div>
        <div class="start-tip"><span class="tip-ic">🖱</span><span>画面を<b>長押し</b>で走る&nbsp;→ 離すとブレーキ</span></div>
        <div class="start-tip"><span class="tip-ic">🏆</span><span>15体倒して、ボスを轢き潰せ</span></div>
      </div>
      <button class="btn" id="bStart">出撃</button>
    </div>

    <!-- レベルアップ -->
    <div class="modal" id="mLevel">
      <div id="lvTitle">LEVEL UP — パーツを盛れ</div>
      <div id="picks"></div>
    </div>

    <!-- ステージクリア -->
    <div class="modal" id="mClear">
      <h1 id="clearTitle">STAGE CLEAR</h1>
      <p id="clearSub">荒野を制圧した。</p>
      <button class="btn" id="bNext">次のステージへ</button>
    </div>

    <!-- ゲームオーバー -->
    <div class="modal" id="mOver">
      <h1 style="color:#ff6a4a">SCRAPPED</h1>
      <p>車体が大破した。</p>
      <button class="btn" id="bRetry">再出撃</button>
    </div>
  </div>
  <script>
  "use strict";
  const phone=document.getElementById('phone'), cv=document.getElementById('cv'), ctx=cv.getContext('2d');
  const $=id=>document.getElementById(id);

  // ---- 改修 14: ステージ拡大 ----
  const W=160, H=346.7;
  let DPR=1;
  function resize(){
    const r=phone.getBoundingClientRect();
    DPR=Math.min(2,window.devicePixelRatio||1);
    cv.width=r.width*DPR; cv.height=r.height*DPR;
    sx=r.width/VIEW_W; sy=r.height/VIEW_H;
  }
  let sx,sy;
  addEventListener('resize',resize);

  // ---- カメラ ----
  const ZOOM=1.5;
  const VIEW_W=W/ZOOM;
  const VIEW_H=H/ZOOM;
  const ANCHOR_X=0.5;
  const ANCHOR_Y=0.58;
  const cam={x:0,y:0};
  function camTarget(){
    let tx=car.x-VIEW_W*ANCHOR_X;
    let ty=car.y-VIEW_H*ANCHOR_Y;
    const maxX=W-VIEW_W, maxY=H-VIEW_H;
    tx=Math.max(0,Math.min(maxX,tx));
    ty=Math.max(0,Math.min(maxY,ty));
    return {x:tx,y:ty};
  }
  function snapCamera(){ const t=camTarget(); cam.x=t.x; cam.y=t.y; }
  function updateCamera(dt){
    const t=camTarget();
    const k=1-Math.pow(0.0006,dt);
    cam.x+=(t.x-cam.x)*k;
    cam.y+=(t.y-cam.y)*k;
  }
  function scrX(wx){ return (wx-cam.x)*sx; }
  function scrY(wy){ return (wy-cam.y)*sy; }

  // ---- ダメージ計算：角度倍率 & 速度ゲート ----
  const ANGLE_MULT_MIN = 0.4;
  const ANGLE_MULT_MAX = 2.0;
  function angleMult(relAngle){
    const c = Math.cos(relAngle);
    return ANGLE_MULT_MIN + (ANGLE_MULT_MAX - ANGLE_MULT_MIN) * (1 - c) / 2;
  }

  // 【速度ゲート】与ダメージにのみ適用。被ダメージは速度によらず常に発生。
  // ---- 改修 21: SPEED_GATE を 4.0→1.5、SPEED_FULL を 18.0→10.0 に引き下げ ----
  const SPEED_GATE = 1.5;
  const SPEED_FULL = 10.0;
  function speedGate(carSp){
    if(carSp <= SPEED_GATE) return 0;
    return Math.min(1, (carSp - SPEED_GATE) / (SPEED_FULL - SPEED_GATE));
  }

  function normalizeAngle(a){
    while(a > Math.PI) a -= Math.PI*2;
    while(a < -Math.PI) a += Math.PI*2;
    return a;
  }

  // ---- 改修 33: サイズ直接比較ダメージ（旧 massDmgMult を置き換え）----
  // playerSzIdx: 自機サイズ指数 = stats().radius / 2.7（Lv1初期=1.0, Lv7=3.0）
  // enemySzIdx:  敵のサイズ指数 (e.sz)
  //
  // 敵が自機より小さい（sz < player × 0.9）: 与ダメ 1.5 倍、被ダメ 0.8 倍
  // 敵が自機より大きい（sz > player × 1.1）: 被ダメ = clamp(10 × sizeRatio, 10, 50)
  //   → sizeRatio = enemySzIdx / playerSzIdx
  //   → 大きいほど被ダメが比例増加（正面ゴリ押し不能を数値担保）
  //   → 例: Lv1(idx=1.0) vs grunt_large(sz=1.8) → 被ダメ ×18
  //   → 例: Lv4(idx≈1.73) vs grunt_large(sz=1.8) → sizeRatio≈1.04 → 同サイズ帯でペナルティなし
  // 同サイズ帯（差 10% 未満）: 与ダメ・被ダメともに 1.0 倍
  function sizeDmgMult(playerSzIdx, enemySzIdx){
    if(enemySzIdx < playerSzIdx * 0.9){
      // 自機より小さい敵：与ダメ強化・被ダメ軽減
      return {take: 0.8, give: 1.5};
    } else if(enemySzIdx > playerSzIdx * 1.1){
      // 自機より大きい敵：被ダメ指数増加（ゴリ押し不能）
      // ---- 改修 33b: 係数 10 → 15 に引き上げ（grunt_large への Lv1 正面ゴリ押しを確実に阻止）----
      // Lv1 vs grunt_large(sizeRatio=1.8): 15×1.8=27 → 被ダメ×27
      // Lv1 vs boss(sizeRatio=3.0): 15×3.0=45 → 被ダメ×45
      // Lv4 vs grunt_large(playerSzIdx≈1.73, 1.8<1.73×1.1=1.90): 同サイズ帯 → ペナルティなし
      const sizeRatio = enemySzIdx / playerSzIdx;
      const takeMult = Math.min(50, 15 * sizeRatio);
      return {take: takeMult, give: 1.0};
    }
    // 同サイズ帯
    return {take: 1.0, give: 1.0};
  }

  // ---- 改修 17: 衝突 → 相互ノックバック（運動量保存の簡易モデル）----
  const CAR_BASE_MASS = 1.0;
  // ---- 改修 27: ノックバック強化（53.3→100）----
  const KB_BASE = 100;
  const KB_COOLDOWN = 0.14;
  const SELF_SLOW_MAX = 0.5;
  const KB_DECAY = 0.15;
  const KB_JITTER_MAX = 15 * Math.PI / 180;
  // ---- 改修 30: carMass はスクラップ自動成長を含む実質量を返す ----
  function carMass(){ return CAR_BASE_MASS + parts.arm + scrapBulk(); }
  function resolveKnockback(e, dx, dy, d, hit, S){
    const nx = dx/d, ny = dy/d;
    const myMass = carMass();
    const oppMass = e.sz;
    const total = myMass + oppMass;
    const carShare = oppMass / total;
    const eShare   = myMass / total;
    const power = KB_BASE + S.knock;
    const carKx = nx * power * carShare;
    const carKy = ny * power * carShare;
    const jit = (Math.random()*2-1) * KB_JITTER_MAX;
    const cj = Math.cos(jit), sj = Math.sin(jit);
    const ejx = -nx * cj - (-ny) * sj;
    const ejy = -nx * sj + (-ny) * cj;
    e.vx += ejx * power * eShare;
    e.vy += ejy * power * eShare;
    const slow = 1 - SELF_SLOW_MAX * carShare;
    car.vx *= slow; car.vy *= slow;
    const overlap = hit - d;
    if(overlap > 0){
      const sep = overlap + 0.2;
      car.x += nx * sep * carShare;
      car.y += ny * sep * carShare;
      e.x   += -nx * sep * eShare;
      e.y   += -ny * sep * eShare;
    }
    return {kx:carKx, ky:carKy};
  }

  // ---- 改修 23: 敵同士の分離衝突（重ならないよう押し離す・ダメージなし）----
  function separateEnemies(){
    const n = enemies.length;
    for(let i=0; i<n-1; i++){
      const a = enemies[i];
      for(let j=i+1; j<n; j++){
        const b = enemies[j];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.hypot(dx, dy) || 0.001;
        const minDist = a.r + b.r;
        if(dist < minDist){
          const overlap = (minDist - dist) * 0.5 + 0.05;
          const nx = dx / dist;
          const ny = dy / dist;
          a.x -= nx * overlap;
          a.y -= ny * overlap;
          b.x += nx * overlap;
          b.y += ny * overlap;
        }
      }
    }
  }

  // ---- ゲーム状態 ----
  // ---- 改修 22: プレイヤー初期 HP を 100→150 に増加 ----
  const car={x:80,y:H*0.72,vx:0,vy:0,heading:-Math.PI/2,hp:150,maxhp:150};
  // ---- 改修 30: wgt → spd（速度強化）/ hdl（小回り強化）に変更 ----
  const parts={ram:0,arm:0,spk:0,spd:0,hdl:0,msl:0};
  let enemies=[],scraps=[],heals=[],sparks=[],fx=[],trail=[],missiles=[];
  let dmgPops=[];
  let mslTimer=0;
  let pointer={active:false,x:80,y:100,rawClientX:0,rawClientY:0};
  let scrap=0, level=1, xp=0, xpNeed=3;
  let stage=1, boss=null, waveIdx=0, waves=[], spawnTimer=0;
  let killCount=0;
  const KILL_GOAL=15;
  const MAX_ENEMIES=10;
  const MAX_ENEMIES_BOSS=5;
  const SPAWN_INTERVAL_BOSS=3.0;
  let survivorSpawnTimer=0;
  const SPAWN_INTERVAL=1.5;
  let survivorPhase='none';
  let phase='start';
  let shake=0, last=0;
  // ---- 改修 35: カメラシェイクを「敵の大きさ非依存の固定量」に統一し全体的に控えめ化 ----
  // 各イベントで一定の控えめな振幅を使う（敵サイズ/HP/touch/速度に依存させない）。
  const SHK_HIT_TAKE = 2.0;   // 被弾（敵・ボス共通・一定）
  const SHK_HIT_GIVE = 3.0;   // 与ダメ（敵・ボス共通・一定。速度非依存）
  const SHK_EXPLODE  = 4.0;   // 撃破・爆発（敵サイズ非依存・一定）
  const SHK_SPAWN    = 3.0;   // 大型特殊敵スポーン（半径非依存・一定）
  const SHK_BOSS_DIE = 5.0;   // ボス撃破（一定）
  const SHK_WALL     = 2.0;   // 壁衝突（控えめ）
  const SHK_GROW     = 3.0;   // 成長・レベルアップ演出（控えめ）

  // ---- 回復アイテム定数 ----
  const HEAL_DROP_RATE = 0.05;
  const HEAL_AMOUNT_RATIO = 0.3;
  const HEAL_LOCK_DURATION = 1.0;

  // ---- 誘導ミサイル定数 ----
  const MSL_INTERVALS = [1.0, 0.7, 0.5, 0.4, 0.35];
  const MSL_INTERVAL_MIN = 0.3;
  const MSL_DAMAGE = 20;
  const MSL_SPEED = 46;
  const MSL_TURN = 7.5;
  const MSL_LIFE = 2.4;
  const MSL_HIT_R = 2.2;
  function mslInterval(n){
    if(n<=0) return Infinity;
    if(n<=MSL_INTERVALS.length) return MSL_INTERVALS[n-1];
    return MSL_INTERVAL_MIN;
  }

  // ---- 改修 30: スクラップ回収数に応じた自動成長バルク（重量・サイズ）----
  // 回収 scrap 10 個ごとに 1 段階成長。上限は 5.0（50 個相当）。
  // この値が carMass・radius・dmg に自動加算され、wgt カードを代替する。
  const SCRAP_BULK_PER = 10;    // 何個で 1 段階
  const SCRAP_BULK_MAX  = 5.0;  // 最大バルク加算量
  function scrapBulk(){
    return Math.min(SCRAP_BULK_MAX, Math.floor(scrap / SCRAP_BULK_PER) * 1.0);
  }
  // スクラップ段階（0〜5）：レベルアップ時の見た目変化に使う
  function scrapGrade(){
    return Math.min(5, Math.floor(scrap / SCRAP_BULK_PER));
  }

  // ---- 改修 32: レベル連動サイズアップ（Lv が 1 上がるごとに約 1.2 倍）----
  // 「レベルが上がった＝自機が大きくなった」を一目で伝える主成長軸。
  // 描画半径(drawCar の R)も当たり判定半径(stats().radius)も levelScale() を乗算するため自動連動。
  const LEVEL_SCALE_PER = 1.2;   // Lv ごとの倍率（Lv1=1.0, Lv2=1.2, Lv3=1.44, ...）
  const LEVEL_SCALE_MAX = 3.0;   // 巨大化しすぎ防止の上限（半径基準 2.7 → 最大 ~8.1≒ボス級弱）
  function levelScale(){
    return Math.min(LEVEL_SCALE_MAX, Math.pow(LEVEL_SCALE_PER, Math.max(0, level - 1)));
  }
  // レベルアップ拡大ポップ演出用（瞬間的にスケールが弾む視覚フィードバック）
  let levelPop = 0;
  function levelPopScale(){
    // levelPop が 1→0 へ減衰する間、最大 +25% のオーバーシュートを上乗せ
    return 1 + 0.25 * Math.sin(Math.min(1, levelPop) * Math.PI);
  }

  // 車の派生ステータス（盛ったパーツ + スクラップ自動成長で成長）
  // ---- 改修 30: wgt 削除。bulk は arm + scrapBulk() に変更。spd / hdl カード追加 ----
  function stats(){
    const sb = scrapBulk();
    const bulk = parts.arm + sb;       // 重さ指数 = 装甲 + スクラップ成長
    // ---- 改修 32: サイズの主軸を「レベル連動 1.2 倍/Lv」に変更 ----
    // scrapBulk / arm の半径寄与は弱め(0.75→0.32, 0.25→0.12)、levelScale() を乗算して
    // 「レベルが上がるたびに目に見えて大きくなる」を主成長表現にする。二重肥大を防止。
    const radius = (2.7 + bulk*0.32 + parts.ram*0.12) * levelScale();
    const dmg = 16 + parts.ram*14 + sb*11;  // スクラップ成長が与ダメにも寄与
    const dot = parts.spk*105;
    const dmgCut = Math.min(0.6, parts.arm*0.15);
    // ---- 改修 30: hdl（小回り）カードで旋回率が上がる。scrapBulk は重さとして旋回を下げる ----
    const turn = (1.9 + parts.hdl * 0.25) / (1 + bulk*0.16);
    // ---- 改修 30: spd（速度）カードで速度上昇 ----
    const accel = 31.2 + parts.spd * 4.0;
    const maxv  = 39   + parts.spd * 3.0;
    const knock = 8 + parts.ram*6 + sb*3.3;  // 重量感は scrapBulk で
    return {radius, dmg, dot, dmgCut, turn, accel, maxv, knock, bulk};
  }

  // ---- 入力（pointer のみ・keydown/keyup 不使用）----
  function clientToWorld(clientX, clientY){
    const r=phone.getBoundingClientRect();
    const sxp=(clientX-r.left)/r.width*VIEW_W;
    const syp=(clientY-r.top)/r.height*VIEW_H;
    return {x:sxp+cam.x, y:syp+cam.y};
  }
  function toWorld(e){
    pointer.rawClientX=e.clientX;
    pointer.rawClientY=e.clientY;
    const w=clientToWorld(e.clientX, e.clientY);
    pointer.x=w.x;
    pointer.y=w.y;
  }

  // ---- 改修 28: 大型特殊敵（sizeGrade +1〜+3）のスケール係数 ----
  const OVERSIZE_GRADES = [
    null,
    {rMult:1.5, szMult:1.5, hpMult:2.0, touchMult:1.5, spdMult:0.9, glowCol:'#ff8c00', warnText:'⚠ 大型出現！'},

  ];
  // ---- 改修 29: 「自機より大きい敵」の総出現率を約10%に圧縮 ----
  const BIG_SPAWN_RATE = 0.10;
  const OVERSIZE_IN_BIG_RATE = 0.35;
  function gruntRatioForKill(){
    if(killCount<15) return 0.45;
    if(killCount<30) return 0.55;
    return 0.65;
  }

  function spawn(type,x,y){
    const t=TYPES[type];
    enemies.push({type,x,y,hp:t.hp,maxhp:t.hp,r:t.r,spd:t.spd,touch:t.touch,xp:t.xp,sz:t.sz,
      col:t.col,dotT:0,hitFlash:0,vx:0,vy:0,kbCd:0,sizeGrade:0});
  }

  // ---- 改修 28: 大型特殊敵スポーン ----
  function spawnOversize(type, x, y){
    const t = TYPES[type];
    const grade = 1 + Math.floor(Math.random() * 3);
    const g = OVERSIZE_GRADES[grade];
    const r = t.r * g.rMult;
    const sz = t.sz * g.szMult;
    const hp = Math.round(t.hp * g.hpMult);
    const touch = t.touch * g.touchMult;
    const spd = t.spd * g.spdMult;
    enemies.push({type, x, y, hp, maxhp: hp, r, spd, touch, xp: t.xp * grade, sz,
      col: t.col, dotT: 0, hitFlash: 0, vx: 0, vy: 0, kbCd: 0, sizeGrade: grade});
    explodeOversizeSpawn(x, y, r, g.glowCol);
    bigText(g.warnText, g.glowCol);
  }

  function spawnRing(type,n,cx,cy,rad){
    for(let i=0;i<n;i++){const a=i/n*Math.PI*2; spawn(type,cx+Math.cos(a)*rad,cy+Math.sin(a)*rad);}
  }

  // ---- 改修 29: サバイバーモードでの敵タイプ選択 ----
  function smallEnemyType(){
    return Math.random() < gruntRatioForKill() ? 'grunt' : 'grunt_small';
  }
  function bigEnemyType(){
    const r=Math.random();
    if(killCount<15) return 'grunt_large';
    if(killCount<30){
      if(r<0.55) return 'grunt_large';
      return 'raider';
    }
    if(r<0.40) return 'grunt_large';
    if(r<0.72) return 'raider';
    return 'heavy';
  }

  function spawnSurvivorEnemy(){
    const side=Math.floor(Math.random()*4);
    let x,y;
    const margin=8;
    if(side===0){x=Math.random()*(W-margin*2)+margin; y=margin;}
    else if(side===1){x=Math.random()*(W-margin*2)+margin; y=H-margin;}
    else if(side===2){x=margin; y=Math.random()*(H-margin*2)+margin;}
    else{x=W-margin; y=Math.random()*(H-margin*2)+margin;}
    if(Math.random() < BIG_SPAWN_RATE){
      const type=bigEnemyType();
      if(Math.random() < OVERSIZE_IN_BIG_RATE){
        spawnOversize(type, x, y);
      } else {
        spawn(type, x, y);
      }
    } else {
      spawn(smallEnemyType(), x, y);
    }
  }

  // ---- 回復アイテム：ドロップ・取得・描画 ----
  function dropHeal(x, y){
    if(Math.random() >= HEAL_DROP_RATE) return;
    heals.push({x, y, t:0});
  }
  function drawHeal(h){
    const locked = h.t < HEAL_LOCK_DURATION;
    const px=h.x*sx, py=h.y*sy;
    ctx.save();
    ctx.translate(px, py);
    if(locked){
      const progress = h.t / HEAL_LOCK_DURATION;
      let bounceY;
      if(progress < 0.5){
        bounceY = -Math.sin(progress / 0.5 * Math.PI) * 4.5 * sx;
      } else {
        bounceY = -Math.sin((progress - 0.5) / 0.5 * Math.PI) * 2.0 * sx;
      }
      let scaleVal;
      if(progress < 0.5){
        scaleVal = 1.2 - 0.2 * (progress / 0.5);
      } else {
        scaleVal = 0.85 + 0.15 * ((progress - 0.5) / 0.5);
      }
      ctx.translate(0, bounceY);
      ctx.scale(scaleVal, scaleVal);
      const alpha = 0.45 + 0.15 * Math.sin(h.t * 12);
      ctx.globalAlpha = alpha;
      const arm = 2.2 * sx;
      const thk = 0.9 * sx;
      ctx.shadowColor = 'rgba(180,60,80,0.4)';
      ctx.shadowBlur = Math.max(2, 2 * sx);
      ctx.fillStyle = '#b06070';
      ctx.fillRect(-thk, -arm, thk*2, arm*2);
      ctx.fillRect(-arm, -thk, arm*2, thk*2);
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    } else {
      const afterUnlock = h.t - HEAL_LOCK_DURATION;
      let unlockFlash = 0;
      if(afterUnlock < 0.15){
        unlockFlash = Math.sin(afterUnlock / 0.15 * Math.PI);
      }
      const flashScale = 1.0 + 0.35 * unlockFlash;
      ctx.scale(flashScale, flashScale);
      const pulse = 1 + 0.18 * Math.sin(h.t * 7);
      const arm = 2.2 * sx * pulse;
      const thk = 0.9 * sx * pulse;
      ctx.shadowColor = '#ff4466';
      ctx.shadowBlur = Math.max(4, 3 * sx);
      ctx.fillStyle = '#ff2255';
      ctx.fillRect(-thk, -arm, thk*2, arm*2);
      ctx.fillRect(-arm, -thk, arm*2, thk*2);
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.fillRect(-thk*0.55, -arm*0.9, thk*1.1, arm*0.55);
      if(unlockFlash > 0){
        ctx.globalAlpha = unlockFlash * 0.7;
        ctx.strokeStyle = '#ffd34a';
        ctx.lineWidth = Math.max(1, 1.2 * sx);
        ctx.beginPath();
        ctx.arc(0, 0, arm * (1.6 + 0.4 * unlockFlash), 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }
    ctx.restore();
  }

  // ---- 誘導ミサイル ----
  function nearestTarget(){
    let best=null, bd=Infinity;
    for(const e of enemies){
      const d=(e.x-car.x)*(e.x-car.x)+(e.y-car.y)*(e.y-car.y);
      if(d<bd){bd=d;best=e;}
    }
    if(boss){
      const d=(boss.x-car.x)*(boss.x-car.x)+(boss.y-car.y)*(boss.y-car.y);
      if(d<bd){bd=d;best=boss;}
    }
    return best;
  }
  function fireMissile(){
    const t=nearestTarget();
    if(!t) return;
    const ang=Math.atan2(t.y-car.y, t.x-car.x);
    missiles.push({x:car.x, y:car.y, ang, target:t, life:MSL_LIFE});
    burst(car.x, car.y, '#9fe8ff', 5);
  }
  function updateMissiles(dt){
    for(let i=missiles.length-1;i>=0;i--){
      const m=missiles[i];
      m.life-=dt;
      let tgt=m.target;
      const alive = tgt && tgt.hp>0 && (tgt===boss || enemies.indexOf(tgt)>=0);
      if(!alive){ tgt=nearestTarget(); m.target=tgt; }
      if(tgt){
        const desired=Math.atan2(tgt.y-m.y, tgt.x-m.x);
        let diff=normalizeAngle(desired-m.ang);
        const tr=MSL_TURN*dt;
        m.ang+=Math.max(-tr, Math.min(tr, diff));
      }
      m.x+=Math.cos(m.ang)*MSL_SPEED*dt;
      m.y+=Math.sin(m.ang)*MSL_SPEED*dt;
      let hitT=null;
      if(tgt){
        const hr=MSL_HIT_R+(tgt.r||2);
        if((m.x-tgt.x)*(m.x-tgt.x)+(m.y-tgt.y)*(m.y-tgt.y) < hr*hr) hitT=tgt;
      }
      if(!hitT){
        for(const e of enemies){
          const hr=MSL_HIT_R+e.r;
          if((m.x-e.x)*(m.x-e.x)+(m.y-e.y)*(m.y-e.y) < hr*hr){ hitT=e; break; }
        }
        if(!hitT && boss){
          const hr=MSL_HIT_R+boss.r;
          if((m.x-boss.x)*(m.x-boss.x)+(m.y-boss.y)*(m.y-boss.y) < hr*hr) hitT=boss;
        }
      }
      if(hitT){
        hitT.hp-=MSL_DAMAGE;
        hitT.hitFlash=0.18;
        explodeNoShake(m.x, m.y, 1.2);
        burst(m.x, m.y, '#ff7a2a', 10);
        burst(m.x, m.y, '#ffd34a', 6);
        spawnDmgPop(m.x, m.y, MSL_DAMAGE, '#ff6a00');
        missiles.splice(i,1);
        continue;
      }
      if(m.life<=0 || m.x<-4 || m.x>W+4 || m.y<-4 || m.y>H+4){ missiles.splice(i,1); }
    }
  }
  function drawMissile(m){
    const px=m.x*sx, py=m.y*sy;
    ctx.save();
    ctx.translate(px,py);
    ctx.rotate(m.ang);
    const L=2.6*sx, w=1.0*sx;
    ctx.fillStyle='rgba(255,180,60,0.55)';
    ctx.beginPath();
    ctx.moveTo(-L*0.7, 0);
    ctx.lineTo(-L*1.7-Math.random()*L*0.4, -w*0.5);
    ctx.lineTo(-L*1.7-Math.random()*L*0.4, w*0.5);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle='#cdd4dc';
    ctx.strokeStyle='#1a120a';
    ctx.lineWidth=Math.max(1,0.35*sx);
    ctx.beginPath();
    ctx.moveTo(L, 0);
    ctx.lineTo(-L*0.6, -w);
    ctx.lineTo(-L*0.6, w);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.fillStyle='#ff3b30';
    ctx.beginPath();
    ctx.moveTo(L, 0);
    ctx.lineTo(L*0.35, -w*0.7);
    ctx.lineTo(L*0.35, w*0.7);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // ---- 改修 22: ダメージポップアップ ----
  function spawnDmgPop(wx, wy, val, col){
    const disp = Math.round(val);
    if(disp <= 0) return;
    dmgPops.push({
      wx, wy,
      wy0: wy,
      val: disp,
      col: col || '#fff',
      life: 0.9,
      maxLife: 0.9,
      vx: (Math.random()-0.5)*4,
      vy: -18 - Math.random()*10
    });
  }
  function updateDmgPops(dt){
    for(let i=dmgPops.length-1;i>=0;i--){
      const p=dmgPops[i];
      p.life-=dt;
      p.wx+=p.vx*dt;
      p.wy+=p.vy*dt;
      p.vy*=Math.pow(0.12,dt);
      if(p.life<=0) dmgPops.splice(i,1);
    }
  }
  function drawDmgPops(){
    for(const p of dmgPops){
      const alpha=Math.max(0, p.life/p.maxLife);
      const px=scrX(p.wx), py=scrY(p.wy);
      const sz=Math.max(8, 3.5*sx*(0.8+0.4*(1-p.life/p.maxLife)));
      ctx.save();
      ctx.globalAlpha=alpha;
      ctx.font=`900 ${sz}px 'Helvetica Neue',system-ui,sans-serif`;
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillStyle='#000';
      ctx.fillText(p.val, px+1.5, py+1.5);
      ctx.fillStyle=p.col;
      ctx.fillText(p.val, px, py);
      ctx.restore();
    }
  }

  // ---- ステージ定義 ----
  function loadStage(n){
    enemies=[]; scraps=[]; heals=[]; sparks=[]; fx=[]; trail=[]; missiles=[]; boss=null; waveIdx=0; spawnTimer=0;
    mslTimer=0; dmgPops=[];
    // ---- 改修 35: ステージ遷移時にカメラシェイク残量を必ずリセット（前ステージの揺れを持ち越さない） ----
    shake=0; levelPop=0;
    car.hp=car.maxhp; car.vx=car.vy=0; pointer.active=false;
    killCount=0; survivorSpawnTimer=0; survivorPhase='none';
    if(n===1){
      car.x=80; car.y=H*0.72; car.heading=-Math.PI/2;
      [[56,H*0.25],[67,H*0.21],[61,H*0.29]].forEach(p=>spawn('grunt_small',p[0],p[1]));
      [[96,H*0.23],[107,H*0.26],[101,H*0.19]].forEach(p=>spawn('grunt',p[0],p[1]));
      waves=[];

      car.x=80; car.y=H*0.5; car.heading=-Math.PI/2;

  // ---- レベルアップ ----
  // ---- 改修 30: wgt を削除し spd（速度）/ hdl（小回り）を追加 ----
  const POOL=[
    {k:'ram',ic:'🔩',name:'ラムバー',desc:'体当たり威力↑・吹き飛ばし↑'},
    {k:'spk',ic:'⚙',name:'スパイク',desc:'轢いた敵に継続ダメージ'},
    {k:'arm',ic:'🛡',name:'装甲板',desc:'被ダメ軽減・重くなるほど軽い敵に強い'},
    {k:'spd',ic:'💨',name:'ターボ',desc:'最高速度↑・加速↑（素早く群れを薙ぐ）'},
    {k:'hdl',ic:'🎯',name:'サスペンション',desc:'小回り↑・旋回率↑（鋭い弧で敵を刈る）'},
    {k:'msl',ic:'🚀',name:'誘導ミサイル',desc:'最寄りの敵へ自動発射。重ねるほど連射↑'}
  ];
  function gainXP(n){
    xp+=n; scrap+=n;
    // ---- 改修 30: スクラップ段階が上がったら成長演出 ----
    const prevGrade = scrapGrade();
    // grade 計算は scrap 更新後なので prevGrade は更新前を表す
    // （gainXP 呼び出し前の scrap を使いたいが、すでに更新済みなので grade 変化は後でチェック）
    checkScrapGrowth();
    while(xp>=xpNeed){ xp-=xpNeed; level++; xpNeed+=Math.min(2+level,5); openLevel(); }
    updateHUD();
  }
  // ---- 改修 30: スクラップ成長時の演出 ----
  let _lastScrapGrade = 0;
  function checkScrapGrowth(){
    const g = scrapGrade();
    if(g > _lastScrapGrade){
      _lastScrapGrade = g;
      // 成長演出：車体周辺に金属パーティクルバースト
      burst(car.x, car.y, '#ffd34a', 16);
      burst(car.x, car.y, '#ff7a2a', 8);
      burst(car.x, car.y, '#9aa3ad', 8);
      shake = Math.max(shake, SHK_GROW);  // 改修 35: 一定量
      bigText('車体が重くなった！ Lv' + g, '#ffd34a');
    }
  }
  function openLevel(){
    phase='level'; pointer.active=false;
    const box=$('picks'); box.innerHTML='';
    const cand=[...POOL].sort(()=>Math.random()-0.5).slice(0,3);
    cand.forEach(p=>{
      const d=document.createElement('div'); d.className='pick';
      d.innerHTML=`<div class="ic">${p.ic}</div><div class="tx"><b>${p.name}</b><span>${p.desc}</span></div>`;
      // ---- 改修 30: wgt の maxhp ボーナスを arm のみに変更 ----
      // ---- 改修 32: レベルアップ＝サイズアップを一目で伝える拡大ポップ演出を起動 ----
      d.addEventListener('click',()=>{ parts[p.k]++; car.maxhp+=(p.k==='arm'?8:0); car.hp=Math.min(car.maxhp,car.hp+10);
        levelPop=1; burst(car.x,car.y,'#ffd34a',18); burst(car.x,car.y,'#ff7a2a',10); shake=Math.max(shake,SHK_GROW);
        bigText('LEVEL '+level+' — 車体が大きくなった！','#ffd34a');
        $('mLevel').classList.remove('on'); phase='play'; last=performance.now(); updateHUD(); },{once:true});
      box.appendChild(d);
    });
    $('mLevel').classList.add('on');
  }

  // ---- 当たり判定・更新 ----
  function step(dt){
    if(phase!=='play')return;
    const S=stats();

    // 操作：押している間アクセル＋目標方向へ旋回
    if(pointer.active){
      const w=clientToWorld(pointer.rawClientX, pointer.rawClientY);
      pointer.x=w.x;
      pointer.y=w.y;
      const dx=pointer.x-car.x, dy=pointer.y-car.y;
      const tgt=Math.atan2(dy,dx);
      let diff=tgt-car.heading; while(diff>Math.PI)diff-=Math.PI*2; while(diff<-Math.PI)diff+=Math.PI*2;
      const tr=S.turn*dt; car.heading+=Math.max(-tr,Math.min(tr,diff));
      car.vx+=Math.cos(car.heading)*S.accel*dt;
      car.vy+=Math.sin(car.heading)*S.accel*dt;
    } else {
      const f=Math.pow(0.0008,dt); car.vx*=f; car.vy*=f;
    }
    const sp=Math.hypot(car.vx,car.vy);
    if(sp>S.maxv){ car.vx*=S.maxv/sp; car.vy*=S.maxv/sp; }
    car.x+=car.vx*dt; car.y+=car.vy*dt;
    // 壁で弾き返す
    const m=S.radius;
    if(car.x<m){car.x=m;car.vx=Math.abs(car.vx)*0.4;shake=Math.max(shake,SHK_WALL);}
    if(car.x>W-m){car.x=W-m;car.vx=-Math.abs(car.vx)*0.4;shake=Math.max(shake,SHK_WALL);}
    if(car.y<m+12){car.y=m+12;car.vy=Math.abs(car.vy)*0.4;shake=Math.max(shake,SHK_WALL);}
    if(car.y>H-m-2){car.y=H-m-2;car.vy=-Math.abs(car.vy)*0.4;shake=Math.max(shake,SHK_WALL);}
    if(sp>4){ trail.push({x:car.x,y:car.y,a:0.5,ang:car.heading}); if(trail.length>40)trail.shift(); }

    const carSp=Math.hypot(car.vx,car.vy);
    const sGate=speedGate(carSp);

    // 誘導ミサイル発射タイマー
    if(parts.msl>0){
      mslTimer+=dt;
      const interval=mslInterval(parts.msl);
      if(mslTimer>=interval){
        mslTimer-=interval;
        if(enemies.length>0 || boss) fireMissile();
      }
    }

    // 自機の重さ指数（ノックバック計算用。scrapBulk を含む）
    const carBulk = parts.arm + scrapBulk();
    // 自機サイズ指数（改修 33: サイズ直接比較ダメージ計算用）
    // stats().radius / 2.7 で正規化。Lv1=1.0、Lv7≈3.0 の範囲
    const playerSzIdx = S.radius / 2.7;

    // 敵 AI＋接触
    for(const e of enemies){
      const dx=car.x-e.x, dy=car.y-e.y, d=Math.hypot(dx,dy)||1;
      e.x+=dx/d*e.spd*dt; e.y+=dy/d*e.spd*dt;
      e.x+=e.vx*dt; e.y+=e.vy*dt; e.vx*=Math.pow(KB_DECAY,dt); e.vy*=Math.pow(KB_DECAY,dt);
      if(e.x<e.r){e.x=e.r; e.vx=Math.abs(e.vx)*0.3;}
      if(e.x>W-e.r){e.x=W-e.r; e.vx=-Math.abs(e.vx)*0.3;}
      if(e.y<e.r){e.y=e.r; e.vy=Math.abs(e.vy)*0.3;}
      if(e.y>H-e.r){e.y=H-e.r; e.vy=-Math.abs(e.vy)*0.3;}
      if(e.hitFlash>0)e.hitFlash-=dt;
      if(e.kbCd>0)e.kbCd-=dt;
      const hit=S.radius+e.r;
      if(d<hit){
        const massMult = sizeDmgMult(playerSzIdx, e.sz);

        const colDirTocar=Math.atan2(e.y-car.y, e.x-car.x);
        const relEtoCar=Math.abs(normalizeAngle(colDirTocar - car.heading));
        const aMult2=angleMult(relEtoCar);
        const DMG_TAKE_MULT = 5;
        const dmgToPlayer = e.touch * aMult2 * massMult.take * dt * (1-S.dmgCut) * DMG_TAKE_MULT;
        car.hp -= dmgToPlayer;
        shake=Math.max(shake, SHK_HIT_TAKE);  // 改修 35: 敵 touch 非依存の一定量
        const dmgPopVal = dmgToPlayer * 8;
        if(dmgPopVal >= 2) spawnDmgPop(car.x + (Math.random()-0.5)*6, car.y - 3, dmgPopVal, '#ff4444');

        if(e.kbCd<=0){
          const kb=resolveKnockback(e, dx, dy, d, hit, S);
          car.vx+=kb.kx; car.vy+=kb.ky;
          e.kbCd=KB_COOLDOWN;
        }

        if(sGate > 0){
          // 改修 34: 正面突撃=高ダメ。eHeading は「敵→自機」方向なので正面突撃時 relCarToE≈π。
          // angleMult(relCarToE) で π→最大値 2.0、0→最小値 0.4 となり正しく正面寄り=高ダメになる。
          const eHeading=Math.atan2(car.y-e.y, car.x-e.x);
          const relCarToE=Math.abs(normalizeAngle(car.heading - eHeading));
          const aMult=angleMult(relCarToE);
          const dmgToEnemy = S.dmg * sGate * aMult * massMult.give * dt * 130;
          e.hp -= dmgToEnemy;
          e.hitFlash=0.18;
          burst(e.x,e.y,'#ffd34a',12);
          burst(e.x,e.y,'#ff7a2a',6);
          shake=Math.max(shake, SHK_HIT_GIVE);  // 改修 35: 速度非依存の一定量
          if(dmgToEnemy >= 1) spawnDmgPop(e.x, e.y - e.r*1.2, dmgToEnemy, '#ffd34a');
        }
      }
      // トゲ DoT（速度ゲート非依存）
      if(d<hit+1.5 && S.dot>0){ e.dotT=(e.dotT||0)+dt; if(e.dotT>=0.5){e.dotT=0; e.hp-=S.dot*0.5; burst(e.x,e.y,'#ff7a2a',3); spawnDmgPop(e.x, e.y-e.r, S.dot*0.5, '#ff9a2a');} }
    }

    separateEnemies();

    // 敵撃破処理
    let bossPending=false;
    for(let i=enemies.length-1;i>=0;i--){
      const e=enemies[i];
      if(!e)continue;
      if(e.hp<=0){
        explode(e.x,e.y,e.sz*1.4); dropScrap(e.x,e.y,e.xp);
        dropHeal(e.x, e.y);
        enemies.splice(i,1);
        if(stage===2 && survivorPhase==='survivor'){
          killCount++;
          updateKillTag();
          if(killCount>=KILL_GOAL) bossPending=true;
        }
      }
    }
    if(bossPending){
      survivorPhase='boss';
      scraps=[];
      heals=[];
      spawnBoss();
    }

    // ボス
    if(boss){
      const dx=car.x-boss.x, dy=car.y-boss.y, d=Math.hypot(dx,dy)||1;
      boss.x+=dx/d*boss.spd*dt; boss.y+=dy/d*boss.spd*dt;
      boss.x+=boss.vx*dt; boss.y+=boss.vy*dt; boss.vx*=Math.pow(KB_DECAY,dt); boss.vy*=Math.pow(KB_DECAY,dt);
      if(boss.x<boss.r){boss.x=boss.r; boss.vx=Math.abs(boss.vx)*0.3;}
      if(boss.x>W-boss.r){boss.x=W-boss.r; boss.vx=-Math.abs(boss.vx)*0.3;}
      if(boss.y<boss.r){boss.y=boss.r; boss.vy=Math.abs(boss.vy)*0.3;}
      if(boss.y>H-boss.r){boss.y=H-boss.r; boss.vy=-Math.abs(boss.vy)*0.3;}
      boss.heading=Math.atan2(dy,dx);
      if(boss.hitFlash>0)boss.hitFlash-=dt;
      if(boss.kbCd>0)boss.kbCd-=dt;
      const hit=S.radius+boss.r;
      if(d<hit){
        const bossSz = 3.0;
        const massMult = sizeDmgMult(playerSzIdx, bossSz);

        const colDirToCar=Math.atan2(boss.y-car.y, boss.x-car.x);
        const relBossToCar=Math.abs(normalizeAngle(colDirToCar - car.heading));
        const carAngMult=angleMult(relBossToCar);
        const DMG_TAKE_MULT_BOSS = 5;
        const dmgToPlayerFromBoss = boss.touch * carAngMult * massMult.take * dt * (1-S.dmgCut) * DMG_TAKE_MULT_BOSS;
        car.hp -= dmgToPlayerFromBoss;
        shake=Math.max(shake, SHK_HIT_TAKE);  // 改修 35: ボス touch 非依存の一定量
        const dmgPopBoss = dmgToPlayerFromBoss * 8;
        if(dmgPopBoss >= 3) spawnDmgPop(car.x + (Math.random()-0.5)*6, car.y - 4, dmgPopBoss, '#ff2222');

        if(boss.kbCd<=0){
          const kb=resolveKnockback(boss, dx, dy, d, hit, S);
          car.vx+=kb.kx; car.vy+=kb.ky;
          boss.kbCd=KB_COOLDOWN;
        }

        if(sGate > 0){
          const ang=Math.atan2(car.y-boss.y,car.x-boss.x);
          // 改修 34: boss.heading = atan2(car.y-boss.y, car.x-boss.x) = ボスから自機への方向。
          // 正面突撃時 car.heading ≈ boss.heading + π → relCarToBoss ≈ π → angleMult(π)=2.0（最大）。
          // front = relCarToBoss > 2π/3 → π > 2π/3 = true で前面装甲も正しく適用される。
          const relCarToBoss=Math.abs(normalizeAngle(car.heading - boss.heading));
          const bossAngMult=angleMult(relCarToBoss);
          const front=relCarToBoss > Math.PI * 2/3;
          const dmgToBoss = S.dmg * sGate * bossAngMult * massMult.give * dt * 210 * (front?(1-boss.armorFront):1);
          boss.hp -= dmgToBoss;
          boss.hitFlash=0.15;
          burst(boss.x+Math.cos(ang)*boss.r,boss.y+Math.sin(ang)*boss.r, front?'#9aa3ad':'#ff7a2a',7);
          burst(boss.x+Math.cos(ang)*boss.r,boss.y+Math.sin(ang)*boss.r, '#ffd34a',4);
          shake=Math.max(shake, SHK_HIT_GIVE);  // 改修 35: 速度非依存の一定量
          if(dmgToBoss >= 2) spawnDmgPop(boss.x + Math.cos(ang)*boss.r, boss.y + Math.sin(ang)*boss.r - boss.r*0.6, dmgToBoss, '#ff9900');
          if(S.dot>0){ boss.dotT=(boss.dotT||0)+dt; if(boss.dotT>=0.5){boss.dotT=0;boss.hp-=S.dot*0.5; spawnDmgPop(boss.x, boss.y-boss.r*0.8, S.dot*0.5, '#ff7a2a');} }
        }
      }
      if(boss.hp<=0){
        explode(boss.x,boss.y,6);
        for(let k=0;k<8;k++)setTimeout(()=>explode(boss.x+(Math.random()-0.5)*20,boss.y+(Math.random()-0.5)*20,3),k*100);
        shake=Math.max(shake, SHK_BOSS_DIE);  // 改修 35: 一定量
        boss=null; $('bossWrap').classList.remove('on');
        if(stage===2) survivorPhase='clear';
        stageClear();
      }
    }

    // 誘導ミサイル更新
    updateMissiles(dt);

    // スクラップ吸着
    for(let i=scraps.length-1;i>=0;i--){ const s=scraps[i];
      const dx=car.x-s.x, dy=car.y-s.y, d=Math.hypot(dx,dy)||1;
      if(d<10){ s.x+=dx/d*40*dt; s.y+=dy/d*40*dt; }
      s.t+=dt;
      if(d<S.radius+1){ gainXP(s.v); burst(s.x,s.y,'#ffd34a',3); scraps.splice(i,1); } }

    // 回復アイテム吸着・取得
    for(let i=heals.length-1;i>=0;i--){
      const h=heals[i];
      h.t+=dt;
      const dx=car.x-h.x, dy=car.y-h.y, d=Math.hypot(dx,dy)||1;
      if(h.t >= HEAL_LOCK_DURATION){
        if(d<12){ h.x+=dx/d*40*dt; h.y+=dy/d*40*dt; }
        if(d<S.radius+1.5){
          const healAmt=car.maxhp*HEAL_AMOUNT_RATIO;
          car.hp=Math.min(car.maxhp, car.hp+healAmt);
          burst(h.x, h.y, '#44ff88', 8);
          burst(h.x, h.y, '#ffffff', 4);
          heals.splice(i,1);
          updateHUD();
        }
      }
    }

    // サバイバーモードのスポーン（survivor フェーズ）
    if(stage===2 && survivorPhase==='survivor'){
      survivorSpawnTimer+=dt;
      if(survivorSpawnTimer>=SPAWN_INTERVAL && enemies.length<MAX_ENEMIES){
        survivorSpawnTimer=0;
        const need=MAX_ENEMIES-enemies.length;
        for(let i=0;i<need;i++) spawnSurvivorEnemy();
      }
    }

    // ボス戦中も雑魚スポーン継続
    if(stage===2 && survivorPhase==='boss' && boss){
      survivorSpawnTimer+=dt;
      if(survivorSpawnTimer>=SPAWN_INTERVAL_BOSS && enemies.length<MAX_ENEMIES_BOSS){
        survivorSpawnTimer=0;
        spawnSurvivorEnemy();
      }
    }

    // 旧 wave 進行（St1 後方互換）
    if(stage===1 && enemies.length===0 && !boss && waveIdx<waves.length){
      spawnTimer+=dt;
      if(spawnTimer>0.6){ const w=waves[waveIdx++]; spawnTimer=0;
        if(w.kind==='scrapBank'){ for(let k=0;k<w.amount;k++)scraps.push({x:w.x+(Math.random()-0.5)*8,y:w.y+(Math.random()-0.5)*8,v:1,t:0}); }
        else w.fn(); }
    }
    // St1 クリア判定
    if(stage===1 && enemies.length===0 && scraps.length===0 && heals.length===0){ stageClear(); }

    // パーティクル
    for(let i=sparks.length-1;i>=0;i--){const p=sparks[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=20*dt;p.life-=dt;if(p.life<=0)sparks.splice(i,1);}
    updateDmgPops(dt);
    if(car.hp<=0){ phase='over'; $('mOver').classList.add('on'); }
    if(shake>0)shake=Math.max(0,shake-dt*22);
    if(levelPop>0)levelPop=Math.max(0,levelPop-dt*2.2);  // 改修 32: 拡大ポップの減衰
    updateCamera(dt);
    updateHUD();
  }

  function dropScrap(x,y,v){ scraps.push({x,y,v:Math.max(1,Math.round(v)),t:0}); }
  function burst(x,y,col,n){ for(let i=0;i<n;i++){const a=Math.random()*6.28,s=8+Math.random()*16;
    sparks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.3+Math.random()*0.3,col});} }
  function explode(x,y,sz){ for(let i=0;i<32*sz;i++){const a=Math.random()*6.28,s=16+Math.random()*65*sz;
    sparks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.5+Math.random()*0.75,col:Math.random()<0.5?'#ff7a2a':'#ffd34a'});}
    shake=Math.max(shake, SHK_EXPLODE); }  // 改修 35: 敵サイズ sz 非依存の一定量（パーティクル数は従来どおり sz 連動）
  function explodeNoShake(x,y,sz){ for(let i=0;i<32*sz;i++){const a=Math.random()*6.28,s=16+Math.random()*65*sz;
    sparks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.5+Math.random()*0.75,col:Math.random()<0.5?'#ff7a2a':'#ffd34a'});} }

  // ---- 改修 28: 大型特殊敵スポーン時の派手な出現エフェクト ----
  function explodeOversizeSpawn(x, y, r, glowCol){
    const n = Math.round(24 + r * 6);
    for(let i=0;i<n;i++){
      const a = i/n * Math.PI*2;
      const s = 20 + Math.random()*30;
      sparks.push({x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:0.6+Math.random()*0.4, col:glowCol});
    }
    for(let i=0;i<16;i++){
      const a = Math.random()*Math.PI*2;
      const s = 10 + Math.random()*20;
      sparks.push({x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:0.4+Math.random()*0.3, col:'#ffffff'});
    }
    shake = Math.max(shake, SHK_SPAWN);  // 改修 35: 半径 r 非依存の一定量
  }

  // ---- 描画 ----
  function draw(){
    ctx.setTransform(DPR,0,0,DPR,0,0);
    // ---- 改修 35: プレイ中以外（クリア/ゲームオーバー/レベルアップのモーダル表示中・ステージ遷移中）は
    //              シェイクを一切適用しない。step() が phase!=='play' で早期 return し shake が減衰しないため、
    //              ここでガードしないとモーダル中やステージ切替後も揺れ続けてしまう。 ----
    const shk = (phase==='play') ? shake : 0;
    const ox=(Math.random()-0.5)*shk, oy=(Math.random()-0.5)*shk;
    ctx.clearRect(0,0,cv.width,cv.height);
    ctx.save();
    ctx.translate((-cam.x+ox)*sx, (-cam.y+oy)*sy);
    drawGround();
    for(const t of trail){ t.a-=0.012; if(t.a<=0)continue;
      ctx.save();ctx.translate(t.x*sx,t.y*sy);ctx.rotate(t.ang);
      ctx.fillStyle=`rgba(60,42,24,${t.a*0.5})`;
      ctx.fillRect(-3*sx*0.5,-1.6*sy*0.5,3*sx,0.5*sy);ctx.fillRect(-3*sx*0.5,1.1*sy*0.5,3*sx,0.5*sy);ctx.restore(); }
    for(const s of scraps){ const px=s.x*sx,py=s.y*sy,r=1.5*sx*(1+0.15*Math.sin(s.t*6));
      ctx.fillStyle='#bcae90';ctx.strokeStyle='#5a4a2a';ctx.lineWidth=Math.max(1,0.4*sx);
      ctx.beginPath();ctx.moveTo(px,py-r);ctx.lineTo(px+r,py);ctx.lineTo(px,py+r);ctx.lineTo(px-r,py);ctx.closePath();ctx.fill();ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillRect(px-r*0.3,py-r*0.5,r*0.3,r*0.3); }
    for(const h of heals) drawHeal(h);
    for(const e of enemies)drawEnemy(e);
    if(boss)drawBoss(boss);
    drawCar();
    for(const m of missiles) drawMissile(m);
    for(const p of sparks){ ctx.globalAlpha=Math.max(0,p.life*2);ctx.fillStyle=p.col;
      ctx.fillRect(p.x*sx,p.y*sy,Math.max(1.5,1.3*sx),Math.max(1.5,1.3*sx)); }
    ctx.globalAlpha=1;
    ctx.restore();
    drawDmgPops();
    updateOffArrow();
    requestAnimationFrame(loop);
  }
  function drawGround(){
    ctx.save();
    ctx.strokeStyle='rgba(58,42,24,.7)';ctx.lineWidth=Math.max(2,0.8*sx);
    ctx.strokeRect(0,0,W*sx,H*sy);
    ctx.fillStyle='rgba(110,86,49,.18)';
    ctx.fillRect(0,0,W*sx,1.5*sy);ctx.fillRect(0,(H-1.5)*sy,W*sx,1.5*sy);
    ctx.fillRect(0,0,1.5*sx,H*sy);ctx.fillRect((W-1.5)*sx,0,1.5*sx,H*sy);
    ctx.restore();
  }
  function cssv(n){return getComputedStyle(document.documentElement).getPropertyValue(n)||'#888';}

  function drawEnemy(e){
    const px=e.x*sx,py=e.y*sy, R=e.r*sx;
    ctx.save();ctx.translate(px,py);
    const ang=Math.atan2(car.y-e.y,car.x-e.x); ctx.rotate(ang);
    if(e.hitFlash>0){
      ctx.shadowColor='#ffffff';
      ctx.shadowBlur=Math.max(4, 8*sx*e.hitFlash);
    }
    if(e.sizeGrade > 0 && e.hitFlash <= 0){
      const g = OVERSIZE_GRADES[e.sizeGrade];
      ctx.shadowColor = g.glowCol;
      ctx.shadowBlur = Math.max(6, R * 0.5 * (1 + 0.3*Math.sin(Date.now()*0.004)));
    }
    ctx.fillStyle=e.hitFlash>0?'#fff':cssv('--'+e.col.slice(2));
    ctx.strokeStyle='#1a120a';ctx.lineWidth=Math.max(1,0.4*sx);
    ctx.fillRect(-R*1.1,-R*0.8,R*2.2,R*1.6);ctx.strokeRect(-R*1.1,-R*0.8,R*2.2,R*1.6);
    ctx.shadowBlur=0;
    ctx.fillStyle='#2a1a0a';ctx.fillRect(R*0.9,-R*0.7,R*0.5,R*1.4);
    ctx.fillStyle='#ffcaa0';ctx.fillRect(R*1.0,-R*0.5,R*0.25,R*0.3);ctx.fillRect(R*1.0,R*0.2,R*0.25,R*0.3);
    if(e.sizeGrade > 0){
      const g = OVERSIZE_GRADES[e.sizeGrade];
      ctx.strokeStyle = g.glowCol;
      ctx.lineWidth = Math.max(2, 1.2*sx);
      ctx.strokeRect(-R*1.1,-R*0.8,R*2.2,R*1.6);
      ctx.rotate(-ang);
      ctx.font = `900 ${Math.max(8, R*0.9)}px 'Helvetica Neue',system-ui`;
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillStyle = '#000';
      ctx.fillText('▲'.repeat(e.sizeGrade), R*0.8+1.5, -R*1.0+1.5);
      ctx.fillStyle = g.glowCol;
      ctx.fillText('▲'.repeat(e.sizeGrade), R*0.8, -R*1.0);
    }
    if(e.hp<e.maxhp){
      if(e.sizeGrade <= 0) ctx.rotate(-ang);
      ctx.fillStyle='#000a';ctx.fillRect(-R,-R*1.5,R*2,R*0.4);
      ctx.fillStyle='#ff6a4a';ctx.fillRect(-R,-R*1.5,R*2*e.hp/e.maxhp,R*0.4);
    }
    ctx.restore();
  }
  function drawBoss(b){
    const px=b.x*sx,py=b.y*sy,R=b.r*sx;
    ctx.save();ctx.translate(px,py);ctx.rotate(b.heading-Math.PI/2);
    if(b.hitFlash>0){
      ctx.shadowColor='#ff4400';
      ctx.shadowBlur=Math.max(6, 12*sx*b.hitFlash);
    }
    ctx.fillStyle='rgba(0,0,0,.35)';ctx.beginPath();ctx.ellipse(0,R*0.2,R*1.4,R*1.6,0,0,7);ctx.fill();
    ctx.fillStyle=b.hitFlash>0?'#fff':'#3d2c20';ctx.strokeStyle='#120a04';ctx.lineWidth=Math.max(1,0.6*sx);
    ctx.fillRect(-R*0.9,-R*1.1,R*1.8,R*2.0);ctx.strokeRect(-R*0.9,-R*1.1,R*1.8,R*2.0);
    ctx.shadowBlur=0;
    ctx.fillStyle='#9aa3ad';ctx.fillRect(-R*0.95,-R*1.35,R*1.9,R*0.4);
    for(let i=-2;i<=2;i++){ctx.fillStyle='#3a3f48';ctx.beginPath();ctx.moveTo(i*R*0.35,-R*1.35);ctx.lineTo(i*R*0.35+R*0.18,-R*1.7);ctx.lineTo(i*R*0.35+R*0.36,-R*1.35);ctx.fill();}
    ctx.fillStyle='#222';ctx.fillRect(-R*0.7,R*0.9,R*0.25,R*0.5);ctx.fillRect(R*0.45,R*0.9,R*0.25,R*0.5);
    ctx.restore();
  }

  // ---- 改修 30: drawCar — scrapGrade に応じた段階的見た目変化 ----
  // grade 0（初期）: 素の車体
  // grade 1（10 scrap）: 側面に鉄板増設
  // grade 2（20 scrap）: 前面ラムバー自動付与 + 鉄板厚化
  // grade 3（30 scrap）: 後部スパイク排気
  // grade 4（40 scrap）: 全周装甲 + フロントスポイラー
  // grade 5（50 scrap）: 上部ドーム装甲 + 炎排気
  function drawCar(){
    // 改修 32: R は levelScale 込みの当たり判定半径(S.radius)に、拡大ポップ(描画のみ)を乗算
    const S=stats(), px=car.x*sx,py=car.y*sy, R=S.radius*sx*levelPopScale();
    const sg = scrapGrade();
    ctx.save();ctx.translate(px,py);ctx.rotate(car.heading);
    ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.ellipse(0,R*0.3,R*1.3,R*0.9,0,0,7);ctx.fill();

    // ---- 車体本体（共通）----
    // grade 3 以上は装甲色が濃くなる
    const bodyCol = sg>=4 ? '#7a8a96' : sg>=2 ? '#6b7280' : '#6b7280';
    ctx.fillStyle=bodyCol;ctx.strokeStyle='#1a120a';ctx.lineWidth=Math.max(1,0.5*sx);
    ctx.beginPath();ctx.moveTo(R*1.2,0);ctx.lineTo(R*0.5,-R*0.85);ctx.lineTo(-R*0.9,-R*0.8);ctx.lineTo(-R*0.9,R*0.8);ctx.lineTo(R*0.5,R*0.85);ctx.closePath();ctx.fill();ctx.stroke();

    // ---- grade 1+: 側面鉄板 ----
    if(sg>=1){
      ctx.fillStyle='#9aa3ad';ctx.strokeStyle='#2a2f36';ctx.lineWidth=Math.max(1,0.4*sx);
      ctx.fillRect(-R*0.8,-R*1.0,R*1.6,R*0.25);ctx.strokeRect(-R*0.8,-R*1.0,R*1.6,R*0.25);
      ctx.fillRect(-R*0.8,R*0.75,R*1.6,R*0.25);ctx.strokeRect(-R*0.8,R*0.75,R*1.6,R*0.25);
    }
    // ---- grade 2+: 前面ラムバー自動装備 ----
    if(sg>=2){
      ctx.fillStyle='#3a3f48';ctx.strokeStyle='#1a120a';ctx.lineWidth=Math.max(1,0.4*sx);
      ctx.fillRect(R*0.95,-R*0.9,R*0.35,R*1.8);ctx.strokeRect(R*0.95,-R*0.9,R*0.35,R*1.8);
      // ラムバーの横桟
      ctx.fillStyle='#555e6a';
      ctx.fillRect(R*0.9,-R*0.4,R*0.5,R*0.15);
      ctx.fillRect(R*0.9,R*0.25,R*0.5,R*0.15);
    }
    // ---- grade 3+: 後部装甲ウィング ----
    if(sg>=3){
      ctx.fillStyle='#4a3a28';ctx.strokeStyle='#1a120a';ctx.lineWidth=Math.max(1,0.3*sx);
      ctx.beginPath();ctx.moveTo(-R*0.9,-R*0.8);ctx.lineTo(-R*1.4,-R*1.0);ctx.lineTo(-R*1.4,-R*0.55);ctx.lineTo(-R*0.9,-R*0.4);ctx.closePath();ctx.fill();ctx.stroke();
      ctx.beginPath();ctx.moveTo(-R*0.9,R*0.8);ctx.lineTo(-R*1.4,R*1.0);ctx.lineTo(-R*1.4,R*0.55);ctx.lineTo(-R*0.9,R*0.4);ctx.closePath();ctx.fill();ctx.stroke();
    }
    // ---- grade 4+: 全周フェンダー装甲 ----
    if(sg>=4){
      ctx.strokeStyle='#9aa3ad';ctx.lineWidth=Math.max(2,0.8*sx);
      ctx.beginPath();ctx.moveTo(R*1.35,0);ctx.lineTo(R*0.6,-R*1.05);ctx.lineTo(-R*1.05,-R*0.95);ctx.lineTo(-R*1.05,R*0.95);ctx.lineTo(R*0.6,R*1.05);ctx.closePath();ctx.stroke();
    }
    // ---- grade 5: 上部ドーム装甲（中央に円形パッド）----
    if(sg>=5){
      ctx.fillStyle='#3a3f48';ctx.strokeStyle='#9aa3ad';ctx.lineWidth=Math.max(1.5,0.6*sx);
      ctx.beginPath();ctx.ellipse(0,0,R*0.55,R*0.4,0,0,Math.PI*2);ctx.fill();ctx.stroke();
      // アイコン的な丸ボルト
      ctx.fillStyle='#ffd34a';
      for(const [bx,by] of [[R*0.3,-R*0.25],[R*0.3,R*0.25],[-R*0.3,0]]){
        ctx.beginPath();ctx.arc(bx,by,R*0.08,0,Math.PI*2);ctx.fill();
      }
    }

    // ---- 手動カードパーツ（装甲板）----
    for(let i=0;i<parts.arm;i++){ctx.fillStyle='#9aa3ad';ctx.fillRect(-R*0.7+i*R*0.1,-R*0.9,R*0.5,R*1.8*Math.min(1,0.5+i*0.1));ctx.strokeRect(-R*0.7+i*R*0.1,-R*0.9,R*0.5,R*1.8*Math.min(1,0.5+i*0.1));}
    // ---- 手動カードパーツ（ラムバー）----
    if(parts.ram>0){ctx.fillStyle='#3a3f48';ctx.fillRect(R*1.0,-R*0.9,R*0.35*Math.min(3,parts.ram),R*1.8);ctx.strokeRect(R*1.0,-R*0.9,R*0.35*Math.min(3,parts.ram),R*1.8);}
    // ---- スパイク ----
    if(parts.spk>0){ctx.fillStyle='#c0392b';const n=4+parts.spk*2;for(let i=0;i<n;i++){const a=i/n*6.28;const ex=Math.cos(a)*R*1.0,ey=Math.sin(a)*R*0.9;ctx.beginPath();ctx.moveTo(ex,ey);ctx.lineTo(ex+Math.cos(a)*R*0.5,ey+Math.sin(a)*R*0.5);ctx.lineTo(ex+Math.cos(a+0.4)*R*0.3,ey+Math.sin(a+0.4)*R*0.3);ctx.fill();}}
    // ---- ターボ排気（spd）----
    if(parts.spd>0 && Math.hypot(car.vx,car.vy)>8 && Math.random()<0.5){
      ctx.fillStyle=Math.random()<0.5?'#00ccff':'#ffffff';
      for(let i=0;i<parts.spd;i++){
        ctx.fillRect(-R*1.1 - Math.random()*R*0.4, (-R*0.3 + i*R*0.3) + (Math.random()-0.5)*R*0.1, R*0.25, R*0.15);
      }
    }
    // ---- サスペンション表示（hdl）: 前輪が強調 ----
    let steer=0;
    if(pointer.active){let diff=Math.atan2(pointer.y-car.y,pointer.x-car.x)-car.heading;while(diff>Math.PI)diff-=6.28;while(diff<-Math.PI)diff+=6.28;steer=Math.max(-0.5,Math.min(0.5,diff));}
    // hdl カードがあるとタイヤの旋回が視覚的に鋭く（内部的にも turn 上昇）
    const wheelCol = parts.hdl>0 ? '#ff7a2a' : '#15110c';
    ctx.fillStyle=wheelCol;
    for(const sgn of [-1,1]){ctx.save();ctx.translate(R*0.55,sgn*R*0.7);ctx.rotate(steer*(1+parts.hdl*0.3));ctx.fillRect(-R*0.25,-R*0.2,R*0.5,R*0.4);ctx.restore();
      ctx.fillStyle='#15110c';
      ctx.fillRect(-R*0.7,sgn*R*0.7-R*0.2,R*0.5,R*0.4);}
    // 炎噴出（高速時）
    if(Math.hypot(car.vx,car.vy)>10&&Math.random()<0.4){ctx.fillStyle=Math.random()<0.5?'#ff7a2a':'#ffd34a';ctx.fillRect(-R*1.0,-R*0.2+(Math.random()-0.5)*R,R*0.4,R*0.3);}
    ctx.restore();
  }

  // ---- HUD ----
  function setHint(t){$('hint').textContent=t;$('hint').style.opacity=1;hinted=false;}
  function updateOffArrow(){
    const arrow=$('offArrow');
    if(phase!=='play'){ arrow.style.display='none'; return; }
    const sxp=scrX(car.x), syp=scrY(car.y);
    const r=phone.getBoundingClientRect();
    const px=sxp, py=syp;
    const pad=r.width*0.06;
    if(px>=pad && px<=r.width-pad && py>=pad && py<=r.height-pad){
      arrow.style.display='none'; return;
    }
    const cx=r.width/2, cy=r.height/2;
    const ang=Math.atan2(py-cy,px-cx);
    const ex=Math.max(pad,Math.min(r.width-pad, cx+Math.cos(ang)*r.width));
    const ey=Math.max(pad,Math.min(r.height-pad, cy+Math.sin(ang)*r.height));
    arrow.style.display='block';
    arrow.style.left=ex+'px'; arrow.style.top=ey+'px';
    arrow.style.transform='translate(-50%,-50%) rotate('+ang+'rad)';
  }
  function updateHUD(){
    $('stTag').textContent='STAGE '+stage;
    $('scrapTag').textContent='SCRAP '+scrap+'  Lv'+level;
    $('hpFill').style.transform='scaleX('+Math.max(0,car.hp/car.maxhp)+')';
    $('xpFill').style.transform='scaleX('+(xp/xpNeed)+')';
    if(boss)$('bossFill').style.transform='scaleX('+Math.max(0,boss.hp/boss.maxhp)+')';
    $('cRam').textContent=parts.ram;$('cArm').textContent=parts.arm;$('cSpk').textContent=parts.spk;
    $('cSpd').textContent=parts.spd;$('cHdl').textContent=parts.hdl;$('cMsl').textContent=parts.msl;
  }
  function bigText(t,c){ const h=$('hint'); h.textContent=t; h.style.color=c; h.style.opacity=1; hinted=false;
    setTimeout(()=>{h.style.opacity=0;},1800); }

  // ---- 進行 ----
  function stageClear(){
    phase='clear'; pointer.active=false;
    if(stage===1){ $('clearTitle').textContent='STAGE CLEAR'; $('clearSub').textContent='荒野の先遣隊を制圧。さらに盛って進め。'; $('bNext').textContent='STAGE 2 へ'; }
    else { $('clearTitle').textContent='ALL CLEAR'; $('clearSub').textContent='15体撃破＆巨大ボスを轢き潰した。荒野の王はお前だ。'; $('bNext').textContent='もう一度'; }
    $('mClear').classList.add('on');
  }
  function startGame(){
    scrap=0; level=1; xp=0; xpNeed=3; parts.ram=parts.arm=parts.spk=parts.spd=parts.hdl=parts.msl=0;
    _lastScrapGrade=0; levelPop=0;
    car.maxhp=150;
    stage=1; phase='play'; document.querySelectorAll('.modal').forEach(m=>m.classList.remove('on'));
    loadStage(1); last=performance.now();
  }
  $('bStart').addEventListener('click',startGame);
  $('bRetry').addEventListener('click',startGame);
  $('bNext').addEventListener('click',()=>{
    $('mClear').classList.remove('on');
    if(stage===1){ stage=2; phase='play'; loadStage(2); last=performance.now(); }
    else { startGame(); }
  });

  // ---- メインループ ----
  function loop(t){
    let dt=(t-last)/1000; last=t; if(dt>0.05)dt=0.05; if(dt<0)dt=0;
    step(dt); draw();
  }
  resize(); snapCamera(); requestAnimationFrame(t=>{last=t;loop(t);});
  </script></body></html>
