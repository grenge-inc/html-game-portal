<!DOCTYPE html>
<!--
  Phone frame template for hybrid-casual-mentor generated games.
  Aspect ratio: 9:19.5 (iPhone X 系縦長, NEONNOVA2048 基準)。
  PC で開いても常にこの比率を保ち、letterbox（左右黒帯）で中央表示。
  すべてのゲーム要素は #phone の子として配置すること。
-->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>連鎖落とし4目ローグ</title>
<style>
  :root {
    --phone-aspect: 9 / 19.5;
    --bg-deep: #02030a;
    --bg-mid: #0a1430;
    --bg-panel: #06081a;
    --bg-card: #0b1228;
    --line: #1a2848;
    --cyan: #6ff;
    --cyan-soft: #8df;
    --cyan-grad-1: #3df;
    --cyan-grad-2: #06a;
    --text-main: #eaf3ff;
    --text-sub: #cdddef;
    --text-dim: #7a92b5;
    --warn: #ffb86c;
    --c-R: #ff5d8a;
    --c-G: #4be089;
    --c-B: #43b8ff;
    --c-Y: #ffd76b;
    --glass: rgba(6,10,30,.55);
    --glass-line: rgba(255,255,255,.04);
    --tap-grad-top: rgba(102,255,255,.16);
    --tap-grad-hi: rgba(102,255,255,.4);
    --hilite: rgba(255,255,255,.55);
    --white: #fff;
    --btn-ink: #02121a;
    --c-R-hi: #ffb0c5;
    --c-G-hi: #b6ffd0;
    --c-B-hi: #b6e6ff;
    --c-Y-hi: #fff0bd;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html, body {
    width:100%; height:100%;
    overflow:hidden;
    background:#000;
    color:#fff;
    font-family:'Helvetica Neue', system-ui, sans-serif;
    user-select:none;
    -webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
  }
  body {
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #phone {
    position:relative;
    overflow:hidden;
    width:  min(100vw, calc(100vh * 9 / 19.5));
    height: min(100vh, calc(100vw * 19.5 / 9));
    --pw:   min(100vw, calc(100vh * 9 / 19.5));
    --ph:   min(100vh, calc(100vw * 19.5 / 9));
    --u:    calc(var(--pw) / 100);
    --uh:   calc(var(--ph) / 100);
    background:
      radial-gradient(120% 80% at 50% -10%, #122050 0%, var(--bg-mid) 45%, var(--bg-deep) 100%);
  }
  #phone::before{
    content:''; position:absolute; inset:0; z-index:0; pointer-events:none;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:calc(var(--u)*11) calc(var(--u)*11);
    opacity:.18;
    mask-image:radial-gradient(120% 90% at 50% 25%, #000 35%, transparent 80%);
    -webkit-mask-image:radial-gradient(120% 90% at 50% 25%, #000 35%, transparent 80%);
  }
  #phone::after{
    content:''; position:absolute; left:50%; top:46%; z-index:0; pointer-events:none;
    width:calc(var(--u)*120); height:calc(var(--u)*120); transform:translate(-50%,-50%);
    background:radial-gradient(circle, rgba(102,255,255,.10), transparent 60%);
    animation:breathe 6s ease-in-out infinite;
  }
  @keyframes breathe{ 0%,100%{opacity:.5; transform:translate(-50%,-50%) scale(.9);} 50%{opacity:1; transform:translate(-50%,-50%) scale(1.08);} }

  /* ===== HUD ===== */
  #hud {
    position:absolute; top:0; left:0; width:100%;
    height:calc(var(--uh) * 13);
    display:flex; align-items:center; justify-content:space-between;
    padding:calc(var(--u)*4) calc(var(--u)*5) 0;
    z-index:5;
  }
  .hud-box {
    text-align:center; min-width:calc(var(--u)*22);
    padding:calc(var(--u)*1.4) calc(var(--u)*2);
    background:var(--glass);
    border:1px solid var(--line);
    border-radius:calc(var(--u)*2.6);
    box-shadow:0 0 calc(var(--u)*2) rgba(0,0,0,.4) inset;
  }
  .hud-label { font-size:calc(var(--u)*2.8); color:var(--text-dim); letter-spacing:.14em; font-variant-numeric:tabular-nums; }
  .hud-val { font-size:calc(var(--u)*6.5); font-weight:800; color:var(--text-main);
    font-variant-numeric:tabular-nums; letter-spacing:.02em;
    text-shadow:0 0 calc(var(--u)*2) var(--cyan); }
  .hud-box:nth-child(2) .hud-val{
    background:linear-gradient(180deg, var(--cyan), var(--cyan-grad-2));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    text-shadow:none; filter:drop-shadow(0 0 calc(var(--u)*1.5) var(--cyan));
  }
  #goalWrap .hud-val { color:var(--cyan-soft); }
  #floorWrap .hud-val { color:var(--warn); }
  #goalBadge{
    position:absolute; left:50%; top:calc(var(--uh)*13.2); transform:translateX(-50%);
    z-index:5; display:flex; align-items:center; gap:calc(var(--u)*2);
    padding:calc(var(--u)*1.2) calc(var(--u)*4);
    background:var(--glass); border:1px solid var(--line);
    border-radius:calc(var(--u)*6);
    font-size:calc(var(--u)*3.2); color:var(--text-sub); letter-spacing:.06em;
  }
  #goalBadge .dot{ width:calc(var(--u)*2.4); height:calc(var(--u)*2.4); border-radius:50%;
    background:var(--cyan); box-shadow:0 0 calc(var(--u)*1.6) var(--cyan); }

  /* ===== BOARD ===== */
  #boardWrap {
    position:absolute; left:50%; top:calc(var(--uh)*15);
    transform:translateX(-50%);
    width:calc(var(--u)*92);
    z-index:3;
  }
  #board {
    position:relative; z-index:3;
    width:100%;
    background:linear-gradient(165deg, var(--glass), rgba(2,3,10,.65));
    border:1px solid var(--line);
    border-radius:calc(var(--u)*3);
    box-shadow:inset 0 0 calc(var(--u)*4) rgba(0,0,0,.6), 0 calc(var(--u)*1.5) calc(var(--u)*5) rgba(0,0,0,.5);
    padding:calc(var(--u)*1.2);
    display:grid;
    gap:calc(var(--u)*1.1);
  }
  .cell {
    position:relative;
    width:100%; aspect-ratio:1;
    border-radius:50%;
    background:rgba(255,255,255,.03);
    box-shadow:inset 0 0 0 1px var(--glass-line);
  }
  .coin {
    position:absolute; inset:0;
    border-radius:50%;
    transition:transform .14s cubic-bezier(.4,1.4,.6,1), opacity .18s ease;
  }
  .coin::after{
    content:''; position:absolute; left:22%; top:14%;
    width:34%; height:30%; border-radius:50%;
    background:var(--hilite); filter:blur(1px);
  }
  .coin.R{ background:radial-gradient(circle at 38% 32%, var(--c-R-hi), var(--c-R)); box-shadow:0 0 calc(var(--u)*1.6) var(--c-R);}
  .coin.G{ background:radial-gradient(circle at 38% 32%, var(--c-G-hi), var(--c-G)); box-shadow:0 0 calc(var(--u)*1.6) var(--c-G);}
  .coin.B{ background:radial-gradient(circle at 38% 32%, var(--c-B-hi), var(--c-B)); box-shadow:0 0 calc(var(--u)*1.6) var(--c-B);}
  .coin.Y{ background:radial-gradient(circle at 38% 32%, var(--c-Y-hi), var(--c-Y)); box-shadow:0 0 calc(var(--u)*1.6) var(--c-Y);}
  .coin.drop { animation:dropIn .26s cubic-bezier(.45,1.3,.55,1); }
  @keyframes dropIn { 0%{transform:translateY(-700%);} 100%{transform:translateY(0);} }
  .coin.pop { animation:pop .3s ease forwards; z-index:4; }
  @keyframes pop { 0%{transform:scale(1);} 35%{transform:scale(1.45); filter:brightness(2);} 100%{transform:scale(0); opacity:0;} }
  /* 連鎖消去: より派手なアニメーション */
  .coin.chain-pop { animation:chainPopAnim .38s ease forwards; z-index:4; }
  @keyframes chainPopAnim {
    0%  { transform:scale(1);   filter:brightness(1); }
    25% { transform:scale(1.8); filter:brightness(3.5) saturate(2) hue-rotate(20deg); }
    100%{ transform:scale(0);   opacity:0; filter:brightness(4); }
  }
  .spark{
    position:absolute; width:18%; height:18%; border-radius:50%;
    background:currentColor; box-shadow:0 0 calc(var(--u)*1.6) currentColor;
    pointer-events:none; z-index:6;
    animation:spark .5s ease-out forwards;
  }
  @keyframes spark{ 0%{transform:translate(0,0) scale(1); opacity:1;} 100%{transform:translate(var(--dx),var(--dy)) scale(.2); opacity:0;} }
  #flash{ position:absolute; inset:0; z-index:7; pointer-events:none; opacity:0;
    background:radial-gradient(circle at 50% 46%, rgba(255,255,255,.5), transparent 55%); }
  #flash.go{ animation:flash .35s ease-out; }
  @keyframes flash{ 0%{opacity:.9;} 100%{opacity:0;} }
  /* 連鎖時: 縁がゴールドに光る */
  #chainFlash{ position:absolute; inset:0; z-index:7; pointer-events:none; opacity:0;
    background:radial-gradient(circle at 50% 46%, transparent 20%, rgba(255,210,60,.45) 100%); }
  #chainFlash.go{ animation:chainFlashAnim .55s ease-out; }
  @keyframes chainFlashAnim{ 0%{opacity:1;} 100%{opacity:0;} }

  /* column selectors */
  #colbar {
    position:absolute; left:50%; top:calc(var(--uh)*15 - var(--uh)*5);
    transform:translateX(-50%);
    width:calc(var(--u)*92);
    display:grid; gap:calc(var(--u)*1.1);
    padding:0 calc(var(--u)*1.2);
    z-index:4;
  }
  .coltap {
    height:calc(var(--uh)*4.2);
    border-radius:calc(var(--u)*2) calc(var(--u)*2) 0 0;
    background:linear-gradient(180deg, var(--tap-grad-top), transparent);
    border:1px solid rgba(102,255,255,.25);
    border-bottom:none;
    display:flex; align-items:center; justify-content:center;
    color:var(--cyan-soft); font-size:calc(var(--u)*4); font-weight:800;
    cursor:pointer;
    transition:background .12s, transform .12s, box-shadow .12s;
  }
  .coltap:hover { background:linear-gradient(180deg, var(--tap-grad-hi), var(--tap-grad-top));
    transform:translateY(-8%); box-shadow:0 calc(var(--u)*-0.5) calc(var(--u)*3) rgba(102,255,255,.35);}
  .coltap.full { opacity:.25; cursor:not-allowed; }

  /* next coin preview */
  #nextWrap{
    position:absolute; left:50%; transform:translateX(-50%);
    bottom:calc(var(--uh)*5);
    display:flex; align-items:center; gap:calc(var(--u)*3);
    z-index:5;
  }
  #nextWrap .lbl{ font-size:calc(var(--u)*3.4); color:var(--text-dim); letter-spacing:.1em;}
  #nextCoin{ width:calc(var(--u)*11); height:calc(var(--u)*11); border-radius:50%; position:relative;}
  #nextCoin::after{content:''; position:absolute; left:22%; top:14%; width:34%; height:30%; border-radius:50%; background:rgba(255,255,255,.55); filter:blur(1px);}

  /* chain banner */
  #chainBanner{
    position:absolute; left:50%; top:46%; transform:translate(-50%,-50%) scale(.4);
    font-size:calc(var(--u)*13); font-weight:900; letter-spacing:.02em;
    color:var(--white); text-shadow:0 0 calc(var(--u)*4) var(--c-Y), 0 0 calc(var(--u)*8) var(--c-R);
    opacity:0; pointer-events:none; z-index:8; white-space:nowrap;
  }
  #chainBanner.show{ animation:chainPop .8s ease forwards; }
  @keyframes chainPop{ 0%{opacity:0; transform:translate(-50%,-50%) scale(.4);} 25%{opacity:1; transform:translate(-50%,-50%) scale(1.15);} 70%{opacity:1; transform:translate(-50%,-50%) scale(1);} 100%{opacity:0; transform:translate(-50%,-60%) scale(1);} }

  /* ===== MODAL ===== */
  #modal{
    position:absolute; inset:0; z-index:20;
    background:rgba(2,3,10,.82);
    display:none; align-items:center; justify-content:center;
    backdrop-filter:blur(3px);
  }
  #modal.show{ display:flex; }
  .panel{
    width:calc(var(--u)*82);
    background:linear-gradient(160deg, var(--bg-card), var(--bg-panel));
    border:1px solid var(--line);
    border-radius:calc(var(--u)*5);
    padding:calc(var(--u)*7) calc(var(--u)*6);
    text-align:center;
    box-shadow:0 calc(var(--u)*3) calc(var(--u)*10) rgba(0,0,0,.6);
  }
  .panel h2{ font-size:calc(var(--u)*8); margin-bottom:calc(var(--u)*2); color:var(--cyan-soft);
    text-shadow:0 0 calc(var(--u)*3) var(--cyan);}
  .panel p{ font-size:calc(var(--u)*4); color:var(--text-sub); line-height:1.6; margin-bottom:calc(var(--u)*5);}
  .relics{ display:flex; gap:calc(var(--u)*3); justify-content:center; margin-bottom:calc(var(--u)*5);}
  .relic{
    flex:1; padding:calc(var(--u)*4) calc(var(--u)*2);
    background:rgba(102,255,255,.06);
    border:1px solid rgba(102,255,255,.25);
    border-radius:calc(var(--u)*3);
    cursor:pointer; transition:transform .12s, background .12s;
  }
  .relic:hover{ background:rgba(102,255,255,.18); transform:translateY(-4%);}
  .relic .ic{ font-size:calc(var(--u)*9); }
  .relic .nm{ font-size:calc(var(--u)*3.6); font-weight:800; color:var(--text-main); margin-top:calc(var(--u)*1);}
  .relic .ds{ font-size:calc(var(--u)*3); color:var(--text-dim); margin-top:calc(var(--u)*1); line-height:1.4;}
  .btn{
    display:inline-block;
    padding:calc(var(--u)*3.5) calc(var(--u)*10);
    border-radius:calc(var(--u)*8);
    background:linear-gradient(180deg, var(--cyan), var(--cyan-grad-2));
    color:var(--btn-ink); font-weight:800; font-size:calc(var(--u)*4.5);
    cursor:pointer; border:none;
    box-shadow:0 0 calc(var(--u)*3) var(--cyan);
  }
  .btn:hover{ filter:brightness(1.1); }
  #relicHud{
    position:absolute; left:calc(var(--u)*4); bottom:calc(var(--uh)*1.5);
    display:flex; gap:calc(var(--u)*1.5); z-index:5; font-size:calc(var(--u)*5);
  }
</style>
</head>
<body>
  <div id="phone">
    <div id="hud">
      <div class="hud-box" id="floorWrap"><div class="hud-label">FLOOR</div><div class="hud-val" id="floorVal">1</div></div>
      <div class="hud-box"><div class="hud-label">SCORE</div><div class="hud-val" id="scoreVal">0</div></div>
      <div class="hud-box" id="goalWrap"><div class="hud-label">GOAL</div><div class="hud-val" id="goalVal">0</div></div>
    </div>

    <div id="goalBadge"><span class="dot"></span><span id="goalBadgeText">列を選んで落とす</span></div>

    <div id="colbar"></div>
    <div id="boardWrap"><div id="board"></div></div>

    <div id="flash"></div>
    <div id="chainFlash"></div>
    <div id="chainBanner"></div>

    <div id="nextWrap">
      <span class="lbl">NEXT</span>
      <div id="nextCoin"></div>
    </div>

    <div id="relicHud"></div>

    <div id="modal"><div class="panel" id="panel"></div></div>
  </div>

  <script>
  // ============================================================
  // STAGE DATA  board[row][col]  row0=最上段 rowN-1=最下段
  // '.'=空, R=赤, G=緑, B=青, Y=黄
  // 注意: 初期配置に4目以上の連続があると即消去されるので避ける
  // ============================================================
  const STAGES = [
    {
      // FLOOR 1  横4目体験  2手 goal=8
      // 手1 col3=R → row5: Y,R,R,R,R → 横R×4消滅(4)
      // 手2 col0=Y → col0 Y3個→row2,3,4+新Y→row1 → 縦Y row1-4=4消滅(4) cleared=8 ✓
      name:'FLOOR 1', cols:5, rows:6, goal:8,
      hint:'4目を揃えて一斉消去',
      board:[
        ['.','.','.','.','.'],
        ['.','.','.','.','.'],
        ['.','.','.','.','.'],
        ['Y','.','.','.','.'],
        ['Y','.','.','.','Y'],
        ['Y','R','R','.','R'],
      ],
      queue:['R','Y'],
    },
    {
      // FLOOR 2  縦4目×4  4手 goal=16
      // 手1 col0=R(4) 手2 col1=B(4) 手3 col4=G(4) 手4 col5=Y(4)  total=16 ✓
      name:'FLOOR 2', cols:6, rows:7, goal:16,
      hint:'色と列の対応を計画して',
      board:[
        ['.','.','.','.','.','.'],
        ['.','.','.','.','.','.'],
        ['.','.','.','.','.','.'],
        ['.','.','.','.','.','.'],
        ['R','B','.','.','G','Y'],
        ['R','B','.','.','G','Y'],
        ['R','B','.','.','G','Y'],
      ],
      queue:['R','B','G','Y'],
    },
    {
      // FLOOR 3  3色縦4目 計画  3手 goal=12
      // 手1 col0=G(4) 手2 col1=B(4) 手3 col2=R(4)  total=12 ✓
      // 誤順: 別列に落とすと浪費→詰み
      name:'FLOOR 3', cols:5, rows:6, goal:12,
      hint:'3色すべての縦4目を計画',
      board:[
        ['.','.','.','.','.'],
        ['.','.','.','.','.'],
        ['.','.','.','.','.'],
        ['G','B','R','.','.'],
        ['G','B','R','.','.'],
        ['G','B','R','Y','Y'],
      ],
      queue:['G','B','R'],
    },
    {
      // FLOOR 4  連鎖導入  2手 goal=8
      // 手1 col0=R → row5: R,R,R,R,. → 横R×4(col0-3)消滅(4)
      //   重力後 col1: B×3が row3,4,5に下詰め
      // 手2 col1=B → 落下先row2 → 縦B row2,3,4,5=4消滅(4)  cleared=8 ✓
      name:'FLOOR 4', cols:5, rows:6, goal:8,
      hint:'消えた後にチャンス！連鎖を体感',
      board:[
        ['.','.','.','.','.'],
        ['.','B','.','.','.'],
        ['.','B','.','.','.'],
        ['.','B','.','.','.'],
        ['.','.','.','.','.'],
        ['.','R','R','R','.'],
      ],
      queue:['R','B'],
    },
    {
      // FLOOR 5  3手消去  goal=12
      // 手1 col2=R → row5: R,R,R,R,R → 横R×5消滅(5)  重力後col0 G×3→row3,4,5  col4 B×3→row3,4,5
      // 手2 col0=G → 落下先row2 → 縦G row2,3,4,5=4消滅(4)  cleared=9
      // 手3 col4=B → 落下先row2 → 縦B row2,3,4,5=4消滅(4)  cleared=13 ≥12 ✓
      name:'FLOOR 5', cols:5, rows:6, goal:12,
      hint:'3手で3本の縦4目を消せ',
      board:[
        ['.','.','.','.','.'],
        ['.','.','.','.','.'],
        ['G','.','.','.','B'],
        ['G','.','.','.','B'],
        ['G','.','.','.','B'],
        ['R','R','.','R','R'],
      ],
      queue:['R','G','B'],
    },
    {
      // FLOOR 6  横消去→縦完成（連鎖感あり）  3手 goal=12
      // 手1 col2=R → row5: R,R,R,R,G → 横R×4(col0-3)消滅(4)  重力後col1 B×3→row3,4,5
      // 手2 col1=B → 落下先row2 → 縦B row2,3,4,5=4消滅(4)  cleared=8
      // 手3 col4=G → col4 G×3→row3,4,5 → 落下先row2 → 縦G row2,3,4,5=4消滅(4)  cleared=12 ✓
      name:'FLOOR 6', cols:5, rows:6, goal:12,
      hint:'横を消したら縦が揃う！',
      board:[
        ['.','.','.','.','.'],
        ['.','.','.','.','.'],
        ['.','B','.','.','.'],
        ['.','B','.','.','G'],
        ['.','B','.','.','G'],
        ['R','R','.','R','G'],
      ],
      queue:['R','B','G'],
    },
    {
      // FLOOR 7  4手戦略  goal=16
      // 手1 col0=R → 落下先row2 → 縦R row2,3,4,5=4消滅(4)  cleared=4
      // 手2 col2=B → 落下先row2 → 縦B row2,3,4,5=4消滅(4)  cleared=8
      // 手3 col5=G → 落下先row2 → 縦G row2,3,4,5=4消滅(4)  cleared=12
      // 手4 col1=Y → 落下先row2 → 縦Y row2,3,4,5=4消滅(4)  cleared=16 ✓
      name:'FLOOR 7', cols:6, rows:6, goal:16,
      hint:'4色の縦4目を計画して消せ',
      board:[
        ['.','.','.','.','.','.'],
        ['.','.','.','.','.','.'],
        ['.','.','.','.','.','.'],
        ['R','Y','B','.','.',  'G'],
        ['R','Y','B','.','.',  'G'],
        ['R','Y','B','.','.',  'G'],
      ],
      queue:['R','B','G','Y'],
    },
    {
      // FLOOR 8  横消去+縦連鎖  3手 goal=12
      // 手1 col2=Y → row5: Y,Y,Y,Y,Y,G → 横Y×5(col0-4)消滅(5)
      //   重力後 col2 R×3→row2,3,4  col5 G×3→row3,4,5
      // 手2 col2=R → 落下先row1 → 縦R row1,2,3,4=4消滅(4)  cleared=9
      // 手3 col5=G → 落下先row2 → 縦G row2,3,4,5=4消滅(4)  cleared=13 ≥12 ✓
      name:'FLOOR 8', cols:6, rows:6, goal:12,
      hint:'横を消して縦の連鎖を呼ぼう',
      board:[
        ['.','.','.','.','.','.'],
        ['.','.','R','.','.', '.'],
        ['.','.','R','.','.','G'],
        ['.','.','R','.','.','G'],
        ['Y','Y','.','Y','Y','G'],
        ['.','.','.','.','.', '.'],
      ],
      queue:['Y','R','G'],
    },
    {
      // FLOOR 9  4手複合  goal=16
      // 手1 col0=R → 落下先row4 → 縦R row4,5,6,7=4消滅(4)  cleared=4
      // 手2 col2=B → 落下先row4 → 縦B row4,5,6,7=4消滅(4)  cleared=8
      // 手3 col5=G → 落下先row4 → 縦G row4,5,6,7=4消滅(4)  cleared=12
      // 手4 col1=Y → 落下先row4 → 縦Y row4,5,6,7=4消滅(4)  cleared=16 ✓
      name:'FLOOR 9', cols:6, rows:8, goal:16,
      hint:'4色の連鎖を全て計画せよ',
      board:[
        ['.','.','.','.','.','.'],
        ['.','.','.','.','.','.'],
        ['.','.','.','.','.','.'],
        ['.','.','.','.','.','.'],
        ['.','.','.','.','.','.'],
        ['R','Y','B','.','.',  'G'],
        ['R','Y','B','.','.',  'G'],
        ['R','Y','B','.','.',  'G'],
      ],
      queue:['R','B','G','Y'],
    },
    {
      // FLOOR 10  最終ボス 5手 goal=20
      // 手1 col0=R → 落下先row4 → 縦R row4,5,6,7=4消滅(4)  cleared=4
      // 手2 col2=B → 落下先row4 → 縦B row4,5,6,7=4消滅(4)  cleared=8
      // 手3 col5=G → 落下先row4 → 縦G row4,5,6,7=4消滅(4)  cleared=12
      // 手4 col1=Y → 落下先row4 → 縦Y row4,5,6,7=4消滅(4)  cleared=16
      // 手5 col4=Y → 落下先row4 → 縦Y row4,5,6,7=4消滅(4)  cleared=20 ✓
      name:'FLOOR 10', cols:6, rows:8, goal:20,
      hint:'連鎖を極めてRUN CLEARへ！',
      board:[
        ['.','.','.','.','.','.'],
        ['.','.','.','.','.','.'],
        ['.','.','.','.','.','.'],
        ['.','.','.','.','.','.'],
        ['.','.','.','.','.','.'],
        ['R','Y','B','.','Y','G'],
        ['R','Y','B','.','Y','G'],
        ['R','Y','B','.','Y','G'],
      ],
      queue:['R','B','G','Y','Y'],
    },
  ];

  const RELIC_POOL = [
    {ic:'💥', nm:'増幅コア', ds:'消去スコア +50%'},
    {ic:'🌀', nm:'連鎖チップ', ds:'連鎖ボーナス2倍'},
    {ic:'🧲', nm:'引力石',  ds:'消去時 隣接同色も巻込'},
  ];

  // ===================== STATE =====================
  const DIRS = [[0,1],[1,0],[1,1],[1,-1]];
  let stageIdx=0, grid=[], ROWS=6, COLS=5, qi=0, queue=[], score=0, goal=0, cleared=0;
  let busy=false, scoreMul=1, chainMul=1, magnet=false, relics=[];

  const $ = s=>document.querySelector(s);
  const board=$('#board'), colbar=$('#colbar');

  function loadStage(i){
    const s=STAGES[i];
    ROWS=s.rows; COLS=s.cols; goal=s.goal; cleared=0;
    queue=s.queue.slice(); qi=0;
    grid=s.board.map(r=>r.slice());
    $('#floorVal').textContent=i+1;
    $('#goalVal').textContent=goal;
    $('#goalBadgeText').textContent = s.hint || '列を選んで落とす';
    layoutBoard();
    render();
    updateNext();
    busy=false;
  }

  function layoutBoard(){
    board.style.gridTemplateColumns=`repeat(${COLS},1fr)`;
    colbar.style.gridTemplateColumns=`repeat(${COLS},1fr)`;
    board.innerHTML=''; colbar.innerHTML='';
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      const cell=document.createElement('div');
      cell.className='cell'; cell.id=`cell-${r}-${c}`;
      board.appendChild(cell);
    }
    for(let c=0;c<COLS;c++){
      const t=document.createElement('div');
      t.className='coltap'; t.textContent='▾'; t.dataset.col=c;
      t.addEventListener('click',()=>onColumn(c));
      colbar.appendChild(t);
    }
  }

  function render(){
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      const cell=$(`#cell-${r}-${c}`);
      const v=grid[r][c];
      cell.innerHTML = v==='.'?'':`<div class="coin ${v}"></div>`;
    }
    colbar.querySelectorAll('.coltap').forEach(t=>{
      const c=+t.dataset.col;
      t.classList.toggle('full', grid[0][c]!=='.');
    });
    $('#scoreVal').textContent=score;
  }

  function updateNext(){
    const nc=$('#nextCoin');
    if(qi<queue.length){
      const col=queue[qi];
      nc.style.background=`radial-gradient(circle at 38% 32%, #fff, var(--c-${col}))`;
      nc.style.boxShadow=`0 0 calc(var(--u)*2) var(--c-${col})`;
    } else { nc.style.background='rgba(255,255,255,.08)'; nc.style.boxShadow='none'; }
  }

  function onColumn(c){
    if(busy || qi>=queue.length) return;
    if(grid[0][c]!=='.') return;
    let row=-1;
    for(let r=ROWS-1;r>=0;r--){ if(grid[r][c]==='.'){ row=r; break; } }
    if(row<0) return;
    grid[row][c]=queue[qi]; qi++;
    busy=true;
    render();
    const cell=$(`#cell-${row}-${c}`);
    if(cell.firstChild) cell.firstChild.classList.add('drop');
    updateNext();
    setTimeout(()=>resolveBoard(1), 270);
  }

  // ===== 4目以上マッチを全列方向で検出 =====
  function findMatches(){
    const mark=Array.from({length:ROWS},()=>Array(COLS).fill(false));
    let any=false;
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      const v=grid[r][c]; if(v==='.')continue;
      for(const [dr,dc] of DIRS){
        let n=1;
        while(true){
          const nr=r+dr*n, nc=c+dc*n;
          if(nr<0||nr>=ROWS||nc<0||nc>=COLS||grid[nr][nc]!==v)break;
          n++;
        }
        if(n>=4){ any=true; for(let k=0;k<n;k++) mark[r+dr*k][c+dc*k]=true; }
      }
    }
    if(!any) return null;
    if(magnet){
      const extra=[];
      for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
        if(!mark[r][c])continue;
        for(const[dr,dc] of [[0,1],[0,-1],[1,0],[-1,0]]){
          const nr=r+dr,nc=c+dc;
          if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!mark[nr][nc]&&grid[nr][nc]===grid[r][c]) extra.push([nr,nc]);
        }
      }
      extra.forEach(([r,c])=>mark[r][c]=true);
    }
    return mark;
  }

  function applyGravity(){
    for(let c=0;c<COLS;c++){
      let write=ROWS-1;
      for(let r=ROWS-1;r>=0;r--){
        if(grid[r][c]!=='.'){ const v=grid[r][c]; grid[r][c]='.'; grid[write][c]=v; write--; }
      }
    }
  }

  function resolveBoard(chain){
    const mark=findMatches();
    if(!mark){ busy=false; checkEnd(); return; }
    let count=0;
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++) if(mark[r][c]){
      count++;
      const cell=$(`#cell-${r}-${c}`);
      if(cell.firstChild){
        cell.firstChild.classList.add(chain>=2 ? 'chain-pop' : 'pop');
        emitSparks(cell, grid[r][c]);
      }
    }
    const fl=$('#flash'); fl.classList.remove('go'); void fl.offsetWidth; fl.classList.add('go');
    if(chain>=2){
      const cf=$('#chainFlash'); cf.classList.remove('go'); void cf.offsetWidth; cf.classList.add('go');
    }
    cleared+=count;
    const base = count*10;
    const gained = Math.round(base * scoreMul * (1 + (chain-1)*0.5*chainMul));
    score+=gained;
    if(chain>=2) showChain(chain);
    setTimeout(()=>{
      for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++) if(mark[r][c]) grid[r][c]='.';
      applyGravity();
      render();
      setTimeout(()=>resolveBoard(chain+1), 230);
    }, 300);
  }

  function emitSparks(cell, col){
    for(let i=0;i<5;i++){
      const s=document.createElement('div');
      s.className='spark';
      const ang=Math.random()*6.28, d=14+Math.random()*16;
      s.style.color=`var(--c-${col})`;
      s.style.left='41%'; s.style.top='41%';
      s.style.setProperty('--dx', `${Math.cos(ang)*d}px`);
      s.style.setProperty('--dy', `${Math.sin(ang)*d}px`);
      cell.appendChild(s);
      setTimeout(()=>s.remove(), 520);
    }
  }

  function showChain(n){
    const b=$('#chainBanner');
    b.textContent = n>=3 ? `${n} CHAIN!!` : `${n} CHAIN!`;
    b.classList.remove('show'); void b.offsetWidth; b.classList.add('show');
  }

  function checkEnd(){
    render();
    if(cleared>=goal){ onClear(); return; }
    if(qi>=queue.length){ onFail(); }
  }

  // ===================== FLOW =====================
  function onClear(){
    if(stageIdx>=STAGES.length-1){ showWin(); return; }
    showRelic();
  }

  function showRelic(){
    const pick=RELIC_POOL.slice().sort(()=>Math.random()-0.5).slice(0,3);
    const panel=$('#panel');
    panel.innerHTML=`<h2>FLOOR ${stageIdx+1} CLEAR</h2>
      <p>レリックを1つ選んで次のフロアへ</p>
      <div class="relics">${pick.map((r,i)=>
        `<div class="relic" data-i="${i}"><div class="ic">${r.ic}</div><div class="nm">${r.nm}</div><div class="ds">${r.ds}</div></div>`).join('')}</div>`;
    panel.querySelectorAll('.relic').forEach(el=>el.addEventListener('click',()=>{
      const r=pick[+el.dataset.i]; applyRelic(r);
      $('#modal').classList.remove('show');
      stageIdx++; loadStage(stageIdx);
    }));
    $('#modal').classList.add('show');
  }

  function applyRelic(r){
    relics.push(r.ic);
    if(r.nm==='増幅コア') scoreMul*=1.5;
    if(r.nm==='連鎖チップ') chainMul*=2;
    if(r.nm==='引力石') magnet=true;
    $('#relicHud').textContent=relics.join(' ');
  }

  function showWin(){
    $('#panel').innerHTML=`<h2>RUN CLEAR!</h2>
      <p>全フロア制覇！<br>最終スコア <b style="color:var(--c-Y)">${score}</b></p>
      <button class="btn" id="againBtn">もう一度</button>`;
    $('#againBtn').addEventListener('click',restart);
    $('#modal').classList.add('show');
  }
  function onFail(){
    $('#panel').innerHTML=`<h2 style="color:var(--c-R)">手が足りない…</h2>
      <p>あと ${goal-cleared} 個 消せなかった。<br>列の選び方を変えて連鎖を狙おう。</p>
      <button class="btn" id="retryBtn">リトライ</button>`;
    $('#retryBtn').addEventListener('click',()=>{ $('#modal').classList.remove('show'); loadStage(stageIdx); });
    $('#modal').classList.add('show');
  }
  function restart(){
    stageIdx=0; score=0; scoreMul=1; chainMul=1; magnet=false; relics=[];
    $('#relicHud').textContent=''; $('#modal').classList.remove('show');
    loadStage(0);
  }

  loadStage(0);
  </script>
</body>
</html>
