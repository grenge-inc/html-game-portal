<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>花火大輪</title>
<style>
  :root {
    --phone-aspect: 9 / 19.5;
    --bg-deep: #02030a;
    --bg-mid: #0a1430;
    --bg-panel: #06081a;
    --line: #1a2848;
    --line-soft: #2a3c66;
    --cyan: #6ff;
    --cyan-soft: #8df;
    --nova-0: #ffffff;
    --nova-9: #ffd76b;
    --nova-7: #ffb24a;
    --nova-5: #ff7a3a;
    --nova-3: #ff5d8a;
    --nova-1: #b585ff;
    --text-main: #eaf3ff;
    --text-dim: #7a92b5;
    --enemy: #ff5d8a;
    --enemy-core: #ffd1de;
    --enemy-deep: #7a1d3a;
    --shadow-soft: rgba(2,3,10,.5);
    --modal-veil: rgba(2,3,10,.86);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html, body {
    width:100%; height:100%; overflow:hidden;
    background:var(--bg-deep); color:var(--text-main);
    font-family:'Helvetica Neue', system-ui, sans-serif;
    user-select:none; -webkit-user-select:none;
    -webkit-tap-highlight-color:transparent; touch-action:none;
  }
  body { position:relative; display:flex; align-items:center; justify-content:center; }
  #phone {
    position:relative; overflow:hidden;
    width:  min(100vw, calc(100vh * 9 / 19.5));
    height: min(100vh, calc(100vw * 19.5 / 9));
    --pw:   min(100vw, calc(100vh * 9 / 19.5));
    --ph:   min(100vh, calc(100vw * 19.5 / 9));
    --u:    calc(var(--pw) / 100);
    --uh:   calc(var(--ph) / 100);
    background:
      radial-gradient(140% 60% at 50% 8%, rgba(111,255,255,.07) 0%, transparent 42%),
      radial-gradient(130% 90% at 50% -8%, var(--bg-mid) 0%, var(--bg-panel) 48%, var(--bg-deep) 100%);
    cursor:crosshair;
  }
  #sky{position:absolute;inset:0;pointer-events:none;}
  .star{position:absolute;border-radius:50%;background:var(--nova-0);
    box-shadow:0 0 calc(var(--u)*1.2) var(--cyan-soft);
    animation:twinkle 3.4s ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:.25;}50%{opacity:.9;}}
  /* 地表のランチャー */
  #launcher{
    position:absolute; left:50%; bottom:calc(var(--uh)*1); transform:translateX(-50%);
    width:calc(var(--u)*14); height:calc(var(--uh)*4);
    background:linear-gradient(180deg, var(--line-soft), var(--bg-panel));
    border:1px solid var(--line-soft); border-radius:calc(var(--u)*2);
    box-shadow:0 0 calc(var(--u)*3) rgba(111,255,255,.18), inset 0 calc(var(--u)*1) calc(var(--u)*2) rgba(111,255,255,.12);
  }
  #ground{
    position:absolute; left:0; right:0; bottom:0; height:calc(var(--uh)*5);
    background:linear-gradient(180deg, var(--bg-mid), var(--bg-deep));
    border-top:1px solid var(--line);
    box-shadow:0 calc(var(--uh)*-1) calc(var(--u)*4) rgba(111,255,255,.06);
  }
  /* HUD */
  #hud{
    position:absolute; top:calc(var(--uh)*1.5); left:0; right:0;
    display:flex; justify-content:space-between; align-items:center;
    padding:0 calc(var(--u)*4); font-size:calc(var(--u)*4); z-index:20;
    pointer-events:none; text-shadow:0 0 calc(var(--u)*1.5) var(--shadow-soft);
  }
  #hud .cell{display:flex;flex-direction:column;align-items:center;gap:calc(var(--uh)*.3);
    padding:calc(var(--uh)*.6) calc(var(--u)*2.4);
    background:rgba(6,8,26,.5);border:1px solid var(--line);
    border-radius:calc(var(--u)*2);backdrop-filter:blur(2px);}
  #hud .tag{color:var(--text-dim);font-size:calc(var(--u)*2.6);letter-spacing:.18em;}
  #hud b{color:var(--nova-9);font-size:calc(var(--u)*5.4);
    font-variant-numeric:tabular-nums;line-height:1;
    text-shadow:0 0 calc(var(--u)*2.5) var(--nova-7);}
  #ammoWrap b{color:var(--cyan);text-shadow:0 0 calc(var(--u)*2.5) var(--cyan);}
  /* ステージゴールバッジ */
  #goalBadge{position:absolute;top:calc(var(--uh)*7.5);left:50%;transform:translateX(-50%);
    font-size:calc(var(--u)*2.8);letter-spacing:.12em;color:var(--text-dim);
    padding:calc(var(--uh)*.5) calc(var(--u)*3);border:1px solid var(--line);
    border-radius:calc(var(--u)*4);background:rgba(6,8,26,.45);
    z-index:19;pointer-events:none;white-space:nowrap;text-shadow:0 0 calc(var(--u)*1.5) var(--shadow-soft);}
  /* 高度ゲージ */
  #chargeWrap{
    position:absolute; left:calc(var(--u)*4); bottom:calc(var(--uh)*7);
    width:calc(var(--u)*5); height:calc(var(--uh)*22);
    background:var(--bg-panel); border:1px solid var(--line-soft); border-radius:calc(var(--u)*2.5);
    overflow:hidden; opacity:0; transition:opacity .15s; z-index:18;
    box-shadow:inset 0 0 calc(var(--u)*2) rgba(0,0,0,.6);
  }
  #chargeFill{position:absolute;left:0;right:0;bottom:0;height:0%;
    background:linear-gradient(180deg, var(--nova-3), var(--nova-5) 45%, var(--nova-9));
    box-shadow:0 0 calc(var(--u)*3) var(--nova-7);}
  #chargeWrap::after{content:'';position:absolute;left:0;right:0;top:10%;height:1px;
    background:var(--cyan-soft);opacity:.55;}
  /* 花火本体 */
  .shell{position:absolute;width:calc(var(--u)*3.4);height:calc(var(--u)*3.4);
    border-radius:50%;background:radial-gradient(circle at 40% 35%, var(--nova-0), var(--nova-9) 60%, var(--nova-7));
    box-shadow:0 0 calc(var(--u)*4) var(--nova-9), 0 0 calc(var(--u)*8) var(--nova-5);
    transform:translate(-50%,-50%);z-index:12;}
  .shell::after{content:'';position:absolute;left:50%;top:80%;width:calc(var(--u)*1.6);
    height:calc(var(--u)*10);transform:translateX(-50%);border-radius:50%;
    background:linear-gradient(180deg, var(--nova-7), transparent);opacity:.65;}
  /* 敵（光の群れ） */
  .foe{position:absolute;width:calc(var(--u)*7);height:calc(var(--u)*7);
    border-radius:50%; transform:translate(-50%,-50%);
    background:radial-gradient(circle at 38% 32%, var(--enemy-core), var(--enemy) 58%, var(--enemy-deep) 100%);
    box-shadow:0 0 calc(var(--u)*3) var(--enemy), 0 0 calc(var(--u)*6) rgba(255,93,138,.4),
      inset 0 0 calc(var(--u)*2) rgba(255,255,255,.3);
    z-index:10; transition:transform .12s; animation:foeFloat 2.8s ease-in-out infinite;}
  @keyframes foeFloat{0%,100%{margin-top:calc(var(--uh)*-.6);}50%{margin-top:calc(var(--uh)*.6);}}
  .foe.pop{animation:foepop .38s ease-out forwards;}
  @keyframes foepop{0%{transform:translate(-50%,-50%) scale(1.3);filter:brightness(2.4);}
    100%{transform:translate(-50%,-50%) scale(0);opacity:0;}}
  /* 爆発リング */
  .burst{position:absolute;border-radius:50%;transform:translate(-50%,-50%);
    pointer-events:none;z-index:11;
    border:calc(var(--u)*1.6) solid var(--nova-9);
    box-shadow:0 0 calc(var(--u)*8) var(--nova-7), 0 0 calc(var(--u)*14) var(--nova-5),
      inset 0 0 calc(var(--u)*5) var(--nova-5);}
  .burst.core{border-color:var(--nova-0);
    box-shadow:0 0 calc(var(--u)*7) var(--nova-0), 0 0 calc(var(--u)*12) var(--nova-9);}
  /* 連鎖の二次爆発リング（色調を変えて連鎖を識別） */
  .burst.chain{border-color:var(--nova-3);
    box-shadow:0 0 calc(var(--u)*7) var(--nova-3), 0 0 calc(var(--u)*12) var(--nova-1),
      inset 0 0 calc(var(--u)*4) var(--nova-1);}
  /* 放射の火花 */
  .spark{position:absolute;width:calc(var(--u)*1.6);height:calc(var(--u)*1.6);
    border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:11;
    box-shadow:0 0 calc(var(--u)*2.6) currentColor, 0 0 calc(var(--u)*5) currentColor;}
  /* エイム矢印（押下位置で確定した打ち上げ角度を表示。飛翔中は固定） */
  #aim{position:absolute;left:50%;bottom:calc(var(--uh)*5);width:2px;
    transform-origin:bottom center; transform:translateX(-50%) rotate(0deg);
    height:calc(var(--uh)*0); background:linear-gradient(0deg, var(--cyan), transparent);
    box-shadow:0 0 calc(var(--u)*1.5) var(--cyan);
    opacity:0; z-index:14; pointer-events:none;}
  #aim::before{content:'';position:absolute;top:calc(var(--u)*-1.4);left:calc(var(--u)*-1);
    border:calc(var(--u)*1.2) solid transparent;border-bottom-color:var(--cyan);
    filter:drop-shadow(0 0 calc(var(--u)*1) var(--cyan));}
  /* コンボ表示（連鎖数） */
  #combo{position:absolute;left:50%;top:38%;transform:translate(-50%,-50%) scale(.6);
    z-index:32;pointer-events:none;text-align:center;opacity:0;
    text-shadow:0 0 calc(var(--u)*4) var(--nova-5);}
  #combo.show{animation:comboPop .9s ease-out forwards;}
  #combo .num{font-size:calc(var(--u)*16);font-weight:900;line-height:1;
    background:linear-gradient(180deg, var(--nova-0), var(--nova-9) 45%, var(--nova-3));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 calc(var(--u)*3) var(--nova-7));}
  #combo .lbl{font-size:calc(var(--u)*4.5);font-weight:800;letter-spacing:.25em;
    color:var(--nova-9);margin-top:calc(var(--uh)*.4);}
  @keyframes comboPop{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.5);}
    18%{opacity:1;transform:translate(-50%,-50%) scale(1.18);}
    34%{transform:translate(-50%,-50%) scale(1);}
    78%{opacity:1;transform:translate(-50%,-58%) scale(1);}
    100%{opacity:0;transform:translate(-50%,-66%) scale(.95);}
  }
  /* モーダル */
  #modal{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:calc(var(--uh)*2);
    background:radial-gradient(120% 80% at 50% 30%, rgba(10,20,48,.6), var(--modal-veil) 70%);
    z-index:40;opacity:0;pointer-events:none;
    transition:opacity .3s;text-align:center;padding:0 calc(var(--u)*6);}
  #modal.show{opacity:1;pointer-events:auto;}
  #modal h1{font-size:calc(var(--u)*10);font-weight:800;letter-spacing:.02em;
    background:linear-gradient(180deg, var(--nova-0), var(--nova-9) 50%, var(--nova-5));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 calc(var(--u)*4) var(--nova-5));}
  #modal p{font-size:calc(var(--u)*4);color:var(--text-main);
    max-width:84%;line-height:1.6;}
  #modal .hint{color:var(--text-dim);font-size:calc(var(--u)*3.4);}
  #modal button{margin-top:calc(var(--uh)*1);
    font-size:calc(var(--u)*4.5);color:var(--bg-deep);font-weight:bold;letter-spacing:.04em;
    background:linear-gradient(180deg, var(--nova-9), var(--nova-5));
    border:none;border-radius:calc(var(--u)*2.5);
    padding:calc(var(--uh)*1.6) calc(var(--u)*8);cursor:pointer;
    box-shadow:0 0 calc(var(--u)*5) var(--nova-7), 0 calc(var(--uh)*.6) calc(var(--u)*3) var(--shadow-soft);
    transition:transform .12s, box-shadow .12s;}
  #modal button:active{transform:scale(.95);box-shadow:0 0 calc(var(--u)*3) var(--nova-7);}
  #flash{position:absolute;inset:0;
    background:radial-gradient(60% 40% at 50% 40%, var(--nova-0), rgba(255,255,255,.6) 40%, transparent 75%);
    opacity:0;pointer-events:none;z-index:30;transition:opacity .12s;}
</style>
</head>
<body>
  <div id="phone">
    <div id="sky"></div>
    <div id="hud">
      <div class="cell"><span class="tag">STAGE</span> <b id="stg">1</b></div>
      <div class="cell" id="ammoWrap"><span class="tag">花火</span> <b id="ammo">3</b></div>
      <div class="cell"><span class="tag">群れ</span> <b id="foeCnt">3</b></div>
    </div>
    <div id="goalBadge"></div>
    <div id="chargeWrap"><div id="chargeFill"></div></div>
    <div id="aim"></div>
    <div id="combo"><div class="num" id="comboNum">2</div><div class="lbl">CHAIN</div></div>
    <div id="ground"></div>
    <div id="launcher"></div>
    <div id="flash"></div>
    <div id="modal">
      <h1 id="mTitle">花火大輪</h1>
      <p id="mBody"></p>
      <p class="hint" id="mHint"></p>
      <button id="mBtn">はじめる</button>
    </div>
  </div>
  <script>
  // === 座標系: #phone 内 px。U=幅1%、UH=高さ1% を px換算 ===
  const phone = document.getElementById('phone');
  const sky = document.getElementById('sky');
  const aim = document.getElementById('aim');
  const chargeWrap = document.getElementById('chargeWrap');
  const chargeFill = document.getElementById('chargeFill');
  const flash = document.getElementById('flash');
  const modal = document.getElementById('modal');
  const comboEl = document.getElementById('combo'), comboNum = document.getElementById('comboNum');
  const mTitle=document.getElementById('mTitle'), mBody=document.getElementById('mBody'),
        mHint=document.getElementById('mHint'), mBtn=document.getElementById('mBtn');
  const elStg=document.getElementById('stg'), elAmmo=document.getElementById('ammo'),
        elFoe=document.getElementById('foeCnt'), elGoal=document.getElementById('goalBadge');
  const GOALS=[
    'GOAL ─ 頂点で離して大輪を開く',
    'GOAL ─ 左右の押下位置で振り分ける',
    'GOAL ─ 高さを読み分けて狙う',
    'GOAL ─ 密集群れを連鎖で一掃せよ',
    'GOAL ─ 大群れを連鎖で吹き飛ばせ',
    'GOAL ─ 近接群れは連鎖で崩せ',
    'GOAL ─ 連鎖の起点を見抜いて一掃',
    'GOAL ─ 密集＋散開を読み切れ',
    'GOAL ─ 大連鎖を叩き込め',
    'GOAL ─ 全弾必中 連鎖の大輪'
  ];

  let U=0, UH=0, PW=0, PH=0;
  function measure(){
    const r=phone.getBoundingClientRect();
    PW=r.width; PH=r.height; U=PW/100; UH=PH/100;
  }
  window.addEventListener('resize', ()=>{ measure(); rebuild(); });

  // 星
  for(let i=0;i<46;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=1+Math.random()*2.2;
    s.style.left=(Math.random()*100)+'%';
    s.style.top=(Math.random()*72)+'%';
    s.style.width=sz+'px'; s.style.height=sz+'px';
    s.style.animationDelay=(Math.random()*3.4)+'s';
    sky.appendChild(s);
  }

  // === ステージ定義 (座標は #phone 内 % 単位 : x=幅%, y=上から高さ%) ===
  // 群れ y が小さいほど高い位置。爆発半径は起爆高度に依存。
  // 撃破された群れは二次爆発の起点となり、近接する群れへ連鎖する。
  // 【改修2026-06-27】「光の群れすごく多くして」→ Tier B 全面で光の群れ(.foe)を大増量・高密度化。
  //   - Tier A (St1〜3): 学習目標を維持するため変更なし
  //   - Tier B (St4〜10): 群れ数を顕著に増やし、大型密集クラスタ化。
  //     1発の大輪→大連鎖で「すごく多い」群れを一掃する非対称な大出力を強化。
  //     BFS（連鎖伝播込み）で全面クリア可・最短手数 4〜7手範囲を再検証済み。
  const STAGES = [
    // ===== Tier A: 操作理解＋コア体験（Stage1〜3 / 最短1〜3操作）=====
    { // Stage1: 頂点付近に1クラスタ。頂点で離せば1発全滅。最短1操作。（変更なし）
      ammo:3,
      foes:[ {x:50,y:22,r:9}, {x:44,y:27,r:9}, {x:56,y:27,r:9} ],
      hint:'押した瞬間に花火が上昇する。最高到達点（頂点）で離すほど大輪が大きく広がる。頂点でパッと離して群れを巻き込め！'
    },
    { // Stage2: 角度導入。左右に離れた2クラスタ。押す位置を左右に振って各々を1発。最短2操作。（変更なし）
      ammo:3,
      foes:[ {x:14,y:26,r:8}, {x:20,y:30,r:8}, {x:86,y:26,r:8}, {x:80,y:30,r:8} ],
      hint:'押す左右の位置で打ち上げ角度が決まる。左を押せば左へ、右を押せば右へ飛ぶ。左右の群れに振り分けて大輪を開け！'
    },
    { // Stage3: 高度読み導入。高い単体＋低い左右。高さ別に離すタイミングを変える。最短3操作。（変更なし）
      ammo:4,
      foes:[ {x:50,y:14,r:8}, {x:18,y:50,r:8}, {x:82,y:52,r:8} ],
      hint:'高い群れは頂点近くで、低い群れは早めに離す。離す高さで届く位置が決まる。高さを読み分けよう！'
    },
    // ===== Tier B: 思考＋応用（Stage4〜10 / 最短4〜7操作）=====
    // 【改修2026-06-27】光の群れを大増量・密集化。大型クラスタの大連鎖で一掃。
    { // Stage4: 大増量。高所7体大クラスタ＋散開3体（計10体）。ammo6。最短4手。
      // 7体クラスタ: (34,13)(42,15)(50,13)(58,15)(38,20)(46,22)(54,20) → 全連鎖
      // 散開3体: (12,50)(82,46)(48,70) → 各単発
      // 最短: クラスタ大連鎖1+散開3×1=4手 → ammo6≧4
      ammo:6,
      foes:[ {x:34,y:13,r:7}, {x:42,y:15,r:7}, {x:50,y:13,r:7}, {x:58,y:15,r:7},
             {x:38,y:20,r:7}, {x:46,y:22,r:7}, {x:54,y:20,r:7},
             {x:12,y:50,r:7}, {x:82,y:46,r:7}, {x:48,y:70,r:7} ],
      hint:'光の群れが大増量！高所の7体大群れは1発の大輪が次々連鎖して一掃する。まず連鎖でまとめて撃破し、散った3体を単発で仕留めろ。'
    },
    { // Stage5: 高所7体大クラスタ＋単独3（計10体）。超大連鎖の爽快感。ammo6。
      // 7体クラスタ: (34,13)(42,15)(50,13)(58,15)(38,20)(46,22)(54,20)
      // 単独3: (84,40)(14,54)(58,72)
      // 最短: クラスタ1発7連鎖+単独3＝4手 → ammo6≧4
      ammo:6,
      foes:[ {x:34,y:13,r:7}, {x:42,y:15,r:7}, {x:50,y:13,r:7}, {x:58,y:15,r:7},
             {x:38,y:20,r:7}, {x:46,y:22,r:7}, {x:54,y:20,r:7},
             {x:84,y:40,r:6}, {x:14,y:54,r:6}, {x:58,y:72,r:6} ],
      hint:'高所に7体の大群れ！1発の大輪が次々連鎖して総爆発する。連鎖の起点を狙い、散った3体を単発で仕留めろ。'
    },
    { // Stage6: 高所4体クラスタ＋左中段トリオ＋単独3（計10体）。ammo7。
      // クラスタA: (42,12)(50,14)(58,12)(50,19) 高所密集→連鎖
      // トリオB: (12,40)(20,43)(16,47) 中段密集→連鎖
      // 単独3: (84,30)(74,56)(42,72)
      // 最短: BFS 4手 → ammo7≧
      ammo:7,
      foes:[ {x:42,y:12,r:6}, {x:50,y:14,r:6}, {x:58,y:12,r:6}, {x:50,y:19,r:6},
             {x:12,y:40,r:6}, {x:20,y:43,r:6}, {x:16,y:47,r:6},
             {x:84,y:30,r:6}, {x:74,y:56,r:6}, {x:42,y:72,r:6} ],
      hint:'2組の大密集を連鎖で崩せ。高所の塊と中段の塊を各1発で一掃、散った3体は高さと角度を合わせ単発で仕留める。'
    },
    { // Stage7: 高所5体クラスタ＋右中段トリオ＋単独4（計12体）。最多群れ。ammo8。
      // クラスタ5体: (30,14)(38,16)(46,14)(54,16)(42,21)
      // トリオ3体: (70,34)(80,37)(75,41)
      // 単独4: (12,52)(26,64)(68,62)(40,77)
      // 最短: BFS 4手 → ammo8≧
      ammo:8,
      foes:[ {x:30,y:14,r:6}, {x:38,y:16,r:6}, {x:46,y:14,r:6}, {x:54,y:16,r:6}, {x:42,y:21,r:6},
             {x:70,y:34,r:6}, {x:80,y:37,r:6}, {x:75,y:41,r:6},
             {x:12,y:52,r:6}, {x:26,y:64,r:6}, {x:68,y:62,r:6}, {x:40,y:77,r:6} ],
      hint:'12体の大群れ！高所の大クラスタと中段のトリオを連鎖で崩し、広域に散った4体を端まで届かせて全滅させろ。'
    },
    { // Stage8: 高所5体クラスタ＋散開4（計9体）。ammo7。
      // クラスタ5体: (42,12)(50,14)(58,12)(46,19)(54,19)
      // 散開4: (88,32)(12,46)(80,56)(18,68)
      // 最短: BFS 4手 → ammo7≧
      ammo:7,
      foes:[ {x:42,y:12,r:5}, {x:50,y:14,r:5}, {x:58,y:12,r:5}, {x:46,y:19,r:5}, {x:54,y:19,r:5},
             {x:88,y:32,r:5}, {x:12,y:46,r:5}, {x:80,y:56,r:5}, {x:18,y:68,r:5} ],
      hint:'高所の大密集を連鎖で一掃、残り4体は小さく散っている。大連鎖の後は1発1体を確実に仕留めろ。'
    },
    { // Stage9: 高所7体大クラスタ＋散開4（計11体）。最大級の大連鎖。ammo8。
      // 7体クラスタ: (32,13)(40,15)(48,13)(56,15)(36,20)(44,22)(52,20)
      // 散開4: (86,30)(12,44)(78,56)(22,70)
      // 最短: BFS 4手 → ammo8≧
      ammo:8,
      foes:[ {x:32,y:13,r:5}, {x:40,y:15,r:5}, {x:48,y:13,r:5}, {x:56,y:15,r:5},
             {x:36,y:20,r:5}, {x:44,y:22,r:5}, {x:52,y:20,r:5},
             {x:86,y:30,r:5}, {x:12,y:44,r:5}, {x:78,y:56,r:5}, {x:22,y:70,r:5} ],
      hint:'11体！高所の超大群れを1発で連鎖爆発させ、散開した4体を端まで届かせて仕留めろ。連鎖で稼いで弾を温存せよ。'
    },
    { // Stage10: 最難。頂点トリオ密集＋散開6体（計9体・極小半径）。最終面も連鎖の一閃あり。ammo8。
      // トリオ: (44,11)(52,13)(50,17) → 連鎖
      // 散開6: (90,24)(10,34)(84,47)(14,58)(70,69)(30,80) → 各単発
      // 最短: トリオ連鎖1+単独6＝6手 → ammo8≧
      ammo:8,
      foes:[ {x:44,y:11,r:4}, {x:52,y:13,r:4}, {x:50,y:17,r:4},
             {x:90,y:24,r:4}, {x:10,y:34,r:4}, {x:84,y:47,r:4}, {x:14,y:58,r:4}, {x:70,y:69,r:4}, {x:30,y:80,r:4} ],
      hint:'最終ステージ。頂点の密集トリオを連鎖で開幕一掃、残り6体が極限に散る。全弾必中の精度で大輪の祭典を完成させろ。'
    }
  ];

  let stage=0, ammo=0, foes=[], foeEls=[], shell=null, dragging=false;
  let launchAng=0, gameLock=false, flying=false;
  let flightStart=0, flightRAF=0, curHeight=0; // curHeight: 0(地表)〜1(頂点)

  // launcher 発射原点 (% → px)
  function originX(){ return PW*0.5; }
  function originY(){ return PH*0.95; } // 地表上

  function rebuild(){
    // 既存の敵を再配置（リサイズ時の座標補正）
    foeEls.forEach((el,i)=>{
      if(foes[i] && foes[i].alive){
        el.style.left=foes[i].x+'%'; el.style.top=foes[i].y+'%';
        el.style.width=(foes[i].r*2*U)+'px'; el.style.height=(foes[i].r*2*U)+'px';
      }
    });
  }

  function loadStage(){
    const s=STAGES[stage];
    ammo=s.ammo;
    foes = s.foes.map(f=>({...f, alive:true}));
    // クリア
    foeEls.forEach(e=>e.remove()); foeEls=[];
    foes.forEach(f=>{
      const el=document.createElement('div'); el.className='foe';
      el.style.left=f.x+'%'; el.style.top=f.y+'%';
      el.style.width=(f.r*2*U)+'px'; el.style.height=(f.r*2*U)+'px';
      phone.appendChild(el); foeEls.push(el);
    });
    elStg.textContent=stage+1;
    elGoal.textContent=GOALS[stage]||GOALS[0];
    updateHud();
  }

  function updateHud(){
    elAmmo.textContent=ammo;
    elFoe.textContent=foes.filter(f=>f.alive).length;
  }

  function aliveCount(){ return foes.filter(f=>f.alive).length; }

  // === 入力: マウス/ポインタのみ ===
  function getPt(e){
    const r=phone.getBoundingClientRect();
    return { x:e.clientX-r.left, y:e.clientY-r.top };
  }

  // 押下 x（#phone中心からの左右オフセット）→ 打ち上げ角度 ±32° を算出
  function angFromX(px){
    const off=(px - PW*0.5)/(PW*0.5); // -1(左端)〜+1(右端)
    return Math.max(-32, Math.min(32, off*32));
  }

  // pointerdown: 押下 x 位置で打ち上げ角度を確定 → 即・打ち上げ開始。
  // 角度は飛翔中ずっと固定。飛翔中の唯一の判断は「いつ離すか（＝到達高度）」。
  phone.addEventListener('pointerdown', e=>{
    if(gameLock || flying) return;
    if(ammo<=0) return;
    const p=getPt(e);
    launchAng=angFromX(p.x);            // 押下位置で角度確定（以後不変）
    dragging=true;
    aim.style.opacity='1';
    aim.style.transform='translateX(-50%) rotate('+launchAng+'deg)';
    chargeWrap.style.opacity='1';
    phone.setPointerCapture?.(e.pointerId);
    launch(); // 打ち上げ開始（角度は確定済み・飛翔中固定）
  });

  // pointermove: 角度は飛翔中固定のため、移動では何もしない（操作軸は「いつ離すか」のみ）。

  // pointerup: 離した瞬間＝起爆。その時の高度(curHeight)で大輪サイズが決まる。
  function endDrag(){
    if(!dragging) return;
    dragging=false;
    aim.style.opacity='0';
    chargeWrap.style.opacity='0';
    fireNow();
  }
  phone.addEventListener('pointerup', endDrag);
  phone.addEventListener('pointercancel', endDrag);
  phone.addEventListener('pointerleave', e=>{ if(dragging) endDrag(); });

  // === 打ち上げ: ホールド中ずっと放物線運動。角度は launch 時の値で固定。離すタイミングで起爆 ===
  // curHeight 0(地表)→1(頂点)→0(着地)。頂点付近で離すほど高く＝大輪が最大。
  function launch(){
    ammo--; updateHud();
    flying=true;
    const ox=originX(), oy=originY();
    shell=document.createElement('div'); shell.className='shell';
    shell.style.left=ox+'px'; shell.style.top=oy+'px';
    phone.appendChild(shell);
    flightStart=performance.now();
    cancelAnimationFrame(flightRAF);
    flightRAF=requestAnimationFrame(flight);
  }
  function flight(now){
    if(!flying) return;
    const ox=originX(), oy=originY();
    const dur=1500; // 上昇〜下降の総時間
    let t=(now-flightStart)/dur;
    if(t>=1){ // 離さずに着地 → 不発（残弾は消費済み）
      flying=false; if(shell){shell.remove();shell=null;}
      curHeight=0; chargeFill.style.height='0%';
      setTimeout(checkState,100); return;
    }
    // 高度: sin で 0→頂点(t=0.5)→0 の放物線。頂点で curHeight=1
    curHeight=Math.sin(t*Math.PI);
    const topY=PH*0.10; // 最高到達点の y
    const y=oy+(topY-oy)*curHeight;
    // 横位置は launch 時に確定した角度で決定（飛翔中は不変）
    // t に比例して打ち上げ方向へ直進し続ける（上昇・下降どちらも常に前進）
    const x=ox + Math.tan(launchAng*Math.PI/180)*(oy - PH*0.10)*t*0.55;
    shell.style.left=x+'px'; shell.style.top=y+'px';
    chargeFill.style.height=(curHeight*100)+'%';
    shell.dataset.x=x; shell.dataset.y=y;
    flightRAF=requestAnimationFrame(flight);
  }
  function fireNow(){
    if(!flying || !shell) return;
    flying=false; cancelAnimationFrame(flightRAF);
    const x=parseFloat(shell.dataset.x), y=parseFloat(shell.dataset.y);
    if(shell){ shell.remove(); shell=null; }
    detonate(x, y, curHeight);
  }

  // === 起爆半径式 ===
  // 一次起爆（プレイヤーの花火）: 離した高度(h)に比例。
  //   低高度ほど小さく、頂点ほど大きく。大小差(小:大≒1:2.5)を強調。
  //   R = U*(8 + h*12)  → 低高度8%幅 ／ 頂点20%幅
  function shotRadius(h){ return U*(8 + h*12); }
  // 二次起爆（連鎖）: 撃破された群れの半径に比例した中爆発。
  //   群れ半径 r(%) に対し R = U*(r + 6)。小群れでも周囲の近接群れへ波及する。
  function chainRadius(r){ return U*(r + 6); }

  // === 起爆 + 連鎖 ===
  // 一次爆発で撃破した群れを起点に、二次爆発を遅延キューで順次発火。
  // 連鎖は自動（追加操作なし）。判断軸は「いつ離すか」の1軸を維持。
  let chainTotal=0, chainTimer=null;

  function detonate(x,y,h){
    const R = shotRadius(h);
    bigBurst(x, y, R, false);
    chainTotal=0;
    const killed = applyBlast(x, y, R); // この爆発で倒れた群れ配列
    // 倒した群れを二次爆発の起点としてキューに積む
    if(killed.length){
      killed.forEach((idx,k)=> queueChain(idx, 220 + k*90));
    }
    updateHud();
    chargeFill.style.height='0%';
    // 連鎖完了後にコンボ表示＆判定（最後の発火 + 余白を見て）
    scheduleResolve();
  }

  // 指定中心・半径で生存群れを巻き込み、撃破した群れの index 配列を返す
  function applyBlast(x, y, R){
    const killed=[];
    foes.forEach((f,i)=>{
      if(!f.alive) return;
      const fx=f.x/100*PW, fy=f.y/100*PH;
      const d=Math.hypot(fx-x, fy-y);
      if(d < R + f.r*U){
        f.alive=false;
        if(foeEls[i]) foeEls[i].classList.add('pop');
        killed.push(i);
      }
    });
    return killed;
  }

  // 撃破した群れ idx を起点に、遅延して二次爆発を発火（連鎖）
  function queueChain(idx, delay){
    chainTotal++;
    const f=foes[idx];
    const cx=f.x/100*PW, cy=f.y/100*PH;
    const R=chainRadius(f.r);
    setTimeout(()=>{
      bigBurst(cx, cy, R, true);          // 連鎖用の演出（色変え）
      const more=applyBlast(cx, cy, R);   // さらに巻き込んだ群れ
      updateHud();
      if(more.length){
        more.forEach((nidx,k)=> queueChain(nidx, 120 + k*80));
      }
    }, delay);
  }

  // 連鎖が落ち着いた頃にコンボ表示と勝敗判定を行う
  function scheduleResolve(){
    if(chainTimer) clearTimeout(chainTimer);
    chainTimer=setTimeout(()=>{
      if(chainTotal>=2) showCombo(chainTotal);
      checkState();
    }, 700);
  }

  function showCombo(n){
    comboNum.textContent = n + '連鎖';
    comboEl.classList.remove('show'); void comboEl.offsetWidth;
    comboEl.classList.add('show');
  }

  function checkState(){
    if(aliveCount()===0){ win(); return; }
    if(ammo<=0){ lose(); return; }
  }

  // === 爆発演出 ===
  // chain=true で連鎖二次爆発（色調を変えて識別）。R に比例しリング径・火花が変化＝大小差が視覚化。
  function bigBurst(x,y,R,chain){
    flash.style.opacity = chain ? '.32' : '.6';
    setTimeout(()=>flash.style.opacity='0', chain?70:90);
    // 二重の拡大リング（外殻＋白いコア）で大輪の開きを強調
    function makeRing(cls,scale,dur){
      const ring=document.createElement('div'); ring.className='burst'+(cls?' '+cls:'');
      ring.style.left=x+'px'; ring.style.top=y+'px';
      ring.style.width='0px'; ring.style.height='0px'; ring.style.opacity='1';
      phone.appendChild(ring);
      const t0=performance.now();
      (function grow(now){
        const t=Math.min(1,(now-t0)/dur);
        const e=1-Math.pow(1-t,2);
        const d=R*2*scale*e;
        ring.style.width=d+'px'; ring.style.height=d+'px';
        ring.style.opacity=(1-t);
        if(t<1) requestAnimationFrame(grow); else ring.remove();
      })(t0);
    }
    if(chain){
      makeRing('chain', 1, 360);
      makeRing('core', 0.5, 240);
    } else {
      makeRing('', 1, 420);
      makeRing('core', 0.62, 300);
    }
    // 放射火花（R に比例して飛距離が変わる＝爆発の大小が体感できる）
    const cols = chain
      ? ['var(--nova-3)','var(--nova-1)','var(--nova-9)','var(--cyan)']
      : ['var(--nova-9)','var(--nova-7)','var(--nova-5)','var(--nova-3)','var(--nova-1)','var(--cyan)'];
    const n = chain ? 16 : 28;
    for(let i=0;i<n;i++){
      const sp=document.createElement('div'); sp.className='spark';
      const c=cols[i%cols.length];
      sp.style.color=c; sp.style.background=c;
      sp.style.left=x+'px'; sp.style.top=y+'px';
      phone.appendChild(sp);
      const a=(i/n)*Math.PI*2 + Math.random()*0.2;
      const dist=R*(0.7+Math.random()*0.5);
      const tx=x+Math.cos(a)*dist, ty=y+Math.sin(a)*dist;
      const st0=performance.now(), sd=480+Math.random()*180;
      (function fly(now){
        const t=Math.min(1,(now-st0)/sd);
        const e=1-Math.pow(1-t,2);
        sp.style.left=(x+(tx-x)*e)+'px';
        sp.style.top=(y+(ty-y)*e + t*t*R*0.4)+'px'; // 落下感
        sp.style.opacity=(1-t);
        if(t<1) requestAnimationFrame(fly); else sp.remove();
      })(st0);
    }
  }

  // === 進行 ===
  function win(){
    gameLock=true;
    if(stage < STAGES.length-1){
      showModal('STAGE CLEAR', '大輪が群れを巻き込んだ！次のステージへ。', '', '次へ', ()=>{
        stage++; gameLock=false; closeModal(); loadStage();
      });
    } else {
      showModal('ALL CLEAR', 'すべての群れを花火で巻き込んだ！', '押す位置の照準と、離す高さの読みが、大輪の連鎖に。', 'もう一度', ()=>{
        stage=0; gameLock=false; closeModal(); loadStage();
      });
    }
  }
  function lose(){
    gameLock=true;
    showModal('花火切れ', '群れがまだ残っている…', '押す左右の位置で角度を、離すタイミングで高さを。密集した群れは連鎖で狙え。', 'リトライ', ()=>{
      gameLock=false; closeModal(); loadStage();
    });
  }
  function showModal(title,body,hint,btn,cb){
    mTitle.textContent=title; mBody.textContent=body;
    mHint.textContent=hint||''; mBtn.textContent=btn;
    mBtn.onclick=cb; modal.classList.add('show');
  }
  function closeModal(){ modal.classList.remove('show'); }

  // 起動
  function start(){
    measure(); loadStage();
  }
  // 初回モーダル
  mTitle.textContent='花火大輪';
  mBody.textContent='画面を押すと花火が上昇。最高到達点で離すと放射状の大輪が開き、光の群れを巻き込む！密集した群れは連鎖で一掃。';
  mHint.textContent='操作はマウスのみ。押す左右の位置で打ち上げ角度が決まり、離すタイミングで大輪の大きさが決まる。';
  mBtn.textContent='はじめる';
  mBtn.onclick=()=>{ closeModal(); measure(); loadStage(); };
  modal.classList.add('show');
  measure();
  </script>
</body>
</html>
