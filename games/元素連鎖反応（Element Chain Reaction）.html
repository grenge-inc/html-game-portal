<!DOCTYPE html>
<!--
  Phone frame template for hybrid-casual-mentor generated games.
  Aspect ratio: 9:19.5 (iPhone X 系縦長, NEONNOVA2048 基準)。
  PC で開いても常にこの比率を保ち、letterbox（左右黒帯）で中央表示。
  すべてのゲーム要素は #phone の子として配置すること。
-->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>元素連鎖反応</title>
<style>
  :root {
    --phone-aspect: 9 / 19.5; /* スマホ縦長基準 (iPhone X 以降) */
    /* 背景階層 */
    --bg-deep:#02030a; --bg-mid:#0a1430; --bg-core:#180a3a;
    --line:#1a2848;
    /* 元素強度グラデ（低=紫寄り → 高=黄白の高温色） */
    --nova-1:#b585ff; --nova-2:#7aa8ff; --nova-3:#3ddfee;
    --nova-4:#ff7a3a; --nova-5:#ffb24a; --nova-6:#ffd76b;
    --nova-core:#ffffff;
    /* テキスト・アクセント */
    --text-main:#eaf3ff; --text-sub:#cdddef; --text-dim:#7a92b5;
    --cyan:#6ff; --warn:#ffb86c;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html, body {
    width:100%; height:100%;
    overflow:hidden;
    background:#000;            /* letterbox 部分の色 */
    color:var(--text-main);
    font-family:'Helvetica Neue', system-ui, sans-serif;
    user-select:none;
    -webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
  }
  body {
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #phone {
    position:relative;
    overflow:hidden;
    /* 画面に収まる最大の 9:19.5 矩形 */
    width:  min(100vw, calc(100vh * 9 / 19.5));
    height: min(100vh, calc(100vw * 19.5 / 9));
    --pw:   min(100vw, calc(100vh * 9 / 19.5));
    --ph:   min(100vh, calc(100vw * 19.5 / 9));
    --u:    calc(var(--pw) / 100); /* 1u  = phone 幅 1% */
    --uh:   calc(var(--ph) / 100); /* 1uh = phone 高 1% */
    /* 深色 radial 背景（中心輝度高 → 外周深色） */
    background:
      radial-gradient(120% 70% at 50% 22%, var(--bg-core) 0%, var(--bg-mid) 38%, var(--bg-deep) 100%);
  }
  /* 環境演出：微細グリッド */
  #phone::before{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.5;
    background-image:
      linear-gradient(var(--line) 1px,transparent 1px),
      linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:calc(var(--u)*12) calc(var(--u)*12);
    -webkit-mask-image:radial-gradient(80% 60% at 50% 55%,#000 0%,transparent 78%);
            mask-image:radial-gradient(80% 60% at 50% 55%,#000 0%,transparent 78%);}
  #board{position:absolute;inset:0;z-index:1;}
  #hud{position:absolute;top:calc(var(--uh)*3.5);left:0;width:100%;
       display:flex;flex-direction:column;align-items:center;gap:calc(var(--uh)*1.2);
       pointer-events:none;z-index:3;}
  #hud .title{font-size:calc(var(--u)*4.4);font-weight:800;letter-spacing:4px;
       background:linear-gradient(90deg,var(--nova-1),var(--nova-3),var(--nova-6));
       -webkit-background-clip:text;background-clip:text;color:transparent;
       filter:drop-shadow(0 0 calc(var(--u)*1.4) rgba(120,200,255,.35));}
  #hud .badge{display:flex;align-items:center;gap:calc(var(--u)*2);
       font-weight:700;font-size:calc(var(--u)*4);letter-spacing:3px;color:var(--text-main);
       padding:calc(var(--uh)*0.8) calc(var(--u)*4);border:1px solid var(--line);border-radius:999px;
       background:rgba(10,20,48,.5);box-shadow:0 0 calc(var(--u)*2) rgba(60,120,200,.25) inset;}
  #hud .badge .dot{width:calc(var(--u)*2);height:calc(var(--u)*2);border-radius:50%;
       background:var(--nova-3);box-shadow:0 0 calc(var(--u)*1.6) var(--nova-3);}
  #hud .goal{display:flex;align-items:center;gap:calc(var(--u)*1.6);
       font-size:calc(var(--u)*3.1);color:var(--text-sub);}
  #hud .goal .tag{font-size:calc(var(--u)*2.6);font-weight:700;letter-spacing:1px;
       padding:calc(var(--uh)*0.4) calc(var(--u)*2);border-radius:calc(var(--u)*1.4);
       color:var(--bg-deep);background:linear-gradient(120deg,var(--nova-4),var(--nova-6));}
  /* チェインカウンター（右上にオーバーレイ） */
  #chain-counter{position:absolute;top:calc(var(--uh)*1.5);right:calc(var(--u)*4);
       font-size:calc(var(--u)*5.5);font-weight:900;letter-spacing:2px;
       color:var(--nova-6);opacity:0;pointer-events:none;z-index:4;
       text-shadow:0 0 calc(var(--u)*3) var(--nova-5),0 0 calc(var(--u)*6) var(--nova-4);
       transition:opacity 0.2s;}
  #chain-counter.show{opacity:1;}
  #modal{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
         z-index:6;background:radial-gradient(60% 50% at 50% 45%,rgba(24,10,58,.78),rgba(2,3,10,.92));
         backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);}
  #modal .card{text-align:center;padding:calc(var(--uh)*4) calc(var(--u)*8);}
  #modal h1{font-size:calc(var(--u)*9);font-weight:900;letter-spacing:4px;
       background:linear-gradient(90deg,var(--nova-3),var(--nova-5),var(--nova-6));
       -webkit-background-clip:text;background-clip:text;color:transparent;
       filter:drop-shadow(0 0 calc(var(--u)*3) rgba(255,180,90,.45));}
  #modal p{font-size:calc(var(--u)*3.8);color:var(--text-sub);margin-top:calc(var(--uh)*2.2);
       letter-spacing:2px;animation:pulse 1.3s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
</style>
</head>
<body>
  <div id="phone">
    <canvas id="board"></canvas>
    <div id="hud"></div>
    <div id="chain-counter" id="chain-counter"></div>
    <div id="modal"></div>
  </div>
  <script>
    'use strict';
    // ===== 元素連鎖反応：連番チェイン自動伝播ロジック =====
    const phone = document.getElementById('phone');
    const cv = document.getElementById('board');
    const ctx = cv.getContext('2d');
    const chainCounter = document.querySelector('#chain-counter');

    const COLS = 5, ROWS = 5;
    // ステージ定義：cells[col][row] = level(1..6) or null
    // St1: 直線3ノード（1手）― 操作理解
    // St2: 直線4ノード（1手）― コア体験確認
    // St3: L字3ノード＋独立3ノード（2手）― 思考要素追加
    // St4: 3ラン計9ノード（3手）― 応用・複数解法
    // St5: 複数ランが絡む14ノード（4手）― 最適化・手順最適化
    const STAGES = [
      { // St1 ― 操作理解（1手）
        // 盤面：横一列 1→2→3 の3ノード（中段）
        // 想定手順: (0,2)=1 を点火 → 1→2→3 自動伝播・全消し
        name: 1, cols: 5, rows: 5,
        nodes: [ [0,2,1],[1,2,2],[2,2,3] ],
        goal: 'all'
      },
      { // St2 ― コア体験確認（1手）
        // 盤面：横一列 1→2→3→4 の4ノード（中段）
        // 想定手順: (0,2)=1 を点火 → 1→2→3→4 自動伝播・全消し
        name: 2, cols: 5, rows: 5,
        nodes: [ [0,2,1],[1,2,2],[2,2,3],[3,2,4] ],
        goal: 'all'
      },
      { // St3 ― 思考要素追加（2手）
        // 盤面: L字ラン A（3ノード）＋独立ラン B（3ノード）
        //   ラン A: (0,1)=1→(1,1)=2→(1,2)=3  ← 下方向へ折れるL字
        //   ラン B: (3,3)=1→(4,3)=2→(4,2)=3  ← 右上へ折れるL字（独立）
        // 想定手順:
        //   1. (0,1)=1 点火 → 1→2→3 の3ノード消滅
        //   2. (3,3)=1 点火 → 1→2→3 の3ノード消滅
        name: 3, cols: 5, rows: 5,
        nodes: [
          [0,1,1],[1,1,2],[1,2,3],
          [3,3,1],[4,3,2],[4,2,3]
        ],
        goal: 'all'
      },
      { // St4 ― 応用・複数解法（4手）
        // 盤面: ラン A（直線3ノード）＋ラン B（L字3ノード）＋ラン C（L字3ノード）＋ラン D（直線3ノード・起点=2）計12ノード
        //   ラン A: (0,0)=1→(1,0)=2→(2,0)=3
        //   ラン B: (0,2)=1→(1,2)=2→(1,3)=3  ← 下方向へ折れるL字
        //   ラン C: (3,1)=1→(4,1)=2→(4,2)=3  ← 下方向へ折れるL字
        //   ラン D: (2,4)=2→(3,4)=3→(4,4)=4  ← 起点が2（途中から点火すると前が取れない教材）
        //     正解: (2,4)=2 から点火 → 2→3→4 の3ノード消滅
        // 想定手順:
        //   1. (0,0)=1 点火 → 1→2→3 の3ノード消滅
        //   2. (0,2)=1 点火 → 1→2→3 の3ノード消滅
        //   3. (3,1)=1 点火 → 1→2→3 の3ノード消滅
        //   4. (2,4)=2 点火 → 2→3→4 の3ノード消滅
        name: 4, cols: 5, rows: 5,
        nodes: [
          [0,0,1],[1,0,2],[2,0,3],
          [0,2,1],[1,2,2],[1,3,3],
          [3,1,1],[4,1,2],[4,2,3],
          [2,4,2],[3,4,3],[4,4,4]
        ],
        goal: 'all'
      },
      { // St5 ― 最適化・手順最適化（4手）
        // 旧St2と同等の複雑配置：複数ランが共有ノードを巡って絡む設計
        //   ラン A（最長）: (0,0)=1→(1,0)=2→(2,0)=3→(3,0)=4→(4,0)=5→(4,1)=6
        //   ラン B（L字）: (0,2)=1→(1,2)=2→(1,3)=3
        //   ラン C（共有ノード絡み）: (0,4)=1→(1,4)=2→[共有(1,3)=3]
        //   ラン D（独立）: (3,4)=3→(3,3)=4→(4,3)=5
        // 共有ノード(1,3)=3 は B と C の争奪点。どちらが先に消費するかで残部手数が変わる。
        // 想定最短手順（4手）:
        //   1. (0,0)=1 点火 → ラン A 全6ノード消滅
        //   2. (0,2)=1 点火 → (0,2)(1,2)(1,3) の3ノード消滅（ラン B が(1,3)を取得）
        //   3. (0,4)=1 点火 → (0,4)(1,4) の2ノード消滅（(1,3)消費済みで停止）
        //   4. (3,4)=3 点火 → (3,4)(3,3)(4,3) の3ノード消滅（ラン D）
        name: 5, cols: 5, rows: 5,
        nodes: [
          [0,0,1],[1,0,2],[2,0,3],[3,0,4],[4,0,5],
          [4,1,6],
          [0,2,1],[1,2,2],
          [1,3,3],[3,3,4],[4,3,5],
          [0,4,1],[1,4,2],[3,4,3]
        ],
        goal: 'all'
      }
    ];

    // HUDラベル定義（ステージごと）
    const STAGE_LABELS = [
      { tag: 'BASIC',    goal: '1クリックで全消しを体験' },
      { tag: 'BASIC',    goal: '起点を点火 → 全消し' },
      { tag: 'THINK',    goal: '2つのランを各1回点火' },
      { tag: 'ADVANCED', goal: '各ランの起点を見極めて全消し' },
      { tag: 'TACTICS',  goal: '共有ノードの順序を計画して全消し' }
    ];

    let stageIdx = 0;
    let grid = [];          // grid[col][row] = {lv, alive}
    let total = 0;
    let busy = false;       // 連鎖アニメ中はクリック無効
    let particles = [];
    let chainBest = 0;

    // ====== ホバー・プレビュー状態 ======
    let hoverC = -1, hoverR = -1;   // 現在ホバー中のセル
    let previewChain = [];           // ホバーで計算済みの連鎖経路 [{c,r,lv,idx}]
    let previewArrows = [];          // 連鎖の向き矢印 [{x1,y1,x2,y2,progress}]

    function buildStage(i){
      const st = STAGES[i];
      grid = [];
      for(let c=0;c<COLS;c++){ grid[c]=[]; for(let r=0;r<ROWS;r++) grid[c][r]=null; }
      total = 0;
      for(const [c,r,lv] of st.nodes){ grid[c][r] = {lv, alive:true, pop:0}; total++; }
      busy = false; particles = []; chainBest = 0;
      previewChain = []; previewArrows = []; hoverC=-1; hoverR=-1;
      clearChainCounter();
    }

    // ====== 連番 BFS 伝播（dry-run 対応） ======
    function computeChain(sc, sr, gridSnap){
      // gridSnap は grid と同等構造（alive状態を参照）
      const start = gridSnap[sc] && gridSnap[sc][sr];
      if(!start || !start.alive) return [];
      const order = [];
      const queue = [[sc,sr]];
      const taken = new Set();
      taken.add(sc+','+sr);
      while(queue.length){
        const [c,r] = queue.shift();
        const node = gridSnap[c][r];
        order.push({c,r,lv:node.lv});
        const want = node.lv + 1;
        const nb = [[c+1,r],[c-1,r],[c,r+1],[c,r-1]];
        for(const [nc,nr] of nb){
          if(nc<0||nc>=COLS||nr<0||nr>=ROWS) continue;
          const t = gridSnap[nc][nr];
          const key = nc+','+nr;
          if(t && t.alive && t.lv===want && !taken.has(key)){
            taken.add(key); queue.push([nc,nr]);
          }
        }
      }
      return order;
    }

    function detonate(sc, sr){
      const start = grid[sc] && grid[sc][sr];
      if(!start || !start.alive) return;
      const order = computeChain(sc, sr, grid);
      previewChain = []; previewArrows = []; hoverC=-1; hoverR=-1;
      runChain(order);
    }

    // 連鎖を時間差で消し、終端でキノコ雲
    function runChain(order){
      busy = true;
      const chainLen = order.length;
      if(chainLen>chainBest) chainBest = chainLen;
      let k = 0;

      // チェインカウンター表示
      showChainCounter(chainLen);

      const step = ()=>{
        if(k<order.length){
          const {c,r,lv} = order[k];
          const node = grid[c][r];
          if(node){ node.alive=false; spawnMerge(c,r,lv,k); }
          k++;
          setTimeout(step, 110);
        } else {
          // 連鎖終了 → 末端でキノコ雲（連鎖長で規模可変）
          const {c:ec,r:er} = order[order.length-1];
          mushroom(ec, er, chainLen);
          setTimeout(()=>{ busy=false; clearChainCounter(); checkClear(); }, 650);
        }
      };
      step();
    }

    function checkClear(){
      let remain=0;
      for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++) if(grid[c][r]&&grid[c][r].alive) remain++;
      if(remain===0){
        if(stageIdx < STAGES.length-1){
          showModal('STAGE '+STAGES[stageIdx].name+' CLEAR', 'TAP TO NEXT', ()=>{ stageIdx++; buildStage(stageIdx); hideModal(); });
        } else {
          showModal('ALL CLEAR', 'TAP TO REPLAY', ()=>{ stageIdx=0; buildStage(0); hideModal(); });
        }
      }
    }

    // ====== レイアウト計算 ======
    let cell=0, ox=0, oy=0, dpr=1;
    function resize(){
      const w = phone.clientWidth, h = phone.clientHeight;
      dpr = Math.min(window.devicePixelRatio||1, 2);
      cv.width = w*dpr; cv.height = h*dpr;
      cv.style.width = w+'px'; cv.style.height = h+'px';
      ctx.setTransform(dpr,0,0,dpr,0,0);
      const pad = w*0.08;
      const gridW = w - pad*2;
      cell = gridW / COLS;
      ox = pad;
      oy = h*0.30; // 盤面トップ
    }

    function cellCenter(c,r){ return [ox + c*cell + cell/2, oy + r*cell + cell/2]; }

    // ====== 入力（pointerdown / pointermove のみ・マウス操作） ======
    cv.addEventListener('pointerdown', (e)=>{
      if(busy) return;
      const rect = cv.getBoundingClientRect();
      const x = e.clientX - rect.left, y = e.clientY - rect.top;
      const c = Math.floor((x-ox)/cell), r = Math.floor((y-oy)/cell);
      if(c<0||c>=COLS||r<0||r>=ROWS) return;
      if(grid[c]&&grid[c][r]&&grid[c][r].alive) detonate(c,r);
    });

    // pointermove でホバープレビューを計算
    cv.addEventListener('pointermove', (e)=>{
      if(busy){ hoverC=-1; hoverR=-1; previewChain=[]; previewArrows=[]; return; }
      const rect = cv.getBoundingClientRect();
      const x = e.clientX - rect.left, y = e.clientY - rect.top;
      const c = Math.floor((x-ox)/cell), r = Math.floor((y-oy)/cell);
      if(c<0||c>=COLS||r<0||r>=ROWS||!grid[c]||!grid[c][r]||!grid[c][r].alive){
        if(hoverC!==c||hoverR!==r){ hoverC=-1; hoverR=-1; previewChain=[]; previewArrows=[]; }
        return;
      }
      if(c===hoverC && r===hoverR) return; // 変化なし
      hoverC=c; hoverR=r;
      // dry-run で連鎖を計算
      const chain = computeChain(c, r, grid);
      previewChain = chain.map((n,i)=>({...n, idx:i}));
      // 矢印: 連鎖順に隣接ノード間
      previewArrows = [];
      for(let i=1;i<chain.length;i++){
        previewArrows.push({
          c1:chain[i-1].c, r1:chain[i-1].r,
          c2:chain[i].c,   r2:chain[i].r
        });
      }
    });

    cv.addEventListener('pointerleave', ()=>{
      hoverC=-1; hoverR=-1; previewChain=[]; previewArrows=[];
    });

    // ====== パーティクル ======
    function spawnMerge(c,r,lv,k){
      const [x,y]=cellCenter(c,r);
      for(let i=0;i<8;i++){
        const a = Math.random()*Math.PI*2, sp = cell*0.04*(0.6+Math.random());
        particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,lv,r0:cell*0.1});
      }
    }
    function mushroom(c,r,n){
      const [x,y]=cellCenter(c,r);
      const big = Math.min(n,6);
      for(let i=0;i<18+big*8;i++){
        const a = Math.random()*Math.PI*2, sp = cell*(0.05+0.03*big)*(0.5+Math.random());
        particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp - cell*0.02,life:1.4,lv:Math.min(6,Math.ceil(n/1.5)),r0:cell*0.16, mush:true});
      }
    }

    // ====== 描画 ======
    const cssVar = (n)=>getComputedStyle(document.documentElement).getPropertyValue(n).trim();
    let COL = {};
    function loadColors(){
      COL = {1:cssVar('--nova-1'),2:cssVar('--nova-2'),3:cssVar('--nova-3'),
             4:cssVar('--nova-4'),5:cssVar('--nova-5'),6:cssVar('--nova-6'),
             core:cssVar('--nova-core'),deep:cssVar('--bg-deep'),text:cssVar('--text-main')};
    }
    function levelColor(lv){ return COL[lv]||COL.core; }

    // 色文字列からRGBAを生成するユーティリティ
    function hexToRgb(hex){
      const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
      return [r,g,b];
    }
    function colorWithAlpha(lv, alpha){
      const c=levelColor(lv);
      if(c.startsWith('#')&&c.length===7){
        const [r,g,b]=hexToRgb(c);
        return `rgba(${r},${g},${b},${alpha})`;
      }
      return c;
    }

    // アニメーション時刻
    let nowT = 0;

    function drawPreview(){
      if(previewChain.length < 1) return;
      const t = nowT;
      const totalSteps = previewChain.length;

      // ===== 連鎖経路のライン =====
      // 各セグメントを描く（前のノード→次のノードへ）
      for(let i=0;i<previewArrows.length;i++){
        const ar = previewArrows[i];
        const [x1,y1] = cellCenter(ar.c1,ar.r1);
        const [x2,y2] = cellCenter(ar.c2,ar.r2);
        const col1 = levelColor(previewChain[i].lv);
        const col2 = levelColor(previewChain[i+1].lv);

        // 流れる波線アニメーション
        const dash = cell * 0.22;
        const speed = (t * 0.8 + i * 0.3) % (dash*2);
        ctx.save();
        ctx.setLineDash([dash, dash]);
        ctx.lineDashOffset = -speed;
        const lg = ctx.createLinearGradient(x1,y1,x2,y2);
        lg.addColorStop(0, col1);
        lg.addColorStop(1, col2);
        ctx.strokeStyle = lg;
        ctx.lineWidth = cell * 0.07;
        ctx.globalAlpha = 0.65;
        ctx.lineCap = 'round';
        ctx.shadowColor = col2;
        ctx.shadowBlur = cell * 0.18;
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
        ctx.restore();

        // 矢印頭（連鎖の向き）
        const ang = Math.atan2(y2-y1, x2-x1);
        const arrLen = cell * 0.15;
        const mx = (x1+x2)/2, my = (y1+y2)/2;
        ctx.save();
        ctx.globalAlpha = 0.8;
        ctx.fillStyle = col2;
        ctx.shadowColor = col2; ctx.shadowBlur = cell*0.2;
        ctx.translate(mx, my); ctx.rotate(ang);
        ctx.beginPath();
        ctx.moveTo(arrLen, 0);
        ctx.lineTo(-arrLen*0.6, arrLen*0.45);
        ctx.lineTo(-arrLen*0.6, -arrLen*0.45);
        ctx.closePath(); ctx.fill();
        ctx.restore();
      }

      // ===== 連鎖に含まれるノードの強調ハイライト =====
      for(const {c,r,lv,idx} of previewChain){
        const [x,y] = cellCenter(c,r);
        const col = levelColor(lv);
        const phase = (t * 1.2 - idx * 0.35 + Math.PI*2) % (Math.PI*2);
        const pulse = 0.6 + 0.4 * Math.sin(phase);

        // 順序番号バッジ（連鎖内での位置：1,2,3...）
        const stepNum = idx + 1;

        // 外周の輝くリング（連鎖順に遅れて点灯する演出）
        ctx.save();
        ctx.strokeStyle = col;
        ctx.lineWidth = cell * 0.055 * pulse;
        ctx.globalAlpha = 0.55 * pulse;
        ctx.shadowColor = col; ctx.shadowBlur = cell * 0.45;
        ctx.beginPath(); ctx.arc(x, y, cell*0.44, 0, Math.PI*2); ctx.stroke();
        ctx.restore();

        // ステップ番号（ノードの右上に小さく表示）
        const bx = x + cell*0.3, by = y - cell*0.3;
        const bRad = cell * 0.17;
        ctx.save();
        ctx.globalAlpha = 0.88;
        ctx.fillStyle = col;
        ctx.shadowColor = col; ctx.shadowBlur = cell*0.25;
        ctx.beginPath(); ctx.arc(bx, by, bRad, 0, Math.PI*2); ctx.fill();
        ctx.restore();
        ctx.save();
        ctx.fillStyle = COL.deep;
        ctx.font = `bold ${cell*0.2}px Helvetica Neue`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.globalAlpha = 0.95;
        ctx.fillText(stepNum, bx, by);
        ctx.restore();
      }

      // ===== 連鎖長プレビューラベル（ホバー中のノード付近に表示） =====
      if(hoverC>=0 && hoverR>=0 && previewChain.length>0){
        const [hx,hy] = cellCenter(hoverC,hoverR);
        const lblY = hy + cell * 0.7;
        const label = `CHAIN ×${totalSteps}`;
        const lblW = cell * 0.65 * label.length * 0.5 + cell*0.5;
        const lblH = cell * 0.32;
        ctx.save();
        ctx.globalAlpha = 0.82;
        ctx.fillStyle = 'rgba(10,20,48,0.85)';
        ctx.strokeStyle = levelColor(previewChain[previewChain.length-1].lv);
        ctx.lineWidth = cell*0.04;
        const rx=hx-lblW/2, ry=lblY-lblH/2, rr=lblH*0.5;
        ctx.beginPath();
        ctx.moveTo(rx+rr,ry); ctx.lineTo(rx+lblW-rr,ry);
        ctx.arcTo(rx+lblW,ry,rx+lblW,ry+rr,rr);
        ctx.lineTo(rx+lblW,ry+lblH-rr);
        ctx.arcTo(rx+lblW,ry+lblH,rx+lblW-rr,ry+lblH,rr);
        ctx.lineTo(rx+rr,ry+lblH);
        ctx.arcTo(rx,ry+lblH,rx,ry+lblH-rr,rr);
        ctx.lineTo(rx,ry+rr);
        ctx.arcTo(rx,ry,rx+rr,ry,rr);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
        ctx.restore();
        ctx.save();
        ctx.fillStyle = levelColor(previewChain[previewChain.length-1].lv);
        ctx.font = `bold ${cell*0.22}px Helvetica Neue`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.shadowColor = levelColor(previewChain[previewChain.length-1].lv);
        ctx.shadowBlur = cell*0.15;
        ctx.fillText(label, hx, lblY);
        ctx.restore();
      }
    }

    function draw(){
      nowT = performance.now()*0.003;
      const t = nowT;
      const w=cv.width/dpr, h=cv.height/dpr;
      ctx.clearRect(0,0,w,h);

      // ===== 連鎖プレビュー（ライン・矢印は盤面より先に描画） =====
      if(!busy) drawPreview();

      // ===== 盤面ノード =====
      for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++){
        const node=grid[c][r]; if(!node||!node.alive) continue;
        const [x,y]=cellCenter(c,r);
        const col=levelColor(node.lv);
        const pulse=1+0.04*Math.sin(t+ (c+r));
        const rad=cell*0.36*pulse;

        // ホバー中の起点ノードを特別強調
        const isHover = (c===hoverC && r===hoverR && !busy);

        // 外周ハロー
        ctx.save();
        const halo=ctx.createRadialGradient(x,y,rad*0.6,x,y,rad*1.9);
        halo.addColorStop(0,col); halo.addColorStop(1,'rgba(0,0,0,0)');
        ctx.globalAlpha = isHover ? 0.38 : (0.18+0.03*node.lv);
        ctx.fillStyle=halo;
        ctx.beginPath(); ctx.arc(x,y,rad*1.9,0,Math.PI*2); ctx.fill();
        ctx.restore();

        // コア球体
        ctx.save();
        ctx.shadowColor=col;
        ctx.shadowBlur = isHover ? cell*0.6 : cell*0.34;
        const g=ctx.createRadialGradient(x-rad*0.35,y-rad*0.35,rad*0.1,x,y,rad);
        g.addColorStop(0,COL.core); g.addColorStop(0.45,col); g.addColorStop(1,'rgba(0,0,0,0.3)');
        ctx.fillStyle=g;
        ctx.beginPath(); ctx.arc(x,y,rad*(isHover?1.1:1),0,Math.PI*2); ctx.fill();
        ctx.restore();

        // リング
        ctx.save();
        ctx.strokeStyle=col;
        ctx.globalAlpha = isHover ? 0.85 : 0.5;
        ctx.lineWidth = isHover ? cell*0.05 : Math.max(1,cell*0.02);
        ctx.beginPath(); ctx.arc(x,y,rad*1.18,0,Math.PI*2); ctx.stroke();
        ctx.restore();

        // 元素レベル値
        ctx.fillStyle=COL.deep;
        ctx.font='bold '+(cell*0.34)+'px Helvetica Neue';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(node.lv, x, y+1);
      }

      // ===== パーティクル =====
      for(let i=particles.length-1;i>=0;i--){
        const p=particles[i];
        p.x+=p.vx; p.y+=p.vy; p.vy+=cell*(p.mush?0.004:0.008); p.life-=0.03;
        if(p.life<=0){ particles.splice(i,1); continue; }
        ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
        ctx.fillStyle=levelColor(p.lv); ctx.shadowColor=levelColor(p.lv); ctx.shadowBlur=cell*0.2;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r0*p.life,0,Math.PI*2); ctx.fill(); ctx.restore();
      }

      requestAnimationFrame(draw);
    }

    // ====== チェインカウンター UI ======
    function showChainCounter(n){
      chainCounter.textContent = 'CHAIN ×'+n;
      chainCounter.classList.add('show');
    }
    function clearChainCounter(){
      chainCounter.classList.remove('show');
    }

    // ====== HUD / Modal ======
    const hud=document.getElementById('hud'), modal=document.getElementById('modal');
    function renderHud(){
      const lbl = STAGE_LABELS[stageIdx] || STAGE_LABELS[0];
      hud.innerHTML =
        '<div class="title">元素連鎖反応</div>'+
        '<div class="badge"><span class="dot"></span>STAGE '+STAGES[stageIdx].name+'</div>'+
        '<div class="goal"><span class="tag">'+lbl.tag+'</span>'+lbl.goal+'</div>';
    }
    function showModal(t,s,cb){
      modal.innerHTML='<div class="card"><h1>'+t+'</h1><p>'+s+'</p></div>';
      modal.style.display='flex';
      const h=()=>{ modal.removeEventListener('pointerdown',h); cb(); };
      modal.addEventListener('pointerdown',h);
    }
    function hideModal(){ modal.style.display='none'; modal.innerHTML=''; renderHud(); }

    // ====== 起動 ======
    function start(){ loadColors(); resize(); buildStage(0); renderHud(); draw();
      showModal('元素連鎖反応', 'TAP TO START', ()=>{ hideModal(); }); }
    window.addEventListener('resize', resize);
    setInterval(()=>{ if(modal.style.display!=='flex') renderHud(); }, 400);
    start();
  </script>
</body>
</html>
