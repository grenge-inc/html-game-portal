<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>重力ルートクラッシュ</title>
<style>
  :root {
    --phone-aspect: 9 / 19.5;
    --bg-deep: #02030a;
    --bg-mid: #0a1430;
    --bg-panel: #06081a;
    --bg-card: #0b1228;
    --line: #1a2848;
    --cyan: #6ff;
    --cyan-soft: #8df;
    --cyan-grad-1: #3df;
    --cyan-grad-2: #06a;
    --hp-pink: #ff8aa0;
    --warn: #ffb86c;
    --text-main: #eaf3ff;
    --text-sub: #cdddef;
    --text-dim: #7a92b5;
    --nova-9: #ffd76b;
    --nova-7: #ffb24a;
    --nova-5: #ff7a3a;
    --nova-3: #ff5d8a;
    --nova-1: #b585ff;
    --nova-0: #ffffff;
    --enemy: #ff5d8a;
    --enemy-core: #ffd1de;
    --player: #6ff;
    --player-core: #eaffff;
    --boss: #ff3d6e;
    /* game-specific */
    --wall-color: #3a4a6a;
    --spike-color: #ff3d3d;
    --spike-core: #ff9090;
    --goal-color: #00ffaa;
    --goal-glow: #00ffa855;
    --glass-color: #a0e8ff;
    --rock-color: #c8aa78;
    --metal-color: #b0c0d8;
    --gravity-btn: #1a2848;
    --gravity-active: #2a4080;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html, body {
    width:100%; height:100%;
    overflow:hidden;
    background:#000;
    color:#fff;
    font-family:'Helvetica Neue', system-ui, sans-serif;
    user-select:none;
    -webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
  }
  body {
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #phone {
    position:relative;
    overflow:hidden;
    width:  min(100vw, calc(100vh * 9 / 19.5));
    height: min(100vh, calc(100vw * 19.5 / 9));
    --pw:   min(100vw, calc(100vh * 9 / 19.5));
    --ph:   min(100vh, calc(100vw * 19.5 / 9));
    --u:    calc(var(--pw) / 100);
    --uh:   calc(var(--ph) / 100);
    background: radial-gradient(ellipse at 50% 20%, #101d40 0%, #060e22 50%, var(--bg-deep) 100%);
  }
  /* Stars background layer */
  #bg-stars {
    position:absolute; inset:0; pointer-events:none; z-index:0;
  }
  /* HUD */
  #hud {
    position:absolute;
    top: calc(2 * var(--uh));
    left: calc(2 * var(--u));
    right: calc(2 * var(--u));
    display:flex;
    align-items:center;
    justify-content:space-between;
    z-index:10;
    background: linear-gradient(135deg, rgba(10,20,50,0.85), rgba(6,8,26,0.85));
    border: 1px solid var(--line);
    border-radius: calc(3 * var(--u));
    padding: calc(1.2 * var(--uh)) calc(3 * var(--u));
    backdrop-filter: blur(4px);
  }
  #stage-label {
    font-size: calc(3.5 * var(--u));
    font-weight:700;
    color: var(--text-main);
    letter-spacing:0.08em;
    text-shadow: 0 0 calc(3*var(--u)) var(--cyan-soft);
    background: linear-gradient(90deg, var(--cyan), var(--cyan-soft));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #obj-count {
    font-size: calc(3 * var(--u));
    color: var(--nova-9);
    font-weight:700;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 calc(2*var(--u)) var(--nova-7);
  }
  /* Canvas */
  #game-canvas {
    position:absolute;
    top: calc(13 * var(--uh));
    left: calc(2 * var(--u));
    width: calc(96 * var(--u));
    height: calc(65 * var(--uh));
    z-index:1;
    border-radius: calc(1.5 * var(--u));
  }
  /* Gravity controls */
  #gravity-controls {
    position:absolute;
    bottom: calc(3 * var(--uh));
    left: 50%;
    transform:translateX(-50%);
    display:grid;
    grid-template-columns: repeat(3, calc(14 * var(--u)));
    grid-template-rows: repeat(3, calc(14 * var(--u)));
    gap: calc(1.5 * var(--u));
    z-index:5;
    background: rgba(6,8,26,0.6);
    border: 1px solid var(--line);
    border-radius: calc(3 * var(--u));
    padding: calc(2 * var(--u));
  }
  .grav-btn {
    background: linear-gradient(145deg, #1e2e50, var(--gravity-btn));
    border: calc(0.4 * var(--u)) solid rgba(100,180,255,0.25);
    border-radius: calc(2.5 * var(--u));
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: calc(6 * var(--u));
    cursor:pointer;
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    -webkit-tap-highlight-color:transparent;
    box-shadow: 0 0 calc(1*var(--u)) rgba(0,150,255,0.2), inset 0 1px 0 rgba(255,255,255,0.08);
    color: var(--cyan-soft);
    text-shadow: 0 0 calc(2*var(--u)) var(--cyan);
  }
  .grav-btn:active, .grav-btn.pressed {
    background: linear-gradient(145deg, var(--gravity-active), #1a3060);
    transform: scale(0.91);
    box-shadow: 0 0 calc(3*var(--u)) rgba(60,220,255,0.5), inset 0 1px 0 rgba(255,255,255,0.12);
    border-color: var(--cyan-soft);
  }
  .grav-btn.empty { visibility:hidden; pointer-events:none; }
  /* Modal */
  .modal {
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background: radial-gradient(ellipse at 50% 40%, rgba(10,20,50,0.95) 0%, rgba(2,3,10,0.97) 70%);
    z-index:20;
    pointer-events:all;
  }
  .modal.hidden { display:none; }
  .modal-inner {
    background: linear-gradient(160deg, rgba(15,25,55,0.9), rgba(6,8,26,0.95));
    border: 1px solid var(--line);
    border-radius: calc(5 * var(--u));
    padding: calc(5 * var(--uh)) calc(8 * var(--u));
    display:flex;
    flex-direction:column;
    align-items:center;
    width: calc(80 * var(--u));
    box-shadow: 0 0 calc(6*var(--u)) rgba(0,100,200,0.25);
  }
  .modal-title {
    font-size: calc(9 * var(--u));
    font-weight:900;
    letter-spacing:0.1em;
    margin-bottom: calc(3 * var(--uh));
    text-shadow: 0 0 calc(4*var(--u)) currentColor;
  }
  .modal-sub {
    font-size: calc(3.2 * var(--u));
    color: var(--text-sub);
    margin-bottom: calc(5 * var(--uh));
    text-align:center;
    line-height:1.7;
    padding: 0 calc(2 * var(--u));
  }
  .modal-btn {
    background: linear-gradient(135deg, var(--cyan-grad-1), var(--cyan-grad-2));
    border:none;
    border-radius: calc(10 * var(--u));
    padding: calc(2.5 * var(--uh)) calc(12 * var(--u));
    font-size: calc(4 * var(--u));
    font-weight:700;
    color: var(--bg-deep);
    cursor:pointer;
    letter-spacing:0.06em;
    box-shadow: 0 0 calc(3*var(--u)) rgba(60,220,255,0.4);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .modal-btn:active { transform: scale(0.95); box-shadow: 0 0 calc(5*var(--u)) rgba(60,220,255,0.7); }
  /* Stage badge */
  #stage-badge {
    position:absolute;
    top: calc(10.5 * var(--uh));
    left: 50%;
    transform:translateX(-50%);
    font-size: calc(2.5 * var(--u));
    color: var(--nova-1);
    background: rgba(20,10,50,0.8);
    border: 1px solid rgba(181,133,255,0.3);
    border-radius: calc(5 * var(--u));
    padding: calc(0.6 * var(--uh)) calc(3 * var(--u));
    white-space:nowrap;
    letter-spacing:0.05em;
    text-shadow: 0 0 calc(2*var(--u)) var(--nova-1);
  }

</style>
</head>
<body>
<div id="phone">
  <!-- Stars background -->
  <canvas id="bg-stars"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div id="stage-label">STAGE 1</div>
    <div id="obj-count">■ × 1</div>
  </div>
  <div id="stage-badge">操作理解＋コア体験</div>

  <!-- Game Canvas -->
  <canvas id="game-canvas"></canvas>

  <!-- Gravity Controls: cross layout -->
  <div id="gravity-controls">
    <div class="grav-btn empty"></div>
    <div class="grav-btn" id="btn-up"   data-dir="up">▲</div>
    <div class="grav-btn empty"></div>
    <div class="grav-btn" id="btn-left" data-dir="left">◀</div>
    <div class="grav-btn empty"></div>
    <div class="grav-btn" id="btn-right" data-dir="right">▶</div>
    <div class="grav-btn empty"></div>
    <div class="grav-btn" id="btn-down"  data-dir="down">▼</div>
    <div class="grav-btn empty"></div>
  </div>

  <!-- Modals -->
  <div class="modal" id="modal-ready">
    <div class="modal-inner">
      <div class="modal-title" style="color:var(--cyan)">READY</div>
      <div class="modal-sub">重力を操作して<br>オブジェクトをゴールへ導け！<br><span style="color:var(--warn);font-size:0.85em">▲▼◀▶ で重力方向を選択</span></div>
      <button class="modal-btn" id="btn-start">START</button>
    </div>
  </div>

  <div class="modal hidden" id="modal-clear">
    <div class="modal-inner">
      <div class="modal-title" style="color:var(--nova-9)">CLEAR!</div>
      <div class="modal-sub" id="clear-sub"></div>
      <button class="modal-btn" id="btn-next">NEXT STAGE</button>
    </div>
  </div>

  <div class="modal hidden" id="modal-gameover">
    <div class="modal-inner">
      <div class="modal-title" style="color:var(--enemy)">MISS</div>
      <div class="modal-sub">トゲに当たった！<br>もう一度挑戦しよう</div>
      <button class="modal-btn" id="btn-retry">RETRY</button>
    </div>
  </div>

  <div class="modal hidden" id="modal-complete">
    <div class="modal-inner">
      <div class="modal-title" style="color:var(--nova-1)">ALL CLEAR!</div>
      <div class="modal-sub">全ステージクリア！<br>重力マスターの称号を獲得！</div>
      <button class="modal-btn" id="btn-again">もう一度</button>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';

  // ── Constants ──────────────────────────────────────────────
  const COLS = 7, ROWS = 11;
  const MATERIALS = { GLASS: 'glass', ROCK: 'rock', METAL: 'metal' };

  // ── Stage Data ─────────────────────────────────────────────
  const STAGES = [
    {
      // St1: ガラス1個、壁なし、トゲなし
      // 想定手順: 右→下 (2手)
      name: 'STAGE 1',
      badge: '操作理解＋コア体験',
      objects: [{ col:1, row:1, mat: MATERIALS.GLASS }],
      walls:   [],
      spikes:  [],
      goals:   [{ col:6, row:8 }],
    },
    {
      // St2: ガラス1個、壁3個、トゲ1個
      // 想定手順: 右→下→左→下→右 (5手)
      // 罠: トゲ(col=1,row=8)
      name: 'STAGE 2',
      badge: '思考＋応用',
      objects: [{ col:1, row:1, mat: MATERIALS.GLASS }],
      walls:   [{ col:3, row:2 }, { col:6, row:4 }, { col:3, row:7 }],
      spikes:  [{ col:1, row:8 }],
      goals:   [{ col:6, row:10 }],
    },
    {
      // St3: ガラス1個、壁3個、トゲ1個
      // 想定手順: 右→下→左→下→右 (5手)
      // 壁(6,7)がゴール手前をブロック、左迂回必須
      // トゲ(0,9)は左→下の誤りルートを罰する罠
      name: 'STAGE 3',
      badge: 'ルート構築',
      objects: [{ col:1, row:1, mat: MATERIALS.GLASS }],
      walls:   [{ col:1, row:6 }, { col:4, row:3 }, { col:6, row:7 }],
      spikes:  [{ col:0, row:9 }],
      goals:   [{ col:6, row:10 }],
    },
    {
      // St4: ガラス2個、壁4個、スパイクなし
      // 想定手順: 右→左→下→右→下→右 (6手) 2オブジェクト誘導
      name: 'STAGE 4',
      badge: '複数誘導＋最適化',
      objects: [
        { col:1, row:1, mat: MATERIALS.GLASS },
        { col:5, row:9, mat: MATERIALS.GLASS },
      ],
      walls:   [
        { col:3, row:4 }, { col:3, row:6 },
        { col:0, row:7 }, { col:6, row:3 },
      ],
      spikes:  [],
      goals:   [{ col:6, row:10 }],
    },
    {
      // St5(最終): 色マッチング誘導。ボール3色(r/b/y)を同色ゴールへ。
      // 色不一致ゴールは素通り(罠/中継)。色一致ゴールでのみ停止＆クリア判定。
      // 唯一解(7手): 左→下→右→下→左→下→右
      //   r(2,0): →(0,0)→(0,0)→(6,0)→(6,4)→(0,4)→(0,5)→(4,5)[Rゴール]
      //   b(6,0): →(1,0)→(1,7)→(5,7)→(5,9)[Bゴール]
      //   y(4,1): →(0,1)→(0,5)→(4,5通過)→(4,10)→(2,10)[Yゴール]
      // spike(6,8)は誤操作の罰として機能。手詰まり無し・唯一解で混乱なし。
      name: 'STAGE 5',
      badge: '色マッチング誘導',
      objects: [
        { col:2, row:0, mat: MATERIALS.GLASS, color:'r' },
        { col:6, row:0, mat: MATERIALS.GLASS, color:'b' },
        { col:4, row:1, mat: MATERIALS.GLASS, color:'y' },
      ],
      walls:   [
        { col:0, row:6 }, { col:6, row:6 }, { col:6, row:5 },
        { col:2, row:3 }, { col:6, row:7 }, { col:5, row:5 },
        { col:2, row:9 }, { col:1, row:8 },
      ],
      spikes:  [{ col:6, row:8 }],
      goals:   [
        { col:4, row:5,  color:'r' },
        { col:5, row:9,  color:'b' },
        { col:2, row:10, color:'y' },
      ],
    },
  ];

  // ── Color palette for St5 (色マッチング) ───────────────────
  // ボール/ゴール共通のキー→実色マッピング。彩度・明度を十分差別化した3色。
  const BALL_COLORS = {
    r: { main:'#ff5a6e', light:'#ffd0d8', dark:'#a01828', glow:'#ff5a6e' }, // 赤
    b: { main:'#3aa0ff', light:'#cfe8ff', dark:'#1050a0', glow:'#3aa0ff' }, // 青
    y: { main:'#ffd23a', light:'#fff3c0', dark:'#a07810', glow:'#ffd23a' }, // 黄
  };

  // ── State ──────────────────────────────────────────────────
  let stageIdx = 0;
  let objects  = [];   // { col, row, mat, dead, goalReached, px, py, tx, ty }
  let particles = [];
  let animating = false;
  let shakeTime = 0;
  let gameActive = false;
  let animRafId = null;  // animation RAF id

  // ── DOM refs ───────────────────────────────────────────────
  const phone   = document.getElementById('phone');
  const canvas  = document.getElementById('game-canvas');
  const ctx     = canvas.getContext('2d');
  const stageLabel = document.getElementById('stage-label');
  const objCount   = document.getElementById('obj-count');
  const stageBadge = document.getElementById('stage-badge');

  const modalReady    = document.getElementById('modal-ready');
  const modalClear    = document.getElementById('modal-clear');
  const modalGameover = document.getElementById('modal-gameover');
  const modalComplete = document.getElementById('modal-complete');

  // ── Sizing ─────────────────────────────────────────────────
  let CW, CH, cellW, cellH;

  function resize() {
    const rect = canvas.getBoundingClientRect();
    CW = rect.width;   CH = rect.height;
    canvas.width  = CW; canvas.height = CH;
    cellW = CW / COLS;  cellH = CH / ROWS;
    // Sync pixel positions after resize
    objects.forEach(obj => {
      if (!obj.dead && !obj.goalReached) {
        obj.px = obj.col * cellW + cellW / 2;
        obj.py = obj.row * cellH + cellH / 2;
        obj.tx = obj.px;
        obj.ty = obj.py;
      }
    });
  }

  // ── Stage init ────────────────────────────────────────────
  function loadStage(idx) {
    const s = STAGES[idx];
    objects = s.objects.map(o => {
      const px = o.col * cellW + cellW / 2;
      const py = o.row * cellH + cellH / 2;
      return { ...o, dead:false, goalReached:false, px, py, tx:px, ty:py };
    });
    stageLabel.textContent = s.name;
    stageBadge.textContent  = s.badge;
    updateObjCount();
    particles = [];
    shakeTime = 0;
    animating = false;
    if (animRafId) { cancelAnimationFrame(animRafId); animRafId = null; }
    gameActive = true;
    draw();
  }

  function updateObjCount() {
    const alive = objects.filter(o => !o.dead && !o.goalReached).length;
    objCount.textContent = '■ × ' + alive;
  }

  // ── Gravity logic ─────────────────────────────────────────
  function applyGravity(dir) {
    if (animating || !gameActive) return;

    const s = STAGES[stageIdx];

    // Compute destination cells for each object
    objects.forEach(obj => {
      if (obj.dead || obj.goalReached) return;
      computeDestination(obj, dir, s);
    });

    // Start animation
    startSlideAnimation();
  }

  function cellOccupied(col, row, excludeObj) {
    const s = STAGES[stageIdx];
    // wall?
    if (s.walls.some(w => w.col === col && w.row === row)) return true;
    // other objects (use logical col/row which is already set to destination)
    if (objects.some(o => o !== excludeObj && !o.dead && !o.goalReached && o.col === col && o.row === row)) return true;
    return false;
  }

  function computeDestination(obj, dir, s) {
    // Save original position
    const origCol = obj.col;
    const origRow = obj.row;

    let dc = 0, dr = 0;
    if (dir === 'left')  dc = -1;
    if (dir === 'right') dc =  1;
    if (dir === 'up')    dr = -1;
    if (dir === 'down')  dr =  1;

    // Temporarily reset to original so cellOccupied works correctly
    obj.col = origCol;
    obj.row = origRow;

    let hitSpike = false;
    let hitGoal  = false;

    while (true) {
      const nc = obj.col + dc;
      const nr = obj.row + dr;
      if (nc < 0 || nc >= COLS || nr < 0 || nr >= ROWS) break;
      if (cellOccupied(nc, nr, obj)) break;
      obj.col = nc;
      obj.row = nr;

      // Check spike
      if (s.spikes.some(sp => sp.col === obj.col && sp.row === obj.row)) {
        hitSpike = true;
        break;
      }
      // Check goal
      // 色対応: ゴールに color がある場合はボールと色一致時のみ停止/ゴール判定。
      // 色不一致ゴールは素通り(continue)。color が無い既存ゴールは従来通り無条件停止(後方互換)。
      const g = s.goals.find(g => g.col === obj.col && g.row === obj.row);
      if (g && (g.color == null || g.color === obj.color)) {
        hitGoal = true;
        break;
      }
    }

    // Set animation target pixel positions
    obj.tx = obj.col * cellW + cellW / 2;
    obj.ty = obj.row * cellH + cellH / 2;
    obj._hitSpike = hitSpike;
    obj._hitGoal  = hitGoal;
    obj._moved = (obj.col !== origCol || obj.row !== origRow);
  }

  // ── Slide Animation ───────────────────────────────────────
  const ANIM_BASE_DURATION = 180;   // ms for 1 cell
  const ANIM_MAX_DURATION  = 700;   // ms cap

  function startSlideAnimation() {
    animating = true;

    // Calculate per-object animation duration based on distance
    objects.forEach(obj => {
      if (obj.dead || obj.goalReached) return;
      const dx = obj.tx - obj.px;
      const dy = obj.ty - obj.py;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const cells = dist / Math.max(cellW, cellH);
      // Longer distance = a bit longer, but capped
      const dur = Math.min(ANIM_BASE_DURATION + cells * 60, ANIM_MAX_DURATION);
      obj._animStart = performance.now();
      obj._animDur   = dur;
      obj._startPx   = obj.px;
      obj._startPy   = obj.py;
    });

    function tick(now) {
      let allDone = true;

      objects.forEach(obj => {
        if (obj.dead || obj.goalReached) return;
        if (!obj._moved) return; // didn't move

        const elapsed = now - obj._animStart;
        const t = Math.min(elapsed / obj._animDur, 1);
        // Ice-slide easing: ease-in-out with slight overshoot feel
        // Use smooth step + gentle deceleration (ease-out quart)
        const eased = easeOutQuart(t);

        obj.px = obj._startPx + (obj.tx - obj._startPx) * eased;
        obj.py = obj._startPy + (obj.ty - obj._startPy) * eased;

        if (t < 1) allDone = false;
      });

      // Redraw
      drawWithParticles(now);

      if (!allDone) {
        animRafId = requestAnimationFrame(tick);
      } else {
        // Snap to exact target
        objects.forEach(obj => {
          if (!obj.dead && !obj.goalReached) {
            obj.px = obj.tx;
            obj.py = obj.ty;
          }
        });

        // Resolve spike/goal hits
        objects.forEach(obj => {
          if (obj.dead || obj.goalReached) return;
          if (obj._hitSpike) {
            obj.dead = true;
            spawnParticles(obj.col, obj.row, 'spike');
          } else if (obj._hitGoal) {
            obj.goalReached = true;
            // 色対応: color があればその色のパーティクル、無ければ素材色(従来)
            spawnParticles(obj.col, obj.row, obj.color ? ('color:' + obj.color) : obj.mat);
            shakeTime = 12;
          }
        });

        animating = false;
        updateObjCount();
        requestDrawLoop();
      }
    }

    animRafId = requestAnimationFrame(tick);
  }

  // Easing functions
  function easeOutQuart(t) {
    return 1 - Math.pow(1 - t, 4);
  }

  // ── Particles ─────────────────────────────────────────────
  function spawnParticles(col, row, type) {
    const x = (col + 0.5) * cellW;
    const y = (row + 0.5) * cellH;
    const count = type === 'spike' ? 8 : 20;
    let color1, color2;
    if (typeof type === 'string' && type.startsWith('color:')) {
      const key = type.slice(6);
      const c = BALL_COLORS[key];
      if (c) { color1 = c.light; color2 = c.main; }
      else { color1 = '#a0e8ff'; color2 = '#ffffff'; }
    }
    else if (type === MATERIALS.GLASS) { color1 = '#a0e8ff'; color2 = '#ffffff'; }
    else if (type === MATERIALS.ROCK)  { color1 = '#c8aa78'; color2 = '#8a6040'; }
    else if (type === MATERIALS.METAL) { color1 = '#b0c0d8'; color2 = '#607090'; }
    else { color1 = '#ff3d3d'; color2 = '#ff8080'; }

    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
      const speed = 1.5 + Math.random() * 3;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.04 + Math.random() * 0.03,
        size: 2 + Math.random() * 4,
        color: Math.random() < 0.5 ? color1 : color2,
      });
    }
  }

  // ── Draw loop (particles + shake after animation) ─────────
  let rafId = null;
  function requestDrawLoop() {
    if (!rafId) rafId = requestAnimationFrame(drawLoop);
  }

  function drawLoop(now) {
    rafId = null;

    // update particles
    particles = particles.filter(p => {
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.9; p.vy *= 0.9;
      p.life -= p.decay;
      return p.life > 0;
    });
    const hasParticles = particles.length > 0;
    if (hasParticles) requestDrawLoop();

    // screen shake
    let sx = 0, sy = 0;
    if (shakeTime > 0) {
      sx = (Math.random()-0.5)*shakeTime*0.8;
      sy = (Math.random()-0.5)*shakeTime*0.8;
      shakeTime--;
      if (shakeTime > 0) requestDrawLoop();
    }

    drawScene(sx, sy);
    drawParticlesOverlay(sx, sy);

    // check win/lose after animations settle
    if (!hasParticles && shakeTime <= 0) {
      checkWinLose();
    }
  }

  // Called during slide animation tick
  function drawWithParticles(now) {
    // update particles
    particles = particles.filter(p => {
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.9; p.vy *= 0.9;
      p.life -= p.decay;
      return p.life > 0;
    });

    let sx = 0, sy = 0;
    if (shakeTime > 0) {
      sx = (Math.random()-0.5)*shakeTime*0.8;
      sy = (Math.random()-0.5)*shakeTime*0.8;
      shakeTime--;
    }

    drawScene(sx, sy);
    drawParticlesOverlay(sx, sy);
  }

  function drawScene(sx, sy) {
    if (!CW || !CH) resize();
    ctx.clearRect(0, 0, CW, CH);

    const s = STAGES[stageIdx];

    ctx.save();
    ctx.translate(sx, sy);

    // Grid background
    ctx.fillStyle = '#050d20';
    ctx.fillRect(0, 0, CW, CH);

    // Grid lines
    ctx.strokeStyle = '#1a2848';
    ctx.lineWidth = 0.5;
    for (let c = 0; c <= COLS; c++) {
      ctx.beginPath();
      ctx.moveTo(c * cellW, 0);
      ctx.lineTo(c * cellW, CH);
      ctx.stroke();
    }
    for (let r = 0; r <= ROWS; r++) {
      ctx.beginPath();
      ctx.moveTo(0, r * cellH);
      ctx.lineTo(CW, r * cellH);
      ctx.stroke();
    }

    // Goals
    s.goals.forEach(g => drawGoal(g.col, g.row, g.color));

    // Walls
    s.walls.forEach(w => drawWall(w.col, w.row));

    // Spikes
    s.spikes.forEach(sp => drawSpike(sp.col, sp.row));

    // Objects (use px/py for smooth animation)
    objects.forEach(obj => {
      if (!obj.dead && !obj.goalReached) drawObject(obj);
    });

    ctx.restore();
  }

  function drawParticlesOverlay(sx, sy) {
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.shadowBlur = p.size * 2;
      ctx.shadowColor = p.color;
      ctx.beginPath();
      ctx.arc(p.x + sx, p.y + sy, p.size, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    });
  }

  // Legacy draw() for one-shot draws
  function draw() {
    drawScene(0, 0);
  }

  function drawGoal(col, row, color) {
    const x = col * cellW + 2, y = row * cellH + 2;
    const w = cellW - 4, h = cellH - 4;
    ctx.save();
    // 色対応: color があれば対応色、無ければ従来の緑(#00ffaa)
    let stroke, glow, fill0, fill1, sym;
    if (color && BALL_COLORS[color]) {
      const c = BALL_COLORS[color];
      stroke = c.main; glow = c.glow; fill0 = c.dark; fill1 = c.main; sym = c.light;
    } else {
      stroke = '#00ffaa'; glow = '#00ffa8'; fill0 = '#003322'; fill1 = '#006644'; sym = '#00ffaa';
    }
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 2;
    ctx.shadowBlur = 12;
    ctx.shadowColor = glow;
    const grd = ctx.createLinearGradient(x, y, x+w, y+h);
    grd.addColorStop(0, fill0);
    grd.addColorStop(1, fill1);
    ctx.fillStyle = color ? withAlpha(fill1, 0.35) : grd;
    ctx.fillRect(x, y, w, h);
    ctx.strokeRect(x, y, w, h);
    // Target symbol
    ctx.fillStyle = sym;
    ctx.font = `bold ${cellH*0.6}px Helvetica Neue`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('◎', col*cellW + cellW/2, row*cellH + cellH/2);
    ctx.restore();
  }

  // hex(#rrggbb)にアルファを付与してrgba文字列化
  function withAlpha(hex, a) {
    const h = hex.replace('#','');
    const r = parseInt(h.substring(0,2),16);
    const g = parseInt(h.substring(2,4),16);
    const b = parseInt(h.substring(4,6),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  function drawWall(col, row) {
    const x = col * cellW, y = row * cellH;
    ctx.save();
    ctx.fillStyle = '#3a4a6a';
    ctx.fillRect(x+1, y+1, cellW-2, cellH-2);
    ctx.strokeStyle = '#5a6a8a';
    ctx.lineWidth = 1;
    ctx.strokeRect(x+1, y+1, cellW-2, cellH-2);
    // Inner texture lines
    ctx.strokeStyle = '#2a3a5a';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(x+4, y+4); ctx.lineTo(x+cellW-4, y+cellH-4);
    ctx.moveTo(x+cellW-4, y+4); ctx.lineTo(x+4, y+cellH-4);
    ctx.stroke();
    ctx.restore();
  }

  function drawSpike(col, row) {
    const cx = col * cellW + cellW/2;
    const cy = row * cellH + cellH/2;
    const r  = Math.min(cellW, cellH) * 0.42;
    ctx.save();
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#ff3d3d';
    ctx.fillStyle = '#ff3d3d';
    // Draw star/spike shape
    ctx.beginPath();
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2 - Math.PI/2;
      const rr = i % 2 === 0 ? r : r * 0.45;
      const px = cx + Math.cos(angle) * rr;
      const py = cy + Math.sin(angle) * rr;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#ff9090';
    ctx.font = `${cellH*0.35}px Helvetica Neue`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('✕', cx, cy);
    ctx.restore();
  }

  function drawObject(obj) {
    // Use animated pixel position (px, py)
    const cx = obj.px;
    const cy = obj.py;
    const r  = Math.min(cellW, cellH) * 0.38;
    ctx.save();

    // 色対応(St5): color があれば素材質感(球体ガラス)を保ちつつ着色して描画。
    // color が無い既存ステージは従来の素材別描画(後方互換)。
    if (obj.color && BALL_COLORS[obj.color]) {
      const c = BALL_COLORS[obj.color];
      ctx.shadowBlur = 16;
      ctx.shadowColor = c.glow;
      const grd = ctx.createRadialGradient(cx-r*0.3, cy-r*0.3, r*0.1, cx, cy, r);
      grd.addColorStop(0, c.light);
      grd.addColorStop(0.5, c.main);
      grd.addColorStop(1, c.dark);
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = c.light;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // ハイライト(ガラス感)
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.beginPath();
      ctx.arc(cx-r*0.32, cy-r*0.32, r*0.22, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
      return;
    }

    if (obj.mat === MATERIALS.GLASS) {
      ctx.shadowBlur = 15;
      ctx.shadowColor = '#a0e8ff';
      const grd = ctx.createRadialGradient(cx-r*0.3, cy-r*0.3, r*0.1, cx, cy, r);
      grd.addColorStop(0, '#e0f8ff');
      grd.addColorStop(0.5, '#60c8f0');
      grd.addColorStop(1, '#2080b0');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = '#a0e8ff';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    } else if (obj.mat === MATERIALS.ROCK) {
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#c8aa78';
      const grd = ctx.createRadialGradient(cx-r*0.2, cy-r*0.2, r*0.1, cx, cy, r);
      grd.addColorStop(0, '#e0c888');
      grd.addColorStop(1, '#806040');
      ctx.fillStyle = grd;
      ctx.beginPath();
      const pts = 6;
      for (let i = 0; i < pts; i++) {
        const a = (i/pts)*Math.PI*2 - Math.PI/2;
        const rr = r * (0.82 + Math.sin(i*2.3)*0.18);
        i === 0 ? ctx.moveTo(cx+Math.cos(a)*rr, cy+Math.sin(a)*rr)
                : ctx.lineTo(cx+Math.cos(a)*rr, cy+Math.sin(a)*rr);
      }
      ctx.closePath();
      ctx.fill();
    } else if (obj.mat === MATERIALS.METAL) {
      ctx.shadowBlur = 10;
      ctx.shadowColor = '#b0c0d8';
      const grd = ctx.createLinearGradient(cx-r, cy-r, cx+r, cy+r);
      grd.addColorStop(0, '#d8e8f8');
      grd.addColorStop(0.5, '#708090');
      grd.addColorStop(1, '#405060');
      ctx.fillStyle = grd;
      ctx.beginPath();
      roundRect(ctx, cx-r, cy-r, r*2, r*2, r*0.3);
      ctx.fill();
      ctx.strokeStyle = '#a0b0c8';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
    ctx.restore();
  }

  function roundRect(ctx, x, y, w, h, radius) {
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + w - radius, y);
    ctx.arcTo(x+w, y, x+w, y+radius, radius);
    ctx.lineTo(x+w, y+h-radius);
    ctx.arcTo(x+w, y+h, x+w-radius, y+h, radius);
    ctx.lineTo(x+radius, y+h);
    ctx.arcTo(x, y+h, x, y+h-radius, radius);
    ctx.lineTo(x, y+radius);
    ctx.arcTo(x, y, x+radius, y, radius);
    ctx.closePath();
  }

  // ── Win/Lose check ────────────────────────────────────────
  function checkWinLose() {
    const alive = objects.filter(o => !o.dead && !o.goalReached);
    const dead  = objects.filter(o => o.dead);
    const goals = objects.filter(o => o.goalReached);

    if (dead.length > 0) {
      gameActive = false;
      setTimeout(() => showModal(modalGameover), 600);
      return;
    }
    if (alive.length === 0 && goals.length === objects.length) {
      gameActive = false;
      setTimeout(() => {
        if (stageIdx + 1 < STAGES.length) {
          const sub = document.getElementById('clear-sub');
          sub.textContent = STAGES[stageIdx].name + ' クリア！';
          showModal(modalClear);
        } else {
          showModal(modalComplete);
        }
      }, 800);
    }
  }

  // ── Modal helpers ─────────────────────────────────────────
  function showModal(el) {
    [modalReady, modalClear, modalGameover, modalComplete].forEach(m => m.classList.add('hidden'));
    el.classList.remove('hidden');
  }

  // ── Button events ─────────────────────────────────────────
  document.getElementById('btn-start').addEventListener('pointerup', () => {
    modalReady.classList.add('hidden');
    loadStage(stageIdx);
  });

  document.getElementById('btn-next').addEventListener('pointerup', () => {
    stageIdx++;
    modalClear.classList.add('hidden');
    loadStage(stageIdx);
  });

  document.getElementById('btn-retry').addEventListener('pointerup', () => {
    modalGameover.classList.add('hidden');
    loadStage(stageIdx);
  });

  document.getElementById('btn-again').addEventListener('pointerup', () => {
    stageIdx = 0;
    modalComplete.classList.add('hidden');
    showModal(modalReady);
  });

  // Gravity buttons
  document.querySelectorAll('.grav-btn[data-dir]').forEach(btn => {
    btn.addEventListener('pointerdown', () => btn.classList.add('pressed'));
    btn.addEventListener('pointerup', (e) => {
      btn.classList.remove('pressed');
      applyGravity(btn.dataset.dir);
    });
    btn.addEventListener('pointerleave', () => btn.classList.remove('pressed'));
  });

  // ── Stars background ──────────────────────────────────────
  function initStars() {
    const sc = document.getElementById('bg-stars');
    const pr = document.getElementById('phone');
    sc.style.position = 'absolute';
    sc.style.inset = '0';
    sc.style.width = '100%';
    sc.style.height = '100%';
    sc.style.zIndex = '0';
    sc.style.pointerEvents = 'none';
    sc.width  = pr.offsetWidth  || 390;
    sc.height = pr.offsetHeight || 844;
    const sctx = sc.getContext('2d');
    const W = sc.width, H = sc.height;
    sctx.clearRect(0,0,W,H);
    for (let i = 0; i < 80; i++) {
      const x = Math.random() * W;
      const y = Math.random() * H;
      const r = Math.random() * 1.2;
      const a = 0.2 + Math.random() * 0.6;
      sctx.beginPath();
      sctx.arc(x, y, r, 0, Math.PI*2);
      sctx.fillStyle = `rgba(180,210,255,${a})`;
      sctx.fill();
    }
    // Grid lines (subtle)
    sctx.strokeStyle = 'rgba(30,50,100,0.35)';
    sctx.lineWidth = 0.5;
    const step = W / 6;
    for (let x = 0; x <= W; x += step) {
      sctx.beginPath(); sctx.moveTo(x,0); sctx.lineTo(x,H); sctx.stroke();
    }
    const vstep = H / 12;
    for (let y = 0; y <= H; y += vstep) {
      sctx.beginPath(); sctx.moveTo(0,y); sctx.lineTo(W,y); sctx.stroke();
    }
  }

  // ── Init ──────────────────────────────────────────────────
  window.addEventListener('resize', () => { resize(); draw(); });
  resize();
  initStars();
  draw();
  // Show ready modal
  showModal(modalReady);
  // But don't auto-load stage yet
  gameActive = false;

})();
</script>
</body>
</html>
