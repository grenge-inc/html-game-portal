<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>連鎖割り雪崩</title>
<style>
  :root {
    --phone-aspect: 9 / 19.5;
    /* 背景トークン */
    --bg-deep:#04030f;
    --bg-mid:#1a0b3a;
    --bg-glow:#2a1060;
    --line:#2a2050;
    --text-main:#eaf3ff;
    --text-sub:#c9c2e8;
    --text-dim:#8a82b0;
    --ok:#7dffb0;
    --warn:#ffb86c;
    /* 風船色トークン */
    --bln-r:#ff4d6a;  --bln-r-core:#ffd0d8;
    --bln-b:#3d9bff;  --bln-b-core:#cfe6ff;
    --bln-g:#39e08a;  --bln-g-core:#d2ffe6;
    --bln-y:#ffce3d;  --bln-y-core:#fff3c8;
    --bln-p:#b06bff;  --bln-p-core:#ecd8ff;
    --bln-p-deep:#6a30c0;
    /* 共通セマンティック */
    --white:#ffffff;
    --black:#000000;
    --letterbox:#000000;
    --glass:rgba(255,255,255,.05);
    --glass-line:rgba(255,255,255,.12);
    --hl-white:rgba(255,255,255,.85);
    --shade:rgba(0,0,0,.35);
    --ov-1:rgba(40,16,96,.6);
    --ov-2:rgba(4,3,15,.9);
    --chain-glow:rgba(255,206,61,.6);
    --btn-shadow:rgba(176,107,255,.5);
    /* 連鎖インテンシティ（JS が --heat を 0→1 で更新）*/
    --heat:0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html, body {
    width:100%; height:100%;
    overflow:hidden;
    background:var(--letterbox);
    color:var(--white);
    font-family:'Helvetica Neue', system-ui, sans-serif;
    user-select:none;
    -webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
  }
  body {
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #phone {
    position:relative;
    overflow:hidden;
    width:  min(100vw, calc(100vh * 9 / 19.5));
    height: min(100vh, calc(100vw * 19.5 / 9));
    --pw:   min(100vw, calc(100vh * 9 / 19.5));
    --ph:   min(100vh, calc(100vw * 19.5 / 9));
    --u:    calc(var(--pw) / 100);
    --uh:   calc(var(--ph) / 100);
    background:
      radial-gradient(120% 80% at 50% 110%, var(--bg-glow) 0%, transparent 55%),
      radial-gradient(100% 60% at 50% -10%, var(--bg-mid) 0%, transparent 50%),
      var(--bg-deep);
  }
  /* 連鎖が伸びるほど盤面全体が熱を帯びる（--heat 0→1）*/
  #phone::after{content:"";position:absolute;inset:0;z-index:4;pointer-events:none;
    background:radial-gradient(80% 55% at 50% 52%,
      color-mix(in srgb, var(--bln-y) 55%, transparent), transparent 70%);
    opacity:calc(var(--heat)*0.5);mix-blend-mode:screen;
    transition:opacity .25s ease-out;}
  #phone.shaking{ transform:translate(var(--shx,0), var(--shy,0)); }

  /* 背景パーティクル */
  .bg-fx{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
  .bg-fx i{position:absolute;bottom:-4%;border-radius:50%;
    background:radial-gradient(circle, var(--bln-p-core), transparent 70%);
    opacity:.5;animation:rise linear infinite;}
  @keyframes rise{0%{transform:translateY(0);opacity:0;}10%{opacity:.6;}90%{opacity:.4;}100%{transform:translateY(-110vh);opacity:0;}}

  /* HUD */
  .hud{position:absolute;top:0;left:0;right:0;z-index:5;
    padding:calc(var(--uh)*1.6) calc(var(--u)*4) calc(var(--uh)*1);}
  .hud-row{display:flex;justify-content:space-between;align-items:center;}
  .hud-stats{margin-top:calc(var(--uh)*0.8);}
  .lbl{font-size:calc(var(--u)*2.6);letter-spacing:.12em;color:var(--text-dim);font-weight:700;}
  .stage-badge,.score-wrap{display:flex;align-items:baseline;gap:calc(var(--u)*1.4);}
  .stage-badge b{font-size:calc(var(--u)*5.2);font-weight:800;
    background:linear-gradient(180deg,var(--white),var(--bln-p));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .score-wrap b{font-size:calc(var(--u)*4.4);font-weight:800;font-variant-numeric:tabular-nums;color:var(--text-main);}
  .stat{display:flex;align-items:baseline;gap:calc(var(--u)*1.2);
    background:var(--glass);border:1px solid var(--glass-line);
    border-radius:calc(var(--u)*2.4);padding:calc(var(--uh)*0.5) calc(var(--u)*2.6);}
  .stat b{font-size:calc(var(--u)*4);font-weight:800;font-variant-numeric:tabular-nums;color:var(--text-main);}
  .stat b#remain.ok{color:var(--ok);}
  .stat i{font-size:calc(var(--u)*2.8);color:var(--text-dim);font-style:normal;}
  .goal-badge{display:inline-flex;align-items:center;gap:calc(var(--u)*1.4);margin-top:calc(var(--uh)*0.9);
    padding:calc(var(--uh)*0.4) calc(var(--u)*2.6);border-radius:calc(var(--u)*4);
    background:var(--glass);border:1px solid var(--glass-line);
    font-size:calc(var(--u)*2.7);font-weight:700;letter-spacing:.08em;color:var(--text-sub);}
  .goal-badge .dot{width:calc(var(--u)*2);height:calc(var(--u)*2);border-radius:50%;
    background:var(--bln-y);box-shadow:0 0 calc(var(--u)*2) var(--bln-y);}
  .goal-badge.think .dot{background:var(--bln-p);box-shadow:0 0 calc(var(--u)*2) var(--bln-p);}

  /* ヒントバナー */
  .hint-bar{position:absolute;bottom:0;left:0;right:0;z-index:6;
    padding:calc(var(--uh)*0.8) calc(var(--u)*5) calc(var(--uh)*1.2);
    background:linear-gradient(transparent, rgba(4,3,15,.85));
    font-size:calc(var(--u)*2.8);color:var(--text-dim);text-align:center;
    letter-spacing:.04em;line-height:1.55;pointer-events:none;}

  /* 盤面 */
  .board-wrap{position:absolute;inset:0;z-index:3;display:flex;align-items:center;justify-content:center;padding:0 calc(var(--u)*7);}
  .board{display:grid;width:100%;
    grid-template-columns:repeat(var(--cols),1fr);
    grid-template-rows:repeat(var(--rows),1fr);
    gap:calc(var(--u)*1.2);aspect-ratio:var(--cols)/var(--rows);max-height:60%;}
  .cell{position:relative;}
  .balloon{position:absolute;inset:8%;border-radius:50% 50% 48% 48%;cursor:pointer;
    background:radial-gradient(circle at 35% 26%, var(--cc), var(--cf) 60%, color-mix(in srgb,var(--cf) 65%, var(--black)) 100%);
    box-shadow:0 0 calc(var(--u)*2.6) color-mix(in srgb,var(--cf) 65%, transparent),
      inset 0 calc(var(--u)*-1.8) calc(var(--u)*2.4) var(--shade),
      inset 0 calc(var(--u)*1) calc(var(--u)*1.4) color-mix(in srgb,var(--cc) 60%, transparent);
    animation:float var(--fl,2.6s) ease-in-out var(--dl,0s) infinite;
    transform-origin:center bottom;will-change:transform;}
  .balloon .hl{position:absolute;top:14%;left:24%;width:26%;height:30%;border-radius:50%;
    background:radial-gradient(circle, var(--hl-white), transparent 70%);}
  .balloon .str{position:absolute;bottom:-14%;left:50%;width:1px;height:16%;
    background:linear-gradient(var(--cf),transparent);transform:translateX(-50%);}

  /* 孤立バルーンの危険マーカー（点滅アウトライン）*/
  .balloon.isolated{
    box-shadow:0 0 calc(var(--u)*2.6) color-mix(in srgb,var(--cf) 65%, transparent),
      inset 0 calc(var(--u)*-1.8) calc(var(--u)*2.4) var(--shade),
      inset 0 calc(var(--u)*1) calc(var(--u)*1.4) color-mix(in srgb,var(--cc) 60%, transparent),
      0 0 0 calc(var(--u)*1.2) rgba(255,100,80,.7);
    animation:float var(--fl,2.6s) ease-in-out var(--dl,0s) infinite, pulse-warn 1.2s ease-in-out infinite;}
  @keyframes pulse-warn{0%,100%{box-shadow:0 0 calc(var(--u)*2.6) color-mix(in srgb,var(--cf) 65%, transparent),
      inset 0 calc(var(--u)*-1.8) calc(var(--u)*2.4) var(--shade),
      inset 0 calc(var(--u)*1) calc(var(--u)*1.4) color-mix(in srgb,var(--cc) 60%, transparent),
      0 0 0 calc(var(--u)*1.2) rgba(255,100,80,.7);}
    50%{box-shadow:0 0 calc(var(--u)*2.6) color-mix(in srgb,var(--cf) 65%, transparent),
      inset 0 calc(var(--u)*-1.8) calc(var(--u)*2.4) var(--shade),
      inset 0 calc(var(--u)*1) calc(var(--u)*1.4) color-mix(in srgb,var(--cc) 60%, transparent),
      0 0 0 calc(var(--u)*1.2) rgba(255,100,80,.0);}}

  /* クラスタサイズバッジ */
  .size-badge{position:absolute;top:2%;right:2%;z-index:2;
    font-size:calc(var(--u)*2.6);font-weight:900;color:var(--white);
    background:rgba(0,0,0,.55);border-radius:calc(var(--u)*1.6);
    padding:calc(var(--u)*0.4) calc(var(--u)*1.2);pointer-events:none;line-height:1;}

  @keyframes float{0%,100%{transform:translateY(0) rotate(-1.5deg);}50%{transform:translateY(-7%) rotate(1.5deg);}}

  .balloon.burst{animation:none;transform:scale(1.55);opacity:0;transition:transform .18s ease-out,opacity .26s ease-out;}
  .frag{position:absolute;top:50%;left:50%;width:14%;height:14%;border-radius:50%;
    transform:translate(-50%,-50%);animation:frag .42s ease-out forwards;pointer-events:none;}
  @keyframes frag{0%{opacity:1;transform:translate(-50%,-50%) scale(1);}
    100%{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(.2);}}
  .ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--white);
    animation:ring .42s ease-out forwards;pointer-events:none;}
  @keyframes ring{0%{transform:scale(.6);opacity:.9;}100%{transform:scale(2.2);opacity:0;}}

  /* チェーン表示 */
  .chain-pop{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%) scale(0.5);
    z-index:7;pointer-events:none;font-weight:900;font-size:calc(var(--u)*9);opacity:0;
    background:linear-gradient(180deg,var(--white),var(--bln-y));-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 calc(var(--u)*3) var(--chain-glow);letter-spacing:.04em;}
  .chain-pop.show{animation:chainPop .7s ease-out;}
  @keyframes chainPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.4);}
    25%{opacity:1;transform:translate(-50%,-50%) scale(var(--cs,1.3));}
    70%{opacity:1;}100%{opacity:0;transform:translate(-50%,-58%) scale(var(--cs,1.3));}}

  /* 警告フラッシュ（孤立クリック時）*/
  #warn-flash{position:absolute;inset:0;z-index:8;pointer-events:none;
    background:radial-gradient(circle at 50% 50%, rgba(255,80,60,.35), transparent 65%);
    opacity:0;transition:opacity .08s;}
  #warn-flash.on{opacity:1;}

  /* オーバーレイ */
  .overlay{position:absolute;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 40%, var(--ov-1), var(--ov-2));
    backdrop-filter:blur(2px);}
  .overlay[hidden]{display:none;}
  .panel{text-align:center;padding:calc(var(--uh)*4) calc(var(--u)*8);}
  .panel h1{font-size:calc(var(--u)*11);font-weight:900;letter-spacing:.04em;
    background:linear-gradient(180deg,var(--white),var(--bln-p));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .overlay.win .panel h1{background:linear-gradient(180deg,#fff,var(--ok));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .panel p{margin:calc(var(--uh)*1.4) 0 calc(var(--uh)*3);font-size:calc(var(--u)*3.6);color:var(--text-sub);}
  .btn{font:inherit;font-weight:800;font-size:calc(var(--u)*4);letter-spacing:.08em;
    color:var(--white);cursor:pointer;border:none;border-radius:calc(var(--u)*6);
    padding:calc(var(--uh)*1.6) calc(var(--u)*10);
    background:linear-gradient(180deg,var(--bln-p),var(--bln-p-deep));
    box-shadow:0 calc(var(--uh)*0.8) calc(var(--u)*4) var(--btn-shadow);}
  .btn:active{transform:translateY(2px);}
</style>
</head>
<body>
  <div id="phone">
    <div class="bg-fx" id="bgfx"></div>
    <div id="warn-flash"></div>

    <header class="hud">
      <div class="hud-row">
        <div class="stage-badge"><span class="lbl">STAGE</span><b id="stageNo">1</b></div>
        <div class="score-wrap"><span class="lbl">SCORE</span><b id="score">0</b></div>
      </div>
      <div class="hud-row hud-stats">
        <div class="stat"><span class="lbl">残り</span><b id="remain">0</b><i id="goalTxt">/ 0</i></div>
        <div class="stat"><span class="lbl">CLICK</span><b id="clicks">0</b></div>
      </div>
      <div class="goal-badge" id="goalBadge"><span class="dot"></span><span id="goalLabel">操作習得</span></div>
    </header>

    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>

    <div class="chain-pop" id="chainPop"></div>

    <div class="hint-bar" id="hintBar"></div>

    <div class="overlay" id="overlay" hidden>
      <div class="panel">
        <h1 id="ovTitle">READY</h1>
        <p id="ovSub"></p>
        <button class="btn" id="ovBtn">START</button>
      </div>
    </div>
  </div>

<script>
(function(){
  "use strict";

  // ---- カラートークン（風船色）----
  var COLORS = {
    R: {fill:'var(--bln-r)', core:'var(--bln-r-core)'},
    B: {fill:'var(--bln-b)', core:'var(--bln-b-core)'},
    G: {fill:'var(--bln-g)', core:'var(--bln-g-core)'},
    Y: {fill:'var(--bln-y)', core:'var(--bln-y-core)'},
    P: {fill:'var(--bln-p)', core:'var(--bln-p-core)'}
  };

  /*
   * ---- 5ステージ設計（詰み防止・段階的難易度）----
   *
   * 詰み防止の設計原則：
   *   - 孤立バルーン（赤点滅）は「ダメ」と見た目で示す → クリックを誘発しない
   *   - どのクラスタを何番目にクリックしても詰まらない組み合わせにする
   *   - St4〜St5 のみ「どのクラスタを選ぶか」の判断が必要（複数の正解あり）
   *
   * St1（2クリック / 3×3=9個）
   *   赤(7連結) + 青(1孤立) + 緑(1孤立)
   *   クリア条件：残り2以下。クリック上限：2回
   *   正解：赤(7)クリック → 2残 = クリア（1手でも可）
   *   詰み防止：赤クラスタ1つを選ぶだけでクリア。孤立は点滅で「NG」を示す
   *
   * St2（3クリック / 3×4=12個）
   *   赤(7連結) + 緑(3連結) + 青(1孤立) + 青(1孤立)
   *   クリア条件：残り2以下。クリック上限：3回
   *   正解：赤+緑を含む組み合わせなら順序・残り1クリックの使い方は問わない
   *   詰み防止：孤立を1回踏んでしまっても残り2クリックでR+Gを押してクリア可能
   *
   * St3（3クリック / 4×4=16個）
   *   赤(8連結) + 青(5連結) + 緑(3連結)
   *   クリア条件：残り0。クリック上限：3回
   *   正解：3クラスタを任意の順でクリックすれば全消し
   *   詰み防止：全クラスタを押しさえすれば順序は問わない
   *
   * St4（3クリック / 4×5=20個）
   *   赤(8連結) + 青(6連結) + 緑(4連結) + 黄(2連結)
   *   クリア条件：残り2以下。クリック上限：3回
   *   正解：赤+青+緑=18消え → 残り2(黄)=クリア ✓
   *   失敗：黄を含む3クラスタはいずれも残り4以上 → GAME OVER
   *   学習：xNバッジで「赤x8+青x6+緑x4」の最大3クラスタを選ぶ判断が必要
   *
   * St5（4クリック / 5×5=25個）
   *   赤(10連結) + 青(7連結) + 緑(3連結) + 黄(3連結) + 紫(2連結)
   *   クリア条件：残り3以下。クリック上限：4回
   *   正解（複数可）：
   *     赤+青+緑+黄=10+7+3+3=23消え → 残り2(紫)=クリア ✓
   *     赤+青+緑+紫=10+7+3+2=22消え → 残り3(黄)=クリア ✓（黄3≤3）
   *     赤+青+黄+紫=10+7+3+2=22消え → 残り3(緑)=クリア ✓（緑3≤3）
   *     赤+緑+黄+紫=10+3+3+2=18消え → 残り7(青)=FAIL ✗
   *     青+緑+黄+紫=7+3+3+2=15消え → 残り10(赤)=FAIL ✗
   *   学習：必ず赤+青を含む選択が必要。それ以外の2クラスタは自由
   */

  var STAGES = [
    // ---- St1：操作理解（2クリック / 3×3=9個）----
    {
      cols: 3, rows: 3,
      goal: 2,
      maxClicks: 2,
      hint: '繋がった赤い塊をクリック！ 点滅は無駄打ち',
      goalLabel: '操作習得・連鎖体感',
      isThink: false,
      showBadge: false,
      //  row0: R R R
      //  row1: R R R
      //  row2: R B G
      //
      //  赤=7連結[(0,0)(0,1)(0,2)(1,0)(1,1)(1,2)(2,0)]
      //  青=1孤立[(2,1)]  緑=1孤立[(2,2)]
      //
      //  正解：赤(7)クリック → 残り2(青1+緑1) = クリア
      //  詰み防止：1クリックで7個消えるので確実にクリア
      grid: [
        'R','R','R',
        'R','R','R',
        'R','B','G'
      ]
    },

    // ---- St2：連結を読む（3クリック / 3×4=12個）----
    {
      cols: 3, rows: 4,
      goal: 2,
      maxClicks: 3,
      hint: '塊を2つ狙おう — 点滅を踏んでも挽回できる！',
      goalLabel: '連結読み・2クラスタ',
      isThink: false,
      showBadge: false,
      //  row0: R R R
      //  row1: R R R
      //  row2: R G G
      //  row3: B G B
      //
      //  赤=7連結[(0,0)(0,1)(0,2)(1,0)(1,1)(1,2)(2,0)]
      //  緑=3連結[(2,1)(2,2)(3,1)]
      //  青=孤立2個[(3,0)(3,2)] ← 各1個・連結なし
      //
      //  正解（どちらの順でも可）：
      //    赤(7)→緑(3)：7+3=10消え、残り2(青)=クリア ✓
      //    緑(3)→赤(7)：3+7=10消え、残り2(青)=クリア ✓
      //  詰み防止：2つの連結クラスタをどの順で押してもクリア
      grid: [
        'R','R','R',
        'R','R','R',
        'R','G','G',
        'B','G','B'
      ]
    },

    // ---- St3：全消し（3クリック / 4×4=16個）----
    {
      cols: 4, rows: 4,
      goal: 0,
      maxClicks: 3,
      hint: '3色の塊をすべて割れ — 順番は自由！',
      goalLabel: '全消し・3クラスタ',
      isThink: false,
      showBadge: false,
      //  row0: R R R R
      //  row1: R R R R
      //  row2: B B B G
      //  row3: B B G G
      //
      //  赤=8連結[(0,0〜3)(1,0〜3)]
      //  青=5連結[(2,0)(2,1)(2,2)(3,0)(3,1)]
      //  緑=3連結[(2,3)(3,2)(3,3)]
      //
      //  正解：3クラスタを任意の順で全部クリック → 8+5+3=16消え=全消し
      //  詰み防止：どの順でも3つ押せば全消し確定
      grid: [
        'R','R','R','R',
        'R','R','R','R',
        'B','B','B','G',
        'B','B','G','G'
      ]
    },

    // ---- St4：サイズ読み（3クリック / 4×5=20個）----
    {
      cols: 4, rows: 5,
      goal: 2,
      maxClicks: 3,
      hint: 'xNバッジが大きい塊3つを選べ！',
      goalLabel: '選択・サイズ読み',
      isThink: true,
      showBadge: true,
      //  row0: R R R R
      //  row1: R R R R
      //  row2: B B G G
      //  row3: B B G G
      //  row4: B B Y Y
      //
      //  赤=8連結[(0,0〜3)(1,0〜3)]
      //  青=6連結[(2,0)(2,1)(3,0)(3,1)(4,0)(4,1)]
      //  緑=4連結[(2,2)(2,3)(3,2)(3,3)]
      //  黄=2連結[(4,2)(4,3)]
      //  合計: 8+6+4+2=20 ✓
      //
      //  正解：赤(8)+青(6)+緑(4)=18消え → 残り2(黄)=クリア ✓
      //  失敗：黄を含む全ての3クラスタは残り4以上 → GAME OVER
      //  学習：xNバッジで「x8+x6+x4」を選び「x2(黄)は残す」判断が必要
      grid: [
        'R','R','R','R',
        'R','R','R','R',
        'B','B','G','G',
        'B','B','G','G',
        'B','B','Y','Y'
      ]
    },

    // ---- St5：読みの勝負（4クリック / 5×5=25個）----
    {
      cols: 5, rows: 5,
      goal: 3,
      maxClicks: 4,
      hint: '大きな塊から順番に — 赤と青は必ず割れ！',
      goalLabel: '思考・最適選択',
      isThink: true,
      showBadge: true,
      //  row0: R R R R R
      //  row1: R R R R R
      //  row2: B B B G G
      //  row3: B B B B G
      //  row4: Y Y Y P P
      //
      //  赤=10連結[(0,0〜4)(1,0〜4)]
      //  青=7連結[(2,0)(2,1)(2,2)(3,0)(3,1)(3,2)(3,3)]
      //  緑=4連結[(2,3)(2,4)(3,4)]... 3個? 要確認
      //    (2,3)(2,4)(3,4): (2,3)↔(2,4)隣接、(2,4)↔(3,4)隣接 = 3個
      //  黄=3連結[(4,0)(4,1)(4,2)]
      //  紫=2連結[(4,3)(4,4)]... 2個
      //  合計: 10+7+3+3+2=25 ✓
      //
      //  正解（複数）：
      //    赤(10)+青(7)+緑(3)+黄(3)=23消え → 残り2(紫)=クリア ✓（2≤3）
      //    赤(10)+青(7)+緑(3)+紫(2)=22消え → 残り3(黄)=クリア ✓（3≤3）
      //    赤(10)+青(7)+黄(3)+紫(2)=22消え → 残り3(緑)=クリア ✓（3≤3）
      //    赤(10)+緑(3)+黄(3)+紫(2)=18消え → 残り7(青)=FAIL ✗（7>3）
      //    青(7)+緑(3)+黄(3)+紫(2)=15消え → 残り10(赤)=FAIL ✗
      //  学習：赤と青の両方を含む選択が必要。どちらか欠くと失敗
      grid: [
        'R','R','R','R','R',
        'R','R','R','R','R',
        'B','B','B','G','G',
        'B','B','B','B','G',
        'Y','Y','Y','P','P'
      ]
    }
  ];

  var board = document.getElementById('board');
  var phone = document.getElementById('phone');
  var elStage = document.getElementById('stageNo');
  var elScore = document.getElementById('score');
  var elRemain = document.getElementById('remain');
  var elGoal = document.getElementById('goalTxt');
  var elClicks = document.getElementById('clicks');
  var overlay = document.getElementById('overlay');
  var ovTitle = document.getElementById('ovTitle');
  var ovSub = document.getElementById('ovSub');
  var ovBtn = document.getElementById('ovBtn');
  var chainPop = document.getElementById('chainPop');
  var goalBadge = document.getElementById('goalBadge');
  var goalLabel = document.getElementById('goalLabel');
  var hintBar = document.getElementById('hintBar');
  var warnFlash = document.getElementById('warn-flash');

  var state = {
    si:0, cols:0, rows:0, goal:0, maxClicks:0,
    cells:[], remain:0, clicksLeft:0, score:0, busy:false, ended:false,
    scoreStage0:0
  };

  // 各セルのクラスタサイズを計算して返す（Flood Fill）
  function computeClusterSizes(){
    var n = state.cells.length;
    var clusterSize = new Array(n).fill(0);
    var visited = new Array(n).fill(false);

    for(var start=0; start<n; start++){
      if(visited[start] || !state.cells[start].alive) continue;
      var color = state.cells[start].color;
      var queue = [start];
      var members = [];
      visited[start] = true;
      while(queue.length){
        var cur = queue.shift();
        members.push(cur);
        var ns = neighbors(cur);
        for(var i=0;i<ns.length;i++){
          var nb = ns[i];
          if(!visited[nb] && state.cells[nb].alive && state.cells[nb].color===color){
            visited[nb]=true;
            queue.push(nb);
          }
        }
      }
      // 全メンバーに同サイズを付与
      for(var j=0;j<members.length;j++){
        clusterSize[members[j]] = members.length;
      }
    }
    return clusterSize;
  }

  function buildStage(si){
    var st = STAGES[si];
    state.si = si; state.cols = st.cols; state.rows = st.rows;
    state.goal = st.goal; state.maxClicks = st.maxClicks;
    state.clicksLeft = st.maxClicks; state.busy = false; state.ended = false;
    state.cells = [];

    board.innerHTML = '';
    board.style.setProperty('--cols', st.cols);
    board.style.setProperty('--rows', st.rows);

    var alive = 0;
    for(var i=0;i<st.grid.length;i++){
      var color = st.grid[i];
      var cell = document.createElement('div');
      cell.className = 'cell';
      if(color){
        var b = document.createElement('div');
        b.className = 'balloon';
        b.style.setProperty('--cf', COLORS[color].fill);
        b.style.setProperty('--cc', COLORS[color].core);
        b.style.setProperty('--fl', (Math.random()*2.2+2.0).toFixed(2)+'s');
        b.style.setProperty('--dl', (Math.random()*-3).toFixed(2)+'s');
        b.innerHTML = '<span class="hl"></span><span class="str"></span>';
        cell.appendChild(b);
        alive++;
      }
      board.appendChild(cell);
      state.cells.push({color:color, el:cell, alive:!!color, r:Math.floor(i/st.cols), c:i%st.cols, idx:i});
    }
    state.remain = alive;
    state.scoreStage0 = state.score;

    // ゴールバッジ
    if(st.isThink){ goalLabel.textContent=st.goalLabel; goalBadge.classList.add('think'); }
    else { goalLabel.textContent=st.goalLabel; goalBadge.classList.remove('think'); }

    // ヒント表示
    hintBar.textContent = st.hint;

    phone.style.setProperty('--heat', 0);

    // クラスタサイズバッジとアイソレートマーカーを付与
    updateClusterVisuals();

    refreshHud();
  }

  // クラスタサイズバッジ＆孤立マーカーを更新
  function updateClusterVisuals(){
    var sizes = computeClusterSizes();
    var st = STAGES[state.si];
    for(var i=0;i<state.cells.length;i++){
      var c = state.cells[i];
      if(!c.alive) continue;
      var bl = c.el.querySelector('.balloon');
      if(!bl) continue;

      // 既存バッジ削除
      var old = bl.querySelector('.size-badge');
      if(old) bl.removeChild(old);

      var sz = sizes[i];
      // 孤立（1個のみ）マーカー
      if(sz === 1){
        bl.classList.add('isolated');
      } else {
        bl.classList.remove('isolated');
      }

      // showBadge が true のステージでクラスタの代表セルにバッジ表示
      if(st.showBadge && sz > 1){
        var members = getClusterMembers(i);
        if(members[0] === i){
          var badge = document.createElement('span');
          badge.className = 'size-badge';
          badge.textContent = 'x'+sz;
          bl.appendChild(badge);
        }
      }
    }
  }

  // クラスタの全メンバー（インデックス昇順）を返す
  function getClusterMembers(idx){
    var color = state.cells[idx].color;
    var visited = {};
    var queue = [idx];
    visited[idx] = true;
    var members = [idx];
    while(queue.length){
      var cur = queue.shift();
      var ns = neighbors(cur);
      for(var i=0;i<ns.length;i++){
        var nb = ns[i];
        if(!visited[nb] && state.cells[nb].alive && state.cells[nb].color===color){
          visited[nb]=true;
          queue.push(nb);
          members.push(nb);
        }
      }
    }
    members.sort(function(a,b){return a-b;});
    return members;
  }

  function refreshHud(){
    elStage.textContent = state.si+1;
    elScore.textContent = state.score;
    elRemain.textContent = state.remain;
    elGoal.textContent = '/ '+state.goal;
    elClicks.textContent = state.clicksLeft;
    elRemain.classList.toggle('ok', state.remain<=state.goal);
  }

  function neighbors(idx){
    var c = state.cells[idx], out=[];
    var r=c.r, col=c.c, cols=state.cols;
    if(r>0) out.push(idx-cols);
    if(r<state.rows-1) out.push(idx+cols);
    if(col>0) out.push(idx-1);
    if(col<cols-1) out.push(idx+1);
    return out;
  }

  // Flood Fill：起点と同色で連結する全 alive セルを BFS 順（誘爆波の層）で収集
  function floodLayers(start){
    var color = state.cells[start].color;
    var seen = {}; seen[start]=true;
    var layers=[[start]], frontier=[start];
    while(frontier.length){
      var next=[];
      for(var i=0;i<frontier.length;i++){
        var ns = neighbors(frontier[i]);
        for(var j=0;j<ns.length;j++){
          var n=ns[j], cell=state.cells[n];
          if(!seen[n] && cell.alive && cell.color===color){
            seen[n]=true; next.push(n);
          }
        }
      }
      if(next.length){ layers.push(next); frontier=next; }
      else frontier=[];
    }
    return layers;
  }

  var warnFlashT = null;
  function triggerWarnFlash(){
    warnFlash.classList.add('on');
    clearTimeout(warnFlashT);
    warnFlashT = setTimeout(function(){ warnFlash.classList.remove('on'); }, 220);
  }

  function onHit(e){
    if(state.busy || state.ended) return;
    var bel = e.target.closest('.balloon');
    if(!bel) return;
    var cell = bel.parentNode;
    var idx = Array.prototype.indexOf.call(board.children, cell);
    if(idx<0) return;
    var c = state.cells[idx];
    if(!c.alive) return;

    // クラスタサイズ取得
    var sizes = computeClusterSizes();
    var clusterSz = sizes[idx];

    // 孤立（1個）を割った場合：警告フラッシュ（クリックは消費する）
    if(clusterSz === 1){
      triggerWarnFlash();
    }

    state.busy = true;
    state.clicksLeft--;
    var layers = floodLayers(idx);
    detonate(layers);
  }

  function detonate(layers){
    var total=0; layers.forEach(function(l){total+=l.length;});
    var chain=0;

    function popLayer(li){
      if(li>=layers.length){ finishBurst(total); return; }
      var layer = layers[li];
      for(var k=0;k<layer.length;k++){
        var cell = state.cells[layer[k]];
        if(!cell.alive) continue;
        cell.alive=false;
        chain++;
        burstBalloon(cell.el, chain);
        state.remain--;
      }
      // 連鎖エスカレーション
      var inten = Math.min(1, chain/12);
      shake(2+inten*9);
      phone.style.setProperty('--heat', inten.toFixed(3));
      state.score += chain*10;
      if(chain>=3) showChainPop(chain);
      refreshHud();
      var delay = 45 + (li===0?60:0);
      setTimeout(function(){ popLayer(li+1); }, delay);
    }
    popLayer(0);
  }

  function burstBalloon(el, chain){
    var bl = el.querySelector('.balloon');
    if(!bl) return;
    bl.classList.add('burst');
    var inten = Math.min(1, chain/10);
    // 破片パーティクル
    var n = 5;
    for(var i=0;i<n;i++){
      var p = document.createElement('span');
      p.className='frag';
      var ang = (Math.PI*2/n)*i + Math.random()*0.6;
      var dist = (30+Math.random()*40);
      p.style.setProperty('--dx', (Math.cos(ang)*dist).toFixed(1)+'%');
      p.style.setProperty('--dy', (Math.sin(ang)*dist).toFixed(1)+'%');
      p.style.background = getComputedStyle(bl).getPropertyValue('--cc');
      bl.appendChild(p);
    }
    var ring = document.createElement('span');
    ring.className='ring';
    ring.style.opacity = (0.5+inten*0.5);
    bl.appendChild(ring);
    setTimeout(function(){ if(bl.parentNode) bl.parentNode.removeChild(bl); }, 480);
  }

  function showChainPop(chain){
    chainPop.textContent = chain+' CHAIN!';
    chainPop.style.setProperty('--cs', (1+Math.min(chain,16)/16*0.8).toFixed(2));
    chainPop.classList.remove('show');
    void chainPop.offsetWidth;
    chainPop.classList.add('show');
  }

  var shakeT=null;
  function shake(amt){
    phone.style.setProperty('--shx', ((Math.random()*2-1)*amt).toFixed(1)+'px');
    phone.style.setProperty('--shy', ((Math.random()*2-1)*amt).toFixed(1)+'px');
    phone.classList.add('shaking');
    clearTimeout(shakeT);
    shakeT=setTimeout(function(){ phone.classList.remove('shaking'); }, 120);
  }

  function finishBurst(total){
    // ボーナス
    if(total>=8){ state.score += 200; }
    else if(total>=5){ state.score += 80; }
    refreshHud();
    setTimeout(function(){ phone.style.setProperty('--heat', 0); }, 260);

    // 破裂後にクラスタビジュアルを更新
    setTimeout(function(){
      updateClusterVisuals();
    }, 520);

    setTimeout(judge, 320);
  }

  function judge(){
    state.busy=false;
    if(state.remain<=state.goal){
      state.ended=true;
      if(state.si>=STAGES.length-1) showOverlay('ALL CLEAR', 'スコア '+state.score, 'もう一度', 'restart');
      else showOverlay('CLEAR', 'STAGE '+(state.si+1)+' 突破！', 'NEXT', 'next');
    } else if(state.clicksLeft<=0){
      state.ended=true;
      showOverlay('GAME OVER', '残り '+state.remain+' 個 / 目標 '+state.goal+' 個', 'RETRY', 'retry');
    }
  }

  function showOverlay(title, sub, btn, action){
    ovTitle.textContent=title;
    ovSub.textContent=sub;
    ovBtn.textContent=btn;
    overlay.dataset.action=action;
    overlay.hidden=false;
    overlay.classList.toggle('win', /CLEAR/.test(title));
  }

  function onOvBtn(){
    var a = overlay.dataset.action;
    overlay.hidden=true;
    if(a==='next') buildStage(state.si+1);
    else if(a==='retry'){ state.score=state.scoreStage0||0; buildStage(state.si); }
    else if(a==='restart'){ state.score=0; buildStage(0); }
    else buildStage(state.si);
  }

  // ---- 背景：上昇する微光パーティクル ----
  function makeBg(){
    var fx=document.getElementById('bgfx'), html='';
    for(var i=0;i<14;i++){
      var x=(Math.random()*100).toFixed(1);
      var s=(Math.random()*2+1.2).toFixed(1);
      var d=(Math.random()*8+7).toFixed(1);
      var dl=(Math.random()*-12).toFixed(1);
      html+='<i style="left:'+x+'%;width:'+s+'px;height:'+s+'px;animation-duration:'+d+'s;animation-delay:'+dl+'s"></i>';
    }
    fx.innerHTML=html;
  }

  // ---- イベント（mouse/pointer のみ）----
  board.addEventListener('pointerdown', onHit);
  ovBtn.addEventListener('pointerdown', function(e){ e.preventDefault(); onOvBtn(); });

  // ---- 起動 ----
  makeBg();
  buildStage(0);
  showOverlay('READY', '繋がった塊をクリックして連鎖させよう！', 'START', 'start');
})();
</script>
</body>
</html>
