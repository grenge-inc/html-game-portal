<!DOCTYPE html>
<!--
  Phone frame template for hybrid-casual-mentor generated games.
  Aspect ratio: 9:19.5 (iPhone X 系縦長, NEONNOVA2048 基準)。
  PC で開いても常にこの比率を保ち、letterbox（左右黒帯）で中央表示。
  すべてのゲーム要素は #phone の子として配置すること。
-->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Arrow Sort Frozen Chain</title>
<style>
  :root {
    --phone-aspect: 9 / 19.5;
    /* Block colors */
    --col-blue:    #4A9EFF;
    --col-red:     #FF4444;
    --col-yellow:  #FFD700;
    --col-green:   #44CC44;
    /* Garden theme */
    --bg-grass:    #7ec850;
    --bg-grass-lt: #a8e063;
    --bg-grass-dk: #5aaf30;
    --bg-tree-a:   #4a8c22;
    --bg-tree-b:   #3d7a1a;
    /* Wood board */
    --wood-lt:     #d4a96a;
    --wood-mid:    #c49055;
    --wood-dk:     #b87d40;
    --wood-shadow: rgba(0,0,0,.45);
    /* Ice */
    --ice-glow:    #88CCFF;
    --ice-overlay: rgba(160,220,255,.55);
    --ice-overlay2:rgba(100,180,255,.35);
    --ice-border:  rgba(180,230,255,.7);
    /* UI */
    --ui-orange-lt:#ff7a3a;
    --ui-orange:   #e85000;
    --ui-orange-dk:#a83300;
    --modal-bg:    rgba(255,249,232,1);
    --modal-bg2:   rgba(255,232,153,1);
    --text-hud:    #fff;
    --text-sub:    #666;
    /* Nova scale (intensity) */
    --nova-9: #ffd76b;
    --nova-7: #ffb24a;
    --nova-5: #ff7a3a;
    --nova-3: #ff5d8a;
    --nova-1: #b585ff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100%;overflow:hidden;background:#1a0a00;color:var(--text-hud);
    font-family:'Helvetica Neue',system-ui,sans-serif;user-select:none;
    -webkit-user-select:none;-webkit-tap-highlight-color:transparent;touch-action:none;}
  body{position:relative;display:flex;align-items:center;justify-content:center;}
  #phone{
    position:relative;overflow:hidden;
    width:min(100vw,calc(100vh*9/19.5));
    height:min(100vh,calc(100vw*19.5/9));
    --pw:min(100vw,calc(100vh*9/19.5));
    --ph:min(100vh,calc(100vw*19.5/9));
    --u:calc(var(--pw)/100);
    --uh:calc(var(--ph)/100);
    background:var(--bg-grass);
  }
  /* Garden background — layered with ambient elements */
  .bg-garden{position:absolute;inset:0;
    background:
      radial-gradient(ellipse at 50% -10%,var(--bg-grass-lt) 0%,var(--bg-grass) 45%,var(--bg-grass-dk) 100%);}
  /* Tree blobs corners */
  .bg-garden::before{content:'';position:absolute;inset:0;
    background:
      radial-gradient(circle at 8% 12%,var(--bg-tree-a) 0%,transparent 20%),
      radial-gradient(circle at 92% 8%, var(--bg-tree-b) 0%,transparent 17%),
      radial-gradient(circle at 88% 88%,var(--bg-tree-a) 0%,transparent 22%),
      radial-gradient(circle at 12% 90%,var(--bg-tree-b) 0%,transparent 18%),
      radial-gradient(circle at 50% 95%,var(--bg-tree-a) 0%,transparent 15%);
  }
  /* Floating flowers / light dots */
  .bg-garden::after{content:'';position:absolute;inset:0;
    background:
      radial-gradient(circle at 22% 30%,rgba(255,240,180,.55) 0%,transparent 3%),
      radial-gradient(circle at 78% 25%,rgba(255,200,200,.5)  0%,transparent 2.5%),
      radial-gradient(circle at 35% 75%,rgba(200,255,200,.45) 0%,transparent 2%),
      radial-gradient(circle at 68% 70%,rgba(255,240,180,.5)  0%,transparent 2.5%),
      radial-gradient(circle at 50% 20%,rgba(255,255,255,.3)  0%,transparent 2%),
      radial-gradient(circle at 15% 55%,rgba(200,230,255,.4)  0%,transparent 2%),
      radial-gradient(circle at 85% 55%,rgba(255,210,240,.4)  0%,transparent 2%);
    pointer-events:none;
  }

  /* HUD */
  .hud{position:absolute;top:0;left:0;right:0;
    padding:calc(var(--uh)*2.5) calc(var(--u)*4);
    display:flex;align-items:center;justify-content:space-between;
    background:linear-gradient(to bottom,rgba(0,0,0,.3),transparent);z-index:10;}
  /* Stage badge */
  .hud-stage{
    font-size:calc(var(--u)*4.5);font-weight:800;
    color:var(--text-hud);
    background:linear-gradient(135deg,var(--wood-mid),var(--wood-dk));
    border-radius:calc(var(--u)*2);
    padding:calc(var(--uh)*.6) calc(var(--u)*3);
    box-shadow:0 calc(var(--u)*.5) 0 var(--wood-dk),
               0 calc(var(--u)*1) calc(var(--u)*2) rgba(0,0,0,.35);
    text-shadow:0 1px 2px rgba(0,0,0,.5);}
  /* Moves counter badge */
  .hud-moves{
    font-size:calc(var(--u)*4.2);font-weight:700;
    color:var(--text-hud);
    background:rgba(0,0,0,.3);
    border-radius:calc(var(--u)*2);
    padding:calc(var(--uh)*.6) calc(var(--u)*3);
    backdrop-filter:blur(4px);
    border:1px solid rgba(255,255,255,.15);
    text-shadow:0 1px 2px rgba(0,0,0,.5);}
  .hud-moves span{
    font-weight:900;color:var(--nova-9);
    -webkit-text-stroke:.5px rgba(180,120,0,.4);}

  /* Wood board */
  .board-wrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-52%);
    background:linear-gradient(150deg,var(--wood-lt) 0%,var(--wood-mid) 50%,var(--wood-dk) 100%);
    border-radius:calc(var(--u)*4);
    padding:calc(var(--u)*3.5);
    box-shadow:
      0 calc(var(--uh)*1.2) calc(var(--uh)*2.5) var(--wood-shadow),
      0 calc(var(--uh)*.2)  calc(var(--uh)*.6)  rgba(0,0,0,.3),
      inset 0 2px 0 rgba(255,255,255,.35),
      inset 0 -2px 0 rgba(0,0,0,.15);}
  /* Wood grain lines */
  .board-wrap::before{content:'';position:absolute;inset:0;border-radius:calc(var(--u)*4);
    background:
      repeating-linear-gradient(88deg,
        transparent 0%, transparent 18%,
        rgba(0,0,0,.035) 18%, rgba(0,0,0,.035) 19%,
        transparent 19%, transparent 37%,
        rgba(255,255,255,.04) 37%, rgba(255,255,255,.04) 38%);
    pointer-events:none;}
  /* Board edge highlight */
  .board-wrap::after{content:'';position:absolute;inset:0;border-radius:calc(var(--u)*4);
    background:linear-gradient(to bottom,rgba(255,255,255,.18) 0%,transparent 35%,transparent 65%,rgba(0,0,0,.1) 100%);
    pointer-events:none;}
  .board{display:grid;
    background:rgba(0,0,0,.14);
    border-radius:calc(var(--u)*2);
    box-shadow:inset 0 2px 6px rgba(0,0,0,.25);}

  /* Arrow blocks — chunky 3D style */
  .cell{position:relative;border-radius:calc(var(--u)*1.8);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:transform .08s,box-shadow .08s;overflow:hidden;}
  .cell.normal{
    background:linear-gradient(145deg,var(--c-light,#fff) 0%,var(--c-mid,#aaa) 55%,var(--c-dark,#888) 100%);
    box-shadow:
      0 calc(var(--u)*.8) 0 var(--c-shadow,#555),
      0 calc(var(--u)*1.5) calc(var(--u)*3) rgba(0,0,0,.35),
      inset 0 1.5px 0 rgba(255,255,255,.6),
      inset 0 -1px 0 rgba(0,0,0,.1);}
  .cell.normal:active{
    transform:translateY(calc(var(--u)*.5)) scale(.94);
    box-shadow:0 calc(var(--u)*.3) 0 var(--c-shadow,#555),
               0 calc(var(--u)*.5) calc(var(--u)*1.5) rgba(0,0,0,.3),
               inset 0 1px 0 rgba(255,255,255,.5);}
  .cell.frozen{
    background:linear-gradient(145deg,var(--c-light,#fff) 0%,var(--c-mid,#aaa) 55%,var(--c-dark,#888) 100%);
    box-shadow:
      0 calc(var(--u)*.8) 0 var(--c-shadow,#555),
      0 calc(var(--u)*1.5) calc(var(--u)*3) rgba(0,0,0,.35),
      0 0 calc(var(--u)*4) var(--ice-glow),
      0 0 calc(var(--u)*8) rgba(136,204,255,.3),
      inset 0 1.5px 0 rgba(255,255,255,.6);
    pointer-events:none;}
  /* Ice overlay */
  .cell.frozen::after{content:'';position:absolute;inset:0;border-radius:inherit;
    background:linear-gradient(135deg,var(--ice-overlay),var(--ice-overlay2));
    backdrop-filter:blur(1.5px);z-index:2;
    border:2px solid var(--ice-border);}
  /* Ice cracks */
  .cell.frozen::before{content:'';position:absolute;inset:0;z-index:3;
    background:
      linear-gradient(48deg,transparent 38%,rgba(255,255,255,.35) 40%,transparent 42%),
      linear-gradient(-52deg,transparent 52%,rgba(255,255,255,.28) 54%,transparent 56%),
      linear-gradient(12deg,transparent 28%,rgba(200,240,255,.22) 29%,transparent 31%),
      linear-gradient(-20deg,transparent 60%,rgba(255,255,255,.18) 61%,transparent 63%);
    pointer-events:none;border-radius:inherit;}

  /* Arrow SVG inside cell */
  .arrow-svg{position:relative;z-index:4;width:64%;height:64%;pointer-events:none;}

  /* empty cell */
  .cell.empty{background:rgba(0,0,0,.09);cursor:default;box-shadow:inset 0 1px 3px rgba(0,0,0,.2);}

  /* Colors — 3-stop gradient for chunkier look */
  .c-blue  {--c-light:#7ac8ff;--c-mid:#4A9EFF;--c-dark:#2a7ecc;--c-shadow:#1a5ea0;}
  .c-red   {--c-light:#ff8888;--c-mid:#FF4444;--c-dark:#cc2222;--c-shadow:#991111;}
  .c-yellow{--c-light:#ffe888;--c-mid:#FFD700;--c-dark:#ccaa00;--c-shadow:#997700;}
  .c-green {--c-light:#88ee88;--c-mid:#44CC44;--c-dark:#229922;--c-shadow:#117711;}

  /* Slide animation */
  @keyframes slideFlash{0%{filter:brightness(1.9) saturate(1.3)}100%{filter:brightness(1) saturate(1)}}
  .slide-flash{animation:slideFlash .28s ease-out forwards;}

  /* Thaw animation — ice shatters then block glows */
  @keyframes thawBurst{
    0%  {transform:scale(1);   filter:brightness(1)   saturate(1)}
    20% {transform:scale(1.22);filter:brightness(2.5) saturate(1.5)}
    45% {transform:scale(.92); filter:brightness(1.8) saturate(1.3)}
    70% {transform:scale(1.06);filter:brightness(1.4) saturate(1.2)}
    100%{transform:scale(1);   filter:brightness(1)   saturate(1)}
  }
  .thaw-anim{animation:thawBurst .55s cubic-bezier(.25,.46,.45,.94) forwards;}

  /* Screen shake for chain thaw */
  @keyframes screenShake{
    0%  {transform:translate(-50%,-52%)}
    10% {transform:translate(-48.5%,-51%)}
    20% {transform:translate(-51.5%,-53%)}
    30% {transform:translate(-48.5%,-52%)}
    40% {transform:translate(-51%,-51%)}
    50% {transform:translate(-50%,-53.5%)}
    60% {transform:translate(-51%,-51.5%)}
    70% {transform:translate(-49%,-50.5%)}
    80% {transform:translate(-50.5%,-52%)}
    90% {transform:translate(-51%,-53%)}
    100%{transform:translate(-50%,-52%)}
  }
  .board-wrap.shake{animation:screenShake .55s ease-out;}

  /* Particles */
  .particle{position:absolute;pointer-events:none;z-index:20;}
  @keyframes particleFly{
    0%  {transform:translate(0,0) scale(1) rotate(0deg);opacity:1;}
    100%{transform:translate(var(--px),var(--py)) scale(0) rotate(var(--pr,180deg));opacity:0;}
  }

  /* Stage clear modal */
  .modal{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;z-index:50;
    background:rgba(0,0,0,.6);backdrop-filter:blur(5px);}
  .modal-box{
    background:linear-gradient(150deg,var(--modal-bg),var(--modal-bg2));
    border-radius:calc(var(--u)*6);
    padding:calc(var(--uh)*4) calc(var(--u)*9);
    text-align:center;
    box-shadow:
      0 calc(var(--uh)*2) calc(var(--uh)*5) rgba(0,0,0,.45),
      inset 0 2px 0 rgba(255,255,255,.7),
      inset 0 -2px 0 rgba(0,0,0,.1);}
  .modal-title{
    font-size:calc(var(--u)*10);font-weight:900;
    color:var(--ui-orange);
    text-shadow:0 3px 0 rgba(0,0,0,.15),0 0 calc(var(--u)*4) rgba(255,120,0,.3);
    letter-spacing:-0.02em;}
  .modal-sub{
    font-size:calc(var(--u)*4.8);color:var(--text-sub);
    margin:calc(var(--uh)*1.2) 0 calc(var(--uh)*2.5);
    font-weight:600;}
  .modal-sub strong{color:var(--ui-orange);font-size:calc(var(--u)*6);}
  .modal-btn{
    background:linear-gradient(145deg,var(--ui-orange-lt),var(--ui-orange));
    color:var(--text-hud);font-size:calc(var(--u)*5.2);font-weight:800;
    border:none;border-radius:calc(var(--u)*3.5);
    padding:calc(var(--uh)*1.8) calc(var(--u)*9);cursor:pointer;
    box-shadow:
      0 calc(var(--u)*1.2) 0 var(--ui-orange-dk),
      0 calc(var(--u)*2.5) calc(var(--u)*5) rgba(0,0,0,.35);
    letter-spacing:.03em;}
  .modal-btn:active{
    transform:translateY(calc(var(--u)*.8));
    box-shadow:0 calc(var(--u)*.4) 0 var(--ui-orange-dk);}
  .modal.hidden{display:none;}

  /* Stage intro */
  .stage-label{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    font-size:calc(var(--u)*13);font-weight:900;color:var(--text-hud);
    text-shadow:
      0 0 calc(var(--u)*6) var(--nova-9),
      0 0 calc(var(--u)*12) rgba(255,180,0,.5),
      0 4px 8px rgba(0,0,0,.6);
    z-index:40;pointer-events:none;opacity:0;}
  @keyframes stageIntro{
    0%  {opacity:0;transform:translate(-50%,-50%) scale(.4)}
    25% {opacity:1;transform:translate(-50%,-50%) scale(1.12)}
    55% {opacity:1;transform:translate(-50%,-50%) scale(.98)}
    80% {opacity:1;transform:translate(-50%,-50%) scale(1)}
    100%{opacity:0;transform:translate(-50%,-50%) scale(1.04)}}
  .stage-label.show{animation:stageIntro 1.3s cubic-bezier(.22,.61,.36,1) forwards;}

  /* All clear */
  .all-clear-title{font-size:calc(var(--u)*9);color:var(--nova-9) !important;
    text-shadow:0 0 calc(var(--u)*6) rgba(255,210,0,.6) !important;}
  /* Hint text below stage */
  .hud-hint{
    position:absolute;bottom:calc(var(--uh)*3);left:50%;transform:translateX(-50%);
    font-size:calc(var(--u)*3.8);color:var(--text-hud);
    background:rgba(0,0,0,.3);border-radius:calc(var(--u)*2);
    padding:calc(var(--uh)*.5) calc(var(--u)*3);
    backdrop-filter:blur(3px);white-space:nowrap;
    text-shadow:0 1px 2px rgba(0,0,0,.5);z-index:10;}
</style>
</head>
<body>
<div id="phone">
  <div class="bg-garden"></div>

  <div class="hud">
    <div class="hud-stage" id="hudStage">Stage 1</div>
    <div class="hud-moves">手数&thinsp;<span id="hudMoves">0</span></div>
  </div>
  <div class="hud-hint" id="hudHint"></div>

  <div class="board-wrap" id="boardWrap">
    <div class="board" id="board"></div>
  </div>

  <div class="stage-label" id="stageLabel"></div>

  <div class="modal hidden" id="clearModal">
    <div class="modal-box">
      <div class="modal-title" id="modalTitle">CLEAR!</div>
      <div class="modal-sub" id="modalSub"></div>
      <button class="modal-btn" id="modalBtn">次へ</button>
    </div>
  </div>
</div>

<script>
// ========== GAME DATA ==========
const STAGES = [
  {
    // St1: 4×5 grid. 2 colors. 2 moves to clear.
    cols: 4, rows: 5,
    label: 'Stage 1',
    hint: '氷結ブロックを解凍しよう！',
    groups: [
      { id:'bN', color:'blue',  frozen:false, dir:'right', cells:[[1,0]] },
      { id:'bF', color:'blue',  frozen:true,  dir:'right', cells:[[1,2],[1,3]] },
      { id:'rN', color:'red',   frozen:false, dir:'left',  cells:[[3,3]] },
      { id:'rF', color:'red',   frozen:true,  dir:'left',  cells:[[3,0],[3,1]] },
    ]
  },
  {
    // St2: 6×6 grid. 4 colors. 4 moves. 1-level dependency.
    cols: 6, rows: 6,
    label: 'Stage 2',
    hint: '解凍する順序を考えよう！',
    groups: [
      { id:'bN', color:'blue',   frozen:false, dir:'right', cells:[[0,0]] },
      { id:'bF', color:'blue',   frozen:true,  dir:'right', cells:[[0,4],[0,5]] },
      { id:'rN', color:'red',    frozen:false, dir:'down',  cells:[[0,2]] },
      { id:'rF', color:'red',    frozen:true,  dir:'down',  cells:[[2,2]] },
      { id:'yN', color:'yellow', frozen:false, dir:'left',  cells:[[4,3]] },
      { id:'yF', color:'yellow', frozen:true,  dir:'left',  cells:[[4,0],[4,1]] },
      { id:'gN', color:'green',  frozen:false, dir:'left',  cells:[[5,3],[5,4]] },
      { id:'gF', color:'green',  frozen:true,  dir:'left',  cells:[[5,0],[5,1]] },
    ]
  }
];

const DIR_ARROW = { right:'→', left:'←', up:'↑', down:'↓' };
const DIR_VEC   = { right:[0,1], left:[0,-1], up:[-1,0], down:[1,0] };
const COLOR_MAP = { blue:'c-blue', red:'c-red', yellow:'c-yellow', green:'c-green' };
const COLOR_SHADOW = { blue:'#1a5ea0', red:'#991111', yellow:'#997700', green:'#117711' };

let stageIdx = 0;
let groups   = [];
let moveCount = 0;
let locked   = false;

// Stable cell size per stage — set once at initStage, never changed during play
let currentCellSize = 0;
let currentGap = 0;

// ========== INIT ==========
function initStage(idx) {
  stageIdx = idx;
  moveCount = 0;
  locked = false;
  const st = STAGES[idx];
  document.getElementById('hudStage').textContent = st.label;
  document.getElementById('hudMoves').textContent = '0';
  document.getElementById('hudHint').textContent = st.hint;
  document.getElementById('clearModal').classList.add('hidden');

  // Deep clone groups
  groups = st.groups.map(g => ({
    ...g,
    cells: g.cells.map(c => [...c])
  }));

  // Compute cell size ONCE at stage init — stable for all subsequent renders
  const phoneEl = document.getElementById('phone');
  const phoneW = phoneEl.getBoundingClientRect().width || 360;
  // St1 (4 cols): larger cells; St2 (6 cols): fits 6 cols comfortably
  // Use ~80% of phone width divided by cols, with padding for board-wrap (3.5u each side ~7u total)
  // board-wrap padding: 3.5u each side = 7% of phoneW
  // board padding: 1.8u each side = 3.6% of phoneW
  // gap: between cells (cols-1) * gap
  // Available for cells: phoneW * (1 - 0.07 - 0.036) minus gaps
  // For St1 (4 cols): cellSize ≈ phoneW * 0.19  → larger and clear
  // For St2 (6 cols): cellSize ≈ phoneW * 0.135 → but we scale up to 0.15
  if (st.cols === 4) {
    currentCellSize = phoneW * 0.20;
  } else {
    currentCellSize = phoneW * 0.145;
  }
  currentGap = currentCellSize * 0.13;

  renderBoard();
  showStageLabel(st.label);
}

// ========== RENDER ==========
function renderBoard() {
  const st = STAGES[stageIdx];
  const board = document.getElementById('board');
  board.innerHTML = '';
  board.style.gridTemplateColumns = `repeat(${st.cols},1fr)`;

  // Use stable cell size computed at initStage — prevents board size change mid-play
  const cellSize = currentCellSize;
  const gap = currentGap;
  board.style.gap = `${gap}px`;
  board.style.padding = `${gap}px`;

  // Build cell map: [row][col] → groupRef or null
  const cellMap = buildCellMap();

  for (let r = 0; r < st.rows; r++) {
    for (let c = 0; c < st.cols; c++) {
      const div = document.createElement('div');
      div.style.width  = `${cellSize}px`;
      div.style.height = `${cellSize}px`;
      const g = cellMap[r]?.[c];
      if (g) {
        div.className = `cell ${g.frozen ? 'frozen' : 'normal'} ${COLOR_MAP[g.color]}`;
        div.dataset.gid = g.id;
        // Arrow SVG
        const svg = makearrowSVG(g.dir, g.color, g.frozen);
        div.appendChild(svg);
        if (!g.frozen) {
          div.addEventListener('pointerdown', onCellClick);
        }
      } else {
        div.className = 'cell empty';
      }
      board.appendChild(div);
    }
  }
}

function buildCellMap() {
  const map = {};
  for (const g of groups) {
    for (const [r,c] of g.cells) {
      if (!map[r]) map[r] = {};
      map[r][c] = g;
    }
  }
  return map;
}

function makearrowSVG(dir, color, frozen) {
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 40 40');
  svg.classList.add('arrow-svg');

  const colorFill = {
    blue:'#ffffff', red:'#ffffff', yellow:'#ffffff', green:'#ffffff'
  };
  const shadowC = {
    blue:'rgba(0,50,120,.5)', red:'rgba(120,0,0,.5)',
    yellow:'rgba(100,70,0,.5)', green:'rgba(0,80,0,.5)'
  };

  // Arrow path based on direction
  const paths = {
    right: 'M8,20 L24,20 M20,13 L28,20 L20,27',
    left:  'M32,20 L16,20 M20,13 L12,20 L20,27',
    up:    'M20,32 L20,16 M13,20 L20,12 L27,20',
    down:  'M20,8 L20,24 M13,20 L20,28 L27,20',
  };

  const p = document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d', paths[dir]);
  p.setAttribute('stroke', frozen ? 'rgba(180,230,255,.9)' : colorFill[color]);
  p.setAttribute('stroke-width','4.5');
  p.setAttribute('stroke-linecap','round');
  p.setAttribute('stroke-linejoin','round');
  p.setAttribute('fill','none');
  if (!frozen) {
    p.setAttribute('filter','drop-shadow(0 2px 2px '+shadowC[color]+')');
  }
  svg.appendChild(p);
  return svg;
}

// ========== CLICK HANDLER ==========
function onCellClick(e) {
  if (locked) return;
  e.preventDefault();
  const gid = e.currentTarget.dataset.gid;
  const g = groups.find(x => x.id === gid);
  if (!g || g.frozen) return;
  slideGroup(g);
}

function slideGroup(g) {
  const st = STAGES[stageIdx];
  const [dr, dc] = DIR_VEC[g.dir];
  const cellMap = buildCellMap();

  // Find how far we can slide
  let steps = 0;
  while (true) {
    const nextCells = g.cells.map(([r,c]) => [r+dr*(steps+1), c+dc*(steps+1)]);
    // Check bounds
    const oob = nextCells.some(([r,c]) => r<0||r>=st.rows||c<0||c>=st.cols);
    if (oob) break;
    // Check collision
    const collide = nextCells.some(([r,c]) => {
      const occupant = cellMap[r]?.[c];
      return occupant && occupant.id !== g.id;
    });
    if (collide) break;
    steps++;
  }

  if (steps === 0) return; // can't move at all - no move counted

  // Apply movement
  g.cells = g.cells.map(([r,c]) => [r+dr*steps, c+dc*steps]);
  moveCount++;
  document.getElementById('hudMoves').textContent = moveCount;

  // Check for thaw (adjacent same-color frozen group)
  const thawCount = checkThaw(g);
  renderBoard();

  // Add slide flash to moved group cells
  requestAnimationFrame(() => {
    flashGroup(g.id);
    if (thawCount > 0) {
      thawAnimate(g.id);
      if (thawCount > 1) {
        chainEffect();
      }
    }
    // Check win
    setTimeout(checkWin, thawCount > 1 ? 700 : 400);
  });
}

function checkThaw(movedGroup) {
  let thawCount = 0;
  // Iteratively scan: after each thaw, movedGroup gains new cells that may trigger more
  let changed = true;
  while (changed) {
    changed = false;
    const cellMap = buildCellMap();
    outer:
    for (const [mr, mc] of movedGroup.cells) {
      for (const [ar, ac] of [[-1,0],[1,0],[0,-1],[0,1]]) {
        const nr = mr+ar, nc = mc+ac;
        const neighbor = cellMap[nr]?.[nc];
        if (neighbor && neighbor.frozen && neighbor.color === movedGroup.color
            && neighbor.id !== movedGroup.id) {
          // Thaw!
          neighbor.frozen = false;
          movedGroup.cells = movedGroup.cells.concat(neighbor.cells);
          groups = groups.filter(x => x.id !== neighbor.id);
          thawCount++;
          changed = true;
          break outer; // restart scan with updated cells
        }
      }
    }
  }
  return thawCount;
}

function flashGroup(gid) {
  document.querySelectorAll(`[data-gid="${gid}"]`).forEach(el => {
    el.classList.add('slide-flash');
    el.addEventListener('animationend', () => el.classList.remove('slide-flash'), {once:true});
  });
}

function thawAnimate(gid) {
  document.querySelectorAll(`[data-gid="${gid}"]`).forEach(el => {
    el.classList.add('thaw-anim');
    el.addEventListener('animationend', () => el.classList.remove('thaw-anim'), {once:true});
  });
  spawnParticles();
}

function chainEffect() {
  const bw = document.getElementById('boardWrap');
  bw.classList.add('shake');
  bw.addEventListener('animationend', () => bw.classList.remove('shake'), {once:true});
  spawnParticles(true);
}

function spawnParticles(big = false) {
  const phone = document.getElementById('phone');
  const n = big ? 28 : 12;
  const colors = ['#FFD700','#FF4444','#4A9EFF','#44CC44','#ffffff','#FF88CC','#88CCFF','#FFAA00'];
  const shapes = ['50%','3px','2px 8px','8px 2px']; // circle, square, h-line, v-line
  for (let i = 0; i < n; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const sz = big ? (5 + Math.random()*12) : (3 + Math.random()*7);
    const color = colors[Math.floor(Math.random()*colors.length)];
    const shape = shapes[Math.floor(Math.random()*shapes.length)];
    const angle = (Math.random()*360).toFixed(0)+'deg';
    const dist  = big ? (60+Math.random()*100) : (30+Math.random()*70);
    const theta = Math.random()*Math.PI*2;
    p.style.cssText = `
      width:${sz}px;height:${sz}px;
      background:${color};
      border-radius:${shape};
      box-shadow:0 0 ${sz*1.2}px ${color};
      left:${30+Math.random()*40}%;
      top:${30+Math.random()*40}%;
      --px:${(Math.cos(theta)*dist).toFixed(1)}px;
      --py:${(Math.sin(theta)*dist).toFixed(1)}px;
      --pr:${angle};
      animation:particleFly ${0.45+Math.random()*0.55}s ease-out ${i*0.02}s forwards;
    `;
    phone.appendChild(p);
    p.addEventListener('animationend', () => p.remove(), {once:true});
  }
}

// ========== WIN CHECK ==========
function checkWin() {
  // Each color must have exactly 1 group
  const colorGroups = {};
  for (const g of groups) {
    if (!colorGroups[g.color]) colorGroups[g.color] = 0;
    colorGroups[g.color]++;
  }
  const allSingle = Object.values(colorGroups).every(v => v === 1);
  // Also no frozen groups remain
  const noFrozen = groups.every(g => !g.frozen);
  if (allSingle && noFrozen) {
    stageClear();
  }
}

function stageClear() {
  locked = true;
  spawnParticles(true);
  setTimeout(() => {
    const isLast = stageIdx >= STAGES.length - 1;
    const modal = document.getElementById('clearModal');
    const title = document.getElementById('modalTitle');
    const sub   = document.getElementById('modalSub');
    const btn   = document.getElementById('modalBtn');
    title.textContent = isLast ? '🎉 ALL CLEAR!' : 'CLEAR!';
    title.className = 'modal-title' + (isLast ? ' all-clear-title' : '');
    sub.innerHTML = `手数: <strong>${moveCount}</strong> 手`;
    btn.textContent = isLast ? 'もう一度' : '次のステージ';
    modal.classList.remove('hidden');
    btn.onclick = () => {
      if (isLast) initStage(0);
      else initStage(stageIdx + 1);
    };
  }, 600);
}

function showStageLabel(text) {
  const el = document.getElementById('stageLabel');
  el.textContent = text;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

// ========== START ==========
initStage(0);
</script>
