<!DOCTYPE html>
<!--
  Phone frame template for hybrid-casual-mentor generated games.
  Aspect ratio: 9:19.5 (iPhone X 系縦長, NEONNOVA2048 基準)。
  PC で開いても常にこの比率を保ち、letterbox（左右黒帯）で中央表示。
  すべてのゲーム要素は #phone の子として配置すること。
-->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>破裂で飛ばす</title>
<style>
  :root {
    --phone-aspect: 9 / 19.5; /* スマホ縦長基準 (iPhone X 以降) */
    /* ===== color tokens (color-tokens.css 系を主題に合わせ調整) ===== */
    --bg-deep:#03040f; --bg-mid:#0a1338; --bg-panel:#06081a;
    --line:#1a2848;
    --cyan:#6ff; --cyan-soft:#8df; --cyan-grad-1:#3df; --cyan-grad-2:#0a4f8a;
    --text-main:#eaf3ff; --text-sub:#cdddef; --text-dim:#7a92b5;
    /* balloon (enemy系を主題化: 割る対象) */
    --balloon:#ff5d8a; --balloon-2:#b585ff; --balloon-core:#ffd1de;
    /* egg = 操作で運ぶ光の卵 (player系) */
    --egg:#ffe9a8; --egg-core:#fffdf2; --egg-glow:#ffd76b;
    /* goal nest */
    --goal:#6ff; --goal-soft:#8df;
    --warn:#ffb86c;
    /* wall */
    --wall:#4af; --wall-glow:rgba(68,170,255,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html, body {
    width:100%; height:100%;
    overflow:hidden;
    background:#000;
    color:var(--text-main);
    font-family:'Helvetica Neue', system-ui, sans-serif;
    user-select:none;
    -webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
  }
  body {
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #phone {
    position:relative;
    overflow:hidden;
    width:  min(100vw, calc(100vh * 9 / 19.5));
    height: min(100vh, calc(100vw * 19.5 / 9));
    --pw:   min(100vw, calc(100vh * 9 / 19.5));
    --ph:   min(100vh, calc(100vw * 19.5 / 9));
    --u:    calc(var(--pw) / 100);
    --uh:   calc(var(--ph) / 100);
    background:
      radial-gradient(120% 80% at 50% 18%, #16235c 0%, var(--bg-mid) 38%, var(--bg-deep) 78%);
  }
  /* 環境演出：漂う光点レイヤー */
  #sky{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
  #sky i{position:absolute;border-radius:50%;background:var(--cyan-soft);
    opacity:.5;filter:blur(.4px);animation:drift linear infinite;}
  @keyframes drift{from{transform:translateY(6%);}to{transform:translateY(-8%);}}

  .obj{position:absolute;transform:translate(-50%,-50%);}

  /* goal */
  #goal{
    width:calc(var(--u)*20);height:calc(var(--u)*20);border-radius:50%;
    z-index:2;
    background:radial-gradient(circle, rgba(110,255,255,.20) 0%, rgba(110,255,255,.05) 55%, transparent 72%);
    box-shadow:inset 0 0 calc(var(--u)*4) rgba(140,221,255,.5);
  }
  #goal::before{content:"";position:absolute;inset:0;border-radius:50%;
    border:2px dashed var(--goal-soft);opacity:.85;animation:spin 9s linear infinite;}
  #goal::after{content:"";position:absolute;inset:18%;border-radius:50%;
    border:2px solid var(--goal);opacity:.5;animation:pulse 2.2s ease-in-out infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes pulse{0%,100%{transform:scale(.9);opacity:.35;}50%{transform:scale(1.08);opacity:.7;}}
  #goal .gdot{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:calc(var(--u)*5);height:calc(var(--u)*5);border-radius:50%;
    background:radial-gradient(circle,var(--goal-soft),var(--cyan-grad-2));
    box-shadow:0 0 calc(var(--u)*4) var(--goal);animation:pulse 2.2s ease-in-out infinite;}

  /* egg */
  #egg{
    width:calc(var(--u)*9);height:calc(var(--u)*9);border-radius:50%;
    z-index:5;
    background:radial-gradient(circle at 38% 32%, var(--egg-core) 0%, var(--egg) 52%, var(--egg-glow) 100%);
    box-shadow:0 0 calc(var(--u)*5) var(--egg-glow), inset 0 -2px calc(var(--u)*2) rgba(180,120,40,.4);
  }
  #egg::after{content:"";position:absolute;left:30%;top:24%;width:26%;height:20%;
    border-radius:50%;background:rgba(255,255,255,.8);filter:blur(1px);}

  /* balloon */
  .balloon{cursor:pointer;z-index:6;animation:bob 3.4s ease-in-out infinite;}
  .balloon:nth-child(odd){animation-duration:4.1s;}
  @keyframes bob{0%,100%{transform:translate(-50%,-52%);}50%{transform:translate(-50%,-48%);}}
  .balloon .body{
    position:relative;
    width:calc(var(--u)*11);height:calc(var(--u)*13);border-radius:50% 50% 50% 50%/55% 55% 45% 45%;
    background:radial-gradient(circle at 36% 30%, var(--balloon-core) 0%, var(--balloon) 55%, var(--balloon-2) 110%);
    box-shadow:0 0 calc(var(--u)*4) rgba(255,93,138,.5), inset -3px -4px calc(var(--u)*3) rgba(120,30,80,.45);
  }
  .balloon .body::before{content:"";position:absolute;left:32%;top:20%;width:22%;height:30%;
    border-radius:50%;background:rgba(255,255,255,.55);filter:blur(1px);}
  .balloon .body::after{content:"";position:absolute;left:50%;bottom:-6%;width:18%;height:8%;
    transform:translateX(-50%);background:var(--balloon-2);
    clip-path:polygon(0 0,100% 0,50% 100%);}
  .balloon .str{position:absolute;left:50%;top:99%;width:2px;height:calc(var(--u)*8);
    background:linear-gradient(var(--balloon-2),transparent);transform:translateX(-50%);}
  .balloon.gone{pointer-events:none;}

  /* ===== burst ring ===== */
  .burst{position:absolute;transform:translate(-50%,-50%);border-radius:50%;
    border:3px solid var(--balloon-core);width:0;height:0;opacity:.95;pointer-events:none;z-index:7;
    box-shadow:0 0 calc(var(--u)*4) var(--balloon);
    animation:burst .5s ease-out forwards;}
  @keyframes burst{to{width:calc(var(--u)*44);height:calc(var(--u)*44);opacity:0;border-width:1px;}}

  /* ===== 風エフェクト（白い粒子が広がる） ===== */
  .wind-particle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,.85);
    pointer-events:none;
    z-index:7;
    animation:wind-fly var(--dur,.4s) ease-out forwards;
  }
  @keyframes wind-fly{
    0%{opacity:.9;transform:translate(var(--sx,0),var(--sy,0)) scale(1);}
    100%{opacity:0;transform:translate(var(--ex,0),var(--ey,0)) scale(.2);}
  }

  /* ===== 破裂エフェクト（風船の形が広がってフェードアウト） ===== */
  .burst-shape{
    position:absolute;
    border-radius:50% 50% 50% 50%/55% 55% 45% 45%;
    background:radial-gradient(circle at 36% 30%, var(--balloon-core) 0%, var(--balloon) 50%, transparent 80%);
    pointer-events:none;
    z-index:7;
    animation:burst-expand .55s ease-out forwards;
  }
  @keyframes burst-expand{
    0%{opacity:.9;transform:translate(-50%,-50%) scale(1);}
    100%{opacity:0;transform:translate(-50%,-50%) scale(3.5);}
  }

  /* burst 飛沫 */
  .spark{position:absolute;transform:translate(-50%,-50%);width:calc(var(--u)*2.4);height:calc(var(--u)*2.4);
    border-radius:50%;background:var(--balloon-core);box-shadow:0 0 calc(var(--u)*2) var(--balloon);
    pointer-events:none;z-index:7;animation:spark .55s ease-out forwards;}
  @keyframes spark{to{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(.3);}}

  /* egg trail */
  .trail{position:absolute;transform:translate(-50%,-50%);width:calc(var(--u)*5);height:calc(var(--u)*5);
    border-radius:50%;background:radial-gradient(circle,var(--egg-glow),transparent 70%);
    pointer-events:none;z-index:4;animation:fade .5s ease-out forwards;}
  @keyframes fade{from{opacity:.55;}to{opacity:0;transform:translate(-50%,-50%) scale(.4);}}

  /* ===== 壁（反射バリア） ===== */
  .wall{
    position:absolute;
    z-index:3;
    pointer-events:none;
    background:linear-gradient(90deg, transparent, var(--wall-glow) 30%, var(--wall-glow) 70%, transparent);
    border-top:2px solid var(--wall);
    border-bottom:2px solid var(--wall);
    box-shadow:0 0 calc(var(--u)*3) var(--wall);
    animation:wall-pulse 2s ease-in-out infinite;
    border-radius:3px;
  }
  .wall.vertical{
    background:linear-gradient(180deg, transparent, var(--wall-glow) 30%, var(--wall-glow) 70%, transparent);
    border-top:none;border-bottom:none;
    border-left:2px solid var(--wall);
    border-right:2px solid var(--wall);
  }
  /* 壁に当たった時のフラッシュ */
  .wall.flash{
    background:rgba(68,170,255,.7);
    box-shadow:0 0 calc(var(--u)*6) var(--wall);
    transition:none;
  }
  @keyframes wall-pulse{0%,100%{opacity:.7;}50%{opacity:1;}}

  /* HUD */
  #hud{position:absolute;left:0;top:0;width:100%;padding:calc(var(--uh)*2.4) calc(var(--u)*4) 0;
    display:flex;flex-direction:column;gap:calc(var(--uh)*.6);z-index:20;color:var(--text-main);}
  #hud .row{display:flex;justify-content:space-between;align-items:center;}
  #hud .stage{font-weight:800;letter-spacing:.12em;font-size:calc(var(--u)*4.4);
    background:linear-gradient(var(--cyan-soft),var(--cyan-grad-2));-webkit-background-clip:text;background-clip:text;color:transparent;}
  #hud .badge{font-size:calc(var(--u)*2.9);letter-spacing:.08em;padding:calc(var(--uh)*.5) calc(var(--u)*2.6);
    border:1px solid var(--line);border-radius:999px;color:var(--text-sub);background:rgba(10,19,56,.5);}
  #hud .hint{opacity:.85;font-size:calc(var(--u)*3.3);color:var(--text-sub);}

  /* ===== リセットボタン（ゲーム中常時表示） ===== */
  #resetBtn{
    position:absolute;
    top:calc(var(--uh)*2.2);
    right:calc(var(--u)*4);
    z-index:25;
    font:inherit;font-weight:700;font-size:calc(var(--u)*3);
    padding:calc(var(--uh)*.5) calc(var(--u)*3);
    border:1px solid rgba(255,255,255,.3);
    border-radius:999px;
    background:rgba(10,19,56,.6);
    color:var(--text-sub);
    cursor:pointer;
    backdrop-filter:blur(2px);
    transition:background .15s;
  }
  #resetBtn:active{background:rgba(110,255,255,.1);transform:scale(.95);}

  /* overlay */
  #ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:30;background:radial-gradient(circle at 50% 40%, rgba(10,19,56,.78), rgba(3,4,15,.92));text-align:center;
    backdrop-filter:blur(2px);}
  #ov.hidden{display:none;}
  #ov h1{font-size:calc(var(--u)*11);letter-spacing:.06em;margin-bottom:calc(var(--uh)*1.5);
    background:linear-gradient(var(--cyan-soft),var(--cyan-grad-1));-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 calc(var(--u)*6) rgba(110,255,255,.25);}
  #ov.fail h1{background:linear-gradient(var(--warn),var(--balloon));-webkit-background-clip:text;background-clip:text;}
  #ov p{font-size:calc(var(--u)*4.2);color:var(--text-sub);margin-bottom:calc(var(--uh)*2);max-width:80%;line-height:1.5;}
  #ov .ov-btns{display:flex;gap:calc(var(--u)*4);}
  #ov button{font:inherit;font-weight:700;font-size:calc(var(--u)*4.5);padding:calc(var(--uh)*1.6) calc(var(--u)*9);
    border:2px solid var(--cyan-soft);border-radius:999px;background:rgba(110,255,255,.08);color:var(--text-main);cursor:pointer;
    box-shadow:0 0 calc(var(--u)*4) rgba(110,255,255,.25);}
  #ov button:active{transform:scale(.96);}
  #ov button.retry{border-color:var(--warn);box-shadow:0 0 calc(var(--u)*4) rgba(255,184,108,.2);}
</style>
</head>
<body>
  <div id="phone">
    <div id="sky"></div>
    <div id="hud">
      <div class="row">
        <span class="stage" id="stageLabel">STAGE 1</span>
        <span class="badge" id="goalBadge">操作を覚える</span>
      </div>
      <span class="hint" id="hint">風船を割って卵を巣へ</span>
    </div>
    <div id="goal" class="obj"><span class="gdot"></span></div>
    <div id="egg" class="obj"></div>
    <!-- balloons/walls injected by JS -->
    <button id="resetBtn">↺ やり直し</button>
    <div id="ov" class="hidden">
      <h1 id="ovTitle">CLEAR</h1>
      <p id="ovText"></p>
      <div class="ov-btns">
        <button id="retryBtn" class="retry">↺ RETRY</button>
        <button id="ovBtn">NEXT</button>
      </div>
    </div>
  </div>
  <script>
  (function(){
    // ===== verified physics (sim-tuned) =====
    const IMPULSE=1.0, DRAG=0.97, GOAL_R=9, REST_V=0.03;
    // coords in u (0..100 of #phone width). y also in same u-of-width unit.

    // ===== stage data =====
    // walls: {x, y, w, h} — 中心座標(x,y)、幅w、高さh（u単位）。horizontal(h>w) / vertical(w<h)
    // 卵が壁に当たると垂直反射（horizontal壁=vy反転、vertical壁=vx反転）
    const STAGES=[
      { // St0 チュートリアル: 基本操作学習。卵の真下の風船を割る → 上へ打ち上がり巣へ。1操作。
        egg:[50,72], goal:[50,41],
        balloons:[ [50,86] ],
        walls:[],
        hint:"風船を割って卵を巣へ！", par:1,
        badge:'操作を覚える'
      },
      { // St1: 壁あり。1操作。卵の真下の風船を割る → 上向き風圧 → 水平壁で反射 → 下の巣へ。
        egg:[50,60], goal:[50,72],
        balloons:[ [50,78] ],
        walls:[{x:50,y:45,w:55,h:3,type:'h'}],
        hint:"壁に当てて跳ね返そう！", par:1,
        badge:'壁の使い方'
      },
      { // St2: 壁なし。4操作。階段状に上→右→上→右で右上の巣へ。順番ミス/誤クリックで落下。
        egg:[20,75], goal:[82,13],
        balloons:[ [20,83],[12,44],[51,52],[43,12],[60,75] ],
        walls:[],
        hint:"順番に割って巣まで運ぼう", par:4,
        badge:'順番を考える'
      }
    ];

    const phone=document.getElementById('phone');
    const eggEl=document.getElementById('egg');
    const goalEl=document.getElementById('goal');
    const stageLabel=document.getElementById('stageLabel');
    const hintEl=document.getElementById('hint');
    const ov=document.getElementById('ov');
    const ovTitle=document.getElementById('ovTitle');
    const ovText=document.getElementById('ovText');
    const ovBtn=document.getElementById('ovBtn');
    const retryBtn=document.getElementById('retryBtn');
    const resetBtn=document.getElementById('resetBtn');
    const goalBadge=document.getElementById('goalBadge');
    const sky=document.getElementById('sky');

    let si=0;
    let egg, balloons, walls;
    let raf=null, ended=false;
    let lastTrail=0;

    // 環境演出：漂う光点
    (function buildSky(){
      let html='';
      for(let k=0;k<26;k++){
        const x=(Math.random()*100).toFixed(1), y=(Math.random()*100).toFixed(1);
        const s=(0.6+Math.random()*1.8).toFixed(2);
        const dur=(6+Math.random()*8).toFixed(1), delay=(-Math.random()*8).toFixed(1);
        html+=`<i style="left:${x}%;top:${y}%;width:${s}vmin;height:${s}vmin;animation-duration:${dur}s;animation-delay:${delay}s"></i>`;
      }
      sky.innerHTML=html;
    })();

    // 座標変換: 100x100 u座標 → #phone px座標
    function toPx(xu,yu){
      return { px:xu/100*phone.clientWidth, py:yu/100*phone.clientHeight };
    }
    function setPos(el,xu,yu){
      const {px,py}=toPx(xu,yu);
      el.style.left=px+'px'; el.style.top=py+'px';
    }
    // #phone px → u座標変換（当たり判定に使用）
    function pxToU(px,py){
      return { xu:px/phone.clientWidth*100, yu:py/phone.clientHeight*100 };
    }

    function buildStage(){
      ended=false;
      const S=STAGES[si];
      egg={x:S.egg[0], y:S.egg[1], vx:0, vy:0};

      // ステージラベルはSt0を「チュートリアル」と表示
      stageLabel.textContent= si===0 ? 'TUTORIAL' : 'STAGE '+si;
      goalBadge.textContent=S.badge||'';
      hintEl.textContent=S.hint;

      // ゴールを中心座標で配置（判定もこの座標を使用）
      setPos(goalEl, S.goal[0], S.goal[1]);
      goalEl._gx=S.goal[0]; goalEl._gy=S.goal[1];

      // 古い要素を削除
      [...phone.querySelectorAll('.balloon,.wall-el')].forEach(e=>e.remove());

      // 風船生成
      balloons=S.balloons.map((b,i)=>{
        const el=document.createElement('div');
        el.className='balloon obj';
        el.innerHTML='<div class="body"></div><div class="str"></div>';
        setPos(el,b[0],b[1]);
        el.addEventListener('pointerdown',ev=>{ev.preventDefault();popBalloon(i);});
        phone.appendChild(el);
        return {x:b[0],y:b[1],el,gone:false};
      });

      // 壁生成
      walls=(S.walls||[]).map(w=>{
        const el=document.createElement('div');
        el.className='wall wall-el' + (w.type==='v'?' vertical':'');
        const {px:cx,py:cy}=toPx(w.x,w.y);
        const pw=phone.clientWidth, ph=phone.clientHeight;
        const elW=w.w/100*pw, elH=w.h/100*ph;
        el.style.left=(cx-elW/2)+'px';
        el.style.top=(cy-elH/2)+'px';
        el.style.width=elW+'px';
        el.style.height=elH+'px';
        phone.appendChild(el);
        return {x:w.x,y:w.y,w:w.w,h:w.h,type:w.type,el};
      });

      setPos(eggEl, egg.x, egg.y);
    }

    function spawnBurstEffects(bx,by){
      const {px,py}=toPx(bx,by);

      // 1. burst ring（既存）
      const ring=document.createElement('div');
      ring.className='burst';
      ring.style.left=px+'px'; ring.style.top=py+'px';
      phone.appendChild(ring);
      setTimeout(()=>ring.remove(),520);

      // 2. 破裂エフェクト：風船の形が広がってフェードアウト
      const shape=document.createElement('div');
      shape.className='burst-shape';
      shape.style.left=px+'px'; shape.style.top=py+'px';
      const sz=toPx(11,0).px; // 風船 body と同サイズ
      shape.style.width=sz+'px'; shape.style.height=(sz*13/11)+'px';
      phone.appendChild(shape);
      setTimeout(()=>shape.remove(),580);

      // 3. 風エフェクト：白い粒子が四方八方へ広がる
      const WIND_COUNT=14;
      for(let k=0;k<WIND_COUNT;k++){
        const p=document.createElement('div');
        p.className='wind-particle';
        const ang=(k/WIND_COUNT)*Math.PI*2;
        const dist=25+Math.random()*30; // u単位ではなくpx
        const startDist=4+Math.random()*6;
        const sxPx=Math.cos(ang)*startDist, syPx=Math.sin(ang)*startDist;
        const exPx=Math.cos(ang)*dist, eyPx=Math.sin(ang)*dist;
        const size=2+Math.random()*3;
        const dur=(.3+Math.random()*.25).toFixed(2)+'s';
        p.style.cssText=`
          left:${px}px; top:${py}px;
          width:${size}px; height:${size}px;
          --sx:${sxPx}px; --sy:${syPx}px;
          --ex:${exPx}px; --ey:${eyPx}px;
          --dur:${dur};
        `;
        phone.appendChild(p);
        setTimeout(()=>p.remove(),550);
      }

      // 4. 飛沫パーティクル（既存）
      for(let k=0;k<7;k++){
        const sp=document.createElement('div'); sp.className='spark';
        const ang=Math.random()*Math.PI*2, r=18+Math.random()*22;
        sp.style.left=px+'px'; sp.style.top=py+'px';
        sp.style.setProperty('--dx',Math.cos(ang)*r+'px');
        sp.style.setProperty('--dy',Math.sin(ang)*r+'px');
        phone.appendChild(sp); setTimeout(()=>sp.remove(),560);
      }
    }

    function popBalloon(i){
      if(ended) return;
      const b=balloons[i];
      if(b.gone) return;
      b.gone=true; b.el.classList.add('gone'); b.el.style.opacity='0';

      spawnBurstEffects(b.x,b.y);

      // impulse: 卵を風船から遠ざける方向へ（卵中心 - 風船中心ベクトル）
      let dx=egg.x-b.x, dy=egg.y-b.y;
      const d=Math.hypot(dx,dy)||1;
      egg.vx+=IMPULSE*dx/d; egg.vy+=IMPULSE*dy/d;
      if(!raf) loop();
    }

    // 壁との衝突判定（AABB：卵半径4.5u として扱う）
    const EGG_R=4.5;
    function checkWallCollision(){
      for(const w of walls){
        const wLeft=w.x-w.w/2, wRight=w.x+w.w/2;
        const wTop=w.y-w.h/2, wBot=w.y+w.h/2;
        // 卵が壁AABBと重なっているか
        if(egg.x+EGG_R > wLeft && egg.x-EGG_R < wRight &&
           egg.y+EGG_R > wTop  && egg.y-EGG_R < wBot){
          // 水平壁(h型) → vy反転
          if(w.type==='h'){
            egg.vy=-egg.vy;
            // 壁の外に押し出し（めり込み防止）
            if(egg.vy<0) egg.y=wTop-EGG_R;
            else egg.y=wBot+EGG_R;
          } else {
            // 垂直壁(v型) → vx反転
            egg.vx=-egg.vx;
            if(egg.vx<0) egg.x=wLeft-EGG_R;
            else egg.x=wRight+EGG_R;
          }
          // 壁フラッシュ演出
          w.el.classList.add('flash');
          setTimeout(()=>w.el.classList.remove('flash'),150);
        }
      }
    }

    function loop(){
      raf=requestAnimationFrame(loop);
      egg.vx*=DRAG; egg.vy*=DRAG;
      if(Math.hypot(egg.vx,egg.vy)<REST_V){egg.vx=0;egg.vy=0;}
      egg.x+=egg.vx; egg.y+=egg.vy;

      // 壁反射チェック
      checkWallCollision();

      setPos(eggEl, egg.x, egg.y);

      // 残光トレイル
      const now=performance.now();
      if(Math.hypot(egg.vx,egg.vy)>0.15 && now-lastTrail>32){
        lastTrail=now;
        const t=document.createElement('div'); t.className='trail';
        const {px,py}=toPx(egg.x,egg.y);
        t.style.left=px+'px'; t.style.top=py+'px';
        phone.appendChild(t); setTimeout(()=>t.remove(),520);
      }

      // 勝利判定：卵中心とゴール中心の距離で判定（getBoundingClientRect不使用・純u座標）
      const dist=Math.hypot(egg.x-goalEl._gx, egg.y-goalEl._gy);
      if(dist<GOAL_R){ finish(true); return; }

      // 場外判定
      if(egg.y>112 || egg.x<-8 || egg.x>108){ finish(false); return; }

      // 停止→rAF停止
      if(egg.vx===0 && egg.vy===0){ cancelAnimationFrame(raf); raf=null; }
    }

    function finish(win){
      ended=true;
      if(raf){cancelAnimationFrame(raf);raf=null;}
      ov.classList.remove('hidden');
      if(win){
        const last=si>=STAGES.length-1;
        ov.classList.remove('fail');
        ovTitle.textContent='CLEAR!';
        ovText.textContent= last ? 'すべての巣に卵を届けた！' : '次のステージへ';
        ovBtn.textContent= last ? 'もう一度' : 'NEXT';
        ovBtn.style.display='';
        retryBtn.textContent='↺ RETRY';
        ovBtn.onclick=()=>{ ov.classList.add('hidden'); si=last?0:si+1; buildStage(); };
        retryBtn.onclick=()=>{ ov.classList.add('hidden'); buildStage(); };
      }else{
        ov.classList.add('fail');
        ovTitle.textContent='OOPS';
        ovText.textContent='卵が落ちた…もう一度！';
        ovBtn.textContent='NEXT';
        ovBtn.style.display='none'; // 失敗時はRETRYのみ
        retryBtn.textContent='↺ RETRY';
        retryBtn.onclick=()=>{ ov.classList.add('hidden'); buildStage(); };
      }
    }

    // リセットボタン（ゲーム中常時）
    resetBtn.addEventListener('pointerdown',ev=>{
      ev.preventDefault();
      if(raf){cancelAnimationFrame(raf);raf=null;}
      ov.classList.add('hidden');
      buildStage();
    });

    window.addEventListener('resize',()=>{
      if(!ended){
        setPos(eggEl,egg.x,egg.y);
        setPos(goalEl,goalEl._gx,goalEl._gy);
        balloons.forEach(b=>!b.gone&&setPos(b.el,b.x,b.y));
        // 壁もリサイズ
        const S=STAGES[si];
        (S.walls||[]).forEach((w,i)=>{
          if(!walls[i]) return;
          const el=walls[i].el;
          const pw=phone.clientWidth, ph=phone.clientHeight;
          const {px:cx,py:cy}=toPx(w.x,w.y);
          const elW=w.w/100*pw, elH=w.h/100*ph;
          el.style.left=(cx-elW/2)+'px'; el.style.top=(cy-elH/2)+'px';
          el.style.width=elW+'px'; el.style.height=elH+'px';
        });
      }
    });

    buildStage();
  })();
  </script>
</body>
</html>
