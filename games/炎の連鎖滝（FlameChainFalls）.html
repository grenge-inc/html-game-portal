<!DOCTYPE html>
<!--
  Phone frame template for hybrid-casual-mentor generated games.
  Aspect ratio: 9:19.5 (iPhone X 系縦長, NEONNOVA2048 基準)。
  PC で開いても常にこの比率を保ち、letterbox（左右黒帯）で中央表示。
  すべてのゲーム要素は #phone の子として配置すること。
-->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>炎の連鎖滝</title>
<style>
  :root {
    --phone-aspect: 9 / 19.5; /* スマホ縦長基準 (iPhone X 以降) */
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html, body {
    width:100%; height:100%;
    overflow:hidden;
    background:#000;            /* letterbox 部分の色 */
    color:#fff;
    font-family:'Helvetica Neue', system-ui, sans-serif;
    user-select:none;
    -webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
  }
  body {
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #phone {
    position:relative;
    overflow:hidden;
    /* 画面に収まる最大の 9:19.5 矩形 */
    width:  min(100vw, calc(100vh * 9 / 19.5));
    height: min(100vh, calc(100vw * 19.5 / 9));
    --pw:   min(100vw, calc(100vh * 9 / 19.5));
    --ph:   min(100vh, calc(100vw * 19.5 / 9));
    --u:    calc(var(--pw) / 100); /* 1u  = phone 幅 1% */
    --uh:   calc(var(--ph) / 100); /* 1uh = phone 高 1% */
    background:
      radial-gradient(130% 70% at 50% -8%, var(--bg-glow) 0%, var(--bg-mid) 42%, var(--bg-panel) 70%, var(--bg-deep) 100%);
  }
  /* 環境演出：立ち昇る火の粉と滝のうねり */
  #phone::before{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(2px 5px at 20% 88%, var(--ember) 0%, transparent 60%),
      radial-gradient(2px 6px at 70% 92%, var(--ember-2) 0%, transparent 60%),
      radial-gradient(1.5px 4px at 45% 80%, var(--ember) 0%, transparent 60%),
      radial-gradient(2px 5px at 86% 85%, var(--ember-2) 0%, transparent 60%),
      radial-gradient(1.5px 4px at 12% 70%, var(--ember-2) 0%, transparent 60%),
      radial-gradient(2px 6px at 60% 75%, var(--ember) 0%, transparent 60%);
    background-repeat:no-repeat;
    animation:embers 6s linear infinite;opacity:.7;}
  @keyframes embers{from{transform:translateY(8%);opacity:0}
    15%{opacity:.7}85%{opacity:.55}to{transform:translateY(-26%);opacity:0}}
  #phone::after{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(160% 50% at 50% 100%, var(--bg-floor) 0%, transparent 55%);}
  :root{
    /* 背景階層（深紅マグマ） */
    --bg-deep:#07000c; --bg-mid:#160213; --bg-panel:#1c0410;
    --bg-glow:#3a0e04; --bg-floor:rgba(255,90,30,.18);
    --line:#5a1d1d;
    /* テキスト */
    --warn:#ffb86c; --text-main:#fff4e6; --text-sub:#ffd9b0; --text-dim:#caa07a;
    /* 火種強度トークン（nova 系：弱→強） */
    --c2:#ffe39a; --c4:#ffc66b; --c8:#ff9b3d; --c16:#ff6a2a;
    --c32:#ff3d5a; --c64:#ff2bd0; --cbig:#fff;
    /* エフェクト */
    --flame-1:#ffe96b; --flame-2:#ff7a1f; --flame-3:#ff1f6a;
    --ember:rgba(255,180,70,.9); --ember-2:rgba(255,90,40,.8);
    --glass:rgba(20,2,10,.55); --glass-strong:rgba(28,4,14,.78);
    --hot-glow:#ff6a2a; --hot-edge:#ff9b3d;
  }

  /* HUD */
  #hud{position:absolute;top:0;left:0;width:100%;height:13%;
    display:flex;align-items:center;justify-content:space-between;
    padding:calc(var(--uh)*1) var(--u) 0;z-index:6;}
  .hudbox{display:flex;flex-direction:column;align-items:center;
    background:linear-gradient(180deg,var(--glass-strong),var(--glass));
    border:1px solid var(--line);border-radius:calc(var(--u)*1.4);
    box-shadow:0 0 calc(var(--u)*2) rgba(0,0,0,.5),inset 0 1px 0 rgba(255,160,90,.15);
    padding:calc(var(--uh)*.7) calc(var(--u)*2);}
  .hudbox b{font-size:calc(var(--uh)*1.3);color:var(--warn);letter-spacing:.16em;
    text-transform:uppercase;}
  .hudbox span{font-size:calc(var(--uh)*2.4);font-weight:800;color:var(--text-main);
    font-variant-numeric:tabular-nums;}
  #titlebox b{
    background:linear-gradient(90deg,var(--c4),var(--c32),var(--c64));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    color:var(--c32);letter-spacing:.1em;font-size:calc(var(--uh)*1.6);}
  #titlebox span{font-size:calc(var(--uh)*1.3)!important;color:var(--text-dim);letter-spacing:.22em;}
  #goalv{color:var(--c64);text-shadow:0 0 calc(var(--u)*1.4) var(--c64);}

  /* 次の火種 */
  #nextzone{position:absolute;top:14%;left:0;width:100%;height:9%;
    display:flex;align-items:center;justify-content:center;gap:calc(var(--u)*2);z-index:6;}
  #nextzone .lbl{font-size:calc(var(--uh)*1.5);color:var(--text-dim);letter-spacing:.08em;}
  #goalbadge{font-size:calc(var(--uh)*1.25);font-weight:700;letter-spacing:.06em;
    color:var(--c4);background:var(--glass);border:1px solid var(--line);
    border-radius:calc(var(--u)*4);padding:calc(var(--uh)*.5) calc(var(--u)*2);}
  #nextseed{width:calc(var(--u)*13);height:calc(var(--u)*13);border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-weight:800;
    font-size:calc(var(--u)*5.2);color:#2a0500;
    box-shadow:0 0 calc(var(--u)*1) rgba(0,0,0,.6) inset,
      0 0 calc(var(--u)*2.5) var(--hot-glow);
    animation:bob 1.1s ease-in-out infinite;}
  @keyframes bob{50%{transform:translateY(calc(var(--uh)*-.7))}}

  /* 滝（盤面） */
  #falls{position:absolute;top:24.5%;left:6%;width:88%;height:68%;
    display:flex;gap:calc(var(--u)*2);z-index:1;}
  .lane{flex:1;position:relative;display:flex;flex-direction:column-reverse;
    border-radius:calc(var(--u)*1.4);
    background:linear-gradient(180deg,rgba(255,90,30,.07),rgba(120,10,40,.16));
    border:1px solid var(--line);overflow:hidden;cursor:pointer;
    box-shadow:inset 0 0 calc(var(--u)*3) rgba(0,0,0,.45);
    transition:box-shadow .25s ease,border-color .25s ease;}
  .lane::before{content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(255,150,60,.14) 0%,transparent 34%);
    pointer-events:none;}
  /* 滝の水流（炎流）うねり */
  .lane::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(180deg,rgba(255,140,50,.05) 0 calc(var(--uh)*1.2),transparent calc(var(--uh)*1.2) calc(var(--uh)*2.6));
    animation:flow 2.4s linear infinite;opacity:.6;}
  @keyframes flow{from{background-position-y:0}to{background-position-y:calc(var(--uh)*5.2)}}
  .lane.hot{box-shadow:0 0 calc(var(--u)*4) var(--hot-glow) inset,0 0 calc(var(--u)*2) var(--hot-glow);
    border-color:var(--hot-edge);}
  .lanenum{position:absolute;top:calc(var(--uh)*.4);left:0;width:100%;text-align:center;
    font-size:calc(var(--uh)*1.4);color:var(--text-dim);opacity:.7;z-index:2;pointer-events:none;
    letter-spacing:.1em;}

  /* 火種セル */
  .cell{width:90%;margin:2% auto 0;aspect-ratio:1/1;border-radius:26%;
    display:flex;align-items:center;justify-content:center;position:relative;
    font-weight:800;color:#2a0500;font-variant-numeric:tabular-nums;
    box-shadow:0 0 calc(var(--u)*1.8) rgba(255,140,40,.5),
      inset 0 calc(var(--u)*-1) calc(var(--u)*1.4) rgba(120,10,0,.4),
      inset 0 calc(var(--u)*.6) calc(var(--u)*1) rgba(255,255,255,.35);
    transition:transform .12s ease;}
  /* 上面ハイライト（炎の照り） */
  .cell::after{content:"";position:absolute;top:8%;left:18%;width:40%;height:24%;
    border-radius:50%;background:rgba(255,255,255,.45);filter:blur(1px);pointer-events:none;}
  .cell.spawn{animation:drop .22s ease;}
  @keyframes drop{from{transform:translateY(-260%);opacity:.2}to{transform:none;opacity:1}}
  .cell.merge{animation:flare .38s ease;z-index:3;}
  @keyframes flare{0%{transform:scale(1)}40%{transform:scale(1.4) rotate(-3deg);
    box-shadow:0 0 calc(var(--u)*7) #fff,0 0 calc(var(--u)*12) var(--c16)}100%{transform:scale(1)}}
  .v2{background:radial-gradient(circle at 38% 28%,#fff,var(--c2) 70%);font-size:calc(var(--u)*7)}
  .v4{background:radial-gradient(circle at 38% 28%,#fff,var(--c4) 70%);font-size:calc(var(--u)*7);
    box-shadow:0 0 calc(var(--u)*2) rgba(255,180,80,.5),inset 0 calc(var(--u)*-1) calc(var(--u)*1.4) rgba(120,10,0,.4),inset 0 calc(var(--u)*.6) calc(var(--u)*1) rgba(255,255,255,.35)}
  .v8{background:radial-gradient(circle at 38% 28%,#ffffffcc,var(--c8) 72%);font-size:calc(var(--u)*7);
    box-shadow:0 0 calc(var(--u)*2.4) rgba(255,150,60,.6),inset 0 calc(var(--u)*-1) calc(var(--u)*1.4) rgba(120,10,0,.45),inset 0 calc(var(--u)*.6) calc(var(--u)*1) rgba(255,255,255,.35)}
  .v16{background:radial-gradient(circle at 38% 28%,#ffffffcc,var(--c16) 74%);color:#fff;font-size:calc(var(--u)*6);
    box-shadow:0 0 calc(var(--u)*2.8) var(--c16),inset 0 calc(var(--u)*-1) calc(var(--u)*1.4) rgba(120,10,0,.5),inset 0 calc(var(--u)*.6) calc(var(--u)*1) rgba(255,255,255,.3)}
  .v32{background:radial-gradient(circle at 38% 28%,#ffffffdd,var(--c32) 76%);color:#fff;font-size:calc(var(--u)*6);
    box-shadow:0 0 calc(var(--u)*3.6) var(--c32),inset 0 calc(var(--u)*-1) calc(var(--u)*1.4) rgba(120,0,30,.5),inset 0 calc(var(--u)*.6) calc(var(--u)*1) rgba(255,255,255,.3)}
  .v64{background:radial-gradient(circle at 38% 28%,#fff,var(--c64) 78%);color:#fff;font-size:calc(var(--u)*6);
    box-shadow:0 0 calc(var(--u)*5) var(--c64),0 0 calc(var(--u)*10) var(--c64),inset 0 calc(var(--u)*.6) calc(var(--u)*1) rgba(255,255,255,.4);
    animation:bigpulse 1.2s ease-in-out infinite;}
  @keyframes bigpulse{50%{box-shadow:0 0 calc(var(--u)*7) var(--c64),0 0 calc(var(--u)*14) var(--c64),inset 0 calc(var(--u)*.6) calc(var(--u)*1) rgba(255,255,255,.4)}}

  /* 逆流炎演出（上方へ噴き上がる火柱） */
  #flame{position:absolute;left:0;bottom:0;width:100%;height:0;pointer-events:none;z-index:4;
    background:linear-gradient(0deg,var(--flame-1),var(--flame-2) 40%,var(--flame-3) 72%,transparent);
    border-radius:50% 50% 0 0 / 30% 30% 0 0;
    opacity:0;filter:blur(2px) saturate(1.3);mix-blend-mode:screen;}
  #flame.up{animation:rise .7s ease-out;}
  @keyframes rise{0%{height:0;opacity:.95}60%{height:100%;opacity:.9}100%{height:130%;opacity:0}}
  /* 連鎖完了時の全画面フラッシュ */
  #burst{position:absolute;inset:0;pointer-events:none;z-index:5;opacity:0;
    background:radial-gradient(70% 60% at 50% 70%,rgba(255,170,60,.5),transparent 70%);}
  #burst.go{animation:burst .5s ease-out;}
  @keyframes burst{0%{opacity:.9;transform:scale(.9)}100%{opacity:0;transform:scale(1.15)}}

  /* モーダル */
  #modal{position:absolute;inset:0;z-index:10;display:none;
    flex-direction:column;align-items:center;justify-content:center;gap:calc(var(--uh)*2);
    background:radial-gradient(60% 50% at 50% 40%,rgba(60,5,15,.92),rgba(10,0,8,.97));
    backdrop-filter:blur(2px);}
  #modal.show{display:flex;animation:fadein .3s ease;}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  #mtitle{font-size:calc(var(--uh)*4.4);font-weight:800;letter-spacing:.04em;
    background:linear-gradient(90deg,var(--c4),var(--c32),var(--c64));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    color:var(--c64);filter:drop-shadow(0 0 calc(var(--u)*2.4) var(--c32));}
  #mdesc{font-size:calc(var(--uh)*1.9);color:var(--text-main);text-align:center;width:80%;line-height:1.6;}
  #mbtn{margin-top:calc(var(--uh)*1.5);padding:calc(var(--uh)*1.6) calc(var(--u)*10);
    font-size:calc(var(--uh)*2.2);font-weight:800;color:#2a0500;cursor:pointer;
    border:none;border-radius:calc(var(--u)*2);letter-spacing:.06em;
    background:linear-gradient(90deg,var(--c4),var(--c16));
    box-shadow:0 0 calc(var(--u)*3) var(--c16),inset 0 1px 0 rgba(255,255,255,.4);
    transition:transform .12s ease,box-shadow .2s ease;}
  #mbtn:active{transform:scale(.96);box-shadow:0 0 calc(var(--u)*5) var(--c32);}

  #hint{position:absolute;bottom:1.5%;left:0;width:100%;text-align:center;
    font-size:calc(var(--uh)*1.5);color:var(--text-dim);z-index:5;padding:0 var(--u);
    text-shadow:0 1px calc(var(--u)*.6) rgba(0,0,0,.6);}
</style>
</head>
<body>
  <div id="phone">
    <div id="hud">
      <div class="hudbox"><b>STAGE</b><span id="stagev">1</span></div>
      <div class="hudbox" id="titlebox"><b>炎の連鎖滝</b><span>FLAME CHAIN FALLS</span></div>
      <div class="hudbox"><b>GOAL</b><span id="goalv">32</span></div>
    </div>
    <div id="nextzone"><span id="goalbadge">GOAL 32</span><span class="lbl">NEXT 火種 →</span><div id="nextseed">2</div></div>
    <div id="falls"></div>
    <div id="flame"></div>
    <div id="burst"></div>
    <div id="hint">同じ数字が触れると合体して倍化、上方へ逆流炎上で連鎖！</div>
    <div id="modal">
      <div id="mtitle">CLEAR!</div>
      <div id="mdesc"></div>
      <button id="mbtn">NEXT</button>
    </div>
  </div>
  <script>
  (function(){
    "use strict";
    const COLS=3, ROWS=6;
    // 固定ステージデータ（spec.md と一致）。lane は bottom->top のスタック。
    const STAGES=[
      { goal:32, queue:[2],
        lanes:[[16,8,4,2],[],[]],
        hint:"レーン1 へ火種を落とすと逆流連鎖で一気に倍化！" },
      { goal:64, queue:[8,4,2,2,32],
        lanes:[[32],[16],[]],
        hint:"滝を整地→点火→32同士を合体。順序を考えて 64 を作ろう。" }
    ];

    const fallsEl=document.getElementById("falls");
    const nextSeedEl=document.getElementById("nextseed");
    const stageVEl=document.getElementById("stagev");
    const goalVEl=document.getElementById("goalv");
    const goalBadgeEl=document.getElementById("goalbadge");
    const hintEl=document.getElementById("hint");
    const flameEl=document.getElementById("flame");
    const burstEl=document.getElementById("burst");
    const modal=document.getElementById("modal");
    const mtitle=document.getElementById("mtitle");
    const mdesc=document.getElementById("mdesc");
    const mbtn=document.getElementById("mbtn");

    let stageIdx=0, lanes, queue, qi, goal, busy=false, cleared=false;

    function seedClass(v){return "v"+v;}

    function loadStage(i){
      const s=STAGES[i];
      lanes=s.lanes.map(l=>l.slice());
      queue=s.queue.slice(); qi=0; goal=s.goal; busy=false; cleared=false;
      stageVEl.textContent=(i+1);
      goalVEl.textContent=goal;
      goalBadgeEl.textContent="GOAL "+goal;
      hintEl.textContent=s.hint;
      buildLanes();
      render();
      updateNext();
    }

    function buildLanes(){
      fallsEl.innerHTML="";
      for(let c=0;c<COLS;c++){
        const lane=document.createElement("div");
        lane.className="lane";
        lane.dataset.col=c;
        const num=document.createElement("div");
        num.className="lanenum"; num.textContent="L"+(c+1);
        lane.appendChild(num);
        lane.addEventListener("pointerdown",onLanePointer);
        fallsEl.appendChild(lane);
      }
    }

    function laneEls(){return fallsEl.querySelectorAll(".lane");}

    function render(){
      const ls=laneEls();
      for(let c=0;c<COLS;c++){
        const el=ls[c];
        // 残すのは lanenum のみ
        el.querySelectorAll(".cell").forEach(n=>n.remove());
        // column-reverse なので bottom->top で append すると下から積まれる
        for(let r=0;r<lanes[c].length;r++){
          const v=lanes[c][r];
          const cell=document.createElement("div");
          cell.className="cell "+seedClass(v);
          cell.textContent=v;
          el.appendChild(cell);
        }
      }
    }

    function updateNext(){
      if(qi<queue.length){
        const v=queue[qi];
        nextSeedEl.textContent=v;
        nextSeedEl.className="";
        nextSeedEl.classList.add(); // keep base
        nextSeedEl.style.background="radial-gradient(circle at 38% 30%,#fff,var(--c"+v+",#ff6a2a))";
      } else {
        nextSeedEl.textContent="–";
        nextSeedEl.style.background="#3a1010";
      }
    }

    function onLanePointer(e){
      e.preventDefault();
      if(busy||cleared) return;
      if(qi>=queue.length) return;
      const c=parseInt(this.dataset.col,10);
      drop(c);
    }

    function drop(c){
      if(lanes[c].length>=ROWS) return; // 満杯は無効
      const v=queue[qi++];
      busy=true;
      // 着地
      lanes[c].push(v);
      render();
      const ls=laneEls();
      const landed=ls[c].querySelector(".cell:last-child"); // 最上部 = 最後に append
      if(landed) landed.classList.add("spawn");
      updateNext();

      // 逆流チェーン解決
      setTimeout(()=>resolveChain(c,0),200);
    }

    function resolveChain(c,depth){
      const lane=lanes[c];
      if(lane.length>=2 && lane[lane.length-1]===lane[lane.length-2]){
        const merged=lane.pop()*2;
        lane[lane.length-1]=merged;
        // 逆流炎演出
        const laneEl=laneEls()[c];
        laneEl.classList.add("hot");
        playFlame(laneEl);
        render();
        const top=laneEls()[c].querySelector(".cell:last-child");
        if(top) top.classList.add("merge");
        setTimeout(()=>{laneEls()[c].classList.remove("hot");},420);
        setTimeout(()=>resolveChain(c,depth+1),300);
      } else {
        // 連鎖終了
        if(checkWin()){ win(); return; }
        if(qi>=queue.length){ checkDead(); }
        busy=false;
      }
    }

    function playFlame(laneEl){
      // レーン位置に合わせて炎を出す
      const r=laneEl.getBoundingClientRect();
      const pr=document.getElementById("phone").getBoundingClientRect();
      flameEl.style.left=((r.left-pr.left)/pr.width*100)+"%";
      flameEl.style.width=(r.width/pr.width*100)+"%";
      flameEl.classList.remove("up"); void flameEl.offsetWidth;
      flameEl.classList.add("up");
      burstEl.classList.remove("go"); void burstEl.offsetWidth;
      burstEl.classList.add("go");
    }

    function checkWin(){
      for(let c=0;c<COLS;c++) if(lanes[c].some(v=>v>=goal)) return true;
      return false;
    }

    function checkDead(){
      // キューが尽きてもクリア未達なら詰み（再挑戦）
      if(!checkWin()){
        mtitle.textContent="燃え尽きた…";
        mtitle.style.background="none";
        mtitle.style.webkitTextFillColor="var(--warn)";
        mtitle.style.color="var(--warn)";
        mdesc.textContent="火種を使い切りましたが GOAL に届きませんでした。整地→点火→合体の順序を見直して再挑戦！";
        mbtn.textContent="RETRY";
        mbtn.dataset.act="retry";
        modal.classList.add("show");
      }
    }

    function win(){
      cleared=true; busy=false;
      mtitle.style.background="";
      mtitle.style.webkitTextFillColor="";
      mtitle.style.color="";
      if(stageIdx<STAGES.length-1){
        mtitle.textContent="STAGE "+(stageIdx+1)+" CLEAR!";
        mdesc.textContent="逆流連鎖で "+goal+" を生成！ 次は計画力が試されるステージです。";
        mbtn.textContent="NEXT STAGE";
        mbtn.dataset.act="next";
      } else {
        mtitle.textContent="ALL CLEAR!";
        mdesc.textContent="炎の連鎖滝を制覇！ 最大火種 "+goal+" の大火災を完成させました。";
        mbtn.textContent="REPLAY";
        mbtn.dataset.act="replay";
      }
      modal.classList.add("show");
    }

    mbtn.addEventListener("pointerdown",function(e){
      e.preventDefault();
      const act=this.dataset.act;
      modal.classList.remove("show");
      if(act==="next"){ stageIdx++; loadStage(stageIdx); }
      else if(act==="retry"){ loadStage(stageIdx); }
      else { stageIdx=0; loadStage(0); }
    });

    loadStage(0);
  })();
  </script>
</body>
</html>
