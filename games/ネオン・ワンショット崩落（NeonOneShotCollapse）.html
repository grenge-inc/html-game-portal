<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>ネオン・ワンショット崩落</title>
<style>
  :root {
    --phone-aspect: 9 / 19.5;
    --bg-deep: #02030a;
    --bg-mid: #0a1430;
    --bg-panel: #06081a;
    --line: #1a2848;
    --cyan: #6ff;
    --cyan-soft: #8df;
    --pink: #ff5d8a;
    --yellow: #ffd76b;
    --orange: #ff7a3a;
    --orange-soft: #ffb24a;
    --text-main: #eaf3ff;
    --text-sub: #cdddef;
    --text-dim: #7a92b5;
    --good: #5effb0;
    --bad: #ff5d8a;
    /* canvas tokens */
    --block-top: #3df;
    --block-bot: #06a;
    --pillar-top: #7af;
    --pillar-bot: #2a6;
    --edge: rgba(234,255,255,.85);
    --ground: rgba(110,255,255,.25);
    --ring: rgba(255,122,58,.5);
    --flash: #ffffff;
    --proj-core: #eaffff;
    --veil-1: rgba(10,20,48,.86);
    --veil-2: rgba(2,3,10,.95);
    --shadow: rgba(0,0,0,.6);
    --inner-glow: rgba(110,255,255,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html, body {
    width:100%; height:100%; overflow:hidden;
    background:#000; color:var(--text-main);
    font-family:'Helvetica Neue', system-ui, sans-serif;
    user-select:none; -webkit-user-select:none;
    -webkit-tap-highlight-color:transparent; touch-action:none;
  }
  body { position:relative; display:flex; align-items:center; justify-content:center; }
  #phone {
    position:relative; overflow:hidden;
    width:  min(100vw, calc(100vh * 9 / 19.5));
    height: min(100vh, calc(100vw * 19.5 / 9));
    --pw:   min(100vw, calc(100vh * 9 / 19.5));
    --ph:   min(100vh, calc(100vw * 19.5 / 9));
    --u:    calc(var(--pw) / 100);
    --uh:   calc(var(--ph) / 100);
    background:
      radial-gradient(120% 80% at 50% 12%, var(--bg-mid) 0%, var(--bg-deep) 60%, #000 100%);
  }
  .stars{position:absolute;inset:0;pointer-events:none;opacity:.5;}
  .star{position:absolute;width:1px;height:1px;background:var(--cyan-soft);
    box-shadow:0 0 3px var(--cyan-soft);border-radius:50%;}

  /* HUD */
  #hud{position:absolute;top:0;left:0;width:100%;padding:calc(var(--uh)*1.6) calc(var(--u)*4);
    display:flex;flex-direction:column;gap:calc(var(--uh)*1);z-index:6;pointer-events:none;}
  .hud-top{display:flex;justify-content:space-between;align-items:center;}
  .stage-label{font-size:calc(var(--u)*3.4);font-weight:700;letter-spacing:.12em;
    color:var(--cyan);text-shadow:0 0 10px var(--cyan);}
  .shots{font-size:calc(var(--u)*3.2);font-weight:700;font-variant-numeric:tabular-nums;
    color:var(--orange-soft);text-shadow:0 0 8px var(--orange);}
  .shots b{color:var(--text-main);}
  .bar-wrap{position:relative;height:calc(var(--uh)*1.4);border-radius:99px;
    background:var(--bg-panel);border:1px solid var(--line);overflow:hidden;}
  .bar-fill{position:absolute;top:0;left:0;height:100%;border-radius:99px;
    background:linear-gradient(90deg,var(--good),var(--yellow) 55%,var(--bad));
    box-shadow:0 0 10px var(--good);transition:width .4s ease,box-shadow .3s;}
  .bar-thresh{position:absolute;top:-30%;height:160%;width:2px;background:var(--text-main);
    box-shadow:0 0 6px var(--text-main);opacity:.8;}
  .bar-cap{display:flex;justify-content:space-between;font-size:calc(var(--u)*2.4);
    color:var(--text-sub);font-variant-numeric:tabular-nums;}

  /* chain counter */
  #chain{position:absolute;top:22%;left:50%;transform:translate(-50%,-50%) scale(.4);
    font-size:calc(var(--u)*9);font-weight:800;font-style:italic;letter-spacing:.04em;
    color:var(--yellow);text-shadow:0 0 18px var(--orange),0 0 6px #fff;
    opacity:0;z-index:7;pointer-events:none;transition:transform .15s,opacity .2s;}
  #chain.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
  /* St2+ chain: bigger, more dramatic */
  #chain.st2-show{opacity:1;transform:translate(-50%,-50%) scale(1.45);}
  /* St4 chain: MEGA scale */
  #chain.st4-show{opacity:1;transform:translate(-50%,-50%) scale(1.8);}

  /* screen flash overlay for St2+ chain explosions */
  #flashOverlay{position:absolute;inset:0;z-index:8;pointer-events:none;
    background:radial-gradient(circle at 50% 50%,rgba(255,220,80,.55),rgba(255,80,0,.25) 50%,transparent 80%);
    opacity:0;transition:opacity .08s;}
  #flashOverlay.burst{opacity:1;}
  /* St4: stronger flash */
  #flashOverlay.burst-mega{opacity:1;background:radial-gradient(circle at 50% 50%,rgba(255,255,150,.8),rgba(255,80,0,.5) 50%,transparent 80%);}

  /* game canvas */
  #stage{position:absolute;left:0;top:0;width:100%;height:100%;z-index:2;}

  /* launcher */
  #knob{position:absolute;z-index:5;width:calc(var(--u)*9);height:calc(var(--u)*9);
    border-radius:50%;transform:translate(-50%,-50%);
    background:radial-gradient(circle at 35% 30%,var(--flash),var(--cyan) 45%,var(--block-bot) 100%);
    box-shadow:0 0 14px var(--cyan),0 0 30px var(--cyan);cursor:grab;}
  #knob.drag{cursor:grabbing;box-shadow:0 0 22px var(--cyan),0 0 46px var(--cyan);}
  #knob::after{content:"";position:absolute;inset:28%;border-radius:50%;
    background:radial-gradient(circle,var(--flash),transparent 70%);}

  /* hint */
  #hint{position:absolute;bottom:calc(var(--uh)*5);left:50%;transform:translateX(-50%);
    font-size:calc(var(--u)*3);color:var(--text-dim);z-index:5;text-align:center;
    letter-spacing:.08em;width:90%;pointer-events:none;}

  /* modal */
  #modal{position:absolute;inset:0;z-index:9;display:none;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 40%,var(--veil-1),var(--veil-2));}
  #modal.show{display:flex;}
  .card{width:74%;padding:calc(var(--uh)*4) calc(var(--u)*7);border-radius:calc(var(--u)*5);
    background:linear-gradient(160deg,var(--bg-mid),var(--bg-panel));
    border:1px solid var(--line);box-shadow:0 0 40px var(--shadow),inset 0 0 30px var(--inner-glow);
    text-align:center;}
  .card h1{font-size:calc(var(--u)*8);font-weight:800;letter-spacing:.06em;
    background:linear-gradient(90deg,var(--cyan),var(--yellow),var(--pink));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .card h1.fail{background:linear-gradient(90deg,var(--bad),var(--orange));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .card p{margin-top:calc(var(--uh)*1.6);font-size:calc(var(--u)*3.2);color:var(--text-sub);
    line-height:1.6;font-variant-numeric:tabular-nums;}
  .card .big{font-size:calc(var(--u)*5);font-weight:800;color:var(--yellow);
    text-shadow:0 0 12px var(--orange);}
  .btn{margin-top:calc(var(--uh)*3);display:inline-block;padding:calc(var(--uh)*2) calc(var(--u)*9);
    font-size:calc(var(--u)*3.6);font-weight:700;letter-spacing:.1em;color:var(--bg-deep);
    border:none;border-radius:99px;cursor:pointer;
    background:linear-gradient(90deg,var(--cyan),var(--cyan-soft));
    box-shadow:0 0 18px var(--cyan);}
  .badge{display:inline-block;margin-top:calc(var(--uh)*2);padding:calc(var(--uh)*.8) calc(var(--u)*4);
    font-size:calc(var(--u)*2.6);font-weight:600;letter-spacing:.08em;border-radius:99px;
    color:var(--cyan-soft);border:1px solid var(--line);background:var(--bg-panel);}
</style>
</head>
<body>
  <div id="phone">
    <div class="stars" id="stars"></div>
    <canvas id="stage"></canvas>
    <div id="hud">
      <div class="hud-top">
        <span class="stage-label" id="stageLabel">STAGE 1</span>
        <span class="shots">SHOT <b id="shotsLeft">1</b></span>
      </div>
      <div class="bar-wrap"><div class="bar-fill" id="barFill"></div><div class="bar-thresh" id="barThresh"></div></div>
      <div class="bar-cap"><span>残存 <b id="ratioTxt">100%</b></span><span id="goalTxt">目標 ≤30%</span></div>
    </div>
    <div id="chain"></div>
    <div id="flashOverlay"></div>
    <div id="knob"></div>
    <div id="hint">発射台ノブを引っ張って弱点を狙え</div>
    <div id="modal">
      <div class="card">
        <h1 id="mTitle">READY</h1>
        <p id="mBody"></p>
        <div class="badge" id="mBadge"></div><br>
        <button class="btn" id="mBtn">START</button>
      </div>
    </div>
  </div>
<script>
(function(){
  "use strict";
  const phone=document.getElementById('phone');
  const cv=document.getElementById('stage'), ctx=cv.getContext('2d');
  const knob=document.getElementById('knob');
  const stageLabel=document.getElementById('stageLabel');
  const shotsLeft=document.getElementById('shotsLeft');
  const barFill=document.getElementById('barFill'), barThresh=document.getElementById('barThresh');
  const ratioTxt=document.getElementById('ratioTxt'), goalTxt=document.getElementById('goalTxt');
  const chainEl=document.getElementById('chain');
  const flashOverlay=document.getElementById('flashOverlay');
  const hint=document.getElementById('hint');
  const modal=document.getElementById('modal');
  const mTitle=document.getElementById('mTitle'), mBody=document.getElementById('mBody');
  const mBadge=document.getElementById('mBadge'), mBtn=document.getElementById('mBtn');

  // ---- stars
  (function(){let h='';for(let i=0;i<46;i++){h+=`<span class="star" style="left:${(Math.random()*100).toFixed(1)}%;top:${(Math.random()*100).toFixed(1)}%;opacity:${(.3+Math.random()*.7).toFixed(2)}"></span>`;}document.getElementById('stars').innerHTML=h;})();

  // ---- color tokens (read from :root, no hardcoded canvas colors)
  const css=getComputedStyle(document.documentElement);
  const C=(n)=>css.getPropertyValue(n).trim();
  const COL={
    cyan:C('--cyan'), cyanSoft:C('--cyan-soft'), pink:C('--pink'),
    yellow:C('--yellow'), orange:C('--orange'), orangeSoft:C('--orange-soft'),
    blockTop:C('--block-top'), blockBot:C('--block-bot'),
    pillarTop:C('--pillar-top'), pillarBot:C('--pillar-bot'),
    edge:C('--edge'), ground:C('--ground'), ring:C('--ring'),
    flash:C('--flash'), projCore:C('--proj-core')
  };

  // ---- cell types
  const EMPTY=0, BLOCK=1, PILLAR=2, BOMB=3;

  // current stage index (0=St1, 1=St2, 2=St3, 3=St4, 4=St5)
  let cur=0;

  // ---- stage data (col,row ; row=0 bottom). stored as map "c,r"->{t,r(adius)}
  function buildStage(n){
    const cells={};
    const put=(c,r,t,rad)=>{cells[c+','+r]={t,rad:rad||0};};
    if(n===0){
      // St1 : single 2-col tower (cols 2,3), 6 high, twin bombs mid (r=2). 1-shot total collapse.
      [2,3].forEach(c=>{for(let r=0;r<=5;r++)put(c,r,r<=1?PILLAR:BLOCK);});
      put(2,2,BOMB,2); put(3,2,BOMB,2);
      return {cols:6,rows:8,cells,shots:2,thresh:0.30,goal:'操作理解＋コア体験'};
    } else if(n===1){
      // St2 (TALLER): 5 towers, each 9 rows high (row0-8), filling screen top.
      // Each tower: 2 cols wide, rows 0-1 pillar, row 2 bombs×2 (r=3), rows 3-8 normal (6 layers).
      // Tower bases: col 0-1 / 3-4 / 7-8 / 11-12 / 15-16
      // Total cells: 18 per tower × 5 = 90. Threshold 20% => need to destroy 4 of 5 towers (4 shots min).
      const towers=[[0,1],[3,4],[7,8],[11,12],[15,16]];
      towers.forEach(p=>{
        p.forEach(c=>{for(let r=0;r<=8;r++)put(c,r,r<=1?PILLAR:BLOCK);});
        put(p[0],2,BOMB,3); put(p[1],2,BOMB,3);
      });
      return {cols:17,rows:10,cells,shots:8,thresh:0.20,goal:'思考＋応用'};
    } else if(n===2){
      // St3: 異形構造物破壊 — L字・逆L字・T字の3種の非対称構造物
      // L字構造 (左)
      put(1,0,PILLAR); put(1,1,PILLAR);
      put(1,2,BOMB,2);
      for(let r=3;r<=6;r++) put(1,r,BLOCK);
      put(2,0,BLOCK); put(3,0,BLOCK);

      // T字構造 (中央)
      put(5,0,PILLAR); put(5,1,PILLAR);
      put(5,2,BOMB,2);
      for(let r=3;r<=7;r++) put(5,r,BLOCK);
      put(4,5,BLOCK); put(6,5,BLOCK);
      put(4,6,BLOCK); put(6,6,BLOCK);

      // 逆L字構造 (右)
      put(9,0,PILLAR); put(9,1,PILLAR);
      put(9,2,BOMB,2);
      for(let r=3;r<=6;r++) put(9,r,BLOCK);
      put(7,6,BLOCK); put(8,6,BLOCK);

      return {cols:11,rows:10,cells,shots:7,thresh:0.30,goal:'応用＋異形崩壊'};
    } else if(n===3){
      // St4: 連鎖地獄 — 爆弾だらけの密集塔×3本。塔間gap=2列でr=3爆弾が隣塔へ波及。
      // 3本の塔：col 0-1 / col 4-5 / col 8-9
      // 各塔：2列幅×11段(row0-10)
      //   row0-1: 支柱
      //   row2,4,6: 爆弾×2 (r=3) ← 3段に爆弾を仕込む
      //   row3,5,7,8,9,10: 通常ブロック
      // 1塔 = 2列×11段 = 22セル(爆弾6+支柱4+通常12)
      // 計3塔 = 66セル。閾値10%（≤6セル）。発射4回。
      // gap=2列(col2-3, col6-7)。爆弾r=3で隣塔端に距離3でちょうど届く設計。
      // 中央塔(col4-5)頂部1発 → row10-7崩落 → 爆弾row6→row4→row2が連鎖起爆
      // → r=3波及でcol1(距離3)とcol8(距離3)の隣塔爆弾に誘爆 → 全塔連鎖崩壊。
      const towers=[[0,1],[4,5],[8,9]];
      towers.forEach(p=>{
        p.forEach(c=>{
          put(c,0,PILLAR); put(c,1,PILLAR);
          put(c,2,BOMB,3);
          put(c,3,BLOCK);
          put(c,4,BOMB,3);
          put(c,5,BLOCK);
          put(c,6,BOMB,3);
          put(c,7,BLOCK);
          put(c,8,BLOCK);
          put(c,9,BLOCK);
          put(c,10,BLOCK);
        });
      });
      // 計算: 3塔 × 2列 × 11セル = 66セル。閾値10%=6.6 → 7セル以上残ったら失敗
      return {cols:12,rows:12,cells,shots:4,thresh:0.10,goal:'連鎖地獄'};
    } else {
      // St5: ドミノ崩壊 — 横一列に並んだ7本の細い柱がドミノ式に連鎖崩壊
      // 新体験：「倒れた柱が横の爆弾を起爆 → 隣の柱が崩壊 → さらに次へ」というドミノ連鎖
      // 柱配置: col 1, 3, 5, 7, 9, 11, 13（1列幅の細い柱、2列ずつ隙間）
      // 各柱: 1列幅 × 5段(row0-4)
      //   row0: PILLAR（支柱底）
      //   row1: PILLAR（支柱上）
      //   row2: 爆弾(r=2) ← 起爆でrow0-4+隣柱row0-1に届く設計
      //   row3-4: 通常ブロック（上部2段）
      // 柱同士の距離: 隣gap=1列(col2,4,6...) 。爆弾r=2でgap1越しに隣柱のrow0-1に届く
      // 1柱 = 5セル(支柱2+爆弾1+通常2)。7柱 = 35セル。閾値10%(≤3セル)。発射3回。
      // r=2爆発範囲: マンハッタン距離2 → 同柱row0-4を全て破壊(col自体の行1〜行4が距離1〜2)
      // 最短1発: 左端柱(col1)頂部(row4)を撃つ → row4-3崩落 → 爆弾[1,2]隣接誘爆(r=2) →
      //   col1全破壊 + [3,1],[3,0]をnd追加 → BOMB[3,2]の[3,1]がprev → 誘爆 →
      //   [5,2]→[7,2]→[9,2]→[11,2]→[13,2]とドミノ連鎖 → 全35セル破壊→0%クリア。
      const domPillars = [1, 3, 5, 7, 9, 11, 13];
      domPillars.forEach(c=>{
        put(c,0,PILLAR);
        put(c,1,PILLAR);
        put(c,2,BOMB,2);
        put(c,3,BLOCK);
        put(c,4,BLOCK);
      });
      // 計35セル。閾値10%(3.5 → 4セル以上残ったら失敗)。
      return {cols:15,rows:7,cells,shots:3,thresh:0.10,goal:'ドミノ連鎖'};
    }
  }

  let stage=null, grid=null, initCount=0, shotsRem=0, busy=false, particles=[];
  let layout=null; // {ox,oy,cw,ch} px within #phone css px

  function loadStage(n){
    cur=n;
    stage=buildStage(n);
    grid=stage.cells; // live grid (we'll mutate copies)
    // deep copy
    const g={}; for(const k in stage.cells){g[k]={...stage.cells[k]};}
    grid=g;
    initCount=Object.keys(grid).length;
    shotsRem=stage.shots;
    busy=false; particles=[]; detonated.clear();
    stageLabel.textContent='STAGE '+(n+1);
    goalTxt.textContent='目標 ≤'+Math.round(stage.thresh*100)+'%';
    updateHUD();
    computeLayout();
    placeKnob();
    draw();
  }

  function aliveCount(){return Object.keys(grid).length;}
  function ratio(){return initCount?aliveCount()/initCount:0;}
  function updateHUD(){
    shotsLeft.textContent=shotsRem;
    const r=ratio();
    ratioTxt.textContent=Math.round(r*100)+'%';
    barFill.style.width=Math.round(r*100)+'%';
    barThresh.style.left=(stage.thresh*100)+'%';
  }

  function computeLayout(){
    const rect=phone.getBoundingClientRect();
    cv.width=rect.width*devicePixelRatio; cv.height=rect.height*devicePixelRatio;
    cv.style.width=rect.width+'px'; cv.style.height=rect.height+'px';
    ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
    const W=rect.width, H=rect.height;
    // Z軸距離確保：グリッドをH*0.60以下に収め、発射台(H*0.90)との距離を十分に取る
    // fieldTop: HUDの下、fieldBottom: 画面60%の位置（旧80%→60%に変更）
    const fieldTop=H*0.14, fieldBottom=H*0.60;
    const fieldH=fieldBottom-fieldTop;
    const cw=Math.min(W/(stage.cols+1.2), fieldH/(stage.rows+0.5));
    const gridW=cw*stage.cols, gridH=cw*stage.rows;
    layout={W,H,fieldBottom,ox:(W-gridW)/2, oy:fieldBottom-gridH, cw:cw, ch:cw};
  }
  // cell center px
  function cellX(c){return layout.ox+(c+0.5)*layout.cw;}
  function cellY(r){return layout.oy+(stage.rows-1-r+0.5)*layout.ch;}

  function placeKnob(){
    knob.style.left=(50)+'%';
    // 発射台を画面90%に下げ、グリッド(60%以下)との距離を確保
    knob.style.top='90%';
  }

  // ---- gravity: per column, drop blocks down to fill empties (keep relative order)
  function applyGravity(){
    const fell=new Set();
    for(let c=0;c<stage.cols;c++){
      const col=[];
      for(let r=0;r<stage.rows;r++){const k=c+','+r;if(grid[k]){col.push([grid[k],r]);delete grid[k];}}
      for(let i=0;i<col.length;i++){
        const [g,oldr]=col[i];
        grid[c+','+i]=g;
        if(g.t===BOMB && i<oldr) fell.add(c+','+i);
      }
    }
    return fell;
  }

  const detonated=new Set();
  // detonate bomb at key k; push destroyed [c,r] into nd; spark fx
  function detonate(k,nd){
    const [c,r]=k.split(',').map(Number);
    const rad=grid[k]?grid[k].rad||2:2;
    detonated.add(k);
    delete grid[k];
    // St4: mega explosion
    spark(cellX(c),cellY(r),true);
    for(let dc=-rad;dc<=rad;dc++)for(let dr=-rad;dr<=rad;dr++){
      if(Math.abs(dc)+Math.abs(dr)>rad)continue;
      const kk=(c+dc)+','+(r+dr);
      if(grid[kk]&&grid[kk].t!==BOMB){nd.push([c+dc,r+dr]);delete grid[kk];spark(cellX(c+dc),cellY(r+dr),false);}
    }
  }

  // ---- chain resolution after an impact at (impactCol, impactRow)
  function resolveImpact(impactCol, impactRow, cb){
    let chain=0;
    busy=true;
    // step1: collapse hit block + connected blocks downward until a gap/bomb
    let rr=impactRow;
    const destroyed=[];
    while(rr>=0){const k=impactCol+','+rr;if(grid[k]&&grid[k].t!==BOMB){destroyed.push([impactCol,rr]);delete grid[k];spark(cellX(impactCol),cellY(rr),false);rr--;}else break;}
    let prev=destroyed;
    const tick=()=>{
      const fell=applyGravity();
      const toDet=new Set();
      for(const k in grid){
        const g=grid[k]; if(g.t!==BOMB||detonated.has(k))continue;
        const [c,r]=k.split(',').map(Number);
        if(fell.has(k)){toDet.add(k);continue;}
        for(const [dc,dr] of [[1,0],[-1,0],[0,1],[0,-1]]){
          if(prev.some(([pc,pr])=>pc===c+dc&&pr===r+dr)){toDet.add(k);break;}
        }
      }
      if(toDet.size){
        chain++;
        const nd=[];
        toDet.forEach(k=>{if(grid[k])detonate(k,nd);});
        prev=nd;
        showChain(chain);
        updateHUD(); draw();
        // St4: even faster chain tempo (150ms); St2/St3: 240ms; St1: 360ms
        const tempo = cur===0 ? 360 : cur>=3 ? 150 : 240;
        setTimeout(tick, tempo);
      } else {
        applyGravity();
        updateHUD(); draw();
        busy=false;
        setTimeout(()=>cb(chain),200);
      }
    };
    updateHUD(); draw();
    setTimeout(tick,300);
  }

  // ---- projectile flight physics constants
  // These MUST match drawAimGuide exactly (same vx,vy,g,startX,startY).
  const PROJ_G = 2200;   // px/s^2, downward (positive = down in canvas)
  const PROJ_SUBSTEPS = 8; // substeps per RAF frame to prevent tunneling through narrow cells

  // Compute projectile position at time t given launch params
  function projPos(vx, vy, startX, startY, t){
    return {
      x: startX + vx * t,
      y: startY + vy * t + 0.5 * PROJ_G * t * t
    };
  }

  // ---- projectile flight: follows same parabola as aim guide
  // vx,vy are in canvas px/s (vy negative = upward in canvas coordinates)
  // Uses RAF real-time delta + substep collision to prevent tunneling.
  function fireProjectile(vx, vy, cb){
    if(busy || shotsRem<=0) return;
    busy=true; hint.style.opacity=0;
    // launch origin: matches knob DOM position (50% width, 90% height)
    const startX = layout.W * 0.5;
    const startY = layout.H * 0.90;
    let elapsed = 0;      // total simulated time (seconds)
    let prevTimestamp = null;
    const trail = [];

    function step(timestamp){
      if(prevTimestamp === null){ prevTimestamp = timestamp; requestAnimationFrame(step); return; }
      // Real elapsed time this frame, capped at 50ms to avoid huge jumps after tab switch
      const frameDt = Math.min(0.05, (timestamp - prevTimestamp) / 1000);
      prevTimestamp = timestamp;

      // Subdivide the frame into PROJ_SUBSTEPS sub-steps to avoid tunneling
      const subDt = frameDt / PROJ_SUBSTEPS;
      let hitResult = null;

      for(let s = 0; s < PROJ_SUBSTEPS; s++){
        elapsed += subDt;
        const pos = projPos(vx, vy, startX, startY, elapsed);

        // Out of bounds check
        if(pos.y > layout.H * 1.1 || pos.x > layout.W * 1.1 || pos.x < -layout.W * 0.2){
          busy=false; afterShot(); return;
        }

        // Hit detection: only check for collision when ball is within grid area (Z-axis: top 60% of screen)
        // This prevents early hit while ball is below the grid area (passing through empty space near launcher)
        if(pos.y <= layout.fieldBottom + layout.cw){
          const hit = cellAtPoint(pos.x, pos.y);
          if(hit){
            hitResult = {hit, x: pos.x, y: pos.y};
            break;
          }
        }
      }

      // Update trail with current position
      const curPos = projPos(vx, vy, startX, startY, elapsed);
      trail.push([curPos.x, curPos.y]);
      if(trail.length > 14) trail.shift();

      draw();
      drawProjectile(curPos.x, curPos.y, trail);

      if(hitResult){
        const [c, r] = hitResult.hit;
        busy=false;
        spark(hitResult.x, hitResult.y, false);
        resolveImpact(c, r, ()=>{ afterShot(); });
        return;
      }

      requestAnimationFrame(step);
    }

    requestAnimationFrame(step);
  }

  function afterShot(){
    shotsRem--; updateHUD(); draw();
    setTimeout(checkEnd,400);
  }

  // cellAtPoint: returns [col, row] of the cell that contains pixel (px, py), or null.
  // Row 0 = bottom row (ground level). Row stage.rows-1 = top row.
  // layout.oy = top-left Y of grid (top of highest row).
  // cellY(r) = oy + (rows-1-r+0.5)*cw   =>  rr = floor((py-oy)/cw), r = rows-1-rr
  function cellAtPoint(px, py){
    if(!layout) return null;
    const c = Math.floor((px - layout.ox) / layout.cw);
    const rr = Math.floor((py - layout.oy) / layout.ch);
    const r = stage.rows - 1 - rr;
    if(c < 0 || c >= stage.cols || r < 0 || r >= stage.rows) return null;
    if(grid[c+','+r]) return [c, r];
    return null;
  }

  function checkEnd(){
    const r=ratio();
    if(r<=stage.thresh){ win(); }
    else if(shotsRem<=0){ lose(); }
  }

  // ---- particles
  // St4+: mega particles for chain hell
  function spark(x,y,big){
    const st2=(cur>=1);
    const st4=(cur>=3);
    const n=big?(st4?80:st2?52:22):(st4?28:st2?18:9);
    const speedMult=st4?(big?2.8:2.0):st2?(big?2.0:1.5):1.0;
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2, sp=(big?140:70)*(0.4+Math.random())*speedMult;
      particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-40,life:1,big,st2,st4});
    }
    // St2+ big explosion: add shockwave ring particles
    if(st2&&big){
      const ringN=st4?32:20;
      for(let i=0;i<ringN;i++){
        const a=(i/ringN)*Math.PI*2;
        const sp=st4?400:280;
        particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.7,big:false,st2,st4,ring:true});
      }
      if(st4){
        flashOverlay.classList.remove('burst','burst-mega');
        void flashOverlay.offsetWidth;
        flashOverlay.classList.add('burst-mega');
        setTimeout(()=>flashOverlay.classList.remove('burst-mega'),150);
      } else {
        flashOverlay.classList.add('burst');
        setTimeout(()=>flashOverlay.classList.remove('burst'),120);
      }
    }
  }
  function tickParticles(d){
    for(const p of particles){p.x+=p.vx*d;p.y+=p.vy*d;p.vy+=900*d;p.life-=d*(p.ring?3.5:1.6);}
    particles=particles.filter(p=>p.life>0);
  }

  // ---- draw
  let last=performance.now();
  function loop(now){
    const d=Math.min(0.05,(now-last)/1000); last=now;
    if(particles.length){tickParticles(d);draw();}
    requestAnimationFrame(loop);
  }
  function rr(x,y,w,h,rad){ctx.beginPath();ctx.moveTo(x+rad,y);ctx.arcTo(x+w,y,x+w,y+h,rad);ctx.arcTo(x+w,y+h,x,y+h,rad);ctx.arcTo(x,y+h,x,y,rad);ctx.arcTo(x,y,x+w,y,rad);ctx.closePath();}
  function draw(){
    if(!layout)return;
    ctx.clearRect(0,0,layout.W,layout.H);
    const cw=layout.cw, pad=cw*0.10;

    // St4: 背景に連鎖の炎雰囲気グロー
    if(cur===3){
      const grad=ctx.createRadialGradient(layout.W*0.5,layout.H*0.3,0,layout.W*0.5,layout.H*0.3,layout.W*0.8);
      grad.addColorStop(0,'rgba(255,80,0,0.08)');
      grad.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=grad;
      ctx.fillRect(0,0,layout.W,layout.H);
    }
    // St5: 背景にドミノ倒しの波紋グロー
    if(cur===4){
      const grad=ctx.createRadialGradient(layout.W*0.1,layout.H*0.4,0,layout.W*0.5,layout.H*0.4,layout.W);
      grad.addColorStop(0,'rgba(110,255,255,0.07)');
      grad.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=grad;
      ctx.fillRect(0,0,layout.W,layout.H);
    }

    // ground line + reflection glow
    ctx.strokeStyle=COL.ground;ctx.lineWidth=1.5;ctx.shadowColor=COL.cyan;ctx.shadowBlur=8;
    ctx.beginPath();ctx.moveTo(layout.ox-cw,layout.fieldBottom);ctx.lineTo(layout.ox+cw*stage.cols+cw,layout.fieldBottom);ctx.stroke();
    ctx.shadowBlur=0;
    for(const k in grid){
      const g=grid[k];const [c,r]=k.split(',').map(Number);
      const x=cellX(c)-cw/2+pad, y=cellY(r)-cw/2+pad, s=cw-pad*2;
      if(g.t===BOMB){drawBomb(cellX(c),cellY(r),s,g.rad,cw);}
      else drawBlock(x,y,s,g.t===PILLAR);
    }
    // particles (neon sparks)
    for(const p of particles){
      ctx.globalAlpha=Math.max(0,p.life);
      if(p.ring){
        ctx.fillStyle=p.st4?COL.yellow:COL.cyanSoft;
        ctx.shadowColor=p.st4?COL.orange:COL.cyan;ctx.shadowBlur=p.st4?10:6;
        ctx.beginPath();ctx.arc(p.x,p.y,(p.st4?4:2.5)*(p.life+.2),0,7);ctx.fill();
      } else {
        ctx.fillStyle=p.big?COL.flash:COL.orangeSoft;
        ctx.shadowColor=p.big?COL.yellow:COL.orange;ctx.shadowBlur=p.big?(p.st4?24:p.st2?18:10):(p.st4?12:p.st2?8:5);
        ctx.beginPath();ctx.arc(p.x,p.y,(p.big?(p.st4?7:p.st2?5:3.5):p.st4?3:2)*(p.life+.3),0,7);ctx.fill();
      }
    }
    ctx.shadowBlur=0;ctx.globalAlpha=1;
  }
  function drawBlock(x,y,s,pillar){
    const gd=ctx.createLinearGradient(x,y,x,y+s);
    if(pillar){gd.addColorStop(0,COL.pillarTop);gd.addColorStop(1,COL.pillarBot);}
    else{gd.addColorStop(0,COL.blockTop);gd.addColorStop(1,COL.blockBot);}
    ctx.save();
    ctx.shadowColor=pillar?COL.cyan:COL.blockTop;ctx.shadowBlur=12;
    ctx.fillStyle=gd; rr(x,y,s,s,s*0.18); ctx.fill();
    ctx.shadowBlur=0;
    // inner top highlight
    ctx.globalAlpha=.5;ctx.fillStyle=COL.flash;rr(x+s*.14,y+s*.12,s*.72,s*.18,s*.08);ctx.fill();ctx.globalAlpha=1;
    ctx.strokeStyle=COL.edge;ctx.lineWidth=1.5; rr(x,y,s,s,s*0.18); ctx.stroke();
    if(pillar){ctx.strokeStyle=COL.ground;ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(x+s*0.5,y+s*0.15);ctx.lineTo(x+s*0.5,y+s*0.85);ctx.stroke();}
    ctx.restore();
  }
  function drawBomb(cx,cy,s,rad,cw){
    ctx.save();
    const pulse=0.6+0.4*Math.abs(Math.sin(performance.now()/350));
    const R=rad*cw;
    const st2=(cur>=1);
    const st4=(cur>=3);
    ctx.strokeStyle=st4?'rgba(255,200,0,.85)':st2?'rgba(255,160,0,.7)':COL.ring;
    ctx.lineWidth=st4?3.5:st2?2.5:1.5;
    ctx.setLineDash([4,4]);
    ctx.lineDashOffset=-performance.now()/60;
    ctx.globalAlpha=(st4?0.8:st2?0.65:0.5)+.3*pulse;
    ctx.beginPath();ctx.moveTo(cx,cy-R);ctx.lineTo(cx+R,cy);ctx.lineTo(cx,cy+R);ctx.lineTo(cx-R,cy);ctx.closePath();ctx.stroke();
    ctx.setLineDash([]);ctx.lineDashOffset=0;ctx.globalAlpha=1;
    const gd=ctx.createRadialGradient(cx-s*0.15,cy-s*0.15,s*0.05,cx,cy,s*0.55);
    gd.addColorStop(0,COL.flash);gd.addColorStop(.4,COL.yellow);gd.addColorStop(1,COL.orange);
    ctx.shadowColor=COL.orange;ctx.shadowBlur=(st4?38:st2?28:18)*pulse;
    ctx.fillStyle=gd;ctx.beginPath();ctx.arc(cx,cy,s*(st4?0.52:st2?0.48:0.42),0,7);ctx.fill();
    ctx.restore();
  }
  function drawProjectile(x,y,trail){
    ctx.save();
    for(let i=0;i<trail.length;i++){const t=trail[i];ctx.globalAlpha=i/trail.length*0.5;
      ctx.fillStyle=COL.cyan;ctx.beginPath();ctx.arc(t[0],t[1],2.5,0,7);ctx.fill();}
    ctx.globalAlpha=1;ctx.shadowColor=COL.cyan;ctx.shadowBlur=16;
    ctx.fillStyle=COL.projCore;ctx.beginPath();ctx.arc(x,y,5,0,7);ctx.fill();
    ctx.restore();
  }

  function showChain(n){
    const st4=(cur>=3);
    const st2=(cur>=1&&cur<3);
    chainEl.textContent='CHAIN x'+n;
    chainEl.classList.remove('show','st2-show','st4-show');
    void chainEl.offsetWidth;
    if(st4) chainEl.classList.add('st4-show');
    else if(st2) chainEl.classList.add('st2-show');
    else chainEl.classList.add('show');
    setTimeout(()=>chainEl.classList.remove('show','st2-show','st4-show'), st4?1200:st2?900:700);
  }

  // ---- aim & fire (pointer)
  // Canvas Y-axis: down = positive. To launch upward, vy must be negative.
  // Player drags knob upward (or in any direction) to aim.
  //   pull-back vector: dx = aimStart.x - pt.x, dy = aimStart.y - pt.y
  //   ang = atan2(dy, dx). vy = -sin(ang)*speed ensures upward drag => upward launch.
  // drawAimGuide and fireProjectile share:
  //   - same vx, vy formula (from same dx,dy,ang,speed)
  //   - same startX = W*0.5, startY = H*0.90  (knob at 90% height)
  //   - same gravity constant PROJ_G
  //   - same parabola equation: x=sx+vx*t, y=sy+vy*t+0.5*PROJ_G*t^2
  let aiming=false, aimStart=null;
  function knobCenter(){const r=knob.getBoundingClientRect(),p=phone.getBoundingClientRect();return {x:r.left-p.left+r.width/2,y:r.top-p.top+r.height/2};}
  function localPt(e){const p=phone.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return {x:t.clientX-p.left,y:t.clientY-p.top};}
  function onDown(e){if(busy||shotsRem<=0)return;aiming=true;knob.classList.add('drag');aimStart=knobCenter();e.preventDefault();}
  function onMove(e){if(!aiming)return;const pt=localPt(e);drawAimGuide(aimStart,pt);e.preventDefault();}
  function onUp(e){if(!aiming)return;aiming=false;knob.classList.remove('drag');
    const pt=localPt(e);
    const dx=aimStart.x-pt.x, dy=aimStart.y-pt.y; // pull-back vector
    const power=Math.min(1, Math.hypot(dx,dy)/(layout.W*0.5));
    if(power<0.05){draw();return;}
    const speed=power*1700+450;
    const ang=Math.atan2(dy,dx);
    // vy negative = upward. Matches drawAimGuide exactly.
    const vx=Math.cos(ang)*speed, vy=-Math.sin(ang)*speed;
    draw();
    fireProjectile(vx,vy,()=>{});
  }
  // drawAimGuide: renders predicted parabola using identical physics to fireProjectile.
  // Uses projPos(vx,vy,sx,sy,t) — same formula as the actual ball trajectory.
  function drawAimGuide(s,pt){
    draw();
    const dx=s.x-pt.x, dy=s.y-pt.y;
    const power=Math.min(1, Math.hypot(dx,dy)/(layout.W*0.5));
    const speed=power*1700+450;
    const ang=Math.atan2(dy,dx);
    // Same formula as onUp: vy negative = upward
    const vx=Math.cos(ang)*speed, vy=-Math.sin(ang)*speed;
    // Origin matches fireProjectile startX/startY exactly (knob at 90%)
    const sx=layout.W*0.5, sy=layout.H*0.90;
    ctx.save();
    // Sample 30 points along the parabola. dt=0.030s between dots gives smooth preview up to t=0.90s.
    // Increased from 24 to 30 dots to cover the longer arc reaching the upper grid area.
    for(let i=1;i<=30;i++){
      const t=i*0.030;
      const pos=projPos(vx,vy,sx,sy,t);
      if(pos.y>layout.H) break;
      ctx.globalAlpha=1-i/32;
      ctx.fillStyle=COL.cyan;ctx.shadowColor=COL.cyan;ctx.shadowBlur=8;
      ctx.beginPath();ctx.arc(pos.x,pos.y,3,0,7);ctx.fill();
    }
    ctx.restore();
  }

  knob.addEventListener('pointerdown',onDown);
  window.addEventListener('pointermove',onMove);
  window.addEventListener('pointerup',onUp);

  // ---- modal flow
  function win(){
    busy=true;
    const last = cur>=4;
    mTitle.textContent='CLEAR'; mTitle.className='';
    mBody.innerHTML='崩壊率 <span class="big">'+Math.round(ratio()*100)+'%</span><br>目標 ≤'+Math.round(stage.thresh*100)+'% 達成';
    mBadge.textContent='学習: '+stage.goal;
    mBtn.textContent=last?'AGAIN':'NEXT STAGE';
    mBtn.dataset.act=last?'restart':'next';
    modal.classList.add('show');
  }
  function lose(){
    busy=true;
    mTitle.textContent='GAME OVER'; mTitle.className='fail';
    mBody.innerHTML='崩壊率 <span class="big">'+Math.round(ratio()*100)+'%</span><br>目標 ≤'+Math.round(stage.thresh*100)+'% に届かず';
    mBadge.textContent='狙いを変えて再挑戦';
    mBtn.textContent='RETRY'; mBtn.dataset.act='retry';
    modal.classList.add('show');
  }
  mBtn.addEventListener('click',()=>{
    const act=mBtn.dataset.act;
    modal.classList.remove('show');
    if(act==='next'){
      const next=cur+1;
      loadStage(next);
      hint.style.opacity=1;
      if(next===1) hint.textContent='5本の塔。爆弾の連鎖で一気に崩せ';
      else if(next===2) hint.textContent='L字・T字・逆L字。形を読んで弱点を撃ち抜け';
      else if(next===3) hint.textContent='爆弾だらけ！連鎖が連鎖を呼ぶ。中央塔を狙え';
      else if(next===4) hint.textContent='ドミノを倒せ。最初の1発が連鎖を繋ぐ';
    }
    else if(act==='restart'){loadStage(0);hint.style.opacity=1;hint.textContent='発射台ノブを引っ張って弱点を狙え';}
    else if(act==='retry'){loadStage(cur);hint.style.opacity=1;}
  });

  // start screen
  function start(){
    mTitle.textContent='READY'; mTitle.className='';
    mBody.innerHTML='ノブを引っ張って発射。<br>弱点を撃ち抜き崩落の連鎖を起こせ。';
    mBadge.textContent='崩落 → 誘爆 → 崩落';
    mBtn.textContent='START'; mBtn.dataset.act='restart';
    modal.classList.add('show');
  }

  window.addEventListener('resize',()=>{if(stage){computeLayout();draw();}});
  loadStage(0);
  start();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
