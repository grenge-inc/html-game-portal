<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>コンボシュート</title>
<style>
  :root{
    /* === 主題色：ビビッドグリーン × オレンジ（RAIDERS #1） === */
    --green:#2ee65a;--green-lt:#5cff86;--dkgreen:#137a2c;--green-deep:#0a4a1a;
    --orange:#ff7a1a;--orange-lt:#ffa24d;--orange-dk:#cc5010;
    --yellow:#ffe24a;--white:#fff;--gray:#9fb6a6;
    /* === 背景階層 === */
    --bg-deep:#04140a;--bg-mid:#0a2a14;--sky-1:#0e4d6e;--sky-2:#2a9fd6;--sky-3:#a9e6f5;
    --turf-1:#3bbf55;--turf-2:#1f7e34;--turf-3:#125222;
    /* === グロー === */
    --glow-g:rgba(46,230,90,0.55);--glow-o:rgba(255,122,26,0.6);--glow-y:rgba(255,226,74,0.7);
    /* === テキスト === */
    --text-dim:#7fa890;--ink:#0a1a0f;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    width:100%;height:100%;overflow:hidden;
    background:#000;color:#fff;
    font-family:'Helvetica Neue',system-ui,sans-serif;
    user-select:none;-webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;touch-action:none;
  }
  body{position:relative;display:flex;align-items:center;justify-content:center;}
  #phone{
    position:relative;overflow:hidden;
    width:min(100vw,calc(100vh*9/19.5));
    height:min(100vh,calc(100vw*19.5/9));
    --pw:min(100vw,calc(100vh*9/19.5));
    --ph:min(100vh,calc(100vw*19.5/9));
    --u:calc(var(--pw)/100);
    --uh:calc(var(--ph)/100);
    background:var(--bg-deep);
  }

  /* ===== 背景：スタジアム ===== */
  #sky{
    position:absolute;left:0;right:0;top:0;height:52%;
    background:
      radial-gradient(120% 90% at 50% 100%,rgba(46,230,90,0.18) 0%,transparent 55%),
      linear-gradient(180deg,var(--sky-1) 0%,var(--sky-2) 60%,var(--sky-3) 100%);
  }
  /* 観客スタンド（上部の細かなドット帯） */
  #stand{
    position:absolute;left:0;right:0;top:0;height:18%;
    background:
      radial-gradient(circle,rgba(255,255,255,0.25) 22%,transparent 24%) 0 0/calc(var(--u)*3) calc(var(--uh)*1.6),
      linear-gradient(180deg,rgba(0,0,0,0.45),rgba(8,40,22,0.15));
    opacity:0.55;
  }
  /* ナイター照明 */
  #lights{position:absolute;left:0;right:0;top:0;height:52%;pointer-events:none;
    background:
      radial-gradient(circle at 18% 6%,rgba(255,255,255,0.5) 0,transparent 12%),
      radial-gradient(circle at 82% 6%,rgba(255,255,255,0.5) 0,transparent 12%);
  }
  #field{
    position:absolute;left:0;right:0;bottom:0;height:52%;
    background:
      radial-gradient(140% 120% at 50% 120%,rgba(92,255,134,0.28) 0%,transparent 50%),
      linear-gradient(180deg,var(--turf-1) 0%,var(--turf-2) 55%,var(--turf-3) 100%);
  }
  /* 芝のストライプ */
  #field::before{content:"";position:absolute;inset:0;opacity:0.35;
    background:repeating-linear-gradient(180deg,transparent 0,transparent calc(var(--uh)*4),rgba(255,255,255,0.07) calc(var(--uh)*4),rgba(255,255,255,0.07) calc(var(--uh)*8));}
  .gline{position:absolute;left:0;right:0;height:calc(var(--uh)*0.6);background:rgba(255,255,255,0.12);}

  /* ===== HUD ===== */
  #hud{
    position:absolute;top:0;left:0;right:0;
    height:calc(var(--uh)*13);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 calc(var(--u)*4);
    background:linear-gradient(180deg,rgba(2,12,6,0.82) 0%,rgba(2,12,6,0.25) 70%,transparent 100%);
    z-index:20;
  }
  #stage-lbl{
    font-size:calc(var(--u)*3.4);font-weight:800;letter-spacing:0.08em;
    background:linear-gradient(180deg,var(--green-lt),var(--green));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }
  #goal-badge{
    display:inline-block;margin-top:calc(var(--uh)*0.5);
    font-size:calc(var(--u)*2.4);font-weight:700;color:var(--ink);
    padding:calc(var(--uh)*0.4) calc(var(--u)*1.8);border-radius:calc(var(--u)*2);
    background:linear-gradient(135deg,var(--orange-lt),var(--orange));
    box-shadow:0 0 calc(var(--u)*1.5) var(--glow-o);
  }
  #score-num{
    font-size:calc(var(--u)*7);font-weight:900;line-height:1;
    font-variant-numeric:tabular-nums;
    background:linear-gradient(180deg,#fff,var(--yellow));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 calc(var(--u)*1) var(--glow-y));
  }
  #score-lbl{font-size:calc(var(--u)*2.5);color:var(--text-dim);text-align:center;letter-spacing:0.1em;}
  #combo-num{
    font-size:calc(var(--u)*6.2);font-weight:900;line-height:1;text-align:right;
    font-variant-numeric:tabular-nums;transition:transform 0.12s cubic-bezier(.34,1.6,.64,1);
    background:linear-gradient(180deg,var(--orange-lt),var(--orange));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 calc(var(--u)*1.2) var(--glow-o));
  }
  #combo-lbl{font-size:calc(var(--u)*2.5);color:var(--text-dim);text-align:right;letter-spacing:0.1em;}
  #progress-bar{
    position:absolute;top:calc(var(--uh)*13);left:0;right:0;
    height:calc(var(--uh)*1.2);background:rgba(0,0,0,0.4);z-index:20;
    box-shadow:inset 0 0 calc(var(--u)*1) rgba(0,0,0,0.6);
  }
  #progress-fill{
    height:100%;width:0%;
    background:linear-gradient(90deg,var(--green),var(--green-lt),var(--yellow));
    box-shadow:0 0 calc(var(--u)*1.5) var(--glow-g);
    transition:width 0.3s;
  }

  /* ===== ゴール枠 ===== */
  #goal{
    position:absolute;left:10%;width:80%;
    bottom:calc(var(--uh)*38);height:calc(var(--uh)*16);
    border:calc(var(--u)*1.2) solid #f4f8f5;border-bottom:none;
    border-radius:calc(var(--u)*1.5) calc(var(--u)*1.5) 0 0;
    background:rgba(255,255,255,0.05);
    box-shadow:0 0 calc(var(--u)*2.5) rgba(255,255,255,0.35);
  }
  .gnet{
    position:absolute;inset:0;
    background:
      repeating-linear-gradient(90deg,rgba(255,255,255,0.16) 0,rgba(255,255,255,0.16) 1px,transparent 1px,transparent calc(var(--u)*8)),
      repeating-linear-gradient(180deg,rgba(255,255,255,0.16) 0,rgba(255,255,255,0.16) 1px,transparent 1px,transparent calc(var(--uh)*3.5));
  }
  .gpost{
    position:absolute;width:calc(var(--u)*2.5);bottom:0;top:0;
    background:linear-gradient(90deg,#cfd8d2,#fff,#cfd8d2);
    box-shadow:0 0 calc(var(--u)*1.5) rgba(255,255,255,0.4);
  }
  #pl{left:calc(-1*var(--u)*1.2);}
  #pr{right:calc(-1*var(--u)*1.2);}

  /* ===== GK ===== */
  #gk{
    position:absolute;
    left:50%;transform:translateX(-50%);
    bottom:calc(var(--uh)*34);
    width:calc(var(--u)*30);height:calc(var(--uh)*30);
    z-index:10;transition:transform 0.2s ease;
  }
  #gk svg{
    width:100%;height:100%;
    filter:drop-shadow(0 calc(var(--u)*1.2) calc(var(--u)*2.5) rgba(0,0,0,0.85));
    transition:filter 0.2s;
  }
  /* テル中：GKが構えて発光（予備動作を視覚強調） */
  #gk.tell svg{
    filter:drop-shadow(0 calc(var(--u)*1.2) calc(var(--u)*2.5) rgba(0,0,0,0.85))
           drop-shadow(0 0 calc(var(--u)*2.5) var(--glow-g));
    animation:gkbreath 0.55s ease-in-out infinite alternate;
  }
  @keyframes gkbreath{from{transform:scale(1) rotate(0deg);}to{transform:scale(1.04) rotate(0.5deg);}}
  /* 重心移動の影 */
  #gk-shadow{
    position:absolute;left:50%;bottom:calc(var(--uh)*32);
    width:calc(var(--u)*22);height:calc(var(--uh)*2.2);
    transform:translateX(-50%);z-index:9;
    background:radial-gradient(ellipse,rgba(0,0,0,0.45) 0%,transparent 70%);
    transition:transform 0.2s ease;pointer-events:none;
  }

  /* ===== テル表示 ===== */
  #tell{
    position:absolute;bottom:calc(var(--uh)*67);left:0;right:0;
    text-align:center;z-index:15;pointer-events:none;
  }
  #tell-arrow{
    font-size:calc(var(--u)*13);line-height:1;opacity:0;transition:opacity 0.2s;
    filter:drop-shadow(0 0 calc(var(--u)*2) currentColor);
    animation:tellpulse 0.5s ease-in-out infinite alternate;
  }
  @keyframes tellpulse{from{transform:scale(1);}to{transform:scale(1.15);}}
  #tell-txt{
    font-size:calc(var(--u)*4);color:var(--yellow);font-weight:800;
    opacity:0;transition:opacity 0.2s;margin-top:calc(var(--uh)*0.5);
    text-shadow:0 0 calc(var(--u)*1.5) var(--glow-y);
  }

  /* ===== フェイントヒント ===== */
  #feint-hint{
    position:absolute;top:calc(var(--uh)*16);left:0;right:0;
    text-align:center;font-size:calc(var(--u)*3.8);
    color:var(--orange-lt);font-weight:800;z-index:20;
    opacity:0;transition:opacity 0.3s;pointer-events:none;
    text-shadow:0 0 calc(var(--u)*2) var(--glow-o);
    animation:feintshake 0.4s ease-in-out infinite;
  }
  @keyframes feintshake{0%,100%{transform:translateX(0);}25%{transform:translateX(calc(var(--u)*-1));}75%{transform:translateX(calc(var(--u)*1));}}

  /* ===== クリックゾーン ===== */
  #zones{
    position:absolute;inset:0;display:flex;z-index:8;cursor:pointer;
    pointer-events:none;
  }
  #zones.active{pointer-events:auto;}
  #zl,#zr{
    flex:1;display:flex;align-items:flex-end;justify-content:center;
    padding-bottom:calc(var(--uh)*6);opacity:0;transition:opacity 0.3s;
  }
  #zones.active #zl{opacity:1;background:linear-gradient(90deg,rgba(46,230,90,0.28),rgba(46,230,90,0.04));}
  #zones.active #zr{opacity:1;background:linear-gradient(270deg,rgba(255,122,26,0.28),rgba(255,122,26,0.04));}
  .zhint{font-size:calc(var(--u)*5.2);font-weight:800;color:rgba(255,255,255,0.7);text-shadow:0 calc(var(--u)*0.3) calc(var(--u)*1) rgba(0,0,0,0.6);}

  /* ===== ボール ===== */
  #ball{
    position:absolute;
    width:calc(var(--u)*7.5);height:calc(var(--u)*7.5);
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#fff 0%,#eee 45%,#9aa 80%,#778 100%);
    border:1px solid #556;
    left:50%;bottom:calc(var(--uh)*25);
    transform:translateX(-50%);
    z-index:12;transition:all 0.35s ease-out;
    box-shadow:0 calc(var(--u)*0.5) calc(var(--u)*2) rgba(0,0,0,0.55),inset 0 0 calc(var(--u)*1.2) rgba(0,0,0,0.25);
  }
  /* ボールのパネル模様 */
  #ball::before{content:"";position:absolute;inset:18%;border-radius:50%;
    background:radial-gradient(circle at 50% 40%,#333 0%,#333 30%,transparent 32%);opacity:0.4;}

  /* ===== 結果テキスト ===== */
  #result{
    position:absolute;left:0;right:0;top:calc(var(--uh)*25);
    text-align:center;font-size:calc(var(--u)*14);font-weight:900;
    z-index:30;pointer-events:none;
    opacity:0;transform:scale(0.5);transition:all 0.15s;
  }
  #result.show-g{opacity:1;transform:scale(1);color:var(--yellow);text-shadow:0 0 calc(var(--u)*3) var(--orange),0 0 calc(var(--u)*6) var(--glow-o);-webkit-text-stroke:calc(var(--u)*0.4) var(--orange-dk);}
  #result.show-s{opacity:1;transform:scale(1);color:#aab;text-shadow:0 0 calc(var(--u)*3) #224;}

  /* ===== スーパーオーバーレイ ===== */
  #super{
    position:absolute;inset:0;z-index:25;pointer-events:none;
    opacity:0;transition:opacity 0.15s;
    background:
      radial-gradient(circle at 50% 38%,var(--glow-y) 0%,rgba(255,122,26,0.3) 35%,transparent 70%),
      repeating-conic-gradient(from 0deg at 50% 38%,rgba(255,226,74,0.18) 0deg 8deg,transparent 8deg 16deg);
  }
  #super.flash{opacity:1;animation:superspin 0.7s linear;}
  @keyframes superspin{from{filter:hue-rotate(0deg);}to{filter:hue-rotate(40deg);}}

  /* ===== St2 ドット ===== */
  #dots{
    position:absolute;bottom:calc(var(--uh)*6);left:0;right:0;
    text-align:center;z-index:20;pointer-events:none;
  }
  .dot{
    display:inline-block;
    width:calc(var(--u)*3.8);height:calc(var(--u)*3.8);
    border-radius:50%;margin:0 calc(var(--u)*0.7);
    border:1px solid var(--gray);background:rgba(0,0,0,0.25);
    vertical-align:middle;transition:all 0.2s;
  }
  .dot.g{background:radial-gradient(circle at 40% 35%,var(--green-lt),var(--green));border-color:var(--green-lt);box-shadow:0 0 calc(var(--u)*1.2) var(--glow-g);}
  .dot.s{background:radial-gradient(circle at 40% 35%,#778,#445);border-color:#778;}

  /* ===== モーダル ===== */
  .modal{
    position:absolute;inset:0;display:none;
    align-items:center;justify-content:center;
    z-index:50;background:rgba(0,0,0,0.75);
  }
  .modal.show{display:flex;}
  .mbox{
    position:relative;
    background:linear-gradient(135deg,var(--green-deep),#11401f 55%,var(--bg-mid));
    border:calc(var(--u)*0.5) solid var(--green);
    border-radius:calc(var(--u)*4);
    padding:calc(var(--uh)*2.8) calc(var(--u)*6);
    text-align:center;width:84%;overflow:hidden;
    box-shadow:0 0 calc(var(--u)*6) var(--glow-g),inset 0 0 calc(var(--u)*4) rgba(0,0,0,0.4);
  }
  /* モーダル上部のオレンジ帯（RAIDERSカラー） */
  .mbox::before{content:"";position:absolute;top:0;left:0;right:0;height:calc(var(--uh)*0.8);
    background:linear-gradient(90deg,var(--green),var(--yellow),var(--orange));}
  .mtitle{
    font-size:calc(var(--u)*8.5);font-weight:900;
    margin-bottom:calc(var(--uh)*1.2);letter-spacing:0.02em;
    background:linear-gradient(180deg,#fff,var(--yellow),var(--orange-lt));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 calc(var(--u)*2) var(--glow-o));
  }
  .msub{font-size:calc(var(--u)*3.8);color:#eafff0;margin-bottom:calc(var(--uh)*0.8);line-height:1.5;}
  .mscore{
    font-size:calc(var(--u)*7.5);font-weight:900;margin:calc(var(--uh)*1.2) 0;
    font-variant-numeric:tabular-nums;
    background:linear-gradient(180deg,var(--orange-lt),var(--orange));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }
  .mbtn{
    margin-top:calc(var(--uh)*1.8);
    padding:calc(var(--uh)*1.6) calc(var(--u)*8);
    font-size:calc(var(--u)*5);font-weight:800;letter-spacing:0.04em;
    background:linear-gradient(135deg,var(--green-lt),var(--green),var(--dkgreen));
    color:var(--ink);border:none;border-radius:calc(var(--u)*2.5);
    cursor:pointer;transition:transform 0.1s;
    box-shadow:0 calc(var(--u)*0.6) calc(var(--u)*2) rgba(0,0,0,0.45),0 0 calc(var(--u)*2) var(--glow-g);
  }
  .mbtn:active{transform:scale(0.96);}

  /* ===== パーティクル ===== */
  .ptcl{position:absolute;border-radius:50%;pointer-events:none;}
</style>
</head>
<body>
<div id="phone">
  <div id="sky"></div>
  <div id="stand"></div>
  <div id="lights"></div>
  <div id="field">
    <div class="gline" style="top:20%"></div>
    <div class="gline" style="top:55%"></div>
    <div class="gline" style="top:85%"></div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div>
      <div id="stage-lbl">STAGE 1</div>
      <div id="goal-badge">操作を覚える</div>
    </div>
    <div>
      <div id="score-num">0</div>
      <div id="score-lbl">SCORE</div>
    </div>
    <div>
      <div id="combo-num">×1</div>
      <div id="combo-lbl">COMBO</div>
    </div>
  </div>
  <div id="progress-bar"><div id="progress-fill"></div></div>

  <!-- フェイントヒント -->
  <div id="feint-hint"></div>

  <!-- ゴール -->
  <div id="goal">
    <div class="gnet"></div>
    <div class="gpost" id="pl"></div>
    <div class="gpost" id="pr"></div>
  </div>

  <!-- GKの影 -->
  <div id="gk-shadow"></div>

  <!-- GK（SVG描画） -->
  <div id="gk">
    <svg viewBox="0 0 100 160" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="gJersey" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="var(--green-lt)"/><stop offset="1" stop-color="var(--green)"/>
        </linearGradient>
        <linearGradient id="gShorts" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="var(--green)"/><stop offset="1" stop-color="var(--dkgreen)"/>
        </linearGradient>
        <radialGradient id="gGlove" cx="0.4" cy="0.35" r="0.8">
          <stop offset="0" stop-color="var(--orange-lt)"/><stop offset="1" stop-color="var(--orange)"/>
        </radialGradient>
        <linearGradient id="gSkin" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#ffd9b8"/><stop offset="1" stop-color="#eab48a"/>
        </linearGradient>
      </defs>
      <!-- シューズ -->
      <ellipse cx="34" cy="155" rx="11" ry="4.5" fill="#3a2808"/>
      <ellipse cx="66" cy="155" rx="11" ry="4.5" fill="#3a2808"/>
      <path d="M24 152 q10 -3 20 0 v3 q-10 2 -20 0z" fill="var(--orange)"/>
      <path d="M56 152 q10 -3 20 0 v3 q-10 2 -20 0z" fill="var(--orange)"/>
      <!-- ソックス -->
      <rect x="27" y="120" width="15" height="36" rx="5" fill="url(#gShorts)"/>
      <rect x="58" y="120" width="15" height="36" rx="5" fill="url(#gShorts)"/>
      <rect x="27" y="124" width="15" height="4" fill="var(--white)" opacity="0.55"/>
      <rect x="58" y="124" width="15" height="4" fill="var(--white)" opacity="0.55"/>
      <!-- ショーツ -->
      <rect x="25" y="99" width="21" height="26" rx="4" fill="url(#gShorts)"/>
      <rect x="54" y="99" width="21" height="26" rx="4" fill="url(#gShorts)"/>
      <text x="35" y="118" text-anchor="middle" font-size="7" fill="var(--white)" font-weight="900" opacity="0.9">1</text>
      <!-- ユニフォーム -->
      <rect x="22" y="60" width="56" height="46" rx="8" fill="url(#gJersey)"/>
      <rect x="27" y="60" width="5" height="46" rx="2" fill="var(--dkgreen)" opacity="0.55"/>
      <rect x="68" y="60" width="5" height="46" rx="2" fill="var(--dkgreen)" opacity="0.55"/>
      <!-- ロゴ -->
      <text x="50" y="76" text-anchor="middle" font-size="6.2" fill="var(--white)" font-weight="bold" letter-spacing="0.2">RAIDERS</text>
      <text x="50" y="80" text-anchor="middle" font-size="2.6" fill="var(--white)" opacity="0.7">G K</text>
      <text x="50" y="98" text-anchor="middle" font-size="15" fill="var(--orange)" font-weight="900" stroke="var(--white)" stroke-width="0.4">1</text>
      <!-- 腕 -->
      <rect x="5" y="62" width="18" height="13" rx="6" fill="url(#gJersey)"/>
      <rect x="77" y="62" width="18" height="13" rx="6" fill="url(#gJersey)"/>
      <!-- グローブ -->
      <ellipse cx="11" cy="74" rx="9.5" ry="8.5" fill="url(#gGlove)"/>
      <ellipse cx="89" cy="74" rx="9.5" ry="8.5" fill="url(#gGlove)"/>
      <rect x="4"  y="70" width="5" height="7.5" rx="2" fill="var(--orange-dk)"/>
      <rect x="10" y="68" width="5" height="7.5" rx="2" fill="var(--orange-dk)"/>
      <rect x="16" y="70" width="5" height="7.5" rx="2" fill="var(--orange-dk)"/>
      <rect x="81" y="70" width="5" height="7.5" rx="2" fill="var(--orange-dk)"/>
      <rect x="87" y="68" width="5" height="7.5" rx="2" fill="var(--orange-dk)"/>
      <rect x="93" y="70" width="5" height="7.5" rx="2" fill="var(--orange-dk)"/>
      <!-- 首 -->
      <rect x="43" y="45" width="14" height="17" rx="5" fill="url(#gSkin)"/>
      <!-- 頭 -->
      <ellipse cx="50" cy="37" rx="19" ry="21" fill="url(#gSkin)"/>
      <!-- 髪（スパイキー） -->
      <path d="M30 30 Q27 14 38 12 Q42 6 48 11 Q52 5 58 11 Q64 7 70 14 Q74 22 70 31
               L66 24 L62 30 L58 22 L54 29 L50 20 L46 29 L42 22 L38 30 L34 24 Z" fill="#2a1606"/>
      <path d="M33 28 Q40 18 50 18 Q60 18 67 28" fill="#3a2008" opacity="0.7"/>
      <!-- 目 -->
      <ellipse cx="43" cy="36" rx="3.2" ry="3.8" fill="var(--white)"/>
      <ellipse cx="57" cy="36" rx="3.2" ry="3.8" fill="var(--white)"/>
      <circle cx="43" cy="37" r="2.4" fill="#2a1606"/>
      <circle cx="57" cy="37" r="2.4" fill="#2a1606"/>
      <circle cx="44" cy="36" r="0.8" fill="var(--white)"/>
      <circle cx="58" cy="36" r="0.8" fill="var(--white)"/>
      <!-- 眉（凛々しく） -->
      <path d="M39 31 Q43 28.5 47 31" stroke="#2a1606" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <path d="M53 31 Q57 28.5 61 31" stroke="#2a1606" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <!-- 口 -->
      <path d="M46 44 Q50 47 54 44" stroke="#b87858" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- テル -->
  <div id="tell">
    <div id="tell-arrow">←</div>
    <div id="tell-txt">テル</div>
  </div>

  <!-- ボール -->
  <div id="ball"></div>

  <!-- クリックゾーン -->
  <div id="zones">
    <div id="zl"><span class="zhint">◀ 左</span></div>
    <div id="zr"><span class="zhint">右 ▶</span></div>
  </div>

  <!-- 結果テキスト -->
  <div id="result"></div>

  <!-- スーパーオーバーレイ -->
  <div id="super"></div>

  <!-- St2 ドット -->
  <div id="dots"></div>

  <!-- スタートモーダル -->
  <div class="modal show" id="m-start">
    <div class="mbox">
      <div class="mtitle">⚽ コンボシュート</div>
      <div class="msub">GKの<span style="color:var(--yellow)">テル（予備動作）</span>を読んで<br>逆を突いてシュート！</div>
      <div class="msub" style="font-size:calc(var(--u)*3.2);margin-top:calc(var(--uh)*0.8)">
        画面の<span style="color:var(--green)">左半分</span>→左シュート<br>
        画面の<span style="color:var(--orange)">右半分</span>→右シュート
      </div>
      <div class="msub" style="color:var(--orange);margin-top:calc(var(--uh)*0.8)">
        コンボ×10でスーパーゴール！
      </div>
      <button class="mbtn" id="btn-start">キックオフ！</button>
    </div>
  </div>

  <!-- ステージクリアモーダル -->
  <div class="modal" id="m-clear">
    <div class="mbox">
      <div class="mtitle">🎉 STAGE CLEAR!</div>
      <div class="msub" id="clear-msg"></div>
      <div class="mscore" id="clear-score"></div>
      <button class="mbtn" id="btn-next">次のステージへ</button>
    </div>
  </div>

  <!-- ゲームクリアモーダル -->
  <div class="modal" id="m-end">
    <div class="mbox">
      <div class="mtitle">🏆 PERFECT!</div>
      <div class="msub">全ステージ制覇！</div>
      <div class="mscore" id="final-score"></div>
      <button class="mbtn" id="btn-restart">もう一度</button>
    </div>
  </div>
</div>

<script>
// ===== ステージ定義 =====
// St1: streak mode — 3連続ゴールでクリア
//   shots配列を循環、ミスでstreakGoals=0にリセット
// St2: quota mode — 7シュート中5ゴール以上でクリア
const STAGES = [
  {
    id:1, label:'STAGE 1', mode:'streak',
    streakGoal:3,
    shots:[
      {tellDir:'left',  isFeint:false, correct:'right'},
      {tellDir:'right', isFeint:false, correct:'left' },
      {tellDir:'left',  isFeint:false, correct:'right'},
    ]
  },
  {
    id:2, label:'STAGE 2', mode:'quota',
    totalShots:7, passGoals:5,
    shots:[
      {tellDir:'right', isFeint:false, correct:'left' },
      {tellDir:'left',  isFeint:false, correct:'right'},
      {tellDir:'left',  isFeint:true,  correct:'left' },
      {tellDir:'right', isFeint:false, correct:'left' },
      {tellDir:'right', isFeint:true,  correct:'right'},
      {tellDir:'left',  isFeint:false, correct:'right'},
      {tellDir:'left',  isFeint:true,  correct:'left' },
    ]
  }
];

// ===== 状態 =====
let G = {
  stage:1, score:0, combo:1,
  phase:'idle',      // idle|tell|waiting|result
  correctDir:null,
  streakGoals:0,     // St1連続成功数
  shotIdx:0,         // 現在シュートインデックス
  goals:0            // St2ゴール数
};

// ===== DOM =====
const phone = document.getElementById('phone');
const ball  = document.getElementById('ball');
const zones = document.getElementById('zones');
const gk    = document.getElementById('gk');
const tellArrow = document.getElementById('tell-arrow');
const tellTxt   = document.getElementById('tell-txt');
const feintHint = document.getElementById('feint-hint');
const resultEl  = document.getElementById('result');
const superEl   = document.getElementById('super');
const progressFill = document.getElementById('progress-fill');
const dotsEl    = document.getElementById('dots');
const stageLbl  = document.getElementById('stage-lbl');
const scoreNum  = document.getElementById('score-num');
const comboNum  = document.getElementById('combo-num');
const gkShadow  = document.getElementById('gk-shadow');
const goalBadge = document.getElementById('goal-badge');

// ===== HUD更新 =====
function updateHUD(){
  scoreNum.textContent = G.score;
  comboNum.textContent = '×' + G.combo;
  const st = STAGES[G.stage-1];
  if(st.mode === 'streak'){
    progressFill.style.width = (G.streakGoals / st.streakGoal * 100) + '%';
  } else {
    progressFill.style.width = (G.shotIdx / st.totalShots * 100) + '%';
  }
}

// ===== St2ドット初期化 =====
function initDots(){
  const st = STAGES[G.stage-1];
  if(st.mode !== 'quota'){ dotsEl.innerHTML=''; return; }
  let h = '';
  for(let i=0;i<st.totalShots;i++) h += `<span class="dot" id="d${i}"></span>`;
  dotsEl.innerHTML = h;
}

function setDot(idx, isGoal){
  const d = document.getElementById('d'+idx);
  if(d) d.classList.add(isGoal ? 'g' : 's');
}

// ===== テル演出 =====
function showTell(shot){
  G.phase = 'tell';
  G.correctDir = shot.correct;

  // GK重心移動（テル＝予備動作を視覚強調）
  const dx = shot.tellDir === 'left' ? '-11%' : '11%';
  gk.style.transition = 'transform 0.3s ease';
  gk.style.transform = `translateX(calc(-50% + ${dx}))`;
  gk.classList.add('tell');
  gkShadow.style.transform = `translateX(calc(-50% + ${dx}))`;

  // 矢印
  tellArrow.textContent = shot.tellDir === 'left' ? '◀' : '▶';
  tellArrow.style.color = shot.tellDir === 'left' ? '#4af' : '#fa4';
  tellArrow.style.opacity = '1';
  tellTxt.style.opacity = '1';
  tellTxt.textContent = shot.tellDir === 'left' ? 'GK：左に飛びそう！' : 'GK：右に飛びそう！';

  // フェイントヒント（St2のみ）
  if(G.stage === 2 && shot.isFeint){
    feintHint.textContent = '⚠ フェイント！よく見て！';
    feintHint.style.opacity = '1';
  } else {
    feintHint.style.opacity = '0';
  }

  // 0.8秒後に入力受付
  setTimeout(()=>{
    G.phase = 'waiting';
    zones.classList.add('active');
    tellArrow.style.opacity = '0.4';
    tellTxt.style.opacity = '0.4';
  }, 800);
}

// ===== シュート処理 =====
function shoot(dir){
  if(G.phase !== 'waiting') return;
  G.phase = 'result';
  zones.classList.remove('active');

  // ボール飛翔
  const pw = phone.offsetWidth;
  const ph = phone.offsetHeight;
  const goalL = pw * 0.10;
  const goalW = pw * 0.80;
  const tx = dir === 'left' ? goalL + goalW*0.25 : goalL + goalW*0.75;
  ball.style.transition = 'all 0.35s ease-out';
  ball.style.left   = tx + 'px';
  ball.style.bottom = (ph * 0.52) + 'px';
  ball.style.transform = 'translateX(-50%) scale(0.68)';

  const isGoal = (dir === G.correctDir);
  setTimeout(()=>{
    if(isGoal) onGoal(dir);
    else       onSave(dir);
  }, 350);
}

function onGoal(dir){
  const st = STAGES[G.stage-1];
  G.score += 100 * G.combo;
  const prev = G.combo;
  G.combo = Math.min(G.combo+1, 10);

  comboNum.style.transform = 'scale(1.5)';
  setTimeout(()=>{ comboNum.style.transform='scale(1)'; }, 200);

  // GKダイブ失敗（ゴール方向に飛んだが入った）
  gk.classList.remove('tell');
  const dxGK = dir === 'left' ? '-38%' : '38%';
  gk.style.transition = 'transform 0.25s ease-out';
  gk.style.transform  = `translateX(calc(-50% + ${dxGK}))`;
  gkShadow.style.transform = `translateX(calc(-50% + ${dxGK}))`;

  if(prev === 10) superGoal();
  else showResult('GOAL!', true);

  // St2：ドット更新＋shotIdx++（ここでのみ）
  if(st.mode === 'quota'){
    setDot(G.shotIdx, true);
    G.shotIdx++;
    G.goals++;
  } else {
    G.streakGoals++;
  }

  updateHUD();
  setTimeout(checkProgress, 1200);
}

function onSave(dir){
  const st = STAGES[G.stage-1];
  G.combo = 1;

  // GKセーブ（正解方向へジャンプ）
  gk.classList.remove('tell');
  const saveDir = G.correctDir === 'left' ? '-38%' : '38%';
  gk.style.transition = 'transform 0.2s ease-out';
  gk.style.transform  = `translateX(calc(-50% + ${saveDir}))`;
  gkShadow.style.transform = `translateX(calc(-50% + ${saveDir}))`;

  showResult('SAVE...', false);

  if(st.mode === 'quota'){
    setDot(G.shotIdx, false);
    G.shotIdx++;
  } else {
    G.streakGoals = 0; // St1: 連続リセット
  }

  updateHUD();
  setTimeout(checkProgress, 1200);
}

function checkProgress(){
  const st = STAGES[G.stage-1];
  if(st.mode === 'streak'){
    if(G.streakGoals >= st.streakGoal) showClear();
    else resetRound();
  } else {
    if(G.shotIdx >= st.totalShots){
      if(G.goals >= st.passGoals) showClear();
      else retryStage();
    } else {
      resetRound();
    }
  }
}

// ===== スーパーゴール =====
function superGoal(){
  showResult('SUPER GOAL!!', true);
  superEl.classList.add('flash');
  for(let i=0;i<18;i++) spawnParticle();
  setTimeout(()=>{ superEl.classList.remove('flash'); }, 700);
}

function spawnParticle(){
  const p = document.createElement('div');
  p.className = 'ptcl';
  const cols = ['#ffe24a','#ff7a1a','#2ee65a','#5cff86','#fff'];
  p.style.cssText = `
    background:${cols[Math.floor(Math.random()*cols.length)]};
    left:${20+Math.random()*60}%;top:${10+Math.random()*45}%;
    width:${Math.random()*2.5+1.5}vmin;height:${Math.random()*2.5+1.5}vmin;
  `;
  phone.appendChild(p);
  requestAnimationFrame(()=>{
    p.style.transition = 'all 0.85s ease-out';
    p.style.transform = `translate(${(Math.random()-.5)*55}vmin,${Math.random()*38+18}vmin)`;
    p.style.opacity = '0';
  });
  setTimeout(()=>{ p.remove(); }, 900);
}

// ===== 結果テキスト =====
function showResult(msg, isGoal){
  resultEl.textContent = msg;
  resultEl.className = isGoal ? 'show-g' : 'show-s';
  setTimeout(()=>{ resultEl.className=''; }, 900);
}

// ===== ラウンドリセット =====
function resetRound(){
  // ボールを元の位置に（transitionなし）
  ball.style.transition = 'none';
  ball.style.left   = '50%';
  ball.style.bottom = '';
  ball.style.transform = 'translateX(-50%)';
  // GK中央に戻す
  gk.classList.remove('tell');
  gk.style.transition = 'transform 0.45s ease';
  gk.style.transform  = 'translateX(-50%)';
  gkShadow.style.transform = 'translateX(-50%)';
  tellArrow.style.opacity = '0';
  tellTxt.style.opacity   = '0';
  feintHint.style.opacity = '0';
  G.phase = 'idle';
  setTimeout(nextShot, 650);
}

function retryStage(){
  // St2失敗：最初から再挑戦
  G.shotIdx = 0;
  G.goals   = 0;
  G.combo   = 1;
  initDots();
  updateHUD();
  resetRound();
}

// ===== 次シュート =====
function nextShot(){
  const st = STAGES[G.stage-1];
  if(st.mode === 'streak'){
    const idx = G.shotIdx % st.shots.length;
    G.shotIdx++;
    showTell(st.shots[idx]);
  } else {
    if(G.shotIdx < st.totalShots){
      showTell(st.shots[G.shotIdx]);
      // shotIdxはonGoal/onSaveで進める
    }
  }
}

// ===== ステージ開始 =====
function startStage(n){
  G.stage = n;
  G.phase = 'idle';
  G.shotIdx = 0;
  G.goals = 0;
  G.streakGoals = 0;
  G.combo = 1;
  const st = STAGES[n-1];
  stageLbl.textContent = st.label;
  goalBadge.textContent = (st.mode === 'streak') ? '操作を覚える' : 'フェイントを見抜く';
  progressFill.style.width = '0%';
  initDots();
  updateHUD();
  setTimeout(nextShot, 500);
}

// ===== クリア =====
function showClear(){
  const st = STAGES[G.stage-1];
  document.getElementById('clear-score').textContent = 'スコア: ' + G.score;
  if(st.mode === 'streak'){
    document.getElementById('clear-msg').textContent = '3連続ゴール達成！\nコンボの基本をマスター！';
  } else {
    document.getElementById('clear-msg').textContent =
      `${G.goals}/${st.totalShots}ゴール達成！\nフェイントも読み切った！`;
  }
  document.getElementById('m-clear').classList.add('show');
}

// ===== イベント =====
document.getElementById('btn-start').addEventListener('pointerup', ()=>{
  document.getElementById('m-start').classList.remove('show');
  startStage(1);
});
document.getElementById('btn-next').addEventListener('pointerup', ()=>{
  document.getElementById('m-clear').classList.remove('show');
  if(G.stage < STAGES.length){
    startStage(G.stage+1);
  } else {
    document.getElementById('final-score').textContent = '最終スコア: ' + G.score;
    document.getElementById('m-end').classList.add('show');
  }
});
document.getElementById('btn-restart').addEventListener('pointerup', ()=>{
  document.getElementById('m-end').classList.remove('show');
  G.score = 0;
  startStage(1);
});

// ゾーンクリック（左右判定）
zones.addEventListener('pointerup', (e)=>{
  if(G.phase !== 'waiting') return;
  const rect = phone.getBoundingClientRect();
  const x = e.clientX - rect.left;
  shoot(x < rect.width/2 ? 'left' : 'right');
});
</script>
</body>
</html>
