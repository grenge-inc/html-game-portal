<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紐引きチェーンパズル</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
  }
  #phone {
    width: 390px;
    height: 844px;
    background: #16213e;
    border-radius: 40px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  #header {
    padding: 20px 24px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  #title {
    font-size: 18px;
    font-weight: 700;
    color: #e0e0e0;
    letter-spacing: 1px;
  }
  #stage-info {
    font-size: 14px;
    color: #888;
  }
  #moves-area {
    text-align: center;
    padding: 4px 0 8px;
    flex-shrink: 0;
  }
  #moves-label {
    font-size: 13px;
    color: #666;
  }
  #moves-count {
    font-size: 32px;
    font-weight: 800;
    color: #fff;
    line-height: 1;
  }
  #canvas-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 8px;
  }
  canvas {
    display: block;
    touch-action: none;
    cursor: pointer;
  }
  #bottom-area {
    padding: 12px 24px 20px;
    display: flex;
    justify-content: center;
    gap: 16px;
    flex-shrink: 0;
  }
  .btn {
    padding: 10px 24px;
    border: none;
    border-radius: 24px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:active { transform: scale(0.95); }
  #btn-reset {
    background: #2a2a4a;
    color: #aaa;
  }
  #btn-reset:hover { background: #3a3a5a; }

  /* Overlay screens */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 24px;
    border-radius: 40px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .overlay.show {
    opacity: 1;
    pointer-events: all;
  }
  #clear-screen {
    background: rgba(22, 33, 62, 0.95);
  }
  #fail-screen {
    background: rgba(22, 10, 10, 0.95);
  }
  .overlay-title {
    font-size: 42px;
    font-weight: 900;
    letter-spacing: 4px;
  }
  #clear-screen .overlay-title { color: #ffd700; text-shadow: 0 0 20px #ffd700; }
  #fail-screen .overlay-title { color: #ff4444; text-shadow: 0 0 20px #ff4444; }
  .overlay-sub {
    font-size: 18px;
    color: #aaa;
  }
  .overlay-btn {
    padding: 14px 40px;
    border: none;
    border-radius: 30px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .overlay-btn:active { transform: scale(0.95); }
  #btn-next {
    background: linear-gradient(135deg, #ffd700, #ffaa00);
    color: #1a1a2e;
  }
  #btn-retry {
    background: linear-gradient(135deg, #ff6666, #cc2222);
    color: #fff;
  }
  #btn-retry2 {
    background: #2a2a4a;
    color: #aaa;
    margin-top: -10px;
  }
</style>
</head>
<body>
<div id="phone">
  <div id="header">
    <div id="title">紐引きパズル</div>
    <div id="stage-info">Stage <span id="stage-num">1</span> / 10</div>
  </div>
  <div id="moves-area">
    <div id="moves-label">MOVES</div>
    <div id="moves-count">0</div>
  </div>
  <div id="canvas-container">
    <canvas id="gameCanvas"></canvas>
  </div>
  <div id="bottom-area">
    <button class="btn" id="btn-reset">リセット</button>
  </div>

  <!-- Clear screen -->
  <div class="overlay" id="clear-screen">
    <div class="overlay-title">CLEAR!</div>
    <div class="overlay-sub" id="clear-moves-text"></div>
    <button class="overlay-btn" id="btn-next">次のステージ →</button>
  </div>

  <!-- Fail screen -->
  <div class="overlay" id="fail-screen">
    <div class="overlay-title">FAIL</div>
    <div class="overlay-sub">手詰まりです</div>
    <button class="overlay-btn" id="btn-retry">もう一度</button>
  </div>
</div>

<script>
// ===================== STAGE DATA =====================
// Each chain: { head: {x,y,dir}, tail: {x,y,dir}, body: [{x,y},...], color }
// dir: 'up','down','left','right'  (direction the arrow points away from chain)
// body = intermediate cells between head and tail (min 1 cell)

const STAGES = [
  // Stage 1: 3×3, 1 color, 2 moves (min 1, within St1 range 1-3)
  {
    grid: 3,
    chains: [
      {
        head: { x: 0, y: 1, dir: 'left' },
        tail: { x: 2, y: 1, dir: 'right' },
        body: [{ x: 1, y: 1 }],
        color: '#FF6B6B'
      }
    ]
  },
  // Stage 2: 3×3, 1 color, 3 moves (min 2, within St1 range 1-3)
  // head(0,0)-body[(1,0)]-tail(2,0): retract tail twice → (1,0)→(0,0)... wait,
  // retract moves tail to inner=(1,0), body=[], tail=(1,0), adj to head(0,0). 1 move.
  // Need body=2 for min 2: head(0,0)-body[(1,0),(2,0)]-tail(2,1)
  {
    grid: 3,
    chains: [
      {
        head: { x: 0, y: 0, dir: 'up' },
        tail: { x: 2, y: 1, dir: 'right' },
        body: [{ x: 1, y: 0 }, { x: 2, y: 0 }],
        color: '#4ECDC4'
      }
    ]
  },
  // Stage 3: 4×4, 2 colors, 4 moves (min 4 = 2+2 retracts)
  {
    grid: 4,
    chains: [
      {
        head: { x: 0, y: 0, dir: 'up' },
        tail: { x: 0, y: 3, dir: 'down' },
        body: [{ x: 0, y: 1 }, { x: 0, y: 2 }],
        color: '#FF6B6B'
      },
      {
        head: { x: 3, y: 0, dir: 'right' },
        tail: { x: 3, y: 3, dir: 'down' },
        body: [{ x: 3, y: 1 }, { x: 3, y: 2 }],
        color: '#4ECDC4'
      }
    ]
  },
  // Stage 4: 4×4, 2 colors, 5 moves (min 5 = 2+3 retracts)
  {
    grid: 4,
    chains: [
      {
        head: { x: 0, y: 0, dir: 'up' },
        tail: { x: 0, y: 3, dir: 'down' },
        body: [{ x: 0, y: 1 }, { x: 0, y: 2 }],
        color: '#FF6B6B'
      },
      {
        head: { x: 3, y: 0, dir: 'right' },
        tail: { x: 2, y: 3, dir: 'down' },
        body: [{ x: 3, y: 1 }, { x: 3, y: 2 }, { x: 3, y: 3 }],
        color: '#FFE66D'
      }
    ]
  },
  // Stage 5: 5×5, 2 colors, 7 moves (min 7 = 3+4 retracts)
  {
    grid: 5,
    chains: [
      {
        head: { x: 0, y: 0, dir: 'up' },
        tail: { x: 0, y: 4, dir: 'down' },
        body: [{ x: 0, y: 1 }, { x: 0, y: 2 }, { x: 0, y: 3 }],
        color: '#FF6B6B'
      },
      {
        head: { x: 4, y: 0, dir: 'right' },
        tail: { x: 3, y: 4, dir: 'down' },
        body: [{ x: 4, y: 1 }, { x: 4, y: 2 }, { x: 4, y: 3 }, { x: 4, y: 4 }],
        color: '#4ECDC4'
      }
    ]
  },
  // Stage 6: 5×5, 3 colors, 7 moves (min 7 = 2+2+3 retracts)
  // Chain1: (0,0)→(1,0)→(2,0)→(3,0) [head, body×2, tail]  retract tail→body[1]→adj→2 moves
  // Chain2: (0,2)→(1,2)→(2,2)→(3,2)  retract tail→body[1]→adj→2 moves
  // Chain3: (0,4)→(1,4)→(2,4)→(3,4)→(4,4)  retract tail×3→adj→3 moves
  {
    grid: 5,
    chains: [
      {
        head: { x: 0, y: 0, dir: 'left' },
        tail: { x: 3, y: 0, dir: 'right' },
        body: [{ x: 1, y: 0 }, { x: 2, y: 0 }],
        color: '#FF6B6B'
      },
      {
        head: { x: 0, y: 2, dir: 'left' },
        tail: { x: 3, y: 2, dir: 'right' },
        body: [{ x: 1, y: 2 }, { x: 2, y: 2 }],
        color: '#4ECDC4'
      },
      {
        head: { x: 0, y: 4, dir: 'left' },
        tail: { x: 4, y: 4, dir: 'right' },
        body: [{ x: 1, y: 4 }, { x: 2, y: 4 }, { x: 3, y: 4 }],
        color: '#FFE66D'
      }
    ]
  },
  // Stage 7: 6×6, 3 colors, 8 moves (min 8 = 3+2+3 retracts)
  // Chain1: (0,0)→body(0,1)(0,2)(0,3)→(0,4)  3 retracts
  // Chain2: (2,0)→body(3,0)(4,0)→(5,0)        2 retracts
  // Chain3: (2,3)→body(3,3)(4,3)(5,3)→(5,4)   3 retracts (tail not same as body)
  {
    grid: 6,
    chains: [
      {
        head: { x: 0, y: 0, dir: 'up' },
        tail: { x: 0, y: 4, dir: 'down' },
        body: [{ x: 0, y: 1 }, { x: 0, y: 2 }, { x: 0, y: 3 }],
        color: '#FF6B6B'
      },
      {
        head: { x: 2, y: 0, dir: 'up' },
        tail: { x: 5, y: 0, dir: 'right' },
        body: [{ x: 3, y: 0 }, { x: 4, y: 0 }],
        color: '#4ECDC4'
      },
      {
        head: { x: 2, y: 3, dir: 'left' },
        tail: { x: 5, y: 4, dir: 'down' },
        body: [{ x: 3, y: 3 }, { x: 4, y: 3 }, { x: 5, y: 3 }],
        color: '#FFE66D'
      }
    ]
  },
  // Stage 8: 6×6, 4 colors, 8 moves (min 8 = 2+2+2+2 retracts)
  // Chain1: (0,0)→body(0,1)(0,2)→(0,3)  2 retracts
  // Chain2: (2,0)→body(3,0)(4,0)→(5,0)  2 retracts (tail at 5,0 not same as body)
  // Chain3: (0,4)→body(1,4)(2,4)→(3,4)  2 retracts (tail at 3,4 not same as body)
  // Chain4: (4,2)→body(4,3)(4,4)→(4,5)  2 retracts
  {
    grid: 6,
    chains: [
      {
        head: { x: 0, y: 0, dir: 'up' },
        tail: { x: 0, y: 3, dir: 'down' },
        body: [{ x: 0, y: 1 }, { x: 0, y: 2 }],
        color: '#FF6B6B'
      },
      {
        head: { x: 2, y: 0, dir: 'up' },
        tail: { x: 5, y: 0, dir: 'right' },
        body: [{ x: 3, y: 0 }, { x: 4, y: 0 }],
        color: '#4ECDC4'
      },
      {
        head: { x: 0, y: 4, dir: 'left' },
        tail: { x: 3, y: 4, dir: 'right' },
        body: [{ x: 1, y: 4 }, { x: 2, y: 4 }],
        color: '#FFE66D'
      },
      {
        head: { x: 4, y: 2, dir: 'up' },
        tail: { x: 4, y: 5, dir: 'down' },
        body: [{ x: 4, y: 3 }, { x: 4, y: 4 }],
        color: '#A8E6CF'
      }
    ]
  },
  // Stage 9: 7×7, 4 colors, 10 moves (min 10 = 3+3+2+2 retracts)
  // Chain1: (0,0)→body(0,1)(0,2)(0,3)→(0,4)  3 retracts
  // Chain2: (2,0)→body(3,0)(4,0)(5,0)→(6,0)  3 retracts (tail at 6,0)
  // Chain3: (0,5)→body(1,5)(2,5)→(3,5)        2 retracts (tail at 3,5)
  // Chain4: (5,3)→body(5,4)(5,5)→(5,6)        2 retracts
  {
    grid: 7,
    chains: [
      {
        head: { x: 0, y: 0, dir: 'up' },
        tail: { x: 0, y: 4, dir: 'down' },
        body: [{ x: 0, y: 1 }, { x: 0, y: 2 }, { x: 0, y: 3 }],
        color: '#FF6B6B'
      },
      {
        head: { x: 2, y: 0, dir: 'up' },
        tail: { x: 6, y: 0, dir: 'right' },
        body: [{ x: 3, y: 0 }, { x: 4, y: 0 }, { x: 5, y: 0 }],
        color: '#4ECDC4'
      },
      {
        head: { x: 0, y: 5, dir: 'left' },
        tail: { x: 3, y: 5, dir: 'right' },
        body: [{ x: 1, y: 5 }, { x: 2, y: 5 }],
        color: '#FFE66D'
      },
      {
        head: { x: 5, y: 3, dir: 'up' },
        tail: { x: 5, y: 6, dir: 'down' },
        body: [{ x: 5, y: 4 }, { x: 5, y: 5 }],
        color: '#A8E6CF'
      }
    ]
  },
  // Stage 10: 8×8, 5 colors, ~17 moves (min 17 = 3+4+4+3+3 retracts)
  // Chain1: (0,0)→body(0,1)(0,2)(0,3)→(0,4)                3 retracts
  // Chain2: (2,0)→body(3,0)(4,0)(5,0)(6,0)→(7,0)           4 retracts (tail at 7,0)
  // Chain3: (0,6)→body(1,6)(2,6)(3,6)(4,6)→(5,6)           4 retracts (tail at 5,6)
  // Chain4: (7,2)→body(7,3)(7,4)(7,5)→(7,6)                3 retracts
  // Chain5: (2,3)→body(3,3)(4,3)(5,3)→(6,3)                3 retracts (tail at 6,3)
  {
    grid: 8,
    chains: [
      {
        head: { x: 0, y: 0, dir: 'up' },
        tail: { x: 0, y: 4, dir: 'down' },
        body: [{ x: 0, y: 1 }, { x: 0, y: 2 }, { x: 0, y: 3 }],
        color: '#FF6B6B'
      },
      {
        head: { x: 2, y: 0, dir: 'up' },
        tail: { x: 7, y: 0, dir: 'right' },
        body: [{ x: 3, y: 0 }, { x: 4, y: 0 }, { x: 5, y: 0 }, { x: 6, y: 0 }],
        color: '#4ECDC4'
      },
      {
        head: { x: 0, y: 6, dir: 'left' },
        tail: { x: 5, y: 6, dir: 'right' },
        body: [{ x: 1, y: 6 }, { x: 2, y: 6 }, { x: 3, y: 6 }, { x: 4, y: 6 }],
        color: '#FFE66D'
      },
      {
        head: { x: 7, y: 2, dir: 'right' },
        tail: { x: 7, y: 6, dir: 'down' },
        body: [{ x: 7, y: 3 }, { x: 7, y: 4 }, { x: 7, y: 5 }],
        color: '#A8E6CF'
      },
      {
        head: { x: 2, y: 3, dir: 'left' },
        tail: { x: 6, y: 3, dir: 'right' },
        body: [{ x: 3, y: 3 }, { x: 4, y: 3 }, { x: 5, y: 3 }],
        color: '#DDA0DD'
      }
    ]
  }
];

// ===================== GAME STATE =====================
let currentStage = 0;
let chains = [];
let moveCount = 0;
let selectedChainIdx = -1;
let dragStartCell = null;
let isDragging = false;
let gameOver = false;
let cleared = false;

// Animation state
let mergeAnimations = []; // { cells, progress, color, type }
let clearAnimations = [];  // { chainIdx, progress, delay }
let isClearAnimating = false;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let CELL_SIZE = 60;
let GRID_OFFSET_X = 0;
let GRID_OFFSET_Y = 0;
let GRID_N = 3;

function computeLayout(n) {
  const container = document.getElementById('canvas-container');
  const maxW = container.clientWidth - 16;
  const maxH = container.clientHeight - 16;
  const size = Math.min(maxW, maxH, n * 80);
  CELL_SIZE = Math.floor(size / n);
  const totalSize = CELL_SIZE * n;
  canvas.width = totalSize;
  canvas.height = totalSize;
  GRID_OFFSET_X = 0;
  GRID_OFFSET_Y = 0;
  GRID_N = n;
}

// ===================== STAGE LOADING =====================
function loadStage(idx) {
  currentStage = idx;
  const stageData = STAGES[idx];
  GRID_N = stageData.grid;
  computeLayout(GRID_N);

  // Deep clone chains
  chains = stageData.chains.map(c => ({
    head: { ...c.head },
    tail: { ...c.tail },
    body: c.body.map(b => ({ ...b })),
    color: c.color,
    merged: false,
    clearing: false,
    clearProgress: 0
  }));

  moveCount = 0;
  selectedChainIdx = -1;
  isDragging = false;
  gameOver = false;
  cleared = false;
  mergeAnimations = [];
  clearAnimations = [];
  isClearAnimating = false;

  document.getElementById('stage-num').textContent = idx + 1;
  document.getElementById('moves-count').textContent = '0';
  document.getElementById('clear-screen').classList.remove('show');
  document.getElementById('fail-screen').classList.remove('show');

  render();
}

// ===================== COORDINATE HELPERS =====================
function cellCenter(x, y) {
  return {
    cx: GRID_OFFSET_X + x * CELL_SIZE + CELL_SIZE / 2,
    cy: GRID_OFFSET_Y + y * CELL_SIZE + CELL_SIZE / 2
  };
}

function pixelToCell(px, py) {
  const cx = Math.floor((px - GRID_OFFSET_X) / CELL_SIZE);
  const cy = Math.floor((py - GRID_OFFSET_Y) / CELL_SIZE);
  return { x: cx, y: cy };
}

function inBounds(x, y) {
  return x >= 0 && y >= 0 && x < GRID_N && y < GRID_N;
}

function cellEq(a, b) {
  return a.x === b.x && a.y === b.y;
}

function isCellOccupied(x, y, excludeChainIdx) {
  for (let i = 0; i < chains.length; i++) {
    if (i === excludeChainIdx) continue;
    const c = chains[i];
    if (cellEq(c.head, { x, y }) || cellEq(c.tail, { x, y })) return true;
    for (const b of c.body) {
      if (cellEq(b, { x, y })) return true;
    }
  }
  return false;
}

// ===================== DIRECTION HELPERS =====================
function dirToDelta(dir) {
  if (dir === 'up') return { dx: 0, dy: -1 };
  if (dir === 'down') return { dx: 0, dy: 1 };
  if (dir === 'left') return { dx: -1, dy: 0 };
  if (dir === 'right') return { dx: 1, dy: 0 };
  return { dx: 0, dy: 0 };
}

function deltaToDir(dx, dy) {
  if (dx === 0 && dy === -1) return 'up';
  if (dx === 0 && dy === 1) return 'down';
  if (dx === -1 && dy === 0) return 'left';
  if (dx === 1 && dy === 0) return 'right';
  return 'right';
}

function oppositeDir(dir) {
  if (dir === 'up') return 'down';
  if (dir === 'down') return 'up';
  if (dir === 'left') return 'right';
  if (dir === 'right') return 'left';
}

// Direction from cell A to cell B
function dirFromTo(ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  if (dx !== 0 || dy !== 0) return deltaToDir(Math.sign(dx), Math.sign(dy));
  return 'right';
}

// ===================== ARROW DRAWING =====================
function drawArrow(ctx, cx, cy, dir, color, size, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.strokeStyle = color;

  // Arrow: a filled triangle pointing in dir
  const tipLen = size * 0.42;
  const baseHalf = size * 0.28;
  const shaftLen = size * 0.22;
  const shaftHalf = size * 0.10;

  ctx.translate(cx, cy);
  if (dir === 'up') ctx.rotate(-Math.PI / 2);
  else if (dir === 'down') ctx.rotate(Math.PI / 2);
  else if (dir === 'left') ctx.rotate(Math.PI);
  // right = default

  // Draw shaft
  ctx.beginPath();
  ctx.rect(-shaftLen - shaftHalf, -shaftHalf, shaftLen, shaftHalf * 2);
  ctx.fill();

  // Draw arrowhead
  ctx.beginPath();
  ctx.moveTo(tipLen, 0);
  ctx.lineTo(-baseHalf, baseHalf);
  ctx.lineTo(-baseHalf, -baseHalf);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

// ===================== CHAIN SEGMENT DRAWING =====================
// Draw the rope (body) between head and tail
// Uses rounded rects for each body cell, with connector lines between adjacent cells

function drawChainSegment(ctx, fromCell, toCell, color, width) {
  const a = cellCenter(fromCell.x, fromCell.y);
  const b = cellCenter(toCell.x, toCell.y);
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(a.cx, a.cy);
  ctx.lineTo(b.cx, b.cy);
  ctx.stroke();
}

function getChainFullPath(chain) {
  // Returns array of cells: head, body[0..n], tail
  return [chain.head, ...chain.body, chain.tail];
}

function drawChain(chain, alpha) {
  if (chain.merged) return; // drawn separately during clear animation

  const path = getChainFullPath(chain);
  const ropeWidth = CELL_SIZE * 0.22;
  const cellR = CELL_SIZE * 0.18;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Draw rope lines between consecutive path cells
  ctx.strokeStyle = chain.color;
  ctx.lineWidth = ropeWidth;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  const start = cellCenter(path[0].x, path[0].y);
  ctx.moveTo(start.cx, start.cy);
  for (let i = 1; i < path.length; i++) {
    const p = cellCenter(path[i].x, path[i].y);
    ctx.lineTo(p.cx, p.cy);
  }
  ctx.stroke();

  // Draw body cells as filled circles (rope knots)
  for (const b of chain.body) {
    const p = cellCenter(b.x, b.y);
    ctx.fillStyle = chain.color;
    ctx.beginPath();
    ctx.arc(p.cx, p.cy, cellR, 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw head arrow
  const headDir = chain.head.dir;
  const headP = cellCenter(chain.head.x, chain.head.y);
  drawArrow(ctx, headP.cx, headP.cy, headDir, chain.color, CELL_SIZE * 0.5, 1.0);

  // Draw tail arrow
  const tailDir = chain.tail.dir;
  const tailP = cellCenter(chain.tail.x, chain.tail.y);
  drawArrow(ctx, tailP.cx, tailP.cy, tailDir, chain.color, CELL_SIZE * 0.5, 1.0);

  ctx.restore();
}

// ===================== MERGE ANIMATION =====================
function startMergeAnimation(cells, color) {
  mergeAnimations.push({ cells, color, progress: 0, maxProgress: 30 });
}

function updateMergeAnimations() {
  for (let i = mergeAnimations.length - 1; i >= 0; i--) {
    mergeAnimations[i].progress++;
    if (mergeAnimations[i].progress >= mergeAnimations[i].maxProgress) {
      mergeAnimations.splice(i, 1);
    }
  }
}

function drawMergeAnimations() {
  for (const anim of mergeAnimations) {
    const t = anim.progress / anim.maxProgress;
    // Ripple / glow effect
    const scale = 1 + t * 1.5;
    const alpha = (1 - t) * 0.8;
    for (const cell of anim.cells) {
      const p = cellCenter(cell.x, cell.y);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = anim.color;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(p.cx, p.cy, CELL_SIZE * 0.4 * scale, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  }
}

// ===================== CLEAR ANIMATION =====================
// Animate cleared chains: head -> tail fade-out sequentially
let clearAnimFrame = null;
let clearAnimData = []; // { chain, pathLength, progress (0..pathLength+5) }
let clearAnimDone = false;

function startClearAnimation() {
  isClearAnimating = true;
  clearAnimData = chains.map(c => ({
    chain: c,
    path: getChainFullPath(c),
    progress: 0
  }));
  clearAnimDone = false;
  animateClear();
}

function animateClear() {
  if (clearAnimDone) return;

  let allDone = true;
  for (const d of clearAnimData) {
    d.progress += 0.4;
    if (d.progress < d.path.length + 3) allDone = false;
  }

  render();

  if (allDone) {
    clearAnimDone = true;
    showClearScreen();
    return;
  }
  requestAnimationFrame(animateClear);
}

function drawClearChain(d) {
  const path = d.path;
  const ropeWidth = CELL_SIZE * 0.22;
  const cellR = CELL_SIZE * 0.18;
  const prog = d.progress;

  for (let i = 0; i < path.length; i++) {
    // How far this cell is from head (i=0)
    const distFromHead = i;
    // Cell alpha: fades out as progress passes through it
    let alpha = 1.0;
    const wave = prog - distFromHead;
    if (wave > 0) {
      alpha = Math.max(0, 1 - wave * 0.5);
    }
    if (alpha <= 0) continue;

    const p = cellCenter(path[i].x, path[i].y);
    ctx.save();
    ctx.globalAlpha = alpha;

    // Draw segment line to next cell
    if (i < path.length - 1) {
      const p2 = cellCenter(path[i + 1].x, path[i + 1].y);
      const nextDist = i + 1;
      const nextWave = prog - nextDist;
      const nextAlpha = Math.max(0, nextWave > 0 ? 1 - nextWave * 0.5 : 1.0);
      const lineAlpha = Math.min(alpha, nextAlpha > 0 ? nextAlpha : alpha);
      ctx.globalAlpha = lineAlpha * 0.8;
      ctx.strokeStyle = d.chain.color;
      ctx.lineWidth = ropeWidth;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(p.cx, p.cy);
      ctx.lineTo(p2.cx, p2.cy);
      ctx.stroke();
    }

    ctx.globalAlpha = alpha;

    // Body cells
    if (i > 0 && i < path.length - 1) {
      ctx.fillStyle = d.chain.color;
      ctx.beginPath();
      ctx.arc(p.cx, p.cy, cellR, 0, Math.PI * 2);
      ctx.fill();
    }

    // Head arrow (i=0)
    if (i === 0) {
      drawArrow(ctx, p.cx, p.cy, path[0].dir, d.chain.color, CELL_SIZE * 0.5, 1.0);
      // sparkle
      if (wave > 0 && wave < 2) {
        const sp = wave / 2;
        ctx.globalAlpha = (1 - sp) * 0.9;
        ctx.fillStyle = '#fff';
        for (let k = 0; k < 6; k++) {
          const angle = (k / 6) * Math.PI * 2 + sp * Math.PI;
          const r = CELL_SIZE * 0.4 * sp;
          ctx.beginPath();
          ctx.arc(p.cx + Math.cos(angle) * r, p.cy + Math.sin(angle) * r, 3, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    // Tail arrow (last)
    if (i === path.length - 1) {
      drawArrow(ctx, p.cx, p.cy, path[path.length - 1].dir, d.chain.color, CELL_SIZE * 0.5, 1.0);
    }

    ctx.restore();
  }
}

// ===================== RENDER =====================
function drawGrid() {
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  for (let x = 0; x < GRID_N; x++) {
    for (let y = 0; y < GRID_N; y++) {
      ctx.strokeRect(
        GRID_OFFSET_X + x * CELL_SIZE + 0.5,
        GRID_OFFSET_Y + y * CELL_SIZE + 0.5,
        CELL_SIZE - 1, CELL_SIZE - 1
      );
    }
  }
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background
  ctx.fillStyle = '#0f0f23';
  ctx.roundRect(0, 0, canvas.width, canvas.height, 12);
  ctx.fill();

  drawGrid();

  if (isClearAnimating) {
    // Draw clear animation
    for (const d of clearAnimData) {
      drawClearChain(d);
    }
    drawMergeAnimations();
    return;
  }

  // Draw normal chains
  for (let i = 0; i < chains.length; i++) {
    const alpha = (selectedChainIdx === i) ? 1.0 : (selectedChainIdx >= 0 ? 0.6 : 1.0);
    drawChain(chains[i], alpha);
  }

  drawMergeAnimations();
}

// ===================== MOVE LOGIC =====================
// Find which chain's head or tail is at cell (x,y)
function findChainEndAt(x, y) {
  for (let i = 0; i < chains.length; i++) {
    const c = chains[i];
    if (c.merged) continue;
    if (cellEq(c.head, { x, y })) return { chainIdx: i, end: 'head' };
    if (cellEq(c.tail, { x, y })) return { chainIdx: i, end: 'tail' };
  }
  return null;
}

// Get the "adjacent body cell" to head or tail
function getInnerCell(chain, end) {
  if (end === 'head') {
    return chain.body.length > 0 ? chain.body[0] : chain.tail;
  } else {
    return chain.body.length > 0 ? chain.body[chain.body.length - 1] : chain.head;
  }
}

// Move head/tail one step in direction (dx,dy)
// Returns true if move was valid
function tryMove(chainIdx, end, nx, ny) {
  const chain = chains[chainIdx];
  const moved = end === 'head' ? chain.head : chain.tail;
  const other = end === 'head' ? chain.tail : chain.head;

  // Check bounds
  if (!inBounds(nx, ny)) return false;

  // Check not occupied by another chain
  if (isCellOccupied(nx, ny, chainIdx)) return false;

  // Determine if extending or retracting
  const inner = getInnerCell(chain, end);
  const isRetract = cellEq({ x: nx, y: ny }, inner);
  const isBodyCell = chain.body.some(b => cellEq(b, { x: nx, y: ny }));
  const isOtherEnd = cellEq({ x: nx, y: ny }, other);

  if (isOtherEnd) {
    // Can't move onto the other end unless body exists
    // Actually we don't allow: head can't occupy same cell as tail directly
    return false;
  }

  if (isRetract && chain.body.length === 0) {
    // Can't retract further: body must have at least 1 cell
    // Actually head/tail can't move onto each other
    return false;
  }

  const oldX = moved.x, oldY = moved.y;

  if (isRetract) {
    // Shrink: remove inner body cell
    if (end === 'head') chain.body.shift();
    else chain.body.pop();
  } else if (isBodyCell) {
    // Can't extend onto body cell (already occupied by self)
    return false;
  } else {
    // Extend: push current position into body
    if (end === 'head') chain.body.unshift({ x: oldX, y: oldY });
    else chain.body.push({ x: oldX, y: oldY });
  }

  moved.x = nx;
  moved.y = ny;
  // Update direction to point away from chain
  const innerNew = getInnerCell(chain, end);
  const dx = moved.x - innerNew.x, dy = moved.y - innerNew.y;
  if (dx !== 0 || dy !== 0) {
    moved.dir = deltaToDir(dx, dy);
  }

  return true;
}

// Check if any chain's head and tail have become adjacent → merge
function checkMerge() {
  let anyMerge = false;
  for (let i = 0; i < chains.length; i++) {
    const c = chains[i];
    if (c.merged) continue;
    // Chain is complete when head and tail are adjacent (manhattan distance = 1)
    const dx = Math.abs(c.head.x - c.tail.x);
    const dy = Math.abs(c.head.y - c.tail.y);
    if (dx + dy === 1) {
      c.merged = true;
      anyMerge = true;
      startMergeAnimation([c.head, c.tail, ...c.body], c.color);
    }
  }
  return anyMerge;
}

function checkClear() {
  return chains.every(c => c.merged);
}

function checkFail() {
  // Check if any non-merged chain has at least one legal move
  for (let i = 0; i < chains.length; i++) {
    const c = chains[i];
    if (c.merged) continue;
    const dirs = [{ dx: 0, dy: -1 }, { dx: 0, dy: 1 }, { dx: -1, dy: 0 }, { dx: 1, dy: 0 }];
    for (const end of ['head', 'tail']) {
      const pos = end === 'head' ? c.head : c.tail;
      for (const d of dirs) {
        const nx = pos.x + d.dx, ny = pos.y + d.dy;
        if (!inBounds(nx, ny)) continue;
        if (isCellOccupied(nx, ny, i)) continue;
        const inner = getInnerCell(c, end);
        if (cellEq({ x: nx, y: ny }, (end === 'head' ? c.tail : c.head))) {
          // Moving onto the other end is blocked by tryMove; skip
          continue;
        }
        // Check if this is retract (moves to inner body cell)
        const isRetract = cellEq({ x: nx, y: ny }, inner);
        if (isRetract && c.body.length === 0) continue; // can't retract
        const isSelfBody = c.body.some(b => cellEq(b, { x: nx, y: ny }));
        if (isSelfBody && !isRetract) continue;
        return false; // found a legal move
      }
    }
  }
  return true; // no legal moves
}

// ===================== INTERACTION =====================
let mouseDownCell = null;
let mouseDownEnd = null;
let mouseDownChainIdx = -1;

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  let clientX, clientY;
  if (e.touches) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top) * scaleY
  };
}

canvas.addEventListener('mousedown', onPointerDown);
canvas.addEventListener('mousemove', onPointerMove);
canvas.addEventListener('mouseup', onPointerUp);
canvas.addEventListener('touchstart', e => { e.preventDefault(); onPointerDown(e); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); onPointerMove(e); }, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); onPointerUp(e); }, { passive: false });

function onPointerDown(e) {
  if (gameOver || isClearAnimating) return;
  const pos = getCanvasPos(e);
  const cell = pixelToCell(pos.x, pos.y);
  const found = findChainEndAt(cell.x, cell.y);
  if (found) {
    mouseDownCell = cell;
    mouseDownChainIdx = found.chainIdx;
    mouseDownEnd = found.end;
    selectedChainIdx = found.chainIdx;
    isDragging = true;
    render();
  }
}

let lastDragCell = null;

function onPointerMove(e) {
  if (!isDragging || gameOver || isClearAnimating) return;
  const pos = getCanvasPos(e);
  const cell = pixelToCell(pos.x, pos.y);

  if (!inBounds(cell.x, cell.y)) return;
  if (lastDragCell && cellEq(cell, lastDragCell)) return;

  // Determine direction of drag
  const chain = chains[mouseDownChainIdx];
  const movedEnd = mouseDownEnd === 'head' ? chain.head : chain.tail;

  // Only allow moves to adjacent cells
  const dx = cell.x - movedEnd.x, dy = cell.y - movedEnd.y;
  if (Math.abs(dx) + Math.abs(dy) !== 1) {
    // Not adjacent, skip
    lastDragCell = cell;
    return;
  }

  const oldState = {
    head: { ...chain.head },
    tail: { ...chain.tail },
    body: chain.body.map(b => ({ ...b })),
    merged: chain.merged
  };

  if (tryMove(mouseDownChainIdx, mouseDownEnd, cell.x, cell.y)) {
    moveCount++;
    document.getElementById('moves-count').textContent = moveCount;
    lastDragCell = cell;

    // Update mouseDown to current position
    // Check merge
    const mergeOccurred = checkMerge();

    if (checkClear()) {
      // Trigger clear animation
      setTimeout(() => {
        startClearAnimation();
      }, mergeOccurred ? 400 : 50);
    } else if (checkFail()) {
      setTimeout(() => showFailScreen(), 500);
      gameOver = true;
    }

    render();
  }
}

function onPointerUp(e) {
  if (!isDragging) return;
  isDragging = false;
  selectedChainIdx = -1;
  lastDragCell = null;
  render();
}

// ===================== SCREENS =====================
function showClearScreen() {
  const screen = document.getElementById('clear-screen');
  document.getElementById('clear-moves-text').textContent = moveCount + ' moves';
  screen.classList.add('show');
}

function showFailScreen() {
  document.getElementById('fail-screen').classList.add('show');
}

document.getElementById('btn-next').addEventListener('click', () => {
  if (currentStage < STAGES.length - 1) {
    loadStage(currentStage + 1);
  } else {
    // All stages complete
    document.getElementById('clear-screen').classList.remove('show');
    document.getElementById('clear-moves-text').textContent = '全ステージクリア！';
    document.getElementById('clear-screen').classList.add('show');
    document.getElementById('btn-next').textContent = 'もう一度';
    if (document.getElementById('btn-next').dataset.reset === '1') {
      loadStage(0);
    }
    document.getElementById('btn-next').dataset.reset = '1';
  }
});

document.getElementById('btn-retry').addEventListener('click', () => {
  loadStage(currentStage);
});

document.getElementById('btn-reset').addEventListener('click', () => {
  loadStage(currentStage);
});

// ===================== ANIMATION LOOP =====================
function loop() {
  if (mergeAnimations.length > 0) {
    updateMergeAnimations();
    render();
  }
  requestAnimationFrame(loop);
}

// ===================== INIT =====================
loadStage(0);
loop();
</script>
