<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>矢印スタックパズル</title>
<style>
  :root {
    --phone-aspect: 9 / 19.5;
    --letterbox: #111820;
    --body-text: #f0f8ff;
    --bg-sky: #5BC8F5;
    --bg-sky-grad1: #7dd6f7;
    --bg-sky-dark: #3aaede;
    --bg-sky-deep: #1e8ec4;
    --tile-face: #f8f8f2;
    --tile-face-hover: #ffffff;
    --tile-side-l: #b8ddf5;
    --tile-side-r: #94c8ed;
    --tile-base: #cce4f5;
    --tile-border: rgba(0,80,140,0.18);
    --tile-merged: #ffe082;
    --arrow-color: #F5A623;
    --arrow-glow: rgba(245,166,35,0.55);
    --floor-arrow-color: rgba(255,255,255,0.75);
    --floor-arrow-bg: rgba(60,160,220,0.35);
    --floor-arrow-border: rgba(255,255,255,0.4);
    --ui-btn: #2d5f7a;
    --ui-btn-hover: #366e8c;
    --ui-btn-text: #f0faff;
    --ui-counter-bg: #1e4f68;
    --text-main: #1a3a4a;
    --text-hud: #f0faff;
    --overlay-bg: rgba(72,188,238,0.95);
    --allclear-bg: rgba(58,174,224,0.97);
    --gameover-bg: rgba(220,60,60,0.93);
    --shadow-text: rgba(0,70,110,0.28);
    /* grass green cell colors */
    --cell-bg: rgba(56,142,60,0.85);
    --cell-border: rgba(27,94,32,0.6);
    --cell-grass-hi: rgba(102,187,106,0.5);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    width:100%;height:100%;
    overflow:hidden;
    background:var(--letterbox);
    color:var(--body-text);
    font-family:'Helvetica Neue',system-ui,sans-serif;
    user-select:none;
    -webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
  }
  body{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #phone{
    position:relative;
    overflow:hidden;
    width: min(100vw, calc(100vh * 9 / 19.5));
    height: min(100vh, calc(100vw * 19.5 / 9));
    --pw: min(100vw, calc(100vh * 9 / 19.5));
    --ph: min(100vh, calc(100vw * 19.5 / 9));
    --u:  calc(var(--pw) / 100);
    --uh: calc(var(--ph) / 100);
    background: linear-gradient(180deg, var(--bg-sky-grad1) 0%, var(--bg-sky) 45%, var(--bg-sky-dark) 100%);
  }
  #phone::before{
    content:'';
    position:absolute;
    inset:0;
    background:
      radial-gradient(ellipse 60% 30% at 50% 10%, rgba(255,255,255,0.22) 0%, transparent 70%),
      radial-gradient(ellipse 40% 20% at 20% 75%, rgba(255,255,255,0.10) 0%, transparent 60%);
    pointer-events:none;
    z-index:0;
  }

  /* ─── HUD ─── */
  #hud{
    position:absolute;
    top:0;left:0;right:0;
    height:calc(var(--uh)*11);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0 calc(var(--u)*4);
    z-index:10;
  }
  #stage-label{
    font-size:calc(var(--u)*6);
    font-weight:800;
    color:var(--ui-btn);
    letter-spacing:0.03em;
    text-align:center;
    flex:1;
  }
  #reset-btn{
    position:absolute;
    right:calc(var(--u)*4);
    background: linear-gradient(135deg, var(--ui-btn) 0%, var(--ui-counter-bg) 100%);
    border:none;
    border-radius:50%;
    width:calc(var(--u)*11);
    height:calc(var(--u)*11);
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    color:var(--text-hud);
    font-size:calc(var(--u)*5.5);
    box-shadow: 0 calc(var(--u)*0.5) calc(var(--u)*2) rgba(0,50,90,0.28);
  }

  /* ─── Board ─── */
  #board-wrap{
    position:absolute;
    left:0;right:0;
    top:calc(var(--uh)*12);
    bottom:calc(var(--uh)*14);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #board{
    position:relative;
  }

  /* ─── Grid cells (grass green) ─── */
  .cell{
    position:absolute;
    background: rgba(56,142,60,0.90);
    border: 1px solid var(--cell-border);
    border-radius:calc(var(--u)*1);
    pointer-events:none;
    z-index:1;
    box-shadow: inset 0 1px 0 rgba(102,187,106,0.4);
  }

  /* ─── Hole cells (no ground) ─── */
  .cell.hole{
    background: transparent;
    border: 1px dashed rgba(0,0,0,0.2);
    box-shadow: none;
  }

  /* ─── Jump cells (special) ─── */
  .cell.jump-cell{
    background: linear-gradient(145deg, rgba(255,200,0,0.4) 0%, rgba(200,150,0,0.5) 100%);
    border: 2px solid rgba(255,220,0,0.7);
    box-shadow: inset 0 1px 0 rgba(255,230,80,0.5), 0 0 6px rgba(255,200,0,0.3);
    overflow: hidden;
  }
  /* jump ring animation */
  .jump-sq{
    position:absolute;
    border: 2px solid rgba(255,210,0,0.7);
    border-radius: 3px;
    animation: jumpSqExpand 1.4s ease-out infinite;
    pointer-events:none;
  }
  .jump-sq:nth-child(1){ animation-delay: 0s; }
  .jump-sq:nth-child(2){ animation-delay: 0.35s; }
  .jump-sq:nth-child(3){ animation-delay: 0.7s; }
  .jump-sq:nth-child(4){ animation-delay: 1.05s; }
  @keyframes jumpSqExpand {
    0%  { inset:35%; opacity:0.9; }
    100%{ inset:-10%; opacity:0; }
  }

  /* ─── Floor arrow cells ─── */
  .floor-arrow{
    position:absolute;
    background: var(--floor-arrow-bg);
    border: 1.5px solid var(--floor-arrow-border);
    border-radius:calc(var(--u)*1.5);
    display:flex;
    align-items:center;
    justify-content:center;
    pointer-events:none;
    z-index:2;
    overflow:hidden;
  }
  .floor-arrow::before{
    content:'';
    position:absolute;
    inset:0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    pointer-events:none;
  }
  .floor-arrow-stripe{
    position:absolute;
    pointer-events:none;
    opacity:0.35;
  }
  .floor-arrow[data-dir="right"] .floor-arrow-stripe{
    width:200%; height:100%;
    background: repeating-linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.5) 20%, transparent 40%);
    animation: flowRight 1.2s linear infinite;
  }
  .floor-arrow[data-dir="left"] .floor-arrow-stripe{
    width:200%; height:100%;
    background: repeating-linear-gradient(270deg, transparent 0%, rgba(255,255,255,0.5) 20%, transparent 40%);
    animation: flowLeft 1.2s linear infinite;
  }
  .floor-arrow[data-dir="down"] .floor-arrow-stripe{
    width:100%; height:200%;
    background: repeating-linear-gradient(180deg, transparent 0%, rgba(255,255,255,0.5) 20%, transparent 40%);
    animation: flowDown 1.2s linear infinite;
  }
  .floor-arrow[data-dir="up"] .floor-arrow-stripe{
    width:100%; height:200%;
    background: repeating-linear-gradient(0deg, transparent 0%, rgba(255,255,255,0.5) 20%, transparent 40%);
    animation: flowUp 1.2s linear infinite;
  }
  .floor-arrow[data-dir="upright"] .floor-arrow-stripe,
  .floor-arrow[data-dir="downright"] .floor-arrow-stripe,
  .floor-arrow[data-dir="downleft"] .floor-arrow-stripe,
  .floor-arrow[data-dir="upleft"] .floor-arrow-stripe{
    width:200%; height:200%;
    background: repeating-linear-gradient(45deg, transparent 0%, rgba(255,255,255,0.5) 20%, transparent 40%);
    animation: flowDiag 1.2s linear infinite;
  }
  @keyframes flowRight { from{transform:translateX(-50%)} to{transform:translateX(0%)} }
  @keyframes flowLeft  { from{transform:translateX(0%)} to{transform:translateX(-50%)} }
  @keyframes flowDown  { from{transform:translateY(-50%)} to{transform:translateY(0%)} }
  @keyframes flowUp    { from{transform:translateY(0%)} to{transform:translateY(-50%)} }
  @keyframes flowDiag  { from{transform:translate(-25%,-25%)} to{transform:translate(0%,0%)} }

  .floor-arrow-icon{
    position:relative;
    z-index:3;
    font-size:55%;
    color: var(--floor-arrow-color);
    filter: drop-shadow(0 0 3px rgba(255,255,255,0.8));
    font-weight:900;
    line-height:1;
  }

  /* ─── Tile ─── */
  .tile{
    position:absolute;
    cursor:pointer;
    z-index:5;
    transition: none;
  }
  .tile.step-anim{
    transition:left 0.12s cubic-bezier(.4,0,.2,1), top 0.12s cubic-bezier(.4,0,.2,1);
  }
  .tile-inner{
    position:relative;
    width:100%;height:100%;
    border-radius:calc(var(--u)*1.5);
    background: linear-gradient(145deg, var(--tile-face-hover) 0%, var(--tile-face) 60%, var(--tile-base) 100%);
    border: 2px solid var(--tile-border);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .tile:hover .tile-inner{
    filter:brightness(1.05);
  }
  .tile-inner::after{
    content:'';
    position:absolute;
    top:0;left:0;right:0;
    height:45%;
    background: linear-gradient(to bottom, rgba(255,255,255,0.45) 0%, transparent 100%);
    border-radius:calc(var(--u)*1.5) calc(var(--u)*1.5) 0 0;
    pointer-events:none;
  }

  /* tile arrow indicator */
  .tile-arrow{
    position:absolute;
    top:50%;left:50%;
    width:58%;height:58%;
    pointer-events:none;
  }

  /* tile merged (absorbed) glow */
  .tile.merged .tile-inner{
    background: linear-gradient(145deg, #fff9c4 0%, var(--tile-merged) 60%, #ffca28 100%);
  }

  /* bounce animation */
  @keyframes tileBounce {
    0%   { transform:scale(1,1); }
    15%  { transform:scale(1.12,0.88); }
    45%  { transform:scale(0.90,1.14); }
    70%  { transform:scale(1.08,0.94); }
    88%  { transform:scale(0.97,1.04); }
    100% { transform:scale(1,1); }
  }
  .tile.moving .tile-inner{
    animation:tileBounce 0.28s cubic-bezier(.36,.07,.19,.97) both;
  }

  /* game over fall animation */
  @keyframes goFall {
    0%   { transform:scale(1); opacity:1; }
    30%  { transform:scale(1.05); opacity:1; }
    100% { transform:scale(0); opacity:0; }
  }
  .tile.gameover-fall .tile-inner{
    animation:goFall 0.55s ease-in both;
  }

  /* clear sparkle */
  @keyframes clearPulse {
    0%{ transform:scale(1); filter:brightness(1) }
    40%{ transform:scale(1.08); filter:brightness(1.3) drop-shadow(0 0 10px gold) }
    100%{ transform:scale(1); filter:brightness(1) }
  }
  .tile.cleared .tile-inner{
    animation:clearPulse 0.55s ease-in-out;
  }

  /* ─── Color tiles (Lv26+) ─── */
  .tile-inner[data-color="red"] {
    background: linear-gradient(145deg, #FF8E8E 0%, #FF6B6B 50%, #E54545 100%);
    border-color: rgba(180,30,30,0.4);
  }
  .tile-inner[data-color="blue"] {
    background: linear-gradient(145deg, #8EB5FF 0%, #6B9FFF 50%, #4577E5 100%);
    border-color: rgba(30,60,180,0.4);
  }
  .tile-inner[data-color="yellow"] {
    background: linear-gradient(145deg, #FFE97A 0%, #FFD93D 50%, #E5B800 100%);
    border-color: rgba(160,120,0,0.4);
  }
  .tile-inner[data-color="red"] .tile-arrow path,
  .tile-inner[data-color="blue"] .tile-arrow path {
    fill: #ffffff;
  }
  .tile-inner[data-color="yellow"] .tile-arrow path {
    fill: #7a5900;
  }
  /* color dot badge */
  .tile-color-dot{
    position:absolute;
    bottom:8%;right:8%;
    width:18%;height:18%;
    border-radius:50%;
    border:1.5px solid rgba(255,255,255,0.7);
    z-index:4;
  }
  .tile-color-dot[data-color="red"]{ background:#c0392b; }
  .tile-color-dot[data-color="blue"]{ background:#1a5fb4; }
  .tile-color-dot[data-color="yellow"]{ background:#b8860b; }

  /* color mix fail animation */
  @keyframes colorMixFail {
    0%  { transform:scale(1);   opacity:1; }
    25% { transform:scale(1.1); opacity:0.7; filter:brightness(2); }
    50% { transform:scale(0.9); opacity:0.5; }
    75% { transform:scale(1.05);opacity:0.3; }
    100%{ transform:scale(0);   opacity:0; }
  }
  .color-mix-fail .tile-inner{
    animation:colorMixFail 0.8s ease-in forwards;
  }

  /* ─── Bottom info bar ─── */
  #info-bar{
    position:absolute;
    bottom:calc(var(--uh)*1.5);
    left:calc(var(--u)*4);
    right:calc(var(--u)*4);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:calc(var(--u)*3);
    z-index:10;
  }
  .info-hint{
    font-size:calc(var(--u)*3.5);
    color:rgba(255,255,255,0.8);
    text-align:center;
    text-shadow:0 1px 3px rgba(0,50,90,0.4);
  }

  /* ─── Overlay ─── */
  .modal-overlay{
    position:absolute;
    inset:0;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:100;
    backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);
  }
  .modal-overlay.show{ display:flex; }

  #clear-overlay{ background: var(--overlay-bg); }
  #clear-title{
    font-size:calc(var(--u)*16);
    font-weight:900;
    color:var(--ui-btn);
    letter-spacing:0.06em;
    text-shadow:
      0 calc(var(--u)*1) calc(var(--u)*3) var(--shadow-text),
      0 0 calc(var(--u)*6) rgba(255,255,255,0.45);
    margin-bottom:calc(var(--uh)*2);
  }
  #clear-stage-info{
    font-size:calc(var(--u)*5.5);
    font-weight:700;
    color:var(--ui-btn);
    margin-bottom:calc(var(--uh)*3);
    letter-spacing:0.04em;
  }

  #gameover-overlay{ background: var(--gameover-bg); }
  #gameover-title{
    font-size:calc(var(--u)*14);
    font-weight:900;
    color:#fff;
    letter-spacing:0.05em;
    text-shadow:0 2px 8px rgba(0,0,0,0.35);
    margin-bottom:calc(var(--uh)*1.5);
  }
  #gameover-sub{
    font-size:calc(var(--u)*5.5);
    color:rgba(255,255,255,0.9);
    margin-bottom:calc(var(--uh)*4);
    letter-spacing:0.04em;
  }

  #allclear-overlay{ background: var(--allclear-bg); z-index:200; }
  #allclear-title{
    font-size:calc(var(--u)*13);
    font-weight:900;
    color:var(--ui-btn);
    letter-spacing:0.05em;
    text-shadow:0 2px 6px var(--shadow-text);
    margin-bottom:calc(var(--uh)*1);
  }
  #allclear-sub{
    font-size:calc(var(--u)*6);
    color:var(--ui-btn);
    margin-bottom:calc(var(--uh)*4);
    letter-spacing:0.04em;
  }

  #ready-overlay{
    position:absolute;
    inset:0;
    background:rgba(80,196,244,0.9);
    backdrop-filter:blur(3px);
    -webkit-backdrop-filter:blur(3px);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:90;
  }
  #ready-overlay.hide{ display:none; }
  #ready-stage-name{
    font-size:calc(var(--u)*12);
    font-weight:900;
    color:var(--ui-btn);
    letter-spacing:0.04em;
    text-shadow:0 1px 4px var(--shadow-text);
  }
  #ready-desc{
    font-size:calc(var(--u)*4.5);
    color:var(--ui-btn);
    margin:calc(var(--uh)*2) 0 calc(var(--uh)*4);
    text-align:center;
    padding:0 calc(var(--u)*8);
    line-height:1.5;
    letter-spacing:0.03em;
  }

  .pill-btn{
    background: linear-gradient(135deg, var(--ui-btn) 0%, var(--ui-counter-bg) 100%);
    border:none;
    border-radius:calc(var(--u)*8);
    padding:calc(var(--uh)*1.8) calc(var(--u)*14);
    color:var(--ui-btn-text);
    font-size:calc(var(--u)*5.5);
    font-weight:700;
    cursor:pointer;
    letter-spacing:0.05em;
    box-shadow:0 calc(var(--u)*0.8) calc(var(--u)*3.5) rgba(0,50,90,0.32),
               inset 0 1px 0 rgba(255,255,255,0.14);
    transition:filter 0.12s;
  }
  .pill-btn:active{ filter:brightness(0.90); }
  .pill-btn.danger{
    background: linear-gradient(135deg, #c0392b 0%, #922b21 100%);
  }

  #particle-canvas{
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index:150;
    display:none;
  }
  #particle-canvas.show{ display:block; }
</style>
</head>
<body>
<div id="phone">
  <!-- HUD -->
  <div id="hud">
    <div id="stage-label">Level 1</div>
    <button id="reset-btn" title="Reset">↺</button>
  </div>

  <!-- Board -->
  <div id="board-wrap">
    <div id="board"></div>
  </div>

  <!-- info bar -->
  <div id="info-bar">
    <div class="info-hint" id="info-hint">タイルをタップ→矢印方向へ滑走→全タイルを1枚に！</div>
  </div>

  <!-- Particles canvas -->
  <canvas id="particle-canvas"></canvas>

  <!-- Ready overlay -->
  <div id="ready-overlay">
    <div id="ready-stage-name">Level 1</div>
    <div id="ready-desc">タイルをタップして矢印の方向へ移動！<br>隣のタイルを吸収して1つにまとめよう</div>
    <button id="ready-btn" class="pill-btn">START</button>
  </div>

  <!-- Clear overlay -->
  <div id="clear-overlay" class="modal-overlay">
    <div id="clear-title">CLEAR!</div>
    <div id="clear-stage-info">Level 1 クリア！</div>
    <button id="next-btn" class="pill-btn">NEXT →</button>
  </div>

  <!-- Game Over overlay -->
  <div id="gameover-overlay" class="modal-overlay">
    <div id="gameover-title">MISS!</div>
    <div id="gameover-sub" style="white-space:pre-line;">落下してしまった！</div>
    <button id="retry-btn" class="pill-btn danger">もう一度</button>
  </div>

  <!-- All Clear overlay -->
  <div id="allclear-overlay" class="modal-overlay">
    <div id="allclear-title">ALL CLEAR!</div>
    <div id="allclear-sub">全レベル制覇！</div>
    <button id="restart-btn" class="pill-btn">最初から</button>
  </div>
</div>

<script>
// ─── Stage Definitions ──────────────────────────────────────────────────
// tiles: { r, c, dir, color? }
// floorArrows: { r, c, dir }
// holes: [{ r, c }]
// jumpCells: [{ r, c }]
// colorMode: false | 2 | 3

const STAGES = [
  // ── Lv1: 3タイル直線（チュートリアル）──
  {
    id:1, gridRows:4, gridCols:4,
    tiles:[
      {r:1,c:0,dir:'right'},
      {r:1,c:1,dir:'right'},
      {r:1,c:2,dir:'right'},
    ],
    floorArrows:[], holes:[], jumpCells:[], colorMode:false,
    desc:'タイルをタップして矢印方向へ！\n隣のタイルを吸収しよう',
  },
  // ── Lv2: 4タイルL字 ──
  {
    id:2, gridRows:4, gridCols:4,
    tiles:[
      {r:0,c:0,dir:'right'},
      {r:0,c:1,dir:'down'},
      {r:1,c:1,dir:'right'},
      {r:1,c:2,dir:'up'},
    ],
    floorArrows:[], holes:[], jumpCells:[], colorMode:false,
    desc:'L字のタイルを\n1つにまとめよう',
  },
  // ── Lv3: フロア矢印初登場 ──
  {
    id:3, gridRows:5, gridCols:5,
    tiles:[
      {r:0,c:0,dir:'right'},
      {r:0,c:1,dir:'right'},
      {r:0,c:2,dir:'down'},
      {r:2,c:2,dir:'right'},
      {r:2,c:3,dir:'left'},
    ],
    floorArrows:[{r:1,c:2,dir:'down'}],
    holes:[], jumpCells:[], colorMode:false,
    desc:'光る床は強制移動ゾーン！\n矢印の方向に引っ張られるよ',
  },
  // ── Lv4: フロア矢印2個 ──
  {
    id:4, gridRows:5, gridCols:5,
    tiles:[
      {r:0,c:0,dir:'right'},
      {r:0,c:1,dir:'down'},
      {r:2,c:1,dir:'right'},
      {r:2,c:2,dir:'right'},
      {r:2,c:3,dir:'up'},
      {r:0,c:3,dir:'down'},
    ],
    floorArrows:[
      {r:1,c:1,dir:'down'},
      {r:2,c:4,dir:'left'},
    ],
    holes:[], jumpCells:[], colorMode:false,
    desc:'強制移動ゾーンが2つ！\n経路を考えよう',
  },
  // ── Lv5: ゲームオーバー罠あり ──
  {
    id:5, gridRows:5, gridCols:5,
    tiles:[
      {r:0,c:2,dir:'down'},
      {r:1,c:2,dir:'right'},
      {r:1,c:3,dir:'down'},
      {r:3,c:3,dir:'left'},
      {r:3,c:1,dir:'up'},
      {r:2,c:1,dir:'right'},
    ],
    floorArrows:[
      {r:2,c:2,dir:'right'},

function cellSize() {
  const stg = STAGES[stageIdx];
  const pw = phone.offsetWidth;
  const ph = phone.offsetHeight;
  const areaW = pw * 0.88;
  const areaH = ph * 0.62;
  return Math.min(areaW / stg.gridCols, areaH / stg.gridRows);
}

// ─── Init Stage ──────────────────────────────────────────────────────────
function initStage(idx) {
  stageIdx = idx;
  animating = false;
  inputQueue = [];
  processingQueue = false;
  gameActive = true; // ゲーム開始
  const stg = STAGES[idx];
  tiles = stg.tiles.map((t) => ({
    r: t.r, c: t.c, dir: t.dir, count: 1,
    id: nextTileId++,
    color: t.color || null,
  }));
  renderBoard();
  updateHUD();
  // hint text switch
  if (infoHint) {
    if (stg.colorMode) {
      infoHint.textContent = '同じ色のタイルだけ合体！ / 異色混在でゲームオーバー';
    } else {
      infoHint.textContent = 'タイルをタップ→矢印方向へ滑走→全タイルを1枚に！';
    }
  }
}

// ─── Update HUD ───────────────────────────────────────────────────────────
function updateHUD() {
  hudStage.textContent = 'Level ' + (stageIdx + 1);
}

// ─── Render ───────────────────────────────────────────────────────────────
const DIR_ARROW = {
  right:'→', left:'←', up:'↑', down:'↓',
  upright:'↗', downright:'↘', downleft:'↙', upleft:'↖'
};
const DIR_ROT = {
  right:0, down:90, left:180, up:270,
  upright:315, downright:45, downleft:135, upleft:225
};

function renderBoard() {
  const stg = STAGES[stageIdx];
  const cs = cellSize();
  boardEl.style.width  = cs * stg.gridCols + 'px';
  boardEl.style.height = cs * stg.gridRows + 'px';
  boardEl.innerHTML = '';

  const holeSet = new Set((stg.holes || []).map(h => h.r + ',' + h.c));
  const jumpSet = new Set((stg.jumpCells || []).map(j => j.r + ',' + j.c));

  // Draw grid cells
  for (let r = 0; r < stg.gridRows; r++) {
    for (let c = 0; c < stg.gridCols; c++) {
      const key = r + ',' + c;
      const cell = document.createElement('div');
      if (holeSet.has(key)) {
        cell.className = 'cell hole';
      } else if (jumpSet.has(key)) {
        cell.className = 'cell jump-cell';
        // Add 4 ring elements for animation
        for (let i = 0; i < 4; i++) {
          const sq = document.createElement('div');
          sq.className = 'jump-sq';
          cell.appendChild(sq);
        }
      } else {
        cell.className = 'cell';
      }
      cell.style.left   = c * cs + 'px';
      cell.style.top    = r * cs + 'px';
      cell.style.width  = cs + 'px';
      cell.style.height = cs + 'px';
      boardEl.appendChild(cell);
    }
  }

  // Draw floor arrows
  stg.floorArrows.forEach(fa => {
    const el = document.createElement('div');
    el.className = 'floor-arrow';
    el.dataset.dir = fa.dir;
    el.style.left   = fa.c * cs + 'px';
    el.style.top    = fa.r * cs + 'px';
    el.style.width  = cs + 'px';
    el.style.height = cs + 'px';

    const stripe = document.createElement('div');
    stripe.className = 'floor-arrow-stripe';
    el.appendChild(stripe);

    const icon = document.createElement('div');
    icon.className = 'floor-arrow-icon';
    icon.style.fontSize = Math.round(cs * 0.45) + 'px';
    icon.textContent = DIR_ARROW[fa.dir] || '→';
    el.appendChild(icon);

    boardEl.appendChild(el);
  });

  // Draw tiles
  tiles.forEach((tile, ti) => {
    const el = document.createElement('div');
    el.className = 'tile';
    el.dataset.ti = ti;
    el.style.left   = tile.c * cs + 'px';
    el.style.top    = tile.r * cs + 'px';
    el.style.width  = cs + 'px';
    el.style.height = cs + 'px';
    el.style.zIndex = 5 + tile.count;

    const inner = document.createElement('div');
    inner.className = 'tile-inner';
    if (tile.color) {
      inner.dataset.color = tile.color;
    }

    // arrow
    const arrowSvg = makeArrowSVG(tile.dir, cs, tile.color);
    inner.appendChild(arrowSvg);

    // color dot badge for colored tiles
    if (tile.color) {
      const dot = document.createElement('div');
      dot.className = 'tile-color-dot';
      dot.dataset.color = tile.color;
      inner.appendChild(dot);
    }

    el.appendChild(inner);
    el.addEventListener('pointerdown', onTileTap);
    boardEl.appendChild(el);
  });
}

function makeArrowSVG(dir, cs, color) {
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 100 100');
  svg.classList.add('tile-arrow');
  const rot = DIR_ROT[dir] !== undefined ? DIR_ROT[dir] : 0;
  svg.style.cssText = `position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(${rot}deg);width:58%;height:58%;`;
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d','M15,38 L62,38 L62,22 L88,50 L62,78 L62,62 L15,62 Z');
  // color-specific arrow colors
  let arrowCol;
  if (color === 'yellow') {
    arrowCol = '#7a5900';
  } else if (color === 'red' || color === 'blue') {
    arrowCol = '#ffffff';
  } else {
    arrowCol = getComputedStyle(phone).getPropertyValue('--arrow-color').trim() || '#F5A623';
  }
  path.setAttribute('fill', arrowCol);
  svg.appendChild(path);
  return svg;
}

// ─── Tap handler ─────────────────────────────────────────────────────────
function onTileTap(e) {
  e.preventDefault();
  e.stopPropagation();
  // バグ修正: ゲームが非アクティブ（オーバーレイ表示中など）の場合は無視
  if (!gameActive) return;
  const ti = parseInt(e.currentTarget.dataset.ti);
  if (isNaN(ti) || ti < 0 || ti >= tiles.length) return;
  inputQueue.push(ti);
  if (!processingQueue) {
    processQueue();
  }
}

function processQueue() {
  // バグ修正: アニメーション中は次の処理を開始しない
  if (animating) {
    processingQueue = false;
    return;
  }
  if (inputQueue.length === 0) {
    processingQueue = false;
    return;
  }
  processingQueue = true;
  const ti = inputQueue.shift();
  if (ti >= tiles.length) {
    processingQueue = false;
    // 次のキューを試みる（ただしanimatingでないことを確認済み）
    if (inputQueue.length > 0) processQueue();
    return;
  }
  doMove(ti);
}

// ─── Color merge check ────────────────────────────────────────────────────
function isMergeAllowed(movingTile, targetTile) {
  const stg = STAGES[stageIdx];
  if (!stg.colorMode) return true;
  if (!movingTile.color || !targetTile.color) return true;
  return movingTile.color === targetTile.color;
}

// ─── Move logic ───────────────────────────────────────────────────────────
const DR = { right:0, left:0, up:-1, down:1, upright:-1, downright:1, downleft:1, upleft:-1 };
const DC = { right:1, left:-1, up:0, down:0, upright:1, downright:1, downleft:-1, upleft:-1 };

function getFloorArrow(r, c) {
  const stg = STAGES[stageIdx];
  return stg.floorArrows.find(fa => fa.r === r && fa.c === c) || null;
}

function isHole(r, c) {
  const stg = STAGES[stageIdx];
  return (stg.holes || []).some(h => h.r === r && h.c === c);
}

function isJumpCell(r, c) {
  const stg = STAGES[stageIdx];
  return (stg.jumpCells || []).some(j => j.r === r && j.c === c);
}

function getTileAt(r, c, excludeIdx) {
  return tiles.findIndex((t, i) => i !== excludeIdx && t.r === r && t.c === c);
}

// Returns { path, mergeIdx, gameover, colorMix, fallPath }
function computeMovePath(startR, startC, dir, movingIdx) {
  const stg = STAGES[stageIdx];
  let r = startR, c = startC;
  let curDir = dir;
  const path = [];
  const visited = new Set();

  for (let step = 0; step < 80; step++) {
    const key = `${r},${c},${curDir}`;
    if (visited.has(key)) {
      return { path, mergeIdx: -1, gameover: true, colorMix: false, fallPath: null };
    }
    visited.add(key);

    const curIsJump = isJumpCell(r, c);

    const nr = r + DR[curDir];
    const nc = c + DC[curDir];

    // Out of bounds
    if (nr < 0 || nr >= stg.gridRows || nc < 0 || nc >= stg.gridCols) {
      const fallPath = [
        { r: r + DR[curDir] * 1, c: c + DC[curDir] * 1 },
        { r: r + DR[curDir] * 2, c: c + DC[curDir] * 2 },
      ];
      return { path, mergeIdx: -1, gameover: true, colorMix: false, fallPath };
    }

    // Check hole
    if (isHole(nr, nc)) {
      if (curIsJump) {
        const jr = nr + DR[curDir];
        const jc = nc + DC[curDir];
        if (jr < 0 || jr >= stg.gridRows || jc < 0 || jc >= stg.gridCols) {
          const fallPath = [
            { r: nr, c: nc },
            { r: nr + DR[curDir], c: nc + DC[curDir] },
          ];
          return { path, mergeIdx: -1, gameover: true, colorMix: false, fallPath };
        }
        const jumpHitIdx = getTileAt(jr, jc, movingIdx);
        if (jumpHitIdx >= 0) {
          // color check on jump target
          if (!isMergeAllowed(tiles[movingIdx], tiles[jumpHitIdx])) {
            path.push({ r: nr, c: nc });
            path.push({ r: jr, c: jc });
            return { path, mergeIdx: jumpHitIdx, gameover: false, colorMix: true, fallPath: null };
          }
          path.push({ r: nr, c: nc });
          path.push({ r: jr, c: jc });
          return { path, mergeIdx: jumpHitIdx, gameover: false, colorMix: false, fallPath: null };
        }
        path.push({ r: nr, c: nc });
        r = jr;
        c = jc;
        path.push({ r, c });
        const fa2 = getFloorArrow(r, c);
        if (fa2) curDir = fa2.dir;
        continue;
      } else {
        path.push({ r: nr, c: nc });
        const fallPath = [{ r: nr + DR[curDir], c: nc + DC[curDir] }];
        return { path, mergeIdx: -1, gameover: true, colorMix: false, fallPath };
      }
    }

    // Tile collision
    const hitIdx = getTileAt(nr, nc, movingIdx);
    if (hitIdx >= 0) {
      // color mix check
      if (!isMergeAllowed(tiles[movingIdx], tiles[hitIdx])) {
        path.push({ r: nr, c: nc });
        return { path, mergeIdx: hitIdx, gameover: false, colorMix: true, fallPath: null };
      }
      path.push({ r: nr, c: nc });
      return { path, mergeIdx: hitIdx, gameover: false, colorMix: false, fallPath: null };
    }

    // Move to next cell
    r = nr;
    c = nc;
    path.push({ r, c });

    // Floor arrow
    const fa = getFloorArrow(r, c);
    if (fa) {
      curDir = fa.dir;
    }
  }

  return { path, mergeIdx: -1, gameover: true, colorMix: false, fallPath: null };
}

// ─── Step animation ───────────────────────────────────────────────────────
const STEP_DURATION = 120;

function animateSteps(movingEl, path, stepIdx, onComplete) {
  if (stepIdx >= path.length) {
    onComplete();
    return;
  }
  const cs = cellSize();
  const { r, c } = path[stepIdx];

  movingEl.classList.add('step-anim');
  movingEl.style.left = c * cs + 'px';
  movingEl.style.top  = r * cs + 'px';

  setTimeout(() => {
    movingEl.classList.remove('step-anim');
    animateSteps(movingEl, path, stepIdx + 1, onComplete);
  }, STEP_DURATION);
}

function doMove(ti) {
  if (ti >= tiles.length) {
    animating = false;
    processingQueue = false;
    return;
  }
  const tile = tiles[ti];
  const result = computeMovePath(tile.r, tile.c, tile.dir, ti);

  animating = true;
  const tileEls = boardEl.querySelectorAll('.tile');
  const movingEl = tileEls[ti];

  if (result.gameover) {
    const allPath = result.path.concat(result.fallPath || []);
    if (allPath.length > 0 && movingEl) {
      animateSteps(movingEl, allPath, 0, () => {
        if (movingEl) movingEl.classList.add('gameover-fall');
        setTimeout(() => {
          animating = false;
          gameActive = false;
          inputQueue = [];
          processingQueue = false;
          gameoverSub.textContent = '落下してしまった！';
          showGameOver();
        }, 560);
      });
    } else {
      const cs = cellSize();
      if (movingEl) {
        const targetR = tile.r + DR[tile.dir];
        const targetC = tile.c + DC[tile.dir];
        movingEl.classList.add('step-anim');
        movingEl.style.left = targetC * cs + 'px';
        movingEl.style.top  = targetR * cs + 'px';
        setTimeout(() => {
          if (movingEl) movingEl.classList.add('gameover-fall');
          setTimeout(() => {
            animating = false;
            gameActive = false;
            inputQueue = [];
            processingQueue = false;
            gameoverSub.textContent = '落下してしまった！';
            showGameOver();
          }, 560);
        }, STEP_DURATION);
      } else {
        animating = false;
        gameActive = false;
        inputQueue = [];
        processingQueue = false;
        gameoverSub.textContent = '落下してしまった！';
        showGameOver();
      }
    }
    return;
  }

  // Color mix game over
  if (result.colorMix) {
    const allPath = result.path;
    const doColorMixGameover = () => {
      const freshTileEls = boardEl.querySelectorAll('.tile');
      if (freshTileEls[ti]) freshTileEls[ti].classList.add('color-mix-fail');
      if (result.mergeIdx >= 0 && freshTileEls[result.mergeIdx]) {
        freshTileEls[result.mergeIdx].classList.add('color-mix-fail');
      }
      setTimeout(() => {
        animating = false;
        gameActive = false;
        inputQueue = [];
        processingQueue = false;
        gameoverSub.textContent = 'ゲームオーバー！\n色が混ざってしまった！';
        showGameOver();
      }, 800);
    };

    if (allPath.length > 0 && movingEl) {
      animateSteps(movingEl, allPath, 0, doColorMixGameover);
    } else {
      doColorMixGameover();
    }
    return;
  }

  if (result.path.length === 0) {
    finalizeMerge(ti, result);
    return;
  }

  if (movingEl) {
    movingEl.classList.add('moving');
    movingEl.addEventListener('animationend', () => movingEl.classList.remove('moving'), { once:true });
  }

  animateSteps(movingEl, result.path, 0, () => {
    finalizeMerge(ti, result);
  });
}

function finalizeMerge(ti, result) {
  if (result.mergeIdx >= 0) {
    const target = tiles[result.mergeIdx];
    const movingTile = tiles[ti];
    target.count += movingTile.count;
    tiles.splice(ti, 1);
  } else {
    const lastStep = result.path[result.path.length - 1];
    if (lastStep) {
      tiles[ti].r = lastStep.r;
      tiles[ti].c = lastStep.c;
    }
  }

  animating = false;
  renderBoard();
  updateHUD();

  if (checkClear()) return;
  // バグ修正: processQueueはsetTimeoutで遅延させて、renderBoard後の
  // DOMイベントが安定してから次の入力を処理する
  setTimeout(() => {
    if (!animating) processQueue();
  }, 0);
}

// ─── Clear check ──────────────────────────────────────────────────────────
function checkClear() {
  const stg = STAGES[stageIdx];
  if (stg.colorMode) {
    return checkColorClear();
  }
  if (tiles.length === 1) {
    gameActive = false;
    const tileEls = boardEl.querySelectorAll('.tile');
    tileEls.forEach(el => el.classList.add('cleared'));
    inputQueue = [];
    processingQueue = false;
    setTimeout(() => showClear(), 450);
    return true;
  }
  return false;
}

function checkColorClear() {
  // Each color group must have converged to exactly 1 tile
  const colorGroups = {};
  tiles.forEach(t => {
    if (t.color) {
      colorGroups[t.color] = (colorGroups[t.color] || 0) + 1;
    }
  });
  const groupCount = Object.keys(colorGroups).length;
  if (groupCount === 0) return false;
  const allConverged = Object.values(colorGroups).every(cnt => cnt === 1);
  if (allConverged && tiles.length === groupCount) {
    gameActive = false;
    const tileEls = boardEl.querySelectorAll('.tile');
    tileEls.forEach(el => el.classList.add('cleared'));
    inputQueue = [];
    processingQueue = false;
    setTimeout(() => showClear(), 450);
    return true;
  }
  return false;
}

function showClear() {
  clearInfo.textContent = 'Level ' + (stageIdx + 1) + ' クリア！';
  if (stageIdx === STAGES.length - 1) {
    nextBtn.textContent = 'FINISH';
  } else {
    nextBtn.textContent = 'NEXT →';
  }
  clearOvl.classList.add('show');
  launchParticles();
}

function showGameOver() {
  gameoverOvl.classList.add('show');
}

// ─── Particles ────────────────────────────────────────────────────────────
function launchParticles() {
  const cvs = particleCvs;
  cvs.width  = phone.offsetWidth;
  cvs.height = phone.offsetHeight;
  cvs.classList.add('show');
  const ctx = cvs.getContext('2d');
  const particles = [];
  const colors = ['#FFD700','#FF6B6B','#5BC8F5','#A8E6CF','#FFB347','#ffffff'];
  for (let i = 0; i < 60; i++) {
    particles.push({
      x: Math.random() * cvs.width,
      y: Math.random() * cvs.height * 0.5 + cvs.height * 0.2,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 1.2) * 7,
      r: Math.random() * 5 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 1.0,
      decay: Math.random() * 0.015 + 0.012,
    });
  }
  function frame() {
    ctx.clearRect(0, 0, cvs.width, cvs.height);
    let alive = false;
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.18;
      p.life -= p.decay;
      if (p.life > 0) {
        alive = true;
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
    });
    ctx.globalAlpha = 1;
    if (alive) requestAnimationFrame(frame);
    else cvs.classList.remove('show');
  }
  requestAnimationFrame(frame);
}

// ─── Buttons ──────────────────────────────────────────────────────────────
resetBtn.addEventListener('pointerdown', e => {
  e.preventDefault();
  clearOvl.classList.remove('show');
  gameoverOvl.classList.remove('show');
  initStage(stageIdx);
});

nextBtn.addEventListener('pointerdown', e => {
  e.preventDefault();
  clearOvl.classList.remove('show');
  const next = stageIdx + 1;
  if (next >= STAGES.length) {
    allclearOvl.classList.add('show');
  } else {
    showReady(next);
  }
});

retryBtn.addEventListener('pointerdown', e => {
  e.preventDefault();
  gameoverOvl.classList.remove('show');
  initStage(stageIdx);
});

restartBtn.addEventListener('pointerdown', e => {
  e.preventDefault();
  allclearOvl.classList.remove('show');
  showReady(0);
});

// ─── Ready overlay ────────────────────────────────────────────────────────
function showReady(idx) {
  gameActive = false; // オーバーレイ表示中は入力無効
  const stg = STAGES[idx];
  readyName.textContent = 'Level ' + stg.id;
  readyDesc.textContent = stg.desc;
  readyOvl._pendingIdx = idx;
  readyOvl.classList.remove('hide');
}

readyBtn.addEventListener('pointerdown', e => {
  e.preventDefault();
  const idx = readyOvl._pendingIdx !== undefined ? readyOvl._pendingIdx : 0;
  readyOvl.classList.add('hide');
  initStage(idx);
});

// ─── Responsive ───────────────────────────────────────────────────────────
window.addEventListener('resize', () => { renderBoard(); });

// ─── Boot ─────────────────────────────────────────────────────────────────
showReady(0);
</script>
