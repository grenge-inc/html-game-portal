<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>ブラッドゲート</title>
<style>
  :root {
    --phone-aspect: 9 / 19.5;
    /* ===== Color tokens (single source of truth) ===== */
    /* backgrounds — abyssal altar */
    --bg-deep:#04000a; --bg-mid:#120207; --bg-altar:#2a0508; --bg-panel:#06030c;
    /* blood + bone identity */
    --blood:#7a0610; --blood-dark:#3a0308; --blood-glow:#ff3c50; --bone:#e9e2cf;
    /* trap colors (referenced by JS as var(--red/--blue/--yellow/--green) — names fixed) */
    --red:#ff2a3c; --red-hi:#ff6f7a; --red-lo:#8a0010;
    --blue:#3a7bff; --blue-hi:#8fb6ff; --blue-lo:#0a2f8a;
    --yellow:#ffd23a; --yellow-hi:#fff0a0; --yellow-lo:#9a7a00;
    --green:#2aff6e; --green-hi:#9affc0; --green-lo:#006a28;
    /* text + ink */
    --ink:#000; --ink-soft:rgba(8,0,2,.85); --shadow:rgba(0,0,0,.5);
    --text-main:#fff; --text-sub:#ffb0b8; --line:#3a0a12; --hot:#fff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html, body {
    width:100%; height:100%;
    overflow:hidden;
    background:var(--ink);
    color:var(--text-main);
    font-family:'Helvetica Neue', system-ui, sans-serif;
    user-select:none;
    -webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
  }
  body {
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #phone {
    position:relative;
    overflow:hidden;
    width:  min(100vw, calc(100vh * 9 / 19.5));
    height: min(100vh, calc(100vw * 19.5 / 9));
    --pw:   min(100vw, calc(100vh * 9 / 19.5));
    --ph:   min(100vh, calc(100vw * 19.5 / 9));
    --u:    calc(var(--pw) / 100);
    --uh:   calc(var(--ph) / 100);
    background:
      radial-gradient(ellipse at 50% 18%, var(--bg-altar) 0%, var(--bg-mid) 45%, var(--bg-deep) 100%),
      var(--bg-deep);
  }
  /* atmospheric blood fog drifting behind the altar */
  #phone::before{content:""; position:absolute; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(circle at 22% 12%, rgba(122,6,16,.5) 0%, transparent 34%),
      radial-gradient(circle at 80% 8%, rgba(122,6,16,.42) 0%, transparent 30%),
      radial-gradient(circle at 50% 80%, rgba(122,6,16,.38) 0%, transparent 46%);
    mix-blend-mode:screen; animation:fog 9s ease-in-out infinite alternate;}
  @keyframes fog{from{opacity:.55; transform:scale(1);}to{opacity:.9; transform:scale(1.08);}}
  /* faint bone scratches / vignette grime */
  #phone::after{content:""; position:absolute; inset:0; pointer-events:none; z-index:0;
    background:radial-gradient(ellipse at 50% 50%, transparent 52%, rgba(0,0,0,.7) 100%);}

  /* ===== Field ===== */
  #field{position:absolute; left:0; top:0; width:100%; height:74%; z-index:1;
    border-bottom:2px solid var(--line);
    background:
      repeating-linear-gradient(90deg,transparent 0,transparent calc(100%/3 - 1px),rgba(122,6,16,.25) calc(100%/3 - 1px),rgba(122,6,16,.25) calc(100%/3)),
      linear-gradient(180deg, transparent 0%, rgba(122,6,16,.08) 100%);
    overflow:hidden;}
  /* range zone — blood-soaked kill band (62%~95%) */
  #range{position:absolute; left:0; width:100%; top:62%; height:33%;
    background:linear-gradient(180deg,rgba(255,42,60,0) 0%,rgba(255,42,60,.06) 60%,rgba(255,42,60,.16) 100%);
    pointer-events:none;}
  #range::after{content:""; position:absolute; left:0; top:0; width:100%; height:2px;
    background:linear-gradient(90deg,transparent,var(--blood-glow),transparent); opacity:.55;}
  /* player line — the gate's last defense (moved to bottom at 95%) */
  #pline{position:absolute; left:0; width:100%; top:95%; height:var(--uh);
    background:linear-gradient(90deg,transparent,var(--blood-glow),var(--blood),var(--blood-glow),transparent);
    box-shadow:0 0 calc(var(--u)*3) var(--blood-glow); pointer-events:none;
    animation:pulse 2.4s ease-in-out infinite;}
  @keyframes pulse{50%{box-shadow:0 0 calc(var(--u)*5) var(--blood-glow);}}

  /* ===== Gate ===== */
  #gate{position:absolute; left:50%; top:20%; transform:translate(-50%,-50%);
    width:46%; aspect-ratio:1/1; border-radius:50%; pointer-events:none; z-index:2;
    display:flex; align-items:center; justify-content:center;
    border:calc(var(--u)*.9) solid rgba(233,226,207,.4);
    background:
      radial-gradient(circle,rgba(0,0,0,.72) 38%,transparent 72%),
      conic-gradient(from 0deg, rgba(122,6,16,.0), rgba(122,6,16,.5), rgba(122,6,16,.0));
    transition:box-shadow .25s, border-color .25s;}
  /* bone ring around the gate */
  #gate::before{content:""; position:absolute; inset:-6%; border-radius:50%;
    border:calc(var(--u)*.4) dashed rgba(233,226,207,.22); animation:rot 22s linear infinite;}
  @keyframes rot{to{transform:rotate(360deg);}}
  #gate .glyph{font-size:calc(var(--u)*15); font-weight:900; letter-spacing:1px;
    text-shadow:0 0 calc(var(--u)*4) currentColor, 0 0 calc(var(--u)*9) currentColor;}
  #gateLbl{position:absolute; left:50%; top:7%; transform:translateX(-50%); z-index:2;
    font-size:calc(var(--u)*3.2); color:var(--bone); letter-spacing:.3em; opacity:.82;
    text-shadow:0 0 calc(var(--u)*2) var(--blood);}

  /* ===== Enemies ===== */
  .mob{position:absolute; width:var(--mw); height:var(--mw); --mw:calc(var(--u)*9); z-index:1;
    margin-left:calc(var(--mw)/-2); transform:translateY(-50%);
    border-radius:46% 46% 40% 40%/52% 52% 40% 40%;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 calc(var(--u)*2) currentColor, inset 0 0 calc(var(--u)*1.6) rgba(0,0,0,.65);
    will-change:top; transition:opacity .12s; animation:lurch .9s ease-in-out infinite;}
  @keyframes lurch{50%{transform:translateY(-50%) scale(1.06,.94) rotate(2deg);}}
  /* festering maw */
  .mob::before{content:""; position:absolute; width:60%; height:18%; top:30%;
    background:var(--ink-soft); border-radius:50%;
    box-shadow:0 calc(var(--u)*1.4) 0 -1px var(--ink-soft);}
  /* sickly sheen */
  .mob::after{content:""; position:absolute; inset:0; border-radius:inherit;
    background:radial-gradient(circle at 36% 24%, rgba(255,255,255,.45), transparent 40%); mix-blend-mode:screen;}
  .mob.red{background:radial-gradient(circle at 40% 30%,var(--red-hi),var(--red) 60%,var(--red-lo));color:var(--red);}
  .mob.blue{background:radial-gradient(circle at 40% 30%,var(--blue-hi),var(--blue) 60%,var(--blue-lo));color:var(--blue);}
  .mob.yellow{background:radial-gradient(circle at 40% 30%,var(--yellow-hi),var(--yellow) 60%,var(--yellow-lo));color:var(--yellow);}
  .mob.green{background:radial-gradient(circle at 40% 30%,var(--green-hi),var(--green) 60%,var(--green-lo));color:var(--green);}
  .mob.dying{animation:dissolve .3s forwards;}
  @keyframes dissolve{to{transform:translateY(-50%) scale(1.8);opacity:0;filter:blur(3px) brightness(1.6);}}

  /* トラップゾーンワープ敵 — 不意打ち出現エフェクト */
  .mob.trap-spawn{animation:trapAppear .25s ease-out, lurch .9s ease-in-out infinite .25s;}
  @keyframes trapAppear{
    0%{transform:translateY(-50%) scale(0) rotate(-180deg); opacity:0; filter:brightness(3);}
    60%{transform:translateY(-50%) scale(1.3) rotate(10deg); opacity:.9; filter:brightness(2);}
    100%{transform:translateY(-50%) scale(1) rotate(0deg); opacity:1; filter:brightness(1);}
  }

  /* カラーシフター敵 — 色変化アニメーション */
  .mob.shifter{outline:calc(var(--u)*.7) dashed rgba(255,255,255,.7); outline-offset:calc(var(--u)*.5);}
  .mob.shifting{animation:colorShift .35s ease-in-out, lurch .9s ease-in-out infinite .35s;}
  @keyframes colorShift{
    0%{filter:brightness(2.5) saturate(0); transform:translateY(-50%) scale(1.2);}
    50%{filter:brightness(3) saturate(0.5); transform:translateY(-50%) scale(1.3) rotate(15deg);}
    100%{filter:brightness(1) saturate(1); transform:translateY(-50%) scale(1);}
  }

  /* trap beams — searing columns of light */
  .beam{position:absolute; top:62%; height:33%; width:30%; pointer-events:none; opacity:0;
    margin-left:-15%;
    background:linear-gradient(180deg,transparent,currentColor 70%,var(--hot));
    box-shadow:0 0 calc(var(--u)*3) currentColor;
    mix-blend-mode:screen; transition:opacity .08s;}
  .beam.on{opacity:.55; animation:flick .14s infinite alternate;}
  @keyframes flick{to{opacity:.3;}}

  /* blood splash */
  .splash{position:absolute; width:var(--u); height:var(--u); border-radius:50%;
    pointer-events:none; background:currentColor; will-change:transform,opacity;}

  /* ===== HUD ===== */
  #hud{position:absolute; top:calc(var(--uh)*1.5); left:calc(var(--u)*3); right:calc(var(--u)*3);
    display:flex; justify-content:space-between; align-items:center; font-size:calc(var(--u)*3.4); z-index:5;}
  #stage{color:var(--bone); letter-spacing:.15em; font-weight:700;
    padding:calc(var(--uh)*.4) calc(var(--u)*2); border:1px solid var(--line); border-radius:calc(var(--u)*1.4);
    background:rgba(6,3,12,.6); text-shadow:0 0 calc(var(--u)*1.4) var(--blood);
    font-variant-numeric:tabular-nums;}
  #lives{color:var(--red); letter-spacing:.1em; text-shadow:0 0 calc(var(--u)*1.6) var(--blood-glow);}
  #kills{color:var(--bone); font-variant-numeric:tabular-nums; font-weight:700;}
  /* blood gauge */
  #gaugeWrap{position:absolute; top:33%; left:50%; transform:translateX(-50%);
    width:54%; height:var(--uh); border:1px solid var(--blood); border-radius:var(--uh);
    background:rgba(0,0,0,.55); overflow:hidden; z-index:5;
    box-shadow:0 0 calc(var(--u)*1.5) rgba(0,0,0,.8), inset 0 0 calc(var(--u)*1) rgba(0,0,0,.6);}
  #gauge{height:100%; width:0%;
    background:linear-gradient(90deg,var(--blood-dark),var(--red),var(--blood-glow));
    box-shadow:0 0 calc(var(--u)*2.5) var(--blood-glow);
    transition:width .08s linear;}
  #gaugeLbl{position:absolute; top:30.4%; left:50%; transform:translateX(-50%);
    font-size:calc(var(--u)*2.4); color:var(--text-sub); letter-spacing:.25em; z-index:5;
    text-shadow:0 0 calc(var(--u)*1.5) var(--blood);}

  /* ===== Buttons ===== */
  #pad{position:absolute; bottom:calc(var(--uh)*3); left:0; width:100%; height:22%;
    display:flex; gap:calc(var(--u)*2.5); justify-content:center; align-items:center; z-index:6; flex-wrap:wrap;}
  .btn{width:22%; height:72%; border-radius:calc(var(--u)*4); position:relative;
    border:calc(var(--u)*.6) solid var(--shadow); cursor:pointer;
    display:flex; align-items:flex-end; justify-content:center; padding-bottom:calc(var(--uh)*1);
    font-size:calc(var(--u)*3.2); font-weight:800; color:rgba(0,0,0,.55);
    box-shadow:0 calc(var(--u)*1.4) 0 var(--shadow), inset 0 0 calc(var(--u)*3) rgba(255,255,255,.25);
    transition:transform .06s, box-shadow .06s, filter .1s;}
  .btn.red{background:radial-gradient(circle at 50% 30%,var(--red-hi),var(--red) 70%,var(--red-lo));}
  .btn.blue{background:radial-gradient(circle at 50% 30%,var(--blue-hi),var(--blue) 70%,var(--blue-lo));}
  .btn.yellow{background:radial-gradient(circle at 50% 30%,var(--yellow-hi),var(--yellow) 70%,var(--yellow-lo));}
  .btn.green{background:radial-gradient(circle at 50% 30%,var(--green-hi),var(--green) 70%,var(--green-lo));}
  .btn.hidden-btn{display:none;}
  .btn.holding{transform:translateY(calc(var(--u)*1.2)); box-shadow:0 0 calc(var(--u)*1) var(--shadow), inset 0 0 calc(var(--u)*4) rgba(255,255,255,.6), 0 0 calc(var(--u)*4) currentColor; filter:brightness(1.3);}
  /* match クラスは廃止（自由ホールド対応：全ボタン自由に押せる） */

  /* ===== Modal ===== */
  #modal{position:absolute; inset:0; z-index:20;
    background:radial-gradient(ellipse at 50% 40%, rgba(42,5,8,.92), rgba(2,0,4,.94));
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;}
  #modal.hidden{display:none;}
  #mTitle{font-size:calc(var(--u)*11); font-weight:900; letter-spacing:.06em;
    background:linear-gradient(180deg, var(--blood-glow), var(--red) 55%, var(--blood));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 calc(var(--u)*4) var(--blood)); animation:titlethrob 2.6s ease-in-out infinite;}
  @keyframes titlethrob{50%{filter:drop-shadow(0 0 calc(var(--u)*7) var(--blood-glow));}}
  #mSub{font-size:calc(var(--u)*4); color:var(--bone); margin:calc(var(--uh)*2) calc(var(--u)*8); line-height:1.6; opacity:.9;}
  #mBtn{margin-top:calc(var(--uh)*3); padding:calc(var(--uh)*1.6) calc(var(--u)*10);
    font-size:calc(var(--u)*4.4); font-weight:800; color:var(--bone); cursor:pointer; letter-spacing:.08em;
    background:linear-gradient(180deg,var(--blood),var(--blood-dark)); border:calc(var(--u)*.5) solid var(--bone);
    border-radius:calc(var(--u)*2); box-shadow:0 0 calc(var(--u)*3) var(--blood-glow);
    transition:filter .12s, box-shadow .12s;}
  #mBtn:hover{filter:brightness(1.25); box-shadow:0 0 calc(var(--u)*5) var(--blood-glow);}
  /* combo explosion flash */
  #flash{position:absolute; inset:0; pointer-events:none; opacity:0; z-index:15;
    background:
      radial-gradient(circle at 50% 60%,rgba(255,255,255,.9),rgba(255,60,80,.85) 22%,rgba(255,42,60,0) 62%);}
  #flash.boom{animation:boom .6s ease-out;}
  @keyframes boom{0%{opacity:1; transform:scale(.9);}40%{opacity:.9;}100%{opacity:0; transform:scale(1.15);}}

  /* St5 警告フラッシュ */
  #warningFlash{position:absolute; inset:0; pointer-events:none; opacity:0; z-index:14;
    background:rgba(255,100,0,.25);}
  #warningFlash.warn{animation:warn .4s ease-out;}
  @keyframes warn{0%{opacity:1;}100%{opacity:0;}}

  /* トラップゾーン不意打ち警告フラッシュ */
  #trapFlash{position:absolute; left:0; top:62%; width:100%; height:33%; pointer-events:none; opacity:0; z-index:13;
    background:rgba(255,255,255,.35); border-top:2px solid rgba(255,255,255,.8);}
  #trapFlash.zap{animation:zap .3s ease-out;}
  @keyframes zap{0%{opacity:1;}100%{opacity:0;}}

  /* カラーシフター警告フラッシュ */
  #shiftFlash{position:absolute; inset:0; pointer-events:none; opacity:0; z-index:12;
    background:rgba(255,255,100,.18);}
  #shiftFlash.shiftburst{animation:shiftburst .4s ease-out;}
  @keyframes shiftburst{0%{opacity:1;}100%{opacity:0;}}
</style>
</head>
<body>
  <div id="phone">
    <div id="field">
      <div id="range"></div>
      <div id="pline"></div>
      <div id="gate"><span class="glyph">血</span></div>
      <div id="gateLbl">BLOOD GATE</div>
    </div>

    <div id="hud">
      <span id="stage">ST 1</span>
      <span id="kills">0 / 6</span>
      <span id="lives">♥♥♥</span>
    </div>
    <div id="gaugeWrap"><div id="gauge"></div></div>
    <div id="gaugeLbl">血溜まり</div>

    <div id="pad">
      <div class="btn red"    data-c="red">赤</div>
      <div class="btn blue"   data-c="blue">青</div>
      <div class="btn yellow" data-c="yellow">黄</div>
      <div class="btn green hidden-btn" data-c="green">緑</div>
    </div>

    <div id="flash"></div>
    <div id="warningFlash"></div>
    <div id="trapFlash"></div>
    <div id="shiftFlash"></div>

    <div id="modal">
      <div id="mTitle">ブラッドゲート</div>
      <div id="mSub">中央のゲートが示す色のボタンを<br>マウスで<b>押し続ける</b>。<br>同色トラップが全レーンで発火し<br>その色の敵を溶かす。<br><br>どのボタンも自由に選んでホールドできる。<br>ゲート色と一致しないと空撃ち！<br><br>点滅する敵は途中で色が変わる！<br>変化後の色で倒せ。<br><br>トラップゾーンに突然現れる敵にも注意！</div>
      <div id="mBtn">儀式を始める</div>
    </div>
  </div>

  <script>
  (function(){
    const phone=document.getElementById('phone');
    const field=document.getElementById('field');
    const gate=document.getElementById('gate'), glyph=gate.querySelector('.glyph');
    const gaugeEl=document.getElementById('gauge');
    const stageEl=document.getElementById('stage'), killsEl=document.getElementById('kills'), livesEl=document.getElementById('lives');
    const modal=document.getElementById('modal'), mTitle=document.getElementById('mTitle'), mSub=document.getElementById('mSub'), mBtn=document.getElementById('mBtn');
    const flash=document.getElementById('flash');
    const warningFlash=document.getElementById('warningFlash');
    const trapFlash=document.getElementById('trapFlash');
    const shiftFlash=document.getElementById('shiftFlash');
    const btns=[...document.querySelectorAll('.btn')];
    const COLORS={red:'var(--red)',blue:'var(--blue)',yellow:'var(--yellow)',green:'var(--green)'};
    const GLYPHS={red:'血',blue:'氷',yellow:'雷',green:'毒'};

    // カラーシフター：変色先の色を返す（同じ色は返さない）
    function nextShiftColor(currentColor, availableColors){
      const others=availableColors.filter(c=>c!==currentColor);
      return others[Math.floor(Math.random()*others.length)];
    }

    // ---- Stage definitions ----
    // spawn: {t:seconds, lane:0-2, color, trap?:boolean, shifter?:boolean（途中で色が変わる敵）}
    function buildStage(n){
      if(n===1){
        // St1: 赤固定ゲート、赤のみ6体 — シフター敵なし（操作理解ステージ）
        const sp=[];
        for(let i=0;i<6;i++) sp.push({t:0.8+i*0.85, lane:i%3, color:'red'});
        return {idx:1, lanes:3, colors:['red','blue','yellow'],
                gateFixed:'red', gateSeq:null, switchT:0,
                spawns:sp, quota:6, speed:0.22, lives:3, comboReq:0,
                shiftInterval:0 /* シフター無効 */};
      }
      if(n===2){
        // St2: シフター敵を2体追加（赤→青・青→黄）。ゲート切替に合わせて色変化で驚きを演出
        const seq=['red','blue','yellow'], sw=4.5;
        const sp=[];
        seq.forEach((col,gi)=>{
          for(let k=0;k<4;k++) sp.push({t:gi*sw+0.4+k*0.4, lane:k%3, color:col});
        });
        // トラップ不意打ち敵
        sp.push({t:sw+0.2, lane:1, color:'blue', trap:true});
        sp.push({t:sw*2+0.2, lane:0, color:'yellow', trap:true});
        // カラーシフター敵：赤として出現し後で青に変色、青として出現し後で黄に変色
        sp.push({t:1.5, lane:0, color:'red', shifter:true, shiftTo:'blue', shiftDelay:2.2});
        sp.push({t:sw+1.0, lane:2, color:'blue', shifter:true, shiftTo:'yellow', shiftDelay:2.0});
        sp.sort((a,b)=>a.t-b.t);
        return {idx:2, lanes:3, colors:['red','blue','yellow'],
                gateFixed:null, gateSeq:seq, switchT:sw,
                spawns:sp, quota:16, speed:0.24, lives:3, comboReq:1,
                shiftInterval:2.2};
      }
      if(n===3){
        // St3: シフター敵3体。ゲート3.5秒切替で色変化タイミングが重なる
        const seq=['red','blue','yellow'], sw=3.5;
        const sp=[];
        seq.forEach((col,gi)=>{
          for(let k=0;k<4;k++) sp.push({t:gi*sw+0.1+k*0.3, lane:k%3, color:col});
        });
        // トラップ不意打ち敵
        sp.push({t:sw*0.5+0.3, lane:2, color:'red', trap:true});
        sp.push({t:sw*1.5+0.3, lane:0, color:'blue', trap:true});
        sp.push({t:sw*2.5+0.3, lane:1, color:'yellow', trap:true});
        // カラーシフター敵3体
        sp.push({t:0.5, lane:1, color:'red', shifter:true, shiftTo:'blue', shiftDelay:1.8});
        sp.push({t:sw+0.6, lane:2, color:'blue', shifter:true, shiftTo:'yellow', shiftDelay:1.6});
        sp.push({t:sw*2+0.4, lane:0, color:'yellow', shifter:true, shiftTo:'red', shiftDelay:1.7});
        sp.sort((a,b)=>a.t-b.t);
        return {idx:3, lanes:3, colors:['red','blue','yellow'],
                gateFixed:null, gateSeq:seq, switchT:sw,
                spawns:sp, quota:18, speed:0.28, lives:3, comboReq:1,
                shiftInterval:1.8};
      }
      if(n===4){
        // St4: 4色拡張、シフター敵4体（各色1体）
        const seq=['red','blue','yellow','green'], sw=3.5;
        const sp=[];
        seq.forEach((col,gi)=>{
          for(let k=0;k<4;k++) sp.push({t:gi*sw+0.1+k*0.3, lane:k%3, color:col});
        });
        // トラップ不意打ち敵
        seq.forEach((col,gi)=>{
          sp.push({t:gi*sw+sw*0.5+0.15, lane:gi%3, color:col, trap:true});
        });
        // カラーシフター敵4体（各色ウィンドウに1体ずつ、次のゲート色へ変色）
        sp.push({t:0.8, lane:2, color:'red', shifter:true, shiftTo:'blue', shiftDelay:1.5});
        sp.push({t:sw+0.7, lane:0, color:'blue', shifter:true, shiftTo:'yellow', shiftDelay:1.4});
        sp.push({t:sw*2+0.6, lane:1, color:'yellow', shifter:true, shiftTo:'green', shiftDelay:1.5});
        sp.push({t:sw*3+0.5, lane:2, color:'green', shifter:true, shiftTo:'red', shiftDelay:1.4});
        sp.sort((a,b)=>a.t-b.t);
        return {idx:4, lanes:3, colors:['red','blue','yellow','green'],
                gateFixed:null, gateSeq:seq, switchT:sw,
                spawns:sp, quota:24, speed:0.28, lives:3, comboReq:2,
                shiftInterval:1.5};
      }
      // St5: 4色最高難度 + シフター敵8体（各ウィンドウ2体）、1.2秒の短い変色間隔
      const seq5=['red','blue','yellow','green'], sw5=3.0;
      const sp5=[];
      seq5.forEach((col,gi)=>{
        for(let k=0;k<5;k++) sp5.push({t:gi*sw5+0.05+k*0.22, lane:k%3, color:col});
      });
      // トラップ敵
      seq5.forEach((col,gi)=>{
        sp5.push({t:gi*sw5+0.4, lane:(gi+1)%3, color:col, trap:true});
        sp5.push({t:gi*sw5+1.6, lane:(gi+2)%3, color:col, trap:true});
      });
      // シフター敵：各ウィンドウに2体（両方とも次のゲート色へ変色）
      seq5.forEach((col,gi)=>{
        const nextCol=seq5[(gi+1)%seq5.length];
        sp5.push({t:gi*sw5+0.3, lane:gi%3, color:col, shifter:true, shiftTo:nextCol, shiftDelay:1.2});
        sp5.push({t:gi*sw5+1.4, lane:(gi+2)%3, color:col, shifter:true, shiftTo:nextCol, shiftDelay:1.1});
      });
      sp5.sort((a,b)=>a.t-b.t);
      return {idx:5, lanes:3, colors:['red','blue','yellow','green'],
              gateFixed:null, gateSeq:seq5, switchT:sw5,
              spawns:sp5, quota:36, speed:0.28, lives:3, comboReq:2,
              shiftInterval:1.2};
    }

    let st, mobs=[], beams={}, hold=null, gateColor='red', gauge=0, kills=0, lives=3, running=false, t0=0, raf=0, spawnIdx=0, combos=0, stageNum=1, over=false;

    function setGate(c){
      gateColor=c; glyph.textContent=GLYPHS[c]; glyph.style.color=COLORS[c];
      gate.style.borderColor=COLORS[c]; gate.style.boxShadow='0 0 calc(var(--u)*5) '+COLORS[c]+', inset 0 0 calc(var(--u)*4) '+COLORS[c];
      // match ハイライトは廃止：どのボタンも自由にホールド可能なためゲート誘導なし
    }

    function makeBeams(){
      Object.values(beams).forEach(arr=>arr.forEach(e=>e.remove())); beams={red:[],blue:[],yellow:[],green:[]};
      const lanes=st.lanes;
      st.colors.forEach(c=>{
        for(let l=0;l<lanes;l++){
          const b=document.createElement('div');
          b.className='beam'; b.style.color=COLORS[c];
          b.style.left=((l+0.5)/lanes*100)+'%';
          field.appendChild(b); beams[c].push(b);
        }
      });
    }

    function updateButtons(){
      const showGreen=(st.idx>=4);
      btns.forEach(b=>{
        if(b.dataset.c==='green'){
          b.classList.toggle('hidden-btn', !showGreen);
        }
      });
    }

    // シフター敵の色を変更する
    function shiftMobColor(m, newColor){
      if(m.dead || m.shifted) return;
      // 旧クラスを除去し新色クラスを付与
      m.el.classList.remove(m.color);
      m.color = newColor;
      m.el.classList.add(newColor);
      m.shifted = true;
      // シフトアニメーション
      m.el.classList.add('shifting');
      setTimeout(()=>{ if(m.el.parentNode) m.el.classList.remove('shifting'); }, 400);
      // 画面フラッシュ
      shiftFlash.classList.remove('shiftburst'); void shiftFlash.offsetWidth; shiftFlash.classList.add('shiftburst');
    }

    function startStage(n){
      stageNum=n; st=buildStage(n); over=false;
      mobs.forEach(m=>m.el.remove()); mobs=[];
      updateButtons();
      makeBeams();
      gauge=0; kills=0; lives=st.lives; spawnIdx=0; combos=0; hold=null;
      gaugeEl.style.width='0%';
      stageEl.textContent='ST '+n;
      killsEl.textContent='0 / '+st.quota;
      updLives();
      setGate(st.gateFixed||st.gateSeq[0]);
      btns.forEach(b=>b.classList.remove('holding'));
      running=true; t0=performance.now();
      cancelAnimationFrame(raf); raf=requestAnimationFrame(loop);
    }

    function updLives(){ livesEl.textContent='♥'.repeat(Math.max(0,lives))||'·'; }

    function spawnMob(s){
      const el=document.createElement('div');
      const isTrap=!!s.trap;
      const isShifter=!!s.shifter;
      el.className='mob '+s.color+(isTrap?' trap-spawn':'')+(isShifter?' shifter':'');
      el.style.left=((s.lane+0.5)/st.lanes*100)+'%';
      const startY = isTrap ? (65 + Math.random()*10) : -6;
      el.style.top=startY+'%';
      field.appendChild(el);
      const mob={el, lane:s.lane, color:s.color, y:startY, isTrap, isShifter,
                 shiftTo:s.shiftTo||null, shiftDelay:s.shiftDelay||0,
                 shiftTimer:0, shifted:false};
      mobs.push(mob);
      // 不意打ちフラッシュ演出
      if(isTrap){
        trapFlash.classList.remove('zap'); void trapFlash.offsetWidth; trapFlash.classList.add('zap');
      }
    }

    function splash(x,y,color){
      for(let i=0;i<8;i++){
        const p=document.createElement('div'); p.className='splash'; p.style.color=color;
        p.style.left=x+'%'; p.style.top=y+'%';
        field.appendChild(p);
        const a=Math.random()*6.28, d=4+Math.random()*8;
        p.animate([{transform:'translate(-50%,-50%) scale(1.5)',opacity:1},
          {transform:`translate(${Math.cos(a)*d-50}px,${Math.sin(a)*d-50}px) scale(0)`,opacity:0}],
          {duration:380,easing:'ease-out'}).onfinish=()=>p.remove();
      }
    }

    function killMob(m){
      m.dead=true; m.el.classList.add('dying');
      const x=parseFloat(m.el.style.left);
      splash(x,m.y,COLORS[m.color]);
      setTimeout(()=>m.el.remove(),300);
      kills++; killsEl.textContent=kills+' / '+st.quota;
    }

    function combo(){
      combos++;
      flash.classList.remove('boom'); void flash.offsetWidth; flash.classList.add('boom');
      mobs.forEach(m=>{ if(!m.dead) killMob(m); });
      gauge=0; gaugeEl.style.width='0%';
    }

    let last=0;
    function loop(now){
      if(!running){return;}
      const t=(now-t0)/1000; const dt=Math.min(0.05,(now-last)/1000||0.016); last=now;

      // gate switch（ループローテーション）
      if(st.gateSeq){
        const gi=Math.floor(t/st.switchT) % st.gateSeq.length;
        if(st.gateSeq[gi]!==gateColor) setGate(st.gateSeq[gi]);
      }

      // spawn
      while(spawnIdx<st.spawns.length && st.spawns[spawnIdx].t<=t){ spawnMob(st.spawns[spawnIdx]); spawnIdx++; }

      // beams reflect current hold
      st.colors.forEach(c=>{
        const on=(hold===c);
        (beams[c]||[]).forEach(b=>b.classList.toggle('on',on));
      });

      // move + trap fire
      const correct=(hold===gateColor);
      for(const m of mobs){
        if(m.dead) continue;

        // シフター敵の色変化タイマー更新
        if(m.isShifter && !m.shifted && m.shiftTo){
          m.shiftTimer += dt;
          if(m.shiftTimer >= m.shiftDelay){
            shiftMobColor(m, m.shiftTo);
          }
        }

        const spd = m.isTrap ? st.speed * 1.8 : st.speed;
        m.y += spd*dt*100;
        m.el.style.top=m.y+'%';
        // trap kill: correct hold, color match, within range (62%-95%)
        if(correct && m.color===hold && m.y>=62 && m.y<=95){
          killMob(m);
          gauge=Math.min(100,gauge+18); /* per-kill bump */
          gaugeEl.style.width=gauge+'%';
          if(gauge>=100) combo();
          continue;
        }
        // reached player line (95%)
        if(m.y>=95){
          m.dead=true; m.el.remove();
          lives--; updLives();
          if(st.idx===5){
            warningFlash.classList.remove('warn'); void warningFlash.offsetWidth; warningFlash.classList.add('warn');
          } else {
            flash.classList.remove('boom'); void flash.offsetWidth; flash.classList.add('boom');
          }
          if(lives<=0){ lose(); return; }
        }
      }
      // passive gauge from correct hold
      if(correct && hold){ gauge=Math.min(100,gauge+10*dt); gaugeEl.style.width=gauge+'%'; if(gauge>=100) combo(); }

      mobs=mobs.filter(m=>!m.dead || m.el.parentNode);

      // クリア判定：全敵スポーン済み & フィールド上に生き敵なし & ライフ残存
      if(!over && spawnIdx>=st.spawns.length && mobs.filter(m=>!m.dead).length===0 && lives>0){
        win(); return;
      }

      raf=requestAnimationFrame(loop);
    }

    const stageMessages={
      1:{title:'ST1 突破',sub:'ゲートは色を切り替え始める。<br>色に追従して持ち替え、<br>血溜まりを満たせ。<br><br>点滅する敵は色が変わる！<br>変色後に倒せ。',btn:'ST2 へ'},
      2:{title:'ST2 突破',sub:'速度が増す。より素早く<br>ホールドを切り替えろ。<br>コンボで残敵を一掃せよ。',btn:'ST3 へ'},
      3:{title:'ST3 突破',sub:'新たな色「緑」の毒敵が現れる。<br>4色のゲートに追従せよ。<br>コンボを2回発動しろ。',btn:'ST4 へ'},
      4:{title:'ST4 突破',sub:'速度は最大、切替は最短。<br>4色をフル回転で捌け。<br>シフター敵の変色に注目！',btn:'ST5 へ'},
    };

    function win(){
      if(over) return; over=true; running=false; cancelAnimationFrame(raf);
      if(stageNum<5){
        const m=stageMessages[stageNum];
        showModal(m.title,m.sub,m.btn,()=>startStage(stageNum+1));
      } else {
        showModal('儀式完了','全ての血が捧げられた。<br>コンボ爆発 '+combos+' 回。<br>全5ステージ制覇！','もう一度',()=>startStage(1));
      }
    }
    function lose(){
      if(over) return; over=true; running=false; cancelAnimationFrame(raf);
      showModal('GAME OVER','モンスターがゲートを破った。','再挑戦',()=>startStage(stageNum));
    }
    function showModal(title,sub,btn,fn){
      mTitle.textContent=title; mSub.innerHTML=sub; mBtn.textContent=btn;
      modal._fn=fn; modal.classList.remove('hidden');
    }

    // ---- Input: mouse hold only (free button selection) ----
    // どのボタンも自由にホールド可能。ゲート色と一致しないと空撃ち（トラップ発火するが敵は倒せない）
    function press(c){ hold=c; btns.forEach(b=>b.classList.toggle('holding',b.dataset.c===c && !b.classList.contains('hidden-btn'))); }
    function release(c){ if(hold===c){ hold=null; btns.forEach(b=>b.classList.remove('holding')); } }
    btns.forEach(b=>{
      const c=b.dataset.c;
      b.addEventListener('mousedown',e=>{e.preventDefault(); if(running) press(c);});
      b.addEventListener('mouseup',e=>{e.preventDefault(); release(c);});
      b.addEventListener('mouseleave',e=>{ release(c); });
      // touch parity
      b.addEventListener('touchstart',e=>{e.preventDefault(); if(running) press(c);},{passive:false});
      b.addEventListener('touchend',e=>{e.preventDefault(); release(c);},{passive:false});
    });
    // safety: release on global mouseup
    window.addEventListener('mouseup',()=>{ if(hold) release(hold); });

    mBtn.addEventListener('click',()=>{ modal.classList.add('hidden'); if(modal._fn) modal._fn(); });

    // first start
    modal._fn=()=>startStage(1);
  })();
  </script>
</body>
</html>
