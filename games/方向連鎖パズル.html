<!DOCTYPE html>
<!--
  Phone frame template for hybrid-casual-mentor generated games.
  Aspect ratio: 9:19.5 (iPhone X 系縦長, NEONNOVA2048 基準)。
  PC で開いても常にこの比率を保ち、letterbox（左右黒帯）で中央表示。
  すべてのゲーム要素は #phone の子として配置すること。
-->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>方向連鎖パズル</title>
<style>
  :root {
    /* === color tokens === */
    --bg-deep:   #02030a;
    --bg-mid:    #0a1430;
    --bg-panel:  #0d0b2e;
    --bg-card:   #0b1228;
    --line:      #1e1860;
    --text-main: #eaf3ff;
    --text-sub:  #cdddef;
    --text-dim:  #7a92b5;
    /* game colors */
    --c-red:    #ff4455;
    --c-red-hi: #ff7788;
    --c-blue:   #33aaff;
    --c-blue-hi:#77ccff;
    --c-green:  #33dd66;
    --c-green-hi:#77ff99;
    --c-yellow: #ffcc00;
    --c-yellow-hi:#ffe566;
    --c-empty:  #10102a;
    --c-empty-hi:#1a1a44;
    --c-sel:    #ffffff;
    --c-accent: #b585ff;
    --c-accent2:#3df;
    /* shadows */
    --sh-block: 0 calc(var(--u)*1) 0 rgba(0,0,0,0.6),
                inset 0 calc(var(--u)*0.6) calc(var(--u)*1.5) rgba(255,255,255,0.28),
                inset 0 calc(var(--u)*-0.3) calc(var(--u)*1) rgba(0,0,0,0.3);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    width:100%;height:100%;overflow:hidden;
    background:#000;color:var(--text-main);
    font-family:'Helvetica Neue',system-ui,sans-serif;
    user-select:none;-webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;touch-action:none;
  }
  body{position:relative;display:flex;align-items:center;justify-content:center;}
  #phone{
    position:relative;overflow:hidden;
    width:min(100vw,calc(100vh*9/19.5));
    height:min(100vh,calc(100vw*19.5/9));
    --pw:min(100vw,calc(100vh*9/19.5));
    --ph:min(100vh,calc(100vw*19.5/9));
    --u:calc(var(--pw)/100);
    --uh:calc(var(--ph)/100);
    background:radial-gradient(ellipse 90% 60% at 50% 30%,#1a0848,var(--bg-deep) 80%);
  }
  /* bg stars */
  #bg-stars{position:absolute;inset:0;pointer-events:none;opacity:0.5;}
  /* HUD */
  #hud{
    position:absolute;top:0;left:0;width:100%;
    height:calc(var(--uh)*13);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 calc(var(--u)*4);
    background:linear-gradient(180deg,rgba(13,11,46,0.95) 0%,rgba(13,11,46,0.7) 100%);
    border-bottom:1px solid var(--line);
  }
  #stage-label{
    font-size:calc(var(--u)*5);font-weight:800;
    color:var(--c-accent);
    text-shadow:0 0 calc(var(--u)*3) var(--c-accent);
    letter-spacing:0.05em;
  }
  #move-label{
    font-size:calc(var(--u)*4);font-weight:600;
    color:var(--text-sub);
    font-variant-numeric:tabular-nums;
  }
  #stage-badge{
    font-size:calc(var(--u)*2.8);
    padding:calc(var(--u)*0.8) calc(var(--u)*2.5);
    border-radius:calc(var(--u)*3);
    background:rgba(181,133,255,0.15);
    border:1px solid rgba(181,133,255,0.3);
    color:var(--c-accent);
    font-weight:700;letter-spacing:0.04em;
  }
  /* Grid wrap */
  #grid-wrap{
    position:absolute;
    top:calc(var(--uh)*14.5);
    left:50%;transform:translateX(-50%);
    width:calc(var(--u)*88);
    height:calc(var(--u)*88);
    border-radius:calc(var(--u)*3);
    box-shadow:0 0 calc(var(--u)*8) rgba(181,133,255,0.15),
               0 0 calc(var(--u)*2) rgba(0,0,0,0.8);
  }
  #grid{
    width:100%;height:100%;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    grid-template-rows:repeat(5,1fr);
    gap:calc(var(--u)*1.8);
    background:var(--line);
    border:calc(var(--u)*0.6) solid var(--line);
    border-radius:calc(var(--u)*3);
    overflow:hidden;
    padding:calc(var(--u)*0.3);
  }
  /* Cell */
  .cell{
    position:relative;
    background:var(--c-empty);
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    border-radius:calc(var(--u)*1.5);
    transition:background 0.12s;
    overflow:hidden;
  }
  .cell::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.04),transparent 70%);
    border-radius:inherit;pointer-events:none;
  }
  .cell.has-block{cursor:pointer;}
  .cell.selected .block{
    transform:scale(1.14) translateY(calc(var(--u)*-0.5));
    filter:brightness(1.2);
  }
  .cell.selected{
    background:var(--c-empty-hi);
    box-shadow:inset 0 0 calc(var(--u)*2) rgba(255,255,255,0.12);
  }
  .cell.move-hint{
    background:rgba(181,133,255,0.08);
    cursor:pointer;
    animation:hint-pulse 1s ease-in-out infinite;
  }
  .cell.move-hint::after{
    content:'';position:absolute;inset:22%;
    border:calc(var(--u)*0.5) dashed rgba(181,133,255,0.5);
    border-radius:50%;
  }
  @keyframes hint-pulse{
    0%,100%{background:rgba(181,133,255,0.06);}
    50%{background:rgba(181,133,255,0.14);}
  }
  /* Block */
  .block{
    position:relative;
    width:calc(var(--u)*14);height:calc(var(--u)*14);
    border-radius:calc(var(--u)*2.5);
    display:flex;align-items:center;justify-content:center;
    font-size:calc(var(--u)*7);
    font-weight:900;line-height:1;
    transition:transform 0.15s,filter 0.15s;
    box-shadow:var(--sh-block);
  }
  .block[data-color="R"]{
    background:linear-gradient(145deg,var(--c-red-hi),var(--c-red));
    color:#fff;
    filter:drop-shadow(0 0 calc(var(--u)*1.5) rgba(255,68,85,0.6));
  }
  .block[data-color="B"]{
    background:linear-gradient(145deg,var(--c-blue-hi),var(--c-blue));
    color:#fff;
    filter:drop-shadow(0 0 calc(var(--u)*1.5) rgba(51,170,255,0.6));
  }
  .block[data-color="G"]{
    background:linear-gradient(145deg,var(--c-green-hi),var(--c-green));
    color:#052010;
    filter:drop-shadow(0 0 calc(var(--u)*1.5) rgba(51,221,102,0.55));
  }
  .block[data-color="Y"]{
    background:linear-gradient(145deg,var(--c-yellow-hi),var(--c-yellow));
    color:#2a1800;
    filter:drop-shadow(0 0 calc(var(--u)*1.5) rgba(255,204,0,0.6));
  }
  /* Hint text */
  #hint{
    position:absolute;
    top:calc(var(--uh)*74);
    left:50%;transform:translateX(-50%);
    width:calc(var(--u)*90);
    text-align:center;
    font-size:calc(var(--u)*3.4);
    color:var(--text-dim);
    line-height:1.6;
    pointer-events:none;
  }
  /* Modal */
  #modal{
    display:none;position:absolute;inset:0;
    background:rgba(2,3,10,0.88);
    align-items:center;justify-content:center;
    flex-direction:column;gap:calc(var(--uh)*2);
    z-index:10;
    backdrop-filter:blur(2px);
  }
  #modal.show{display:flex;}
  #modal-card{
    display:flex;flex-direction:column;align-items:center;gap:calc(var(--uh)*2);
    background:linear-gradient(160deg,rgba(20,15,60,0.95),rgba(10,8,30,0.97));
    border:1px solid rgba(181,133,255,0.3);
    border-radius:calc(var(--u)*5);
    padding:calc(var(--uh)*4) calc(var(--u)*8);
    box-shadow:0 0 calc(var(--u)*8) rgba(181,133,255,0.2),
               0 calc(var(--u)*2) calc(var(--u)*6) rgba(0,0,0,0.6);
    min-width:calc(var(--u)*70);
  }
  #modal-title{
    font-size:calc(var(--u)*10);font-weight:900;
    text-align:center;letter-spacing:0.02em;
    background:linear-gradient(135deg,#fff 20%,var(--c-accent) 80%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;
  }
  #modal-sub{font-size:calc(var(--u)*4.5);color:var(--text-sub);text-align:center;font-weight:600;}
  #modal-label{font-size:calc(var(--u)*3.2);color:var(--text-dim);text-align:center;}
  #modal-btn{
    padding:calc(var(--uh)*1.8) calc(var(--u)*10);
    background:linear-gradient(135deg,var(--c-accent),var(--c-accent2));
    border:none;border-radius:calc(var(--u)*4);
    font-size:calc(var(--u)*4.8);font-weight:800;
    color:#fff;cursor:pointer;letter-spacing:0.04em;
    box-shadow:0 0 calc(var(--u)*4) rgba(181,133,255,0.5),
               0 calc(var(--u)*0.6) 0 rgba(0,0,0,0.4);
    transition:filter 0.1s,transform 0.1s;
  }
  #modal-btn:active{filter:brightness(1.15);transform:scale(0.97);}
  /* Particles */
  .particle{
    position:absolute;border-radius:50%;
    pointer-events:none;z-index:5;
    animation:pfly 0.75s ease-out forwards;
  }
  @keyframes pfly{
    0%{transform:translate(0,0) scale(1.2);opacity:1;}
    100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0;}
  }
  .flash-cell{animation:flashbg 0.45s ease-out;}
  @keyframes flashbg{
    0%{background:rgba(255,255,255,0.75);}
    60%{background:rgba(255,255,255,0.2);}
    100%{background:var(--c-empty);}
  }
</style>
</head>
<body>
<div id="phone">
  <svg id="bg-stars" viewBox="0 0 100 217" preserveAspectRatio="none"></svg>
  <div id="hud">
    <span id="stage-label">Stage 1</span>
    <span id="stage-badge">操作理解</span>
    <span id="move-label">手数: 0</span>
  </div>
  <div id="grid-wrap">
    <div id="grid"></div>
  </div>
  <div id="hint">ブロックを選んで矢印の方向に移動しよう</div>
  <div id="modal">
    <div id="modal-card">
      <div id="modal-title">✨ クリア！</div>
      <div id="modal-sub"></div>
      <div id="modal-label"></div>
      <button id="modal-btn">次のステージへ</button>
    </div>
  </div>
</div>
<script>
// ===== STAGE DATA =====
// Each block: {r, c, color, dir}
// dir: 'R'=right, 'L'=left, 'U'=up, 'D'=down
// Arrows: R=→ L=← U=↑ D=↓
const STAGES = [
  {
    // St1: 3 colors, 6 blocks, 3 moves
    // R→(1,1), R←(1,3) | B↓(0,3), B↑(2,3) | G→(4,1), G←(4,3)
    blocks:[
      {r:0,c:3,color:'B',dir:'D'},
      {r:1,c:1,color:'R',dir:'R'},
      {r:1,c:3,color:'R',dir:'L'},
      {r:2,c:3,color:'B',dir:'U'},
      {r:4,c:1,color:'G',dir:'R'},
      {r:4,c:3,color:'G',dir:'L'},
    ],
    hint:'ブロックを選んで矢印の方向に移動しよう'
  },
  {
    // St2: 4 colors, 8 blocks, 5 player moves
    // B↓(0,2), Y→(1,1), Y←(1,3), R↓(1,4), G←(2,2), G→(3,1), R↑(3,4), B↑(4,2)
    // Move1: Y→(1,1)→(1,2) adj Y←(1,3) → Yellow clears; cascade: B↓ slides to (1,2), blocked by G←(2,2)
    // Move2: G←(2,2)→(2,1) adj G→(3,1) → Green clears; B↓ path now open
    // Move3: B↓(1,2)→(2,2) [manual]
    // Move4: B↓(2,2)→(3,2) adj B↑(4,2) → Blue clears! (大豪割れ chain)
    // Move5: R↓(1,4)→(2,4) adj R↑(3,4) → Red clears → WIN
    blocks:[
      {r:0,c:2,color:'B',dir:'D'},
      {r:1,c:1,color:'Y',dir:'R'},
      {r:1,c:3,color:'Y',dir:'L'},
      {r:1,c:4,color:'R',dir:'D'},
      {r:2,c:2,color:'G',dir:'L'},
      {r:3,c:1,color:'G',dir:'R'},
      {r:3,c:4,color:'R',dir:'U'},
      {r:4,c:2,color:'B',dir:'U'},
    ],
    hint:'手順を考えて「大豪割れ」連鎖を狙え！'
  }
];

const ARROW = {R:'→',L:'←',U:'↑',D:'↓'};
const DIR_DELTA = {R:[0,1],L:[0,-1],U:[-1,0],D:[1,0]};
const COLOR_NAME = {R:'赤',B:'青',G:'緑',Y:'黄'};
const COLS = {R:'#ff4455',B:'#33aaff',G:'#44dd77',Y:'#ffcc00'};

let grid = []; // 5x5 array of block-objects or null
let selected = null; // {r,c}
let moveCount = 0;
let stageIdx = 0;
let busy = false;

// ===== DOM =====
const gridEl = document.getElementById('grid');
const stageLabel = document.getElementById('stage-label');
const stageBadge = document.getElementById('stage-badge');
const moveLabel = document.getElementById('move-label');
const hintEl = document.getElementById('hint');
const modal = document.getElementById('modal');
const modalTitle = document.getElementById('modal-title');
const modalSub = document.getElementById('modal-sub');
const modalLabel = document.getElementById('modal-label');
const modalBtn = document.getElementById('modal-btn');
const BADGES = ['操作理解','思考・応用'];
// Draw bg stars
(function(){
  const svg = document.getElementById('bg-stars');
  let s='';
  for(let i=0;i<40;i++){
    const x=(Math.random()*100).toFixed(1),y=(Math.random()*217).toFixed(1);
    const r=(0.2+Math.random()*0.5).toFixed(2),op=(0.2+Math.random()*0.6).toFixed(2);
    s+=`<circle cx="${x}" cy="${y}" r="${r}" fill="#fff" opacity="${op}"/>`;
  }
  svg.innerHTML=s;
})();

// ===== INIT =====
function initStage(idx){
  stageIdx = idx;
  moveCount = 0;
  selected = null;
  busy = false;
  grid = Array.from({length:5},()=>Array(5).fill(null));
  const st = STAGES[idx];
  st.blocks.forEach(b=>{
    grid[b.r][b.c] = {color:b.color, dir:b.dir};
  });
  stageLabel.textContent = 'Stage '+(idx+1);
  stageBadge.textContent = BADGES[idx]||'';
  moveLabel.textContent = '手数: 0';
  hintEl.textContent = st.hint;
  modal.classList.remove('show');
  renderGrid();
}

// ===== RENDER =====
function renderGrid(){
  gridEl.innerHTML = '';
  for(let r=0;r<5;r++){
    for(let c=0;c<5;c++){
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r;
      cell.dataset.c = c;
      const blk = grid[r][c];
      if(blk){
        cell.classList.add('has-block');
        const b = document.createElement('div');
        b.className = 'block';
        b.dataset.color = blk.color;
        b.textContent = ARROW[blk.dir];
        cell.appendChild(b);
        if(selected && selected.r===r && selected.c===c){
          cell.classList.add('selected');
        }
      }
      if(selected && !grid[r][c]){
        // Show move hint if this cell is the target direction from selected
        const sel = grid[selected.r][selected.c];
        if(sel){
          const [dr,dc] = DIR_DELTA[sel.dir];
          const tr = selected.r+dr, tc = selected.c+dc;
          if(tr===r && tc===c){
            cell.classList.add('move-hint');
          }
        }
      }
      cell.addEventListener('pointerdown', onCellClick);
      gridEl.appendChild(cell);
    }
  }
}

// ===== INPUT =====
function onCellClick(e){
  if(busy) return;
  const r = parseInt(e.currentTarget.dataset.r);
  const c = parseInt(e.currentTarget.dataset.c);
  const blk = grid[r][c];

  if(selected){
    const sel = grid[selected.r][selected.c];
    if(!sel){ selected=null; renderGrid(); return; }
    const [dr,dc] = DIR_DELTA[sel.dir];
    const tr = selected.r+dr, tc = selected.c+dc;

    if(r===tr && c===tc && !grid[r][c]){
      // Valid move
      doMove(selected.r, selected.c, r, c);
      selected = null;
      return;
    }
    // Click another own block → re-select
    if(blk){
      selected = {r,c};
      renderGrid();
    } else {
      // Click empty non-target cell → deselect
      selected = null;
      renderGrid();
    }
    return;
  }

  if(blk){
    selected = {r,c};
    renderGrid();
  }
}

// ===== MOVE =====
function doMove(fr, fc, tr, tc){
  busy = true;
  const blk = grid[fr][fc];
  grid[fr][fc] = null;
  grid[tr][tc] = blk;
  moveCount++;
  moveLabel.textContent = '手数: '+moveCount;
  renderGrid();
  // Check for completions
  setTimeout(()=>checkAllColors(()=>{ busy=false; }), 80);
}

// ===== CHECK ALL COLORS =====
function checkAllColors(cb){
  const colors = getColorsOnBoard();
  const toCheck = [...colors];
  checkNext();
  function checkNext(){
    if(toCheck.length===0){ cb(); return; }
    const color = toCheck.shift();
    if(isColorComplete(color)){
      clearColor(color, ()=>{ checkNext(); });
    } else {
      checkNext();
    }
  }
}

function getColorsOnBoard(){
  const s = new Set();
  for(let r=0;r<5;r++) for(let c=0;c<5;c++) if(grid[r][c]) s.add(grid[r][c].color);
  return s;
}

function isColorComplete(color){
  const cells = [];
  for(let r=0;r<5;r++) for(let c=0;c<5;c++) if(grid[r][c]&&grid[r][c].color===color) cells.push([r,c]);
  if(cells.length<2) return false; // need >=2 blocks to form a clearable group
  // BFS connectivity
  const key = ([r,c])=>r*5+c;
  const adj = new Map();
  cells.forEach(p=>adj.set(key(p),p));
  const visited = new Set();
  const queue = [cells[0]];
  visited.add(key(cells[0]));
  while(queue.length){
    const [r,c]=queue.shift();
    for(const [dr,dc] of [[0,1],[0,-1],[1,0],[-1,0]]){
      const nr=r+dr,nc=c+dc;
      if(nr<0||nr>4||nc<0||nc>4) continue;
      const nk=nr*5+nc;
      if(adj.has(nk)&&!visited.has(nk)){
        visited.add(nk);
        queue.push([nr,nc]);
      }
    }
  }
  return visited.size===cells.length;
}

// ===== CLEAR COLOR =====
function clearColor(color, cb){
  const cells=[];
  for(let r=0;r<5;r++) for(let c=0;c<5;c++) if(grid[r][c]&&grid[r][c].color===color) cells.push([r,c]);
  // Flash + particles
  cells.forEach(([r,c])=>{
    const cellEl = getCellEl(r,c);
    if(cellEl){ cellEl.classList.add('flash-cell'); spawnParticles(cellEl, color); }
  });
  setTimeout(()=>{
    cells.forEach(([r,c])=>{ grid[r][c]=null; });
    renderGrid();
    // Auto-slide cascade: slide blocks into freed cells
    autoSlide(cells, ()=>{
      // Check if game won
      if(isGameWon()){
        setTimeout(()=>showClear(), 300);
        return;
      }
      // cascade check
      setTimeout(()=>checkAllColors(cb), 100);
    });
  }, 350);
}

// ===== AUTO-SLIDE =====
// After clearing color, any block whose IMMEDIATE next cell (in its dir) was one of
// the cleared cells will auto-slide as far as possible in that direction.
function autoSlide(clearedCells, cb){
  const clearedSet = new Set(clearedCells.map(([r,c])=>r*5+c));
  const toSlide = [];
  const seen = new Set();
  // Scan all blocks: if their immediate next cell was cleared, they can slide
  for(let r=0;r<5;r++){
    for(let c=0;c<5;c++){
      if(!grid[r][c]) continue;
      const blk=grid[r][c];
      const [dr,dc]=DIR_DELTA[blk.dir];
      const nr=r+dr, nc=c+dc;
      if(nr<0||nr>4||nc<0||nc>4) continue;
      const nk=nr*5+nc;
      if(clearedSet.has(nk)){
        const k=r*5+c;
        if(!seen.has(k)){ seen.add(k); toSlide.push({br:r,bc:c}); }
      }
    }
  }
  if(toSlide.length===0){ cb(); return; }
  let moved=false;
  toSlide.forEach(({br,bc})=>{
    const blk=grid[br][bc];
    if(!blk) return;
    const [dr,dc]=DIR_DELTA[blk.dir];
    let cr=br,cc=bc;
    while(true){
      const nr=cr+dr,nc=cc+dc;
      if(nr<0||nr>4||nc<0||nc>4||grid[nr][nc]) break;
      cr=nr;cc=nc;
    }
    if(cr!==br||cc!==bc){
      grid[br][bc]=null;
      grid[cr][cc]=blk;
      moved=true;
    }
  });
  if(moved){
    renderGrid();
    setTimeout(()=>cb(), 80);
  } else {
    cb();
  }
}

function isGameWon(){
  for(let r=0;r<5;r++) for(let c=0;c<5;c++) if(grid[r][c]) return false;
  return true;
}

// ===== PARTICLES =====
function spawnParticles(cellEl, color){
  const phone = document.getElementById('phone');
  const rect = cellEl.getBoundingClientRect();
  const prect = phone.getBoundingClientRect();
  const cx = rect.left-prect.left+rect.width/2;
  const cy = rect.top-prect.top+rect.height/2;
  const col = COLS[color]||'#fff';
  for(let i=0;i<8;i++){
    const p=document.createElement('div');
    p.className='particle';
    const angle=Math.random()*Math.PI*2;
    const dist=30+Math.random()*50;
    p.style.cssText=`left:${cx}px;top:${cy}px;width:8px;height:8px;background:${col};`+
      `--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px;`;
    phone.appendChild(p);
    setTimeout(()=>p.remove(),750);
  }
}

// ===== CLEAR SCREEN =====
function showClear(){
  const isLast = stageIdx >= STAGES.length-1;
  modalTitle.textContent = isLast ? '🎊 全クリア！' : '✨ クリア！';
  modalSub.textContent = `手数: ${moveCount}`;
  modalLabel.textContent = isLast ? 'すべてのステージをクリアしました！' : '次のステージへ進もう';
  modalBtn.textContent = isLast ? 'もう一度' : '次のステージへ';
  modal.classList.add('show');
}

modalBtn.addEventListener('pointerdown', ()=>{
  const next = stageIdx < STAGES.length-1 ? stageIdx+1 : 0;
  initStage(next);
});

// ===== UTILITY =====
function getCellEl(r,c){
  return gridEl.children[r*5+c]||null;
}

// ===== START =====
initStage(0);
</script>
