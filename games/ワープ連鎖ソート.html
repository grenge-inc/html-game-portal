<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>ワープ連鎖ソート</title>
<style>
  :root {
    --phone-aspect: 9 / 19.5;
    /* Block colors */
    --col-red:#ff3366;--col-red-light:#ff6688;--col-red-glow:rgba(255,51,102,0.65);
    --col-blue:#3377ff;--col-blue-light:#66aaff;--col-blue-glow:rgba(51,119,255,0.65);
    --col-yellow:#ffcc00;--col-yellow-light:#ffe066;--col-yellow-glow:rgba(255,204,0,0.65);
    --col-green:#22dd77;--col-green-light:#66ffaa;--col-green-glow:rgba(34,221,119,0.65);
    /* Gimmick */
    --warp-in:#cc44ff;--warp-in-glow:rgba(204,68,255,0.55);
    --warp-out:#00eedd;--warp-out-glow:rgba(0,238,221,0.5);
    --oneway:#ffaa00;--oneway-glow:rgba(255,170,0,0.4);
    /* Background */
    --bg-deep:#03000f;--bg-mid:#0a0030;--bg-panel:#0d0040;--bg-card:#110050;
    --line:#2a1560;
    /* Text */
    --text-main:#eaf3ff;--text-sub:#9988cc;--text-dim:#5544aa;
    /* Nova scale for intensity */
    --nova-9:#ffd76b;--nova-7:#ffb24a;--nova-5:#ff7a3a;--nova-3:#ff5d8a;--nova-1:#b585ff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;
    font-family:'Helvetica Neue',system-ui,sans-serif;user-select:none;
    -webkit-user-select:none;-webkit-tap-highlight-color:transparent;touch-action:none;}
  body{position:relative;display:flex;align-items:center;justify-content:center;}
  #phone{
    position:relative;overflow:hidden;
    width:min(100vw,calc(100vh*9/19.5));
    height:min(100vh,calc(100vw*19.5/9));
    --pw:min(100vw,calc(100vh*9/19.5));
    --ph:min(100vh,calc(100vw*19.5/9));
    --u:calc(var(--pw)/100);
    --uh:calc(var(--ph)/100);
    background:radial-gradient(ellipse 80% 60% at 50% 30%,var(--bg-mid) 0%,var(--bg-deep) 100%);
  }
  /* Starfield background layer */
  #bg-stars{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
  .star{position:absolute;border-radius:50%;background:#fff;opacity:0;
    animation:twinkle var(--d,3s) var(--delay,0s) ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:0;}50%{opacity:var(--op,0.6);}}
  /* HUD */
  #hud{position:absolute;top:0;left:0;width:100%;height:calc(13*var(--uh));
    display:flex;align-items:center;justify-content:space-between;
    padding:calc(1.5*var(--uh)) calc(3*var(--u)) 0;z-index:10;
    background:linear-gradient(to bottom,rgba(3,0,15,0.85) 70%,transparent 100%);}
  #stage-label{font-size:calc(3*var(--u));font-weight:900;letter-spacing:0.05em;
    background:linear-gradient(135deg,var(--nova-1),var(--warp-in));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    filter:drop-shadow(0 0 calc(0.8*var(--u)) var(--warp-in));}
  #moves-label{font-size:calc(2.2*var(--u));color:var(--text-sub);
    background:rgba(255,255,255,0.06);border:1px solid var(--line);
    padding:calc(0.5*var(--u)) calc(1.5*var(--u));border-radius:calc(2*var(--u));}
  /* Grid */
  #grid-wrap{position:absolute;left:50%;transform:translateX(-50%);
    top:calc(14*var(--uh));width:calc(88*var(--u));height:calc(88*var(--u));z-index:2;}
  #grid-canvas{width:100%;height:100%;display:grid;grid-template-columns:repeat(6,1fr);
    grid-template-rows:repeat(6,1fr);gap:calc(0.7*var(--u));
    background:linear-gradient(145deg,var(--bg-panel),var(--bg-card));
    border:1.5px solid var(--line);border-radius:calc(2.5*var(--u));
    padding:calc(0.7*var(--u));
    box-shadow:0 0 calc(4*var(--u)) rgba(180,100,255,0.15),inset 0 0 calc(2*var(--u)) rgba(0,0,0,0.4);}
  .cell{position:relative;border-radius:calc(1.2*var(--u));
    background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    transition:background 0.12s,box-shadow 0.12s;}
  .cell.highlight{background:rgba(180,140,255,0.18);border-color:rgba(180,140,255,0.5);
    box-shadow:0 0 calc(1.2*var(--u)) rgba(180,140,255,0.35);}
  /* Warp tiles */
  .cell.warp-in{background:rgba(204,68,255,0.15);border:1.5px solid var(--warp-in);
    box-shadow:0 0 calc(1.5*var(--u)) var(--warp-in-glow),inset 0 0 calc(1*var(--u)) rgba(204,68,255,0.2);}
  .cell.warp-out{background:rgba(0,238,221,0.1);border:1.5px solid var(--warp-out);
    box-shadow:0 0 calc(1.5*var(--u)) var(--warp-out-glow),inset 0 0 calc(1*var(--u)) rgba(0,238,221,0.15);}
  /* One-way tiles */
  .cell.oneway{background:rgba(255,170,0,0.1);border:1.5px solid var(--oneway);
    box-shadow:0 0 calc(1*var(--u)) var(--oneway-glow);}
  /* Block — 3D toy-like with gradient + highlight */
  .block{position:absolute;width:84%;height:84%;border-radius:calc(1.2*var(--u));
    display:flex;align-items:center;justify-content:center;
    font-size:calc(3.6*var(--u));cursor:pointer;
    transition:transform 0.12s,filter 0.12s;z-index:2;
    box-shadow:0 calc(0.4*var(--u)) calc(1.2*var(--u)) rgba(0,0,0,0.5),
               inset 0 calc(0.6*var(--u)) calc(0.8*var(--u)) rgba(255,255,255,0.25),
               inset 0 calc(-0.3*var(--u)) calc(0.6*var(--u)) rgba(0,0,0,0.3);}
  .block::after{content:'';position:absolute;top:8%;left:10%;width:35%;height:30%;
    border-radius:50%;background:rgba(255,255,255,0.3);filter:blur(2px);pointer-events:none;}
  .block.selected{transform:scale(1.14);filter:brightness(1.25);z-index:5;}
  .block[data-color="red"]{
    background:linear-gradient(145deg,var(--col-red-light),var(--col-red));
    box-shadow:0 calc(0.4*var(--u)) calc(1.5*var(--u)) var(--col-red-glow),
               0 0 calc(0.5*var(--u)) var(--col-red-glow),
               inset 0 calc(0.6*var(--u)) 0 rgba(255,255,255,0.3);}
  .block[data-color="blue"]{
    background:linear-gradient(145deg,var(--col-blue-light),var(--col-blue));
    box-shadow:0 calc(0.4*var(--u)) calc(1.5*var(--u)) var(--col-blue-glow),
               0 0 calc(0.5*var(--u)) var(--col-blue-glow),
               inset 0 calc(0.6*var(--u)) 0 rgba(255,255,255,0.3);}
  .block[data-color="yellow"]{
    background:linear-gradient(145deg,var(--col-yellow-light),var(--col-yellow));
    box-shadow:0 calc(0.4*var(--u)) calc(1.5*var(--u)) var(--col-yellow-glow),
               0 0 calc(0.5*var(--u)) var(--col-yellow-glow),
               inset 0 calc(0.6*var(--u)) 0 rgba(255,255,255,0.35);}
  .block[data-color="green"]{
    background:linear-gradient(145deg,var(--col-green-light),var(--col-green));
    box-shadow:0 calc(0.4*var(--u)) calc(1.5*var(--u)) var(--col-green-glow),
               0 0 calc(0.5*var(--u)) var(--col-green-glow),
               inset 0 calc(0.6*var(--u)) 0 rgba(255,255,255,0.3);}
  .block.selected[data-color="red"]{
    box-shadow:0 0 calc(4*var(--u)) var(--col-red),0 0 calc(8*var(--u)) var(--col-red-glow),
               inset 0 calc(0.6*var(--u)) 0 rgba(255,255,255,0.4);}
  .block.selected[data-color="blue"]{
    box-shadow:0 0 calc(4*var(--u)) var(--col-blue),0 0 calc(8*var(--u)) var(--col-blue-glow),
               inset 0 calc(0.6*var(--u)) 0 rgba(255,255,255,0.4);}
  .block.selected[data-color="yellow"]{
    box-shadow:0 0 calc(4*var(--u)) var(--col-yellow),0 0 calc(8*var(--u)) var(--col-yellow-glow),
               inset 0 calc(0.6*var(--u)) 0 rgba(255,255,255,0.45);}
  .block.selected[data-color="green"]{
    box-shadow:0 0 calc(4*var(--u)) var(--col-green),0 0 calc(8*var(--u)) var(--col-green-glow),
               inset 0 calc(0.6*var(--u)) 0 rgba(255,255,255,0.4);}
  /* Warp overlay animation */
  .warp-swirl{position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    background:conic-gradient(from 0deg,transparent 60%,rgba(204,68,255,0.5) 80%,transparent 100%);
    animation:swirl 1s linear infinite;}
  .warp-out .warp-swirl{background:conic-gradient(from 0deg,transparent 60%,rgba(0,238,221,0.5) 80%,transparent 100%);}
  @keyframes swirl{to{transform:rotate(360deg);}}
  /* One-way arrow */
  .oneway-arrow{position:absolute;font-size:calc(3.2*var(--u));color:var(--oneway);
    pointer-events:none;opacity:0.9;text-shadow:0 0 calc(0.6*var(--u)) var(--oneway-glow);}
  /* Particles */
  .particle{position:absolute;border-radius:50%;pointer-events:none;z-index:20;
    animation:pop 0.55s ease-out forwards;}
  @keyframes pop{0%{opacity:1;transform:scale(1.5) translate(0,0);}
    100%{opacity:0;transform:scale(0) translate(var(--dx),var(--dy));}}
  /* Clear modal */
  #modal{position:absolute;inset:0;background:rgba(0,0,0,0.8);
    display:none;flex-direction:column;align-items:center;justify-content:center;z-index:30;
    backdrop-filter:blur(3px);}
  #modal.show{display:flex;}
  #modal-box{background:linear-gradient(160deg,var(--bg-card) 0%,var(--bg-mid) 100%);
    border:2px solid var(--warp-in);border-radius:calc(4*var(--u));
    padding:calc(6*var(--u)) calc(7*var(--u));text-align:center;
    box-shadow:0 0 calc(5*var(--u)) var(--warp-in-glow),0 calc(1*var(--u)) calc(3*var(--u)) rgba(0,0,0,0.6);}
  #modal-title{font-size:calc(6.5*var(--u));font-weight:900;letter-spacing:0.08em;
    background:linear-gradient(135deg,var(--nova-9),var(--nova-5),var(--nova-1));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    filter:drop-shadow(0 0 calc(1.5*var(--u)) var(--warp-in));
    margin-bottom:calc(2*var(--u));}
  #modal-sub{font-size:calc(2.5*var(--u));color:var(--text-sub);margin-bottom:calc(5*var(--u));
    letter-spacing:0.03em;}
  #modal-btn{background:linear-gradient(135deg,var(--warp-in),var(--col-blue));border:none;
    color:var(--text-main);font-size:calc(2.8*var(--u));font-weight:700;letter-spacing:0.05em;
    padding:calc(2.2*var(--u)) calc(7*var(--u));border-radius:calc(2.5*var(--u));
    cursor:pointer;box-shadow:0 calc(0.5*var(--u)) calc(2.5*var(--u)) var(--warp-in-glow);
    transition:filter 0.15s;}
  #modal-btn:hover{filter:brightness(1.2);}
  /* Legend */
  #legend{position:absolute;bottom:calc(1.5*var(--uh));left:50%;transform:translateX(-50%);
    display:flex;gap:calc(2.5*var(--u));align-items:center;
    background:rgba(0,0,0,0.4);border:1px solid var(--line);
    border-radius:calc(2*var(--u));padding:calc(0.8*var(--u)) calc(2*var(--u));z-index:5;}
  .leg-item{display:flex;align-items:center;gap:calc(0.7*var(--u));
    font-size:calc(1.7*var(--u));color:var(--text-sub);}
  .leg-dot{width:calc(1.8*var(--u));height:calc(1.8*var(--u));border-radius:50%;
    flex-shrink:0;}
</style>
</head>
<body>
<div id="phone">
  <div id="bg-stars"></div>
  <div id="hud">
    <div id="stage-label">STAGE 1</div>
    <div id="moves-label">手数: <span id="move-count">0</span></div>
  </div>
  <div id="grid-wrap">
    <div id="grid-canvas"></div>
  </div>
  <div id="legend">
    <div class="leg-item"><div class="leg-dot" style="background:var(--warp-in)"></div>ワープ入口</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--warp-out)"></div>ワープ出口</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--oneway)"></div>一方通行</div>
  </div>
  <div id="modal">
    <div id="modal-box">
      <div id="modal-title">CLEAR!</div>
      <div id="modal-sub" id="modal-sub-text"></div>
      <button id="modal-btn">次のステージ</button>
    </div>
  </div>
</div>
<script>
const DIRS = {
  '→': [0,1], '←': [0,-1], '↑': [-1,0], '↓': [1,0]
};
const DIR_NAMES = {'→':'right','←':'left','↑':'up','↓':'down'};

// Stage definitions
const STAGES = [
  // Stage 1: Warp intro, 3 colors, 1 warp pair, 3 moves
  // Move1: Red[0,0]→ into warp[0,2]→teleport[0,3], adj Red[0,4]→ all-red merged→cleared
  // Move2: Blue[1,0]↓ moves down to [3,0] (stops before occupied [4,0]), adj Blue[4,0]→ all-blue merged→cleared
  // Move3: Yellow[5,2]→ moves right to [5,4] (stops before occupied [5,5]), adj Yellow[5,5]→ all-yellow merged→cleared
  {
    size: 6,
    blocks: [
      {r:0,c:0,color:'red',dir:'→'},
      {r:0,c:4,color:'red',dir:'→'},
      {r:1,c:0,color:'blue',dir:'↓'},
      {r:4,c:0,color:'blue',dir:'↓'},
      {r:5,c:2,color:'yellow',dir:'→'},
      {r:5,c:5,color:'yellow',dir:'→'},
    ],
    warps: [
      {inR:0,inC:2,outR:0,outC:3}
    ],
    oneways: []
  },
  // Stage 2: Warp + one-way, 4 colors, 5 moves
  // Move1: Red[0,0]→ right to [0,3], adj Red[0,4]← → red cleared
  // Move2: Blue[1,5]↓ down to [3,5], adj Blue[4,5]↓ → blue cleared
  // Move3: Yellow[5,1]→ right into warp[5,2]→teleport[5,3], adj Yellow[5,4]← → yellow cleared
  // Move4: Green[2,0]↓ down to [3,0], adj Green[4,0]↓ → 2 greens connected
  // Move5: Green[4,2]← left to oneway[4,1](← ok), adj Green[4,0] → all 3 greens → cleared
  {
    size: 6,
    blocks: [
      {r:0,c:0,color:'red',dir:'→'},
      {r:0,c:4,color:'red',dir:'←'},
      {r:1,c:5,color:'blue',dir:'↓'},
      {r:4,c:5,color:'blue',dir:'↓'},
      {r:5,c:1,color:'yellow',dir:'→'},
      {r:5,c:4,color:'yellow',dir:'←'},
      {r:2,c:0,color:'green',dir:'↓'},
      {r:4,c:0,color:'green',dir:'↓'},
      {r:4,c:2,color:'green',dir:'←'},
    ],
    warps: [
      {inR:5,inC:2,outR:5,outC:3}
    ],
    oneways: [
      {r:4,c:1,allowed:'←'}
    ]
  }
];

let state = {
  stage: 0,
  board: null,      // 6x6 array, each cell: null or {color,dir,blockId}
  warps: [],
  oneways: [],
  selected: null,   // {r,c}
  moves: 0,
  colors: new Set()
};

function initStage(stageIdx) {
  const def = STAGES[stageIdx];
  const S = def.size;
  state.stage = stageIdx;
  state.moves = 0;
  state.selected = null;
  state.board = Array.from({length:S},()=>Array(S).fill(null));
  state.warps = def.warps.map((w,i)=>({...w,id:i}));
  state.oneways = def.oneways;
  state.colors = new Set();

  def.blocks.forEach((b,i)=>{
    state.board[b.r][b.c] = {color:b.color, dir:b.dir, id:i};
    state.colors.add(b.color);
  });

  document.getElementById('stage-label').textContent = `STAGE ${stageIdx+1}`;
  document.getElementById('move-count').textContent = '0';
  renderGrid();
}

function renderGrid() {
  const canvas = document.getElementById('grid-canvas');
  canvas.innerHTML = '';
  const S = 6;
  const warpsIn = new Map(state.warps.map(w=>[`${w.inR},${w.inC}`,w]));
  const warpsOut = new Map(state.warps.map(w=>[`${w.outR},${w.outC}`,w]));
  const oneways = new Map(state.oneways.map(o=>[`${o.r},${o.c}`,o]));

  for(let r=0;r<S;r++){
    for(let c=0;c<S;c++){
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r;
      cell.dataset.c = c;

      const key = `${r},${c}`;
      const wIn = warpsIn.get(key);
      const wOut = warpsOut.get(key);
      const ow = oneways.get(key);

      if(wIn) {
        cell.classList.add('warp-in');
        const swirl = document.createElement('div');
        swirl.className = 'warp-swirl';
        cell.appendChild(swirl);
        const lbl = document.createElement('div');
        lbl.style.cssText='position:absolute;font-size:calc(1.6*var(--u));color:var(--warp-in);opacity:0.9;bottom:5%;right:8%;z-index:3;';
        lbl.textContent = String.fromCharCode(9312 + wIn.id);
        cell.appendChild(lbl);
      } else if(wOut) {
        cell.classList.add('warp-out');
        const swirl = document.createElement('div');
        swirl.className = 'warp-swirl';
        cell.appendChild(swirl);
        const lbl = document.createElement('div');
        lbl.style.cssText='position:absolute;font-size:calc(1.6*var(--u));color:var(--warp-out);opacity:0.9;bottom:5%;right:8%;z-index:3;';
        lbl.textContent = String.fromCharCode(9312 + wOut.id);
        cell.appendChild(lbl);
      }

      if(ow) {
        cell.classList.add('oneway');
        const arrow = document.createElement('div');
        arrow.className = 'oneway-arrow';
        arrow.textContent = ow.allowed;
        cell.appendChild(arrow);
      }

      // Highlight valid move direction (any cell in arrow direction)
      if(state.selected) {
        const sel = state.selected;
        const selBlk = state.board[sel.r][sel.c];
        if(selBlk && isInDirection(sel.r, sel.c, selBlk.dir, r, c)) {
          cell.classList.add('highlight');
        }
      }

      // Block
      const blk = state.board[r][c];
      if(blk) {
        const el = document.createElement('div');
        el.className = 'block';
        el.dataset.color = blk.color;
        el.textContent = blk.dir;
        if(state.selected && state.selected.r===r && state.selected.c===c) {
          el.classList.add('selected');
        }
        cell.appendChild(el);
      }

      cell.addEventListener('pointerdown', e=>{e.preventDefault(); onCellClick(r,c);});
      canvas.appendChild(cell);
    }
  }
}

function getWarpIn(r,c) {
  return state.warps.find(w=>w.inR===r&&w.inC===c)||null;
}
function getWarpOut(r,c) {
  return state.warps.find(w=>w.outR===r&&w.outC===c)||null;
}
function getOneway(r,c) {
  return state.oneways.find(o=>o.r===r&&o.c===c)||null;
}

function canEnterCell(r, c, fromDir) {
  const ow = getOneway(r,c);
  if(ow) return ow.allowed === fromDir;
  return true;
}

// Returns true if clickedR,clickedC is in the block's direction from selR,selC
function isInDirection(selR, selC, dir, clickR, clickC) {
  const [dr,dc] = DIRS[dir];
  if(dr===0 && clickR!==selR) return false;
  if(dc===0 && clickC!==selC) return false;
  if(dr>0 && clickR<=selR) return false;
  if(dr<0 && clickR>=selR) return false;
  if(dc>0 && clickC<=selC) return false;
  if(dc<0 && clickC>=selC) return false;
  return true;
}

// Calculate where block slides to (with auto-warp), returns {landR,landC,usedWarp}
// Block slides until it hits an occupied cell, a wall, or a one-way blocker.
// If it lands on warp-in, it teleports to warp-out (if free) and continues from there.
function calcSlide(selR, selC) {
  const blk = state.board[selR][selC];
  if(!blk) return null;
  const [dr,dc] = DIRS[blk.dir];
  const S = 6;
  let cr = selR, cc = selC;
  let usedWarp = null;
  const MAX_ITER = 20;
  let iter = 0;

  while(iter++ < MAX_ITER) {
    const nr = cr+dr, nc = cc+dc;
    // Hit wall → stop at current
    if(nr<0||nr>=S||nc<0||nc>=S) break;
    // Can't enter next cell (oneway block or occupied)
    if(!canEnterCell(nr,nc,blk.dir)) break;
    if(state.board[nr][nc]) break;
    // Move to next cell
    cr = nr; cc = nc;
    // Check if landing on warp-in
    const wIn = getWarpIn(cr,cc);
    if(wIn) {
      // Warp to exit if exit is free
      if(!state.board[wIn.outR][wIn.outC]) {
        usedWarp = {fromR:cr,fromC:cc,toR:wIn.outR,toC:wIn.outC};
        cr = wIn.outR; cc = wIn.outC;
        // Continue sliding from warp exit
      } else {
        // Warp exit blocked: land on warp-in tile itself
      }
    }
  }

  // Must have moved (can't stay in place)
  if(cr===selR && cc===selC) return null;
  return {landR:cr, landC:cc, usedWarp};
}

function getSlideHighlights(selR, selC) {
  const result = calcSlide(selR, selC);
  if(!result) return [];
  return [{r:result.landR, c:result.landC}];
}

function isValidMove(selR, selC, clickR, clickC) {
  const blk = state.board[selR][selC];
  if(!blk) return false;
  // Click must be anywhere in the block's direction (any cell in that direction)
  if(!isInDirection(selR, selC, blk.dir, clickR, clickC)) return false;
  // Must have a valid slide destination
  const result = calcSlide(selR, selC);
  return result !== null;
}

function onCellClick(r, c) {
  const blk = state.board[r][c];

  if(!state.selected) {
    if(blk) {
      state.selected = {r,c};
      renderGrid();
    }
    return;
  }

  const sel = state.selected;

  // Click same cell → deselect
  if(sel.r===r && sel.c===c) {
    state.selected = null;
    renderGrid();
    return;
  }

  // Check if click is in direction of selected block
  const selBlk = state.board[sel.r][sel.c];
  if(selBlk && isInDirection(sel.r, sel.c, selBlk.dir, r, c)) {
    const slide = calcSlide(sel.r, sel.c);
    if(slide) {
      doSlide(sel.r, sel.c, slide);
      return;
    }
  }

  // Click another block → re-select
  if(blk) {
    state.selected = {r,c};
    renderGrid();
    return;
  }

  // Invalid click: deselect
  state.selected = null;
  renderGrid();
}

function doSlide(fromR, fromC, slide) {
  const blk = state.board[fromR][fromC];
  state.board[fromR][fromC] = null;
  state.board[slide.landR][slide.landC] = blk;
  state.moves++;
  document.getElementById('move-count').textContent = state.moves;
  state.selected = null;

  if(slide.usedWarp) {
    flashWarp(slide.usedWarp.fromR, slide.usedWarp.fromC, slide.usedWarp.toR, slide.usedWarp.toC);
    setTimeout(()=>{ checkAndClear(); renderGrid(); }, 320);
    renderGrid();
  } else {
    checkAndClear();
    renderGrid();
  }
}

function flashWarp(inR,inC,outR,outC) {
  const canvas = document.getElementById('grid-canvas');
  const cells = canvas.querySelectorAll('.cell');
  const inIdx = inR*6+inC;
  const outIdx = outR*6+outC;
  [inIdx,outIdx].forEach(idx=>{
    const c = cells[idx];
    if(c){
      c.style.background='rgba(204,68,255,0.65)';
      c.style.boxShadow='0 0 12px rgba(204,68,255,0.9)';
      setTimeout(()=>{ c.style.background=''; c.style.boxShadow=''; },300);
    }
  });
}

function checkAndClear() {
  const S = 6;
  const colorsOnBoard = new Map();

  for(let r=0;r<S;r++){
    for(let c=0;c<S;c++){
      const b = state.board[r][c];
      if(b){
        if(!colorsOnBoard.has(b.color)) colorsOnBoard.set(b.color,[]);
        colorsOnBoard.get(b.color).push({r,c});
      }
    }
  }

  let cleared = false;
  for(const [color, positions] of colorsOnBoard) {
    // BFS to find groups
    const groups = findGroups(positions, S);
    if(groups.length===1) {
      // All of this color is one connected group → clear!
      for(const {r,c} of positions){
        state.board[r][c] = null;
      }
      spawnParticles(positions, color);
      cleared = true;
    }
  }

  if(cleared) {
    // Check win
    let anyLeft = false;
    for(let r=0;r<S;r++) for(let c=0;c<S;c++) if(state.board[r][c]) anyLeft=true;
    if(!anyLeft) {
      setTimeout(()=>showClear(),400);
    }
  }
}

function findGroups(positions, S) {
  const posSet = new Set(positions.map(p=>`${p.r},${p.c}`));
  const visited = new Set();
  const groups = [];

  for(const pos of positions){
    const key=`${pos.r},${pos.c}`;
    if(visited.has(key)) continue;
    const group=[];
    const queue=[pos];
    visited.add(key);
    while(queue.length){
      const {r,c}=queue.shift();
      group.push({r,c});
      for(const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]){
        const nr=r+dr,nc=c+dc;
        const nkey=`${nr},${nc}`;
        if(nr>=0&&nr<S&&nc>=0&&nc<S&&posSet.has(nkey)&&!visited.has(nkey)){
          visited.add(nkey);
          queue.push({nr:nr,nc:nc,r:nr,c:nc});
        }
      }
    }
    groups.push(group);
  }
  return groups;
}

function spawnParticles(positions, color) {
  const phone = document.getElementById('phone');
  const canvas = document.getElementById('grid-canvas');
  const cellW = canvas.offsetWidth/6;
  const cellH = canvas.offsetHeight/6;
  const rect = canvas.getBoundingClientRect();
  const phoneRect = phone.getBoundingClientRect();
  const colorMap = {
    red:'var(--col-red)',blue:'var(--col-blue)',
    yellow:'var(--col-yellow)',green:'var(--col-green)'
  };
  const glowMap = {
    red:'var(--col-red-glow)',blue:'var(--col-blue-glow)',
    yellow:'var(--col-yellow-glow)',green:'var(--col-green-glow)'
  };
  const clr = colorMap[color]||'#fff';
  const glw = glowMap[color]||'rgba(255,255,255,0.5)';

  positions.forEach(({r,c})=>{
    const cx = rect.left - phoneRect.left + c*cellW + cellW/2;
    const cy = rect.top - phoneRect.top + r*cellH + cellH/2;
    const count = 12;
    for(let i=0;i<count;i++){
      const p = document.createElement('div');
      p.className='particle';
      const angle = (i/count)*Math.PI*2 + Math.random()*0.5;
      const dist = 18+Math.random()*38;
      const dx = Math.cos(angle)*dist;
      const dy = Math.sin(angle)*dist;
      const size = 3+Math.random()*7;
      p.style.cssText=`left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;
        background:${clr};box-shadow:0 0 ${size*1.5}px ${glw};
        --dx:${dx}px;--dy:${dy}px;margin-left:-${size/2}px;margin-top:-${size/2}px;`;
      phone.appendChild(p);
      setTimeout(()=>p.remove(),600);
    }
  });
}

function showClear() {
  const modal = document.getElementById('modal');
  const sub = document.getElementById('modal-sub');
  const btn = document.getElementById('modal-btn');

  if(state.stage < STAGES.length-1) {
    sub.textContent = `${state.moves}手でクリア！`;
    btn.textContent = '次のステージへ';
    btn.onclick = ()=>{ modal.classList.remove('show'); initStage(state.stage+1); };
  } else {
    sub.textContent = `全ステージクリア！ 合計${state.moves}手`;
    btn.textContent = 'もう一度';
    btn.onclick = ()=>{ modal.classList.remove('show'); initStage(0); };
  }
  modal.classList.add('show');
}

// Init starfield
(function initStars(){
  const container = document.getElementById('bg-stars');
  for(let i=0;i<36;i++){
    const s = document.createElement('div');
    s.className='star';
    const size = 1+Math.random()*2;
    s.style.cssText=`
      left:${Math.random()*100}%;top:${Math.random()*100}%;
      width:${size}px;height:${size}px;
      --d:${2+Math.random()*3}s;
      --delay:${Math.random()*4}s;
      --op:${0.3+Math.random()*0.5};`;
    container.appendChild(s);
  }
})();

// Init
initStage(0);
</script>
